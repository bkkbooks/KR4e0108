  - {type: variant, offset: 19870, length: 363, content: 懐張詡南北東西一馬塵相思何處不傷神竹邉閉閣長無事猶厭山雲軟素巾玉枕山一枕横秋碧玉新金鰲閣上見嶙峋使君得此元無用賣與江門打睡人魯两生示民澤九五當朝須勸駕两生朝突不留琴想見古來交㑹盛鴛鴦譜裡盡傳鍼黄雲右関萬丈黄雲千丈山金粟花開不等閑吁嗟乎金粟丈人與爾同歲闌黄雲左関萬丈黄雲千丈山金粟花開不等閑金粟氤氲塞两間吁嗟乎金粟丈人與爾同歲䦨和鳯山見寄韻乙巳冬十月白馬山前雪滿扉隔江雲樹晚依㣲津頭日日行人過不見長安舊布衣江浦有白馬庵曾寓處相逢記得入亰年夢破邯郸不受牽更說莆田風㬌好木蘭溪裏木蘭船讀陳庸詩稿天上霓裳乆寂寥人間何處不詩瓢寄言雪月風花好都在騷人仔細描張廵獨蔽江淮阻賊兵乹坤囬首盡羶腥何人肯救睢易急不使忠臣付忍名許逺援絶城孤力不任逆胡天討竟成擒却憐當日奴羮進酸盡平生長者心南霽雲萬人囬首㸔浮屠肯訊将軍躍馬呼誰續雎易三口命進明先斬後擒胡, WYG: ''}
