front:
  text: 白沙子卷之七
  hash: sha256:074be35907e6a675851009f7b7d92bd7b5a698a7d1e16ef1ac8b5a9602ddfe1e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0108_SBCK_007-1a}
body:
  text: 五言律詩題新村書齊壁日色催江渡潮痕上石梯趂墟村婦出索哺襁兒啼樹接黃村塢船移白石溪落花誰省記何必武陵迷茅棟依岩靜柴門洗竹通桑榆巷南北煙火埭西東一徑漁樵入孤村井臼同僯家得美酒吹笛月明中新年隂雨方連日新年損物華呼兒酌我酒騎馬到誰家黯黯寒雲密蕭蕭暮景斜人心正無賴狼藉任桃花今日勝元曰江天乍放晴呼瓶汲井水煮茗待門生山鳥鳴將下桃花暗復明所嗟人易老况復歲華更朝雨黃鸝靜春風暗蕊低極知來令節未肯踏深泥狼藉桃無語侵尋草滿蹊還聞騎馬客躑躅向沙堤止客宿為恨開年雨江村馬跡稀諸君能枉拜今夕不須歸歲酒堪投轄人家欲掩扉仍聞僕夫語畏逐駿蹄飛暮雨客去入郭路𥘉暝過橋客已勞㒒夫亦吾子馬跡徇吾曹春色歸詩妙花枝愛酒豪良宵只孤負遮莫雨蕭騷送客濃緑新春酒踈紅隔水花官人坐馬醉江路繞山斜桃李成春徑牛羊散暮沙林泉無宿客興盡且還家送劉方伯東山先生為別情何如已別情猶邈豈無尺素書逺寄天一角江門卧煙艇酒醒蓑衣薄明月照孤松清風灑孤鶴登陶公壯哉亭新亭開石窟逺勢借崑崙天地雙眸逈滄𬈑一口吞公來席不暖士死廟長存憶昔干戈際南征萬馬奔是夕范生小酌日月雙輪轉乾坤一氣旋是時冬始閠細雨夜如年人語斜風外天機落葉邉憑誰給燈火更坐讀殘篇至容貫宅在昔偶相遇如今共白頭敝衣寒露肘破屋早知秋家業憑觚翰厨烟管去留老翁如辟穀與子入羅浮福童灌園綰瓶行百步池在小橋東抱瓮雖無忝寒衣却未豐數畦仍待緑十趾遂流紅口腹終同及能無愧此童寄胡寧夀康齊先師之甥年華當轉鳥詩思更塗鴉父子皆吾友箕裘一舅家人猶思嶺北書不到天涯莫作妻孥計浮生日易斜石門白髮非公事扁舟進此門山雲寒不雨江路曲通村玩世吾何有長途馬不存晚來堪一醉江月照空樽恱城山作旌幢擁江絣鏡面平舟航乘曉發雲日入冬晴鼓到江心絶槎衝石角橫經過恱城曲無語笑浮生歲晚江上追次王半山韻山寒煙錯寞江曉日荒凉水際風巾動梅邉䗶屐香低頭挈小榼拍手笑輕航何但供逰走而須此日光辱和拙作見示九日醉中再次奉答激楚嗟難和霓裳更可同更䦨朱鳥下聲斷碧雲中稍歇沾花雨還吹落帽風萬松期不至半偈欲騰空九日馬默齊送姑蘇酒至次韻奉答姑蘇一壼酒九日到山開即事焉能賦頽齡漫愛杯清風生菊徑落日滿溪臺酩酊黎床上雲來覆老萊求荔枝栽貞節堂髙榜近東𬈑朝光滿北楹欲便清晝睡須待緑隂橫名木從誰假幽居賴毋成君家多黑葉火急送雙莖華山飛翠何處青天外穹然起一丘山名疑屬我詩景盡歸樓九夏雲長潤千岩翠欲流野夫好逰走衰病只羅浮對鶴潦倒溪翁誰人疑鳥不疑間將鶴起舞不作老無竒任病還親酒雖慵不廢詩悠然清唳外一枕到皇羲吾晚病兼貧􅏘衣穩稱身朝來參兩鶴花底作三人日出東南雨鶯啼宇宙春三杯下衫䄂拂拭舊龍唇題羅一峯贈馬龍道南卷花發春來少愁添老去長髙才想傾蓋昨夜語連床天下羅公佛湖西馬子香離筵一杯酒歌苦莫相忘飲陂頭入崦花叢密遵陂石路髙柴門過午飯村老對春醪水白都如練風清不作刀自然五字句非謝亦非陶送梁國鎮蓋有藏器人我病元非果徘徊思逺道欲往悲定跛梁生千里駒東西無不可飛轡入長安垂楊春婀娜吳村弔莊節婦墓豺虎何由近風濤浩若無行人看墓榜英爽在清都江暝雲長合原寒草不枯乾坤不杇事持此報君夫此里有此墓千年亦不磨世方逐蔡琰吾甚敬曹娥淫盜死殊色良人及逝波江翻練裙帶激烈有遺歌懷古次韻王半山三徑五株栁孤村獨板門先生正髙卧衆鳥莫交喧晋宋當時改乾坤此老存手中一把菊秋色滿丘園相逢踈桞下賔主兩忘言處士乃無履江州𥘉到門低頭入茅宇散髮對金樽長揖朱轓別狂歌向小園即事龍溪一片水何處是真源沉吟搔白首竚立向黃昏宿鳥爭投樹歸牛漸滿村少年誰氏子歌吹隔江繁經故居到溪田作圃環堵樹為門老憶先廬在貧知草座溫三遷時已後二紀恨空存舊事無人話斜暉滿故園容琴月生孫以詩來賀之春意復西良孫枝茁更芳自堪為喜極誰肯笑詩狂竹杖還渠撰金杯與客長簮花垂白髮疊映緑衣香贈何廷桂罷館歸科頭行百里笠影落烟霞四十親書卷尋常過酒家兒童非講席鉛槧此歸槎共待春芳發來看舊種花贈謝德明有事赴廣還畢嫁吾何有勞君作犬啇叉裙是荆布歲月勝資粧月動江濤白山衰木葉黃無錢入城府來往但䡖艕月落五仙城天空一雁鳴離愁動江色歸纜解鍾聲鷺應船謳起溪尋酒幔行經過不買醉貪嗅早梅馨有傳羅一峯觀化悲風何處起散作斷腸聲乘彼白雲去湖西問死生四海方懸仰一峯何可傾平生不下泪今日盡沾纓問訊南川子東莞林光也金牛有是非憂為妻子地淚濕故人衣歲晚流言惡天涯信使稀西風吹落葉故故傍愁飛四月四月隂晴裏山花落漸稀雨聲寒月桂日色暖􅙐醾病起𥘉持酒春歸尚掩扉午風吹蛺蝶低趂乳禽飛生意日無涯乾坤自不知受風荷柄曲擎雨柏枝垂靜坐觀群妙聊行覔小詩臨階愛新竹抽作碧參差風雨夜有數十客挂飯逹旦不寐老覺生涯少貧添食指繁雨中誰舉火夜半客椎門室暗承塵濕階翻墜瓦喧平明不曽睡負鍤理花根聞方伯彭公上薦剡當時尊孔孟用世必詩書夫我何為者先生非過歟長歌扶晚醉短髮向秋踈坐惜籬前水垂竿試釣魚骨相合長貧岩棲纍十春忽傳邦伯疏見笑北山神伎倆只餘子行藏獨老親古來稱水鑑誰是鑑中人初秋夜四時相代謝已度一日秋風吹露下葉月照水邉樓堯舜今當御巢由竟媚幽山靈邀夢去昨夜又羅浮自我不出戶歲星今卜周丹砂求未遂緑鬢去難留時節來將晚山河值早秋西風捲雨去星月滿池流秋夢山斗英魂在江湖秋夢深還將百年淚滴破一峯心絮酒熏天地金牛恨古今龍泉不挂墓吾欲殉吾琴南海五千里不來莊定山何由到江北此㑹非人間短短目相屬悠悠心自間莫言但是夢好夢亦云慳夜來何所夢洗耳白龍池秋月下相照天風髙自吹永持一瓢水細嚼萬年枝山鬼向我拜先生是希夷答惠州鄭別駕惠葛布惠我一匹葛縫衣笑不奢賦詩酬別駕愛酒典僯家獨酌秋風裏浩歌山月斜醉魂不覺逺卧探惠陽花世澤世澤由來逺何年播廣東吾廬依外海分派自南雄家剩為裘業山餘偃斧封千秋文物類并與劫灰空世澤由來逺時當厄難中長鬚躬壠畝赤腳話兒童骨肉危相保于戈晚益窮存亡一絲髮端為謝蒼穹世澤由來逺中更幾替隆市㕓懷直道夷險信隂㓛地接華山隱家嚴涑水翁百年還舊物報事亦無窮世澤由來逺誰興啓迪㓛今無夭顔子古有聖重瞳想像千年下淒涼百感中癡兒何足了徒只愧家風江門墟十步一茅椽非村非市㕓行人思店飯過鳥避墟煙日漾紅雲島魚翻黃葉川誰為問津者莫上趂墟船中秋期友賞月遣蒼頭致餽以詩迓之籠鵝并榼酒食有一金携寂寂慙吾子依依向隔溪開筵面華月出戶望青藜若負今宵醉何不西山棲即席賦夕風夕微􅋽池塘散月光呼兒看酒具待客飲江鄉月對歌筵徙風拖舞䄂長人生行樂耳歸棹夜相將盆池栽蓮至秋始花栽種已後時花發秋將遲雖無女伴采亦有山蜂知葉稀因地力香逺是天資安得三閭手臨軒賦楚詞秋露開炎蕚非時不遣誇盆中玉井水溪上舂陵家酒醒􅋽風發詩成缺月斜願為若耶叟種水作生涯開花恨不早花落却生愁白露䏻消物紅蓮不耐秋頻來癡小女對此泪長流不識榮枯理哀樂空相仇此夕不能寐此樂殊無央下堂步明月月印花自長涓㳙花間露夜滴池水香但惜花月好那知風露傷圭峯閣勝處不在逺杪秋何處尋步崖碧澗落眠石青松隂地少滄𬈑入山髙雁䳱沉此時間佇望誰識倚闌心庚子元旦風日佳元日乾坤自此春蒸空雲氣濕照水栁芽新笑語聊供客杯盤少對人䏻寬垂老意花鳥不無神春興野晴花簇白山暖樹更青卯酒醉欲睡午風吹又醒間拈曲江句勝讀法華經自在山窗下跏趺趣已冥晨起群雀曉啾啾閉門春事幽下床花到眼招手鶴朝頭永日還書卷衰年但酒甌醉來江桞下笑引子陵鈎早起推枕起新晴披衣向小明坐忘新病减夢少夙心清軋軋開僯戶鼕鼕殺縣更跛奴呼具盥旋起繞花行春懷次韻陸放翁江發溶溶緑山開面面青春風何氣力吹動綵雲亭時物歸春雨交遊散曉星十年江海夢誰道不曽醒清明日往孔家山墓舊隱經都㑹佳城入孔家春雲低拂馬山路曲縈蛇只隔飄香處猶疑壞圃花九原無曉夜誰管夕陽斜春興追次后山韻萬物各得性天開一歲春風柔翻弱羽波暖躍纎鱗稚栁𥘉成趣芳芹亦賞新川雲將嶽雨何者不供人雨坐風雨坐前楹關關雙鳥鳴正當落花處更作送春聲大化歸無極斯人樂久生不知川上水東逝幾時停吊陳毅卿墓微風松下起落日照蜻蜓絮酒知吾輩春山憶毅卿由來都大夢終寄一浮萍極目蒼岑外波濤滿地生蓬萊山祭伍光宇墓道骨成仙蛻名山是閬丘雲中騎欵假天上呌軥輈人世黃梁熟吾儕白髮秋仍留一杯酒何處酹金牛樹穴蘭樹穴疑生理花開不記年靈根那藉土芳氣直薰天瘦比餐芝老清于辟穀仙平生誰得見雲嶠但蒼然大托千尋樹真堪托此生春風卷騷怨秋月照琴聲南極峯連起東𬈑水一橫所棲非近地持贈若為情家兄携秉常看山豫病不䏻往行色千崖裏風光三月中山家愁酒少造物愛詩工好鳥簧為韻新花錦作叢吾䏻騎瘦馬不惜逺追從題龜山小隱賀聶清碧新居瀕海地三畒連雲厦數間龜山愛清碧清碧愛龜山笠屐誰同往江湖我自間芙蓉小溪水曾此照衰顔山下別業豕腳有濡需乾坤胡適隨看雲因坐久抱瓮得歸遲家纍無多口生涯但一陂歸哉五湖樂吾夫羡鴟夷弄孫畫棟三重簷曈曨曉雀穿一兒卧我膝一兒坐奴肩風日秋逾美許書老未傳二雛當慰我心賞獨悠然戲贈都老蔡坑黃野舟獨坐小園幽被命為都老傾心向縣俠萬家春且至一紀俗全偷莫倚無言化須君九借籌韋夫人挽兩山先生配詡之毋也人生如朝露死亦同蛻蟬有子䏻如詡夫人可以仙春臺花灼灼秋浦月姢姢喚醒何州夢歸來泪迸泉次韻何宗濂灑落儀曹句遺名得自求如何行不顧膠向􅃮中投無事由來得多言大抵浮結趺樗木下即此是良謀至陳冕家逺樹晴堪數孤雲暝欲遮自憐江海迹䏻到友生家落日明江色䡖風動麥花相看吾鬢白不必問年華金洲石在江中舟楫公餘日金洲不少留中流幾丈石明月五湖秋目擊金山寺春來白鷺洲西風從此去幾曰到羅浮吊李九淵水竹更新主風花失故權夜臺無起日春草自流年萬有終㱕盡千秋不必傳倒巾此相對只有玉臺山古椰寄周亰西來何處水千里不平流入海魚龍喜懷山草木愁雨邉明落日石角上孤舟寄語周亰道勞生不自由德慶州舟中呈伍南山江漲􅏘墟雨天低德慶城正當擊楫處空有結趺情入夏尋雙井沿流到七星同行鄒道士勸我學長生德慶峽是年大水舟行不由故道客路一千里羊腸百八盤時時行樹杪往往異人間竹纜牽江暝絺衣入峽寒倚門應盡日誰與報平安和尚石舟楫行天上斜暉卷浪花廽流忽吞吐鳴櫓極嘔啞便可通星漢還堪著釣槎雲根僧一個疑我不袈裟南㱕寄鄉舊家在桃源裏龍溪是假名蕉衫溪女窄木屐市郎輕生酒鱘魚㑹邉罏蜆子羮行窩堪處處只少邵先生居士舊茅齊蕭然倚玉臺獨尋寺裏去每到日西回魚躍水萍破風推巖戶開小橋殘板在長訝有人來省事除煩惱端居飬靜虛栽花終恨少飲酒不留餘山徑兒吹笛村田婦把鋤殷勤謝閭里勝事莫相踈碧草東西埭黃鸝逺近山岩春花氣足簷日鳥聲間文字虛堆几園林不設關一條煙際路朝往暮來還江邊逢野叟乂手問官名立雀黃牛近􅋦魚白鷺腥西田餘故宅北崦多新塋駐馬斜陽外悽然感廢興山童呼犬出狂走信諸孫乳鴨爭嬉水寒牛不出村墟煙浮竹杪田水到桑根僯叟欣相遇笑談忘日曛自愛愚公谷誰過野老家時依當戶竹間數上墻花鳥立溪槎靜牛爭崦路斜懷中嬌小女學語解呼爺紫水團沙北黃雲古剎東樓吞滄海日幔卷玉臺風物色求鍾鼎丹砂訪葛洪芙蓉開十丈天際白龍宫出處有分付將非人所䏻君看飛鳥輩誰不顧髙騰放意三杯酒留情半夜燈韋丹非俗吏靈徹自髙僧沙渠風日美弄水愛群兒花落鶯猶語春歸蝶未知惜芳心未巳髙咏社公詞四序每如此獨憂無乃癡春興野鳥飛窗靜春蘿𥙷屋穿時時咽花氣翳翳傍林園山鳥日暮至長鳴芳樹煙喚醒陶令醉驚覺華山眠社西村孤村比屋靜疏竹小塘幽何處還三徑如公也一丘晚田行布狗春草散軥輈汲澗誰家女金櫻插滿頭結茅依里社村以社西名客至惟談稼年衰不入城鄰雞上樹宿水鶴傍人鳴向晚尋牛去前岡笛又轟君家里社西我家里社東平分社公雨不隔馬牛風瓜地妻能種衣巾俗與同雲邉采芝徑髙盡玉臺峯社主對諸阡居廬散百煙共來鄉社㑹同樂帝堯年折花潮沒屐吹笛月隨船偶尋社西去又賦社西篇社西逢酒伴埭北有花枝詎識愚公意聊同牧竪嬉圍碁松崦久度馬板橋遲䄂有葳㽔草還家不告飢卜築真何意施為但自由鄉音還杜阮家業且陂頭野老眠看客山童坐飲牛無生知樂否更為問骷髏寄馬默齊山隂元有興畫舫在須登閉閣思君子開門見老僧騎驢山路穩挂席海波騰揣度安危事如公恐未䏻倒載輕駢駕徒行謝衆扶無錢欺老杜失䇿問長鬚山雨􅙐醾病林風枳殼踈待君君不至春盡又何如月坐林深月到遲愛月坐成癡平生不戚戚衰老尤嬉嬉曽西卑管仲孟子述宣尼何事由求輩區區欲有為懷古千里拜林宗行藏未始同諸賢皆好義夫子獨時中東漢非劉氏西山是閬風堂堂四百載載籍為誰空讀西涯李學士撰趙貟外滄江別墅記江空秋月清月出秋江明水月自相得乾坤誰與爭作亭趙貟外屬記李先生何時理烟艇載酒下南京思親堂父子自天性誰䏻詠蓼莪聲容想如在風木悲奈何草露滴秋壠庭烏號夜柯思親兩眼淚萬古注江河送鄭巡檢休官還莆卑栖一枝足髙舉入雲層大鵬非斥鷃斥鷃非大鵬卑髙各有適小大不相䏻㱕去木蘭溪溪魚美可􅊻懷古皇皇復皇皇開闢到陶唐遲日江山麗春風花草香閭閻盡孝弟簡冊無禎祥乾坤十二㑹巳午在中央寄容一之直以傭為業何妨睡作魔吟詩終日少飲酒一生多坐久頭鳴籟行遲腳有鵝林居三十載一室小維摩萬松草屋南山愛夫子夫子愛南山孤鶴去千載萬松棲半間無愁催白髮有藥駐朱顔夜半風雷作龍來問大還畏途千百轉回首見諸山若個幽求子結茅松樹間希夷㱕華頂黃綺在啇顔分我青精飯從君亦不還寄太虛上人太虛石洞居孤絶少人依逺客携琴至逢師乞食歸一蒲青草上四面白雲飛盡日無言說岩花落滿衣定山聊作主石洞更無僯勸我無多事如公是一人朝聞履虎尾莫見批龍鱗莫笑楊朱小楊朱解愛身九日寄丁明府病裡登髙意村邉社樹蒼有歡開酒禁無力控詩狂老鬢簮花醜秋襟水照涼如何丁明府不肯共重陽菊節後五日丁明府彥誠携酒來飲白沙社賦𥙷會秋色上籬尖天髙霜氣嚴對花無阿堵笑我似陶潜節去杯盤在公來吏隱兼江門賦𥙷㑹勝話無窮年此日還供酒人情蓋亦難暫隨明府醉斷送菊花殘極浦明秋日臨流弄晚竿遙憐張閫幕相憶在長安百里非無地東籬不借人因君九日愛傾此一杯春菊謝人間世官閒酒處身想無厭花意投轄暮江濵對菊種菊不盈區揮金每顧餘古今間計較俄頃失歡娛西廩髙堆粟東樓賸貯書路旁楊栁樹憔悴不成踈秋晚皎皎月又缺鮮鮮菊可收汀雲迷島嶼山雨落扶留市有屠牛杌江連邏吏舟恐無賖酒處垂白對清秋陳方伯耻庵挽詩乾坤如此老沒齒向斯文公自滄浪水人無觳觫君衣冠全素履江海挹清芬病起須持酒青山欲到墳中年倦俯仰上疏乞山林黽勉南州牧遲回北極心民蒙三日雨世病一鈎金殄瘁聲悲處龍蛇歲直今苦熱揮汗書難繼清心雨未來手提弱絲去風撼社門開指點封君句摩挲土棟苔松根吾欲卧返照又相催晚涼慰我渴秋暑著人煩拄杖緣溪足看潮到栁根哦詩衰骨痛開卷病眸昏六月飛雲冷相思只斷魂晚步水國秋先至江村晚更幽泥筌收郭索山網落軥輈涼入社門樹隂連渡口舟獨憐經略地吾得放歌逰居常懶出戶肯到社西頭海國諸峯暝乾坤六月秋微涼生浦樹返照下西樓今夕蒲團上前山更卧逰崔清獻公裔孫潜示遺芳卷復許示遺像豫既書紀夢之作于其還也贈之詩積雨階苔上經旬斷履㾗誰為門外客公是菊坡孫澤與流風逺名因避相尊丹青遺像在何日照江門太夫人晚㱕携諸孫候于貞節橋下寒花明隔塢暝色欲㱕潮未愁山路黑莫放板車搖耄耋供人事兒孫候此橋殷勤望四崦風急暮雲飄延緣看落日伊軋到溪西丫路依岡轉垂蘿拂蓋低喜從中道見癡效小兒啼報賜心何極乾坤聖夀齊枕上偶成翰苑無官府蒲團了歲年岩雲交樹白水月印沙圎懶甚陶元亮間于魏仲先吾曹生分薄於福敢求全梅村詩次韻黎雪青梅村梅發早巳過賞花期玄酒𥘉無味名家豈在詩井寒人汲少川暝鳥飛卑髙枕滄𬈑者神仙定不疑次韻秋興感事録寄東所醉眠山影裡恨不與君同松下泉來冷雞鳴日過中就床梳白髮開戶納清風起視滄𬈑暮孤鴻沒遠空秋露落芙蓉河山日不同物情詩卷裡天道雨聲中朝出馬愁坂暮行船逆風欲投雲谷隱鞭鶴上層空崑崙一池水色與銀河同問子為誰氏從師向此中短檠非世業破笠是家風回首唐虞際浮雲點太空首陽非立異桞下不妨同歲月黑甜外乾坤軟飽中腐儒甘糲食烈士死長風今古誰䏻計賢愚併一空得林子逢書感平湖事賦此次前韻平湖千里水浣濯與誰同咄咄諸魔裏冥冥一夢中支離深嵗月感慨極秋風㸃檢希顔處吾瓢合屢空同人未為失子不善為同䆠况浮雲外生涯大鱉中孤篙撑急水弱羽試衝風佛者空諸有吾儒有亦空與梁文冠鉛槧誰分付聞君有義方𥿄田須樂墾畫果豈堪嘗得雨花蹊潤隨風鳥韻長公來詩不少排日兩三章與客客訪貧家少連旬幸作東笙簧都萬籟爼豆亦千峯冠帶迎人懶情懷傍酒濃白頭君莫笑醉䄂舞春風四月草七日五鼓起索衣往來房戶門失腳仆地傷面咎在不謹然亦衰年久病氣弱無力之驗也為詩以自悼脛骨衰無力顛危剛莫支少年非一蹶今日獨多悲形模甘老醜面目對人疑呼兒教滌血不忍報慈闈風捲芭蕉雨南窗夜擁衾人當懲樂正我已愧曽參一一觀天命時時動此心林間子規鳥那更助悲吟寄張進士廷實是詩難入俗正坐不雕鐫水滿魚爭躍花深蝶喜穿日髙雲卧處春在鳥啼邉不及陳無已能無賞自然秋中寄興同前感事韻録遞東所兼呈雲谷老隱一笑山人無外事白首稚兒同弄水溪堂背爭棋𥿄局中盆池秋見月竹院夜呼風觸事成唐句狂歌向碧空偕伍伯饒楊伯順甥舅順德李子長逰李村山逰走意何窮天樞日夜東青山都老腳破笠又春風徑草分遙碧岩花墜小紅乾坤渾欲別何處問壷公晝睡偶成寄玉臺文定上人老腳春還短名山夢每登玉臺天上寺文定意中僧得法休藏鉢傳心信有燈道人北窗下一枕一瞢騰春日書事開年今日雨踈栁小塘春紫燕將㱕社黃鸝欲喚人未明事南畝選日聘西賔元亮朝朝醉江村白酒新春日江村時候花先覺隂晴鳥自知登山嫌避客得句樂呼兒蔓草披香徑垂楊覆淺漪美人期未至江月幾盈虧草帶籬腰緑花簮石頂紅林園開晝景鶯燕語春風山靄霏霏合江流渺渺東獨來橋畔路髙拄過眉笻驛吏送酒市榼通郵吏三杯洗侍兒十分春意思一副酒肝脾江嶺長看畫風花不盡詩混然天地內公是醉鄉誰春日醉中言懷山林亦朝市朝市亦山林兩鬢白于舊三杯狂到今子雲休擬賦元亮巳忘琴南山千丈石可以明我心古人不可見空見古人心春風開我盞流水到誰琴無說可傳後何才敢議今玉臺花信少扶杖更西林與客談詩風雅餘三百唐音僅幾家夢猶將影說癢莫隔靴爬豈是安排得胡為孟浪誇超然不到處應是用心差雨中李世卿往還助談風滿席伴宿月流衾貧賤交遊冷江山腳跡深惠連何處夢孟毋此時心稍歇松齊雨還來辨繡針得林憲副待用書有懷故友張兼素蹇蹇張兼素從君致匪躬天來今日定書展故人封賈傅生還慟湘纍死亦忠平生兩行泪萬里寄秋風寄容貫圭峯西峯扶䇿上病骨快新涼乞米分僧飯聞香過𣑽堂閉門秋竹靜語鳥暮鍾藏浩浩蒲團上還同在醉鄉落日荒臺上疏松古塔邉身休論出世趣欲到無絃峯閣𥘉生月渠通自到泉西菴慿借問許住過殘年江村晚聖寄世卿圭峯一望一延緣諸山進目前卿邦無一老知舊半重泉黃葉寺旁下白雲池上連無窮幽澗水日夜注東川贈黃進士廷章還亰錦衣在親旁飲酒日百觴樂處嫌春短離心向夜長青雲冠蓋起黃甲姓名香五色持文線千年𥙷舜裳白雀群飛益髙取勢翩翩上江空暮雨餘情䡖鳩並婦聲細雁呼奴白雪灑孤嶂青天開一圖安䏻隨蚱蜢跳躑在泥塗得林別駕書云去秋九月嘗夢豫于廣信舟中兼示道路所聞潦倒年斯邁芳菲日自遲忽聞天上夢又落世間疑扛鼎須憑力無才敢與知涪翁亦秋思謾寄頴濵詩重過大忠祠宋有中流柱三人吾所欽青山遺此廟終古厭人心月到崖門白神逰海霧深興亡誰復道猿鳥莫哀吟春隂偶作寄定山浩浩川流疾冥冥嶺樹隂共憐春錯莫更覺老侵尋宿雨衰花氣朝陽絶鳥吟誰䏻盡天道俯仰此懷深次韻寄廷實吾猶堪起倒吾肯謝親賔在世寧須此如公故可人百年應得見一面始能親獨向湘江去無忘越嶺春無才傭作吏有酒喜留賔老更耽髙卧時還近俗人鍾鳴山寺逺月出土床親何處期吾子笙歌玉洞春築室垂老無筋力寧非板築人居常只謾過即事始知貧海國秋風早山房夜氣新癡兒解了事吾坐養吾真一室無多事貧家每作難從來無厚積况復不䏻慳貸粟干知友營材入逺山三間開土閣聊得奉慈顔送景易赴秋試未逹窮通理難忘得失心安䏻謝朝市且莫厭山林烹鼎須兼味吹竽當好音文章無定價敝帚不論金圖新書舍懷世卿時別白沙半月月上齊垣白疏梅共主賔偶來對月飲不見如花人已覺書難至常疑夢與親海山猶在眼何處却逢春龍眼龍眼何年種嗟嗟舊主人卑柯今蔽日腐骨已成塵春雨沾花足秋蟲食實頻流形非木石鬢腳半搔銀始聞秋風作西風中夜起天地始肅清白雁霜前意玄蟬露下聲幽人亦何事版築𥘉經營何時登此閣坐望羅浮征題容氏挽冊中秋悲蹟掃秋思忽依依此夜月還照何年鶴始歸猿啼新宰木巷納舊蓑衣大塊終同爾誰能駐落暉梅花山竹深深徑梅花淺淺塘清冷朝弄影芬馥夜浮香瘦骨交撑月橫稍直過墻啄英終飽德靈鳯或來翔探梅非探梅梅花滿玉臺北風吹盡日踈雪點荒苔色得乾坤正精成造化胎無人知老子剛坐一牛來何處尋梅好羅浮海上春樹環鐡橋盡地與葛仙僯煉藥香生鼎扳崖影落身西湖千頃水未洗往來塵彼美枝頭雪微韜嶺上雲低迷明月寺掩映葛洪墳北海樽䏻倒西湖地索分幽香偷未得衫䄂細氤氲手種梅千樹山寒半欲花歲闌知此意溪上問誰家素豔明爭雪青蘿倒綰蛇還須邵康節來駕白牛車逐客笛聲且莫哀逐客過江隈還到此邉去盡因何事來著書多在篋遇酒輒􅋦杯莫言生意盡寒雨濕枯荄得張主事廷實書千口雖無纍三年不易更春雷轟令問枯木嚼官情長夜鄉心切何時㑹計成登髙望東海到眼是蓬􅌡新凉欺老臂索被過殘更月到思君處書通在客情有家寧免纍作吏轉難成日踏皮鞋破思量舊閬􅌡三口丘園舊離群跡半更幾時重見面中夜獨馳情眠食今何似頭顱尚可成定山名教頂賀老却登羸持燭圭峯寺宵談㒒屢更一為方外友都沒世間情面壁僧猶在栽蓮社未成孤舟破危浪載月下東􅌡次韻寄潘時用文章豪自寄丘壑靜還更久病依人世長貧愜婦情辰婦嶽氏嘗止辰赴秋試人為知巳惜天與後生成更約齊州外從吾泛大􅌡久雨樹隱雲深黑籬崩水亂流凌風快燕子上壁定蝸牛老更憐兒病人多為草憂朝朝稽叔夜誰辦不梳頭用韻寄姜進士仁夫書愛八分小來書喻率更雲霄𥘉接武江海尚留情世事非難料人才怕小成諸賢須汲汲吾老獨觀􅘵用韻寄林緝熙平湖秋懷耿不寐更靜復聞更水向漫漫注心含種種情士應強到底官豈怠將成舊業羅浮外東南望隔􅌡用韻效寒山貧賤耻為拙冨榮常好更髙論古今事中懷名利情堂堂無復見小小或䏻成浪說神仙在從來不住灜四郊多竊盜村裏夜支更為語長官道䏻無患盜情家家愁日暮處處望秋成飢鼯飽倉粟苦海變蓬灜贈劉程鄉別肅菴今又別酒醒問圭峯秋色此溪樹暝煙何處鍾㓛名悲夢蝶文字耻離蟲故里荒墳在㱕來拜一峯病疥用后山韻寫懷癢極肌難忍爬深血有稜老親令就枕小婢問留燈屋漏頻推瓦床搖屢束藤同𫀆誰問疾端愧玉臺僧呻吟不盡痛夕枕傍慈幃安得身長健朝朝見綵衣無膚臀奄赤乍腫臂疑肥睡過西廊月寒空淡不輝缺月生殘夜微風引洞簫心間髮少白人老病難消出戶行看月移舟釣落潮酒錢不挂杖著處解奴腰病枕愁更永籠燈對夜長千年無鮑叔一懶有柴桑兒請栽瓜地妻評作麯方花時呼酒伴酩酊出扶墻贈黎蕭二生别白髮孤燈坐青春二妙來若無天度量爭得聖胚胎至樂終難說真知不著猜濛濛煙雨裏㱕思若為裁野坐團蓋青松午重䄄緑草春野晴鶯得意花盛蝶傷神斷靄生西塢殘潮下暝津竹根酣共卧不覺蘚沾身梅花世傳詠梅句天下共稱竒花有無言妙人間都未知正嗟同賞絶又過半開時安得邵康節為我問庖羲風月交遊淡江山几席間夜深花睡去時有夢來還引步尋香易無心弄影難乾坤留此妙何處覔孤山謝客客舫𥘉辭岸主翁仍在床十年今轉數一飯故難償竹杪風生汗天邉雨送涼所思王叔度嵗晚得同嘗漾漾湖侵岸蕭蕭風引旗問兒打鼓處是客發船時鬻屨時將暮迎門俗久衰秪應巢許輩掩口笑人癡寒雨中作有期久不至旦旦問童奴雨過荆扉濕風回樹葉踈興移剡溪舫詩在灞橋驢風韻今誰繼千年勝事虛喜梁文冠至駐槳梅村夜風光勝早春直知花是路不覺月隨身草木皆知舊江湖多賤貧短蓑來往數等是最間人雨中栽竹心被清虛引非關索竹看檐前才數箇淇上已千竿微雨土𥘉覆北風天正寒昆丘有孤鳯何處啄琅玕楚雲臺呈世卿三杯拈鐡笛見月上瑶臺𥘉弄山石裂再轟仙鶴來夜䦨試靜聽曲罷仍遲回何必楊州去前村多美醅行窩還幾處雲水且吾臺雨腳風吹斷潮頭月湧來野橋牽木度沙徑逐牛回亦有采樵者放歌行負醅有月嚴光瀨無金郭隗臺悠悠百年內又見一人來水檻秋逾好山雲暝欲回相逢各心醉一語浹春醅爽氣通秋服溪流靜晚臺髙樓多自愜真賞復誰來對月詩方妙看山夢始回市沽堪便醉况乃是家醅寄吳明府同世卿逰玉臺圭峯雨𥘉霽䇿馬向松關流泉忽滿澗白雲長在山棄置千般事來投半日間上方襌榻靜坐到暮鍾還生日答吳明府獻臣生日何人記南枝報長官酒香同客醉花少避人看後甲惟元祀浮生又五寒憑軒一長嘯風日滿江山尋梅飲李鴻宅用服周韻今晨風日佳䇿杖去尋梅獨樹山中老危枝石上開時看殘臘盡人望早春來誰解忘情得神功付此杯贈世卿別客路經南嶽湘帆背嶽開江湖間老夢歲月是君來相見兒童喜別離琴瑟哀惟應楚雲外更起望仙臺豈無千日酒花下與君同客思朝臨水㱕旗夜引風一槎當浦口謂莊定山一枕在遼東謂賀克恭何事今為别藤蓑還贈公世卿乞豫藤蓑贈之贈世卿逰山萬丈崑崙頂冥棲憶老關君看白龍水何似黃公山有酒終日醉無官到處閒南風乃何意又送楚舟還朝來生紫氣此地亦函關帽頂花沾雨雲中人下山相逢欲大笑不語是真間晚向東亭醉猶䏻騎馬還世卿將㱕㑹有還鄉意深慙不自量毋留兒作伴妻為客求漿臺榜眀朝旭松堂閉夜涼延緣過殘夏滿意泛瀟湘與君雲水別何夢得啇量合是真調鼎䏻忘老賣漿還山非早計舉棹是秋涼有路通衡嶽無詩弔楚湘贈饒鑑君又去東津東津月送人周遊千里道細問百年身野色淡將暝江桃疑是春丹青如可贈畫我小昆崙梅花草木自有性湖山更乞靈氷霜仙骨瘦桃李世情腥惹䄂香全別和羔子未青未須携鐡笛吹月上湖亭喜何竹窗重過白沙話舊贈之此君為別久不逐衆芳雕白葛身已老青雲郎獨超春風吹細浪落日泛䡖橈楚雲有髙樹未肯挂公瓢憶年四十許公弟立如山行止相料理漁樵共往還餘情空耿耿秋鬢各斑斑不是公憐我清顔誰更攀聞林緝熙𥘉歸自平湖寄之短世淵明醉長愁子美歌髙情誰復爾久別公如何淡月𥘉出浦好風來揚蓑買田滄海上耕亦不須多張地曹寄林縣博用韻答之無心雲自在得意鳥同歌白骨可人醉杜詩古人白骨生青苔如何不飲令心哀蒼生如命何漁樵真有道烟水別傳蓑想見滄𬈑外東南月更多安得李太白樽前同爾歌自從識象岡未始離無何草長逰人路風鳴挂樹蓑東僯古大嫂掩口笑何多和子長民澤論詩寄興羅浮之作飛雲干老夢拉作騁遙臨揮手謝人世聞歌生我心今年春又過何處洞還深相憶山樓暮依依向逺岑再用韻示諸生賢聖低回久千年想一臨希顔非樂道疑孟失求心逸駕行應速寒泉汲務深嘗聞根夲學不盡泰山岑贈李司訓別江門雲水地不絶往來交巳恨栽花晚寧辭抱瓮澆月疑窗下枕風語樹頭瓢精舍明朝別何時還見招再次寫懷孤形將影住一臂與誰交矯矯志欲競栖栖習恐澆江山一得手風月盡㱕瓢始覺逍遙外人間未易招代簡答府尊林先生慶老母生日有母年齡暮逢辰喜懼深多儀安敢却揣分故難任錦假拈香拜仙醅洗􅊦斟獨慙非節孝未了百年心秋坐碧玉樓造次中秋過啇量九日來詩將秋景淡菊共老人開時節陶潜醉江山宋玉哀平生滄海意不受白鷗猜亂不成詩九日嘉會樓登髙引步下前除兒扶杖亦扶㑹于何處勝客有去年無天道常流轉園林又變疏暫留賞今日醉莫看茱茰兼有吟詩病何妨著酒扶景逢佳處少句向覔時無醉去乾坤小醒來伴侣疏今朝嘉會會不盡看茱茰半酣壷矢折又减兩三扶九日江門有千年栗里無山形當晚瘦腳跡向秋疏問我登髙去都忘菊與茰溪邉菊一區溪竹兩相扶草木從吾好風霜殺此無間同九日醉浩笑一生疏試問干雲檜何如小沜茰楚雲臺觀民澤所栽菊寄民澤用昨九日韻時民澤還五羊未返當軒玉朵孤植竹翠莖扶香細風𥘉動神淸俗夲無寒深溪井涸月出山瓢疏何處異鄉客永懷歌茱茰野菊吟寄子長再次野菊生何處尋香杖偶扶孤標猶訝絶佳色舊知無老弄真成獨秋來不作疏金樽誰九日引滿對茱茰吳明府送菊次韻答之黃菊有名花淵明無酒官酒多人自醉花好月同看老未厭人世天教共歲寒未應携不去髙步蓬萊山答周潮州萬里今代潮州守濂溪是一門乾坤吾道在歲月此心存行次天邉路書投海上村夕愁空竚望風雨暗髙原汪巡按見訪嶺南經略地柱史不謀身料理安危事更張文武臣風行光動草寒極正開春傾蓋江樓暮揮杯勸故人寄題小圎岡書屋和民澤韻四野雲飛盡圓岡一室清至虛元受道真隱或逃名有疏微言塞無為大業成一聲聞絶唱五嶽看全輕劉少參見寄次韻奉答西川一杯水為我浣詩塵身落滄溟遠心將翰墨親江樓初見客野徑别藏春十郡停車地千峰擊壤民贈李世卿楚客復歸楚青山此送君往來十年破精力半生分著意當時見留情異代聞若非真有見何處謝浮雲三尺短春蓑山風吹薜蘿人材非管樂吾道本丘軻送老諸名嶽全生一病窩相思憑寄語路打祝融過落日蒼梧望清風發棹謳楚山正西上江水自東流作伴春攜酒談詩月滿舟洞庭看未透更上嶽陽樓題黃公釣臺小小離人意羊裘却未工今人多白眼為我謝黃公弄釣浮沉見登庖撥刺空浩歌泉石裏况有古人風曉枕示湛雨龔曰髙二千六百丈腳底是飛雲悠悠四十年欲往念徒勤多謝紅藤子扶吾還數君鐡橋問何如見景勝于閒萬年如一瞬莫問我浮生風雨將秋至山河載月明語簷幽鳥樂對竹小童清夜夜湘江夢與君何日行雨和曉枕寄廷實仰見雙白鶴髙飛入紫雲茍無脫俗意安用看山勤好句能傳我幽期敢後君異時鐡橋詠莫遣世人聞萬往皆有復左車不復生西風今夜起朗月四山明天馬非常步鐡橋相伴清去去莫復顧衡山頂上行曉枕再和平生老黃石引望空白雲無人知感激為我盡殷勤何處尋吾契名山訪道君洞天三十六步步聲相聞外生即非死胡為樂久生去來大化內俗眼未分明我夀元無極君才亦太清五峯南斗上何日踏歌行中秋平樓時穩步身虛欲翩翩明日秋始半中天月最圎武昌書未返督府句堪傳衡嶽那䏻去羅浮何處煙廣寞天自然浮雲任飄翩隨時有憂樂與物無方圎酒底月未咽水中神莫傳去年今夜艇吾欲破湘煙彭司寇挽詞男子固多竒如公更不疑經綸思昔日㓛業問當時鬼幸村巫小棋還國手知杜陵秋月下興盡八哀詩侃侃亦誾誾行違榜要津鳥還江上暝人老世間春祿盡休言命愁多不為親武夷最髙處東望一沾巾斗氣空遺劍牀燈不照琴春懷不自得老病忽相尋事往浮雲夢山餘宿草心平生孺子意絮酒一何深題雲津書院泰和劉氏雲津杳何許試向卷中尋不覩六經教空餘百代心嵩陽思識靣白鹿尚遺音家有鴛鴦譜何須更問針春日寫懷水際尋芳去花枝隔水新可憐今日望不是向來人紫䄂垂垂下黃鸝樹樹春東風天外至南嶽夢中身一觴復一曲不覺夕陽殘好景我只醉春風人未間青紅今滿路風日未登山何如海中鳥鼓翅蓬萊間贈周文都君行無日矣奈此別離何道逺書難寄年衰病更多行行慎自愛浩浩不同波若見東山丈微言共琢磨贈黃希顔春試北風雨如注是底別離時黃色眉端動青雲足下馳兒童酣世豢國士醒心期去去江流疾還君一贈詩詩罷懷白洲先生山東無近耗白洲時為山東左方伯海上立斜暉童子覔牛去漁翁罷釣㱕登舟人欲別周文都赴㑹試將行見月鳥還飛何限相思意千峯獨掩扉贈丁一桂初日照甘棠千門一炷香南風催返棹西望欲沾裳有廟旌遺愛無金㱕故鄉未知忠定者先請問崇陽奉寄筠巢翁昔別筠巢叟如今是幾年華巔將望百碧玉屢添年寥寥千古下望望五峯前何日扶溪棹還來別老仙鄧御史公輔寄新刻陳君舉論孟古義復以是詩兩漢非三代人才逐世低市朝多畫虎文字笑醯雞古義昭昭對終篇短短題不因歐六一爭得見昌黎張綱漢廷張御史何事便埋輪欲作千年計都忘一個身堂堂見意氣默默愧經綸却恨程明道丹青失寫真吳節婦江山逢此㑹真地作光輝路轉扶溪北山來越嶺西春光流聖澤明月照霜帷碧玉遙相賀雲中卧賦詩汪海北訃至西所今亡矣皇穹肯不仁眼中還見此天下豈無人海闊