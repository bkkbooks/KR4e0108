front:
  text: 白沙子卷之六
  hash: sha256:ded078268b3fb5d6728b9ebc6730e7ccf8bbd706be4cb162da3ab0e724f87420
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0108_SBCK_006-1a}
body:
  text: 七言絶句戊午秋開化吾廷介縣博校文於我省念太夫人𥘉度之辰在十月八日撤棘之後幸公程之便趍歸爲夀詩以送之髙下元從脚板分江山冨貴㡬般人吾家子弟官情薄欲把行蔵夀老親題伍光宇碑隂㡬年滄海一碑成身後何須嘆不平天遣老兄生少子千秋寒食祭公茔兄伯饒近生一子爲伍光宇後喜黄在登科半醒半醉一儒巾黄卷青燈二十春晚醉鹿鳴君莫訝龍頭還属老成人龍頭還属老成人夜半雷聲已變春莫爲晨昏留不去安車扶上白頭親在有老毋在堂故云安車扶上白頭親徐積當年也爲貧憶昨扁舟淮上路青山吾拜墓中人題松雪圖元時有個趙松雪松雪于今又属誰一幅丹青一瓢酒廖公來乞老夫詩半江十詠爲謝徳明賦江湖城市氣交吞誰放蘭舟繋栁根肯與漁翁通水界白頭破浪在江門獨速溪邊舞短蓑月明醉影共婆娑手中握得桐江線釣破江天不要多水面煙濃白鳥低數峯青鎻夕陽西隔波莫是仙源否恰到波心路已迷隔波晴色裊孤烟萬樹桃花錦一川夜半天風吹海立探花人在半江船水到江心五百弓白鷗雙起雁孤衝竹篙點碎菰蒲月如此風光我共公畫𥿄𫾣針一杜詩水生花落两天機西風捲市塵髙起也到江心不觧飛溪槎汎汎月中眠横占波間一半天何許少年三五軰夜深僯舫呌攤錢碧海雲深鶴夢勞人間無地著盧敖不知若士曽來否試向波心問小舠醉則髙歌醒復悲老仙那有獨醒時江間碧浪三千頃都與囬公入酒巵半江秋水映斜陽㡬個神仙坐水旁酒是逡廵花頃刻一尊韓愈對韓湘經陳氏家廟牡蠣墻髙一廟深縁岡松栢晝隂隂我家爼豆茅茨下只少黄金不少心題萬松庵璧昔年曽賦萬松軒一飯松根有俗縁旋摘黄花傳白酒真成東老對囬仙過東涌周貢士抱乳児乆住出迓郷曲論交大父餘耳根狼藉病翁書小兒莫道無靈性也傍寒塘望笋輿經曝日䑓周鎬所築鎬亡無子止一女何處猿聲更㫁腸夜聞孤女哭凄􅋽淚㾗滴著䑓旁樹縦到春風亦少芳寄袁腪林敬頗憶江湖林子翼小齋留飯更袁暉人心人面人人異賢軰如前共飯時南州香櫃乆流傳亦賣東湖草屨錢莫共諸賢理鉛槧只治香櫃過年年暉治香櫃自給近爲社學師矣歲首詩緘寄早梅路傍先倩秉之開而今两眼西風淚誰觧傳聲到夜䑓若道鴟夷觧了心五湖何用更千金魯連長揖平原去風月無邊碧海深林緝熈縣博張廷實進士何孝子子完先後見訪既而緝熈徃平湖廷實歸五羊子完還博羅因賦四絶春水江門一葉舟㡬人來此看垂鈎浮雲一散無踪跡飛盡桃花江水流昨夜江門把春酒滿舩明月唱陽関五羊城中消息㫁君去東吳㡬日還四百峯頭白鶴知老夫八月有幽期爾家正在羅浮下莫向春風怨别離長髯遺我一囊山鐡橋流水非人間我今决䇿山中去踏㫁鐡橋無路還夢逰天台路入天台第八重洞門剛與赤城通脚根點到虹橋下一笑那知是夢中伍伯饒送蜂窠至用韻荅之獨憐溪竹隠花叢待得南山後到蜂昔日徃來凾谷口如今只用一丸封晚蜂隊隊過山房何䖏歸來嘴脚香辛苦奉君臣子分可堪奴軰日偷甞賽蘭花開晴光三日轉花枝坐對㣲馨忽有詩㳙滴未嘗花上露南風莫只報人知曲欄砌下少人窺戯蝶逰蜂忽滿枝君欲㝷花須早計只今猶是未開時㣲風巾袂細氤氲楚畹叢中别有春啜茗亦嫌風景殺明朝載酒是何人山花豔豔綴旒傍君愛深紅愛淺黄楚客見之揮不去向人說是賽蘭香次韻南山送蜜萬古西山杇骨叢中有䰟魄化爲蜂餓死空窼不飛去猶爲君王守故封寒花索寞不成叢口腹吾慙入臘蜂覔蜜嬌児啼夜半未成新醸又開封知從何䖏宿花叢清暁飛來又㡬蜂定有香魂招不返逺尋芳氣落花封䖏䖏山花好蜜房絪緼岩壑爲誰香相思道逺無由寄此味年來只獨嘗戯贈館賔松風和雨洒柴関過午雕胡飯始飡今日華卿休怪訝徃年飢䑕囓陳山嘗舘白沙讀林進士信冝祭母墓文淚血今朝灑鳯山鳯山元只在人間非関旅殯無㝷䖏不與皇華共載還天涯四尺不封墳一去鳯山三十春莫辭更向山前問恐有漁樵是異人袁侍御道龍川訃至何處龍川去不歸山南山北雨雲飛晚風晴捲三千尺好與歌筵作舞衣憶昔青陽動海濵隔年草木預知春如今行路無顔色盡是青陽去後人次韻栁渡頭荅鄊友溪南溪北荔枝垂五月荷花欲捲旗忽有酒船邀半路三杯不記主人誰飯罷雕胡坐石磯白雲閑與鶴同飛神仙若道吾無分那得身輕减帶圍題林進士廷玉継毋陳氏挽卷廷玉㓜折嗜醤薑其母毎求扵旁舎給之與兒醤薑兒勿號前毋生之後毋勞大統岡頭寒食酒一杯和涙洒香茅五月菊露飲霜飡不記秋黄花三昧室中求區區形色多相似争得先生爲點頭小變春紅作淡粧山亭𥘉見一枝黄醉中忽眩東籬眼起視金錢著屐忙二頃南風秫正青督郵未到長官亭眼前雖有黄花在不與陶公管醉醒題梁景行天壷書屋打土編茅費㡬錢白雲深夜一燈懸知君未是壷山主只借壷山過两年虀粥朝朝長白寺衣冠夜夜百原山三年枕席何曽設一𥿄家書亦不看元夕村南村北此宵同好景難消一老翁在䖏恐妨年少樂踏歌歸去月明中正月菊春到東籬花亦知紅桃白李更當時東風自領芳菲去也爲秋香作意吹廬阜髙歌九日杯盡将秋意放花開誰敎也向東風裏點破千紅萬紫堆次韻吾縣博别後見寄聖賢生䖏是中華何䖏天涯何䖏家夫君認得幽棲處江門月底釣魚槎昨夜江門詠月歸今朝又領衡山詩千仞岡頭一振衣乃見廬岡點化機題一峯遺墨後何知卷穆穆熈熈在眼中君家卷裏忽相逢蒼煙緑樹湖西路何䖏金牛吊一峯何生告還新喻因憶希仁先生平生故人不相見十有六年悵然有作附生它日見之爲我道之忽忽人間十六年與公信息两茫然不知今日江門路還到湖西是㡬千淵明愛菊白衣剛到黄花下醒長官爲醉長官社裏新知僧酒主門前髙枕石蒲團和靖愛梅懊惱梅花未有詩孤山馬上又攅眉後人拈岀前人句作者元來自不知茂叔愛蓮不枝不蔓體本具外直中通用乃神我即蓮花花即我如公方是愛蓮人潘岳愛桃潘郎夲自愛桃花種向河陽㡬萬家世有長官如孟子還除花地付桑􅏘廢宅逢梅花間無主竹籬空小徑斜穿曲巷通頼是暗香䏻不息短笻破㡌得相逢與客夜飲撃節歌聲未岀門照書燈火巳眠尊老妻喚醒蒲團夢更與殷勤煮菜根辭徴文者平生語黙鬼神知破戒随人老可媸三日褁糧無此客手携空卷下堦遲崔潜送菊坡先生遺像至適郷人送紫菊一株遂以荅之髙風千古鎮浮華儗酌寒泉薦菊花江上一株紅帶雨丹青同日到山家舫子此身天地一虚舟何處江山不自由六十一來南海上買船吹笛共児謀木犀暁枕東窓睡不來木犀造次隔籬開阿田小孫名也拍手黄鸝到冩盡春風得意杯東風披拂滿林塘脚債東山也未償捫虱不禁春意動日華𥘉吐木犀香茗碗朝朝怕侍児采花莫采稱心枝床敷愛就東窓暖分付東風敵面吹人間花草闘春肥粉蝶黄鶯接翅飛也愛白頭肝肺好木犀墻下嚥朝暉名花得見太平年擊壤聲髙壓管絃化日熈熈春蕩蕩華夷何䖏不同天白頭無酒不成狂典盡春衫醉一塲只許木犀知此意晩風更爲盡情香書易隠求銘旌後感而有作一題八字八低囬滿眼淒涼筆下來春社去年人不見茅簷燕子又飛囬山林交分晩相投詩在寒江紫菊舟君去落英還對我獨吟春雨㸔江流半雨半晴鶯亂啼溪邊丈人還杖藜不見舊時逰走伴白頭衝雨更衝泥移海棠花小朶輕紅帶雨香柔條深翠引風長道人不是看花客肯把墻隈借海棠暁飲忽醉擁禪衣坐睡三杯過卯得瞢騰坐擁禪衣問殺更下砌握刀山竹冗開門負水海棠生弄筆白日一醒塵土夢青山誰計髑髏春時當可出寜須我道不虚行只在人弄水忘歸真洒脫㸔山扶歩小逡巡等閑未許丹青手搭颯平生畫此巾鴝鵒育雛于貞節堂東壁壁髙且危二雛堕地下乃􅈬而哺之悲鳴徬徨如在無人之境予憐之取雛納之巢紀以是作将雛無力上榱題聲㫁殘陽翅忽低髙棟托身君亦悞鷦鷯安稳只卑棲海鷗來徃未忘機鴝鵒能言掠砌飛毋去巢危雛落盡㗸䖝巢畔待雛歸江上遲遲春日滿花枝江上群児弄影時漁翁睡足船頭坐笑卷圎荷當酒巵有懐故友張兼素穆穆熈熈只此風今人未見古誰同意中我了牛醫子且放山齋水墨中長安風雨閉門間陌上浮雲沒馬鞍從此江西人勿論夫君髙只比廬山萬里長安看我病夜闌两馬出携燈如今只有西涯在宿草江邊露滿茔何宇新赴南亰來白沙告别云此行且復見定山時秋已盡矣以詩送之孝子已爲人所稱世間留者乃何情故郷莫作多時别阿母墳頭草又生浦口柴扉㡬日開江門煙艇暮秋囬交情亦似長江水南北年年送徃來閱光宇傳光風艇尋折樂齋白沙讀書所今廢光宇長于予病齁毎疾作使一童倚背拉之便起衣冠坐習静忘其病也君艇君齋古所呼忘年忘病舜之徒莫言外史無憑㨿曽見當時拉背奴戯題顧進士瓊林晏圖黄屋門前緩轡行上林花映賜衣明恠來老眼糢糊甚道是㝷春杜少陵梅花湖上詩仙骨已塵江門半樹復撩人携田拉畹朝朝去江上田家秫酒新雲隔溪扉水隔塵梅花留月月留人江門半醉踏歌去紗㡌籠頭白髪新春風䖏䖏馬蹄塵岸北花神冷笑人二十四畨紅紫醉一畨零落一畨新馬蹄懶踏六街塵閑憶當年拄頰人江海衣冠零落盡梅花還對白頭新精神交月不交塵看到黄昏故可人拈出孤山難状䖏一年詩債又從新桃李安䏻踵後塵玉妃全是耐寒人瘦笻拄破梅村月要看南枝出格新梅塢風髙不起塵短笻聊立探花人山塘水淺時窺影喜與年光不闘新風逓㣲香洗渇塵獨行山路不逢人梅花歲歲還依舊只看何人著句新詩思梅花两絶塵破窓殘月夜窺人明朝走馬東西去壁上空留醉墨新雪崖江畔杳香塵天與孤髙逺俗人不忘滄波别時意一枝還遣到圖新次韻廷實進士送倫長官出逰我夣名山爲點頭名山到處是真逰床頭買酒黄金盡那向長江更買舟新年田家古田同井今同村同坐杯盤到子孫合是田家愛元日白頭拄杖拜人門麥秀夫於城南小渚中累土結茅居之容一之馬伯幹取酒共醉桃花下各賦詩爲樂秀夫謁余同作附其韻春光淡蕩桃花潯絶岸囬風落碎金一路潺湲煙鎻㫁無人知道此溪深川練縈紆島上花世間遥望赤城霞仙源不比凾関路老子來時坐一槎我夢桃花何處潯水清蘋白一籬金羙人家住紅雲島欲徃從之江水深手拄藤枝鬂挿花夜收沆瀣暁飡霞貴人已隔門前水野老還通月下槎紅白花開緑渚潯風光買我不論金輞川不借閑人㸔只愛詩家著語深漠漠春煙淡淡花竹邊孤嶼閣飛霞春江水滿秋江水更著新槎換舊槎安期只在海東潯何處名山浪鑄金欲向桃花問消息柴門深鎻碧溪深武陵春盡水流花洗却耶溪十丈霞晝坐竹根看未足滿簑明月夜縈槎東潯披卷盡西潯海月秋連萬頃金卷裏我䏻題百首溪篷斟酒莫辭深閉門春雨可憐花誰共花前傾紫霞但放此杯深似海囬公肚裏得横槎得倫長官詩疑其果於逰而未可以逰次韻復之一百青錢觧杖頭罇中有酒勝閑逰門前春浪髙於屋莫向長江弄破舟短檠細字冩蝿頭衰老而今尚好逰何處與君談半偈玉䑓留作濟人舟贈張進士入亰五年不岀獨何心萬里行囊又一琴難冩别離今日意江門春水不如深有心誰莫弄児嬉孔老枝條我亦知風日小塘君不顧竹林藤簟自皇羲䏻将糟粕委諸書影響人間不受驅五百年中名世岀先王政敎果何如津頭日暮送夫君别意那堪更遣聞芳樹鳥鳴山雨過柴門空閉一溪雲玉䑓居士玉䑓眠碧海三山病枕前君欲有爲休問我白頭世事已茫然㑹餘湯餅欲春䦨徃即公程亦不難不獨有官兼有子老親羸得一開顔南風吹上石門舟又到西華寺裏逰記得聮舟此相送而今空有雪盈頭昔曽寄住長安寺潦倒滄𬈑夢不囬何處思君還有夢青山斜日兩徘徊次韻東所送薑酒寧知生蚤與生遲真鳯真麟出以時何䖏氤氲薑酒氣香風吹入野人巵病起朝天果未遲岀門剛遇鳯來時两山居士何如喜一飲從敎累百巵與廷實看李世卿題竹來㸔竹上舊題名已有清風挹世卿夭矯龍蛇不堪捕安知不是野狐精題熊氏桐軒湖海逢君四十年破琴殘韻尙依然棹歌夲是閩南調傳到于今更不傳桐軒云是勿軒孫何䖏江湖何處村古錦嚢中風韻在㡬時彈向白沙門飲馬氏園贈童子馬國馨日轉芭蕉䨥竇鳴飛飛蜂蝶喜新晴衰翁醉卧溪園裏一曲春牛和國馨六歲䏻誦予春牛之句白髮跏趺溪樹根還從地主見諸孫醉中自唱漁家傲撃碎花邊老瓦盆喜晴西林收雨鵓鳩靈卷𬒳開窓對暁晴風日醉花花醉鳥竹門啼過两三聲得沈大叅時暘漳州發來書荅之前後題緘两度收春風無雁到漳州青燈一榻南都夢囬首于今二十秋悼舊里中興没一浮雲六十年中㡬度聞只恨墳荒無祭掃前村更有未封墳何潜死踰十年并其母皆未塟馬文祥寄五氣朝元罏至隠者年來少在山白雲㡬片落人間玉䑓小徑蓬蒿底吾對吾罏盡日閑人間葷血共歡娛誰作朝元五氣罏自汲山泉煮春茗不留俗客炰江魚合是神仙太乙爐旁通五竅似連珠如何水火收㓛用去問劉安下手𥘉眼前詩景浩相撩何處丹爐火又消莫笑道人歸未得秋風雲路㡬扶揺五月二十六雨民謂二十五六七日有雨主豊時雨時暘歌帝力今年今雨卜年豊路旁酒價知天道何處醉郷眠此翁六月一日不雨民謂此日有雨主旱窓眼隂晴暁未分一年憂樂稍相㝷山林自慣清凉極且放今朝到鑠金圖新書舎中植蕉數夲璧間李世卿題句潮州饒鑑至讀之有所興起勉以小詩一寸芳心卷却春竹枝遺響落圖新潮州客子来何暮還對芭蕉索楚人贈梁景行赴春闈宗烈平生讀書處老夫題作小壼山壼山不觧留君住君著壼山夢裏㸔夢亡友袁徳純侍御再試冝興割鷄手置之栢府公巖巖如何不返龍川駕遺恨千年在嶺南自别君來十九秋江門暮雨忽相投當時呼酒留君語却到如今羡海鷗周侍御文化将訪白沙阻風江上連日以詩迓之長風不打畫船囬更爲山靈掃玉䑓走馬城中具茶果青天白日繡衣來積雨是日得大霽将晴積雨此何時我病山中乆不知騘馬今朝在何處江邊人吏望旌旗昔者吾聞周柱史青牛紫氣出凾関有心來鼓南𬈑柁信息朝來已到山懐胡大叅希仁魯連謝去都無事范蠡歸來未了心三十餘年竆學道而今方識古人深先生齒髮今如何我髮秋來白又多若與先生論出處江門只好聴漁歌梅下雜詩虚名每𬒳詩家賣素艶常遭俗眼開向人間非得計移根天上白龍池向暖南枝已播詩北枝向冷尚遲遲肩輿欲過江門去争得春風剪拂之梅花信是菊花傳賞到梅花又一年處士豈非詩俊傑長官元是酒神仙題瑞鵲卷序云成化九年余𬒳薦入亰過江浦訪孔暘荘先生先生送予楊州偕行至六合縣經宿而去當是時周君文化令六合有聲後八年荘先生病猶卧家予乞終養歸侍下亦衰且老周君以監察御史按治吾廣過寒舎道舊於是周君舉荘先生昔者所爲賦瑞鵲詩俾予和之瑞鵲多年我眼中笑烹牛鼎夜燈同如今栢府開詩卷還對樽前两病翁贈化州守鄭順觧官歸湖上鴟夷乆買舟清風明月㡬冝休未知進退存亡事只問歸來鄭化州贈羅梁還程郷一峯諸子在通家生死交情俗可嗟泉壤有知開口笑江門來共看梅花飛岀一㠶何處風道人眠䖏玉䑓東春光一路相随去朝雨渡頭花欲紅世道如今覺我非衝寒猶肯到柴扉江門春酒無多少須勸羅生一醉歸翩翩雙屨一長笻意氣憑凌四百峯肯向程郷晋一載長官真好主人翁一客三旬住玉䑓梅花正傍玉䑓開客心暗與梅花契去到明年臘又來蓬島煙霞圖贈羅定直一峯先生之子也丹青誰弄煙霞筆題贈湖西公子行携過羅浮莫開看羅浮怕有異人争輓林别駕汝和昔歲逢君郭隗䑓揚眉撫劍泰山摧紛紛白眼輕豪俊只有余公觧愛才别駕一城聊塞北短檠諸子自江南平生抱負何由見塚上銘詩仔細叅赤江經雨草淒淒山北山南路欲迷怕到使君投轄䖏黒雲堆壠鷓鴣啼有時江畔倚秋藤裊裊如聞撃楫聲春色眼前人不見江花江水緫含情大田看山春泥没屐大田潮溪北𥘉經獨木橋千丈峯頭望東海三山正對杖頭瓢縣取脚色蕭蕭白髮映春漪脚色年來自不知滿眼江山難具報只将年月載公移炒蜆憶世卿蜆酒三鍾一曲歌江邊長䄂舞婆娑如今歌舞人何䖏慙愧春鐺蜆子多奴拾枯枝給早炊鐺中風味此奴知春風觧憶江門否正是江門蜆賤時雨中澷興種桃之歲在單閼種竹如今又㡬年竹長桃枯人老去釣船春雨日髙眠急起翩翩白鶴雙黒雲将雨欲迷江人間未有髙棲地何處深山著老龎問厚郭胡父子起居於其郷人蘇居僯厚郭一鷄飛桂樹于今大㡬圍老憶舊時燈火伴青山何處望霏㣲讀宛陵先生歷覧昔賢皆泯泯尋思魯叟自波波几上凝塵封玉軫南風不入琵琶引仲由言志夫子哂當泯泯時須泯泯著漁蓑了唱漁歌受制江山老奈何溪上女児閑抹鬂東㕓西市走波波泯泯波波世與身都官两語到頭真後生更把遺詩笑公亦人間半醉人波波泯泯不同時静乆無憂動輙疑聖人坐北吾曹逸天下蒼生怨望伊次韻羅明仲先生見寄白頭一枕小廬山偶寄孤松十竹間朝市山林俱有事今人忙處古人閑髙軒頻過武夷山曽聴仙歌九曲間坡公莫𬒳山僧笑只得今朝半日閑誰輕朱􅌧愛青山囬首波波泯泯間萬籟無聲天宇静先生還似野夫閑三月啼鸎正滿山傍花随栁水雲間古來曽點稱如許不是天公不放閑武夷碧水照丹山按部時還到彼間東坡也𬒳山僧笑只得今朝一日閑偶閱岳季方題啇山四皓圖次韻道竆夫子不東周歷世紛紛講智謀四老若将三傑比真成飲水勝封侯水墨誰将畫此圖山人搔首看盧胡花水諸峯流落盡白雲猶爲隱屠蘇虎困龍疲戰两間孤標千丈起啇顔不将老眼看人世肯爲留侯誤出山定惠安劉理不難紫芝歌巳動長安試将脚色從頭㸔髙祖如何敢溺冠閱周溪圖作贈劉景林歸呈尊甫翁肅庵程郷令太極無堦不可躋却從樓上望周溪周溪書院在太極之南旁夾两樓天泉井名在書院两旁十丈無人汲雲谷亭名在太極之東崦老翁來杖梨月色溪光盪两楹酒醒開眼得蓬灜試問老仙誰接引舂陵雲谷两先生两仙何處舞霓裳天上人間思渺茫脚底飛雲三萬丈随君不得到程郷月下溪邊逐影行還聞何處㵼溪聲扶君直到源頭看七尺芙蓉贈一莖丁明府置荘肅二節婦祭田邑人訟而奪之歲月人間豈待深等閑興廢逓相㝷秪應節婦墳頭月還照當年茂宰心贈晋江掌敎陳昌期赴任身爲五典三綱主官作司徒典樂看敎授蘇胡元有様莫将資級小儒官村晩漁笛狂吹失舊腔采菱日暮闘歌長老夫獨面東𬈑坐月上孤琴未觧囊對菊溪遶廬岡宅遶沙眼前酒伴眼前花登髙此地從頭記三十六囬無孟嘉因花催酒酒催詩詩酒平生兩不虧秋到若無詩與酒㸔花元似不曾知菊逕旁通水背村秋光蕩漾短籬門與儂别様何粧點笑挿金英滿鬢根映山映水两三叢移上山亭愛殺儂千古冷香吹不㫁長官頭上㡌簷風籬前水色映花光來坐漁竿弄晚芳西北酒姬觧人意問人沽酒壓糟嘗代簡荅呉撫州次定山韻何許蒼生望不休翩翩皂盖擁諸侯定山也未忘情在更把黄州贈撫州送子長逰玉䑓兼懐林緝熈張廷實十里崖雲古色黄白龍髙映玉䑓光山僧莫信閑饒舌那得神仙此䖏蔵山肯留人月肯晋好山好月好人逰誰還望見羅浮影疑殺平湖五字謳緝熈逰圭峯詩云是箇小羅浮來時𬈑涬許同科曾聴圭峯踏月歌今日君騎地官馬白雲招手奈君何贈袁暉用林時嘉韻白首㸔雲共此䑓青山明月小遲囬何時得見春風面更到明年二月來風雨相留更晚䑓邊爐煮蟹餞君囬扁舟夜鼓寒潮柁又是江門一度來植竹爲垣土作䑓野橋分路到溪囬江門若比瞿塘水何䖏逰人肯上來青山依舊鎻溪䑓前度逰人去不囬頼是山人無訴牒有人真夲賣山來冬至日示袁暉用前韻靣璧山人不下䑓老隂消盡少陽囬白雲影静千峯裏紫菊香騰十丈來袁暉乆在白沙候容貫不至以詩來和之冷雨淒風寄我䑓香林草屋夢空囬山中酒伴何曽見水上詩瓢只謾來擬扵精舎旁結小庵以䖏袁暉精舎巖西擬一䑓松髙竹宻路斜囬草庵半属袁郎了好帶茶園一櫃來次韻贈胡地曹梅塢傳觴是偶同小桃催放數花紅人間愛見春風面天上還㸔斗柄東今雨到門君又同四人對飲夜罏紅眼前莫道東𬈑逺我欲乗槎更向東荅蔣方伯筆下横斜醉始多茅籠飛岀右軍窩如何更作山隂夢數𥿄換公雙白鵝得蕭文明寄自作草書至草聖留情累十春熈熈穆穆果何人如今到處張東海除是譚生觧識真魏晋名家是一關前驅黄米未知還却疑醉點風花句四海于今㡬定山束茅十丈掃羅浮髙榜飛雲海若愁何䖏約君同洗硯月殘霜冷鐡橋秋送柑荅之遺我紅柑索我歌狂歌不飲奈柑何大崖山下無人寄日盡千瓢舞破蓑大崖世卿讀書處也雙鳯石在七星岩其一爲好事者取去族子冕以書來索題雙鳯巖棲豈逺而玉䑓西望斗光垂蓬萊水闊無因到願借山人一隻騎鬼鑿寒巖萬丈開翩翩雙鳯忽飛來而今石化孤鵉在何處人間去不囬龍山吟次韻陳冕龍山氣魄小終南行者何年住此庵黄雲道人飛两脚也到白龍天際巖何䖏龍山吊古墳忽傳佳句到黄雲始知佛是西方我報荅人間父母恩老柱髙擎何處天滴醯洗蘚認當年山僧猶話飛來日撞破龍山一道煙第一山人俗姓盧脚踭塗字也碑趺寺旁老塔依然是却道乹坤種種無浮生日月易消磨囬首龍山月一阿想得當時盧行者笑人乂手縛諸魔風雨江門罷晚墟隔船燈火夜呼盧驚囬一覺龍山夢閑對雲僧講地圖次韻蘇伯誠吉士魯水何剛愛一沂江門新浴試新衣長風夜卷殘雲去公抱大江明月歸我浴江門點浴沂藤蓑自様製春衣㝷常只著藤蓑去細雨斜風釣不歸喜楊敷至笠影于今落海潮十年雲水夢相撩一雙我辦雲卿屨萬丈携君訪鐡橋新年試筆舎下水生春水開竹間波弄碧洄洄東風日日江門道不盡官船打鼓來對影風月情貞詩浩蕩江湖水濶蓑飄翩丹青不是江門影又畫瞿曇又畫仙雨中偶得髙浪張燈何處舡客邊風雨夜如年行人自有明朝路莫遣隂晴不属天題陶憲長畫唐詩圖詩中是畫畫中詩晴雪孤舟蕩晩暉同在五湖煙景内是鴟夷不是鴟夷雨後觀園二月平原水亂流㣲茫生意盎𥘉浮黄茅翠甲驚人眼是我曽無爲草憂僉憲莆陽李公自海南征黎過白沙蛇窟縦横木短弓霜風何處捲飛篷清時欲獻征黎頌血刄猶誇甲胃雄飲名酒徐孺眼欺湖水碧龎公心死鹿門深尊前水月千千頃手上絲綸萬萬㝷觀競渡快意深時恨亦深干戈何處不相㝷誰将五月龍舟水盡洗中原虎闘心贈茶園何視履翁讀易溪邊日巳斜晚風吹落釣魚槎江門水月真無限也照先生㡌頂花題王廷直畫曲肱帯酒眠花間有月穿松到我前人去華山今巳乆丹青猶畫在山年贈李若虚憲副欲别未别情難吐白龍雨過黄雲暮莫辭冩盡金盤露明日玉䑓君不顧次韻李憲副若虚見憶此蓑烟月此溪心隔水樵歌盡好音若向東湖傾此意先生真個似儂深贈畫師髙枕松根不記秋秋來春去㡬時休山中此夢公䏻畫我有黄金贈一舟次韻馬廣重過白沙緑榕隂裏早秋天又借漁翁半日眠三度槁梧携過此如今不記是何年隂晴十里不同天獨樹溪邊看雨眠何處引杯歸未得相思真有日如年葵山小睡次韻謝天錫閒到忘閒始是閒閒中消得㡬葵山曲肱枕㫁踈桐影夢遶白龍池上還無心可比白雲閒白雲𬒳風吹出山道人肯比桃花水流向人間更不還送劉程郷逰玉䑓春草揚敷曽醉處秋風又拂長官衣黄雲不是棲賢地纔到黄雲便說歸葵山受諸持齋者拜戯作示之山花山鳥共諧嬉山石危横歩不知笑領頭陀稱老宿真成老子是嬰児次韻張别駕古勞望白龍池一泓何處㵼天池泡沬君看水靣漦若對崑崙修缺典數篇休欠白龍詩睡起天地蜉蝣共始終十年痴卧一無竆道人試畫無窮看月在西巖日在東候方伯東山劉先生㡬䖏龍光發夜凾畫船信息滿東南津頭小吏􅎋勤報坐爇爐香月底庵贈夏進士昇春日春風江漾沙官船不發對山家山杯一舉山翁醉笑點青藜數岸花顧别駕欲人以號稱不以官口號取笑别乗官髙上元簿夫君英氣盖東南何須不學程明道只要人稱顧勉庵書稱顧别駕勉庵别駕詩以博笑勉庵别駕今相随書法兼之盖亦冝若道是名皆外物因君分别却生疑顧别駕來敎民板築復以詩見示次韻奉荅斛板親傳易簡方旁觀點點復行行無人不拜先生賜茅屋家家是土墻莆中呼板築之具曰斛板宿雲卧軒世間何喜復何悲風雨蕭蕭過短籬小睡正酣童子問公今是夢是醒時不妨到處與人群借宿山齋酒半醺我得五龍傳睡法枕㾗猶帶華山雲了無意緒向諸縁到處茅椒可借眠白日與人同在夢不應疑我是神仙讀漳州張太守㓛徳碑罷守三州卧两山漳州面目此碑間郡人欲識蒙庵老也傍斯文捉一斑次韻黄澤飲酒見寄南山北山花笑人有酒不肯延佳賔請君試向西園看又减黄鸝一半春拚飲如何更問人樽前不見李元賔晨朝有酒晨朝醉莫待黄昏老却春謁鄧家山墓擲谷鸎聲向此沉遶墳春色爲誰深𥿄錢灰冷桐花落已𬒳愁風捲到心送扇與萬松庵山中團扇織朱藤小把還誇入手䡖見說髙齋蚊嘴赤夜深來擈老先生次韻劉方伯東山見寄一爲雷雨沛西東十郡民歸岳伯㓛我有江門水千頃春來只好浴鳬翁松隱輓詩薛㢘憲父也清静忘機樂未休水風何處弄浮漚典刑今在山頭月曽照踈松枕畔秋送薛㢘憲江門江上看雲獨送君廬山雲亦華山雲觧衣半餉雲中坐纔出雲來路又分無端聲色謝盲聾多少人心弊弊中萬里青天今日送江門津口一㠶風東山於我問漁磯君見東山詠我詩莫共越人謀岀處直夫先謝外䑓歸東山劉時雍也陳壯字直夫江西僉事山隂人謝東山惠廣西酒月下花前舞影欹桂江酒羙獨斟時眼前莫道都忘却也向東山有報詩李評事題其弟世卿詩卷曰采菊盖取予贈世卿古詩首句語名之因題是䖏江山有釣蓑相逢休要問如何閑吹黄鶴樓前笛即是廬山采菊歌次韻世卿再至白沙脚底白雲無定方風流到處賀知章這囬却是無人見走共漁翁酒䖏蔵茂卿評事惠扇荅之時世卿在舘中逺望不見大崖山君家兄弟果皆難不知風動今多少也到先生掌握間度楚雲䑓前小橋一木欲度溪岸髙江門丈人放歩牢脚底太行開㡬片秋風随處灑鴻毛用前韻荅張直兄弟助修楚雲䑓託契青蓮意便髙千秋分付此䑓牢先生醉拍藜床笑笑殺楊朱靳一毛偕一之世卿詣楚雲䑓偶作呈世卿小立三人静楚雲水田漠漠向秋分千峯笑指來時路黄鶴樓前月是君半牀明月半牀雲光景行窩到㡬分眼角東𬈑秋一片邵堯夫也不如君代簡奉寄饒平丘明府何䖏思君獨舉杯江門薄暮釣船囬風吹不盡寒蓑月影過松梢十丈來寄廷實制中東閣摩挲舊雨琴青山囬首又秋深制中面目今何似折盡寒燈半夜心聞黄澤發觧笑領秋風第一花文章誰敢謗飛沙狂歌欲買花前醉不怕無錢付酒家和林子逢至白沙一様春風㡬様花乹坤分付各生涯如今着我滄江上只有秋香擈釣槎秋夜楚雲䑓小集贈俞溥新秋有客來信豊風月此杯聊此同江山闊幅無人話六七青𫀆一病翁憶衡山呈世卿身䡖何處謝炊煙石洞松脂不記年尺牘巳通南嶽主一丸還有白龍仙今日山齋擁敝綿幽懐抱膝又經年湘中憶我無歸路更住衡山㡬日船楚山西望翠重重說著衡山便不同九尺仙笻倚墻角待君來問祝融峯曲肱何處枕湘流不到名山死不休髙詠祝融峯頂月與君當作逍遥逰即事照眼春光爛不收江亭一雨欲成秋道人不是閑鸎蝶肯爲隂晴一日愁謫仙亭遷客一亭眠海濵當時誰號謫仙人花汀栁市無彊界盡是乹坤一様春世卿還黄公山黄公椽子李家山水國𥘉歸作夢㸔愛殺在家兄弟好一壼春酒對承顔謝金方伯曆扣門驚睡雲霞暁洗手開緘日月新莫笑土牀空耐冷薇垣又借一畨春聞周亰春試下第遣黎公徃報其家浣璧小兒期大魁倚門慈母夢歸來春榜未登非惡報開緘莫欠老黎杯聞東山先生領都憲之命脩理黄河以詩寄之䟽鑿紛更日已多乹坤無奈一黄河天生㑹有龍門手人世空傳瓠子歌題山水小畫寄姜知縣泉聲山色正邦心誰寄漁蓑渭水潯觧點無中含有意世間除是畫工深送蒋誠之考績入亰塵埃局促非天逰大翼豈肯搶揄休王明受福在今日野老放歌囬白頭沈石田作玉䑓圖題詩其上見寄次韻以復到眼丹青忽自驚玉䑓形我我何形石田雖有千金貺老子都疑一世名得世卿永興書山堂見月自鈎簾一榻秋光中酒眠何䖏博舟來嶽下晩揺山影過湘川方伯金公顧白沙次韻荅之晚飯對公山閣雨尊前又拜歲書新别來試把梅花數三十六囬江上春題一峯傳稿後一峯獨去江湖逺千古長留列傳新歲歲桃花滿東岸只将榮謝記冬春閔都憲惠曆前曆将窮後曆新䑓端两度拜山人東西嶺外今何地飛盡嚴霜是好春送林時嘉南川夢裏舊青湖何處青燈一榻孤留取幽禽守花月隔林還與盡情呼次韻陳冕課試失期無了日酒杯勸影有長春風流倘帶龍門選不愧當年第一人西逰笠頂是青天毎愛前村酒䖏眠秋雨閉門人不見依稀猶記下江年冕與張别駕約逰清淇長江月色浩無津愛月撑江别駕真借問此來誰主約翩翩猶是未官人寄題邵西澗澗裏仙蒲㡬節來澗邊塵跡尚封苔賖君澗水西頭月并與蒲香入酒杯悼區孟章序云章姓區氏順徳人四十不娶棲迹空山委志逍遥漠然不知人世之欣戚何如亦一竒士也一坐虚寒誓不歸病危何處覔刀圭青山若問君來去只有當年海月知悼馬龍序云龍從一峯先生㳺頗見意趣一峯賦道南詩送之後爲仕進累心遂失其故歩至不得一第而死亦命也夫人生㡬何徒以難得之歲月供身外無益之求弊弊焉終其身而不知返若林琰皆覆轍可鍳惜㢤道南詩卷岀湖西恨失當年馬上携髙枕何如一峯好夕陽囬首萬山低次韻顧别駕留宿碧玉樓序云弘治七年夏六月按治廣東侍御熊公欲創樓于白沙水湄爲徃来相接之地謀始事扵我郡主林先生遂盡聞于藩憲諸公議既定别駕以按治之命来相地是夕宿白沙碧玉樓遂次韻荅奉白雲滄海共悠然病榻年深别駕眠領略可勝諸老意一簾踈雨對江天信宿留公豈偶然山中麋鹿避人眠乹坤多少登臨意一洞天深一洞天一弛一張皆自然嘉賔未醉主人眠两鳩相對山樓午喚得晴天作雨天不相同䖏是同然三十年來辦一眠何處白雲堪作雨白雲封㫁白龍天勾引漁郎恐未然桃花巖下笑人眠白頭我亦人間睡不是桃源洞裏天偶憶廷實遷居之作次韻示民澤君将肝肺托諸詩我道溪山是外圍人或有疑容未信已如深信不妨疑小勝江山大勝詩斬關直岀两重圍自家真樂如無地傍栁随花也属疑湛民澤携諸生逰圭峯甚適奉寄小詩天風吹入紫雲層髙閣逢秋快一登多少傍花随栁意還餘一個玉䑓僧秋落遥峯翠㡬層不知何䖏嘯孫登而今小坐黄雲看誰道方𫀆不是僧洞崖秋蘚碧層層奪竹穿松際曉登想得紫芝𥘉入手汲泉鑚火欲呼僧閣天孤峙老稜層萬古荒䑓萬古登君逐我來無記性東坡言是徳雲僧山斗爲羅一峯作青天白日一峯尊碧玉先生歛祍看四海未知山斗價一錢相售是君難曲論迷真亦異㢤軋坤何代不生才今誰敢避愚公號曽作夫君北斗來觀黎秫坡先生畫像羊裘不釣世間名考蹟桐江更考情散髮松根坐磐石葫蘆無酒對先生無詩無影不留真描畫先生到㡬分頼有當年親點筆一聲孤鶴在秋雲次韻周憲副孟中見寄黄花簮滿碧方巾巳作人間了事人籌䇿廟堂無我夢只将杯酒托經綸金帶纍纍夢欲通庭柯忽撼夜來風白頭相見知何日挑盡殘燈碧玉中代簡荅黄守韓山片石舊空聞尺札秋風此拜君隱几獨慙非老手得逢青眼看斯文次韻廷實見示撃壤之前未有詩撃壤之後詩堪疑風花雪月人人是又堕風花雪月圍騷壇處處自張圍我不操兵世莫疑翠璧青林端有句傍花随桞却無詩寄題張主事小西湖次韻咫尺波光對五湖滿城况是眼中無山禽自闘聲音好來傍竹林眠處呼人間風月㡬西湖居士園中亦偶呼千樹梅花一隻鶴可曽認得主人無龍江鄧翹送晩菊氤氲何䖏送花舟歲晚相看碧玉秋笑把一杯花亦笑年年公酒爲花留次韻送藤枕萬事無心一片雲再來西華打眠人紫藤一枕誰分付盡日酣酣紅樹根悼陳冕不飲亦狂飲亦狂醒中說夢醉中忘軋坤早暮蜉蝣化不是芙蓉不耐霜東方欲白星漸稀一塲春夢暁鍾時伯道有子常事耳劉蕡登科人不知風入梅花逓少香月臨江閣有㣲霜去年此夜客劇飲此夜今年人悼亡寄左行人白狐可改先公墓我許還公尺劵書漢老未還東白記也憑門下一吹嘘左行人寄惠倭金酒琖醉中賦荅睡郷元自醉郷分醉興深時睡興深六十七囬春又過茅柴不管注倭金劉景仁自雷州别二親還永豊過白沙贈之何處寒笳動暁風江門别舸太匆匆半肩不是雷陽物何得雷陽在夢中與鄺筠巢求蘭楚畹當年不盡花毎逢秋露憶君家白雲只隔扶溪水不使餘香到白沙墜露聲殘楚水昏一杯何處酹湘魂山人口是逰蜂嘴不到扶溪竹下門次韻王樂用僉憲見寄春到江門好放舟放舟䖏䖏是天逰䏻将公事此中了何啻于今第一流拍拍滿腔都是春一聲未唱巳通神新詩若道堯夫是只問堯夫是底人謝生得亰醖以爲羙使致白沙開幕視之空樽而已乃因發一笑十千羙譽酒家聞屋裏茅柴且賞真偶對泥樽開口笑先生不是醉郷人題李子長畫青山影裏人家少緑樹隂中石徑㣲偶出洞門囬首望白雲何處有柴扉谷静山深樹㡬叢溪邊白石可青笻詩中此景多相似只恐詩家是畫工寄鄧俊圭韶州西去是衡山楚客舟從嶺左還時李世卿取道廣西還武昌欲語祝融天上事思君迢逓見君難予與世卿約逰衡山云候世卿歸途過樂昌更與俊圭期定今不果矣念之悵然外祖父無子以姪孫林廣爲後廣之曽大父以一身兼两戎籍不䏻辦而一之爲子孫世役乆之業盡人亡惟有廣耳有司今又以廣𥙷北亰鎮南衞伍自是而後林氏子孫在新㑹者無孑遺矣丘壠之守委之誰耶予力不䏻振之賦二詩贈廣庶有識而憐之者茅簷家具盡随身老婦嬌児日可親有夢只㝷丘壠去不須囬首問耕人淚盡廬岡失母家塚傍枯樹也無花平安莫遣無書信一度春歸一度嗟贈劉别駕肅庵觧官歸永豊西來雙棹不曽休再過江邊碧玉樓共說湖西歸去晩客心應未死金牛一簑歸去釣秋江花近漁舟水亦香却笑此翁閑未慣水中鷗影尚囬翔朱門誰道不如貧笑把狂詩冩贈人日暮孤舟向何處野花啼鳥故山春得廷實報定山謝事歸憶東白仲昭諸先生有作也曾收得定山書三月天曹謝事𥘉見說定山長在病當時不岀意何如當時不岀意何如得䘮難迯真數書更憶徃年張學士西山對靣說河圖西山對面說河圖逺志誰将小草呼今古聖賢不同調各留一影落堪輿各留一影落堪輿嘆息乹坤㡬丈夫脫贈藤蓑君亦愛江門春雨憶皇都江門春雨憶皇都個個先生六十餘必有嘉言告當宁他年應得史臣書題空夫卷爲余行人作三十年來學錬空凡身猶在有無中到門有客求題句不是空夫果是公題呉憲副累葉傳芳卷壼山八面照莆陽呉氏傳來奕葉芳莫向通衢髙綽楔只談世業敎諸郎荅張梧州書中議李世卿人物荘定山出處熊御史薦剡所及徳行文章要两全軋坤囬首二千年自從孟子七篇後直到于今有㡬賢多病爲人未足羞遍身無病是吾憂眼中誰是醫和手恨殺刀圭藥未投右李世卿欲歸不歸何遲遲不是孤臣托病時此是定山最髙䖏江門漁父却䏻知右荘定山買舟南岳去㝷醫七十今年病不支傾盖獨憐熊御史肺肝今徹野人知右熊御史鄧督府欲得慈元記上䂖荅之西涯許撰慈元記大手文章不要多拙作豈堪傳勝事如今此石未須磨東山規矩趙生成頃者一緘傳到亰有廟未應無祀典老夫重敢告先生偶得示諸生平地工夫到九層不知那個主人䏻他郷消息無㝷䖏去問嵩山戴笠僧江雲欲變三秋色江雨𥘉交十日秋􅋽夜一蓑揺艇去滿身明月大江流寄李世卿衡岳千㝷雲萬尋丹青難冩夢中心人間鐡笛無吹處又向秋風寄此音永順彭宣慰世忠堂宣慰之堂名世忠靈溪水與滄𬈑通如今百丈髙銅柱又見児孫起故封次韻送林大叅之任廣西病裏逢春實怕春對花著語未驚人今朝縦有狂詩送不是當年翰墨臣東西嶺表非無事經濟術中怕有心何䖏老仙來救世刀圭倒盡藥囊深碧玉髙樓架紫雲世間應笑此樓深忽聞夜半鵬風起九萬扶揺好在今夫子當時見逝川一聲浩歎不知年東𬈑更比川流闊不共東溟一派傳和荅姚主事問我平生遺我詩清風明月想襟期此心若道元無事似我江門㸔水時雖乏向用之才忝有晦蔵之地引歩朱陵寄懐青玉李拾遺徴之不至上䟽何爲張乖崖捄火事嚴徒勞分華因而有作海北多年一釣船大翼遨空魚躍川盡言天下知音少白雪不知何䖏絃題徤齋費子克殿元號化機浩浩不曽停剛見群龍面目成誰道名齋無此意江門月上㸔潮生讀罷有感坐掩殘書慨古今白頭契分向誰深頂門欲試囬生手争得名家一寸鍼海北汪廷舉新作懐沙亭修古書院冷香橋於海上遣使歸圖并求慕竹樓記值予在病復以是詩海邊西望海雲遮何處懐沙不見沙壁上畫圖君試看冷香今日落誰家忽然土木見經綸嶺海于今一使君忙殺多年簿書手可䏻談笑起斯文獨憐不見竹坡翁慕竹樓髙月已空欲點山茅照西所一瓢無計引春風次韻送海北使阮刋春日溪邊送阮郎桃花半落溪水香相逢休問來時路大舶不知何處洋次韻李子長寒菊四尺霜莖一寸葩幽香何只暗浮丫借令歲晚無人見不做人間九日花水北一叢含數葩梅梢寒月過籬丫茅茨可僦從人愛不賣廬山半畒花羅服周呈所作丁知縣祠詩因憶舊臘寄示菊花諸詩比今爲又長一格賞之以詩醉舞黄花落鬂毛當時詩語太矜豪春風再詠甘棠下又長黄花一格髙鄧秋波六十一偶失一賀小詩索笑六十光隂一鳥過一瓢還許醉秋波只今那有苕溪叟日日尊前聞放歌寄呉别駕獻臣一官萬里向西行雪錦樓髙别駕登若問野人何䖏所朱陵洞裏白雲層羅江許薄偶然逢又得成都一信通惟有大厓李居士洞庭何䖏醉春風贈烏文瑞囬首長汀路㡬多琴書又打鐡橋過趨庭若問東南事曽聴江門一放歌某昔過淮見平江總戎禮遇甚至都閫王侯厥配陳氏於平江總戎戚也一日過予白沙相與道舊平江今爲天下兵馬元帥相去萬里無由幸㑹雖隠顕殊途然於公之舊徳未嘗一日忘也因事賦詩托侯爲逹之詩曰不見平江十七秋春風秋月夢何悠病中忽見東牀靣却憶淮南是舊㳺和荅王僉憲樂用春在城中不見春城中春不是長春湛生羞作春風面故向人間更避人静處春生動處春一家春化萬家春公今料理春來處便是乹坤造化人春王正月衆家春望栁㝷花我自春先生欲學程明道莫厭㝷花傍栁人一物春知物物春一年春亦萬年春緫在乹坤形氣内敢誣當世謂無人寒江獨釣我道非空亦非小萬事舎㫋終未了朔風吹雪滿江天我只弄我桐江釣杜甫逰春碧栁黄鸝三月畫江湖風雨萬篇詩花前濁酒不得醉驢背春風空自吹秋江晩渡扁舟何處渡長津水闊煙生不見身莫向西巖歛髙楫天涯時有暮歸人荘子觀泉珊珊㵼下天花爛仰首白龍髙十萬丹青已㑹識者心誰道漆園非具眼荅石阡太守祁致和六年飽讀石阡書習氣于今想破除雪月風花還属我不曽閑過卲堯夫程節婦詩鍾氏狂客之女風俗當年壞一絲直到于今腐爛時欲論千古綱常事除是渠家節婦知贈按治侍御王公哲明朝騘馬又何之眼見東巡西怨時短歌忽𬒳風吹去都落人間作口碑偶得白雪陽春誰㑹彈莫愁天下賞音難江門夜半看明月想到朱陵青玉壇朱陵我居青玉壇五岳雖雄無此山鍾期老仙還未還髙山流水我須彈次韻送陳秉常之荆門州任不辭逺道赴荆門不避児童笑稗官閑望白雲飛綵水脚頭落處洞門寛紫盖垂隂宿霧收下臨雲夢此何州黄鶴飛來一囬顧不盡荆門天際頭得手未償燈火債設心豈異賢良科世間膏火煎熬外無奈箕山處士何題山泉爲林節推髙厓百丈到滄𬈑咫尺寒泉萬里清若道眼中惟見水老狂何意向詩傾呉瑞卿送菊用東坡韻荅之江山揺落見霜葩枕畔香風到細丫不是先生愛孤寂人間囬首巳無花題畫雲窩若個丹青可此翁雲窩自有主人封扁舟一去無踪跡黄鶴樓前望五峯送人寒水江門可半篙漁翁江上理魚舠狂歌欲送夫君别却顧樽中無濁醪次韻張廷實見寄兩脚著地此何關白雲與你同去還正當海闊天髙處不離區區跬歩間歲月人間古又今斯文興廢逓相尋崔嵬百丈皆平地西上一笻何處深黄别駕報世卿将來白沙君去廬山㡬度春君來不來桃花新花日喜逢黄别駕共對廬山說故人送陳仲冶用舊韻萬言䇿進大廷對三百人争甲榜名醉放漁歌此相送白頭閑動少年情北斗非将列宿論乹坤五岳太山尊俯仰四時觀物態雨餘何䖏歩髙原乆病吟梅花未發先扄牗落盡梅花未整巾明日廬山春又至仰眠樓上歲華新卜室大雲山雲屋乆住大雲山我亦雲中借半間未愁此地雲封淺擬帶朱陵一洞還縣送春至四角圭田酒入唇長官送我意何勤莫言自有長春在也共人間一歲春謝伯倚得孫送薑酒至七十一年雲水中半江老隠舊知儂一杯引滿爲君喜伯倚今朝又作翁澷筆一蓑春雨江門釣萬里長風海上吹南岳歸來無一事小廬峯頂卧觀時喜聞劉亞卿得請還東山平生畏􅈬人間飯向晩還同此鶴棲今夜開懐看邸報東山歸卧祝融西觀時山雲将影過桃溪晚脫萬紅何處溪年光也逐溪流轉巳送啼鶯過隔溪寄陳仲冶金䑓萬里傳聲仲冶裘上林春好任郎逰而翁八十二春秋浩笑江邊碧玉樓憶世卿楚郷迢逓廬山春君來不来花又新引笻踏爛廬山月折得梅花懶寄人題湛民澤家廟忽然突兀見新堂逺抱飛雲萬丈光主翁合是比閭長此地還成禮義郷張廷舉送薑酒至七十謬爲人所尊直從西埭到東墩一杯引滿為君喜廷舉今年始抱孫别廷實張主事萬丈祝融何處山三年碧玉夢相關多少畫工傳不去都没賢今畫幅寛寄題五峯爲葉夲厚父作清世誰堪住五峯石牀三尺白雲封祝融三畒終留我略與先生脚板同扶溪作飯江門喫五峯丈人予未識何當坐我五峯前共對梅花說周易贈張不已不已心期不已知明年八月戰秋闈摩天氣吐三千丈蟾闕髙扳第一枝感事呈宋督學先生禄位升天元有命情懐化俗却無醫道不易行休恕已仁非可譲更由誰寄廷實主事稀薟鼎内還丹意枳殻墟邊待酒心明朝許約西逰歩一寸稀薟地萬㝷和荅林方伯待用春日見寄對花把酒春無㡬寡欲安心老合知病過冬春還引望中天月色㡬盈虧舊雨春歸鶯不知雨晴鶯老落花時月露滴開鶯眼膜乹坤不了一盈虧荅陳静軒過訪公是登堂拜毋人徃來不倦拜丘墳通家無論郷閭舊八十頭顱事事真丁長官祠示里人古人冷淡今人笑此黄山谷詠徐孺子祠詩也此義足起人聞聴莫遣藤蘿終得意頓令簫鼓不聞聲寄李白洲都憲東南遺愛望重臨萬里滇南恨正深引嶺東山歸去路騎牛跨鳯許相㝷諱日有感十二月逢㢤生魄江山爲爾生愁色黄昏庭樹烏上啼一聲何處江樓笛送梁宗烈赴春試夢入天門㸔春榜榜中不記状元名世間此夢真何夢說到梁生似有情君持素履向朱門五色雲中見至尊且莫輕言天下事須将風俗究根源枕上仲尼不作周公夢天下共嗟吾道衰緫爲乹坤元氣薄聖人誠處衆人知與張東白入忙捄火張忠定正逺飛章李拾遺何故山人都不作山人貪睡起常遲荅陳中貴見訪積歲江門㡬度過不将錦繡薄藤蓑雪坭鴻爪他年夢記得漁翁此放歌題慈元廟呈徐嶺南紘前有東山後有徐慈元風敎萬年垂嶺南他日傳遺事消得江門㡬句詩江門釣瀬與湛民澤收𬋩小坐江門不記年蒲䄄當膝㡬囬穿如今老去還分付不賣區區敝箒錢皇王帝伯都歸盡雪月風花未了吟莫道金針不傳與江門風月釣䑓深江門漁父與誰年慙愧公來坐榻穿問我江門垂釣處嚢裏曽無料理錢與湛民澤六經盡在虚無裏萬里都歸感應中若向此邊叅得透始知吾學是中庸江門釣䑓何處江邊著釣䑓楚雲𬈑月盡收囬若比桐江還勝㮣千年埋沒一朝開再用韻與湛民澤日斜劉九放船囬層起江門水底䑓浩浩碧波山鎻㫁潮打崖門两扇開民澤祖樵林居士搆堂扵上㳺庒民澤乞題入雲堂搆昔人開蘭桂香風次苐來黄雲山髙㡬千丈后山前日寄聲囬次韻張廷實讀伊洛淵源録徃古來今㡬聖賢都從心上契心傳孟子聦明還孟子誰今且莫信人言暁枕聖賢都從一上來時止時行道與偕若使春陵爲孟子光風霽月更襟懐澷筆浩笑江門點舊詩詩中㡬度見承箕他日携書南岳住却話山樓浩笑時贈楊中順徳楊明府之子山下柴扉不浪開楊生端爲老夫來欲報封君無一事只将狂句贈生囬哭景暘詰杙爲楹四十秋纔醒一夢便長休名登鼎甲死亦枉老撫諸孤病只愁影翳山樓痰吐夜寒生老屋病交秋渡中短𥿄誰封附逺大爲詞觧我憂廷實有䟽聞東山先生得請歸賦此青玉之壇横素琴絶無人地五峯深碧雲鎻㫁元無路東山東山何處㝷問馬黙齋病於其姪孫馬大年荔顆紅時酒正多口瘡不飲奈公何郎君觧記春牛否還爲而翁一放歌林樟貢士入亰告行于白沙贈之乖崖捄火岀人間造次來分太華山收拾如今到山處明朝不見藕如船枕上謾筆正翕眼時元活活到敷散䖏自乾乹誰㑹五行真静静萬古周流夲自然荅容彦文見訪褁糧縛鴨問廬山乆病勞君毎厚顔若問廬山近來事重陽過後菊花殘次韻東所見寄若水清風當頴出山人莫道不前知拍手江門春信早黄鸝飛上緑楊枝荅文定上人千金帖子忽飛馳洗手開緘只汗頥前代昌黎今我是恍然海上記留衣神交今在識荆前再結前生未了縁果蒙道力相扶起蚤晚東林對長官叶鍾太守羙宣輓詩人自古例多貧恨殺滇南金帶新公與定山貧到老已有陳黄一軰人天下㓛名無我關只縁我自愛江山若對江山元没興𥿄錢灰冷未知閑夢逰衡山遇南極數老人來過却須先生作主與諸老對酌洪崖夀崖在傍歌詩以侑觴合座皆喜予以詩一首識興云衡岳去天能㡬何一株松下月明多南極老仙騎鹿過一瓢斟月兩崖歌題任明府思親樓卷用定山韻人間何䖏不樓居亦有如椽大筆書定山丈人都不管一拳不屑老何如碧玉樓晝夢扶病岀逰村徑甚適忽安福羅進士携彭秀才來訪遂書以贈之春早春寒著莫人黄鸝囀處暖𥘉匀狂心剛𬒳風吹動走遍南垞到北津泉石爲順徳張氏題江山㡬處堪還我泉石邊頭合有人髙著一雙無極眼閑㸔宇宙萬囬春羅浮春寄民澤海上花開萬玉林閑門碧玉夢相㝷不知開處花多少折盡羅浮半夜心九肋蹣跚清楚闊九苞真與黄雲深復有鳯凰山上月遍照羅浮玉洞春陳海篷諸子冠畢來見贈以詩兄弟參差作雁行春風碧玉喜同登近午天風吹雁去翩翩吹入紫雲層周方伯至白沙天上客来㝷故人江門月下足音聞便傳一點江門信逢著桃源且問津偶得一碧光横南岳前靈壇秋玉青相連道士來携三尺木髙山流水一聲絃讀韋詩夜雨齋燈卷未收清謡白首對蘇州晦翁兩眼秋波碧也爲先生一點頭寄廷實南北東西一馬塵相思何處不傷神竹邊閉閣長無事猶厭山雲軟素巾弘治已酉春姜仁夫進士以史事貴州還取道廣東過予白沙自已卯至丙戍凢八日辭别三首予亦次韻爲别明日仁夫至潮連寨方十餘里遣隸囬并得三絶和之通前九首吾與仁夫之意皆不在詩也豈尚多乎㢤仁夫浙之蘭溪從斈章先生徳懋吾廿年舊好故吾詩两及之江門淺路㡬人通两月公程來向東何䖏敢勞君着眼短墻踈竹是家風雲去雲來等是浮獨凭髙閣看江流南風莫送東歸客更共江門一日逰家徃桐江舊釣䑓鳯林何日暫歸來平生章子如相問道我山中日閉齋次韻仁夫潮連見寄進到鳶飛魚躍處正當随栁傍花時今人不見程明道只把中庸說子思樂歲呈楊大尹舎北歌童搥破鼓舎南春婦着新裙田家少遇豊年樂盡道今年是十分夀東静軒七十次世卿韻甲子如何管得翁全無白髮有青瞳赤泥便是逰仙枕兄卧西頭弟卧東對璧間李賔之學士和予藤蓑詩偶成奉寄之西涯一曲我藤蓑對此相思可奈何今日玉䑓應說我江間何處扣舷歌午睡起道人本自畏炎炎一榻清風捲晝簾無柰華胥留不得起凭香几讀楞嚴次韻奉荅李方伯介軒潮連見寄姓名秋榜忝同鄕四十年來守故常拄地撑天吾亦有一莖青玉過眉長不侍氷顔累十秋可堪相近阻相求此心未許傍人識公在山齋㒒在舟用韻寄鍾羙宣緑桞黄鶯紫水涯市橋沽酒醉春沙江花一與詩人别如此風光属自家晝睡爲雀所喧野風吹隙簷翻雀晝攪床風雀攪眠若道神仙無一事老夫當日未神仙失㒒粥罷腰膁亦上山晡時悵望負芻還乍疑乍到忘歸路月滿東楹未上關别後膝痛甚扵前日夲無詩悰獨念吾與廷實不可無言以别故及之五年不岀獨何心萬里行囊又一琴難冩别離今日意江門春水不如深定山許撰一峯墓誌東白許墓表乆不見示先生老去銘當出東白人來表可聞却愛大流山上月清光先到一峯墳今古多聞遷史記一峯何必我同年先生存作垂千古東白曰然我亦然南雄書院讀羅一峯碑丘墳何䖏草離離千里湖西夢覺時落日小池橋上路催人下馬讀殘碑金鰲閣横浦秋成百尺橋金鰲閣上見山遥凭髙無限歸來思何處飛雲不可招玉枕山一枕秋横碧玉新金鰲閣上見嶙峋使君得此元無用賣與江門打睡人鐡漢樓鐡漢元來亦是誇覊魂入夜遶天涯數聲羗笛樓前月落盡寒梅一樹花携琴圖松崖日暮水聲深何處携來緑綺琴磵石隔林人不見只疑罔兩是知音墨花䑓東坡遺跡汝弼即是張長史堯夫方愛陳公甫何處思君不見君墨花䑓上㢘纎雨横浦橋乗輿十月猶溱洧子産未知爲政在隔河騎馬是何人下馬問訊張東海濂溪䑓黄菊花開又一年南山無分對陶潜不知風月随儂否惱殺䑓中一夜眠葵庵葵花愛日臣愛君臣與葵花共此真試問春來桃李樹紛紛同者是何人曹溪别諸友相随征路二旬餘笑指前山别老夫却到前了心未了西風孤燭两踟蹰天柱山天柱山前望故郷西風浙浙鬂蒼蒼愁膓暗爲慈親㫁誰信青山是劍芒剡溪剡曲溪中雙槳鳴老翁訪戴是虚名雪消月出歸來夜只有詩情與世情雲封寺有曲江遺像戯題嘗疑大塊夲全渾不受人間斧鑿㾗今日雲封禪寺裡曲江遺像任塵昏度嶺有懐張曲江天地風雲㑹有辰開元可是欠經綸千㝷松下㸔流水十八年中度嶺人與王知縣劍水相逢梅始花春風吹動長官衙詩家到此須分别不共河陽一處誇挽劉先生顯仁曽傾白下郎官蓋忍讀青田太守文今日九原誰是伴里中新有一峯墳崖山襍詠北風半夜捲滄𬈑杖屨船頭候暁晴滿目寒雲吹不散一㠶細雨濕湯瓶萬古青山自落暉白鷗穿破水雲飛孤舟江畔無情思閑與児童詠緑衣訪敎諭何宗道樹隠肩輿行欵欵花催春鳥閙關關蘇公渡口雲連水宗道廬前雲滿山不寐舊雨今雨漏湔湔長更短更聲相連何人酌我金尊酒暫醉慈親卧帳前次韻荅丘侍御五月江門荔子叢繡衣下馬擘殘紅児童争走烏䑓節笑挽青荷立水中峽山别胡提學還至九江作峽行飛岀两三舫滿載離愁下九江夜泊孤舟不䏻寐自燒銀燭倒秋缸過羅一峯墓一峯原上夕陽斜雲掩閑門㡬樹花見說西風吹不死散分春色與僯家彈子磯候諸友不至軍人打鼓泊官船黒霧𪷟𪷟水下灘隔岸相呼不相見竹籠牽火上桅竿石門讀貪泉碑芙蓉花發西華寺逺訪殘碑到䂖門一曲貪泉歌未了夕陽紅近水西村贈曹侍御璘謝病飽蕨青山更飽眠㐮陽歸去自今年眼中未有如公早柱史前頭或姓錢雜詠過午城中走帖還老夫對酒社東山詩家進歩如撑艇又上前溪一两湾傍花随栁興飄飄澗水牽情到石橋勃率未堪還自笑眼前剛好𬒳春撩不坐人間彩鷁舟怕逢漁父問因由君家酒艇䡖扵葉試遣長鬚爲我謀拍月縈爐一小舟欲竆仙島路何由須君一見安期老指點蒼茫爲汝謀得世卿詩笑顔别後㡬回開詩到衰翁輙舉杯擊壤狂歌千首在一春無計寄君來東野㓛深偏洗削退之意到每優柔眼前一二聊拈掇正好承箕對孔脩東白張先生借予藤蓑不還戯之水北原南秋更多滿川明月濯纓歌長官要結溪山好去問南昌乞釣蓑咫尺溪光谷口分谷中人語隔溪聞明朝便下山亭去溪上清風可送君夢中作木葉爲衣草爲屨鳥共唱歌花共舞䄂裡青蛇三尺許六六洞天中作主風動㣲香洗得塵獨行山路不逢人梅花歲歲還依舊只㸔行人著句新日出東山尚未眠閑㝷溪水弄溪船人間一種惟予樂只在溶溶浩浩間躑躅江邊水沒橋沿溪貪賞不辭遥獨憐歸馬無鞭䇿未忍臨風折栁條題徴仕郎張公孺人區氏墓誌后衞幕已鐫東白誌西涯又撰孺人碑莫道不傳家世事當年兼有两公知種萆􅏘六首山渠面面擁萆􅏘鎻盡東風一院花江上行人迷指顧老夫扵此煉丹砂短檠他夜照書床一􅊦萆􅏘也借光老去圖書收拾盡只憑香几對羲皇紅朶青條擺弄同人間無地不春風莫䡖此軰萆蔴子也在先生藥圃中萆􅏘得雨緑成畦如此風光亦老黎飲後小庵搜句坐山禽啼近竹門西萆蔴遶竹徑通雲雲裏樵歌隔竹聞手把長鑱種春雨風光吾與老黎分種了单蔴合種瓜青山周折两三家老夫來搆茅茨畢别種秋風一徑花次韻李憲副若虚白沙别後途中見寄江門春浪两涯平半醉船如天上行坐冷燭花歸問夜逢逢津皷欲三更咫尺圭峯不見䑓春雲将雨㡬時開山中一徑無人到除是青天畫舫來江城無處不通潮風疊寒漪色更嬌詩舫飄飄向何處髙涼西去不勝遥和鹿歩韻黒甜一枕鼻呼雷江浪如山夢裡來乹坤何處留雙眼不向三洲鹿歩開贈湯地理師春泥沒屐大江潮溪北𥘉經獨木橋千丈峯頭望東海三山正對杖頭瓢錦嚢以上不堪言老郭元來亦是仙笑殺城中諸年少欲持阿堵問君傳南越山川拄杖交東風何處送歸舠一條路打朱明過直下潮陽看海濤雲水相逢是偶然江亭燒燭話新年眼中但有牛眠地指點青山不要錢贈鄒處士還合州人間憂喜也無期萬里間関一馬歸莫灑東風别時淚春光又滿老萊衣石城米賤雲門鎮吏目身輕翰苑官歸去山中偏好睡家人不用逺來㸔題也可庄上見一空交交黄鳥弄春晴也可山庒隱几聴莫以山林笑流俗山人元是此山靈青山何處倚鳩藤囬首塵埃㡬折肱林下一壼誰共醉淵明只好對髙僧醉中作酩酊髙歌掩舊書青山日月笑居諸一畨春雨無分付枉種桃花三两株酩酊放歌何處來東風吹笠上溪䑓䑓傍有箇髙飛鳥飛向三山去不囬觀物一㾗春水一條煙化化生生各自然七尺形軀非我有兩間寒暑任推遷早飲輒醉示一之清晨隠几入無竆浩浩春生酩酊中我若扶衰出門去可䏻筋斗打虚空得廷實書洗竹添花張戸曹忽抛閑散事煎熬東門春水無人釣又長溪頭㡬尺髙忽聞戸外歌聲以爲馬玄真将至不知其累約而累違也諷以是詩花前誰共引杯長風送歌聲到𧹞郎莫唱雍門絃上曲從來此曲㫁人腸荅送茄瓜两頭肥緑壓肩斜五月江園始送瓜童子近前與翁語小籃瓜底是新茄同将形色委人間竊比髙松一鶴閑口腹累人都未免茄瓜籃裡又詩還田夜讀田白沙孫也朝來窓壁尚塗鴉燈下吾伊且賞瓜不是風雲天上夢阿田家世夲桑􅏘掃突炊秔及早鴉東臯時有未芸瓜田家樂事如翁少男戀詩書女戀􅏘憶年童稚髮如鴉稍稍東陵學種瓜今日肯嗟頭似雪江門三畒但萆蔴紀夢偶然嘉惠得僯封無數金錢出䄂中欲向萱闈談此夢隔簾斜月未聞鍾得世卿子長近詩賞之漠漠江天對把詩竹壇風日引杯遲翁歌此曲児當續問著别人都不知飛雲髙起大崖深兩處天敎两鳥吟莫把壠山來比並山頭鸚鵡𬒳人擒詩到堯夫不論家都随何栁傍何花無住山僧今我是夕陽庭樹不聞鴉鄒吏目書至有作兼呈呉縣尹傾蓋投緘不自䡖人間造次㡬晨星天涯放逐渾閑事消得金剛一部經落花遥對䂖城春半篋殘書一病身茶筅粟瓶供客盡不妨人笑長官貧天涯遷客病渾家開過東風㡬様花容易江山得重九問君何地落烏紗張侍御叔亨将赴亰遣人告行求贈言不已賦此以荅不爲泯泯即波波天命委之人柰何秋雁未來君好去文章覆瓿不須多梁文冠抄詩口謾吟哦手謾抄風壇踈竹晝相𫾣不知今日滄𬈑上天放何聲此處髙雪月風花信手抄皇王帝覇入推𫾣伊川擊壤三千首都共南風一項髙君到詩情每𬒳抄玉䑓秋磬借僧𫾣門前荷簣知心否雲鎻千峯月正髙屋下塵編不暇抄狂歌試把鐡橋𫾣秋風背取詩嚢去且看擎天柱杖髙夜行流槎泛泛月中眠横與波間一半天何許少年三两軰夜深鄰舫呌攤錢夢緝熈花前把酒問平湖君到閩中憶此無夢裡征㠶西下疾两人江畔笑相扶雜詠西林收雨卜鳩靈卷𬒳開窓對暁晴風日醉花花醉鳥竹門啼過两三聲宗㢘送明瓦屏風至次韻荅之小中雖異大中同明處韜光暗處通三直五横真夲子人間無路獻重瞳瓦木鋪排得此身乹坤何物到頭真道人具得屏風眼還向小齋來卜僯白沙子卷之六終
