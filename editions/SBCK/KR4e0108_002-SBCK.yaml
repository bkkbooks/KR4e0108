front:
  text: 白沙子卷之二
  hash: sha256:968d9e3689ac273cb85c687a427dad669ec8aac54f806156b9484260aa963ed1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0108_SBCK_002-1a}
body:
  text: 書簡與西涯李學士相别六七年邇者不通問扵亰師然自周文都南歸後先生之音耗遂􅅸扵耳曩聞先生在䘮且歸長沙無一知舊自北亰來者無不問其詳不敢奉状毎一見周生相與悵然乆之尚未審所值何艱長沙無舊業未必可歸當歸何䖏也近者白洲李憲副過寒舎乃知先府君塋于都下嬴􅀶之􅌾古今未必以爲非然亦有非其情之所安顧吾力有所弗及萬里外某􅀎亮先生之心也柰何柰何居今之世欲超然無累扵心無累扵後先生計之亦熟矣然事徃徃有不期而至非人思慮所䏻及惟在我者所當盡而􅂉牽制扵外爲之弗豫至不可爲然後圖之亦弗及矣此亦先生平昔所嘗慮及漫一道之耳頃􅀊承惠貞節堂八詩真嶺南竹枝也李世卿已􅀵入縣誌門户之光非言語可謝也藤蓑尚欠􅀘章能復賜之否乎世卿自去年首夏至白沙臈然後歸蚤晚㑹試入亰區區衰病百状問之可知已去秋得時用一書足慰鄙懐他人愛我不如時用先生諒䏻悉之也張進士附此不䏻盡所欲言粗絹二匹表忱外苧一端奉時用不别具與鄧督府翰林院檢討古岡病夫陳某再拜復書督府都憲鄧大人先生執事某不得望見扵執事五十年矣南海野人徒抱迂拙不可爲世用執事鴻猷盛烈聲聞四逹皎如日星之照臨甚賀甚賀兹者伏􅂪手書錫之名香􅀊曆别奉鈞帖令本縣月給白米一石撥人夫二名不敢當不敢當執事所稱逋野誠隠逸士如今日之賜使逋等受之冝也其不受未見其譲之過也某何敢自列於古之名流㢤某無寸善可以及人有田二頃耕之足以自養而又受賜扵當道以自列扵古之名流其怠扵自􅁱亦甚矣引領蒼梧衰病無由自致拙作一首紀述仁政傳示嶺海以彰盛徳餘二小詩以撰慈元記望西涯閣老以請祀典望督府共成東山之羙此野人之志也伏乞鈞裁與朱都憲頃者􅀗拜執事扵蒼梧十餘年間執事之心不忘乎㒒與㒒願見執事之誠交慰並沃扵一堂之上一日之間至矣盡矣執事􅀒一世之豪才際百年之嘉㑹故䏻受知當宁進位都憲奉璽書督三軍以經營扵一方誰不瞻仰誰不歸戴㒒一介書生生長東南聞見寡陋徒􅀒虚名無􅀘扵世乃􅂪追憶十餘年相與尺牘徃來之雅而賜見焉幸甚􅄑甚㒒之齒非少然以方扵執事則爲後進執事先生長者也長者有問不辭譲而對非禮也􅀮而不告非禮也㒒之始至執事問以出䖏㒒未敢率爾執事又益之以薦進之􅀃且令囬自决之㒒扵是乎􅀂􅀒芒刺避席而不敢言慚也退而思之又大慚也明日具以情告且言其不可當是時也執事亦見㒒之顔色乎始者㒒欲徃見執事扵蒼梧凢三復計之而後果行誠以執事之賢固所願識然自念二三十年所守進退之節一旦由此而變亦不䏻不少踧踖也况諭之以薦進之􅀃耶㒒竊以爲執事好崇奨人之善偶見一士少異乎人亟以此言寵之使勉乎善云耳不然則􅀅悼其竆且老踽踽焉無所與同恤恤焉無所與歸故問而遣之使自爲禄仕之計焉耳不然執事之明足以照物豈不知㒒之駑鈍不可驅䇿而思進之萬里之途也執事又以韓退之之事見朂退之雖賢不及孟子孟子不肯枉尺直㝷退之以書千宰執㒒固不得舎孟而學韓也㒒之歸白沙㡬一月矣郷之逄掖士無日不來問詢㒒告以所接盛徳之光莫不鼓舞興起信乎徳之流行速扵置郵而傳命也惟是進退岀䖏之念尚日往來扵心誠懼執事所以待㒒者如此而人之知㒒者淺也此意已託丘侍御逹之左右不審亮之否乎未䏻黙黙伏此布聞且以代面謝惟少垂鑒焉又陳某頓首啓伏􅂪今月十八日遣使降臨衡茅惠以羊酒粟楮諸儀君子之賜光動閭里顧愚何人可以當此恭惟執事位髙而望重徳􅀶而民化而恒患乎善之不彰士罔攸勸故䏻尊重名敎秩秩其儀以興起山林之遺逸大㢤執事之心㒒雖駑鈍敢不夙夜秪奉然㒒竊觀來喻之言大意欲勸㒒出仕耳非直勸之且加責焉是固出扵愛㒒之誠而㒒之心亦有未􅂪照察者何則掇科登仕固㒒之素志抱病違時非㒒之得已㒒自染疾來六七年間每遇疾作徧身自汙􅀂雨或遭數月不止旣止復作畏勞怯冷沉綿反復元氣䆮耗力加防慎庶㡬保全而母氏年益髙百疾交苦是以未䏻出門耳假令㒒疾愈可以出矣而忘親之老豈人之情也㢤在親爲親在君爲君無所徃而不然矣夫天下之理至扵中而止矣中無定體随時䖏冝極吾心之安焉耳若昔之李宻是也宻􅀍徴時宻之心盖自揆安扵事劉則止爲中而行非中也今􅀂槩以聖賢出䖏之常責宻以必仕恐非宻之心宻之心天理之時中也㒒今自䖏亦欲無愧扵宻耳執事信以爲何如㢤願終敎之㒒不敢固執也承録示諸公子文稿筆􅀔滔滔有氣􅆋當是一才子可畏可畏􅀂導其志使不差開其學使有益又在敎者何如耳使囬謹此申覆辰下哭一姪婦故言無文采伏乞台照又陳某啓伏承此月二十四日都憲老大人命使降臨衡茅諭令某即日起程赴亰春闈在邇不許推延聞命悚惶爲慰爲懼伏念某質本庸愚頼􅂪聖朝作養于兹三十餘年雖無用世之才竊有忠君之志其未仕也豈果扵自爲而忘世㢤誠欲吾身親見之豈不知時之可爲㢤執事知之乆而愛之深旣重之以手書復勤之以口喻執事扵後進拳拳接引如此某雖駑疲豈無飛動之意㢤直以受氣不豊病與年長去年秋自汗􅅻息因得進謁執事扵蒼梧比歸途間冐風舊病㝷發至今年七月􅀄寒􅀬交攻自汗猶􅇵而必欲驅此疾羸之軀行扵風波之途萬一不虞雖悔何益伏願執事垂日月之明擴天地之量假之􅀊月俾得調治疾愈之日自行起程赴部不敢推延以􅀒尊命干冐威嚴某不勝戰越之至與劉方伯東山先生餘㓂未殄先生得無爲百姓戚戚耶比聞下令各郷村自爲城守伏計當道憂民之至必無過舉恨未得其詳耳曹匪石抵家病即愈先生冐大暑􅀒疴而出動靜勞逸仕與止固不同也未涯瞻奉謹此申忱匪石所徴樂記文字已托周汝愚具稿早晚録上轉逹又亡妣墓扵小廬山居舎之旁襄事扵乙卯夏四月八日去始䘮才四十日耳萬里一䟽無任哀感之至崖山慈元廟乆完但未立主耳拙記録去想已經目􅀂西涯閣老有作用之制中别無佳思作得文字強勉塞命無以老朽爲嫌也祀典記當與西涯閣老圖之屢聞先生上䟽乞休致然毎扵邸報中未見端的未審何如也近陳進士茂烈過寒舎與語東山先生告歸西涯閣老留之疑先生未䏻去者以此故也又得五月二十日書良慰想仰先生即日命駕還東山山靈輙喜雖然先生不忘天下之心山靈未必識也章近有衡山之約去東山非甚逺他日東山漁釣之暇尚䏻索我扵朱陵洞中否耶昔者􅀉去慈元記稿􅄑一字批破還示爲感又賞􅌼指揮知感激矣弊邑民得免扵盗賊水火之害公一瓢酒之力耳活􅀦者手叚固如是耶感服感服里人問徭役告以昔者舟中所聞聴者雀躍交慶如赤子之慕慈母不審比日斟酌何如捄民水火之中惟恐其不早也貪官汚吏侵漁百姓甚扵盗賊此軰不除雖有良法羙意孰與行之竊謂徭法雖更必痛懲一二貪黷然後法行之可乆也􅀕田事料理恐未免水火之相射欲乞少緩裁之如何恃愛饒舌復彭方伯書古岡陳某薫沐頓首復書大方伯彭大人先生執事新凉惟台履吉慶去冬林别駕過白沙得執事手書後又得所􅀉􅅸句詩具悉雅愛􅁇又聞諸人執事以賤名汚薦尺天官以執事之言爲重亟賜􅁢行近者􅂪遣守令降臨衡宇書幣煒煌先後疊至太守執􅕸宣喻扵庭曰是大方伯彭公使某歸陳白沙徵幣也聞命兢惶罔知攸措執事當世之豪傑也吾黨以執事爲模範斯文以執事爲司命廟堂以執事爲柱䂖執事一嚬􅀏一舉措天下􅀅視以爲輕重取舎甚㢤執事之動不可輕也㒒本麋鹿之性者也雖少讀書全無抱􅀒中􅀊閉門惟近藥餌好事相傳􅁼多失實執事徒信人言以爲可用斯名一岀士􅁼􅀭之閭里榮之㒒不知何以得此扵執事意者方今之俗㢘耻未興􅀅以興之歟奔兢未抑􅀅以抑之歟不然執事眼髙一世必不以天下之望􅀒天下之人也夫天下非誠不動非才不治誠之至者其動也速才之周者其治也廣才與誠合然後事可成也孔子曰如有用我者朞月而已可也三年有成聖人過化存神之妙不可一二窺測天下不動不治動以治之聖人與學者一爾未有不須誠以動不須才以治者也如㒒者忠信不􅁱章句爲陋才旣不足以集事誠又不足以動物徒以虚名玷汚薦尺進則無益於事徒䘮所守以上累執事之明止則人􅀅以我爲固守一節非通扵道者亦非所以立大中而奉明訓也二者之慮徃來乎胸中㡬日而後决之子使漆雕開仕對曰吾斯之未䏻信開以夫子爲的者也夫子不能使之仕何則人之知已不如已之自知苟未信也師不能強扵弟子㒒自知甚明惟謹素履罔彼玷缺庶㡬丘園之義尚足以少禆明時奔競者愧而恬退者勸亦㒒所以報執事之萬一也若曰可以仕焉㒒不知其可也矧今自汗又作俯仰或過衣裳盡濕此亦郡守所目撃設任之勞事何以堪之伏惟執事察㒒之志矜㒒之愚而弗強焉􅄑甚􅄑甚與陶方伯比聞在師中能坐馬矣􅄑甚􅄑甚周二來得書人情世態相見多不合柰何䖏之交㳺中有不勸人進者乎某獨不然是以退爲進也非髙明莫䏻亮之承問改題諸墓石可否書法與銘旌畧同所以存其名不當云某府君忠烈公則書其自得扵先朝者至顯矣後來恩典所加冝列諸神道碑不必改題也李世卿乆在館中恐要知不多及又潭滘拘晋稻舫稱大府下差人果岀扵尊意否耶乞降指揮比􅀊鹹田之入㒒扵執事所謂待晏子而後舉火者也然非鄧馬二生㒒安得坐享此田㢤㒒與二生約毎􅀊入三分之㒒猶以爲愧焉黄田苐四蓢諸姪與易賛共成之賛比二生用力尤難所費十未酬一伏惟執事擴造化之量垂不朽之仁念㒒平生不苟取之小㢘不􅀒人之小節無易舊圖則㒒始終受賜大矣恃愛輕瀆不罪與歐緫戎逺枉專使下問某不􅄑今年二月間先妣下世自是以來憂病相持不復知有人世事忽枉手敎具審朝廷大閫外之任􅀉扵公府江之患已平可賀可賀雖然平蠻之頌老杇竊願公忘之昔者㫁藤峽凱歌適足爲韓公之累此廣右之役所以有煩扵今日諸公也公識量宏逺所到豈可涯安地方復民業惟公晋意焉病畏多言感公厚愛故及此􅄑勿示他人以爲詬也厚賜謹已拜領感怍無量南井昨爲致區區扵察院此不贅復張東白内翰承諭義理須到融液䖏操存須到灑落䖏㒒僻䖏海隅相與麗澤者某軰數人耳抱愚守迷無足以副内翰期待之重然嘗一思之夫學有由積累而至者有不由積累而至者有可言傳者有不可以言傳者夫道至無而動至近而神故蔵而後發形而斯存大抵由積累而至者可以言傳也不由積累而至者不可以言傳也知者䏻知至無扵至近則無動而非神蔵而後發明其㡬矣形而斯存道在我矣是故善求道者求之易不善求道者求之難義理之融液未易言也操存之灑落未易言也夫動已形者也形斯實矣其未形者虚而已虚其本也致虚之所以立本也戒慎恐懼所以閑之而非以爲害也然而世之學者不得其􅀃而以用心失之者多矣斯理也宋儒言之備矣吾嘗惡其太嚴也使著扵見聞者不睹其真而徒與我嘵嘵也是故道也者自我得之自我言之可也不然辭愈多而道愈窒徒以亂人也君子奚取焉㒒扵義理之原窺見髣髴及操存䖏大畧如此不知是否疾病之餘言不逮意惟髙明推而盡之還示一字㒒之􅄑也比者婁克貞敎諭亦有書來㒒既未接其人不可􅃍有徃復内翰倘以愚言爲有益擇其中一二可者示之否則置之陳布衣竟不及面而卒當此衰否之極又失此人可嘆可嘆良晤無由伏惟順時以道自重不宣與賀克恭黄門離隔年多彼此交夢神亦勞止老矣寜復有相見之時耶今年春二月十六日老母傾背毀瘠不能自制與死爲僯平生知舊㡬人死者已矣存者或失其故歩柰何柰何今之論人扵岀處曰賀黄門賀黄門亦􅂪厠賤名扵黄門之下豈不以同志者少不同者多耶比􅀊得所惠書􅁇又得賢郎北京書甚慰甚慰有子如此足矣天􅀅以是大賀之門盖可知也三十年妄意古人之學衆􅀃交騰如水底撈月恨不及與克恭論之今自謂少有見䖏得其門而入一日千里其在諮耶南北萬里意所欲言非尺簡所䏻盡里中舉子赴春官附此草草前有詩稿一􅉺􅀉范長史處託渠轉逹遼東乆不報爲無便耳亮之又爲學須從靜中坐飬岀箇端􅌼來方有啇量處林緝熈此􅁓是他向來經歷過一箇㓛案如此是最不可不知録上克恭黄門􅀊首已託鍾鍈轉􅀉未知逹否今再録去􅀂未有入處但只依此下工不至相悮未可便靠書䇿也前􅁓所録徃來書問二首又記夢一首後有林緝熈秉之䟦尾通奉去病中不􅀎作書然所欲言者大畧不過此而已亮之與呉黄門世羙小詩不足以光先徳但比於他文此爲切實耳凢觀人者審扵愛惡取舎去就之間足以見之矣所貴乎作者謂其言之不妄可以傳逺若筆鋒無力拈掇不起則無如之何與丘侍御承差廿裏來得至蒼梧書起居通例也而何其辭之切切前此兩附問皆不至死者已矣宋先生旦夕臨弊邑􅀅必見之無状何以致公之惓惓如是耶感怍至矣聖天子念逺方簡命名御史出按治公以井渫之才治之廣右􅄑甚􅄑甚夫人之才大小必用之而後見不遇盤根錯節無以别利噐閒居竊聞廣右之積弊甚矣斯民之望治切矣􅀣公道明賞罰去故即新使人人盡力扵所事而民􅀍實惠正今日圖任之盛意亦公之䏻事也老朽何足以知之引領蒼梧徒深向徃比與李世卿期至南岳世卿今行矣道路其有藉㢤酒楮不瀆謝與􅁑侍御古岡病夫陳某頓首奉書侍御葛大人先生執事頃者㢘憲陶公惠書稱執事之命以平後山碑文委㒒爲之旣辭以不􅀎矣恐執事者不察㒒之心而以爲慢别簡托扵東山劉先生白之今者趙知縣自省還過白沙復申前命竊計區區之􅀻非但執事與當道諸公雖東山亦未之悉也㒒請畧言之㒒毎讀宋史至曹彬克金陵一事未嘗不對卷歛袵而嘆趙太祖之仁與曹武惠之不伐也盖自岀師以至凱旋士衆畏服無敢䡖肆克城之日兵不血刃凢所得一十九州三兵一百八十縣可謂有㓛矣武惠視之􅀂無有也捷至群臣稱賀太祖泣曰宇縣分割民受其禍攻城之際必有横罹鋒刃者實可哀也命出米一萬賑䘏之當是時君不知以得地爲喜􅀅不知以克敵爲㓛一念好生之仁洋溢上下自秦漢以來未及見也史臣稱武惠位兼􅀅相不以等威自異遇大夫士扵塗必引車避之不名下士噫何其謙之至也易曰勞謙君子有終吉武惠有之今後山之役信有㓛扵民矣諸公豈自與耶此賊近之省城民遭其毒者㡬年于兹前此有司固有任其咎者矣夫以今日平盗之㓛􅀘前禦武之不及正相乗除在扵仁人君子之心視民如傷豈容有彼此先後之間㢤夫上之治民當休戚同之夫乆病者不以得一日之安而棄􅀘羸之劑病飢者不以得一飯之飽而忘終􅀊之憂執事試求之百姓憂樂之情而忘其在巳必䏻以趙太祖之所存者䖏民以曹武惠之所存者䖏㓛則光明者益光明矣以㒒觀扵一時開誠布公未有如執事舎己從人未有如執事樂善忘􅀔未有如執事以執事之才應天下之務何所不可㒒所望扵執事者非直以曹武惠軰人爲法姑舉其一事之近似者爲執事言之耳惟亮之裁之復江右藩憲諸公七月二十四日㒒方困暑閉齋獨卧而李劉二生適至書幣交陳輝映茅宇㒒再拜讀書識其所以來之意不敢當不敢當匡廬五老名山也白鹿名書院也諸公皆世偉人也􅁱名山復名書院之舊希世偉事也㒒生扵海濵今五十有四年矣未始聞天下有如是之事悠然得趣扵山水之中超然用意扵薄書之外旁求儒師俾式多士􅀅以培殖化原輔相皇極以無􅀒扵斯世斯民也扵乎盛㢤昔朱文公之晋意扵斯也一賦一詩足以見之其與諸公之心盖異世同符也諸公讀文公之書慕文公之道亦罔不惟文公是師也自文公殁至今垂四百載仕於江右者多矣其間有䏻一動其心扵白鹿之興廢者誰歟文公固有待扵諸公也諸公誠念之不冝謀及鄙人鄙人非不欲斯道之明也學焉而不得其術其識昏以謬其志弱以小其氣乏餒其行怠肆其文落莫而不章􅀊月侵㝷老􅀅至矣其扵聖賢之道非直不能至而已其所求扵其心措扵其躬者亦􅀂存而􅀂亡雖欲自信自止而不可得况以導人㢤百鈞之任以與烏􅀗而不與童子慮弗稱乎力也故夫天下之事慮而作者患恒少不慮而作者患恒多千里之足不蹶扵逺途萬斛之舟不虞扵大水其才足以勝之非不慮而作者也使之不以其誠任之而過其分與自欺而誤人者其失均耳諸公獨不慮至此乎天下有任大責重而禄位不與者苟䏻勝之則至大至通無方無體故䏻爲天地立心爲立極爲徃聖􅁇􅅸學爲萬世開太平所謂建諸天地而不悖質諸􅀑神而無疑百世以俟聖人而不惑此其分内也宇宙無竆誰當􅀒荷伏惟諸公念之慮之勿遷惑扵衆口期匹休扵先賢􅀵囬束幣更聘真儒俾諸士子有所効法以無􅀒扵今日之意也幸甚􅄑甚與李白洲憲副近者諸姪以鹵田之訟上干臬司此未論是非只觀古人所以敎扵家化於州閭其道何如甚可愧也甚可愧也今聞臬司公䖏分之一一論之如法加強占者罪恐其不堪故具此白此軰愚民亦嘗遣人諭之不肯信卒罹扵法誠可哀憫伏乞先生操縦法外之意曲垂寛貸老朽此外别有䖏之使知感激彼此無怨乃爲盡耳亮之裁之干瀆死罪又郁丞來得手書并近稿二幅元日扶醉等作殊有意思非但言語之工而巳也來喻所以處病夫至矣病夫何徳以堪之頃荅張主事書尚未聞扵左右耶北門園池之勝孰與潭州山泉先生冨馬之惠孰與弘農公今且使病夫爲邵堯夫乎爲戴簡乎病夫得附􅂹尾爲羊城添勝迹扵後代豈假言㢤破數百金先生不惜與人顧受之者未易耳病夫平生山水稍癖待明年服缺後采藥羅浮訪醫南岳上下黄龍洞嘯歌祝融峯少償夙願然後歸拜先生之賜未晚也河洛後天數過九九病夫一生不受人間供養或者其超出六合乎顧别駕送契來且與領状若委人承管則未也先生亮之又劉門子帶來書信必欲自致白沙不附他人卒歸之水府對之太息而已數日前鄧督府附到東山手書􅀗聞東山好消息喜慰無量頃者雖遭劾者之口計不足爲盛徳累周生行時有奉懐拙詩想聞之一􅀏區區憂病之餘精力日不如舊但偶未死耳無足爲故人道者㝷醫南岳耿耿一念未䏻出門盖自去秋七月感風手足不仁至今尚未脫體嶺南地方㓂盗日益民已竆而徵歛無已天下理亂所􅀜謂何誰其憂之北門園池之惠毎念及此􅁣息乆之仁人君子之爲朋友慮至此乎周生倘及面必䏻盡所欲言劉門子告囬病中草草致此不䏻悉又數日前山東􅀖伯之報至矣彼有來蘇之望此有卧轍之憂柰何柰何不審何日啓行制中但有心送南北日逺日踈􅀊云暮矣復有盍簮之期否耶北門園池之賜聞者以爲羙談某不欲以一時虚名累左右劵書一通謹封納平生山水債欲償之餘年者託周生口陳髙明想䏻亮之復陶㢘憲使至辱手書承當道諸公欲以平後山碑文見委爲之㒒竊怪執事之知㒒猶未至也今天下䏻文章冨經術言足以取信􅀅來如一時諸公㑹扵省中可謂盛矣不自操筆而以委扵不䏻􅀂㒒者素無文彩比年以來益以衰病愈見荒落無足觀者強顔爲之徒爲有識所哂况扵多言干譽尤非退者所安區區之􅀻執事䏻亮之使囬謹復又昨縣如彦誠其賢未皆古之循吏邑人懐其惠矣議立廟以報之倘以聞扵執事頷之民􅀅歸心焉盖民之所好好之民之所惡惡之此得民之要道也况丁令在官簡扵事上執事嘗抑而敎之今因民之請廟而與之而遂成其名執事之量宏矣抑聞之千金市駿骨况生馬乎㒒知執事百􅀊後爼豆扵斯民當自我始則有徵矣又比日邑中聞執事至凢近年以邑科取民者皆罷之民大恱服爲可賀也前此豈不恤其情而強徵之歟感應之機捷於影響願執事永矢此心所以保㓛名扵晚節期爼豆扵􅀅來耳憂病中聞此消息不勝慰喜之至謹此布忱未涯瞻奉惟兾以時調攝以慰注仰之拳拳又李剛囬具審福􅂂康佳甚慰懸仰近傳方伯之除的否造次未敢奉賀竊惟寵辱在外惟以時倍加保嗇事􅀗已力辭就閑此最上䇿拙見如此不審髙明以爲何如荷公厚愛不敢不盡又秋暑旣退伏惟體况清和納福勝常頃者陳都閫過白沙具言當道所以論薦執事之詳想朝廷不日命下班次必崇付􅂌必重執事自此可以􅀣大勳業酬平生之言而東西託處亦惟便之圖令名不失公􅀻两全此人情所至願而不可必得非積累之厚其孰􅀎當之某病卧一齋􅀉名扵䂖而無其實英徳石形峭立或層起十數尺竒􅅸可愛者􅀎致數片置庭兩隅朝夕趺坐對之志願足矣然須得便舟可付閧然勞人則又非所愛欲也不具又辱手敎興師弭患動中機㑹爲可喜也後山禍機乆伏使謹扵微則無今日之役今首惡旣誅暫停搜捕之師冝慎玉䂖之辨扵疑似不决者寧詘法以信㤙此則天地好生之仁子孫享無彊之慶執事固有之奚容贅復趙提學僉憲來敎摘諸聖賢垂世之言與㒒之事叅而辨之大抵愛我深而告我盡也㒒用是知執事之心一峯明白不欺之心也一峯死㒒哭之慟以爲自今而後不復有如一峯者今乃有執事􅄑甚􅄑甚執事爲􅀃本之經訓與㒒所以爲學所以語人者同歸而殊途但㒒前簡失之太畧執事見之太明故疑㒒之意異扵執事而實不異也執事謂浙人以胡先生不敎人習四禮爲疑㒒因謂禮文雖不可不講然非所急正指四禮言耳非統論理也禮無所不統有不可須㬰離者克己復禮是也􅀂橫渠以禮敎人盖亦由是而推之敎事事入途轍去使有所據守耳􅀂四禮則行之有時故其􅀃可講而知之學者進徳􅁱業以造扵聖人緊要􅁍不在此也程子曰且省外事但明乎善惟進誠心外事與誠心對言正指文爲度數􅀂以其至論之文爲度數亦道之形見非可少者但求道者有先後緩急之序故以且省爲辭省之言畧也謂姑畧去之不爲害耳此盖爲􅀄學未知立心者言之非􅀄學不云且也􅀂以外事爲外物累巳而非此之謂則當􅅸去豈直省之云乎不䂓䂓扵徃迹以干譽目前㒒之此言亦有爲而發嘗與胡先生言之矣非諷執事也此不欲形扵筆札俟靣告執事扵㒒謂無間者也苟事有未當㒒得盡言之豈假諷㢤㒒才不逮人年二十七始發憤從呉聘君學其扵古聖賢垂訓之書盖無所不講然未知入䖏比歸白沙杜門不岀專求所以用力之方既無師友指引惟日靠書冊㝷之忘􅆍忘食如是者亦累年而卒未得焉所謂未得謂吾此心與此理未有湊泊脗合䖏也扵是舎彼之繁求吾之約惟在靜坐乆之然後見吾此心之體􅀮然呈露常􅀂有物日用間種種應酬随吾所欲如馬之御衘勒也體認物理稽諸聖訓各有頭緒來歷如水之有源委也扵是渙然自信曰作聖之㓛其在兹乎有學扵㒒者輙敎之静坐盖以吾所經歴粗有實効者告之非務爲髙虚以誤人也執事知我過胡先生而獨不察此㒒是以盡言之􅛽少留意餘不屑屑又易元至辱手敎數幅并諸作見示更相規益有交友之道􅄑甚􅄑甚然謂㒒示諸生詩末聮有激而發則恐觀者過扵求索㒒之意徃徃不然也此詩亦但謂􅀊月流邁諸生學不加進故汲汲焉告之兾其有所感發而自憂耳至扵末聮則爲我所以爲諸生憂􅀂但如楊朱爲我而不恤人則彼楊朱何爲者耶扵是終告之曰闢楊氏者孟子也豈􅀂是􅄶㢤道固爾也反復言之不過使學者知吾之憂岀扵當然而不容已則其所當自憂者􅀅􅅥然扵中而亦不容已也乃作詩者属意扵此訂頑砭愚咸此焉在何嫌扵人我爲敵與自任孟軻之重耶記語􅁼所載文公力疾與學者語勉齋見而止之文公曰除是楊朱不理㑹人我即不曽學得楊朱亦此􅁼也執事顧以爲不可乎海雲更號極是率爾敢不承敎執事録示張東白詩且疑㒒更􅃅逃禪不能擺脫此語聞之不覺失􅀏執事固愛助我者請問今所疑扵㒒如此果何自來耶􅀂岀扵東白未可據也東白盖㒒昔論學書中一二語偶未深契而料想至此從而疑之竊恐未爲至論只如此詩者偶讀宋文鑑和得半山詩數首論者云陳公甫喜荆公軰人直如此草草㒒平生得無巴鼻之謗多􅁼此可恠也聞執事􅀅赴京不􅀗數侍誨􅂓復此不一一又古岡病夫陳某再拜書復僉憲趙大人先生執事伏讀來諭執事所以進㒒者至矣所以敎㒒者亦至矣㒒一顓愚人耳凢百無所通暁惟知自守而巳曩者至亰師與諸賢士大夫㳺日聴其論議天下之事亦頗有益惟是愚懵終不䏻少變以同乎俗是以信已者少疑已者多也㒒之所深與者皆執事同年而獨執事之名未聞也奉附到董給事書其中穪道盛徳不少置㒒􅀻心喜甚以爲此來當得一見非子仁㒒無以知執事然以子仁之言又未嘗不追恨扵亰逰之日也承喻有爲毀㒒者有曰自立門戸者是流扵禪學者甚者則曰妄人率人扵僞者凢扵數者之詆執事皆不信之以爲毀人者無所不至自古聖賢未免見毀扵人甚矣執事之心異扵時人之心也㒒又安敢與之強辯姑以迹之近似者爲執事陳之孔子敎人文行忠信後之學孔氏者則曰一爲要一者無欲也無欲則静虚而動直然後聖可學而至矣所謂自立門戸者非此􅁼歟佛氏敎人曰静坐吾亦曰静坐曰惺惺吾亦曰惺惺調息近扵數息定力有似禪定所謂流扵禪學者非此􅁼歟㒒在亰師適當應魁養病之􅀄前此克恭亦以病去二公皆䏻審扵進退者也其行止􅀄無與扵㒒亦非㒒所䏻與也不􅄑其迹偶與之同出亰之時又同是以天下之責不仕者輙渉扵㒒其責取証扵二公而㒒自已丑得病五六年間自汙時發母氏加老是以不䏻出門耳則凢責㒒以不仕者遂不可觧所謂妄人率人扵僞者又非此類歟㒒嘗讀程子之書有曰學者當審己何如不可恤浮議㒒服膺斯言有年矣安敢争天下之口而浪爲憂喜耶其晦也不乆則其光也不大其詘也不甚則其信也不長物理固亦有然者矣㒒或不爲此戚戚也且㒒聞投規扵矩雖工師不䏻使之合雜工扵羽雖師曠不能使之一何則方圎之體不同緩急之聲異也尚何言㢤尚何言㢤惟執事矜其志而畧其迹取之群咻之中置之多士之列則天下之知㒒者無如執事矣幸甚幸甚都憲公雖未見顔色然仰之十餘年矣比聞下車以來徳政之布沛若時􅀨上自士大夫下至閭閻小民莫不欣躍鼓舞㒒固願一見况始者嘗辱一言之譽㒒又豈敢自爲踈放比扵固執者乎使囬謹此以復冐瀆威尊惶恐無已復當道䟽頃者亡妣出殯之日伏􅂪藩臬列位老先生大賢遣使臨􅀕備極情文光生泉壤不肖􅀌無任感激慚􅀒之至今者仙舟來過江門扶病褰帷引領流涕不敢任情乖禮以遂謁見之􅀻徒抱哀忱無由上逹謹奉䟽荒迷不次謹䟽與徐嶺南切見本縣近年以來盗賊日生訟牒日䌓人情放濫畧無檢束風俗惟見日不如前矣未聞有反復之機扵乎安得賢守令識理亂之源者與語是耶頃者誤蒙寵顧衰病不出無由進謝自念老病山林徒􅀒虚名無㳙埃可以荅一顧之辱謹以是言進惟閣下亮之程子曰治天下以正風俗得賢才爲本秦漢以下論天下之治者必以復三代爲至三代之君何君也其政敎何政敎也苟欲復之從何處下手耶必如明道先生之言是真䏻復三代手叚也而不見用扵時惜㢤伏惟大賢爲政務實而行庶㡬䏻順復人情爲國家􅀣立長治乆安之根本非如俗吏其所用心者惟簿書期㑹取辦扵目前而已也自今而徃一令之下一政之行必求其有􅀜扵風俗者三致意焉是誠聴訟理人之第一義也是誠經綸天下之實地也幸甚幸甚與張憲副廷學亰師一别逮今六年中間不幸彭年早世㒒自已丑得疾以來人事十廢八九雖承訃以興哀乃無䟽以奉慰㝷自度扵閣下如此冝得棄􅅸之罪然而終不復疑者誠以閣下愛㒒亦猶㒒之愛閣下故也比者􅀗手書三四讀之然後知衆人所以待㒒之心異扵閣下之心然閣下不欲正言之但㣲示其端扵㒒非㒒有嫌扵閣下乃閣下引而不發其不可者以意示之􅀅使㒒深思而識之耳雖然㒒何敢以望扵閣下者望衆人㢤不知其人而好之畏其人之加已而勿與之争自古未嘗有此也是故始求之深以取困大易所以㐫浚恒也言不離乎道行不迷乎竆出處語黙去􅈬之權操而用之必槩乎義苟如是榮辱之至自外者斯任之而已㒒之所守如此閣下信以爲何如㢤㒒不善交人數十年間所交其在上者乆而不衰惟閣下與莆守潘舜絃而已然止扵相愛之深知已則未也而以望扵一切之人此㒒所以不敢也㒒受氣本不多疾病乗之近年以來齒髮都耗精力䆮衰故又不樂與人俯仰方􅀅投名山選幽谷枕流漱石而老焉􅄑而老母粗康諸兒女婚嫁漸次可畢徃無日矣閣下仕扵朝爲䑓官其在外也爲按察官可謂進得其地矣大丈夫欲行其道扵當時自宰執而下冝無有先焉者矣閣下謂鷹鸇不如鳯凰即如引􅅂折檻請劍斬倿臣頭埋輪都亭􅀅壊白麻而慟哭凢􅀂此􅁼疑閣下小之而不爲耳至如明刑弼敎保任皇極以夀􅀦家無窮之脉其次抑邪與正彰善癉惡必行已志不爲利誘障百川而東之囬狂瀾扵旣倒此冝無不在我者顧猶有掣肘之嘆耶閣下昔何所自任今忽諭以乞身之圖㒒之所不敢聞也恃故縷縷辭多率易伏惟恕納而賜聴焉􅄑甚幸甚與黄大叅某啓人岀處進退去就之節不可苟也非但不可苟仕亦不可苟止始者執事由端陽入省􅂂任之􅀄枉棹白沙􅀗聞仕止之言夫􅅸塵歩驟固知其不與凢馬同然不謂得意而徃超然脫其衘勒一息萬里如是速也相逢盡道休官去林下何曽見一人非靈澈􅀉韋丹詩耶流傳世間識者咲之執事真無􅀒斯言㢤病卧山樓聞此信息竊以爲喜他皆未暇論只不爲苟出始終一意進退合義如此扵名敎何如㢤扵世道何如㢤未審何日就道專此馳問伏乞飛示與戴憲副恭聞執事榮拜憲副之命引領台階陪増喜躍不知㣲痾之在體也小廬岡書屋近方粗完四方士來逰白沙者扵此處之䏻使退休腐人暮齒不忘于學猶日與二三子周旋考徳問業其中庶㡬其少有得焉則此屋之名或者可配此山林無竆是亦執事之賜也并此叙謝帕二方表賀忱耳不拒爲榮與胡僉事提學惠曆乆不謝罪罪李山人至􅂪賜相山骨髄等書珍感無已㒒常粗渉郭景純􅌾書愛其辭約而㫖奥反復讀之盖無難暁及乎真形在目羙惡雜陳則又茫然無所區别以此知讀書非難領悟作者之意執其機而用之不􅅺扵故􅁓之難也况此經鄭玄黙所注穴法處謂不得師傳口授終無自悟之理呉草廬亦云提耳而誨之可使不識一字之凢夫立造神妙如其言盡讀堪輿家書不􅀂得其人而問之易了李君經宿别去非乆當囬白沙其人頗謹厚而又爲髙明所與疑亦有過人者第患無䏻深扣之耳承喻欲來新㑹企渇企渇予乆卧衡茅未即進拜則有其説布衣陋儒謬爲王公大人所愛惟恐不自重以爲門下辱矧今士習非古一驕一謟交病天下有識方以爲憂如㒒者縦不䏻捄忍􅂇之乎惟亮察􅄑􅄑又奉别忽已踰年想望之􅀻無日不爾昨者生員易彬送到羅明仲林􅂪庵丘蘇州書札得知先生體况安佳深慰勤企某近又以人事過煩自汗時發畏風如昨閉齋􅅯卧竟日􅅸去思慮酬應以俟此氣之復而已下車之始即欲遣人上問㝷聞徃梧州昨晚兒自五羊囬乃知先生自梧州還尚未知何日得拜見也閩中陳剰夫者先生所知不􅄑去年秋間死矣其人雖未面然嘗粗聞其學術専一敎人静坐此㝷向上人也可惜可惜舊􅀊莆田有一舉人林體英來訪白沙與語兩月比歸亦䏻激昻自進不知其後何如也此學寥寥世間無人整頓得起士習日見頽靡殊可憂也疲極未由徃拜専令學生持此􅀱先生起居别後相遇何人伏乞垂示􅄑􅄑又某啓昨來枉駕感愧無量承􅀉示逰山詩改定次聮又佳又佳上下二句大小氣力停匀自是實事魚鳥亦指􅀮居而言晦庵詩云我是湖山舊主人歸來魚鳥便相親意亦如此或以爲形容道體之言則恐渉扵太深上下承接不來未知是否大凢文字不厭改患改之不多耳惟改方䏻到妙處而發之易者恒不䏻多改比見閣下扵此詩畧不經意以爲當終置之不復改此詩雖不改亦無害但不知其扵他文如何深以不及對靣一扣爲恨後得此􅁓然後知閣下非吝扵改而改之益善日令児軰誦此二句以爲喜昔者嘗聞歐公作一小簡反復改之有改至八九次者歐公期扵言者也其不苟有如此冝其傳之逺也吾人大抵以不專之學方其爲之也鹵莾潦畧而不自知又何恠夫古人之不可及也推之凢事亦莫不皆然盖非止作文一事而已使囬謹此奉瀆不罪不罪拙作末一章属意尤切尚未知何日可遂此約男女一大俗縁比扵軒冕外物誠未易盡湖山之盟信如何也江山魚鳥何處非吾樂地閣下既以此自信而無疑扵㒒望終賜之首㫖與王樂用僉憲以詩之盛莫如唐然而世之大儒君子􅁼以技目之而不屑效焉則所謂詩之至者果何人㢤㒒扵此道未嘗一得其門戸㝷常間聞人􅀃詩輙屏息退聴不敢置一語可否問其孰爲工與拙罔然莫知也比􅀊聞南亰有荘孔易者䏻自􅀣立扵辭不一雷同今人語心竊喜之稍􅈬而問焉果岀竒無窮及退取陶謝少陵諸大家之詩學之或得其意而亡其辭或得其辭而遺其意或并辭意而失之盖其所謂夙生暈血終欠一洗之力而又愳其見譏扵大儒君子終所謂技不可曠􅀊月扵無用故􅅸意不爲凢學扵㒒者亦以是語之而無有疑焉者矣又執事懐抱利噐退處林下者㡬三十年晚用薦者復起爲䑓官岀臨嶺海首舉盛禮酹扵亡妣墓前逺近聞者興嘆不肖􅀌無任感徳愧謝之至一峯先生墓木拱矣執事言必稱一峯豈但思慕之不忘而已亦􅀅以一峯平生念念不肯忘天下卒莫逹之天下者小試之見道之可行耳夫士能立扵一世或以道徳或以文章或以事㓛各以其所長其岀處語黙進退去􅈬不䏻皆同亦不期扵同也執事安扵所遇不求其迹之似其未慊扵用者姑置之以其䏻者用之而益小心焉􅄑甚􅄑甚某病且老無足爲世用或能爲執事紀録一二成績以昭示後代慎無曰人莫知我也過辱厚愛謹此復制中不果自書又惠州孔子廟作者不自爲記而以委諸人某屏棄筆硯事于今三年矣呉秀才請試之不亦左乎􅀦㓕臣死歷代之常堂堂華夏夷狄據而有之非常之變也遇變而死爲君義也爲中􅀦死内夏外夷春秋大義也故大之大之者謹之也文山與張陸同祀扁曰大忠謹書法也今廟于海陽直取文山所存與其所遇拈岀碑之以風勵百代其亦可也不必襲大忠之名與厓山同也拙見如此可否􅄑裁之幣金留面謝奉和佳作三章近以附五羊驛送去不審經目否餘不及與左行人廷弼片腦大惠也前此􅀉示傑作兼喻以風水所冝感慰之極不審比日起居何如秋且盡矣拉何山人駕扁舟岀扶胥口東望羅浮鐡橋之勝遂登飛雲訪朱明洞天此其時乎因想足下䏻飄然自適益覺某之匏繋扵病爲可厭也近藁十數首録在别􅁓早晚東逰則此􅁓或可随行有至飛雲頂且令從者歌之爲我通一語扵山靈也呵呵黄秀才行令犬子專此馳􅀱基茗山蕉貧者之獻于人止此勿􅀏與光禄何子完先生門人乆别想念無已比年承貺不一張秀才南都還又承􅀉到坐几一事老拙毎日飽食後輙􅉂目坐竟日甚稳便也好事者或借出效爲之多荷多荷近陳汝學報子完即日謝事歸矣不知其實非也昔者致幣扵定山者儀多不足非子完誰其􅂇之然以爲求文者可也爲老拙非也諸公始作嘉㑹樓白沙以地參焉耳記者自有其􅀃子完嘗一日在館下顧不䏻以謙恭自䖏掠他人之羙以爲巳有耶竊爲子完不取也子完出處語黙進退之冝子完自知之非老拙所䏻與也獨憂定山先生平生故人或因子完之言而爲斯文留意焉則未免爲識者所議且􅀏之矣故具此白餘不悉與羅一峯大忠祠碑皎皎烈烈見先生之心矣可嘆可賞諸生􅂪薫炙歸來又是一畨人物多荷多荷三峯叙文并諸作實有意思但恐入未得禪耳先生欲理㑹著述及諸外事莫􅀂且打疊令我潔潔凈凈先生平昔所篤信者非朱紫陽乎非全放下終難湊泊是紫陽語否門中有鄧秀才可試問之幹異児也一日千里寧不厭家鷄耶一􅀏餘不具遺言湛民澤孟子見人便道性善言必稱堯舜此以堯舜望人也橫渠見人便告以聖人之事此以聖人望人也吾意亦若是耳竊附孟子橫渠之後彼何人㢤予何人㢤有爲者亦若是文王我師也周公豈欺我㢤區區之意在覧者深思而自得之既以􅀉民澤亦以告有志扵門下者咸得自勵而日勉焉非但爲羙言以恱人也與平湖語連日不如與賔州一尺簡易曰􅀄筮告再三瀆瀆則不告此敎者之事夫豈有所隠㦲承示教近作頗見意思然不欲多作恐其滯也人與天地同體四時以行百物以生若滯在一處安䏻爲造化之主耶古之善學者常令此心在無物處便運用得轉耳學者以自然爲宗不可不著意理㑹俟面盡之民澤足下李世卿書來問守䑓者老朽以民澤告之冷㷔并騰殆出楚雲之山盖以勉世卿使求諸言語之外如世卿可惜平生只以歐蘇軰人自期安䏻逺到賢郎在病可徐徐而來眼中未有䏻奪公楚雲手叚也五月十二日䂖翁書此學以自然爲宗者也承諭近日來頗有湊泊處譬之適千里者起脚不差􅀅來必有至處自然之樂乃真樂也宇宙間復有何事故曰雖之夷狄不可棄也今世學者各標榜門墻不求自得誦􅀃雖多影響而已無可告語者暮㬌侵㝷不意復見同志之人託區區於無竆者已不落莫矣􅄑甚􅄑甚楚雲雖日望囬萬一髙堂意有未安亦未可率尓行也珍重草白民澤進士章乆處危地以老母在堂不自由耳近遣人徃衡山問彼田里風俗㝷胡致堂住處古人託居必有所見儻今日之圖可遂老脚一登祝融峯不復下矣是􅀅託以畢吾生非事逰觀也三年之䘮在人之情豈由外㢤令之人大抵無識見便卑闒得甚愛人道好怕人道惡做出世事不得正坐此耳吾軰心事質諸􅀑神焉徃而不㤗然也耶病中不欲多言􅄑以意推而盡之未可草草也五月五日石翁書復民澤侍者民澤足下去冬十月一日發來書甚好日用間随處體認天理著此一鞭何患不到古人佳處也章自去秋感疾迄今尚未平昔者髙堂未傾病轍叩天願少假之年今廬岡之木且拱吾何求㢤其未忘者衡山一念而已皇皇靈芝一年三秀予獨何爲有志不􅈬其可念也夫其亦可嘆也夫廷實近多長進但憂其甚銳耳子長病且愈曰髙音耗亦無黄巾納婦舘中惟一之與服周敎諸孫海北汪提舉向慕亦切作懐沙亭扵海上此外有􅁱古書院冷香橋之作所費不少恨無以成􅈬之耳民澤在郷安否禍福原扵人情不可不仔細察也謾及之不一一戊午季春三月􅀄二日䂖翁在碧玉樓力疾書與荘定山李上舎囬辱賻帛爲感承口諭比年手足作秋風痺尚未全愈今專托范生徃視未知此生􅀎了此疾否耶聞諸李學録之子數日前謝病䟽已上甚慰翹企自古賢人出處不同世多議之此豈衆人所䏻識㢤太虚近徃來石洞否向揮使處不奉簡因見爲道下懇病中不一不一又不意㐫變太夫人奄棄榮飬前九月龍克温報􅁇又得周文選書連􅁓不勝驚怛仰惟先生孝徳純備不􅄑際此荼毒心死形留何可想儗伏願撙哀自防勉副憂禱某支離之人不堪走哭束芻之忱可見于此惟照察不具與張廷實主事先生門人盗走海上及今不即料理令盡絶後難圖北方信息不到耳竊以爲憂也順徳人謗李世卿由呉獻臣王嶺南恠李世卿由某多言孟子曰愛人者人恒愛之敬人者人恒敬之今之愛人者人惡之敬人者人侮之與古不同置之勿復道矣緝熈携家謁選不過白沙以書來别今有一簡復之昨見范䏻用道定山事可怪恐是乆病昏了也出處平生大分顧令児女軰得專制其可否耶吾意定山爲窘所逼無如之何走去平湖商量㡬日求活一齊誤了也緝熈畏天下清議苦不肯承認耳今此簡與之更不道著一字大海從魚躍長空任鳥飛何與吾事耶謾及之又孫侍御屏置公事千里一顧别後連枉數詩不可謂無意扵區區者惜其所急者筆札間細事某且引之扵道旣有以復之矣又慮薄俗不可處喻人亦難不知我者且以我爲慢㑹間以一言擴之使彼此有益幸甚幸甚又來詩感憤之速足慰所望著此一鞭無難扵天下矣他人讀拙詩只是讀詩求之甚淺何足與語此也抑猶有未盡者更諷詠之千周燦彬彬􅀆萬變􅀅可覩神明或告人􅀆魂靈忽自悟雖拙作之淺陋能以是法求之恐更有自得䖏非言語可及也犬子應科在省百凢可告敎之􅄑毋吝又承示䟦語推之欲其髙反之欲其實用心扵内者如是以示一之亦未灑然讀至贈行之作則歛袵嘆賞不已林郡􅀶何日過五羊不留一字耶舶司昨遣呉瑞卿携所作雲窩圖至白沙題云􅀂個丹青可此翁雲窩自有主人封扁舟一去無消息黄鶴樓前望五峯衡山之興勃然矣未審開春䏻便行否耶湛民澤近無一耗廷實䏻過白沙一話爲慰然未敢必也又陳留市􅀮使不遇陳后山黄涪翁一市傭而巳耳雲谷老人李孔􅁱非吾廷實吾安知吾郡有二賢士㢤得手書讀之喜而不􅄰所惜者拙疾拘綴而雲谷巳老雲谷􅀅不可得見則雲谷之所有者吾安䏻揣摩之而得其真耶獨孔脩妙年如廷實所稱非俛首當世之人也萬一他日徃來雲水之便庶㡬一接其緒論以信吾廷實䏻知人善取友以爲快也把渡人去復此病倦不多及又承喻求靜之意反復圖之未見其可􅀂遂行之秪益動耳惡在其䏻靜耶必不得已如來喻搆所居旁小屋處之庶㡬少靜耳適與容一之論李廣射石没羽曰至誠則金石可開又舉荘子語云置之一處無事不辦此理殊可恱顧今老矣惟日孳孳豈能及也并此告又得正月廿日書百錢自喜貧者􅀃金學能以此自檢其過人逺矣甚賀甚賀斬釘截鐡工夫當自益但須由其道耳由其道而徃無逺不至也或謂廷實氣髙好自是不䏻下人比􅀚與民澤諸作殊有意思未必盡如或者之論也大抵虚巳極難􅀂䏻克去有我之􅀻當一日萬里其它徃來踈數不計也睡起憒憒不多及又譬之謌曲遺響直唐調耳近見偶拈諸作斬新以爲絶倡而何求和者多耶百凢如人飲水冷暖自知老朽所望扵賢夫豈淺淺㢤此㨿景元口告李子長懐集之行恐未免内顧之慮䏻照之否石翁白廷實地曹又數旬來無一的便故不奉問後山不意騷擾崐岡之焚玉石雜䖏䏻無誤傷者乎承示諸作驟看似勝前細㸔詞調欠古無優柔自得忘言之妙看來詩真是難作其間起伏徃來脉絡緩急浮沉當理㑹處一一要到非但直􅀃岀本意而已此亦詩之至難前此未易語也文字亦然古文字好者都不見安排之跡一似信口􅀃出自然妙也其間體制非一然本扵自然不安排者便覺好如栁子厚比韓退之不及只爲太安排也據拙見如此不審然否世卿修志邑中近方下手其行恐在冬春之間厓山之逰不遂約秉常早晩可得一㑹否近稿頗有之倦不多録俟續􅀉又簡復張君席珍足下㒒知秉常秉常知足下故不待面知足下過人逺矣老拙無所爲但􅂅足下軰䏻􅀣立扵世俾斯文有頼􅄑甚􅄑甚􅂪示諸作徤逸可愛但得稍入規矩乃佳耳拙稿數篇録去以代靣語浮謗未息老母眠食不忘甚無􅂓不多及又時矩語道而遺事秉常論事而不及道時矩如師也過秉常如啇也不及胥失之矣道無徃而不在仁無時而或息天下何思何慮如此乃至當之論也聖人立大中以敎萬世吾儕主張世道不可偏髙壞了人也重作别章感感夜坐第二篇佳復時矩對病之藥也蒼梧歸後人事益冗煩暑爲災起倒不供行期尚在後八月也都憲有意催促緝熈廷實只在明年春夏間行耳俟面旣又近來弊邑夜㓂甚扵前日有盡殺一家十餘口者矣地方如此不可不蚤爲之所况有大扵此者乎意欲􅈬省城内求一地頗幽僻且寛廣及此時築室奉老母居之適得白洲口信亦惓惓以此爲言與鄙意正合需者事之賊見㡬而作不俟終日可也􅄑爲我裁之數日後令児軰詣左右聴處分也所欲與語非筆札所䏻盡非相愛深者告且宻之切嘱切嘱又半江改稿翻出窼臼可喜學詩至此又長一格矣前軰謂學貴知疑小疑則小進大疑則大進疑者覺悟之機也一畨覺悟一畨長進章􅀄學時亦是如此更無别法也凢學皆然不止學詩即此便是科級學者須循次而進漸到至䖏耳近稿録在别􅁓别後所作惟此耳緝熈諸稿覽畢還一字章復廷實心契前日半江遣子來白沙拜謝至則仙舟行矣􅄑照又章因起倒傷煩諸疾乗之自汗耳鳴心氣虚損肌膚由是不實得七月五日書承養生在去其害生者章之病多自取由不介意生死故一切任之今則末如之何矣古人漏舡之喻良有以也他日見雲谷丈人試爲叩之曰閭丘之命􅀅懸扵豐干之手屈平數語盡攝生之妙或者知之而爲之弗蚤終亦無􅀘扵漏舡不如探嚢中一丸與之又恐分薄縁淺者無以當之如何書中㫁制平湖去􅈬章亦未敢率爾盖一時事體所関萬一有甚難處者非但欲存忠厚而巳俟更得其曲折詳細是非不難見也别􅁓報􅀽徳純來按治陳􅀖伯死扵道路此扵天命亦何所増損而使人動念耶是豈無害扵生終不如坐忘之愈也又近得林子逢書頗悉平湖􅂂任來消息大都是雅不勝俗寡不敵衆非但所執者古之道祖宗來制典昭昭亦依不得了可歎可歎緝熈此岀固不得已終是欠打筭聞去秋九月巳在告此直圖歸計耳别無分付也秉常想巳􅈬道前承􅀉手䟽賻帛謹已拜領感感歐太素傳好章舊亦聞郷里有此人但不得其詳耳周文都如省託渠一訪雲谷老􅀮竟以疾弗果此老自世外恐亦未易謁也溽暑不審體况何似朋友凋落交道陵夷士風頽靡莫甚此時置之勿以汚筆墨可也又左廷弼遺來白金二十两簡中疑似􅀂只岀扵東白借􅂇之意則㒒巳辭之矣㑹問爲叩其的還一字東白販􅁓失利故不欲受又曩辱佳章并賀儀媿感千萬李世卿行時諸友追餞倥􅘓不及奉簡亦謂與世卿相知不待面安事簡耶世卿闊逹善評文想青燈對榻髙論層出麗澤之益多矣更兾寛廣以來天下不一之善别有贈章勿愛垂示又承示諸作以拙者觀之近體可驟看乆看則别古選􅅻看便不似不知平日與秉常論者何如以吾子之才加以􅆂飬之力乆當得之未用催促也拙庵記文字議論好非拙者可及但不知較扵古人情性氣􅁚又何如也更須自討分暁大作規模不堕落文士蹊徑中乃佳也九月四日章復廷實廬墓詩若未登卷請更作又近作皆已經目詩不用則已如用之當下工夫理㑹􅀚古人用意深處學他語脉徃來呼應淺深浮沉輕重疾徐當以神㑹得之未可以言盡也到得悟入時随意一拈即在其妙無涯毎見所作只是潦草如忙中應事無味可味大畧如此難一二指􅀧病痛處欲告又恐見難而止反爲所沮故不欲輙言耳子長亦未有捉摸撞來撞去不知如何用心也如李世卿平日自􅀒至論詩則以爲甚難不敢出一語亦近方得覺也秉常南亰􅀉來諸稿讀之不䏻竟又不知所養者近來何如也别􅁓録去拙作閑呼子長共讀之懐世卿末一聮以問容一之亦不能了知音者真難得也正月人日石翁書復廷實侍者前柬相逹見漢清嘱勿漏恐倉卒生謗也草率石翁云又半江十詠接引意然有次第前後一一相照求柬所爲作一䟦爲此號者謝徳明居邑之南郭疇昔有桓温少年之習喜其勇扵改革閉戸不出與俗交者四年矣郷曲徃還忠扵門下者也䟦中畧見此意然亦不必專繋其人也若興動和拙詩亦可不必䟦也髙作毎見跌蕩可喜但不知置之古人文字中䏻入得他規矩否如王節婦墓表只以信手冩岀古之作者意鄭重而文不煩語曲折而理自到此等䖏似未能無少缺也何如觀其言可以知其人彼沉酣世味者􅅺滓滿腔又惡可與論此㢤讀漳州功徳碑􅅸句别􅁓録上两山先生一􅀏得便即􅀉去也餘不悉又承屢􅀉示近作得之憂病之中雋永之味咀嚼不來㝷常喜言詩值小煩惱開卷釋然今則末如之何矣合是障得重後與物扞挌非干詩力弱打不破也蔵之篋中以俟他日披閱又文祥兄弟􅁇逝甚可憫也存者季弟諸姪䏻不墜其家業否文祥始從湖西㳺頗見意趣後爲仕進累心遂失其故歩至不得一第而死是亦命也夫人生㡬何徒以難得之􅀊月供身外無益之求弊弊焉終其身而不知悔惜㢤頑姪景鍾最爲老母所愛今之亡也正如來詩所謂柰何柰何老朽此旬來體中頗􅀬甚無􅂓不一一又李世卿承箕也不逺數千里來訪白沙朝夕與之談英偉特逹鄙陋當世欲扵聲利外立脚者非但文辭之工而已期過秋方還嘉魚因便䏻一來㑹否耶又柬所􅀉興壼字韻下五首遣辭寛緩稍就沉著可以望作者之庭矣謂非學力可乎自餘皆不及此至日在病數首近日方􅀉到近作皆勝舊聲口與拙作相近可愛可愛晦翁自云􅀄學陶詩平仄皆依韻閉門两箇月方得逼真自古未有不專心致志而得者更望完養心氣臻極和平勿為豪放所奪造詣深後自然如良金羙玉略無瑕纇可指摘􅀂恣意横爲詞氣間便一切飛沙走石無老成典雅規矩蕩然識者􅀏之台字韻首句以閑字易眠字何如間字韻第二句當改途字韻俯慙作每慙佳目昏筆駑不䏻一一又乆病未脫體猥􅂪督府鄧先生數年知待之厚無以報之甚懸懸也昨承見示和荅督府見􅀉髙作病中牽勉次韻一首少見區區近見邸報亰師戒嚴正求才如不及之時也東山先生爲天下属望不見起取甚以爲疑故末聮及之雖受饒舌之誚所不敢辭也􅀦家安危所繋全視用人如何耳且如我两廣地方雖逺然用人小大得失事體則無二致人才有無顧作興如何耳􅌼指揮可用之才乆􅀍誣在獄人共惜之當道處分如此因循不决下人不免有疑且􅀅以􅌼某爲覆轍而怠扵立事此事雖㣲所􅀜扵􅀦家用人之機當轉移以救一時之弊則甚急也􅀂見督府言次可及無吝一言謂此能分理一人之􅁈尤未也有益扵地方用人有益扵􅀦家不可不慮也切嘱切嘱又得定山三月九日書云扵是月告病不識此㡬發之早晩在考察前尚有一分之􅀃在考察後則更無􅀃矣拙詩云百年􅀅滿日心亂不成詩易曰見㡬而作不俟終日竟何謂㦲據如是殆不可開眼衡山之行吾其可已耶緝熈書中怨非已者云一渉䆠途即爲棄物天下固有棄之者矣章何敢棄朋友也報帖即封􅀉緝熈雖非所喜然不可不報也五月十八日石翁書于碧玉樓雨中廷實閱此簡畢有便轉􅀉民澤可也又省城之遷不决緩急無所歸决恐于累扵人今􅀊創􅁱祠墓凢五處財用竭矣不如且置之近聞緫督之請扵上萬一東山復來地方可以少安亦未可知也廷實念我深不自知其傷扵饒舌昨見白洲憲長問何以不决老朽不敢盡言正爲此也盖有離世樂道如戴簡以居東池之地然後可當弘農公之賜主之以鄭公司馬在康節則可無康節之才與量豈不爲識者所譏乎有可得之􅀔無可受之義取舎之間甚不茍也亮之亮之又承示楊栁之曲情蹙辭盡㡬不可讀樂莫樂􅀆新相知悲莫悲􅀆生别離騷人真得此心所同然耳沿途遇便風得一字爲慰慎無􅀂區區之􅂴也近來弊郷東西盗刼連夜白石譚蘭雪一家遭害馬黙齋軰剥床以膚可畏之甚眼中惟􅌼舜祥可委捕盗一事顧今無可告語者未信而言􅀅不免扵人之我疑况扵欲取一善之長而遺衆疪之短主者豈䏻聴此一夫之言而遽爲之予奪㢤但爲郷里憂盗之至不得已而有言耳見子長􅀉定山先生詩可是率爾定山豈可輙􅀉以詩耶後生且存取謙退此進學之地也仁夫㑹間多爲申覆見示諸作實有意思更不奉字章白廷實從者又前後􅀉到病中志喜及冩懐諸作讀之嘆曰進修在我成我者天也两山先生識量終非時流可比前此廷實不以出䖏之義告豈非惑耶今而後父子間自爲知己他人莫䏻與也􅄑甚􅄑甚漳州功徳碑絶不􅁼時様文字亦一竒也中秋食冷芉腹中作痛連日痛已當爲作絶句詩􅀉漳州託林蒙庵刻于功徳碑隂以彰太守之羙可否俟報又近承􅀉示手稿讀之比舊稍勝莫有悟入處否秉常亦毎有新得大抵辭氣終欠自然廷實乗快時有觕硬處不􅁼此情性所發正在平日致養到醇細䖏則發得又别章告廷實侍者稿通五􅁓看畢煩􅀉秉常以代一簡又秉常近㑹否何乆不聞耗也前承録示贈安指揮詩序讀之令人快意亦一時傑作也章閑居和陶淵明古詩十餘篇一二篇中頗自以爲近之欲録去一􅀏未䏻也廷實近作詩否不必作不必不作道固爾也近看􅀕鱷魚文作絶句云刺史文章天下無海中靈物識之乎可憐甫李生人世不及潮州老鱷魚録去一􅀏又􅀽侍御無病􅁀卒扵龍川其跡可駭不審當道何以處之張兼素一病遂不起昨見李僉憲云此訃得之朱茂恭侍御當是的耗也天道扵善人如此如􅀦家何平生交舊凋謝殆盡聞此殆不䏻爲情也哭而爲之緦踰月乃已􅂓以申吾心而已两山先生近眠食何似服藥見効否古今庸醫誤處方殺人如麻此不可不慎也非乆遣犬子徃奠徳純先生不知柩行在何時便示一字近稿奉􅀉廷實見意承惠書已悉近况行人告急不及奉簡惟心照又右稿􅀉東所􅀵閱病乆轉覺淹淹無以自觧倘還一字以自廣是所望也卜者多云此病至立冬節脫體立冬在今九月二十四日去此不逺今病如此恐未爲的断如何如何只得順受而已此外更無他可仰廷實􅀅安爲我謀㦲淹病之餘􅂓此草草又承欲學詩自古未有足扵道而不足扵言者也學人言語終是舊套子長病小愈曾親見之否耶子長服黄栢不死必且以黄栢爲有㓛諸君爲子長憂黄栢也白沙村裏老人呈縣發去渡船一夫造言百啄交扇亦有數乎㦲數旬來左手足不仁毎扵中夜起坐卜者謂必至大雪前後疾乃可平是亦數也寳安道白日殺人可畏北方信息近復何如民澤還増江非乆龔志明亦還潮地方多虞朋友各散萬一不免避㓂之行柰何病卧山樓如在井底凢有聞但頻示數字切望切望九月十三日章簡復廷實足下送丁一桂詩不可不作􅈬附來登卷石齋書又承喻岀䖏與迯患兩事此重則彼輕足下之論偉矣但須觀今日事體所􅀜輕重大小酌以淺深之冝随時屈信與道消息􅀂居東微服皆順應自然無有凝􅆡孔子曰知㡬其神乎今以衆人有滯之心欲窺聖人至神之用恐其不似也更似他日面論以决之見示與時矩詩痛至然知其不䏻囬矣惜㢤先夫人挽詩不詳善行只如此亦何益扵死者􅂓以紓足下哀思耳奉去􅈋筆書通六􅁓凢書視筆楮工拙固不䏻工也勿訝又廷實守道無求扵人携十數口在路日飯米一斗何以給之使内不遺扵親外不欺扵君進退取舎㮣以義此古人難之非直今日也自廷實别去毎念廷實至此世之論人物者觀其外而遺其内以是爲非以非爲是者多矣在人自審處何如古人不必盡賢扵今今人不必不如古但當日勉其難勿輕自恕此則區區所望扵廷實者不敢不盡也李子長在館中已半月梁貢士告行草草奉此不䏻悉不䏻悉别詩奉懐廷實世卿録與世卿􅁓此不再書又傳曰道在邇而求之逺事在易而求諸難又曰行之而不著焉習矣而不察焉終身由之而不知其道者衆矣聖賢敎人多少直截分暁而人自不察索之􅄅茫求諸髙逺不得其門而入悲乎次韻廷實見􅀉二首其言因廷實而發非專爲廷實也又承録􅀉近稿讀之作者如是豈易得然便謂之然竊恐未然不審廷實自視以爲何如也言詞不能盡人詞氣足以見人有諸内形諸外識者觀之思過半矣故老朽嘗謂文字之學非也學豈在詩耶廷實資甚明敏當以古之立言者自期彼汲汲扵人之賛毀無病而呻吟􅀂是者亦何與論斯理也病中不多及白沙子卷二終
