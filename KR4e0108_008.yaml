front:
  text: 白沙子卷之八
  hash: sha256:d08814cbb738f053a026189cebccb6f43cac7d7b1b70409f2dadad675a4f8d8b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0108_SBCK_008-1a}
body:
  text: 七言律詩寄太虚上人用舊韻衆生尊我我須勞公在吾儒公亦豪數點曉星滄海逺一牀秋月定山髙性空彼我無差别力大乹坤可跌交十二萬年如指掌且拚閑弄在甄陶寄定山影響驅馳等是勞風流今古㡬人豪但聞司馬衣裳古更見伊川㡌桶髙岩徑無風松子落翠屏終日白雲交定山様子從來别詩變堯夫酒變陶封博羅何孝子廬墓詩卷春夏誰開發育㓛直憑天地閉秋冬三緘欲了西涯意諸作還經老手封活水有源終到海逰絲無力秪随風肯将吾道千年計跳入羅浮四百峯重約馬黙齋外海㸔山春風擬進赤泥舟曾約㸔山此共逰落蕋忽過三月半先生能復一來不不堪老我痴猶在且喜嬌児病巳瘳想得渡頭楊栁樹清隂閑弄釣魚舟代簡荅黄大理仲昭先生面目入中年海曲丹青不遣傳尺簡豈堪頻問訊两亰還說舊因縁餘生可試屠龍技畢嫁纔消鬻犬錢九曲棹歌君莫唱千秋誰和武夷仙代簡荅林蒙庵用前韻忽忽浮生又一年圖書老矣待誰傳人非爲巳終無得我與先生似有縁六十懇辭兵部禄尋常亦欠酒家錢武夷九曲君應到争向區區問學仙次韻荅林别駕誰㰱南𬈑一口清惠陽别駕不勝情春雲可待成霖雨空谷還來問朽生毎恨㓛名欺老病閑将律吕寄新聲白頭滿眼知音少却愛夫君盖未傾杖一杖何妨九尺材白頭筋力小低囬西崖拄月翩翩去浦口挑雲得得來原壌見之休扣頸醉郷扶我且􅋦杯一生用底公須愛持贈山僧恐未該與陳聦秋風两見莆陽子皂盖青笻去復囬眼底流年三十許脚跟行路㡬千來未知世事真䏻忘𥘉得家書不肯開若問江門何許見两涯春雨長青苔輓袁侍御九載冝興共太平長官能事問生靈霜䑓白筆冝當路北極中天拱列星眼底两塗分淑慝手中三尺有雷霆却疑夜半龍川雨直爲髙賢洗汗青山齋秉燭話同逰十九年中酒一甌赤縣敢辭烏府召江湖先有廟堂憂諸公不意辰星少百計猶須晚境休何處龍川子規鳥爲君啼恨五更頭近陞憲副翁公以占城國主自海南來省過白沙索和李黄門諸公韻炎氛莫近使君驂清雨爲洗瘴天南聖朝簡卑公何忝長夏驅馳老尚堪林下朝朝還暮暮水邉兩兩復三三忽逢海上夷王過又把新聞續舊談留朱甘節誠庵先生之姪也早從太保學關西三十不官人得知到處自稱西楚客逢人只說李承箕百錢挂杖還雙屨千里低頭但一碑江上竹枝歌正好留君况是月明時中秋與朱甘節白沙賞月呈甘節兼寄其從子玭天壌與君分楚越中秋髙坐白沙庵雖無絲管留人醉且對滄波與客談桂樹何年攀月窟竹枝今夜唱湖南外沙子弟通家舊一一煩君語阿咸元旦試筆六載虚叨供奉㤙白頭吾亦兩朝臣閭閻擊壌今弘治簡冊編年又戊申日色小薫穠李晝風光欲醉乳鶯春廬岡此景誰分付也到江門不属人天上風雲慶㑹時廟謨争遣草茆知僯墻旋打娯賔酒稚子齊歌樂歲詩老去又逢新歲月春來更有好花枝晩風何處江樓笛吹到東溟月上時次韻李子長抵江門之作江門之水流千春玉䑓之山多白雲此山若觧留人住此水應須與客分雲谷丈人終不老舞雩童子又成群去時若問來時見㝷樂齋前對此君送李子長還五羊津頭看水坐成痴天地閑人我却知此日江山𥘉見子向來風韻更因誰春波蕩桞舟難繋暁樹啼鶯枕欲欹江上明朝空引望白雲何處乆支頥寄廷實用前韻囀花黄鳥更狂痴報得春光滿地知千首有詩都寄子一瓢無酒可干誰夜來極飲花神喜江上長歌斗柄欹還憶舊㳺三两軰眼前今古涕交頥得陳庸書寄荘定山族子不須疑用舎定山休更問行蔵千年天地逢開闢一代規模見主張老惜筋骸雖伏枕分甘藜藿也髙堂觀棋莫道無髙著當局輸羸又未量約諸友逰圭峯文都報子病不果行西望蒼崖意巳傾恠來天道與人情雲頭似墨朝垂幕雨脚如絲夜擁綾三約兩違真未信百憂千筭卒無成相看獨有南山老打硬猶堪逐後生與廷實同逰圭峯别後奉寄弄罷飛泉下玉䑓青天何處首空囬城中春雨君髙卧竹下茆亭客未來坐隔談鋒終日笑碑封丹蹟㡬囬開孤舟莫負秋來約同到厓門白浪堆千尋嶺上更登䑓再到丹丘忘却囬雨歇山齋人已去月明江舫夢還來不拚鐡杵唐針利豈乏金箆刮眼開囬首崖山多感慨英雄枯骨漫成堆用前韻寄文都曝日䑓君家曝日有髙䑓君坐䑓中日㡬囬旁舎先生扶杖過平湖縣博寄詩來不知天道晴還雨屢見山花落又開巳有髙人來指點白雲何䖏路旁堆次韻李世卿雨中南北東西眼欲連簷頭風雨夜鳴泉天低鄂渚衡山外人在江門海水邉愛酒時時同李白論詩稍稍到庭堅故人觧致西山鳯想脫漁蓑上畫舡李憲副若虚枉顧白沙别後賦此江門相見忘平生何處長安盖已傾素壁龍蛇騰十丈清談賔主破三更鶯花舊領詩全好山水𥘉經眼獨明不怕長風吹大舶使君一口吸南𬈑偶成秋月朗耀秋風清漁翁自歌還自聴却慙夜半留雙睫早爲人間了六經賢聖當爲天下極何人不共此心靈從前欲洗安排障萬古斯文㸔日星與世卿閒談兼呈李憲副風光何處可憐生共把閒愁向酒傾今日花非前日㸔少年人到老年更秦傾武穆憑張俊蜀取劉璋病孔明萬古此冤誰洗得老夫無計挽東𬈑禮樂猶存魯兩生至今聞者尚心傾乹坤已正髙皇統制作還随漢事更世情逈與淳風别山色須看過雨明枕底白雲閑一片直從南斗跨東𬈑酒醒西岩㸔月生此懐此夜向誰傾百年自信官情淡两耳那聞世態更露飲秋蘭分楚客詩連石鼎對彌明五湖煙水䏻多少更整絲綸釣八𬈑午枕清風汗不生鼻雷打到日西傾東西山色移床㸔六十年光轉瞬更廬阜白雲真太華玉䑓髙閣小朱明丹青若更閑分别老子江門是一𬈑草長津南薙復生隂晴天氣欲相傾短簷風暖偏冝睡古瑟絃髙且莫更有客艤舟留信宿呼児問酒出黎明短衣江畔聊延竚又聴漁歌徹四𬈑病裡風光如隔生泥尊名酒爲誰傾不将蓴莱還張翰也把茅根與率更松下白頭眠卓午沙邉赤脚歩平明安期乆矣無㝷䖏知在南𬈑是北𬈑獨立滄茫笑此生瘦笻㡬尺也扶傾新傳隻屨無多售舊濫吹竽亦小更徃徃詩嚢随李賀深深酒􅊦寄淵明世間未必如公足山有飛雲水有𬈑碧酒三杯春又生偶逢騷客各披傾楊雄織字終誰譲家媪知音却屢更舊管一題都迭蕩新收半卷轉髙明封緘逺寄而宗老月在青天影在𬈑羞将白髮對黄生信未通前意巳傾門静客稀偏足話山廽埭逺不知更鷄鳴桑柘孤村暁日出東南一角明我欲與君同辟榖不携妻子住滄𬈑月下懐世卿時在南山世卿昔赴南山召今見南山問世卿信宿世卿向何處一片南山空自青滄波脚底機全活勾漏嚢中藥褁靈且傍鐵橋携笛上亂峯明月試吹聴寄外史世卿玉䑓两崖樹石㡬重衙冨貴人間未足誇到寺客携元亮酒在山泉煮玉川茶髙軒倘許重過我多病仍便乆卧家對月不禁秋思得清吟分付一籬花病領詞官不到衙老慵無意向人誇四時好景偏留句两腋清風毎試茶司馬雖稱題柱客薛公猶在賣漿家近來山寺多髙興更作詩豪對浣花城扉半掩更休衙客子山中句可誇階下西風吹落葉僧呼童子掃烹茶著書歲晚堪投筆見月宵來定憶家記得西甌舊㳺處滿舡秋雨木綿花江城吹笛月斜衙囬首秋巖寂可誇世外一眠那有夣腹中三斗却須茶文衰東漢無髙手詩過中唐少作家笑殺平原趙公子當年毛薛眼全花記旱用前韻蕭管聲停刺史衙豊穣無復去年誇禾焦百畝還輸稅菊到重陽可泛茶僯壌兵戈悲此役隔村煙火問誰家諸公果觧憂民極肯筭腰金不鏤花得鄧俊圭書舞雩童子亦同逰陋巷髙賢得自求漢老豈非徐孺子宋人何獨薛居州數莖雪報年華晚獨樹風驚昨夜秋書使逺來深有意白雲髙幘岸羅浮九日李鴻兄弟携酒從予登舎北小廬峯四望書所見寄世卿圭峯山愛廬峯節愛名登臨衮衮到諸生千巖已見昏鴉集两榼還挑大鱉行壠稻不收交馬跡寒花莫賞更人情玉䑓此日秋風賦誰敵縦横李世卿六十一自壽世間甲子是何年毋鬂雙皤子亦然十數曽孫羅膝下两三杯酒笑燈前尋僧野寺花迷路吹笛江門月滿舡聖主萬年歌不足黄河清了鳯翩躚孤子今來六十一慈親巳過八旬三旌書門外題新榜拭泪床頭換舊衫少有菑畬供俯仰不妨漁釣老東南些児别作長生計岩畔丹書有兩凾侍御朱先生将還亰再過白沙言别岀示同寅周先生送行詩因附其韻老大師門浪我推飛騰天路是君期兩藩須按兵民籍百姓當懸父母思燭剪山齋曾舊雨盖傾亰國亦多時分携别作無言贈處處還君不暫離臨安守鍾羙宣同姓将赴任過白沙言别岀示荘定山所贈詩次韻崖門春弄海濤髙太守當年共草茅山閣逺煩青眼顧世情渾是白頭交㓛名此去期當道風月何妨坐小舠敢兾千金收馬骨真成一笑擲鴻毛夜半海風來最髙江亭卷我三重茆一林月色暁還在四壁波光寒欲交皂盖忽聞催驛騎緑楊長繋釣魚舠也知竆逹關天命誰把行蔵管鬂毛廷實累約逰崖山不遂世卿在數千里外不期而同固亦有數次舊韻寄廷實海中來覔羡門生雪浪如山故故傾畫舫兩期人不至蒼崖一别歲頻更嘈嘈鼓笛轟雲下弄弄波濤到月明誰道青蓮李居士一槎千里共浮溟和世卿留别韻笑索南枝冷未禁詩情翻益别情深杯中涕泪知郊意手裡推𫾣失島心赤壁去㸔横白鶴大崖不著買黄金山僧許借山房睡只許僧分月一㝷白首山中病不禁百年愚計謾成深四千客路旁人笑去位憂端各此心何限詩留何限意一嚢人當一嚢金江門細路細如線端爲髙軒廣尺㝷代陳汝岳謝李世卿撰玩琴軒記先子當年坐一軒軒中髙榜掲無絃斯文觸目休論價世徳流芳可盡年從此児童堪我誦是何風韻與人傳道旁雖有崖千尺不得名家一字鐫玄真送柑溪園十月摘黄柑歲月将窮致小籃繞膝痴孫髙起舞百年乳酒正開罈色香夲岀梨之右風味真無嶺以南不惜霜根傳藥圃白頭還觧荷長鑱讀丁知縣行状申文後州里懽騰此郡推揮毫今徹九泉知古來士論都元氣天下人心自秉彛太史書須凢例定桐郷愛是長官遺憑君更向郊原問怕有人間未采詩得世卿南安書嶺客歸時一信通匆匆燒燭待開封心知别去千囬折詩長從來一格工大意天開曽點識前塗誰貸阮郎竆世間浩浩閑來徃除是青山不負公世卿寄示經飛來寺和予壬寅秋舊律詩復用韻荅之山寺然燈客欲留客情到此淡扵秋詩篇可續還杯酒行李無多共一牛峽水更㸔東逝急嶺猿那肯晝啼休舊題囬首今如夢巢父猶應咲許由将营土閣使人取材扵海山颶作舟踰期始至喜而賦此颶毋徒懐一月憂眼中材木稱心求老妻洗爵傾紅秫秋浪來㠶出白頭萬里滄波冝逺望四時風月欠髙樓時㢤版築休停手二頃陂田幸晚收秋夕偶成小兒失觧聊以慰之崔顥賦詩黄鶴樓白雲黃鶴兩悠悠江山供眼不知老風月滿蓑還是秋三試吾兒雖失觧一花司馬未簮頭何人乆抱遺珠恨黒觜抽成白觜抽憶世卿廷實用寄景暘韻東西垣竹影交欹坐到芭蕉月上時何處塵蒙春試馬壁間苔没舊題詩一杯脫粟吾将老萬里長風子可覊别有樵夫來歇擔晩涼松下一殘棋永豊劉景惠持吾亡友羅一峯事状來訪白沙道其尊翁程郷宰肅庵願友之意留余舘中數日贈以是詩儒官秋晚謝遲囬林下齋扉不浪開顧我敢辭千古述故人真爲一峯來風流想見雷封下消息通傳雪浪堆明發仙舟聞解䌫屋烏情在莫頻催贈潘上舎漢用前韻東山月上暮潮囬誰遣歸㠶趂月開草屋肻留潘上舎玉䑓還對古如來纔看溪樹交成幄又見秋沙卷作堆半醉贈君歌亦半敎児還覆一杯催予欲爲一峯傳而患無所本其子梁撰事状托程郷令劉君肅庵肅庵以授其子景惠至白沙予将考其事實爲傳無所復辭顧吾文凢吾惧不如司馬可傳之逺景惠行復梁兄弟以詩用前韻北海英風夢始囬誰将年譜到山開忽驚落月神如在却對秋花咲不來雛鳯一群丹穴内殘星㡬點慶雲堆春秋畫筆終難擬天地斯文更著催晚酌示蔵用諸友何處氤氲到此溪香林髙樹望中迷瘦藤拄月秋山逺破褐随風晩䄂低廬阜亦開新洞府玉䑓還是古招提黄柑白酒誰賔主不放今朝醉似泥風清月朗此何溪㡬個神仙𬒳酒迷雲水此身聊起倒乹坤入眼謾髙低因過紫極聞丹訣旋把黄金鑄水提問我何如蘇内翰夜觀赤壁踏黄泥四人把手過龍溪一路梅花了不迷滄海月明三島近白龍天逈衆山低客携卷子抄詩草兒上松枝掛酒提盡日醉眠崖石上莓苔茵厚不沾泥涪翁指點好濂溪老眼青天醉不迷五老峯連湖月白緑荷風颭水煙低無竆光霽還相接太極圖書謹自提懶與時人談此事風流真個隔雲泥賞音無代無須溪我爲諸君略指迷開卷直疑韓愈錯吟頭剛向孟郊低貪脩大藥遺真種争得刀圭出粉提晋魏以前無近體獨憐陶謝不拖泥東溪牽犬過西溪短屐衝烟歩歩迷秋竹苔深人語静古壇松冷鶴巢低山花折去空盈把春酒沽來不滿提咲把長竿弄江月草間郭索尚蟠泥屋上青山屋下溪溪山何處使人迷岩頭老樹排風正門外垂楊拂浪低東渚暁烟縈舴艋西山夜雨落菩提㳙㳙却咲三江水未洗嚴光脚板泥漁翁向夜宿何溪月色蘆花到處迷蓬背風吹黄葉過船頭浪捲雪山低晩來竿綫殊堪弄老去干戈不著提自有平生烟水分何曽軒冕視塗泥丹青不冩武陵溪只記桃花也著迷芳草獨行山路僻白雲相送洞門低咲呼竹笠前頭拜交付詩嚢右手提風月滿山関不住他時須用一丸泥十一月梅開滿溪探花長是𬒳花迷岩前老樹藤纒殺路上横枝竹掃低香動酒巵羗欲㰱影留山月不堪提逋仙此意還真否笑指江門屨底泥贈朱玭還郴陽君過衡山不上山祝融峯在有無間青燈此夜聞長嘆白髪何年許共攀碑蹟我留諸叔乆酒杯誰放世卿寛明朝又别東溟去還著東溟畫裡看得賀黄門克恭書一封𥘉展制中書萬里遼天見起居何處江山還著我斯文今古正関渠傷心入夜思賢母老眼當年識鳯雛濂洛諸公傳不逺風流衣鉢共圑蒲疊前韻寄廼子諮少年誰授訪之書父子元來共廣居無極渾淪親茂叔西銘特逹見横渠各駒獨歩空凢馬一鶚髙飛失衆雛想得趋庭詩禮罷愕然木榻對盆蒲耳目無交不展書此身如在太清居雪消爐熖氷消日月到天心水到渠一一園花都傍暖飛飛江燕未将雛好春好伴須行樂束起松根七尺蒲和元夕客中韻人間樂事此宵同髙坐春風一􅓗中無地張燈聊對酒是時聞雨不開蓬推𫾣一字須公得剪刻千門亦女工厭見乹坤多事在紛紛萬有不如空次韻張侍御叔亨至白沙生死遭逢未可知两生名氏至今疑自陳多病甘爲退肯與閑愁博得衰冷雨侵人呼酒數瘦藤扶老看花遲繡衣未咲茅根秃來請延陵十字碑舊事追惟喜復悲一生羸馬著鞭遲春來花鳥偏留賞老去膏肓更莫醫蘇子瞻家真一酒邵堯夫様打乖詩同歌同醉同今夕絶勝長安别後思次韻張叔亨宿别春草江門緑兩涯隔江人唱浪淘沙好春剛到融融處細雨𥘉開淡淡花僻地豈堪留客乆連床端合拜君嘉明朝愛得酕醄别笑脕藤蓑付酒家次韻鄒汝愚陽江道中見寄㡬畨形蹟落堪輿我亦人間一腐儒遺我數篇風格别思君一夜鬂毛踈未知滿眼誰䏻恕可復竆郷自作孤十二窩中春自在打乖正坐不堯夫春寒江雲将雨弄春寒壊絮中宵褁作團二月北風還浩浩㡬程西路更漫漫忽聞鶯語當窓沸想擬花枝翌日看天道隂晴也無定藥爐且可共泥丸容一之飲僯家酩酊仆地戯作一之少有足疾扶杖山人早拄十年笻勃率髙低笑殺儂拾得田中雙草屐知傾花底㡬郫筒虚空筋斗何妨打造次文章莫浪攻見說緑楊津口月玉山先倒主人公贈曹御史吹㫁南風雨一川畫舡到處是青天公程我枉聊經宿吾道君憂正百年東海病夫身自逺九宵孤鳯眼将穿不知詩史千年下誰與平章贈處篇何宗濂書來推許太過復以是詩後來郷里不如前五百乹坤浪數年何地可扳文獻駕平生願執菊坡鞭泰山北斗諸公地明月清風病叟天竊比聖門吾豈敢汗顔窓下讀來箋題两山居士圖爲新淦李文光大賈盤谷不知何處山君家真是兩山環萬杯春覆酒遺老一枕日髙天與閑水墨殘巾蔵措大江湖前夢說邯郸披圖一笑逢摩詰北沜南垞欲徃還讀林和靖詩集序廟堂不坐周公旦到處山林有鹿麋北斗收名千古獨西湖送老一枰誰鶴知好客來㝷主月爲踈梅岀併詩未肯低頭陶靖節掛懐身外五男兒寄劉東山方伯用送緝熈韻髙山流水好鍾期不是西崖那得知舊雨僧齋勞枉駕秋風薇省近傳詩堂堂白日青天見昧昧蒼生赤子思神爽屡交終是夢㡬時携手咲支離寄謝天錫不了從兼病與貧小廬峯裡白頭新問誰肯我同精舎垂老思君是故人世事轉頭渾覺夢烟花過眼可憐春㡬時來伴江門釣閑與諸孫講舊聞次韻鄺筠巢哭子八旬老眼爲誰枯泪盡家児不受呼天下誰還禁此哭人間春已背公徂肝腸裂㫁詩䏻冩氣力傷多酒不扶正坐两州消息好不違家訓逐貪夫次韻李子長至白沙山轉黄雲信脚行西風吹𬒮五銖輕勝逰自喜多閑日衰病還堪逐後生白髮我因何事咲黄河人見㡬回清看君合伴廬岡睡不獨䏻詩一技成邀馬玄真用前韻閑眠閑坐或閑行身老溪雲病亦輕客至正當秋醸熟舡來莫待晚潮生江山偶得三人醉風月還添一榻清昨日書來張主事頭顱空訝老無成駐屐岡頭望且行轆轤閑轉釣絲輕秋風篙楫來無逺夜雨溪毛剪復生精舎晚開諸老共長江東匯此門清李家子弟雖䏻賦浩浩之歌老更成再和示子長名駒千里始䏻行何許雲霄一羽輕半個先天無邵子㡬回隔壁笑侯生幸逢聖主重華聖遮莫清流徹底清手弄一丸無剰欠山林廊廟總圎成支離病骨此閑行搭颯短蓑何太輕人世萬縁都大夢天機一點也長生借眠春草秋還緑偷賞黄花晩更清莫笑老慵無著述真儒不是鄭康成與子長說詩忽聞有談方伯華容劉先生徳政者因用韻以示皇皇孔孟老于行公履何階是不輕萬有乹坤渾欲動一波滄海莫令生閉門想見衡山大照眼遥分楚水清肯爲蒼生留不去三年方岳豈無成候玄真不至用前韻公來不來客亦行上江舡逆下江䡖空聞此日悲吟在誰問從前太瘦生竹月曉沉山閣冷石壇秋老菊花清人生佳㑹真難必十度商量九不成野菊籬前引客行白牛拖轉小車輕風流有様㸔前軰笑語忘機接後生霜簟夜攤巖屋冷月瓢秋泛釣湍清東𬈑望㫁漁翁地只賣江門一劵成次韻羅冕髙笠短簑吾不疑白頭真結两生知天生男子非無事公是閑人莫廢詩十月酒多留客乆千峯月朗閉關遲夜深自弄江門篴驚起前湾白鷺飛送譚士直春試次世卿韻山藤短窄製蓑衣獸錦長披力不支挿㡌有花羞我老鈎詩無酒送君遲相依緑樹聞歌鳥肯著黄金買侍兒草尾河南俱有䜟不知來歲状元誰種梅晚從種樹作生涯十一月梅移帶花根著不随風偃仰墻低惟信月横斜夢中山我羅浮到雪裡詩誰處士佳君欲㝷梅何處是江門樵路更旁义種樹早雨山泥滑屐牙瘦藤扶路入雲斜東原緑暎西原白一徑松連兩徑花寒夜試㸔殘月掛春風須著短墻遮江門亦是東門地我獨胡爲不種瓜長日山齋不弄棋只憑種樹遣衰遲小将梅逕分枳殻不怕松根奪荔枝帶雨烟光春淡泊隔墻花影晝離披等閑俗計休相聒拄杖來㸔又有詩元旦次榮敷韻謝梅開杏了何疑一節花應一節知拍岸緑波春映閣囀枝黄鳥日撩詩江山若惜開懐早歲月偏驚聚首遲繋馬玉䑓重引望白雲閑與鶴同飛輓黎雪青詩草人收味月亭先生何處獨登灜山雲日暎新墳白齋榜空懸舊雪青到了有生還似寄㝷思是夢不如醒秪應更坐蒲圑破讀盡琅凾㡬部經劉進盛書來勸著述用舊韻荅之一入啇量便作疑可堪垂老更求知追陪水月惟須酒管勾風光却要詩孟子生憂傳道廢仲尼不怕著書遲青天試問東南上何處凌空拄杖飛用前韻寄羅養明工畫竹東西舉踵笑人疑種種邯鄲夢豈知風雨揮毫千丈竹江湖囬首十年詩數杯歌舞嫌春淺髙枕乹坤得老遲聞道一枝棲亦足刺天那肯逐群飛玉䑓次楊敷韻咲倚長松咏晚䑓三三兩兩共無懐人間紫府千囬夢我共黄雲一路來鹿洞當年㝷李勃鵝湖今日想東萊将軍夜半還䏻飲欲引東𬈑入酒杯與楊敷投壷矢戰輸羸更不疑老年精力此壷知君期大捷休疑手我放㣲酡好賦詩三舎避人心毎下一床對此意彌遲乹坤妙用安排外肯放絲毫到奕棋楊敷别後有懐春潮渺渺獨乗槎春雨霏霏别釣沙海味豈䏻甘此客華山真夲属吾家青垂綺陌千條桞紅脫荒溪㡬樹花老脚尚堪逰走在紫藤髙拄赤城霞江門春雨送歸槎破㡌排風落晚沙向暖野鶯猶戀樹感春逰子未還家山瓶免續沽來酒草閣空殘别後花明日越王䑓上望白龍何處杳飛霞贈趙日新還潮州千里徴文到此堂東風歸棹夜相将雨餘㡌頂天如洗花落舡頭水亦香考徳毎勞休講席臨流親爲瀉椒漿潮人共守文公敎趙徳文章獨擅塲送順徳李縣幕岳兼呈呉明府江上清風不卷沙山中濁酒未蔵家數杯送客發孤唱半醉扶吾來小車莫使長官愁案牘當令滿縣種桃花敝居正在廬山下幸不來時路口乂春日偶成蛺蝶飛飛花映窓流鶯恰恰桞垂江岀墻老竹青十箇泛棹春鷗白一雙暖日暄風酣獨卧來牛去馬亂相撞江山指點非無句誰致先生酒百缸贈余進士行簡别行蔵今古漫云云誰把妍媸鏡裡分鄊里論年多拜我雲霄歩武不如君短檠課好都黄甲獨板門深只白雲欲識江門臨别意東風吹面酒㣲醺雨中偶述效康節江門何處遣詩懐風雨終朝閉小齋同社客來休見問卧家人懶不安排煙浮石几香全妙露滴金盤酒極佳半醒半醉歌此曲不妨餘事略詼諧今雨還留舊雨氊滿襟涼氣似秋天偶因門外無來客得向山中作睡仙樽爼喜歡朝暮醉鶯花撩亂两三聮只消詩酒爲堅壘肯放閑愁入暮年山房四月紫棉衣無奈連朝雨欲欺老去杖藜終稳便朝來花酒又淋漓昔賢曽共骷髏語今日寧求俗子知莫笑狂夫無著述等閑拈弄盡吾詩次韻李憲副留别一莖白髮未生鬂四尺黄金猶帶身歸去且㸔湖上月相思還慰嶺南人情関逺别詩難冩花不䏻言鳥爲申紫陌朱門天上事華山都道不如貧次韻薛㢘憲見寄華衮之褒非所敢當惟喜詩律之嚴整命童子作越聲歌而和之耳謹依韻一首録上不俟傾盖之愛與區區頌禱之忱一寓于此惟髙明察之嶺表生民澤可涯九泉吾恐躍枯骸豁開天日驚人眼措點江雲詠此懐弄釣不生鯨尾浪入山休攟鹿門鞋松根坐滿廬岡月夜引壷觴望泰階承白洲李先生見惠白米蛇酒香茗諸品不勝榮感用韻以謝舎釣開緘緑水涯偶來雲水弄衰骸即炊雪粒供朝饌便冩蛇漿放老懐海上旌旗頻照眼城中塵土未粘鞋廬岡此日還精舎賔主何時更两階次韻劉程郷至白沙七月紫蘭開我家是誰醉挿滿頭花千峯有客同文酒三日無錢落畫乂製錦手将龍𥙷衮釣魚舡載月横沙人生出處各有意敢向秋江問去車九日小廬山示諸友九月風光滿薜蘿一年天氣最清和泛花琖小潘郎醉擊壤聲髙葉子歌東海傾心狂措大南山當面老頭陀謝生愛卜葵根宅說道葵根月更多九日下廬山秋風浩浩洗芳㽔瘦盡千峯雁始飛南海一波長不定西山半面却疑非醉拈秃筆題蒼壁咲挿寒花弄彩衣樂意滿腔推不去狂歌待得晚鴉歸奉陪方伯東山劉先生徃厓山舟中作且作東山管病翁乹坤今古笑相同髙松落落都擎日寒水𥻘𥻘又起風附子大黄天下藥虫妖䑕恠世間兇數聲鼓角滄𬈑暮竒石舡頭鬼拜公東山至崖山議立慈元廟因感昔者夢中之言成詩呈東山海上一陵何處封劉翁今日問陳翁天翻地覆諸王世草死崖枯十月風慨慷尚餘精爽在依稀猶作夢魂通江山指點真還我棟宇啇量果待公元日有懐楊榮夫示陳東淵今年酒不對榮夫來歲東淵對我無人結静縁依嶺屋日浮春色上桃符哀鴻呌月今何向野鶴穿雲不受呼老得身閑須愛惜蚤馳虚譽費支吾代簡荅林蒙庵先生空山歲晚未逢君天許窮交只白雲賢聖中庸非我夢東南風月可誰分浪求去馬真堪笑欲報來鴻未有因千古遺篇都剰語晩生何敢復云云蒙庵問所著書次韻興化王太守諸公㑹飲顧通府宅見憶白沙聮句兀兀騰騰且白沙鐡橋歲晚未移家子規枕上無人喚枳殻江邉有酒賖萬物有成寧免壊百年無喜復何嗟漁翁欲語滄𬈑外安得諸公共釣槎次韻顧通府儗歸索和章山居還有事權無童子朝朝告水符我得此生真得矣公知人懶不知乎一春花鳥篇章廢萬里雲霄羽翼孤惟有白龍池上月夜深來伴老樵夫眼中魚鳥異飛沉天損真誰不受侵别駕何須稱我病諸公那肯借人深三年入報天官政再命來腰刺史金何許幔亭君欲去虹橋跨月㡬千㝷次韻吳獻臣明府白雲流出一溪閑照見人間咲咲顔年少不妨投筆早路危須信著鞭難乹坤許我具隻眼名利真誰破两關千古伏波如白日等閑猶謗載珠還千古聖賢孰與閑頴陽剛好對啇顔看來彭澤都無累㱕去紫桑便不難踏裏嬌児方偃蹇登髙贏馬怯間関思君坐歇江亭雨何處蒼煙鳥欲還小酌次韻清齋不厭紫芝貧夢裡衡山欲借春日麗好花花當妓水流孤月月随人香醪數斗過伏臘髙笠一流無主賔醉睡不知春事晩風飄紅雨點苔茵散髪老翁歌飲醇飲醉天氣正𥘉春鶯花歲辦千篇課風月天生一様人不腆杯盤由老婦極踈言貌接親賔香輪不輾蘼蕪破又長溪頭㡬尺茵次韻世卿贈蔡亨嘉還饒平大崖居士此彈琴誰繋孤舟緑渚㝷滄海我真忘僻逺雲山公肯到髙深䑕肝䖝臂都㱕幻雪月風花未了吟滿眼欲知留客意廬岡孤月正天心林子逢至白沙作示之舊雨還君紫菊詩秋風過我白龍池應看衰俗人情破肯放中流柱脚欹弄影果誰非稚子請纓正自不男児人間若問逍遥化紫極宫中有一碑世卿赴順徳呉明府之召五日不返詩以促之何處千杯一放歌楚雲剛好共婆娑百年㡬見都難說一日三秋不啻過索笑梅花催拄杖照眠山月滿吟窩髙栖逺卜衡陽下却到而今夢更多今雨相逢聴此謌江門漁父老婆娑紫霞酒琖千囬醉黄鶴仙人兩遍過這莫支離親藥褁何曽造次出眠窩廬岡凖備明朝飯小市津頭蚌蛤多一之夜歸自楚雲䑓失足墜䑓旁溝諸生拽出之予聞大咲與世卿各賦詩唁之力危掉却手中笻正賴諸公救得儂横加㫁岸懸雙足滿吸清溝到㡬筒綿力不禁心轉怯衰年長苦病交攻無端輕洩天機破䏻躍䏻潜果在公次韻顧通判夜泊江門見示病裏春秋六十更酒杯無日不淵明還将白髮供人事自許青山不世情版籍又勞今别駕風花帶管老先生紅蕖緑浪江門路肯放孤舟半夜行送羅服周觧館戀戀江門愧爾曹不離酒處見揮毫等閑歲月抛鉛槧不賣聲名到桔槹㡬個児童供白髮一年燈火伴青𫀆看花肯續春來約莫待黄鸝辭碧稍㝷梅飲李鴻宅用服周韻應有花神候水西暁林香霧隔窓迷君謀萊婦肯沽酒我愛孤山來杖藜香影句中無樂府梅花村裡有招提東風未到春先到莫向南枝著眼低次韻顧通守到處䏻開觀物眼平生不欠洗愁杯窓前草色爛凝緑門外波光月蕩開歌放霓裳仙李白醉空世界酒如來春山㡬幅無人畫紫翠重重疊晩䑓留世卿飲用前韻大崖居士且徘徊老婦家中喚洗杯園花當檻春饒咲竹洞封雲晝不開一冬莱飯留君住萬里風舡破浪來若比詩情似坡老楚雲䑓是妙髙䑓與雷震東何處黄公客欲還黄公山亦小廬山徃來雲水兩三軰粧點春風花桞間岳色暁行湘浦望湖光晴到洞庭㸔有詩都點逍遥送九萬扶揺一日摶與雷震陽近午黄鸝鳴樹樹深春紅雨落山山誰開燈火書帷地郎在丹青畫幅開醉墨收歸湘篋冨狂詩抄與郢人㸔墻隈只欠梧桐樹髙翼還随老鳯摶與李嚴野鶴将雛到海還楚雲歸夢㡬郷山羮墻見我三湘外歲月還君五嶺間杏苑不禁春意閙羙人争捲繡簾看長安莫買乖崖醉太華長留睡老摶次韻顧别駕江門夜泊雲卷晴波千里白㠶收落日半江明遥看煙際樓䑓逈不受人間鼓角驚碧玉偶逢須著眼黄花已過更揮觥眼中别駕如君少傾倒尊前接後生次韻伍南山賀碧玉樓新成脚底江山不浪開小樓占此是天裁光流南極窓前枕春滿東𬈑掌裏杯碧玉乆亡今復見白雲朝出暮還來梅花又報羅浮信月上江門載影囬百尺空中天眼闊三更月底夢詩成安排枕几還公睡已有䦨干信客凭郷里過從盧行者海山或遇羡門生當年碧玉無留賦何處青雲更擬凌再和碧玉樓韻乹坤真妙此䑓開一一皆因造化裁意了梅花難著句眼空江海咲浮杯未分無極源頭在誰畫先天様子來碧玉樓中閑隠几千千山遶文川廽讀世卿藎卿挽五羊鍾狂客卷次韻李家兄弟各才良誰爲酬知水鑑光天地好人還自好古今狂者豈皆狂碧油帳遶青絲鞚紫錦嚢封白雪章萬里平江䏻送我十年燈火夢淮陽次韻見訪春暁不扄岩上扉遶䦨紅紫欲開時花來勸飲誰禁得天不䏻歌人代之滄海匯爲雙帶遶青山髙起百重圍赤坭居士來相訪䄂取雲笙月下吹飲酒酌酒勸公公自謌三杯無奈老狂何坐忘碧玉今何世舞破春風是此蓑一咲㓛名卑管晏六經仁義沛江河江門詩景年年是毎到春來詩便多君莫停杯我爲謌我今忘我是誰何避人懶弄舡頭笛對影非無月下蓑廬阜春雲眠華岳江門秋水釣銀河竹弓挽住閑人手漸覺年來射鴨多再依韻荅子長罇酒相逢喜欲謌眼中人物又如何山光開户青遶几草色停舟緑滿蓑東泛與公剛到海西逰去我莫踰河古今勝負弹棊手閑笑人閑局面多聴到人間寗戚謌馬周無病謝常何江邉野艇眠依竹日出東山催著蓑自古或由詩入相如公真有口懸河山樓盡日同揮琖花落黏罇晚更多逍遥華頂放仙謌華頂不登君謂何仰攀明月天㡬尺中借狂夫地一蓑亦見軒轅來鑄鼎不聞夫子嘆臨河赤城路隔芳菲㫁一醉碧桃春更多張主事報林縣愽歸過五羊用飲酒韻太白峯頭太白謌太白不歸天奈何風雨驚囬一塲夢江湖拈起十年蓑山僧借喻葫蘆纒武帝收㓛瓠子河若道維摩元示病老夫當日病還多張地曹見和飲酒數篇復韻荅之若比漁翁别調謌不将遺響弄隂何徃來釣瀬生春水多少歸人著舊蓑學士有牋飛紫禁張東白上䟽乞歸東山無計謝黄河劉時雍修黄河閑人只謾閑料理春雨階前草又多将至廬山有作和呉兆麟欲翕還舒雲以之半隂半晴三月時君謌一曲來陶謝我把諸峯坐武夷岸夾桃花蔵釣石春來江水入園籬孤山蕩破廬山影看到廬山㡬丈詩和景孚逰山樹底樵歌鳥欲飛澗邉苔色上人衣碧雲洞杳春蘿合紫蕨山深舊路㣲問我行蔵今老大伴人逰走只童児采芳莫道無年少領得濃香滿䄂歸青雲偶共白雲飛白雲閑暎山人衣一路風光春淡泊隔林煙靄晝霏㣲江山到我無前軰造物磨人是小児花下一壼休㵼盡明朝留得送春歸得世卿書訝其太略曠年爲别此封書應是山人半醉餘海月開罇聊復爾楚雲囬首問何如春來㡬處藩籬破老夢千年木石居笑割衡山共君老黄公何處且茅廬黄公世卿住處山名荅世卿書報荅還山第一書筆端有眼咲談餘行蔵付酒君亦醉兄弟論文我不如髙榻忝同他雨坐西山剛對此溪居因君料理安身䖏多少人間未結廬追和劉文靖偶得韻千峯賖月飽清真到處風花對賞新菊徑豈無蓮社酒逺師當與長官親經綸誰試期年手著述空嗟百代人安得畫師深此意不将朱白浪描春三復遺詩有訂頑月中顔色見松關頭顱夲自成三極嘘吸猶堪塞两間老至不知何歲月古來無恙此江山莫輕語黙論前代天與閑人賸與閑呉明府約過廬山不果使人送菊酒至用世卿韻荅之合是先生酒處偏菊邉月下不成眠児謌野酌三杯後花近藜床二尺前大塊了空無極眼濂溪分付小圎圈長官觧記廬山否略欠廬山一日縁次韻顧别駕奉寄彭司㓂序云别駕顧勉庵聞司㓂彭從吾先生得請致仕還莆賦近體詩二章賀之謂僕受知於先生者不可無言旣示之詩尋又以簡來促因述所聞附其韻爲和荅之謌非所欲聞於司㓂者也今代爲官到六卿閩中此老最光榮面前路闊身須退闕下人嗟代有名晩秫還家新釀熟溪鋤試手藥苗生相看不厭壼山好笑拂松根坐月明二䟽誰叅漢大夫都門今賣送歸圖豈無經濟酧當宁已道頭顱非故吾自古㓛名関寵辱㡬人廊廟不江湖木蘭之水清無恙以配先生不可乎嘉㑹樓用顧别駕韻奉荅熊侍御逺之非有近非無草色花香造化模俄頃咲談飛鳥過丹青樓閣爲公扶煙霞舊隱移匡阜水月新墪有鑑湖若個江山可蔵拙幸來相賞莫相圖夀王松坡用西涯韻清戎王侍御父雪晴騘馬自知津誰道梅花不是春玉節趍歸生日酒松坡未了白雲身父子箕裘真有是江山冨貴小看人徃來獅子峯前路洞口榴花㡬度新待黄太守見訪時當考績入亰端陽春好是公開公莫朝天不放囬肯來嘉㑹留一日更傍梅花勸㡬杯踏歌漁父江邉醉吹篴仙童海上來問我擁旌何處客畫舡撑月此徘徊病中冩懐世間賢智皆青瑣海上田家只白雲多病一生長傍毋孤臣萬死敢忘君諸公莫要連章説先帝曽将短䟽聞何處擁旌來勸駕買羊沽酒惜殷勤緫爲㓛名欺白髮不将冨貴薄秋雲雖然乆病無官况毎拜名香祝聖君九十萱親誰待老㡬莖竹主話空聞定山何處無來耗惹得江門夢寐勤送左秀才次韻脚底千峯不作難天涯相望㡬間関孤村水月䏻看客一路梅花直到山畎畆未應同我病乹坤那肯放人閑東南更有春如酒肯到明年二月還雲蘿處士挽詩誰開三畝卧雲蘿洛下元稱安樂窩風月尚留詩卷在經綸只放酒杯多身将沙鳥還賔主情擁山花當綺羅四十五年成一夢乹坤囬首悵如何次韻汪御史留别百代文章百代儒小将碧玉賛黄虞功名路上多塵土桃李人間見此夫頃以髙談知識量未聞俗態是規模不因指示晨雞唱白日誰知有两徒張生以詩來謁次其韻荅之閑坐蒲團㡬個穿晩留一影畫漁舡日長睡榻千峯裡春近柴門五桞邉在處雲山皆我樂後來衣鉢是誰傳諸生莫有登瀛歩愛結而今病鶴縁八年春部書復至顧别駕以两司之命來勸駕用舊冩懐韻賦詩見示荅之恰恰啼鶯𥘉變樹翩翩官騎忽穿雲杯觴花底香迎客鼓笛樓前閙送君老態一時都共見公謌三疊敢相聞白頭空有丹心在北望天遥敢戀勤名敎可尊誰敢後少年空有氣凌雲得終殘喘留将母直擬孤誠死報君俗變唐虞今日計徳光堯禹萬方聞太平何處無歌頌卧聴蒿萊撃壤勤贈林府尊收歛精神入太清藉茅無計遣書程两三别駕風随動十數花封月最明露冕江山無愧色攀轅天地有真情東風欲别仙城樹滿路啼鸎是頌聲夀月溪翁爲順徳主薄張如玘花影揺溪水半篙晩風送上釣溪舠乗流曵轉波間綫擊楫歌翻月下騷元亮此生惟盞酒瑶池何日更蟠桃僯封主簿徵詩急再拜江門致幣勞次韻鄺筠巢早春見寄城郭塵埃不到身扶溪㸔老百囬春里中物態渾非舊墻外桃花只賣新此老直於三代見諸郎雖在一官貧楚天何處堪囬首目㫁襄陽不見人次韻王樂用僉憲見寄七十餘年未覺新躭眠猶是向來人春杯斟盡啼鶯外晩笛吹殘釣渚濵人世謹防開眼錯此懐得恐到頭真青山果是無心出何處眠窩共卜僯次韻孫御史别後見寄冥冥宇内繆相賢處世如撑石瀬舡赤土喜逢三日雨清談留到二更天山中宿鳥知投樹水底潜魚不離淵明日畫舡賔不顧襲龍翔鳯有來篇白髮滄波了歲年偶逢佳客話延縁鳯毛五色能驚世駿骨千金表好賢索莫杯盤津口月掃空雲霧水中天寧知此地千年下追詠䏻無千載前次韻張侍御叔亨見寄月出不扄溪上門白頭漁父向人言扁舟自唱濯纓曲四海共知明主㤙小飲未嘗沽市酒狂書時復弄茅根相思也有䑓官夢夢見當年住處村家國不分無二門君今與我皆忘言五倫首重君臣義一體元同骨肉㤙長養嘉苗休失實剪除惡木不留根他年我見張文獻異代風流嶺外村北溪容球來訪荅之孤月正酣東閣睡清風又到北溪舡㸔君逈出諸容右問我何如十載前劍氣燭天堪引望桃花照眼未須憐山中碧玉仙家物已証先生作睡仙三月風光遍海埏誰家園裏棹觚舡一身􅝂理三杯内萬古乹坤半醉前㡬度寄書言自愛何人挈榼荷相憐自從托契中山後却笑地仙是鬼仙鄧俊圭喪兄慰之毎恨思君不見君一哀何處隔秋雲客來毎及難兄問訃至那堪故友聞碧玉三年空枕塊廬岡四尺自封墳青天㡬度㸔明月骨肉無言兩地分次韻王叔毅弘行人見寄駐屐花邉聴鳥音青山何䖏想登臨肩頭伊尹方䏻任脚板鴟夷未了心歷歷更冝觀徃古炎炎何敢羡于今相逢杯酒喜共醉相憶詩情還自深髙棲何處可迯名說著衡山便有情不住三年思乃舅可無一字寄金陵􅏘衣豈是無髙論若水還應作貴卿他日五峯供我粥不知誰是老門生次韻余行人濂見訪年富豈知行路永眼髙猶喜閲人多荒村古木雲長鎻白鳥青天水不波老竹忽㸔髙鳯下短墻無筭小䖝窠憑君寄語東山道神禹無功在九河贈劉秀才江門舊雨長公詩今日江西學者師弘治以前無此詔宫墻之内㡬人知詩書豈但供時好進退多應與世疑百歲光隂同轉瞬老夫雙鬂已如絲次韻荅張天祥秀才一處尋芳九處空逺随溪舫訪溪翁請還几杖歌春鳥學製綸竿弄晚風㡬樹江山憐晩暮十年逰走羡児童張生來問衡山道又問衡山孰我同次韻孫御史擬弔崖瞬息人間三百年尋常興廢不須憐羗胡此賊真無頼中國何年壊守邉信國不來知有罪魯齋當仕豈忘天太空不語乹坤病萬歲千秋老泪漣容彦禮率諸弟同在館下彦昭彦禮彦貞相繼而逝彦潜今又卒感而有作水光山色兩依然不見當年載酒舡老我交㳺踈後進君家兄弟散朝煙兩峯彦昭號脚蹟今安在彦昭常逰永豊江浦謁羅一峯荘定山彦禮碑詩乆未鐫某欲爲彦禮墓誌未刻莫道江門空識我千秋遺話及璣璿悼彦潜用原韻山樓耿耿夜燈然誰借東良一日舡泪逐花溝因暮雨愁迷䳌樹慘朝煙養生有命妨新學入社無題侈舊鐫茔次若将昭穆定九原新兆有東璇次韻劉少叅嘉㑹樓一曲江邉一小樓滿川風雨夜來收扁舟東泛桃花水香徑旁通杜若洲樓下脕蓑眠翠浪樓前揮𬒮揖浮丘公來二月春多少两度詩筒向此㳺天氣𥘉炎過此樓江邉春色未全收煙消垂桞𥘉凝岸風逓平荷尚隔洲破屋數家還碧玉好山何處更丹丘兩公勝㑹真難遇結綺臨春是别㳺寄李世卿再過湘江踏浪過一㠶西去傍煙蘿家臨漢水心無住人到衡山興亦多豈是兵戈愁阻絶不因婚嫁笑蹉跎白鷗肯信閑於我也觧忘機浴逺波湖北竹枝髙自歌釣絲千丈引垂蘿煙霞脚底真曾到歲月人間頗厭多雲水與君終浩蕩題緘寄我莫蹉跎秋風脫駕衡山下共泛清湘明月波次韻張東所元旦見寄未到朱陵古洞門一封先荷沈公㤙睡竆殘臘還憂病吟倚東風欲㫁魂紫盖不知誰是主青天無盡鳥空鶱山人只合山中老一歲桃花種一根再用韻荅黄大叅見寄數篇何䖏好懐開疑是江門得意囬嘉㑹樓前曾駐節芰荷香裡小持杯急呼童子燒香讀重遣黎生送酒來咫尺端溪不䏻到只憑清夢與徘徊别來幽抱不曾開長夏思君日㡬回使我䏻吟白雪曲須君共對紫霞杯彫枯老鬂尚未已狂殺春風肯再來莫爲廬山動髙興紫薇花下少徘徊荅鄧督府不見如今五十年賢關風韻想依然衰齡我有無窮朽督府公通第一箋願托經綸均嶺海莫辭将相作神仙孤山鶴啄孤山月不要諸司費俸錢次韻臨汀鄔先生水滿江門弄釣時一篇誰借病翁詩忽聞天外舒長嘯都與人間作廣基海月偶紆南斗望風光未遣北人知欲知此後相思處千載神交在舞雩贈童子乆住侍父入亰還著小坡随長公天葩未吐孝經通青襟誰不羡童子白髮我徒成老翁曝日家聲從此大凌雲氣魄盖人雄曲江清獻郷先逹敢道後來無此風三贈文都小住江門四十年隔波相應荷相憐窓開四面客通刺酒覆三杯月到舡身上紫𫀆知有相畫中碧眼亦真傳明朝庾嶺髙囬首萬里晴波正接天静軒次韻荘定山崆峒道士岀山頻還入崆峒作主人當說夢時都是夢未逢真䖏更求真團蒲坐破千峯月信手椎開六合塵無極老翁無慾教一畨拈動一畨新次韻奉荅廷賛别駕王先生見寄年去年來年復年浮生此夢尚依然不知草閣千峯外坐到蒲團㡬箇穿馬跡交時駑亦進鳥鳴哀處鳯還遷兖州别駕憐同姓不欠人間二頃田次韻梁平樂見寄江山吾愛艶陽天花桞青紅共一川眼底秪應無外物筆端何病不䏻圈㡬畨作夢因何事兩度傳緘莫有縁共語喜逢丘御史沉痾端爲長官痊次韻荅太虚上人雨過山中百卉寒人間囬首又春殘徒聞有病肱三折未試囬生藥一丸石洞棲賢終苦節太虚持律最清端年來雖闡蓮經敎却與無言是一般次韻沈督府見寄誰是朱陵洞裡人世間此畫合描真一瓢未醉山中聖七字先傳筆下神青玉有期看我老紫芝無語爲誰春還公一岳一萬丈半點飛雲是近僯不住東南四百峯鐡橋山淺笑迷蹤喜聞世外無塵地來伴巖頭掛月松藥鼎便分煨芋火道人元是賣薑翁先生數上衡山頂紫盖峯前望白龍壽呉黄門母何處思親錦卷封荷花髙映壽顔紅喜看還雜來天上不覺依稀是夢中㡬歲風光依北極半簾月色見真容不辭頌禱遥相賀却對江山語未工用筠巢翁韻兼呈翁酒處䏻歌未盡陶還從酒處說功勞毎因興去開三徑日對花來醉㡬遭春意滿腔成浩笑花神覿面見揮毫南山向晚無真意只謾悲吟也未髙邸報劉亞卿先生以今冬十月得請還東山喜而有作衡岳五峯青貼天諸仙髙歩碧雲巔特書八字非常見遣告三生是别傳一壼想共朱陵酒七字先哦紫盖篇紫盖山名今夜江門看邸報東山元與岳相連和荅李子長見寄賢聖由來病有之那堪一病屢移時心寛不怕思眠早性慢終應得老遲白首喜同湛雨坐青燈細話子長詩定山却喜劉文靖賢軰如何都不思次韻荘定山曲阜道中曲阜之民如崇陽五畝之宅樹以桑太牢不驚天子詔百里豈負聖人郷争得緑蓑挿羽翼可憐白髮來羮墻先生也未忘洙泗獨立源頭一詠長次韻荘定山謁孔廟六經如日朝出東夫子之敎百代崇揆之千聖無不合施之萬事無不中水南新抽桃葉碧山北亦放桃花紅乹坤生意毎如是萬古不息誰爲㓛卧㳺上㳺荘湛民澤上㳺洗足意如何到我來時還放歌秋半冩空迷菊酒月明舞爛釣江蓑閑将野馬爲賔主笑把山花當綺羅人道上㳺真個好上㳺固好遇人多黃雲之髙髙㡬何黄雲山人發浩歌短響入雲白雪曲長裙拖地赤藤蓑黄鸝自愛蔵深谷野鶴髙飛出罻羅山路相逢休問訊山靈掩口笑何多次韻張主事荅鄧督府萬古人心萬古天江門漁父笑空眠幸逢嶺外千山静共荷䑓端一老賢群趍豈尚班行簇羙譽當令世代傳却憶東山天下望不留今日鎮三邉撥悶漫書撥悶江樓病有詩詩成即事直堪嗤江山莫嘆無前軰造物何嘗不小児物遇歲寒形自性天于定後見真機大易發揮群聖逺碧玉山人近有詩自怡堂爲増江湛演題民澤世父也十畒林中半是塘一蒲團卧花中央百年真樂超人世萬􅊤清風在此堂洗足正當鐡橋水振衣小坐黄雲岡四百影斜孤頂月任是神仙也括嚢丁長官祠秋祭示里人蒼凉月色皎秋晴海濶天髙思巳冥當日疲癃均乳哺于今畎畆盡墻羮一詞巳表桐郷愛列傳還須國史成霜耀星華朱鳥上水涵山骨鐡橋清夢荘定山遣使來問夢中以詩荅云定山歸後再清康夜半呼児喜欲狂夢遣長鬚來問病故應早歲見羮墻文靖一生随老筆太虚四大作禪床南北地殊生異世先生何處問行蔵暁枕碧玉山樓暁枕眠獨吟樓上笑陽關人世誰爲児女態道流空說化形仙衡岳開山秋正好舂陵望岳地相連碧雲野路無覊絆五尺丹藤两屨煙荅雪齋先生惠曆滄波老父多閑日碧玉先生著破巾一榻乆便深谷卧百年長借内䑓春新書毎用知時令寵貺多應及里人鶴舞雲飛皆得意坐㸔百粤盡歸仁次韻吾縣慱見寄黄菊開時霜滿林山風吹冷薜蘿襟肯忘沂水歸時詠也到廬山酒處㝷自得不須言有命太虚元只是無心白頭不作人間夢一笑江門契亦深次韻鄧督府見寄眼㸔百物随時過路有千岐到處多想見精神官裏坐不離文字手中摩白衣管領千峯醉黄菊啇量九日謌堯舜浮雲無一點廬山何敢更嵳峩衡山和李子長見懐欲過江門新詩把讀大開懐乆病諸生擬到崖身上緑蓑都舞破雨中黄葉忽飛來酒逢菊日何人送月照柴關毎夜開廬阜歸來見束髪華陽巾好爲公裁秋來風月不開懐暮遶朱陵百丈崖青玉拂開壇上舞紫鸞搏入手中來野心雲水潜孤笑老眼乹坤病一開誰道李家無子弟紫冥句在不堪裁再次韻荅子長懐極開懐是惱懐捉君手拍到天崖杖挑南極星随去人到西山鳯不來乆坐或聞仙馭過登髙時見洞門開誰知山石書題遍笑倩何人爲緫裁次韻汪鼎夫侍御夀母生日可恨白雲無羽翼白雲朝暮在江南君親扵我皆無盡忠孝須君两不慙錫命有封當第一折肱治病不論三髙堂夀斚重陽近又借黄花一度酣次韻吾縣博登嘉㑹樓見寄醉下江邉百尺樓浩歌一曲有陳留想當詩舫忘眠夜正是廬岡見月秋青紫要途何足顧江湖豪氣未全收去㝷野馬氤氲地即是人間第一流贈林敎諭汝惇舞雩聲響在春殘只隔人間㡬片山偶此通名秋竹院共君弄艇蘆花湾常於嶺右觀諸夏剛𬒳梅花送一寒普贈乹坤唯一點萬古長留宇宙間贈鐫者何侃一鐫一字一磨礱萬歲千秋感激同未蠟碑前元属我到書丹後却須公萬里雲霄囬鸑鷟滿池風雨舞蛟龍不知費盡閑心力誰傍斯文與計傭贈何侃如潮州刻三利溪記用潮州寄韻咫尺荆州地肯容清光偏照蓽門中獨憐孺子才堪賞不道詩人巧更竆已見千門傳好事可辭束帛聘鐫公潮陽父老如相問爲說周陳共此風聞緝熈授平湖掌敎偶從道路得行蔵南北音書又一郷溟海心情真自逺平湖風月可誰将山中舊坐香根老耳畔新聲木鐸長衰病未知何日起扶留窓下正抄方詩罷憶世卿廷實用前寄景暘韻東西垣竹影交欹坐到芭蕉月上時何䖏塵蒙春試馬壁間苔没舊題詩一杯脫粟吾将老萬里長風子可羇别有樵夫來歇檐晩涼松下了殘棋次韻廷實示學者樹倒藤枯始一扶諸賢爲計得無粗閲竆載籍終無𥙷坐老蒲團亦是枯定性未䏻忘外物求心依舊落迷塗弄丸我愛張東所只學堯夫也不孤讀茂卿次韻呈定山先生詩有夢入羅浮之句用韻寄荅時世卿在白沙鶴避茶煙信有之買田招鶴是何時百年睡息深華岳九曲歌聲㫁武夷有客到齋言種樹呼児挿桞當編籬誰知萬里東橋月夢破羅浮亦有詩東橋茂卿住處彼此衰榮更共之年過六十是衰時藜羮頗恨無萊婦卉服都忘在島夷水暖河豚吹細浪露寒秋蟹過踈籬江天好景無人畫毎要先生藉入詩太虚上人以所註定山種樹詩見寄喜而賦此兼稿呈定山四十年前從事勞老來萬首放詩豪這囬種樹心全子若個山僧眼揔髙米送定山居寺近書來南海與神交白蓮不結楊州社賔主依然是逺陶追次康節先生小圃逢春之作時物紛紛共闘妍好春多在語鶯邉傍花随桞我㝷句剰水殘山天賜年竹逕旁通沽酒市桃花亂點釣魚舡而今我是孫思邈自古髙人方又圎悼李九淵九韶已死徵君老我與深之事偶同此夜北風吹白髮舊時明月對蒼松聲名還許軰流上歲月忽消鉛槧中莫笑腐儒無厚業尊前乂手鳯駒鴻弔子陵羊裘不返道終疑玉帛雖來事可知天下君臣光武詔世間膾炙子陵碑故人不改狂奴態一事堪爲百世師九鼎漢家從此有聴歌山谷老人詩桐江秋水來天地照見千年老鳯還太史直書形迹外先生猶在是非間交情此去投當宁年事何勞列從班欲向東呉問遺老江湖容有此翁閑先生如此亦天民髙坐桐江一水濵却到陵夷排亂賊方知名節是忠臣白鷗自去江湖逺黄𥿄向來道路頻徃徃見人東廡下傷心一代帝王真過康齋呉與弼先生墓桐園三尺聘君墳猶有門人爲掃雲此日英靈應識我斯文風氣莫如君吟殘老杜詩千首看破伊川易㡬分未了平生端的事九原風露倍酸辛弔鄒汝愚謫石城少年爲意儘崢嶸謫死天涯二十零舊雨不留花縣榻秋風還閃石城旌児啼母絶家何處水宿山居路㡬程人事毎将天不定文章何用博虚名江月無光江水寒角聲杳杳夜漫漫孤児歲月𥘉離乳夫子風流儘盖棺身後豈知名可貴世間長苦路行難鴟夷不亂當年計還得雲門枕上看弱女孤児哭作團歸槎渺渺倩誰看乹坤敬士此邦伯生死交情非長官逺陌不堪竆望眼寸膓何直百憂端欲陳薄奠無由致園橘山𬞞領一盤脩短榮枯分各該荒江落日爲誰哀詞林當日人如夢唐肆今朝馬又來㓛利紛紛難入手乹坤滚滚負多才若将禍福論天道顛沛如公豈理㢤留别諸友無賢路自愛清風卧絳厨道人或逢人賣屨眼中誰謂我非夫他時得遂投閑計只對青山不著書釣渚風長裊故絲水花含笑海鷗疑都将老子行蔵意分付東𬈑水月知自昔盡從巢許後而今豈異帝堯時憑君寄語張東所更與飛雲作後期石門次林緝熈韻與君傾盖定前言來徃青山十五年老我自知難用世勞君相送過貪泉清言晚對江邉寺離思秋生鳥外天留取西華一樽酒春風還擬上江舡孤舟昔繋飛來寺白首重來十四秋君看秋風吹彩鷁何如老子坐青牛留情世事終何𥙷得意雲山亦易休見說䕫龍滿朝著九重應許放巢由不寐一飯不忘溝􅊤心白頭氷雪更相侵妻烹野菜晨供飯児點松燈夜對琴賦拙任留司馬壁碑成不賣退之金無端昏嫁相料理獨聴踈更到夜深次韻張東海老去人間乆廢談青衫不改舊啚南道超形氣元無一人與乹坤本是三何物坐中春坱北㡬時鏡裡雪䰐鬖白沙詩語如禪語試著南安太守叅南安贈龍溪李知縣玉枕山前逢使君西風吹破玉䑓巾手中玉斚休辭醉鬂脚黄花别是春鳯暦流年供俯仰龍溪他日看經綸憑君若見蒙庵老爲說于今白髮新回岐道中回岐接水樹冥冥又是朝京一日程兩耳如聞重譯語㡬時不見五仙城朝無兒稚歌行酒夜有巡舡卧打更欲識覊情多少在崑崙白雲生番陽丘先生逺示傑作二章仰仞垂愛之厚感慰兼極章衰疾龍鍾無足爲故人道者勉㨿來韻少布區區之忱耳倘過遼陽之便假手録寄以發克恭黄門一笑幸甚昔從天上拜􅊮庭一别官河㡬度氷豈有文章供史舘澷将𫀆笏對山靈數株松菊猶三徑两棹風煙又八溟欲冩漁翁寄廬阜眼中誰觧辨丹青緑水青山置我曹江西遼左一神交短籬霜菊誰供酒破屋秋風自𥙷茆愁業却歸窓下枕行蔵更問易中爻痴児多病慈親老不向清時歎繋𫀆李憲副若虚枉顧白沙别後賦此江門相見忘平生何處長安盖已傾素壁龍蛇騰十丈清談賔主破三更鸎花舊領詩全好山水𥘉經眼獨明不怕長風吹大舶使公一口吸南𬈑聴秀夫誦定山先生之作髙格英風忽两聮故人耳順是今年誰還敢擬三千首我也前知八百仙淡淡菊花秋滿把陶陶松蟻日髙眠定山倘許吾扳駕突過堯夫擊壤前廬阜書舎和潘百石半畆還叨地主㤙北來岡阜亦稱尊水揺荔子紅當檻雨洗萆蔴緑遶門飯後一床便獨卧晡時三􅊦喜微温何人爲借丹青手冩過書齋也未村一飯區區亦有㤙千秋罍洗定誰尊先生終日卧隱几童子㡬人來掃門晴旭滿窓啼鳥亂春寒如酒著人温江門煙景還多少獨倚寒松望逺村青山别様與人㤙絶勝黄金買得尊從此徃來喬木下可人風日短籬門窓臨緑沼晴曦動爐有丹砂伏火温莫道我無徐孺子又同廬阜又同村滄𬈑著艇未還恩又結廬岡土宇尊六十乃扶居士杖㝷常不過酒人門江山儘放襟懐闊風日頻來笑語温只欠一詩閑道破無人走告定山村城中借竹且蒙㤙竹在崇岡竹故尊萬里滄𬈑都座下一條官路自江門長驅李白詩中逸不舎尭夫酒後温笑問地官張主事病翁今日住何村程鄕學生鍾宏求社學記贈之千里來携欠一啚東南村搆㡬糢糊人扶世敎何妨切老向斯文自愧踈雲谷許還徽國主周溪流到長官居秋風海上無竆意也向程郷社學書四言詩題畫松泉爲張别駕吉水流石間生两松樹洗耳掛瓢無此佳處幸逢堯舜那無巢許撥悶乆病在床展轉莫舒我欲觀化有握其樞人有善願天必從之我病㡬時我念西馳我行趦趄如飢思食如寒思衣動惟厥時匪亟匪徐魚躍鳶飛乃見真機天豈不知天偶遺之吾将尤誰我聊任之撥悶以詩示湛雨有學無學有覺無覺千金一瓠萬金一諾天命流行真機活潑水到渠成鳶飛魚躍得山莫杖臨濟莫喝萬化自然太虚何說繡羅一方金針誰掇示黄昊髙明之至無物不覆反求諸身覇柄在手五言排律月桂自白石移來金粟𥘉分我花仙不吝人煙霞三畆宅草木百年身影入青霄舊香傳白石新爲誰工態度夲自惜精神翠竹旁通徑緋桃正隔津生憂児女狎莫摘老夫嗔坐乆風囬席行遲露在巾當時尊玉茗平地隱氷輪收歛還真性生成荷大鈞相逢山水地一笑武陵春貞節堂栢栢下拜群孫年華栢旣尊皇風動髙盖聖澤溉深根一事堪詩傳千年仗魯論撑空疑有力印月自無㾗日出江門近春囬海角暄細香浮竹院深色映籬門身謝看花塢家貧賣酒村陶然緑隂處髙枕弄吾丸景雲田蓢尾蓑笠堪從事少年農圃情乗潮打两槳落日照孤城山廟題詩過汀鷗代鼓驚提携新耒耜寂寞舊棋枰挾𬒳防春冷攤書讀晩晴児曹依本分吾道在躬耕旌節亭瓦雀瓦雀喜亭栖丹青意自迷雨餘穿麗日花底啅香泥並語聲全碎追飛羽忽低悠悠去繒繳欵欵戀榱題卵育非無地児群或引梯慣行書案上漸滿井欄西不羡彫籠養真堪畫卷携由來親白首那更避青黎狎乆如私睨喧多類滑稽行蔵非社燕飲啄溷家鷄度嶺千囬歇排風㡬寸躋冥鴻於汝軰滄海一涔蹄七言排律王僉憲問一謾述客來問我一如何碧玉髙樓夜夜歌廬阜一壼開我酒江門八尺贈人蓑杏壇多士無顔子洛下遺書病首科且就玉衡觀轉運那曽珠斗見森羅古來相遇難如此無恠人間說夢多南海祠下短述虎門千頃雪翻騰中有長鯨鼓鬛行㸔弄漁舟移白日欲抛塵土住滄𬈑江西不得誇彭蠡李白何須醉洞庭天際有山皆古色水邉無樹不秋聲一春桃李風吹盡萬里乹坤雨洗清畫舫乗空書卷白晴霞映水布衣明不辭海上児童識亦有祠前老樹精歲歲放歌來此地晚年偏喜不簮纓代䟽荅五羊諸友白頭哭子豈堪聞信有玄穹怨不仁精爽已歸千佛國玄纁未贈九原身求之夢後心如失病是愁中藥不神鬂脚又添今日白庭花何異昔年春東君此意誰分付又遣黄鸝喚向人古風歌行聴李深之說緑護屏聖池歌天風吹㫁雲冥冥隂崖露滴池水清牧童投竿蛟龍怒空山白日雷霆驚好事何人觧㝷覔李生爲我言歷歷安得徤歩上崢嶸萬里直見滄波横更憑猛手碎嵯峨一徑宻遶青松多池旁是我安樂窩近者青松逺滄波紅塵溷溷如吾何除夕呈家兄去年除夕色未稿今年除夕兄巳老小弟朱顔不如昨但說窮通無醜好山中茅屋二十年日月逝矣如奔川兄弟五男并四女啜菽飲水同炊煙慈母年髙白髮少二十孀居憂未了眼前黄口那得知争覔梨栗相喧炊我年未老筋力衰耒耜即付大頭児童牛生角禾登壠爲我且給通家糜别蒼梧席間呈謝大叅叚都閫蒼梧城中三日雨暁坐肩輿辭两府叅西藩者謝大夫枉與叚侯同岀祖􅏘衣搭䬃濫西席對坐一文兼一武三人相逢豈易得一金便作華筵主酒酣擁盖囬仙亭立馬蒼茫别容與贈陳冕南有滄𬈑水北有崑崙山我屋正在溪山間瞻望不逺行實難白雲朝暮常漫漫桃花欲開梅又殘問君此去何時還過端溪硯坑峽雲鎻㫁端溪水白鶴群飛峽山紫獨憐深山老鴝鵒萬古西風吹不起安得猛士提千鈞亂石溪邉夜搥碎行路難頴川水洗巢由耳首陽薇實夷臍腹世人不識将謂何子獨胡爲異兹俗古來死者非一人子胥屈子自殞身生前杯酒不肯醉何用虚譽垂千春修外海赤坭嶺墓作赤坭岡頭封馬鬛生荆死竹無日月晚生曾孫賤又劣仰首蒼天泪流血載鉏入山日已决北風吹我篙櫓折悲鳴中夜聲鳴咽暁踏荒山馬蹄熱開榛伐樹㓛務捷指揮群㒒口喋喋須臾豁見天然穴髙下山川甚蟠結西南諸峯青不絶東北漫漫海波貼向來淺土悲㓕裂再掘又恐靈氣洩復以玄石置墓碣永示雲來千萬刼人生貴賤那可必下山復作児女别釣魚効張志和體紅蕖風起白鷗飛大網攔江魚正肥㣲雨過又斜暉村北村南買醉歸秋雨書事寄黄叔仁嶺南氣候殊中土七月𥘉竆乃無暑樹杪晝蒙宻宻雲簷前夜滴絲絲雨忽聞海上長風生卷入寒城翳鍾鼓東舎今晨母殮児西僯昨夜夫埋婦人間生死不可期慟哭蒼生奈何許與黄叔仁乃父題東溪卷并引昔余大父渭川府君居此溪上與黄氏故僯也去之六十年矣閱此卷有感而作春煙漠漠溪溶溶鳥鳴終朝低竹叢桃花亂落溪水紅白首一人扶一笻醉中忘却溪西東誰載咿啞進酒篷朝歌昔舞煩児童吾廬若在兹溪上如此風光不譲公憫雨寄叔仁去年無雨榖不登今年雨多種欲死農夫十室九不炊天道胡爲乃如此自從西賊來充斥一十九年罷供億科徴不停差役多歲歲邉江民荷戈舊債未填新債續里中今有迯亡屋安䏻爲汝上訴天五風十雨無㓙年得林憲副待用書奉寄午枕起攀庭樹株見戴白笠送君書開緘快讀不見字世事滚滚終何如傾盖一談未可少悵望萬里徒區區願言保此無壊身烈火不觧燔空虚自伍光宇墓還登蓬萊絶頂故人墳前澆我酒白日欲西回馬首磴危道險不可躋下馬長鬚扶两肘三歩一噫五歩停引吭岀舌肺腸鳴此時平地慮顛踣仰首十丈梯崢嶸以手捉㒒肩以足踏崖頸躋攀欲上分寸難又恐翻身落深阱山北鳴鵂鶹山南呌軥輈豺虎伏莾狐狸逰天地衮衮令人愁小童魚貫上復休絶頂始得岩巒幽開顔一望隘九州弱水涓涓扶桑樛中覆一杯滄溟流穹然青者吾羅浮神仙葛白俱蜉蝣湖西先生去十秋五羊詩客徒淹留數公陳迹或可搜死者已矣吾何憂後來諸生繼前脩努力莫倦蓬萊逰有鶴寓懐先友丁彦誠邑宰有鶴獨睨臨江樓雪衣逈映江天幽問爾莫是蘇耽流蘇耽一去三十秋人間膏火不可留欲徃從之嗟無由鶴聞我言九囬頭欲去不去增綢繆四野無雲風颼颼矯翮萬里須臾周顧我欲下非丁侯題畫春草蘭兮蘭兮翳灌莾棘刺蒲芽逓消長野竹抽稍一千丈巨石盤雲覆仙掌鶺鴒三三兼两两鼓翼飛鳴齊下上仰視玄穹極髙廣稊稗瓦甓皆真賞半酣一爬誰老癢五羊城中鍾雪舫荅惠菊玉䑓山中冬酒熟玉䑓氤氲聞紫菊香㠶帶雨來山家九尺一莖紛天葩主人持酒向花笑坐下無花詩不妙近者撃壤歌二千菊花之音如響泉陳村老人植菊手玉蘂金華光照牗世人有眼不識真愛菊還他晋時人一瓢酩酊廬山下萬乗之君不得臣讀東坡年譜坡翁春秋六十六脚債一生償不足黄州去後惠州來無何又向儋州宿瘴雨蠻風經㡬時放歸便􅈬毘陵木熈寜以下至元符中間老稚圍舡哭婦女倉皇吏卒欺坡翁已􅈬䑓官獄平生㡬冊篋中書一一旁搜付囬禄西望眉山不知處俯仰乹坤何局促假令坡翁活百年長領詞官稱玉局氣節文章古所難先知孰與愚公谷丈夫當自慎出處何爾呶呶蒙毀辱戯題張千戸畫松張侯畫松人不識松不畫横惟畫直上干青霄下盤石倒卷蒼龍二千尺神物安可留屋壁變化虚空了無迹不然恐遭雷斧闢左手執弓右持㦸取勝無過萬人敵侯莫畫松費筆力夢匡廬老年心折何處山昨夜夢鼔潯陽柁九天無雲瀑布飛聲落長江震呉楚望湖亭邉延五老逺之近之無不可欲携五老還滄𬈑一囊又借長髯我與世卿同逰崖山作海風晝號山木折黒浪夜撼蒼厓裂有廟扵此昭臣節吾昔大書吾腦熱天冠地屨華夷别萬古不使綱常㓕角聲鳴鳴旗獵獵樓舡将軍過撃楫楚客傍觀嘿無說肝腸裏有三公鐡南山老人紅玉頰乆坐松根待明月題梁先生芸閣聖人與天夲無作六經之言天注脚百氏區區贅疣若汗牛充棟故可削世人閗見多尚慱恨不堆書等山岳舎東丈人號芸閣髙坐松根自鳴鐸摳趍童子慎唯諾口授心傳爲小學孝經論語時參錯子史平生盡拈却寄以斯名聊自謔講下諸郎頗淳檏誰敢作嘲侮先覺讀書不爲章句縳千卷萬卷皆糟粕野鳥晝啼山花落舎西先生睡方著題馬黙齋壁屋後青山屏翳合簷前緑樹煙花匝主人閉門履不納跏趺明月光遶榻客來問我笑不荅但聞山鶯啼恰恰橙橘盈園野芳雜門外一江深映閤四時八風誰管押煙飛霧走龍騰甲拙者孤舟持酒榼成化十年甲午臘偶得衡山西逰何時還暫寄漁蓑水石間又恐風吹江日殘扁舟打落蘆花湾敎児且築大雲山可左言贈憲府王樂用歸瑞昌可可可左左左費盡多少精神惹得一塲笑唾百年不滿一瞬煩惱皆由心作若是向上軰人逹塞一齊覷破歸來乎青山還我白雲滿座莫思量但髙卧贈左明府考績之亰六十花封一髙要髙要得公當不小阿衡事業世豈知天下經綸此中了百里萬里大小同語黙出處非殊調君今考績赴天官我只弄我江門釣力疾書慈元廟碑記北窓一榻羲皇前青燈碧玉眠三年慈元落落吾所憐兩崖山髙青閣天崖門之水常涓涓一碑今爲東山傳虚言不扶名敎顛乆病江湖落日前嗚呼此意誰與言嗚呼此意誰與言墜床詩母子之愛天所維廬岡數歩扄幽扉近者夢寐常追随墜身床下如僵尸把火來照我爲誰乆病不死長命雛側身東靣䰟依依六月十夜枕上歲歲與年年㡬見春秋過枕前有時自放春風顛堯夫撃壤歌千篇大醉起舞春風前碧玉不知今㡬年望望衡山眼欲穿世卿兹來何延縁枕上江門水上廬山顛蒲團展卧羲皇前洗手一弄琴無絃江門之水常淵淵月光雲影江吞天安得古今名家如劉文靖荘定山題一言洞視千古如浮煙江門水與銀河連又何必栖栖向釣魚䑓上來打眠夫然後信性氣果江湖行蔵動星象同符羊裘老子未化之跡可見之形以爲曠世之賢而思齊其賢也耶示諸生江門洗足上廬山放脚一踏雲霞穿大行不加竆亦全堯舜與我都自然大者便問躍與潜守身當以藩籬先世間膏火來熬煎市朝名利相喧填百年光景空留連丈夫事業何由宣昔者緑鬢今華巔烏呼老去誰之愆病中寄張廷實用杜子羙韻碧玉丈人天性直長以語人人不識胸中一部蓮華經江雲浩浩江泠泠時取黄鶴樓中老鐡笛傍崖吹之江神歛袵無人聴安得張乖崖來分與衡山一半令日在衡山爲我作粥便是當年事業成與謝天錫先生大事乆未㐮造次千人不啓齒先生老竆旋渦佛㓕頂驚心羅漢水麥舟遇我盖非難㓙歲探嚢誠未易佳城許譲白牛岡借助希㣲非我意爲我寄聲謝韓子紛紛薄俗古今然所幸男児竆有志後山之後豈無人百丈中流看砥柱與黄叔仁題心泉夜半汲山井山泉日日新不将泉照面白日多飛塵飛塵亦無害莫弄桔橰頻民澤自白沙館告還謁母故以歸爲望黄雲山人風韻奇撃壌亦唱堯夫詩頃者省母増江湄梅花雪月如見之西風千畆稲垂垂再把葫蘆斬纏歸岀門莫作児女悲陽關三疊徒嘘唏黄雲乃民澤所居之洞也贈黎申兼呈克脩梧州蒼梧夜床廬阜冬㠶獨透夢中彩筆子須投海上黄雲我當種短歌送子子合知無病呻吟何足諷感事示黄生叔仁親老需甘軟家貧乏囷倉賣文應不免爲恨故難忘揮俗黄生激辭賔子覺剛爾曹雖得罪無愧在門墻王樂用僉憲江門看病别後賦此木葉吾衣草吾屨鳥觧唱歌花觧舞天際虹橋萬丈髙䄂裏青蛇三尺許破㡌衝開華頂雲西望衡山乆延佇堂堂名敎天命之六六洞天誰是主五羊城中老法星日昨江門㸔病去惠州葉從事夜忽于江門垂釣得二尾魚送山厨作饌戯贈之因懐舊釣伴張主事廷實取適愛魚生取魚愛魚死所取旣不同瀕江魚滿市何日歸來張戸曹明朝且去州從事白沙子卷之八終
