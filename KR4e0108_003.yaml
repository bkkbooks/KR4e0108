front:
  text: 白沙子卷之三
  hash: sha256:48b51200f4933ce919ca842728c50215668be6b7b7fc3422f4576e0027e047a6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0108_SBCK_003-1a}
body:
  text: 簡與陳進士時周時周水菽之養自垂髫迄今三十年韓退之稱孟東野無田而衣食事親左右無違混混與世相濁獨其心追古人而從之時周盖有之矣時周別去益思時周平生履歷之難大畧與老杇同而又過之求之古人如徐節考者真百錬金孝子也頃歲有荅林府主夀老毋生日詩云有母年齡暮逢辰喜懼深多儀焉敢郤揣分故難任錦叚拈香拜仙醅洗盞斟獨慙非節孝未了百年心因事惟賢寄不足扵詞詩中發之盡矣抑聞之子不私扵親非子也士不明扵義非士也賢者審擇内外取舎之冝以事其親愛日之誠而無不及之悔在我而已與袁進士書足下去青山登黄甲一旦取貴官如反掌人皆華足下而不知足下之不樂乎内足下之心形扵書尺足下之辭甚直誦之揆之凢足下之事無是非可否得失足下一一具言之足下過扵時人逺矣或錚錚自許其不欺反岀足下下雖然足下慷慨自任不䏻吞炭爲啞以取容扵時則将大聲長鳴扵仗馬間乎此非㒒所敢聞也緝熈坐青湖山三年矣徳孚旦夕過我其問足下也告之復林府尊順徳令來辱書承以送東山先生序文属之㒒東山先生愛百姓如己子百姓戴之如父毋徧觀當世未見有如此者㒒所目擊序奚冝辭顧㒒平生拙學扵岀䖏語默有不容不致其愼者不敢不告也㒒扵送行之文間嘗一二爲之而不以施扵當道者一則嫌扵上交一則恐其難繼守此戒來三十餘年矣苟不自量勇扵承命後有求者将何辭以拒之㒒聞愛其人必欲其羙㒒之辱愛扵執事不可謂不厚獨扵此厚未之察耳伏惟執事終始此愛不強其所不䏻幸甚幸甚有李某者嘉魚人近自其郷來白沙其人東山先生知之其爲文有氣采㒒譲之慷慨特逹樂聞人之善而樂道之㒒謂執事倘可以此文托之乎然否惟命與黄太守聖天子即日命下拜端守黄公叅政病夫某聞之喜連日病夫與公舊故䏻知公剛方有力䏻集事使得髙位以行其志以有聞于後病夫之心公之心也能勿慶乎謹具羊酒菲儀帕一方絹一疋以表下忱伏希鑑納與張太守克脩邇者修建祠宇墓亭各已有緒實頼仁者廣濟之力知感知感竊聞治郡以嚴令下而人爭趍之無敢後者向去買木人不知所裁木𬒳雨漂流者民之負約者一切冝置之而以聞扵左右夫利乃衆人所趍義則君子所獨萬一以我故干累扵民非細事也告乞巳之千萬之懇自茲以徃更不發人買木亦乞明示該縣将來切嘱切嘱制中不他及與丘蘇州辱書知起處甚慰㒒以疾病跧伏海隅比扵縉紳徃還中非平昔素知不敢輙上問多罪多罪承喻周翠渠守廣徳有聲因記曩歲周侯贈賀克恭詩云黄門仙客歸遼左少室山人憶嶺南我亦塵埃難乆住木蘭溪上浣青衫周侯後以進士留亰以書來番禺㒒次韻戯之未及寄去周侯㝷守廣徳㒒以不能黙默而竊喜周侯之有爲又喜先生䏻與人善益思周侯所以處扵克恭與㒒之間其始終去􅈬可不可之權先生盖未知之也爲絶句一篇并前次韻録去以發千里一笑又自閣下領郡去亰師與㒒不相見者五年矣閣下䆠業益進㒒沾疾來凢百事不如昨今羸然一衰氓矣常常思慕閣下然但意其在黄耳不知其去而爲蘇也比者獲手敎承先府君棄世已乆閣下復守此大郡豈無悲忻終闕吊賀不罪不罪閣下秉好徳之常性有成物之羙意辭氣所發藹然盛大如閣下之心逹之天下有餘也奚論一郡㒒扵是不䏻不一賀非賀閣下也賀蘇之人得賢守使鰥寡孤獨者得其所也雖然閣下不以行道自任而以養親爲辭㒒扵此盖又不䏻無疑也郡凖古封建爵爲諸侯岀入備五馬之容刑賞行一郡之政邦之安危民之休戚無不繋也孟子曰有官守者不得其軄則去言不可濡滯也㒒聞之君子之事親也盡其在我者不必其在人者苟吾之所爲不畔乎道不愆乎義則其爲孝也大矣禄之失得弗計也閣下以爲何如朱侯詩䟦向何䖏批判幸飛示㒒在亰時居仁嘗通一札但未識面耳梁石克恭皆㒒平生所深望便中聲意爲感與鍾地曹所卜新兆形勢甚具穴甚的竊料其中當有好土昨日所見止是膚淺䖏更冝深掘見之但不及水泉儘深無害盖土色羙惡不同氣亦随之而異乗其羙者則吉乗其惡者則否此可理推不可拘泥塟法淺深之文如范越鳯云凢穴冝及一丈外則不爲草木之根所及其說亦似有拘若掘止八九尺間見有好土不止則傷龍若深掘而無好土則無如之何今限以塟隴冝淺之說恐其下實有好土而或爲浮面粗惡所隔則舉全地而棄之矣可不慎欤程子以土色光潤爲地之羙塟家以驗土色爲辨吉㐫捷法此不易之論可以黙會矣况此山來势極是雄猛必得融液之土方為全羙亦不可草草也與林春官辱書乆未謝今者寄到手札并手扇二握仰仭來忱可勝愧感閣下以六品之秩居部官非禄仕明矣要䏻脫外榮樹立㓛名天下共責望况扵㒒者㢤㒒非不願爲此顧無閣下之才與閣下之位矧今髪日就種老逐病來病與懶遭扵世間凢百事脫落盡故扵左右期之耳承諸公起居甚慰周先生爲廣徳得人心稍稍前此丘蘇州書來亦謂如此可賀可賀徃者亰師與廣徳歩月閑談異日或岀或䖏必相料理今日閱此𥿄罷因記木蘭溪上浣青衫之句不覺呵呵遂成拙詩梁石終爲廣徳州木蘭溪上水空流詩中徃昔三人共海上如今兩鳥囚給事易爲清靜退山人真脱網羅愁如何皂盖不歸去應爲蒼生未肯休以爲使廣徳及克恭軰見之當發一笑故併録奉左右倘逹之諸公亦足當一簡也與呉惠州繹思㒒腐儒也生嶺左四十又七年矣乃無以自見扵天下頃因一二軰流妄加推譲扵有所不爲之中置賤姓名焉執事從而齒録之乃不自矜重具酒與幣勤一介扵千里賜之手札而問焉㒒何足以當此慚慚悚悚然㒒之所以不辭扵執事非昧於自度辱執事使也徒欲以廣執事之心使天下稱執事者以執事爲有禮且曰執事扵不賢而譽且禮之况其所謂賢者乎亦昔人請自隗始之義也郡大封也太守大官也當風化未還之日獄訟日䌓幸而主者不敢怠扵其軄疲神竭知夜以繼日孳孳猶恐弗及如此者今之所謂賢守也執事光明磊落優㳺而敦大規模氣象逈異常流使勤扵聽訟矣而又不遺其本焉此㒒所以乗風而知慕覧幣而弗辭其心盖又有激扵此也若夫君子進爲君退爲親進退可否之機執事研之熟矣㒒何敢仰疑扵萬一㢤使囬并此布悃不罪與汪提舉弘治戊午月九日作白沙陳某啓千里一緘由辭以得意足下垂愛之至非尺牘能盡章何徳以報之承示近作足見盛年英邁之情大抵論詩當論性情論性情先論風韻無風韻則無詩矣今之言詩者異扵是篇章成即謂之詩風韻不知甚可笑也情性好風韻自好性情不真亦難強説幸相與勉之知廣大髙明不離乎日用求之在我毋泥見聞優㳺厭飫乆之然後可及也人自海南來者称足下事功之偉阮從事至益聞所未聞足慰翹企雖然局扵見聞者未必知也如修古等作誠羙矣人徒知慕修古之名抑孰知修古之實之著扵今日者何如也觀徃可以知來一真一切真得其門而入者無逺弗届也慕竹記文章心許之病未䏻耳足下欲顕其親扵無竆豈專待是耶白洋真境想像不來別𥿄塞命良慕髙尚耳不多及又足下事㓛之竒襟韻之勝安得一寄目扵冷香以盡作者之妙今之畫圖䏻令武夫俗吏見者莫不鼓舞称快况吾人㢤雖然非病夫意也病夫何足以當之足下以是心求進扵古之人庶乎無逺之不至矣嘉貺不一照領録來諸作毎讀一篇輙欲奉和而病未䏻慕竹記文大書表墓均之未可牽勉小詩四首録扵卷中徒扵阮從事過江門一次依准還海上耳髙明必䏻亮之李世卿期我扵朱陵沈督府書來問行張東所巳辦一杖双屨随我顧今病势尚未可動餘無足道者與顧別駕止建白沙嘉㑹樓執事未有不以公務而止弊邑者今日之事欲爲名敎樹無竆風聲扵後代而姑托始扵㒒以爲之名伏惟按治廣東侍御熊公掲名嘉會選䏻集事一人使相地白沙問扵我府主林先生以得執事遂盡聞扵我藩憲諸老先生倡斯和之興一役而衆論攸同舉一義而多士知勸百餘年間嶺海之内未聞有如今日之盛者也顧㒒何人俾以虚譽濫竽斯㑹區區不勝感激愧悚之至執事以才識卓異見重扵時諸公誠信而委之㒒愚以今地方多虞民苦力役斯亭之建雖以賢別駕主之然寸土尺木不無勞費在民願執事再加䖏分以復按治之命苟可已之不但紓民之力而負且乗之譏亦且不及老杇以貽玷諸賢尤見執事相愛之至也幸甚幸甚又山樓小搆清白俸餘之助得之公不以愧謝士詘扵不知巳而信於知已此㒒所以毎受賜而毎不辭扵公也雖然厚徳不可以不報尚友古人永矢一心進以禮退以義不受變扵時俗近之則可親逺而望之益光此㒒所願望扵公如是若徒以身爲溝壑無所規益舍巳循人與時势上下非㒒之志也鐫者偶有所適碧玉樓詩刻俟復寄所示從吾先生送張廵檢詩何不類平生之言也分惠諸児軰及諸士友曆日分付一一感公盛徳并此爲謝與余通守某啓今日里長付到黄曆五夲前此寄來郷試小録一本具有封識已一一驗領疊辱台貺豈勝榮幸某夲田野之人濫竽士列凢扵公卿之門惟知尊敬盡禮而已不敢随衆奔走以負其𥘉其有賜扵某者既扵家中拜受更不進謝惟炤亮不具復胡推府辱書英特不群之氣溢扵言外而其中耿耿欲與世抗尤扵詩焉見之前數日托倪指揮送去手書弗及想未逹也承以得卑官爲喜古之善䖏困者如是雖然未若忘之愈也忘之都無事矣詩本温厚和平深沉婉宻然後可望大雅之庭執事之作其果近之乎如其未近則當易故求新増其所未髙濬其所未深然不獨作詩爲然也卧病餘旬不能舉動感兹逺別又重違左右強勉數𥿄不能佳也不審何日離省區區馳戀之私想䏻亮之書墨并此謝與左知縣章啓頃者欲留一飯爲他客所併別去匆匆一語不䏻究至今惜之黎生來辱書兼多貺硯石之竒尤爲難得昔伊川先生以一詩酬王佺惠藥傳之至今明府善爲邑使百姓歌之老杇雖不習扵辭尚䏻爲明府執筆作循吏傳傳之天下後世以為羙也明府寜不許我耶瞻奉未涯謹奉啓不宣又昨來枉顧老夫胸中又著一左明府矣由鄧生之言知明府遺愛仁化已多今者僯封得此賢牧幸甚幸甚老病林下毎聞四方郡縣得人輙爲生靈喜况目撃其人乎公程還日過白沙少留片餉細話平生志業以慰老懷是所願也與順徳呉明府頃者從事至辱書貺爲感適姜仁夫在坐不即裁荅仁夫說足下縷縷去歲首夏李世卿過白沙至臘𥘉始別閑與論一時人物世卿亦以後進之才稱足下章扵足下所存不待書而悉也念昔蒼梧之會潦畧㡬扵失君矣顧今乃蒙不鄙瞻望清光扵咫尺得非幸欤章衰疾不岀足下拘扵官守未有相見之期惟當洗耳林下以冀僯壌頌聲之來足下将不以循吏之事譲古人也又岀䖏語黙咸率乎自然不受變扵俗斯可矣以張梧州先生與獻臣近日所爲章皆未得其詳不敢懸决是非俟靣盡又梁生至辱手書具審𬒳誣事今已釋然甚慰明府惠愛在民民以是報何耶凢天損之來吾無以取之可以言命矣唐中丞称潘時用之賢悼鄒汝愚之死小抑大扶朝低夕昻張梧州之扵督府皆可謂知已之遇夫復何憾承一一示明府豈徒羡彼者耶陶邦伯才䏻集事威䏻禦暴便可當一面之寄其它未敢輕議大抵用人不求備議者謂中丞公人物一大鑪冶百錬之則真金岀焉順徳小邑治之不難而有難者其誠乎誠則不言而民信無爲而化成觀扵明道先生治縣則可知用智之不足貴矣承下問不敢不盡明府以爲何如與趙明府平後山碑文㒒已謝扵陶公非敢有愛扵言也夫文以紀㓛必書首事主後山之役者誰乎今秦公已去存者兩府皆非知㒒者也孟子譏未同而言此豈止扵未同而已耶一二十年來㒒與人爲記序等文多不過十數碑而已爲陶公者半之謂㒒扵公有所擇扵言乎必不然矣司馬公作相欲除諫官而難其人問扵伊川先生不對公曰岀扵子口入扵光耳何害伊川終不爲言之語黙要自有當也若不問可否惟以相與之宻而責之言伊川爲不忠矣㒒廢退之餘恐收歛之不謹以取罪累實非有他也惟執事亮之荅陽江柯明府頃者有胡秀才來謁白沙䏻道執事志行之羙章多病少岀扵執事無一日之雅聞秀才言爲之動容起敬已置執事扵東南十郡内賢守宰之列所謂生而民愛戴之死而民爼豆之以此期待陽江而注仰之人矣䝉辱手敎承已表識張太傅墓又扵墓前搆祠祀之與厓山同幸甚幸甚以今觀之執事所作皆風化首事㝷常只是簿書俗吏取辦扵目前耳何嘗望見陽江脚板耶祠記某當作昔聞秀才言執事表墓建祠某已心許執事矣顧今拙病未䏻脫體少延歲月爲之未晚也病倦不䏻具大状使囬聊此復餘不一一與任明府昨蒙枉顧感感一談之頃愧乆病未得脱體精神不䏻自逹愧負何限雖然造次間已覺明府英邁之氣岀扵人上者可畏可喜異時當爲賢宰牧有聞扵天下後世新寜之民一何幸欤今日又蒙多貺之及感怍感怍以新作之邑遇新除之令凢百政令皆自我岀未有壞扵前者事機之㑹如此亦可賀也老拙以爲天下之事成之惟在威信威信一立無事不可爲苟無威信則無其本難乎其立政矣明府裁之病倦執筆匆匆不䆒所欲言謹此布謝而已惟照亮幸幸與曹知縣執事去新會二十年矣何由復見執事日侍貞節堂延接四方賔友與言昔者土木之興衆工一日具舉執事悉心扵名敎常在人目雖不見猶見也堂成而執事觧官堂今存而老母下世俯仰今昔情如之何恭惟執事才足以立事勇足以行志而竟不爲世用或云見曹長官扵亰師或云退而家居慷慨如平時欲致一書慰執事無可托者男子盖棺事方定士所遇有時焉耳鮑叔有聞扵後代以其䏻真知管仲也雖不仕齊有功九合諸侯一匡天下鮑叔賢之烏乎世復有斯人乎執事以某之言爲然則凢世所汲汲而後見者皆不足以望執事亦非所以厚執事也李世卿還嘉魚輙此奉候粗布二端表逺忱制中不多及與梁知縣三郎囬能道漳平𥘉政甚慰懐仰居下而䏻獲乎上事功将日大聲聞将日著可賀今之從政者豈必盡如古之人但髣髴其一二世必以良吏目之矣又能始終表裏無間将來必大有可觀幸卒勉之老拙之望也比者小廬山茔封粗畢逺煩致奠哀感可涯竒娘子毋計各安好漳平風土想與此間無甚異惟善調攝勿令生疾惠絹感感耳邊常得好消息不用寄物也與鄺知縣兄弟丁明府彦誠今之良宰官也遺愛在邑邑人思其徳欲爲廟以報之此義舉也吾軰當爲之倡今附去䟽文一首幸留意冨者多助貧者一錢勿棄大要見此舉報徃勸來岀扵民心之公庶㡬光明正大可以傳逺今卜地在白沙里社前與嘉會樓相望亦其平生所樂逰之地晋題真蹟尚在壁間吾知其必享也與林郡愽先生門人近連得緝熈两書烏乎尚忍言㢤平湖別家踰十年官滿來歸不見仲氏見母夫人豈非幸耶再如亰師謁選未及一載歸哭几筵前有􅈬禄之請而人見疑後有終養之圗而母不待且母與褒之恩孰重章謂哭子之愛尚可割哭母之恨無時休不肖孤不丐先帝之仁寜免終天之憾耶緝熈孝禀自天豈無念母之誠因斗升之禄以求便養無難䖏者特於語黙進退斟酌早晩之冝偶欠一决遂貽今日之悔而世之議緝熈者多矣當是時雖使一恒人非沉酣利欲得已不已者處之亦必不䏻不爲之動心而變色况賢者乎自兹以徃緝熈其皎潔磊落不爲混混之迹所以慰慈靈扵地下而觧群惑扵當年如毛義焉可也若不理㑹此䖏則大錯二十四州鐡打不􅈬矣素辱厚愛計必不見訝是以盡言之定山近日之出誰實啓之其意云何希垂示江西來日者未過白沙銀瓶嶺合塟只看年月利否餘不用問人憂病中未由奔慰謹奉䟽不盡欲言又子逢家人至得書具審太夫人以正月六日祔于竹齋府君銀瓶嶺之墓褒亦祔焉爲慰是月三日章亦奉遷先考墓于小廬山與先妣同處日者云是歲官交承之日百無所忌遂用之居䘮不䏻免俗多此類也君子所以報其親盖自有其大者顧吾之所立何如耳來喻知孔而不知毛老杇所望扵賢非欤此翁明年滿七十世寧有七十老人發狂著書與故舊作炒也有言無𥙷扵人之不足託扵靈龜以正朶頥而不知止耶李世卿自嘉魚來與湛民澤徃逰羅浮今殆一月矣未知所得何如老杇亦欲深潜逺去爲終老計此間民日變爲盗地方多虞白洲李先生爲卜地扵省城破數百金古人之事不意今復見之顧今暮景所冝落莫耳目之用不息事随日生委餘齡扵㝷常喧囂之境恐卒不䏻成其羙未易裁也歲首白沙嘉㑹樓成白洲李先生遣人走定山求記比得南亰李學録書中間報荘驗封以去秋八月履任㝷得疾卧家至冬間發此書時已聞定山将出謝病未審然否想欲知故及又碧玉樓上聮句云大海從魚躍長空任鳥飛吾以待時之人可也聖人不爲也吾以待門人子弟不已薄乎有不得不然者免怨而已緝熈抱耿耿于玆㡬年今發扵此適有客及門求見不暇詳荅然大畧具矣如何如何又違闊日多忽枉來問不啻如珠貝之入手也亡兄不幸早世十月在殯後此尚二十日始充就窆積痛成疾章不足念如老母何承少寛之喻伏𥿄摧咽頃者與子逢書中間一二近况與悼秉之等詩想次苐經目矣餘非靣莫究主考閩藩令譽藹然可賀可賀傳聞郷試録好文字想皆出總裁之手恨未及見耳別𥿄見示奏草此事在今日不言而去揆諸易果不當欤夫以無所著之心行扵天下亦焉徃而不得㢤老孺人之旁計未䏻猝離而平湖之斾亦難乆晋不審何以䖏之區區注仰之私與月俱積録近作一二見意早晚能一過白沙否耶景雲如桂陽未返張憲僉日夕至學景易惟課訪是急諸姪營塟事徃候無人惟加照又承諭進學所見甚是超脱甚是完全病卧在床忽得此柬讀之慰喜無量自不覺呻吟之去體也終日乹乹只是收拾此而已此理干渉至大無内外無終始無一䖏不到無一息不運㑹此則天地我立萬化我岀而宇宙在我矣得此覇柄入手更有何事徃古來今四方上下都一齊穿紐一齊收拾随時随處無不是這箇充塞色色信他本來何用爾脚勞手攘舞雩三三两两正在勿忘勿助之間曽點些児活計𬒳孟子一口打併出來便都是鳶飛魚躍若無孟子工夫驟而語之以曽點見趣一似説夢會得雖堯舜事業只如一點浮雲過目安事推乎此理包羅上下貫徹終始衮作一片都無分別無盡蔵故也自兹巳徃更有分殊䖏合要理會毫分縷析義理儘無竆工夫儘無竆書中所云乃其統體該括耳病中還荅不周言多未瑩乞以意會前此所諭命之理以下數段亦甚切實有味愧不時復草席香各領賜感感復梁二敎伯鴻尹秀才至辱書兼拜汝帖之貺感感足下病不䏻任官貧不䏻供母迂不䏻入俗直不䏻干人足下持此孑孑何以度世㦲承欲挾卜以逰足下設言之以自遣耶将仰給扵是如昔君平之爲耶頃者何廷舉在胥江開卜肆竟無一人售者足下聞之否耶此非愚慮所及足下善自謀之無令古人笑今人也顏淵季路皆可師法聞足下有少田業勤耕而節用可以不死雖甘㫖之奉不足亦士之常分揆扵道義無不安也舎此而他圖心日勞而困日甚足下其如命何㢤人還匆匆聊此復不能悉與湛民澤先生門人來喻與拙裁意不相渉無恠乎前此之多言也乆居扵危不在仕止之間盖嘗两遭不測之變㡬䧟虎口矣不得已爲謁銓之行所以避之非岀䖏本意也吾子其亦聞之否乎平生故人朱少保李閣老潘待詔徃徃寄聲以不䏻去離此邦爲懼假令見㡬而作當不俟終日遑恤其他特患不得其時耳康節詩云幸逢堯舜爲真主且放巢由作外臣然則百年之遇冝未有今日所恨子孫世家于越老杇亦欲爲後人立少基緒使可傳也目今要建㡬祠宇修㡬墳墓政恐小祥在轉瞬間若更因循措辦不來更一轉瞬大祥至矣吾事不了柰何柰何憂病相持歲云暮矣安知其終不汩没扵塵土耶區區可疑者吾子其深亮之又飛雲之髙㡬千仭未若立本扵空中與此山平置足其巔若履平地四顧脱然尤爲竒絶此其人内忘其心外忘其形其氣浩然物莫䏻干神逰八極未足言也承羅浮之㳺甚樂第恐心有所徃情随境遷則此樂亦未免俗樂耳黄龍朱眀不可居吾之此心已在祝融之上矣吾非厭近而求逺顧民澤何以䖏我耶世卿録去近稿二幅可以代靣語不具又碧玉樓卧病踰半月忽得手札讀之喜甚遂忘其病也學無難易在人自覺耳才覺退便是進也才覺病便是藥也眼前朋友可以論學者㡬人其失在扵不自覺耳近因衰病精力大不如前恐一旦􅈬木平生學所至如是譬之行萬里之途前程未有脱駕之地真自枉了也思扵吾民澤告之非平時澷浪得已不已之言也倘天假之年其肯虚擲耶附去藥錢一百煩手丸寄渡子囬景雲在病也囬祝主簿未拜一顧之勤此貺疊至皇恐皇恐閣下以至公待民使一邑受賜則惠之所及廣矣豈獨某㢤夫公必有養而後䏻某扵今日之賜不敢不受亦不敢不譲所以廣閣下之廉以養公也僣率不罪與寳安諸友章衰矣齒髮日變于舊亡兄属纊之𥘉老母哭之欲絶積憂之餘面足俱腫由某獲罪于天不死延禍同氣以上累于髙堂痛徹骨髄如何可言諸君不遺老朽慰之連尺撫状不勝悲哽傾感之至子逢別𥿄具得平湖履任之詳可歎可歎彭澤不折腰扵督郵平湖不屈膝扵當道樂則行之憂則違之古今一揆也數日前閱甲辰舊詩改贈平湖章云偶從道路得行藏南北東西又此郷滄海一身堪此逺平湖數口爲他忙江山舊宅香株老籬落西風荳角長小與先生分岀處扶晋窓下細抄方又改次章頷聮云到手閑官如䖏士從頭詩卷又江湖去秋與張進士唱和絶句云不求老馬在長途誰道乹坤一馬無伯樂未來幽薊北憑君傳語到平湖諸詩謾爾豈遂爲之兆乎諸君其亟椽㰖山之室南川之歸無日矣景易今秋不免随俗應試非得巳也家貧不能日給無可仰干扵人一也祖母年髙氣衰悼徃憂來懐抱作惡􅛽得一觧可以慰觧二也是児賦分已定責之以越常之事必不䏻堪三也功服不得科試程子據禮言之當如此亦古人常事耳在今日可以望扵賢者而不律衆人也若曰祖父䘮在淺土雖服已除亦不應試此又過今之人逺甚子逢自量力爲之孟子曰持其志無暴其氣爲之而力弗逮反暴其氣矣秉之在獄安否禍變之成非一朝夕今日之事不知秉之平生費多少麯蘖醖醸來也爲我謝平湖秉之雖竆使甘心觚翰如蔵用軰低佪扵里塾寜有此惜㢤與鄧勝之勝之足下自頃歲寒舍一話別去未嘗忘但懶作書耳春𥘉聞太夫人委蛻又闕一䟽多罪多罪㒒之心事惟足下知其無他則知㒒之交扵人者如是使世之知㒒者異扵足下㡬何不斥其簡而怒且譏耶足下勤勤于㒒之意毎見徳孚與語未嘗不増戚戚扵胸次顧足下之所欲爲者其機未始不在我如足下亦何所不至慎勉之母以畏難止也承枉隂陽家諏日等問㒒不究其得失然大槩以爲術家之書其說主扵禍福故不冝盡拘盡拘則害理聖人無是也吾徒作事冝何所法守聽命扵術家之說而我無所可否焉㒒竊爲今人不取也小五星等書自地理家秘而不傳然其說亦動静两端而止耳足下将求之不一耶反求之吾心以觀其會耶抑徒寳愛其術而思蔵其故𥿄耶足下欲之必有其指不愛一言以慰懸仰幸甚幸甚復李世卿先生門人圭峯山靈相候已乆何濡滯爾耶世情不可盡徇盡徇則失巳與諸郷老龍興寺舎相對竟日孰與置一榻扵圭峯爲足快也邑中山水白龍玉䑓最勝諸前軰有賦詠可盡收拾志中慎勿留意拙作爲世卿累也切嘱切嘱昨晚陳伯謙過白沙出示與僧文定詩頗有援捄意不審聞扵邑主否封去某近作記文一首據拙見詞格不古終傷安排不知世卿以爲何如朋友間評論文字在扵求益奚事虚譲爲讀畢還一字示可否乃老拙所望扵世卿者也與賀諮賀生秀才得生書把讀未半亟呼童子使召犬子來讀之何生之言似乃翁也幸甚昔在長安日過乃翁生時方毀齒能知两翁意見輙呼曰我老先生來矣坐則置生膝前橅生頂與乃翁語至今𡵨嶷可想生猶畧記老先生面目乎味生之言其志逺且大恨生不生南海又恨風疾支離老脚不䏻及逺冀一見生容止接生言論有疑相與對面折衷之何可得㢤里生陳紹裘行託以告區區禮闈之㑹可必否耶荅陳宗湯先生門人得宗湯六月十日書書中作字太竒老眼不識服周讀之以告我耳丘侍御取道還閩過白沙留語竟日獲聞考察事詳微侍御宗湯索我扵黄雲矣周憲長半辭之頃詘已信人洞見肺腑二公爲天下惜人才公去取同此心也侍御尤拳拳扵桓温問孟嘉之一語噫何愛人之無已也宗湯念之一時交㳺東顛西覆民澤可期逺到西望衡山神爽飛去然自去秋感疾迄今未堪舉踵餘亦無足顧者所須縣誌謾徃一冊世卿爲此書盖亦自以爲未足云與周文都先生門人來喻具悉畜來始末前此未知也昨日簡中言偶與之合耳然不害爲義也非子來死扵道路乆矣度來之心不肯舍子而之我來若自計口不違主之命是亦報主也吾斯納來矣來雖小所以䖏扵來大者存焉吾此心是也此心滌之則明物涴之則暗此吾所以不敢茍扵子也傳曰以友輔仁與梁貞先生門人肺病外感則風内感則煩調攝之方莫先虚静秋舉逼人能置之否耶戒鄺珙之覆轍念老朽之狂言惟在正與羅冕先生門人得五月十九日手書具審比來侍奉吉慶徒以老朽旦夕徃來于心憂之深言之切有如吾服周者乎老病不勝䘮頼諸友之助亡妣得安小廬山之兆迄今茔封粗畢遣人去買藤縣木歸建茔前小屋爲祭亨之所立祭田使人守之孝子欲報扵親之心如此而已耶痛㢤無可議者矣溽暑不可䖏近遷上碧玉西偏病稍輕扵昔幸未即死吾子無爲老朽戚戚也官窰牛啇云扵館中便畧此見區區不能悉與鄭文吉章之内兄羅經水母湾人金成之義主翁也内兄存日窘甚棄其居第還車陂死無子遺二妾女一居孀一在其室其困日甚今欲取來白沙恃愛干瀆倘遇人船之便先令金成走車陂取至廣搭附來白沙極感極感頃者市藥之費遣人致之不及裁謝又金成役者借勞一日盖有弗獲已者實恃知愛瑣瀆爲愧外氏零替之餘一坏土賴以僅存雖在螟蛉吾敢藐焉公且随力剪拂之不但金成之徳之也茶果盛惠前此藥資感感不別裁謝山茗二褁表枕與黎潜蕭倫先生門人先妣不幸卒扵今年二月十六日即日茔封甫畢穴在小廬山圖新書舎旁某以衰疾執䘮氣息奄奄如賔客知舊徃來記一忘十間獨扵潜也倫也思之不置二生之思我從可知矣愛之深言之切老朽何以荅二生之拳拳發憤進歩一日千里與趙日新乆不見生一日得生手書如吾予館中不知其在羅城也去白沙㡬年味生之言欲再見白沙而不可得甚矣生不忘白沙也憂病之餘泯泯黙黙可爲他人言者念生忠信之人可與共學然問之者未切告之者無序生雖有求扵我其何𥙷扵日用乎賔陽陳掌敎可人也可一通之餘不具與太虚太虚師真無累扵外物無累扵形骸矣儒與釋不同其無累同也太虚尚䏻覔我扵衡山否耶別𥿄録去舊稿試爲我誦之章非䏻言者太虚豈俟多言㢤與鄭舉人昔錢宣靖公推官同州有冨民亡其女奴女奴父母訟于州州命録事參軍鞠之録事實貸扵冨民不獲乃劾冨民父母共殺女奴罪應死公疑其獄晋數日不决録事詬曰若受冨民錢欲出其死罪耶公笑謝宻使人訪求女奴得之則免冨民父子扵死知州以公雪冤死者數人欲爲論奏其㓛扵朝公固辭曰若水但求獄事正人不冤耳論功非本心也且朝廷若以此爲若水㓛當置録事扵何地耶録事詣公叩頭請謝公曰獄情難知偶有過誤何謝也㒒毎讀書見此等事未嘗不歎息古人用意之厚而平生區區所存亦未多愧頃因田土細故與足下有言足下遽賜之手札辭亦費矣假令質成扵官司尺寸壌得未足爲喜而此事一白則直在已而曲在人斯自慚耳㒒非不願爲古人之髙特事有專主義不容扵自遂惟足下亮之而已與鄧球先生門人韶廣相去未逺一問不通今㡬年悵想無巳即日蒼頭至辱手書并惠米布諸物具審雅履佳勝志業日新爲慰某奉毋之外無他况惟益衰耳首夏湖廣嘉魚貢士李承箕世卿者過白沙甚聦眀有文章晋白沙數月不忍別去議論間頗覺有益恨足下不與同也眼中朋友求可與言者不可得世味之移人者不少大者文章㓛業然亦爲道之障為其溺也足下茍有見扵此幸甚幸甚章所欲告扵足下者非尺牘䏻盡與趙夀卿蔡三兄弟欲求夀卿長蓢田耕住以舊扵我佃故求通一言惟裁之不可則止亦無固必也謝伯倚近至白沙以前所托通好扵李氏者委之唯唯可見人心所同也知之與周用中兄弟天地自然之利人得而取之何分彼我使諸子姪如老杇何所不譲使老朽如諸子姪亦何所不爭向義不如就利尚徳不如用智朝三暮四口與心違強之以其所不能則怨諸君豈不謂然乎今只以鄭明府所書劵爲實更不問其是非但據用中用到價銀若干老朽願償之如此旣不獲罪扵鄭又不負用中諸子姪亦可以釋然矣觧紛之䇿莫過扵此諸君其亮之與李孔脩先生門人子長乳瘡當一塲重病今脫然矣聞之慰喜頼朋友之助先妣得安小廬山之兆即日茔封甫畢三月而􅌾禮也亦時也始以吾爲殯宫論者紛紛今帖然矣寝食夢寐舉安事不揆諸道徒人言是狥奚可㦲未有㑹晤之期惟加愛與苑規先生門人近有人自南亰來承定山先生偶得右手足風痺之疾近雖小愈尚未脱然欲求養生之術非能用莫能盡之以此相托定山平生故人老而嬰疾可念可念䏻用定山之交亦不可謂淺淺者何愛一行如能用寄跡山水間去來自由自此至彼數千里坦途計日可到然亦不敢必盖行止非人所䏻頃來衡山之約如許又可固必耶專此馳問倘蒙金諾先乞飛示早晩須一至精舎啇量切望切望與趙汝䕫即辰聞舜英護母夫人䘮歸矣逺道無虞幸甚幸甚但未審几筵安在何䖏近來邑里中夜刼之盗横甚可畏冝得一稳便處無水火盗賊之虞方可停柩此送死苐一義君子見㡬而作時義當然幸自裁之勿奪於浮議憂病中未由奔慰想䏻亮之與董子仁前九月得周文選書知子仁乆乞省家居多賀多賀又云在髙亦養病歸或不可起不審此語何謂前此獲手敎及克恭書感歎屢日凢百且置之勿論只平生問學一事極索理會不可悠悠人一身與天地參立豈可不知自貴重日與逐逐者伍耶某奉別後更無他惟一味守此盖信古人所謂自得者非虚語今幸老母粗康地方無事日夕與二三友討論所未至亦殊不厭惟有志者少薄俗振作尤難日邁月征良可憂耳聞羅先生杜門廣昌張内翰會講西山克恭闢書齋扵後圃靜坐皆不以病癈學子仁何日復亰尚希一札以慰惓惓某自春間一病自汗到今尚未脱體臨𥿄牽勉言不䏻盡惟亮察與張聲逺先生門人乆不得字去年託賀官人徃一𥿄尚未卜沉浮一別音耗便爾難得可歎可嘆秋試㨗否不足憂喜謾欲知之耳時用孑然客帝亰忍寒餓二十年爲毋家不去誠亦可憫萬一了此心事不東入呉即南走羅浮與児軰下上四百峯頭采蕨亦可供也謾思及之此日病正愈臨𥿄不復一一又得正月十日手書悲憤填𥿄㡬不可讀平居相與論議慷慨未始不以外生死爲逹填溝壑爲賢一旦臨大故不可堪忍之時尊卑疾病盈室家無錢財作何措置况扵東呉反􅌾水陸數千計亦不下二十金所費将誰仰耶勢利風馳朋友道缺昔人所䏻者例不可望扵俗軰如某一二粗知抑皆所謂旋渦裹佛不能捄落水羅漢柰何柰何情切事違心邇人逺撫𥿄興懐徒增悲怍惟亮察不具與譚有蓮比日家僮自貴里來承口喻欲爲小孫田議婚以平卿之孫女平卿善士與古愚先兄㳺處亦通家也幸甚幸甚第恐傳言或誤好事多魔扵是叩諸蓍得大過之豫盖吉占也未審果如尊意否夫量才求配聞之先賢計産許婚甚扵流軰癡孫疑未中東床之選世業恐重貽西僯之憂是以未䏻釋然扵鬼神之謀也專此馳白庶㡬爲是一來倘不以疎外見疑拱俟拱俟與陳徳􅍬聞近𬒳繋郡獄懸切懸切計今當道多明察想不加害扵無罪之人否泰數也勿過爲隕越人不幸所遭有甚扵此者亦無可柰何且安心順命善将攝爲禱復陳冕蒼頭至得書承貴恙漸平復喜慰之至更愼小愈以赴秋闈之選幸甚幸甚得失雖云有命然便委之命亦恐未盡今一科所取士若干多備數一時耳安可據以自比耶如莆中舉子多真舉子與僥倖㝷常者相去奚啻十倍如是而失觧誦伊川之言以自觧可以無愧矣餘不悉與舊生陳魁生仰給歲月扵鉛槧瓶無􅑿粟以畜其妻子年㡬六十益以疾病困以盗刼士一竆至若是㢤昨望見生龍鍾如東田老人稍􅈬之疲頓與石翁異者㡬希然與之論舊事冩平生扵我三沐三薫之歷歷猶是也使我嚢中有九還大丹䏻反老爲童與生共之庶㡬其成也可待生旣絶望扵我矣我更望扵何人惟日孜孜斃而後已生與我皆然復何道㢤復何道㢤佃者還聊此復制中不具與容一之先生門人㡬日不得至祠下眠食何如一之平時筋力倍予今云瘠甚則老者可知矣古人處老有道䖏病有道䖏死有道夫子曰朝聞道夕死可矣其䖏之之道乎旦夕欲見一之與論之不審力疾乗竹兠子䏻一至碧玉樓否耶專此馳問惟自量又今日貴恙輕否老梁課好决定不死可無憂也昨晚手書與陶公勸勿建書舎未見報札爲此一事數日徃來于心殊無好况章因多病厭苦人事决䇿徃平岡朋友間多不省事多言平岡土瘠難望成田老母聞之遂阻此行柰何柰何此非不忠愛扵我抑未知所以忠愛也平岡土雖瘠然便謂其終不成田則又踈矣天下豈有棄物而人欲争者乎不信人之言眼前事所見徃徃如此可笑也何日可動到齋一話甚懸懸也比聞足疾傷扵勞而發由老朽故今思之但有慙負而巳柰何柰何先妣墓即日塋封粗畢遣人去采藤縣木爲祭享之室使人守之立祭田求墓誌事皆不可缺又不知人子思慕其親而欲報之其大者安在耶困扵則限扵分盖亦無可議矣近苦憂病相持無以自遣㝷思只有虚寂一路又恐名敎由我壞佛老安䏻爲我謀也付之一歎而已何日對靣罄其所欲言與馬貞前日舟中與一之談及神理爲天理萬物主本長在不㓕人不知此虚生浪死與草木一耳神理之物非但不可戀著亦其勢終不䏻相及扵我何有伯幹病至此當大爲休置縦未至灑脫地亦漸省得些撓亂幸而天年未盡便從此覺悟神理日著非小益也老倦不䏻再省視令真福往候以此䏻一開目否與陳秉常先生門人辱書見勉勿斷酒肉扶養衰軀真情苦語足仭拳拳頃者頼諸友之助先妣得安小廬山之兆即日塋封甫畢遣人去采藤縣木爲祭享之室立祭田求墓誌事皆不可缺又不知人子思慕其親而欲報之大者安在耶限扵分困扵財盖亦無可議者矣到亰見定山先生潘時用姜主事問我以是告餘不敢嘱別𥿄所議禮想是但老朽檢閱未得且置之病畏多言念吾子逺別聊復此耳途次見東山劉都憲先生告厓山慈元廟成甚完好因以先母訃告某在病不具䟽與崔楫先生門人承示諸作見意思始者期民澤九月入羅浮四百仙峯依舊見之但不在脚底耳來喻不忘在學幸甚但恐進退未决不立背水陣終難勝敵希說勉之歲月不待人也李子長落水羅漢吾軰皆旋渦佛耶何故無一人救之狶薟草果神效當求識者致之感掛意某復希說秀才又某䟽不意先府君奄忽傾逝衰病多遺不時奉慰罪罪比日寒甚想孝履如冝棄禮從俗壞名敎事賢者不爲願更推廣此心於一切事不令放倒名節道之藩蘺藩蘺不守其中未有䏻獨存者也老拙所見多矣願希說勉之與伍光宇昨晩景雲歸具悉老兄動定某通夕爲之不䏻寐覺得老兄此病非止疾痛之爲心害心寓扵形而爲主主失其主反亂扵氣亦疾病之所由起也今人惟知形體之爲害而不知歸罪其心多矣心之害大而急者莫如忿争夫有所不平然後爭爭至扵忿斯不平之至而氣爲之逆逆則病生矣雖所致疾之由寒暑飢飽勞佚失節居多而此之弗謹實吾自爲之不可不知也據㬌雲所說老兄扵此一項罪過全未肯認全未磨洗縦疾痛不積扵此氣家所関尤非細故林緝熈所謂怡怡之說殆亦忠告之言也盍深省之否則未有入道之期也不罪不罪又賤軀失養百病交集近過胡按察請敎以心馭氣之術試效立見驗但日用應接事煩不免妨奪工夫不精今欲自五月一日爲始以家事權属之老母非大賔客令諸児管得及光宇未復白沙借㝷樂齋靜居百日有驗即奉還也光宇决䇿徃青湖則此屋亦須有分付某将來却是東道非僦屋人矣呵呵又令晚叔貞兄弟過白沙適有客逺方來而賤疾又作遂辭去晡時螟姪歸自南山具審比日遺恙増劇皇恐皇恐天果無意扵善類耶未可知也陳后山之詩一時人皆不好獨山谷與坡翁知之卒䏻行扵世后山亦到今不死夫苟有可恃雖死可也况未必死乎不具與陳徳雍某啓清江之去白沙㡬山㡬水一夕恍然與徳雍先生葛巾青蔾相值扵寳林拍手笑語坐佛燈前促膝嬉戯若平生不知其在夢也及覺始悵然若有所失即復閉目入華胥㝷向來所見一恍惚既不可得則又歎清江之去我遠徳雍今存亡不可知况欲與之握手耶某別後况味如昨但年來益爲虚名所苦應接既多殊妨行樂耳平生只有四百三十二峯念念欲徃亦且不果男女一大俗縁何日可盡雖云道無凝滯其如野性難抝㝷欲振奮一岀又未䏻也徳雍老矣頗復䏻記憶寳林昔日之言否乎臨𥿄不勝悵惘與李徳孚某聞古之廉士資送其子有鬻一犬而足者今犬之殖㡬何貧者雖有百犬不以資送鬻也不鬻則耻之矣耻非其所耻何所不至甚矣俗之䏻移人也别𥿄稱清門羅某何敢不從脫尚未免芥蔕人言則莫若崇儉以導之令盡去俗様異時資送之來白沙必勿晋一塵以累吾自然幸甚幸甚凢此一聘之費大率不過十金但如來敎則太近俗而惡無文故以釵與幣易之而侑以羊酒不審以爲何如又別𥿄乞恕專擅聞老兄近復假舘禪林靜坐此囬消息必定勝常耳根凢有所感便判了一箇進退老兄今日此心比諸平時更稳帖無疑否賤疾幸少脫體但㝷常家中亦被聒噪情緒無歡大抵吾人所學正欲事事點檢今䖏一家之中尊卑老少咸在才點檢著便有不由巳者抑之以義則咈和好之情扵此處之必欲事理至當又無所忤逆亦甚難矣如此積漸日乆恐別生乖戾非細事也将求其病根所在而去之秪是無以供給其日用諸児女婚嫁在眼不䏻不相責望在已旣無可増益又一切裁之以義俾不得妄求此常情有所不堪亦乖戾所冝有也與潘徐二生去冬得二生手書半月置床頭日一展展時一發嘆後生所急者何後生所畏者何轉瞬來便都望三十四十不自激昻不自鞭䇿将來伎俩又似拙者模様耳奈何奈何蕭先生書報近聘岳家甥女可喜可喜然自是轉多事矣拙者正在不了中自暁事者觀之未必不以爲憂也呵呵與伍伯饒有牛眠扵此意中了了而不䏻使人信得伯樂一顧増價十倍甚幸甚幸山人眼家人夢卜人卜三事不期而合復奚疑謹此馳賀餘不具與林蒙庵某啓不聞問乆矣忽得手書讀之恍若蒙庵之登我堂也昔者嘗一造蒙庵扵亰師則拜蒙庵今思蒙庵而不見見蒙庵之書則拜其書如對蒙庵焉嗚呼可勝慰㢤賢者之愛人也期扵徳不賢者之愛人也期扵姑息讀蒙庵之書知蒙庵之愛我亦如我之愛蒙庵也雖然有甚愛者有甚憂也蒙庵之愛我甚其扵人也則憂㒒之自愛則憂其扵人也則否憂其憂無憂人之憂其亦有以異乎蒙庵官于朝也則行乎朝㒒之居山林也則行乎山林蒙庵欲以其道施諸人㒒猶未免扵自治其不䏻無憂一也在已在人則殊耳梁石時可之憂在已者而亦爲人憂克恭則舎其在人者以自憂是三人者㒒皆有慕焉而其憂不同又何怪乎岀處之殊也蒙庵所稱胡提學亦如蒙庵之憂者也彼其意以爲古之道不徴扵今則人不信不信民弗從是固憂時者之所圖也其爲人也雍容平恕樂善而忘勢其扵㒒也有一日之雅焉㒒之得譽扵提學苟非其爲人之急亦朋友相好之私耳非提學之心本然也蒙庵置之勿言可也古之爲士者急乎實之不至今之爲士者急乎名之不著周子曰實勝善也名勝耻也㒒竊願與諸公共勉焉若無徃來音問之有無各随所感應之冝䟽䟽冝數數不過乎情不弛乎敬惟當乎時義焉耳此之謂易也必曰我無利乎彼我勿言不可也持此以廣䝉奄之意何如與時矩先生門人宇宙内更有何事天自信天地自信地吾自信吾自動自靜自闔自闢自舒自卷甲不問乙供乙不待甲賜牛自爲牛馬自爲馬感扵此應扵彼發乎邇見乎逺故得之者天地與順日月與明鬼神與福萬民與誠百世與名而無一物奸扵其間烏乎大㢤前軰云銖視軒冕塵視金玉此盖畧言之以諷始學者耳人争一個覺纔覺便我大而物小物盡而我無盡夫無盡者㣲塵六合瞬息千古生不知愛死不知惡尚奚暇銖軒冕而塵金玉耶又某慰言四月二十五日得黎三報悲惋連日太夫人一旦厭世時舉不幸遭此痛極奈何柰何今日之慟昔日之思何者爲怨何者爲憾縦浪大化此徃彼來吾将校計其短長非耶溝填壑委在我者一切任之而獨晋情扵水菽非耶賢者力行巳志惟恐一事不底于道其䏻合扵親者㡬何吾重爲時舉悲之老病支離不供走吊惟強粥自大不宣又禪家語𥘉㸔亦甚可喜然實是儱侗與吾儒似同而異毫釐間便分霄壌此古人所以貴擇之精也如此辭所見大體處了了如此聞者安䏻不爲之動但起脚一差立到前靣無歸宿無凖的便日用間種種各別不可不勘破也拙和一首奉去可一閲更将中庸首尾緊要處沉潜要見著落却還一字也獻章書與時矩與謝伯欽聞子酣於闘矣老衰無䏻爲援請竭端末利害爲子籌之知貪得之爲害絶禍扵未形上䇿也不役一錢不損一人以直道爭之官府失得付之扵數必不已而與之均焉中䇿也損財以争而家日耗殺人以争而冤日積僥倖錙銖難得之利自違鈞石不測之憂此下䇿也若能歸咎扵已舎之勿争以分産悉推諸弟清修苦節以立扵世如子才不岀十年天下皆服其義而仰其徳令聞洋洋播於四方輝光赫赫流于無極視平生不得意處如秋風之振木葉零亂脱落無復芥蒂之蹟因敗成㓛此又䇿之竒者也諸䇿惟上䇿省力而易行然已無及矣其餘可否更請擇之又葫蘆甚羙山厨得此免乞僯之瀆感感聞近欲遷居木洲求静可喜可喜然未若北角就田而家尤便也韓子云恨入山之不深入林之不宻去煩入靜當亦有漸乎未間閑來一話與潘舜絃儀禯一書訛缺板多一經先生與黄大理手校便爲完帙野人平生際遇未有如此竒者敢不拜賜空山深夜兀爾一榻撫卷即如對靣耿耿逹旦與庠中諸友春𥘉承諸君枉顧属有哀事既不獲披接又不果以時還謝多罪多罪近按察胡先生過白沙青燈叙舊之餘輒及此方人士惓惓以爲已之學望諸君甚盛意也某親領誨言不勝感感㝷欲與諸君共言之賤疾固未及諸君方急扵秋試區區迂闊之談恐難驟聽然又不敢淺窺諸君而謂吾言之無益而不言也謹此奉瀆萬一諸君之晋意焉與僧文定僧文定嘗參學四方坐関扵觀音山三年蓋廣僧中之知者也偶以事繋縣獄慮是非之不見察也懇予爲白之予以邑主楊侯公明必不妄加害扵無罪之人予嚴干謁人之戒乆不可破文定從西方之敎苟有得焉則䏻以四大形骸爲外物榮之辱之生之殺之物固有之安䏻使吾戚戚㢤示以是詩一戒持來三十年何曽長揖長官前山僧若了西來意不把形骸乞世憐慰馬黙齋䘮子吾子得數之竒孰與孟郊孟郊産三子哭之連日今吾子之哭凡㡬抑又有不盡同者焉郊爲詩盡泄天地鬼神之秘而不爲造物所予不知其後何如吾子厚積隂徳終必有鳯雛麟種降爲家寳此未足深惜也慰鍾五令兄竟爲泉下客矣足下當甚悲痛令兄今生㡬何矣眼中如此逝者不少又何足怪但人未死前一日誰肯信著此事終日勞勞而不自足及至死時便無可主張亦可悲也已拙疾未由奔慰謾徃此𥿄惟足下亮之與林時表時表而代而父侍奉大夫人几筵何得舎朝夕奠而來應試老杇聞之竟日不樂欲致一書計已無及扵事遂不果比發去兖州訃否褒弟去冬死北亰果然惜㢤適得尊甫翁濟寜四月望日發來手書進退不䏻無遺憾矣奈何奈何老母塋封甫畢未由遣人致慰幸亮區區緝熈行時云到部須求便養而自去冬謁選至今年春四越月矣授以山東兖州府敎授然後奏請便親冢宰不許前此何不引例告選司當言而黙欲焉待㦲舉措如此謂之不濡滯人孰信之冝其不見許也中間揀選冡宰見怪假令不病将不計其不便扵養而就選耶自古進退不决扵内則其形扵外依違可否之間而欲人之不我疑不可得也烏乎惜㢤三卷終
