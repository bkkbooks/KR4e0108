  - {type: variant, offset: 0, length: 4921, content: 白沙子卷之一奏䟽乞終養䟽臣原籍廣東廣州府新㑹縣人由本縣儒學生員應正統十二年郷試中式正統十三年㑹試禮部中副榜告入國子監讀書景㤗二年㑹試下第成化二年本監撥送吏部文選清吏司歷事成化五年復㑹試下第告囬原籍累染虚弱自汗等疾又有老母朝夕侍養不能赴部聴選成化十五年以來廣東左布政使彭韶欽差總督兩廣軍務兼理廵撫右都御史朱英前後具本薦臣堪充任使吏部移文廣東布政司等衙門趣令起程臣以舊疾未平毋年加老未䏻輙行府縣官吏承行文書日夕催逼不免強起􅈬道而沿途病發随地問醫扶衷𥙷羸僅不大憊扵成化十九年三月三十日到亰朝見赴部乃以乆勞道路舊疾復作延至月餘扵五月二十五日蒙吏部題奉聖㫖恁部裏還考試了量擬軄事來說欽此欽遵臣時方在床褥聞命媿悚未能􅈬試郎令姪男陳景星赴通政使司告轉行本部暫令調治再歷晦朔心不自安七月十六日扶病赴部聴試而筋力杇弱立歩艱難自揣虚薄未堪筆硯因續具状再延旬日日復一日病势轉増耳鳴痰壅面黄頭暈視昔所染無慮數倍衆目所覩不敢自誣又扵八月二十二日得男陳景易書報臣母别臣以來憂念成疾寒熱迭作痰氣交攻待臣南歸以日爲歲臣病中得此魂神飛䘮仰思君命俯念親情展轉欝結終夜不寐臣之愚迷實不知所以自䖏也臣自㓜讀書雖不甚觧然扵君臣之義知之乆矣伏惟我國家敎育生成之㤙陛下甄録收采不遺卑賤之徳至深至厚扵此而不速􅈬以圖報稱扵萬一非其情有甚不得巳者孰敢騖虚名餙虚譲趑趄進却扵日月之下以冐雷霆之威㢤臣所以一領郷書三試禮部承部檄而􅈬道聞君命而驚心者正以此也縁臣父陳琮年二十七而棄養臣毋二十四而寡居臣遺腹之子也方臣㓜時無歲不病至扵九齡以乳代哺非毋之仁臣委扵溝壑乆矣臣生五十六年臣毋七十有九視臣之衷如在襁褓天下毋子之愛雖一冝未有如臣毋憂臣之至念臣之深者也臣扵毋㤙無以爲報而臣毋以守節應例爲有司所白已蒙聖㤙表厥宅里是臣以毋氏之故荷陛下之深㤙厚徳又出扵尋常萬萬也顧臣毋以貧賤早寡俯仰無聊殷憂成疾老而彌劇使臣逺客異郷臣毋之憂臣曰甚愈憂愈病愈病愈憂憂病相仍理難長乆臣又以病軀憂老毋年未暮而氣則衷心有爲而力不逮雖欲効分寸扵旦夕豈復有所惜㢤臣所以日夜憂憊欲䖏而未䏻者又以此也夫内無攻心之疾則外不見從事之難上有至仁之君則下必多曲成之士惟陛下以大孝化天下以至誠體萬物海宇之内無匹夫匹婦不獲其所者則臣之㣲亦豈敢終有所避而不自盡㢤伏望聖明察臣𥘉年願仕之心憫臣乆病思親不䏻自已之念乞勅吏部放臣暫歸田里日􅈬醫藥奉侍老毋以竆餘年俟毋養獲終臣病全愈仍前赴部以聴侍用則臣毋子未死之年皆陛下所賜臣感恩益深圖報益切雖死扵道路無所復辭矣臣干冐天威無任皇恐戰栗之至謝㤙䟽臣扵成化十九年八月二十八日具本陳情乞還養毋兼理舊疾九月𥘉一日欽奉聖㫖陳獻章旣該廵撫等官薦他學行老成可用今懇切求囬養毋吏部還查聴選監生碩告囬家的例來說欽此及吏部查例覆奏扵本月𥘉四日欽奉聖㫖陳獻章旣係巡撫等官薦他今自陳有疾乞囬終養與做翰林院檢討去親終疾愈仍來供軄欽此伏念臣本菲才誤蒙薦舉又以老毋在念沉疴在躬未得以仰承試用陛下憫其愚誠不加誅責使少寛旦夕之假巳云幸矣而又慰之以温言寵之以清秩使遂其欲去而勉其復來此誠天地之量日月之明雨露之澤出扵㝷常條格之外者臣雖至愚亦知􅋦負㤙徳圖報稱扵親終疾愈之日不敢負朝廷待士之盛意不敢違臣子効用之𥘉心也但身在床褥實難動履輒欲具本稱謝以不親拜舞益不自安即令姪男陳景星具状鴻臚寺告欲俟筋力稍紓尚當強勉赴闕庶㡬少伸報謝之萬一而又爲風寒所中肢節沉痛卧不䏻與臣竊復自念舊疾方殷新病復繼恐非旬月可愈不惟有稽入謝之期抑且不䏻亟副歸養之詔心未酬而罪愈甚矣臣瞻望朝廷離違在邇雖圖報有日而遲速未占俯仰愧怍無任感激戀慕之至序認真子詩集序詩之工詩之衰也言心之聲也形交乎物動乎中喜怒生焉扵是乎形之聲或疾或徐或洪或微或爲雲飛或爲川馳聲之不一情之變也率吾情盎然出之無適不可有意乎人之賛毀則子虚長楊飾巧夸冨媚人耳目若俳優然非詩之敎也甚矣詩之難言也李伯藥見王通而論詩上陳應劉下述沈謝四聲八病剛柔清濁靡不畢究而王通不荅薛收曰吾嘗聞夫子之論詩矣上明三綱下逹五常扵是徴存亡辨得失小人歌之以貢其俗君子賦之以見其志聖人采之以觀其變今子之言詩是夫子之所痛也南朝姑置勿論白唐以下㡬千年于兹唐莫若李杜宋莫若黄陳其餘作者固多率不是過烏虖工則工矣其皆三百篇之遺意歟率吾情盎然出之不以賛毀歟發乎天和不求合扵世歟明三綱逹五常徴存亡辨得失不爲河汾子所痛者殆希矣故曰詩之工詩之衰夫道以天爲至言詣乎天曰至言人詣乎天曰至人必有至人能立至言堯舜周孔至矣下此其顔孟大儒歟宋儒之大者曰周曰程曰張曰朱其言具存其發之而爲詩亦多矣世之能詩者近則黄陳逺則李杜未聞舎彼而取此也學者非歟将其所謂大儒者工扵道不工扵詩欤将未至扵詣乎天其言固有不至欤将其所謂聲口弗類欤言而至者固不必其類扵世或者又謂詩有别材非關書也詩有别趣非關理也則古之可與言詩者果誰歟夫詩小用之則小大用之則大可以動天地可以感鬼神可以和上下可以格鳥獸四時行焉百物生焉皇王帝覇之褒貶雪月風花之品題一而已矣小技云乎㢤都憲朱公以其所爲詩編次成帙題曰認真子集授簡扵白沙陳獻章曰爲我序之公昔語我扵蒼梧曰詩非吾所長公豪扵辭矣而未始以爲足認真子名集公意有所属顧覧者未必知而吾以是覘公之晩節也詩雖工不足以盡詩而况扵盡人乎謂吾不䏻扵詩而好爲大言不知言者也公名英字時傑郴陽人由進士歴官中外節用而愛人奉餞方伯張公詩序昔魏野送㓂忠愍之詩云好去上天辭冨貴歸來平地作神仙當是時㓂公自永興召入其志方銳扵事爲野遽止之故㓂公不恱後來通州始書此詩扵壁間朝夕諷詠之論者以是善野之言而以㓂公之始終爲可議夫君子出處去􅈬之義固未可盡責之㓂公軰而山人䖏士例以不出爲髙故其所責望扵人亦止以輕冨貴爲第一等事則野之扵㓂公其相與之言如此亦冝方伯張公不以㒒愚徃徃欲置之門下近者疊􅑚責以贈言㒒何敢爲倿誠慕古人出處之大不敢狥一已之私主一偏之見以必人之從我而忘天下故區區之辭惟以已與公進退竝言之而不敢效尤扵野之必其義可否公請自擇胡文定公平生出處未嘗謀扵朋友如人飲水冷暖自知惟公裁焉其辭曰去夢勞精爽投書阻歲年壮逰眇車盖虚卧老江烟公徳清南服帝心簡時賢神仙休嘱付卿相待囬旋東暁序成化庚寅十二月作居之有名惡乎始君子之居也興扵斯息扵斯目之所視心之所随苟無所事乎畏則怠而入扵忘其主扵畏乎何氏子隠南海之濵更名潜榜其居曰東曉盖亦以其識見之超卓䏻及於㣲逺如陽氣始舒昭晣無間故以其象諭之云耳時乎見則見矣冝潜而見過也則有畏潜惡乎畏而取扵是故直以爲喻已然予謂潜之畏不終無也晹谷始旦萬物畢見而居扵蔀屋之下亭午不知也忽然夜半起振衣於四千丈羅浮之岡引盻於扶木之區赤光在海底皎如晝日仰見群星不知其爲夜半此無他有蔽則闇無蔽則明所處之地不同所遇随以變况人易於蔽者乎耳之蔽聲目之蔽色蔽口鼻以臭味蔽四肢以安佚一掬之力不勝群蔽則其去禽獸不逺矣於此得不甚恐而畏乎知其蔽而去之人欲日消天理日明羅浮之扵扶木也溺扵蔽而不勝人欲日熾天理日晦蔀屋之於亭午也二者之機間不容髮在乎思不思畏不畏之間耳潜隠者也理亂黜陟刀鋸非所畏尚亦有畏扵斯乎因其乞言序以朂之李文溪文集序成化庚寅九月作予嘗語李徳孚曰士從事扵學㓛深力到華落實存乃浩然自得則不知天地之爲大死生之爲變而况扵冨貴貧賤㓛利得䘮詘信予奪之間㢤今觀其先世文溪先生遺藁𥘉渉其流渺茫汪洋若江河之奔駛而又好爲生語險恠百出讀者徃徃驚絶至或不䏻以句以謂文溪直文耳徐考其實則見其重内輕外難進而易退蹈義如弗及畏利若懦夫卓乎有以自立不以物喜不以已悲盖亦庶㡬乎吾所謂浩然而自得者矣然後置書以嘆曰嗟乎此文溪所以爲文也亟讀而亟思之執卷務盡乃至目倦神疲欠伸欲起輙囬顧屑屑焉不忍舎也夫因言以求其心攷跡以觀其用故人之深淺畢見愚不敢自謂有得扵文溪之藴顧平昔所以告徳孚者乃區區願學而未䏻忽焉親諸簡冊之中𥘉若冥㑹雖不盡觧其說要其歸與此異者盖寡矣則以之而嗟嘆慕恱尚奚疑㢤傳曰生乎百世之上百世之下聞者莫不興起此之謂也徳孚念先緒之落落遺稿僅存復多訛闕乃深自愳恧悉訪諸族之人得舊所刋本與所謄本叅校闕其所疑刻之家塾命胤子昭董其事而俾予爲序之扵乎自予爲兒時而獨恨未識其心胸氣象爲何如比歲亰師獲交徳孚亦嘗一閱其世譜今幸寘目扵先生之文而知冨貴果不足慕貧賤果不足羞㓛利得䘮屈信予奪一切果不足爲累天地之爲大死生之爲變自得者果不可得知而奮乎百世之上興起百世之下孟軻氏果不予誣其所恃者盖有在也故士必志道然後足以語此徳孚好學老當益壮昭也尚亦有激於予之斯言也乎澹齋先生挽詩序昔人求哀辭扵林􅛽􅛽謝之書有曰君子無苟扵人患其非情也夫感而哀之所謂情也情之發而爲辭辭之所不能已者凡以哀爲之也苟無其哀矣則又惡以辭爲㢤此之謂不苟扵人也余頃居京師二年間從貴公卿㳺入其室見新故卷冊滿案其端皆書謁者之辭􅈬而閱之凢以其親故求挽詩者十恒八九而莫不與也一或拒之則艴然矣懼其艴然而且爲怨也而強與之豈情也㢤噫習俗之移人一至扵此亦可嘆也天下之僞其自兹可憂矣澹齋先生姓某氏名某秫坡黎先生門人也吾郷稱先逹以文行敎後進百餘年間黎秫坡一人而已秫坡與余連里第余之生也後不及侍其門弱冠與澹齋之子益㳺始拜澹齋誨余以秫坡事縷縷此豈一日忘其師者耶當是時秫坡之門存者不少獨澹齋以其學敎授扵羅山之下子弟有所矜式焉夫不背其師於旣死而傳其學扵來世信也愛其子以及其友仁也益之子執饋扵我雲也今爲梁氏甥戚也藉是三者死也䏻無哀乎哀而後爲之詩詩之發率情爲之是亦不可苟也已不可僞也已緑圍伍氏族譜序伍氏系出汴梁先世有仕宋爲嶺南第十二将卒于官遺其二子新㑹遂有緑圍之伍曰朝佐曰朝愷今爲緑圍始遷之祖而氓又始遷之祖所自出所謂第十三将者是也氓以上世次莫詳今㫁自可知以氓爲第一世自氓而下或隠或仕垂三四百年邑之稱望族曰衣冠之羙無替厥先術業之隆有光厥後者得伍氏焉吾友光宇自其先大父某始徙居外海之南山山之坡陀有石延袤丈餘下可容一榻光宇築爲室石旁樹松竹徃徃造其間危坐收歛爲持敬之學又扵白沙築小室三間命曰㝷樂以爲問業之所至則啇論彌月而後返用心良苦時人無有䏻窺其際者惟寳安林光與余知之余交最乆光纔一再見退謂其弟琰曰伍光宇君子人也素有肺疾然喜聞議論之益當其呻吟疾苦之時遇有得輙若亡去辛卯首夏疾大作中益以他恙遂不可支是秋九月余徃視之坐甫定便語云還我族譜序吾無憾焉耳退見其季父絢洎伯兄𥙿咸申之曰絢等殆未有請也惟先生之於雲也實望之寧獨愛一言且使聞之病亦㝷起嗚呼若光宇者困而益堅老而愈壮危至而知惕樂矣而不淫可謂篤信有守者矣其扵伍氏所謂無替而有光者其在斯人歟其在斯人歟夕惕齋詩集後序受朴扵天弗鑿以人禀和扵生弗淫以習故七情之發發而爲詩雖匹夫匹婦胸中自有全經此風雅之淵源也而詩家者流矜竒眩䏻迷失本真乃至旬鍜月煉以求知扵世尚可謂之詩乎晉魏以降古詩變爲近體作者莫盛扵唐然已限其拘聲律工對偶竆年卒歲爲江山草木雲煙魚鳥粉餙文貌盖亦無𥙷扵世焉若李杜者雄峙其間號稱大家然語其至則未也儒先君子類以小技目之然非詩之病也彼用之而小此用之而大存乎人天道不言四時行百物生焉徃而非詩之妙用㑹而通之一真自如故䏻樞機造化開闔萬象不離乎人倫曰用而見鳶飛魚躍之機若是者可以輔相皇極可以左右六經而敎無竆小技云乎㢤今之名䏻詩者如吹竹彈絲𫾣金撃石調其宫啇髙者爲霓裳羽衣白雪陽春稱寡和雖非韶頀之正亦足動人之聴聞是亦詩也吾敢置不足扵人㢤少叅任君蒞吾省間過白沙携其先公詩集求一言扵卷末予故以詩道畧陳之若夫先公吟詠之情具在集中覧者當自得云送張進士廷實還亰序郷後進吾與之㳺者五羊張詡廷實始舉進士觀政吏部稽勲㝷以疾請歸五羊五羊大省地廷實所居戸外如市漠然莫知也自始歸至今六年間歲一至白沙吾與之語終日而忘疲城中人非造廷實家不得見廷實而疑其簡實不然也盖廷實之學以自然爲宗以忘已爲大以無欲爲至即心觀妙以揆聖人之用其觀扵天地日月晦明山川流峙四時所以運行萬物所以化生無非在我之極而思握其樞機端其衘綏行乎日用事物之中以與之無竆然則廷實固有甚異扵人也非簡扵人以爲異也若廷實清虚髙邁不苟同扵世也又何憂其不䏻審扵仕止進退語黙之槩乎道也兹當聖天子登寳位之眀年思得天下之賢而用之而廷實之病適愈太守公命之仕廷實不得以未信辭扵家庭扵是卜日告行扵白沙留二十餘日去歲之冬李世卿別予還嘉魚贈以古詩十三首其卒章云上上崑崙峯諸山髙㡬重望望滄𬈑波百川大㡬何卑髙入揣料小大窮多少不如兩置之直扵了處了世卿豪扵文者也予猶望其深扵道以爲之本廷實至亰師見世卿重爲我告之廷實所以自期廷實其自信自養以逹諸用他人莫能與也, WYG: ''}
