速寒泉汲務深嘗聞根本學不盡泰山岑贈李司訓别江門雲水地不絶往來交已恨栽花晚寧辭抱甕澆月疑窓下枕風語樹頭瓢精舍明朝别何時還見招再次寫懷孤形將影住一臂與誰交矯矯志欲競棲棲習恐澆江山一得手風月盡歸瓢始覺逍遥外人間未易招代簡畣府尊林先生慶老母生日有母年齡暮逢辰喜懼深多儀安敢却揣分故難任錦段拈香拜仙醅洗􅊦斟獨慙非節孝未了百年心秋坐碧玉樓造次中秋過商量九日來詩將秋景淡菊共老人開時節陶潛醉江山宋玉哀平生滄海意不受白鷗猜山中猶逺志小草已人間近得東白先生書在山逺志出小山草故及之不是無經濟誰能斷往還江魚肥入饌霜橘緑堆盤問我心何住紅藤拄杖端碧玉架雲端朝朝倚玉看時情膏火裏世事奕棋間古榻多便静華簪不博閒籬根散髪醉又對菊花斑夢楊敷道定山事夢語者為誰湖西舊見之聊寛野老意未了定山疑貧病吾猶是多愁俗豈知百年將滿日心亂不成詩九日嘉㑹樓登髙引步下前除兒扶杖亦扶㑹於何處勝客有去年無天道常流轉園林又變疎暫㽞賞今日醉莫看茱萸兼有吟詩病何妨著酒扶景逢佳處少句向􅟪時無醉去乾坤小醒來伴侣疎今朝嘉㑹㑹不盡看茱萸半酣壺矢折又減兩三扶九日江門有千年栗里無山形當晚瘦脚跡向秋疎問我登髙去都忘菊與萸溪邊菊一區溪竹兩相扶草木從吾好風霜殺此無閒同元日醉浩笑一生疎試問干雲檜何如小沜萸楚雲臺觀民澤所栽菊寄民澤用作九日韻時民澤還五羊未返當軒玉朶孤植竹翠莖扶香細風初動神清俗本無寒深溪井涸月出山瓢疎何處異鄉客永懷歌茱茰野菊吟寄子長再次野菊生何處尋香杖偶扶孤標猶訝絶佳色舊知無老弄真成獨秋來不作疎金樽誰九日引滿對茱茰吳明府送菊次韻答之黄菊有名花淵明無酒官酒多人自醉花好月同看老未厭人世天教共嵗寒未應攜不去髙步蓬萊山答周潮州萬里今代潮州守濓溪是一門乾坤吾道在嵗月此心存行次天邊路書投海上村夕愁空竚望風雨暗髙原汪巡按見訪嶺南經略地柱史不謀身料理安危事更張文武臣風行先動草寒極正開春傾蓋江樓暮揮杯勸故人寄題小圓岡書屋和民澤韻四野雲飛盡圓岡一室清至虛元受道真隱或逃名有疏㣲言塞無為大業成一聲聞絶唱五岳看全輕劉少叅見寄次韻奉答西川一杯水為我浣詩塵身落滄溟逺心將翰墨親江樓初見客野徑别藏春十郡停車地千峯擊壤民贈李世卿楚客復歸楚青山此送君往來十年破精力半生分著意當時見㽞情異代聞若非真有見何處謝浮雲三尺短春蓑山風吹薜蘿人材非管樂吾道本丘軻送老諸名岳全生一病窩相思憑寄語路打祝融過落日蒼梧望清風發棹謳楚山正西上江水自東流作伴春攜酒談詩月滿舟洞庭看未透更上岳陽樓題黄公釣臺小小離人意羊裘却未工今人多白眼為我謝黄公弄釣浮沈見登庖撥刺空浩歌泉石裏况有古人風曉枕示湛雨龔曰髙二千六百丈脚底是飛雲悠悠四十年欲往念徒勤多謝紅藤子扶吾還數君鐵橋問何如見景勝於聞萬年如一瞬莫問我浮生風雨將秋至山河載月明語簷幽鳥樂對竹小童清夜夜湘江夢與君何日行再和曉枕寄廷實仰見雙白鶴髙飛入紫雲茍無脱俗意安用看山勤好句能傳我幽期敢後君異時鐵橋詠莫遣世人聞萬往皆有復左車不復生西風今夜起朗月四山明天馬非常步鐵橋相伴清去去莫復顧衡山頂上行曉枕再和平生老黄石引望空白雲無人知感激為我盡殷勤何處尋吾契名山訪道君洞天三十六步步聲相聞外生即非死胡為樂久生去來大化内俗眼未分明我夀元無極君才亦太清五峯南斗上何日踏歌行中秋平樓時穩步身虚欲翩翩明日秋始半中天月最圓武昌書未返督府句堪傳衡岳那能去羅浮何處烟廣寞天自然浮雲任飄翩隨時有憂樂與物無方圓酒底月未咽水中神莫傳去年今夜艇吾欲破湘烟彭司冦挽詞男子固多竒如公更不疑經綸思昔日功業問當時鬼幸村巫小棋還國手知杜陵秋月下興盡八哀詩侃侃亦誾誾行違榜要津鳥還江上暝人老世間春禄盡休言命愁多不為親武夷最髙處東望一沾巾斗氣空遺劒牀燈不照琴春懷不自得老病忽相尋事往浮雲夢山餘宿草心平生孺子意絮酒一何深題雲津書院太和劉氏雲津杳何許試向巻中尋不覩六經教空餘百代心嵩陽思識面白鹿尚遺音家有鴛鴦譜何須更問針春日冩懷水際尋芳去花枝隔水新可憐今日望不是向來人紫袖垂垂下黄鸝樹樹春東風天外至南岳夢中身一觴復一曲不覺夕陽殘好景我只醉春風人未閒青紅今滿路風日未登山何如海中鳥鼓翅蓬萊間贈周文都君行無日矣奈此别離何道逺書難寄年衰病更多行行慎自愛浩浩不同波若見東山北㣲言共琢磨贈黄希顔春試北風雨如注是底别離時黄色眉端動青雲足下馳兒童酣世豢國士醒心期去去江流疾還君一贈詩詩罷懷白洲先生山東無近耗白洲時為山東左方伯海上立斜暉童子􅟪牛去漁翁罷釣歸登舟人欲别周文都赴㑹試將行見月鳥還飛何限相思意千峯獨掩扉贈丁一桂初月照甘棠千門一炷香南風催返棹西朢欲沾裳有廟旌遺愛無金歸故鄉未知忠定者先請問崇陽奉寄筠巢翁昔别筠巢叟如今是幾年華巔將朢百碧玉屢添年寥寥千古下望望五峯前何日扶溪棹還來别老仙鄧御史公輔寄新刻陳君舉論孟古義復以是詩兩漢非三代人才逐世低市朝多畫虎文字笑醯雞古義昭昭對終篇短短題不因歐六一争得見昌黎張綱漢臣張御史何事便埋輪欲作千年計都忘一個身堂堂見意氣黙黙愧經綸却恨程明道丹青失冩真吳節婦江山逢此㑹真地作光輝路轉扶溪北山來越嶺西春光流聖澤明月照霜帷碧玉遥相賀雲中卧賦詩汪海北訃至西所今亡矣皇穹肯不仁眼中還見此天下豈無人海闊書頻至神交夢亦真人間秋半後回首一沾巾誠至通金石乾坤正惜君懷沙人不見修古恨空聞殁世能千載還山但一墳海山今夜月空照水中雲望望白洋水滔滔碧玉流白頭聞有是傾蓋忽相投天柱峯常在神龍雲正浮悲歌掩圖畫淚落不能收英雄滿襟泪不灑兒女胸窮愁當盡夜浩歎起秋風幾㸃星初落千峯日未紅髙樓慵引望興盡一宵中示景易長鯨千里鬛靈物一生竒化成端有日潛躍貴因詩感應天終定早暮命難期信知抱甕是安事桔橰為題丁長官祠千山多雨後百姓苦飢時老病無人問低回只自知百感觀空盡扁舟適楚遲詩成逺莫寄分付長官祠漫筆行年七十二七十一年非漁樵真有分語黙各因時比恨四愁具方年伯玉衰未行元屬我天命更由誰題筠巢巻手把筠巢巻口詠筠巢詩白頭心折處碧玉夢醒時夢將人待逺心與此君期想見千林暮還同一鶴棲寄張梧州克修還家臣軄盡攝守郡符新心同端溪水跡比峽山雲朝野無交牘桐江有釣綸時無張刺史脚板但空聞贈黄化州歸莆田有客來何處多年守化州白雲秋自好碧玉自相投日月催人去行藏悵此休武夷洗足罷回首望羅浮枕上偶憶舊遊南海祠因懷故友林暕子覺饒英氣攜書話此宫清祠無厲鬼大水有真龍過客窺諸葛論詩病長公往來三十載美惡併成空卧遊上游庄上游何處是試唱上游歌入澗花迷路出門雲滿蓑景勝開圖畫春香醉綺羅静對南岡頂月明秋更多次韻荅鄺筠巢飄飄八紘外逺意竟誰分我抱三年病天生幾様人十年營一壙萬骨掩孤墳休休莫復論局促此乾坤次韻遊上游黄雲山繫艇黄雲下黄雲幾度歌登髙雲壓帽度宻雨沾蓑瀑澗宵鳴瑟山花晝擁羅野人攜茗榼路打鐵橋過荅容北溪見訪曲徑黄雲外青山一路深巻為乘興地人間何處尋白龍三畝水紫府萬回心錦囊挑不去千峯暮色深中秋撥悶用舊韻疎星圍碧玉秋氣正平分共持今夕酒又減去年人白髪來千丈青山忽數墳年光付流水萬物信乾坤晚有悲秋意秋來此夜分可憐清夜酌盡是白頭人紫蓋終攜病朱陵願卜墳誰能天地外别去􅟪乾坤諱日雖貧還講諱兹事俗之常時節難虛度杯盤秪自傷五鼎終難具千秋敢易忘痴兒雖未了清白永流芳迎醫寄左明府帆開春鳥起篙響曉鴉連日出千江水風連一路烟病苦魔難敵情真事可憐平生左明府應惠濟生丸贈陸醫士左明府遣來山雨睡初醒門前報陸生手持王氏藥重是長官情分付一杯茗剛勞幾日程小詩何足謝聊以著佳名寄東所病久惟聽命詩成不浪傳門前花十丈玉井正開蓮數椽剛到地一棟且横天不亡吾道在萬萬嵗相連春日偶成菊殘猶可對人老不須嗟水閣風低栁山籬雀啅花千門盡桃李十畝未桑麻大禹須治水顔回却卧家競長家家栁齊開陣陣花春深添富貴人老舊烟霞欹枕黄鸝近開窓白鳥斜草𤣥無意緒呼酒對侯巴白馬菴聨句人生須此㑹何處問隂晴白沙動蕩乾坤氣調和鼎鼐􅃵懷玉公來山閣雨天共主人情定山未了鵝湖興江城又殺更宗𣲖寒風吹角短細雨打更長白沙天意㽞行李燈花喜對床懷玉衣冠真率㑹尊俎太和湯定山何限春消息梅花不斷香宗𣲖七言律詩與友約遊仙井仙井㑹容雙眼到病軀須著一笻扶春風有客來相問何日扁舟進所如世道難交終索寞幽居擬卜只虛無憑君寄語山靈道欲傍啼􅆐借一區馬貞卜築圃中與容貫同處何處有花堪結椽溪邊園裏樹相連一齋一榻同燈火江草江花自嵗年元亮髙樓須避俗巖青異骨合成仙東風兩岸黄鸝語我亦中流坐我船自斗岡還至汾水江值暮歸舟欲背南風發别琖初開落日斜社曲寄聲憑驥子是日景易有信促歸武陵回首惜桃花東遊西泛經旬日揮翰㽞詩到幾家滿眼却愁歸路黒時從野老問江乂弔崖天王舟楫浮南海大將旌旗仆北風義重君臣終死節時來胡虜亦成功身為左衽皆劉豫志復中原有謝公人衆勝天非一日西湖雲掩鄂王宫子陵誰將此筆㸃行藏真有乾坤日月光三尺羊裘幾銖兩千秋龍衮共低昻客星天上何須急老脚人間不浪長㽞得先生在台輔不知東漢可陶唐羊裘不返道終疑玉帛雖來事可知天下君臣光武召世間膾炙子陵碑故人不改狂奴態一事堪為百世師九鼎漢家從此重聽歌山谷老人詩桐江秋水來天地照見千年老鳯還太史直書形迹外先生猶在是非間交情此去投當宁年事何勞列從班欲向東吳問遺老江湖容有此翁閒先生如此亦天民髙坐桐江一水濵却到陵夷排亂賊方知名節是忠臣白鷗自去江湖逺黄紙何來道路頻往往見人東廡下傷心一代帝王真讀張曲江撰徐䀻君墓碣杜陵烟艇曽來否相國銘章今在亡千古我能生感激一碑誰可借輝光江波自映蒲輪返原草還沾絮酒香事異鑿坏終逺去鴻㝠天濶道之常桓靈而下使人悲却憶陳蕃在郡時何處公車還欲召平生此榻竟奚裨事機成敗我當算天命去㽞人得知萬古江山一回首風清月朗䀻君祠知心未問陳蕃軰欲起先生在帝桓自古山林輕禄位至今朋黨惜衣冠尋常笑語諸公撫七十支離一老看誰道開元張相國重磨碑碣冩心肝一木能支大厦顛棲棲徒只喻當年身垂白髪西山裏光射青牛北斗邊信史只今文獻碣清風何日豫章傳狂歌亂耳不足獻依舊生芻置墓前西山驛晚望晩來花雨濕詩囊晚上郵亭望大荒南盡海旁諸郡淺西來天上一江長漁歌落日還孤艇樹隔啼鶯背短牆料理憑髙非一事樽前誰與共平章秋江漫興能傾瓦􅊦深深酒不盡秋江短短篇閒弄孤舟移白日明開兩眼看青天鷗遷逺渚眠何處雲颭髙風落此川野老隔波頻問訊可能無意向神仙送羅養明還江右長寄湖西夢裡身扁舟春早忽相尋乾坤自古悲難合伯仲而今契亦深草色正催公子醉花枝不稱老年心何須袖却鴛鴦手更向滄溟問我針懶作人間賣卜仙紅渠浪裏枕書眠詩篇到老絶求世酒琖逢春不愛錢鷗鷺一羣清似雪江湖諸子逺如天扁舟忽報金牛信也得江花對惠連村中即事山風處處聞松花江市日日來魚蝦髙田一弓走獵犬灌水幾株叢老鴉正逢元宵市燈好亦有雜劇村鼓撾野老西疇急春事長揖縣官歸縣衙曉枕過金洲戲作行人拍手笑天公十月江湖未朔風旭日上天纔半赤晴霞照水忽殷紅注目九江來艇急回頭三老著篙慵何須却是蒼梧道不道天公也笑儂清明前三日有懷亡友伍光宇無子先生英骨葬蓬萊幽思憑髙不易裁荒嵗無窮春易老清明將近雨還來皇天自失包胥定泉壞誰興伯道哀尋樂齋前數株樹月明空有鶴飛回禱雨呈縣主丁彦誠峯頂為壇五土升皇穹端合享精誠雨聲先到玉臺寺雲氣初蒸緑護屏野老分錢須一虎病夫獻茗走諸生年豐我欲招神貺絶壁髙鑴令尹名奉陪趙提學崖山慈元殿弔古信國諸臣近有碑一陵瀕海尚堪疑荒山野水無人到落日輕風送我旗天地幾回人變鬼風波萬里母將兒萋萋芳草慈元下邂逅漁樵問舊時李德孚輓歌詞此翁白髪已垂肩猶借滄波十載眠德孚己丑偕子自京師歸不復出至是十年而卒一舸載書同載酒幾家㽞藥更㽞錢山陽笛奏西樵月西樵南海山名余曩與伍光宇同遊後有西樵山感舊詩即此山也薤露歌傳大石篇大石即德孚所居村名誰道人生只如此兩行衰淚落江烟别時已動東游興别後還深永訣悲夫子春秋能六十故人涕淚不童兒身如南郭人間老家有文溪地下師修短未知人喜戚天涯孤影日凄其題莊定山詩集春風一曲有霓裳不落人間小錦囊今代名家誰李杜先生髙枕自羲皇乾坤兀兀中流柱風月恢恢大雅堂莫道白沙無眼孔濯纓千頃破滄浪浴日亭次東坡韻殘月無光水拍天漁舟數㸃落前灣赤騰空洞昨宵日翠展蒼茫何處山顧影未須悲鶴髪負暄可以獻龍顔誰能手抱陽和去散入千崖萬壑間扶胥口書事借浴日亭韻早春約我扶胥口今日進舟黄木灣使君已去漫㽞諾水國獨吟空見山老向烟波真得地晚來風日更開顔明朝去􅟪南川子與話平生水石間宿㰖山書屋一片荷衣也蓋身閉窓眼者乃何人江山雨裏同歌嘯今古人間幾屈伸長與白雲為洞主自栽香樹作齋隣山中甲子無人記一度花開一度春别欖山羅浮山色眼中來老子心情不易裁髙浪不驚南海舶白雲聊共㰖山杯未知竹徑㽞人否那問天公著雨催主人更道秋來好收拾黄花待我回餘興何處秋聲入短琴江邊蕭瑟起楓林空歌白雪兒童笑不負滄波老子心釣石摩挲雲氣暖睡沙展轉月㾗深眼中昏嫁隨時了只有床頭鬻犬金陳冕來遊白沙至仰船江遇石尤風舟覆中流幾覆程夫子何况白沙門下人賢軰何曽負天道老夫正自怪江神仁義幾回驚濶論利名何處不通津祗應歸拜庭闈日棄置艱難不肯陳羅一峯輓詞今我何敢私一峯百年公論在兒童要知此老如君實更恐前身是孔融青天白日人千古五典三綱疏一通天下何常乏知已我言剛與定山同狀元文史少㣲星翰苑為官謾兩京既有光華争日月那無描畫在丹青表章細事憑諸老悵望髙風激後生千秋欲與蘇徐並湖水中央更一亭芙蓉城下白騾還更見一峯何處山晚覺神仙真妄誕肯㽞精爽一追攀髙才轉盼交游内元氣驚心宇宙間此日迸空為誰泣衰齡何意向人寰杜阮看山客貫卜居之地曽於海上看羅浮魂爽髙飛未得收一片好山還入眼兩巡痩馬更回頭青浮竹杪岡連峙紅浸花枝水曲流君若卜居須卜此澗邊黄髪是巢由數家種竹已成林共有平生下築心草木總偷春色早雲霞偏傍晩山深鶯聲早赴山靈約松蓋先分地主隂欲置一菴三級土結趺髙榻對南岑代簡荅伍郡主為莆田林侍御求草書閉門一病九十日小草大草生荒蕪山癯須愛老狂客府主正逢賢大夫藥裹君臣何處有墨池風雨坐來無秃管已馳林侍御如今雪繭不還莆東亭奉别憲副陶公父老連村擁畫航東亭西日引杯長舊是宰官今憲副後來新㑹古桐鄉指揮戎馬能千里表裏山河捍一方太史但收能吏傳昇平不必問耕桑蔣宗誼以厥考樵林摘稿及其所著續宋論見寄代簡奉答江右詩書不乏賢君家父子盡堪傳樵林一摘幾千首宋論直窺三百年西漢文章遷史後東吳風月定山前乾坤隻眼知誰在不是楊雄不好𤣥寄景星海上妬花暝雨迷千里隔水殘紅度幾車夢破三更子規鳥香來一樹木犀花病夫老去頭如鶴稚子春來髮似鴉海曲傳詩意無盡更期何處問丹砂次韻都憲朱公歸興當日頭顱也未然相逢休問買山錢葛巾旋把陶潛酒烟水將歸范蠡船嶺表他年須領略桂陽秋月憶髙眠大臣去就嫌疑絶還似嘉謨贊九天命孫田新開斥鹵走通川賸種烏穧益税錢士不居官終愛國孫當從祖是名田幸生天下承平日屢見人間大有年從此不須憂俯仰茆齋向暖抱孫眠辛丑元旦戲筆酒杯不與年顔老詩思還隨物候新分外不加毫末事意中長滿十分春棲棲竹几眠看客處處桃符寫似人除却東風花鳥句更將何事答洪鈞與謝胖栁市南頭望客舟青山無語水東流江花自對黄鸝晚風雨偏催白髪秋宇宙萬年開老眼肝腸一縷入春愁明朝日出波濤暖依舊忘機對海鷗重贈張詡風雨何人來欵扉滄江烟艇疾於飛正將白首憐傾蓋不管春泥得上衣詩句與君争出手酒杯中我自忘機傷心萬里滄溟水又逐長風破浪歸􅙐醿將開值雨相看無語只沈吟蓓蕾枝頭已簇金山雨不來昏晝景東君容有妬春心較量花品終何益茫昧天機亦自深明日隂晴還未定一尊何急對花斟答梅繡衣見訪一春烟雨暗荆扉繫馬憐君共落暉酒琖香風吹月桂硯池清露滴􅙐􅀈水中郭索嗔皆是屋上慈烏愛亦非天道不移人自異紅塵飛上釣魚磯陳庸被盜張詡有詩唁之因次其韻三尺龍泉八尺身書生膽氣欲驚人亦遣偷兒知我輩還將直道是斯民風連蜀􅅎東方曉雨洗荼􅐘昨夜春白舫望君心若渴清川照我髪如銀曉枕天時人事莾何窮睡破山窓正惱公幾㸃木犀三月雨一聲蜀魄五更風青春有限年年老白髪無私個個同莫共老人論甲子閭閻稚子亦成翁詠鶴孤山赤壁兩茫茫疎栁江邊一草堂塵世事多黄髮老仙禽真對縞衣郎風傳蕙帳聲猶裊月落芝田影漸長却怕茶烟生一縷等閒飛去碧沙旁憶鶴孤山有月好西湖只問湖中鶴在無頸閣痩軀三尺半聲揺殘夢四更初青田别去何由見赤壁飛來不受呼寂寞小齋誰作伴賽蘭香裊舊團蒲謝惠壺江上花邊到一壺春風日日要人扶數篇栗里乃何趣五斗髙陽非酒徒春事無多花去眼老形已具雪添鬚醉鄉著我扶溪老白璧黄金惠不如題閒叟前村烟火熟朝炊正是先生睡足時身在江山人在畫目窮今古世争棋花邊擊鼓諸孫戲竹下扶笻一鶴隨應笑書生閒未得白頭憂世欲何為游心樓為丁縣尹作城外青山樓外城城頭山勢與樓平坐來白日心能静看到浮雲世亦輕髙閣祗宜封斷簡半年方許讀西銘乾坤一㸃龍門意分付當年尹彦誠次莊定山清江雜興家學華山一覺眠圖書亦在枕頭邊傍花隨栁我尋句剩水殘山天賜年竹徑旁通沽酒市桃花亂㸃釣魚船平生我愛孫思邈自古髙人方又圓中秋夜示江右李劉二生勝㑹古來非獨今兩生尊酒喜同斟且看溟海中秋月莫動匡廬半夜心天道端須憐主客浮雲不敢弄晴隂堯夫獨愛梧桐上萬籟無聲意自深辭修縣志嘘嗟文獻荒凉久著述圖經長老宜令尹髙才應處分病夫何者敢聞知嘗聞司馬開班范直似家翁詔小兒史體所闗無大小千秋麟筆寄宣尼寄李九淵黄花開盡不持醪更對黄花讀楚騷江閣影流西日轉海鴻聲引北風髙大寒天地猶堪出垂老筋骸總厭勞嗟我與君同甲子鏡中誰讓長霜毛次韻梅侍御贈别朱絃一弄白雲深山水何人共賞音老去布裘偏愛日春來花樹不宜隂兩端妬復雖天道一體乾坤是此心扶病寒江逺相送古椰葉脱北風吟贈同遊馬𤣥真伍伯饒甥舅江流東與海潮通江去潮來今古同巖洞風光詩巻裏天涯嵗月釣船中老甥動止常隨舅小友心情愛傍公更約鐵橋窺險絶筆床琴匣未須封立春日呈丁縣尹浮生五十五回逢青帝來朝駕自東草色向江先自緑桃花臨路為誰紅髙堂滿獻曽孫酒小邑初移令尹風身著斑衣啼又笑老來真個是兒童元夕欲將斗柄作垂鈎髙掛銀蟾照九州皇帝萬年臨宇宙羣黎無處不歌謳兩間和氣氤氲合五色卿雲爛漫浮一曲昇平人盡樂老夫林下更何求賀冠者都老門前十文松采帷髙映日曈曨賔迎一徑桃花裏春在三加酒琖中禮式未忘洪武化絃歌還動子游風王人不用投壺勸醉倒江門老石翁寄髙知縣下疑河岳上星辰何處勾連得此身天上未旌强項令督郵多見折腰人青天白日孤城曉碧栁黄鸝萬井春澗底菖蒲真未有堪君服食更通神次韻伯饒見示養内之作小結菴居不化縁牽蘿架石兩三椽一函玉笈飛霞裏半枕華胥語鳥邊東老豈知丹是酒今人多以管窺天市中買得叅同契萬遍千週然未然次韻荅伯饒見拉出釣好共溪山結晚縁竹枝深夜響漁椽風清月朗滄溟外魚躍鳶飛枕几邊茶竈烟銷回野艇竹竿霜冷釣秋天少年孟浪東西走衰病于今恥復然苦熱尋常衣汗濕青荷争奈連朝溽暑何四象隂陽分老少一年天地幾中和水枯瓦沼蛙將徙日炙山枝鳥不歌一事傷廉非得已竹林氷簟受風多寄林虛窓蒼梧酒興未消磨又向江門鼓枻歌鳥見畫來髙畫品我疑詩巧是詩魔輞川樹石愁摩詰與可精神動老坡開眼也知真有益後來嵗月悔無多晝睡林木蒼蒼鳥哺雛江亭春與睡相宜風花已遣新年醉氣候還増病叟癡塵世悲歡忘處了浮生日月夢中移晨炊未熟無人喚正是飛雲曵杖時對酒竹杪風輕瓦雀哀葛巾蕭散步階苔放懷自對溪花笑好事誰撑酒舫來白髪驚看今日老青春剛到隔年回狂心被酒如飛鶴又逐紅雲上玉臺二仲為隣蔣詡家蕭然鶴髪映烏紗春來歌唱惟消酒老去園林尚種花蚤卜居廬依木石不論日月住烟霞小齋半夜忘眠處三尺盆池一口蛙南歸途中先寄諸鄉友我家久住龍溪上説著龍溪便有情茘子不將梨鬬美沙螺休與蟹争衡江村婦女蕉衫窄市巷兒郎木屐輕漫興詩多誰和我樽前忙殺馬先生不分賔主共林塘脱下朝衫作道裝酒為老夫開甕盎茗和春露滴旗鎗津頭水滿鴛鴦下墻背風來枳殻香何處與君拚坐久萬株花裏小藜床與謝祐易生忽與謝生來小雨初晴到玉臺笑我十年臯席在為君今日蓽門開古來委吏非忘魯世外髙人亦姓回滿眼示人人不識更從何處話根荄縣主丁侯約遊圭峯齋次以病不果賦此笋輿欲出更夷猶病入西風汗未收書閣水雲聊自晚玉臺霜月為誰秋主翁愛客杯盤大小吏鳴鞭道路愁我有平生筋力在不尋齋次碧峯頭懷古五斗之粟可以生折腰殆非賢所能即生斯世須妨俗莫道前身不是僧廬阜社中期滚滚潯陽菊畔醉騰騰南山歌罷悠然句誰續先生五字燈荼􅐘花開有懷同賞看花何處發孤吟墻角荼􅐘又破金紫艷照人今日態香風吹夢隔年心多情酒伴何來晚得意遊蜂入每深病起南窓坐終日獨憐涓滴未成斟次韻林先生潮連館中見寄烟村渺渺樹成行社屋三間是講堂竹葉林中堪送老菊花籬下又逢霜膳夫問煑魴魚美田舎邀甞早稻香入社撚鬚誰最數共尋佳句答年光祖母年髙令伯歸白雲丹陛共霑衣小臣去國身多病聖主㽞心日萬幾一飯未能忘補報百年終是懶依違白頭恐負垂髫志記得城西就館時夜坐因誦康節詩偶成窓竹蕭蕭正晚風溪星耿耿又秋蟲一瓢豈肯方顔子千首將無有邵雍恨月嘯花都大雅鳶飛魚躍一中庸無人不羨黄陳輩髙步騷壇角兩雄家兄往東向村收蚤稻登舟後雷雨大作章侍坐貞節堂至夜分以為憂是年甲辰家兄六十一未嘗有如意之求花甲人間亦易回吾兄懷抱幾時開雲師暫引秋帆去風伯還將暮雨來社酒香消荷葉冷楚歌聲起竹枝哀天公遺我多愁事貞節堂邊炒夜雷丁縣尹惠米時朝覲初歸病叟山中觀物坐長官天上帶春回琴堂未必淹三考村酤猶堪共一杯彩翼雲霄看得意白頭供奉愧非才如今單父無裨補分俸何須到草萊次韻張侍御見寄吐月山前坐四更一凉何不獻先生鷦鷯翅短那能去駿馬蹄輕只欲行見舞緑蓑知我醉聽吟素練是君清許尋舊雨江門下秋晚不來空寄聲赤松黄石皆㽞侯回首丹丘是故丘明月波間休擊楫白蘋洲上有眠鷗誰家風雨花無恙萬古江河水自流百尺樓中朝引望望中去馬更來牛聞張廷實謝病歸寄之老夫衰病託滄溟不道滄溟亦有争正是黑頭堪入仕初登黄甲最知名君當出我一頭地我更期君萬里程聞説朱明丹已熟扁舟同作訪醫行偶憶夢中長髯道士用一囊貯羅浮山遺予戲作示范規飛雲萬丈來㝠㝠囊括誰將隻手擎南極回頭一閣老鐵橋有路中天行山通碧落神明衞地有丹砂草木靈若個長髯應識我古來真隱不知名九節之笻手所持兩年衰病負幽期香爐瀑布還匡阜碧水丹山自武夷雞犬幾時同馭氣雲霄無日不支頥可憐一覺羅浮夢不記長髯道士誰羅浮道士説軒轅千古風髙尚可覘枕上昨宵驚短夢人間何處覓長髯誰能愛酒過東老我欲凌虛問海蟾四百亂峯南斗下是誰囊括到茅簷夜坐半屬虛空半屬身絪縕一氣似初春仙家亦有調元手屈子寧非具眼人莫遣塵埃封面目試看金石貫精神些兒欲問天根處亥子中間得最真不著絲毫也可憐何須息息數周天禪家更説除生滅黄老惟知養自然昔與蜉蝣同幻化秖應龜鶴羨長年吾儒自有中和在誰㑹求之未發前次韻張廷實謝病後約遊羅浮見寄滄浪共擬一桴浮欲斫扶桑作釣舟箕潁舊知堯舜大㽞侯初伴赤松遊空中鶴爪挐雲上橋下泉聲洗鐵流却憶平湖林縣博僊山從我竟何由胸中千頃著南溟何物岑蹄莾愛争但得百千同買醉不曽三十便收名鶯花衮衮新捜句烟水茫茫舊路程莫倚芳容欺老病手扶青玉並君行與謝胖風波來往十年身舊事凄凉不可陳當道豈非鉤距手青山不問打眠人酒醒旅館城南月夢破茆茨海角春何日定攜妻子去水田稼好最娯親夢崔清獻坐床上李忠簡坐床下野服搭颯而予參其間清獻堂堂四百春夢中眉宇識天人報君西蜀清油幕老我東籬白葛巾萬里歸心長短賦九天辭表十三陳南風欲理増江棹也借青山卜墓隣公在蜀中嘗賦水調歌頭一篇其辭曰萬里雲間戍立馬劒門闗亂山極目無際西北是長安人苦百年塗炭鬼泣三邊鋒鏑天道久應還手寫留屯奏炯炯寸心丹對青燈搔白髪漏聲殘老來勳業未就妨却一身閒蒲澗清泉白石梅嶺緑隂青子怪我舊盟寒烽火平安夜歸夢到家山夢中對菊坡論舉此詞故中聨及之宋史記中堪列傳菊坡門下豈無人彈文驚世頻登閣散髪從師懶著巾嶺海一星元屬李古今全筆總歸陳山齋夢破今何在夜半歌聲徹四隣館廷實進士於白沙社率爾成章兼呈丁明府壇有青松埭有花烟籠寒水月籠沙人間何處堪棲鳯嵗次今年正屬蛇樹杪看山横半面水邊尋路入三乂髙軒若肯終年住應没閒愁上鬢華廷實偕丁明府遊圭峯雨中奉寄脚頭到處是天台多少風光在草萊花縣偶攜明府去玉臺還少道人來清流赴海無千里白骨封苔有幾堆對雨一樽須强飲為君呼起鼻中雷次韻鄉人送酒四時功德正恢台仲蔚門前十畝萊恨我未能終日醉夫君又送一尊來江山雨過聊供眼書巻年深謾作堆午枕南風吹不醒可能破柱作驚雷廷實歸贈以瑞香之花次韻㽞别是誰溪裏放船來溪月隨身上釣臺衰骨可供連日語後生真有不羈才笑呼白鳥同詩社旋掬清流當酒杯欲贈夫君何所有畫䦨新帶瑞香回番陽丘先生逺示傑作二章仰仞垂愛之厚感慰兼極章衰疾龍鍾無足為故人道者勉據來韻少布區區之忱耳倘過遼陽之便假手録寄以發克恭黄門一笑幸甚昔從天上拜彤庭一别官河幾度氷豈有文章供史館漫將袍笏對山靈數株松菊猶三徑兩棹風烟又八溟欲冩漁翁寄廬阜眼中誰解辨丹青緑水青山置我曹江西遼左一神交短籬霜菊誰供酒破屋秋風自補茆勲業都歸窓下枕行藏更問易中爻痴兒多病慈親老不向清時歎繫匏西良容君攜孫來訪不見夫君心緒亂忽過茅宇鬢毛斑稚孫看弄窓前筆魴子忘歸月下灣衰病欲尋西華枕舊遊半落北邙山洛陽詩酒耆英社分付江門主客間次韻定山先生種樹東崦芳菲已碧桃更移紅杏占西㘭每逢好雨扶笻看不要先生抱甕澆與一野僧吟憇石無諸俗事坐持醪不將物我來分别觀化于今是幾遭橋下泉流十丈窪橋頭草屋萬株花闗闗終日鳥鳴樹嵗嵗春風人在家何處三杯歌浦口夜來一夢在天涯尊前不見滄溟濶浩浩還君一笑誇花時風日美新晴北沜南垞迤邐行春色酣酣薰我醉年光衮衮歎人生竹林背水題將遍石筍穿沙坐欲平客問定山何所有滿山紅紫數聲鶯題畫王太姥像夀家慈八十一三元甲子不須論帝遣長生住此村花水前頭瞻太姥雲霞裏面拜曽孫一天星彩分南極千嵗桃花發舊根議儗人間都未是壺中自有一乾坤至日病初起至日哦詩起坐床梅花牆角為誰香暖臍一盞金櫻酒降氣連朝附子湯旋整巾裳還客拜未堪歌舞趂孫狂赤藤杖㸃廬岡石向晚猶須望八荒兩度書雲傍玉臺不才知幸乞恩回梅花果解撩詩思弓影何須落酒杯四大形骸從老去一年風日想春來眼前不獨南枝早未臈江桃也爛開睡足龍溪舊草堂晨開東牖望扶桑四方雲物書同日半夜梅梢度一陽行不愧人貧亦樂藥能除老瘦何妨春來試約張東所何處投竿弄渺茫山人家世本陳搏供奉何堪晚得官菽水可寛垂老意江山不比向來看教兒别煑新年藥問客能飡老菜盤欲上飛雲更何日典裘沽酒掛驢鞍殘菊寄兼素此菊自九江舁來徙檻編籬與護持託根何謝九江時數花寂寞元髙品一賞延縁有舊知把酒忽驚今日意飡英誰弔古人悲風霜未改㣲馨在看到𤣥冬復幾詩晨起將出尋梅朝烟横野犢鳴陂索杖山齋睡起時田父許㽞今日酒梅花不欠去年詩衝寒索笑來何處帶病尋香出毎遲彷彿西湖夢中見水邊籬落忽横枝半樹横枝太逼真暗香疎影亦傳神芝蘭失寵元無雪桃李生嫌更媚春老幹最宜千丈石香風不動九衢塵相思滿眼天涯暮迢逓無因寄逺人虬枝髙望鐵橋開禀氣寰中寡所諧樵塢夜寒花索酒山厨香近月横階何處畫圖空議儗他時羮鼎絶安排相逢也恨孤山淺那得詩情到簡齋村南乂路細縈蛇注目寒江不見花逺樹帶煙風裊斷長稍離岸石鈎斜看來欲洗溪邊竹折去須乘水上槎買地結庵何處所老梅今擬作東家輓勑總兩廣軍務都御史郴陽朱公十年持節嶺西東奏疏金門月幾封都府清虛如到寺家徒冷淡不隨公瘡痍已拯人間溺經略還收戰外功猶與後時憂餽餉羨餘不以獻重曈髪疎齒豁瘴天涯已道頭顱事可知萬里忽聞徴召起九泉應恨乞歸遲事方年少常如鈍慮過時人忽似痴愛惜餉軍三十萬至今猶繫陜人思楚天春望思難任生死交情秪自深豈有鵬程髙萬里故收駿骨破千金姓名叨入黄公傳絮酒空懷孺子心拂拭孤桐向明月哀絃彈絶不成音太子少保誠庵朱公歸塟郴陽適㑹憲長陶公遣生員陳諫偕景暘往祭其墓遂併以公意作詩贈之銘旌前日别金臺故吏門生安在哉黄葉孤村荆桂老青山連騎越香來人思舊德聞吹笛鳥避新阡下啄苔欲了平生功德狀到時須打墓碑回黄金誰問買端溪羊祜殘碑我解題一飯可忘公吐握千秋遺愛廣東西寒瀧急雨飛濤惡夜峽啼􅆐哭月低不為髙堂兼卧病天涯絮酒肯教攜讀張進士輓丁明府彦誠詩次韻六年官守斃諸難七月孤兒護一棺作縣禾逢真事㑹濟人初試小還丹思張公道多違俗入叙年勞不轉官今日桐鄉須愛我還公俎豆黄雲間寄莊定山兼謝藥鼎祭器青燈白馬共延縁半樹梅花一大顛謂太虛師色笑親公剛一月江山别我忽三年懸車有病時將晚辟榖無方意可傳祭器逺來人不見夜焚香炷拜青天易郴訃至乞書銘旌三年不欵白沙扉病枕春來耗亦稀天地無窮流水逺江山猶是昔人非羣賢半逐春雲散老淚還隨暮雨飛八字銘旌吾敢愛知君不愧舊儒衣謁諸墓宿草荒墳秪自悲百年心事欲奚為劵堂有䑕能穿地神道無人可假碑數口仍憂開嵗給一錢未領到官支赤泥淺土嗟何及早晚床金盡一揮悼林琰青湖山下抱琴回人道藩籬自此開澡雪果嫌身抱柱甘眠真有鼻呼雷塵埃衮衮荒書課鴻鵠翩翩落酒杯多謝急難兄弟好為收遺骨塟蒿萊扶胥早寄坐中身晚入黌宮忽四春放意自名狂者事到頭誰是醉鄉人世縁可徇聊同俗習氣難除每喪真聞道平湖歸漸近相逢空有一沾巾景雲如郴陽未返懷之舊韻曲江忠襄鄉先達過兩廟拜看㽞題鳥還英德山當面人向芙蓉路更西蓋頂拂霜羸馬怯擔頭衝雨跛奴低西風兩眼龍門淚灑向桂陽何處溪袁侍御夜過白沙萬里心期共杳然春風何處酒相延霜臺白髪三千丈草閣青燈十九年酩酊放歌聞浦口支離從事説南川乾坤比意誰拈出盡是庖羲未畫前候緝熙何日江邊艤畫航春風先客到林塘鳥性亦知長傍樹人情莫甚久離鄉蕭蕭白髪春還短悄悄丹心老更長不負平生袁御史嶺南無地著秋霜悵望春江醉欲呼諸君還契此機無花開小沜供持酒水到垂楊可繫艫暮景何勞方伯玉前程端勿問平湖故鄉不似前回别江閣青燈對老夫近陞憲副翁公以占城國主自海南來省過白沙索和李黄門諸公韻炎氛莫近使君驂清雨為洗瘴天南聖朝簡畀公何忝長夏驅馳老尚堪林下朝朝還暮暮水邉兩兩復三三忽逢海上蠻王過又把新聞續舊談陳白沙集巻七欽定四庫全書陳白沙集巻八明陳獻章撰七言律詩次韻張廷實舟中冩興春浪江門又打山孤舟誰蕩兩山間雙眸少見鸞高翥百歳當如蔗倒餐影響何勞空説夢功名真個不如閒何人解脱葫蘆纒跳下漁磯共釣竿白沙先生六十年脚頭到處是青天幾塲世事攅眉應千文雲根枕頂眠今夕高談真不偶後來勝㑹恐無緣白頭不起江門浪打住吟風弄月船好月江門客未眠水風吹冷緑楊烟望窮碧海三山路興滿羅浮七洞天勢利可能驅我軰路人剛道是神仙千峰不語留君醉乞與人間作畫傳寄張兼素歸舟逺泝長江水信息初通五嶺雲此日山林聊共病幾時風月許平分諸賢在位當扶世我軰何人敢避羣蚤晚求丹還入海風濤滿池却懷君緝熈至用寄兼素先生韻寫懷黄鸝啼破海山春萬里滄溟一片雲童子燒香賓客坐老妻謀酒隔牆分閒花塢裏藏春色麋鹿山中失舊羣今夜蒲團空對我明朝烟艇不隨君草閣春風忽兩人坐臨江水看江雲尋常肝肺詩中冩六十頭顱鏡裡分落絮風驚還著樹行人日出便離羣孤舟逺下南京道望斷梅闗不見君寄
