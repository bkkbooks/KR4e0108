得相思真有日如年葵山小睡次韻謝天錫閒到忘閒始是閒閒中消得幾葵山曲肱枕斷踈桐影夢遶白龍池上還無心可比白雲閒白雲被風吹出山道人肯比桃花水流向人間更不還送劉程鄉遊玉臺春草楊敷曾醉處秋風又拂長官衣黄雲不是棲賢地纔到黄雲便說歸葵山受諸持齋者拜戱作示之山花山鳥共諧嬉山石危横歩不知笑領頭陀稱老宿真成老子是嬰兒次韻張别駕古勞望白龍池一泓何處㵼天池泡沫君看水面漦若對崑崙修缺典數篇休欠白龍詩睡起天地蜉蝣共始終十年痴臥一無窮道人試畫無窮看月在西巖日在東候方伯東山劉先生幾處龍光發夜函畫船信息滿東南津頭小吏殷勤報坐􅅡爐香月底庵贈夏進士昇春日春風江漾沙官船不發對山家山杯一舉山翁醉笑㸃青藜數岸花顧别駕欲人以號稱不以官口號取笑别乘官高上元簿夫君英氣葢東南何須不學程明道只要人稱顧勉庵書稱顧别駕勉庵别駕詩以博笑勉庵别駕今相隨書法兼之葢亦宜若道是名皆外物因君分别却生疑顧别駕來教民板築復以詩見示次韻奉答斛板親傳易簡方旁觀㸃㸃復行行無人不拜先生賜茅屋家家是土墻莆中呼板築之具曰斛板宿雲臥軒世間何喜復何悲風雨蕭蕭過短籬小睡正酣童子問公今是夢是醒時不妨到處與人羣借宿山齋酒半醺我得五龍傳睡法枕痕猶帯華山雲了無意緒向諸縁到處茅椒可借眠白日與人同在夢不應疑我是神仙讀漳州張太守功徳碑罷守三州臥兩山漳州面目此碑間郡人欲識蒙庵老也傍斯文捉一斑次韻黄澤飲酒見寄南山北山花笑人有酒不肻延佳賓請君試向西園看又減黄鸝一半春拚飲如何更問人樽前不見李元賓晨朝有酒晨朝醉莫待黄昏老却春謁鄧家山墓擲谷鶯聲向此沉遶墳春色為誰深紙錢灰冷桐花落已被愁風捲到心送扇與萬松庵山中團扇織朱藤小把還誇入手輕見說高齋蚊嘴赤夜深來撲老先生次韻劉方伯東山見寄一為雷雨沛西東十郡民歸岳伯功我有江門水千頃春來只好浴鳬翁松隠輓詩薛廉憲父也清静忘機樂未休水風何處弄浮漚典刑今在山頭月曾照踈松枕畔秋送薛廉憲江門江上看雲獨送君廬山雲亦華山雲觧衣半晌雲中坐纔出雲來路又分無端聲色謝盲聾多少人心弊弊中萬里青天今日送江門津口一㠶風東山於我問漁磯君見東山詠我詩莫共越人謀出處直夫先謝外臺歸東山劉時雍也陳壯字直夫江西僉事山隂人謝東山恵廣西酒月下花前舞影欹桂江酒美獨斟時眼前莫道都忘却也向東山有報詩李評事題其弟世卿詩巻曰采菊葢取予贈世卿古詩首句語名之因題是處江山有釣蓑相逢休要問如何閒吹黄鶴樓前􅅇即是廬山采菊歌次韻世卿再至白沙脚底白雲無定方風流到處賀知章這囘却是無人見走共漁翁酒處藏茂卿評事恵扇答之時世卿在館中逺望不見大厓山君家兄弟果皆難不知風動今多少也到先生掌握間度楚雲臺前小橋一木欲度溪岸高江門丈人放歩牢脚底太行開幾片秋風隨處灑鴻毛用前韻答張直兄弟助修楚雲臺託契青蓮意便高千秋分付此臺牢先生醉拍藜床笑笑殺楊朱靳一毛偕一之世卿詣楚雲臺偶作呈世卿小立三人静楚雲水田漠漠向秋分千峯笑指來時路黄鶴樓前月是君半床明月半床雲光景行窩到幾分眼角東溟秋一片邵堯夫也不如君代簡奉寄邱明府何處思君獨舉杯江門薄暮釣船囘風吹不盡寒蓑月影過松間千丈來寄廷實制中東閣摩挲舊雨琴青山囘首又秋深制中面目今何似折盡寒燈半夜心聞黄澤發解笑領秋風第一花文章誰敢謗飛沙狂歌欲買花前醉不怕無錢付酒家和林子逢至白沙一様春風幾様花乾坤分付各生涯如今著我滄江上只有秋香撲釣槎秋夜楚雲臺小集贈俞溥新秋有客來信豐風月此杯聊此同江山濶幅無人話六七青袍一病翁憶衡山呈世卿身輕何處謝炊烟石洞松脂不記年尺牘已通南岳主一丸還有白龍仙今日山齋擁白綿幽懐抱膝又經年湘中憶我無歸路更住衡山幾日船楚山西望翠重重說著衡山便不同九尺仙笻倚墻角待君來問祝融峯曲肱何處枕湘流不到名山死不休高詠祝融峯頂月與君當作逍遥遊即事照眼春光爛不收江亭一雨欲成秋道人不是閒鶯蝶肻為隂晴一日愁謫仙亭遷客一亭眠海濱當時誰號謫仙人花汀桞市無疆界盡是乾坤一様春世卿還黄公山黄公椽子李家山水國初歸作夢看愛殺在家兄弟好一壺春酒對承顔謝金方伯厯扣門驚睡雲霞曉洗手開緘日月新莫笑土床空耐冷薇垣又借一畨春聞周京春試下第遣黎公往報其家浣壁小兒期大魁倚門慈母夢歸來春榜未登非惡報開緘莫欠老黎杯聞東山先生領都憲之命修理黄河以詩寄之䟽鑿分更日已多乾坤無奈一黄河天生㑹有龍門手人世空傳瓠子歌題山水小畫寄姜知縣泉聲山色正邦心誰寄漁蓑渭水潯觧㸃無中含有意世間除是畫工深送蒋誠之考績入京塵埃局促非天遊大翼豈肯搶揄休王明受福在今日野老放歌囘白頭沈石田作玉臺圗題詩其上見寄次韻以復到眼丹青忽自驚玉臺形我我何形石田雖有千金貺老子都疑一世名得世卿永興書山堂見月自鈎簾一榻秋光中酒眠何處博舟來嶽下晩揺山影過湘川方伯金公顧白沙次韻答之晩飯對公山閣雨尊前又拜嵗書新别來試把梅花數三十六囘江上春題一峯傳稿後一峯獨去江湖逺千古長留列傳新嵗嵗桃花滿東岸只将榮謝記冬春閔都憲恵厯前厯将窮後厯新臺端兩度拜山人東西嶺外今何地飛盡嚴霜是好春送林時嘉南川夢裏舊青湖何處青燈一榻孤留取幽禽守花月隔林還與盡情呼次韻陳冕課試失期無了日酒杯勸影有長春風流倘帯龍門選不愧當年第一人西遊笠頂是青天每愛前村酒處眠秋雨閉門人不見依稀猶記下江年冕與張别駕約遊清淇長江月色浩無津愛月撑江别駕真借問此來誰主約翩翩猶是未官人寄題邵西澗澗裏仙蒲幾節來澗邊塵跡尚封苔賒君澗水西頭月并與蒲香入酒杯悼區孟章序云章姓區氏順徳人四十不娶棲迹空山委志逍遥漠然不知人世之欣戚何如亦一竒士也一坐虛寒誓不歸病危何處􅟪刀圭青山若問君來去只有當年海月知悼馬龍序云龍從一峯先生遊頗見意趣一峯賦道南詩送之後為仕進累心遂失其故歩至不得一第而死亦命也夫人生幾何徒以難得之嵗月供身外無益之求弊弊焉終其身而不知返若林琰皆覆轍可鑒惜哉道南詩巻出湖西恨失當年馬上攜高枕何如一峯好夕陽回首萬山低次韻顧别駕留宿碧玉樓序云𢎞治七年夏六月按治廣東侍御熊公欲創樓於白沙水湄為往來相接之地謀始事于我郡主林先生遂盡聞於藩憲諸公議既定别駕以按治之命來相地是夕宿白沙碧玉樓遂次韻答奉白雲滄海共悠然病榻年深别駕眠領略可勝諸老意一簾踈雨對江天信宿留公豈偶然山中麋鹿避人眠乾坤多少登臨意一洞天深一洞天一弛一張皆自然嘉賓未醉主人眠兩鳩相對山樓午唤得晴天作雨天不相同處是同然三十年來辦一眠何處白雲堪作雨白雲封斷白龍天勾引漁郎恐未然桃花巖下笑人眠白頭我亦人間睡不是桃源洞裏天偶憶廷實遷居之作次韻示民澤君将肝肺托諸詩我道溪山是外圍人或有疑容未信已如深信不妨疑小勝江山大勝詩斬闗直出兩重圍自家真樂如無地傍柳隨花也屬疑湛民澤攜諸生遊圭峯甚適奉寄小詩呈文定上人天風吹入紫雲層高閣逢秋快一登多少傍花隨柳意還餘一個玉臺僧秋落遥峯翠幾層不知何處嘯孫登而今小坐黄雲看誰道方袍不是僧洞崖秋蘚碧層層奪竹穿松際曉登想得紫芝初入手汲泉鑚火欲呼僧閣天孤峙老稜層萬古荒臺萬古登君逐我來無記性東坡言是徳雲僧山斗為羅一峯作青天白日一峯尊碧玉先生斂衽看四海未知山斗價一錢相售是君難曲論迷真亦異哉乾坤何代不生才今誰敢避愚公號曾作夫君北斗來觀黎􅐕坡先生畫像羊裘不釣世間名考蹟桐江更考情散髪松根坐磐石葫蘆無酒對先生無詩無影不留真描畫先生到幾分頼有當年親㸃筆一聲孤鶴在秋雲次韻周憲副夢中見寄黄花簪滿碧方巾已作人間了事人籌䇿廟堂無我夢只将杯酒托經綸金帯纍纍夢欲通庭柯忽撼夜來風白頭相見知何日挑盡殘燈碧玉中代簡答黄太守韓山片石舊空聞尺札秋風此拜君隐几獨慙非老手得逢青眼看斯文次韻廷實見示擊壤之前未有詩擊壤之後詩堪疑風花雪月人人是又墮風花雪月圍騷壇處處自張圍我不操兵世莫疑翠壁青林端有句傍花隨柳却無詩寄題張主事小西湖次韻咫尺波光對五湖滿城况是眼中無山禽自鬬聲音好來傍竹林眠處呼人間風月幾西湖居士圍中亦偶呼千樹梅花一隻鶴可曾認得主人無龍江鄧翹送晩菊氤氲何處送花舟嵗晩相看碧玉秋笑把一杯花亦笑年年公酒為花留次韻送藤枕萬事無心一片雲再來西華打眠人紫藤一枕誰分付盡日酣酣紅樹根悼陳冕不飲亦狂飲亦狂醒中説夢醉中忘乾坤早暮蜉蝣化不是芙蓉不耐霜東方欲白星漸稀一塲春夢曉鐘時伯道有子常事耳劉蕡登科人不知風入梅花逓少香月臨江閣有微霜去年此地客劇飲此夜今年人悼亡寄左行人白狐可改先公墓我許還公尺劵書漢老未還東白記也憑門下一吹嘘左行人寄恵倭金酒琖醉中賦答睡鄉元自醉鄉分醉興深時睡興深六十七回春又過茅柴不管注倭金劉景仁自雷州别二親還永豐過白沙贈之何處寒笳動曉風江門别舸太匆匆半肩不是雷陽物何得雷陽在夢中與鄺筠巢求蘭楚畹當年不盡花每逢秋露憶君家白雲只隔扶溪水不使餘香到白沙墜露聲殘楚水昏一杯何處酹湘魂山人口是遊蜂嘴不到扶溪竹下門次韻王樂用僉憲見寄春到江門好放舟放舟處處是天遊能将公事此中了何啻于今第一流拍拍滿胸都是春一聲未唱已通神新詩若道堯夫是只問堯夫是底人謝生得京醞以為美使致白沙開幕視之空樽而已乃因發一笑十年美譽酒家聞屋裏茅柴且賞真偶對泥樽開口笑先生不是醉鄉人題李子長畫青山影裏人家少緑樹隂中石徑微偶出洞門囘首望白雲何處有柴扉谷静山深樹幾叢溪邊白石可青笻詩中此景多相似只恐詩家是畫工寄鄧俊圭韶州西去是衡山楚客舟從嶺左還時李世卿取道廣西還武昌欲語祝融天上事思君迢逓見君難予與世卿約遊衡山云候世卿歸途過樂昌更與俊圭期定今不果矣念之悵然外祖父無子以姪孫林廣為後廣之曾大父以一身兼兩戎籍不能辦而一之為子孫世役久之業盡人亡惟有廣耳有司今又以廣補北京鎮南衛伍自是而後林氏子孫在新㑹者無孑遺矣丘隴之守委之誰耶予力不能振之賦二詩贈廣庻有識而憐之者茅簷家具盡隨身老婦嬌兒日可親有夢只尋丘隴去不須回首問耕人淚盡廬岡失母家塚傍枯樹也無花平安莫遣無書信一度春歸一度嗟贈劉别駕肅庵解官歸永豐西來雙棹不曽休再過江邊碧玉樓共說西湖歸去晩客心應未死金牛一蓑歸去釣秋江花近漁舟水亦香却笑此翁閒未慣水中鷗影尚囘翔朱門誰道不如貧笑把狂詩寫贈人日暮孤舟向何處野花啼鳥故山春得廷實報定山謝事歸憶東白仲昭諸先生有作也曽收拾定山書三月天曹謝事初見說定山長在病當時不出意何如當時不出意何如得喪難逃真數書更憶往年張學士西山對面説河圗西山對面說河圗逺志誰将小草呼今古聖賢不同調各留一影落堪輿各留一影落堪輿歎息乾坤幾丈夫脱贈藤蓑君亦愛江門春雨憶皇都江門春雨憶皇都個個先生六十餘必有嘉言告當宁他年應得史臣書題空夫巻為余行人作三十年來學鍊空凡身猶在有無中到門有客求題句不是空夫果是公題吴憲副累葉傳芳巻壺山八面照莆陽吴氏傳來奕葉芳莫向通衢高綽楔只談世業敎諸郎答張梧州書中議李世卿人物荘定山出處熊御史薦剡所及徳行文章要兩全乾坤回首二千年自從孟子七篇後直到于今有幾賢多病為人未足羞遍身無病是吾憂眼中誰是醫和手恨殺刀圭藥未投右李世卿欲歸不歸何遲遲不是孤臣托病時此是定山最高處江門漁父却能知右荘定山買舟南岳去尋醫七十今年病不支傾葢獨憐熊御史肺肝今徹野人知右熊御史鄧督府欲得慈元記上石答之西涯許撰慈元記大手文章不要多拙作豈堪傳勝事如今此石未須磨東山規矩趙生成頃者一緘傳到京有廟未應無祀典老夫重敢告先生偶得示諸生平地工夫到九層不如那個主人能他鄉消息無尋處去問嵩山戴笠僧江雲欲變三秋色江雨初交十日秋凉夜一簔揺艇去滿身明月大江流寄李世卿衡岳千尋雲萬尋丹青難冩夢中心人間鐵笛無吹處又向秋風寄此音永順彭宣慰世忠堂宣慰之堂名世忠靈溪水與滄溟通如今百丈高銅柱又見兒孫起故封次韻送林大㕘之任廣西病裏逢春實怕春對花著語未驚人今朝縱有狂詩送不是當年翰墨臣東西嶺表非無事經濟術中怕有心何處老仙求救世刀圭倒盡藥囊深碧玉高樓架紫雲世間應笑此樓深忽聞夜半鵬風起九萬扶揺好在今夫子當時見逝川一聲浩歎不知年東溟更比川流濶不共東溟一𣲖傳和答姚主事問我平生遺我詩清風明月想襟期此心若道元無事似我江門看水時雖乏向用之才忝有晦藏之地引歩朱陵寄懐青玉李拾遺徴之不至上䟽何為張乖崖捄火事嚴徒勞分争因而有作海北多年一釣船大翼遨空魚躍川盡言天下知音少白雪不知何處絃題健齋費子充殿元號化機浩浩不曾停剛見群龍面目成誰道名齋無此意江門月上看潮生讀罷有感坐掩殘書慨古今白頭契分向誰深頂門欲試回生手争得名家一寸鍼海北汪廷舉新作懐沙亭修古書院冷香橋於海上遣使歸圗并求慕竹樓記值予在病復以是詩海邊西望海雲遮何處懐沙不見沙壁上畫圗君試看冷香今日落誰家忽然土木見經綸嶺海于今一使君忙殺多年簿書手可能談笑起斯文獨憐不見竹坡翁慕竹樓高月已空欲㸃山茅照西所一瓢無計引春風次韻送海北使阮刋春日溪邊送阮郎桃花半落溪水香相逢休問來時路大舶不知何處洋次韻李子長寒菊四尺霜莖一寸葩幽香何只暗浮丫借令嵗晩無人見不做人間九日花水北一叢含數葩梅梢寒月過籬丫茅茨可僦從人愛不賣廬山半畝花羅服周呈所作丁知縣祠詩因憶舊臘寄示菊花諸詩比今為又長一格賞之以詩醉舞黄花落鬢毛當時詩語太矜豪春風再詠甘棠下又長黄花一格高鄧秋波六十一偶失一賀小詩索笑六十光隂一鳥過一瓢還許醉秋波只今那有苕溪叟日日尊前聞放歌寄吴别駕獻臣一官萬里向西行雪錦樓高别駕登若問野人何處所朱陵洞裏白雲層羅江許薄偶然逢又得成都一信通惟有大厓李居士洞庭何處醉春風贈烏文瑞囘首長汀路幾多琴書又打鐵橋過趨庭若問東南事曾聽江門一放歌某昔過淮見平江總戎禮遇甚至都閫王侯厥配陳氏於平江總戎戚也一日過予白沙相與道舊平江今為天下兵馬元帥相去萬里無由幸㑹雖隐顯殊途然於公之舊徳未嘗一日忘也因事賦詩托侯為達之詩曰不見平江十七秋春風秋月夢何悠病中忽見東床面却憶淮南是舊游和答王僉憲樂用春在城中不見春城中春不是長春湛生羞作春風面故向人間更避人静處春生動處春一家春化萬家春公今料理春來處便是乾坤造化人春王正月衆家春望柳尋花我自春先生欲學程明道莫厭尋花傍柳人一物春知物物春一年春亦萬年春總在乾坤形氣内敢誣當世謂無人寒江獨釣我道非空亦非小萬事舎旃終未了朔風吹雪滿江天我只弄我桐江釣杜甫遊春碧柳黄鸝三月畫江湖風雨萬篇詩花前濁酒不得醉驢背春風空自吹秋江晩渡扁舟何處渡長津水濶烟生不見身莫向西巖斂高楫天涯時有暮歸人莊子觀泉珊珊㵼下天花爛仰首白龍高十萬丹青已㑹識者心誰道漆園非具眼答石阡太守祁致和六年飽讀石阡書習氣于今想破除雪月風花還屬我不曾閒過邵堯夫程節婦詩鍾氏狂客之女風俗當年壊一絲直到于今腐爛時欲論千古綱常事除是渠家節婦知贈按治侍御王公哲明朝騘馬又何之眼見東廵西怨時短歌忽被風吹去都落人間作口碑偶得白雪陽春誰㑹彈莫愁天下賞音難江門夜半看明月想到朱陵青玉壇朱陵我居青玉壇五岳雖雄無此山鍾期老仙還未還高山流水我須彈次韻送陳秉常之荆門州任不辭逺道赴荆門不避兒童笑稗官閒望白雲飛綵水脚頭落處洞門寛紫葢垂隂宿霧收下臨雲夢此何州黄鶴飛來一囘顧不盡荆門天際頭得手未償燈火債設心豈異賢良科世間膏火煎熬外無奈箕山處士何題山泉為林節推高厓百丈到滄溟咫尺寒泉萬里清若道眼中惟見水老狂何意向詩傾吴瑞卿送菊用東坡韻答之江山揺落見霜葩枕畔香風到細丫不是先生愛孤寂人間囘首已無花題畫雲窩若個丹青可此翁雲窩自有主人封扁舟一去無踪跡黄鶴樓前望五峯送人寒水江門可半篙漁翁江上理魚舠狂歌欲送夫君别却顧樽中無濁醪次韻張廷實見寄兩脚著地此何闗白雲與爾同去還正當海濶天高處不離區區跬歩間嵗月人間古又今斯文興廢逓相尋崔嵬百丈皆平地西上一笻何處深黄别駕報世卿将來白沙君去廬山幾度春君來不來桃花新花日喜逢黄别駕共對廬山説故人送陳仲治用舊韻萬言䇿進大廷對三百人争甲榜名醉放漁歌此相送白頭閒動少年情久病吟梅花未發先扃牖落盡梅花未整巾明日廬山春又至伴眠樓上嵗華新卜室大雲山雲屋久住大雲山我亦雲中借半間未愁此地雲封淺擬帯朱陵一洞還縣送春至四角圭田酒入唇長官送我意何勤莫言自有長春在也共人間一嵗春謝伯倚得孫送薑酒至七十一年雲水中半江老隠舊知儂一杯引滿為君喜伯倚今朝又作翁漫筆一蓑春雨江門釣萬里長風海上吹南岳歸來無一事小廬峯頂臥觀時喜聞劉亞卿得請還東山平生畏就人間飯向晩還同此鶴棲今夜開懐看邸報東山歸臥祝融西觀時山雲将雨過桃溪晩脱萬紅何處溪年光也逐溪流轉已送啼鶯過隔溪寄陳仲冶金臺萬里傳聲仲冶裘上林春好任郎遊而翁八十二春秋浩笑江邊碧玉樓憶世卿楚鄉迢逓廬山春君來不來花又新引笻踏爛廬山月折得梅花懶寄人題湛民澤家廟忽然突兀見新堂逺抱飛雲萬丈光主翁合是比閭長此地還成禮義鄉張廷舉送薑酒至七十謬為人所尊直從西埭到東墩一杯引滿為君喜廷舉今年始抱孫别廷實張主事萬丈祝融何處山三年碧玉夢相闗多少畫工傳不去都沒賢今畫幅寛寄題五峯為葉本厚父作清世誰堪住五峯石床三尺白雲封祝融三畆終留我略與先生脚板同扶溪作飯江門喫五峯丈人予未識何當坐我五峯前共對梅花説周易贈張不已不已心期不已知明年八月戰秋闈摩天氣吐三千丈蟾闕高扳第一枝感事呈宋督學先生禄位升天元有命情懐化俗却無醫道不易行休恕已仁非可讓更由誰寄廷實主事豨薟鼎内還丹意枳殻墟邉待酒心明朝許約西遊歩一寸豨薟地萬尋和答林方伯待用春日見寄對花把酒春無幾寡欲安心老合知病過冬春還引望中天月色幾盈虧舊雨春歸鶯不知雨情鶯老落花時月露滴開鶯眼膜乾坤不了一盈虧答陳静軒過訪公是登堂拜母人往來不倦拜丘墳通家無論鄉閭舊八十頭顱事事真丁長官祠示里人古人冷淡今人笑此黄山谷詠徐孺子祠詩也此義足起人聞聽莫遣藤蘿終得意頓令簫鼓不聞聲寄李白州都憲東南遺愛朢重臨萬里滇南恨正深引領東山歸去路騎牛跨鳳許相尋諱日有感十二月逢哉生魄江山為爾生愁色黄昏庭樹烏上啼一聲何處江樓笛送梁宗烈赴春試夢入天門看春榜榜中不記状元名世間此夢真何夢説到梁生似有情君持素履向朱門五色雲中見至尊且莫輕言天下事須将風俗究根源枕上仲尼不作周公夢天下共嗟吾道衰總為乾坤元氣薄聖人誠處衆人知與張東白入忙捄火張忠定正逺飛章李拾遺何故山人都不作山人貪睡起常遲答陳中貴見訪積嵗江門幾度過不将錦繡薄藤蓑雪坭鴻爪他年夢記得漁翁此放歌題慈元廟呈徐嶺南紘前有東山後有徐慈元風敎萬年垂嶺南他日傳遺事消得江門幾句詩江門釣瀬與湛民澤收管小坐江門不記年蒲裀當膝幾囘穿如今老去還分付不賣區區敝箒錢皇王帝伯都歸盡雪月風花未了吟莫道金針不傳與江門風月釣臺深江門漁父與誰年慙愧公來坐榻穿問我江門垂釣處囊裏曽無料理錢達摩西來傳衣為信江門釣臺亦病夫之衣鉢也兹以付民澤将來有無窮之託珍重珍重與湛民澤六經盡在虛無裏萬里都歸感應中若向此邊㕘得透始知吾學是中庸江門釣臺何處江邊著釣臺楚雲溟月盡收囘若比桐江還勝槩千年埋沒一朝開再用韻與湛民澤日斜劉九放船囘層起江門水底臺浩浩碧波山鎻斷潮打厓門兩扇開民澤祖樵林居士搆堂於上游庄民澤乞題入雲堂搆昔人開蘭桂香風次第來黄雲山高幾千丈後山前日寄聲囘次韻張廷實讀伊洛淵源録往古來今幾聖賢都從心上契心傳孟子聰明還孟子如今且莫信人言曉枕聖賢都從一上來時止時行道與偕若使舂陵為孟子光風霽月更襟懐漫筆浩笑江門㸃舊詩詩中幾度見承箕他日攜書南岳住却話山樓浩笑時贈楊中順徳楊明府之子山下柴扉不浪開楊生端為老夫來欲報封君無一事只将枉句贈生囘哭景暘詰杙為楹四十秋纔醒一夢便長休名登鼎甲死亦枉老撫諸孤病只愁影翳山樓痰吐夜寒生老屋病交秋渡中短紙誰封附逺大為詞解我憂廷實有疏聞東山先生得請歸賦此青玉之壇横素琴絶無人地五峯深碧雲鎻斷元無路東山東山何處尋問馬黙齋病於其姪孫馬大年荔顆紅時酒正多口瘡不飲奈公何郎君解記春牛否還為而翁一放歌林傽貢士入京告行于白沙贈之乖崖捄火出人間造次來分太華山收拾如今到山處明朝不見藕如船枕上謾筆正翕眼時元活活到敷散處自乾乾誰㑹五行真動静萬古周流本自然答容彦文見訪裹糧縳鴨問廬山久病勞君每厚顔若問廬山近來事重陽過後菊花殘次韻東所見寄若水清風當頴出山人莫道不前知拍手江門春信早黄鸝飛上緑楊枝答文定上人千金帖子忽飛馳洗手開緘只汗頥前代昌黎今我是恍然海上記留衣神交今在識荆前再結前生未了縁果䝉道力相扶起蚤晩東林對長官鍾太守美宣輓詩人自古例多貧恨殺滇南金帯新公與定山貧到老已有陳黄一軰人天下功名無我闗只縁我自愛江山若對江山元沒興紙錢灰冷未知閒夢遊衡山遇南極數老人來過却須先生作主與諸老對酌洪崖夀崖在旁歌詩以侑觴合坐皆喜予以詩一首識興云衡岳去天能幾何一株松下月明多南極老仙騎鹿過一瓢斟月兩崖歌題任明府思親樓巻用定山韻人間何處不樓居亦有如椽大筆書定山丈人都不管一拳不屑老何如碧玉樓晝夢扶病出遊村徑甚適忽安福羅進士攜彭秀才來訪遂書以贈之春早春寒著莫人黄鸝囀處暖初勻狂心剛被風吹動走遍南垞到北津泉石為順徳張氏題江山幾處堪還我泉石邊頭合有人高著一雙無極眼閑看宇宙萬囘春羅浮春寄民澤海上花開萬玉林閒門碧玉夢相尋不知開處花多少折盡羅浮半夜心九肋蹣跚清楚濶九苞真與黄雲深復有鳳凰山上月遍照羅浮玉洞春陳海蓬諸子冠畢來見贈以詩兄弟參差作雁行春風碧玉喜同登近午天風吹雁去翩翩吹入紫雲層周方伯至白沙天上客來尋故人江門月下足音聞便傳一㸃江門信逢著桃源且問津偶得一碧光横南岳前靈壇秋玉青相連道士來攜三尺木高山流水一聲絃答送茄𤓰兩頭肥緑壓肩斜五月江園始送𤓰童子近前與翁語小籃𤓰底是新茄同将形色委人間竊比高松一鶴閒口腹累人都未免茄𤓰籃裏又詩還陳白沙集巻六欽定四庫全書陳白沙集巻七明陳獻章撰
