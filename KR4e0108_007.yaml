曉來花雨濕詩囊晚上郵亭望大荒南盡海旁諸郡淺西來天上一江長漁歌落日還孤艇樹隔啼鶯背短墻料理憑髙非一事樽前誰與共平章秋江漫興能傾瓦􅊦深深酒不盡秋江短短篇間弄孤舟移白日明開兩眼看青天鷗遷逺渚眠何處雲颭髙風落此川野老隔波頻問訊可䏻無意向神仙送羅養明還江右長寄湖西夢裡身扁舟春早忽相尋乾坤自古悲難合伯仲而今契亦深草色正催公子醉花枝不稱老年心何須䄂却鴛鴦手更向滄𬈑問我針懶作人間賣卜仙紅蕖浪裡枕書眠詩篇到老絶求世酒盞逢春不愛錢鷗鷺一群清似雪江湖諸子逺如天扁舟忽報金牛信也得江花對惠連村中即事山風處處聞松花江市日日來魚蝦髙田一弓走獵犬灌木幾株叢老鴉正逢元宵市燈好亦有雜劇村鼓撾野老西疇急春事長揖縣官歸縣衙曉枕過金洲戲作行人拍手笑天公十月江湖未朔風旭日上天才半赤晴霞照水忽殷紅注目九江來艇急回頭三老著篙慵何須却是蒼梧道不道天公也笑儂清明前三日有懷亡友伍光宇無子先生英骨葬蓬萊幽思憑髙不易裁荒歲無窮春易老清明將近雨還來皇天自失包胥定泉壤誰興伯道哀尋樂齊前數株樹月明空有鶴飛回禱雨呈縣主丁彥誠峯頂為壇五土升皇穹端合享精誠雨聲先到玉臺寺雲氣𥘉蒸緑護屏野老分錢須一虎病夫獻茗走諸生年豐我欲招神貺絶壁髙鐫令尹名奉陪趙提學崖山慈元殿弔古信國諸臣近有碑一陵瀕海尚堪疑荒山野水無人到落日䡖風送我旗天地幾回人變鬼風波萬里母將兒萋萋芳草慈元下邂逅漁樵問舊時李德孚挽歌詞此翁白髮已垂肩猶借滄波十載眠德孚已丑偕豫自亰師㱕不復出至是十年而卒一舸載書同載酒幾家留藥更留錢山陽笛奏西樵月西樵南海山名余曩與伍光宇同逰後有西樵山感舊詩即此山也薤露歌傳大石篇大石即德孚所居村名誰道人生只如此兩行衰泪落江煙別時已動東遊興別後還深永訣悲夫子春秋䏻六十故人涕泪不童兒身如南郭人間老家有文溪地下師修短未知人喜戚天涯孤影日淒其題莊定山詩集春風一曲有霓裳不落人間小錦囊今代名家誰李杜先生髙枕自羲皇乾坤兀兀中流柱風月恢恢大雅堂莫道白沙無眼孔濯纓千頃破滄浪浴日亭次東坡韻殘月無光水拍天漁舟數點落前灣赤騰空洞昨宵日翠展蒼茫何處山顧影未須悲鶴髮負暄可以獻龍顔誰䏻手抱陽和去散入千崖萬壑間扶胥口書事借浴日亭韻早春約我扶胥口今日進舟黃木灣使君已去漫留諾水國獨吟空見山老向煙波真得地晚來風日更開顔眀朝去覔南川子與話平生水石間宿㰖山書屋一片荷衣也蓋身閉窗眠者乃何人江山雨裏同歌嘯今古人間幾屈伸長與白雲為洞主自栽香樹作齊僯山中甲子無人記一度花開一度春別㰖山羅浮山色眼中來老子心情不易裁髙浪不驚南海舶白雲聊共㰖山杯未知竹徑留人否那問天公著雨催主人更道秋來好收拾黃花待我回餘興何處秋聲入短琴江邊蕭瑟起楓林空歌白雪兒童笑不負滄波老子心釣石摩挲雲氣暖睡沙展轉月痕深眼中昏嫁隨時了只有床頭鬻犬金陳冕來逰白沙至仰船江遇石尤風舟覆中流幾覆程夫子何况白沙門下人賢輩何曽負天道老夫正自怪江神仁義幾回驚闊論利名何處不通津秪應歸拜庭闈日棄置艱難不肯陳羅一峯挽詞今我何敢私一峯百年公論在兒童要知此老如君實更恐前身是孔融青天白日人千古五典三綱疏一通天下何常乏知已我言剛與定山同狀元文史少微星翰苑為官謾兩亰既有光華爭日月那無描畫在丹青表章細事慿諸老悵望髙風激後生千秋欲與蘇徐並湖水中央更一亭芙蓉城下白騾還更見一峯何處山晚覺神仙真妄誕肯留精爽一追攀髙才轉盻交遊內元氣驚心宇宙間此日迸空為誰泣哀齡何意向人寰杜阮看山容貫卜居之地曾于海上看羅浮魂爽髙飛未得收一片好山還入眼兩巡瘦馬更回頭青浮竹杪岡連峙紅浸花枝水曲流君若卜居須卜此澗邉黃髮是巢由數家種竹已成林共有平生卜築心草木總偷春色早雲霞偏傍晚山深鶯聲早赴山靈約松蓋先分地主隂欲置一菴三級土結趺髙榻對南岑代簡答伍郡主為莆田林侍御求草書閉門一病九十日小草大草生荒蕪山癯須愛老狂客府主正逢賢大夫藥褁君臣眠處有墨池風雨坐來無秃管已馳林侍御如今雪繭不還莆東亭奉別憲副陶公父老連村擁畫航東亭西日引杯長舊是宰官今憲副後來新㑹古桐鄉指揮戎馬能千里表裡山河捍一方太史但收䏻吏傳升平不必問耕桑蔣宗誼以厥考樵林摘稿及其所著續宋論見寄代簡奉答江右詩書不乏賢君家父子盡堪傳樵林一摘幾千首宋論直窺三百年西漢文章遷史後東吳風月定山前乾坤隻眼知誰在不是楊雄不好玄寄景星海上妬花暝雨迷千里隔水殘紅度幾車夢破三更子規鳥香來一樹木犀花病夫老去頭如鶴稚子春來髮似鴉海曲傳詩意無盡更期何處問丹砂次韻都憲朱公歸興當日頭顱也未然相逢休問買山錢葛巾旋把陶潜酒煙水將歸范蠡船嶺表他年須領略桂陽秋月憶高眠大臣去􅈬嫌疑絶還似嘉謨贊九天命孫田新開斥鹵走通川賸種烏穧益稅錢士不居官終愛國孫當從祖是名田幸生天下承平日屢見人間大有年從此不須憂俯仰茆齊向暖抱孫眠辛丑元旦戲筆酒杯不與年顔老詩思還隨物候新分外不加毫末事意中長滿十分春栖栖竹几眠看客處處桃符寫似人除却東風花鳥句更將何事答洪鈞與謝胖桞市南頭望客舟青山無語水東流江花自對黃鸝晚風雨偏催白髮秋宇宙萬年開老眼肝腸一縷入春愁明朝日出波濤暖依舊忘機對海鷗重贈張詡風雨何人來欵扉滄江烟艇疾于飛正將白首憐傾蓋不管春泥得上衣詩句與君爭出手酒杯中我自忘機傷心萬里滄𬈑水又逐長風破浪歸􅙐醾將開值雨相看無語只沉吟蓓蕾枝頭已簇金山雨不來昏晝景東君容有妬春心較量花品終何益茫昧天機亦自深明日隂晴還未定一尊何急對花斟答梅繡衣見訪一春煙雨暗荆扉繫馬憐君共落暉酒盞香風吹月桂硯池清露滴􅙐醾水中郭索嗔皆是屋上慈烏愛亦非天道不移人自異紅塵飛上釣魚磯陳庸𬒳盜張詡有詩唁之因次其韻三尺龍泉八尺身書生膽氣欲驚人亦遣偷兒知我輩還將直道是斯民風連蜀魄東方曉雨洗荼􅐘昨夜春白舫望君心若渴淸川照我髮如銀曉枕天時人事莾何窮睡破山窗正惱公幾點木犀三月雨一聲蜀魄五更風青春有限年年老白髮無私個個同莫共老人論甲子閭閻稚子亦成翁詠鶴孤山赤壁兩茫茫踈栁江邊一草堂塵世事多黃髮老仙禽真對縞衣郎風回蕙帳聲猶裊月落芝田影漸長却怕茶煙生一縷等間飛去碧沙旁憶鶴孤山有月好西湖只問湖中鶴在無頸閣瘦軀三尺半聲搖殘夢四更初青田别去何由見赤壁飛來不受呼寂寞小齊誰是伴賽蘭香裊舊團蒲謝惠壷江上花邉到一壷春風日日要人扶數篇栗里乃何趣五斗髙陽非酒徒春事無多花去眼老形巳具雪添鬚醉鄉著我扶溪老白璧黃金惠不如題間叟前村煙火熟朝炊正是先生睡足時身帶江山人在畫目窮今古世爭棋花邉擊鼓諸孫戲竹下扶笻一鶴隨應笑書生間未得白頭憂世欲何為遊心樓為丁縣尹作城外青山樓外城城頭山勢與樓平坐來白日心䏻靜看到浮雲世亦輕髙閣秪冝封斷簡半年方許讀西銘乾坤一點龍門意分付當年尹彥明次莊定山清江雜興韻家學華山一覺眠圖書亦在枕頭邉傍花隨栁我尋句剩水殘山天賜年竹徑旁通沽酒市桃花亂點釣魚船平生我愛孫思邈自古髙人方又圎中秋夜示江右李劉二生勝㑹古來非獨今兩生尊酒喜同斟且看𬈑海中秋月莫動匡廬半夜心天道端須憐主客浮雲不敢弄晴隂堯夫獨愛梧桐上萬籟無聲意自深辭修縣志噓嗟文獻荒􅋽久著述圖經長老冝令尹髙才應處分病夫何者敢聞知嘗聞司馬開班范直似家翁詔小兒史體所關無大小千秋麟筆寄宣尼寄李九淵黃花開盡不持醪更對黃花讀楚騷江閣影流西日轉海鴻聲引北風髙大寒天地猶堪出垂老筋骸總厭勞嗟我與君同甲子鏡中誰讓長霜毛次韻梅侍御贈別朱絃一弄白雲深山水何人共賞音老去布裘偏愛日春來花樹不冝隂雨端姤復雖天道一體乾坤是此心扶病寒江逺相送古椰葉脫北風吟贈同逰馬玄真伍伯饒甥舊江流東與海潮通江去潮來今古同岩洞風光詩卷裏天涯歲月釣船中老甥動止常隨舅小友心情愛傍公更約鐡橋窺險絶筆牀琴匣未須封立春日呈丁縣尹浮生五十五回逢靑帝來朝駕自東草色向江先自緑桃花臨路為誰紅髙堂滿獻曽孫酒小邑𥘉移令尹風身著斑衣啼又笑老萊真個是兒童元夕欲將斗柄作垂鈎髙掛銀蟾照九州皇帝萬年臨宇宙群黎無處不歌謳兩間和氣氤氲合五色卿雲爛熳浮一曲升平人盡樂老夫林下更何求賀冠者都老門前十丈松采帷髙映日曈曨賔迎一徑桃花裡春在三加酒盞中禮式未忘洪武化絃歌還動子遊風主人不用投壷勸醉倒江門老石翁寄髙知縣下疑河嶽上星辰何處勾連得此身天子未旌強項令督郵多見折腰人青天白日孤城曉碧栁黃鸝萬井春澗砥菖蒲真未有堪君服食更通神次韻伯饒見示養內之作小結菴居不化緣牽蘿架石兩三椽一函玉笈飛霞裡半枕華胥語鳥邉東老豈知丹是酒今人多以管窺天市中買得參同契萬遍千周然未然次韻答伯饒見拉出釣好共溪山結晚緣竹枝深夜響漁椽風清月朗滄𬈑外魚躍鳶飛枕几邉茶竈煙銷回野艇竹竿霜冷釣秋天少年孟浪東西走衰病于今耻復然苦熱尋常衣汗濕靑荷爭奈連朝溽暑何四象隂陽分老少一年天地幾中和水枯瓦沼蛙將徙日炙山枝鳥不歌一事傷廉非得巳竹林氷簟受風多寄林虛窗蒼梧酒興未消磨又向江門鼓枻歌鳥見畫來高畫品我疑詩巧是詩魔輞川樹石愁摩詰語可精神動老坡開眼也知真有益後來嵗月悔無多晝睡林木蒼蒼鳥哺雛江亭春與睡相冝風花巳遣新年醉氣候還增病叟癡塵世悲歡忘處了浮生日月夢中移晨炊未熟無人喚正是飛雲曵杖時對酒竹杪風䡖瓦雀哀葛巾蕭散步階苔放懷自對溪花笑好事誰撑酒舫來白髮驚看今日老青春剛到隔年回狂心被酒如飛鶴又逐紅雲上玉臺二仲為僯蔣詡家蕭然鶴髮映烏紗春來歌唱惟消酒老去園林尚種花蚤卜居廬依木石不論日月住煙霞小齊半夜忘眠處三尺盆池一口蛙南歸途中先寄諸鄉友我家久住龍溪上說著龍溪便有情荔子不將梨鬪美沙螺休與蟹爭衡江村婦女蕉衫窄市巷兒郎木屐輕漫興詩多誰和我樽前忙殺馬先生不分賔主共林塘脫下朝衫作道裝酒為老夫開瓮盎茗和春露摘旗鎗津頭水滿鴛鴦下墻背風來枳殼香何處與君拚坐久萬株花裡小藜床與謝祐易生忽與謝生來小雨𥘉晴到玉臺笑我十年皋席在為君今日蓽門開古來委吏非忘魯世外髙人亦姓回滿眼示人人不識更從何處話根荄縣主丁侯約逰圭峯齊次以病不果賦此笋輿欲出更夷猶病入西風汗未收書閣水雲聊自晚玉臺霜月為誰秋主翁愛客杯盤大小吏鳴鞭道路愁我有平生筋力在不尋齊次碧峯頭懷古五斗之粟可以生折腰殆非賢所䏻即生斯世須妨俗莫道前身不是僧廬阜社中朝滚滚潯陽菊畔醉騰騰南山歌罷悠然句誰續先生五字燈荼􅐘花開有懷同賞看花何處發孤吟墻角荼􅐘又破金紫豔照人今日態香風吹夢隔年心多情酒伴何來晚得意逰蜂入每深病起南窗坐終日獨憐涓滴未成斟次韻林先生潮連館中見寄烟村渺渺樹成行社屋三間是講堂竹葉林中堪送老菊花籬下又逢霜膳夫問煮魴魚美田舍邀嘗早稻香入社撚鬚誰最數共尋佳句答年光祖母年髙令伯歸白雲丹陛共霑衣小臣去國身多病聖主留心日萬幾一飯未䏻忘𥙷報百年終是懶依違白頭恐負垂髫志記得城西就館時夜坐因誦康節詩偶成窗竹蕭蕭正晚風溪星耿耿又秋蟲一瓢豈肯方顔子千首將無有邵雍恨月嘯花都大雅鳶飛魚躍一中庸無人不羡黃陳輩髙步騷壇角兩雄家兄往東向村收蚤稻登舟後雷雨大作章侍坐貞節堂至夜分以為憂是年甲辰家兄六十一未嘗有如意之求花甲人間亦易回吾兄懷抱幾時開雲師暫引秋帆去風伯還將暮雨來社酒香消荷葉冷楚歌聲起竹枝哀天公遺我多愁事貞節堂邊炒夜雷丁縣尹惠米時朝覲𥘉歸病叟山中觀物坐長官天上帶春回琴堂未必淹三考村酤猶堪共一杯彩翼雲霄看得意白頭供奉愧非才如今單父無禆𥙷分俸何須到草萊次韻張侍御見寄吐月山前坐四更一涼何不獻先生鷦鷯翅短那䏻去駿馬蹄䡖只欲行見舞緑蓑知我醉聽吟素練是君清許尋舊雨江門下秋晚不來空寄聲赤松黃石皆留侯回首丹丘是故丘明月波間休擊楫白蘋洲上有眠鷗誰家風雨花無恙萬古江河水自流百尺樓中朝引望望中去馬更來牛聞張廷實謝病歸寄之老夫衰病託滄𬈑不道滄𬈑亦有爭正是黑頭堪入仕𥘉登黃甲最知名君當出我一頭地我更期君萬里程聞說朱明丹已熟扁舟同作訪醫行偶憶夢中長髯道士用一囊貯羅浮山遺子戲作示范規飛雲萬丈來冥冥囊括誰將隻手擎南極回頭一閣老鐡橋有路中天行山通碧落神明衛地有丹砂草木靈若個長髯應識我古來真隱不知名九節之笻手所持兩年衰病負幽期香爐瀑布還匡阜碧水丹山自武夷雞犬幾時同馭氣雲霄無日不支頥可憐一覺羅浮夢不記長髯道士誰羅浮道士說軒轅千古髙風尚可覘枕上昨宵驚短夢人間何處覔長髯誰䏻愛酒過東老我欲凌虛問海蟾四百亂峯南斗下是誰囊括到茅簷夜坐半屬虛空半屬身絪緼一氣似𥘉春仙家亦有調元手屈子寧非具眼人莫遣塵埃封面目試看金石貫精神些兒欲問天根處亥子中間得最真不著絲毫也可僯何須息息數周天禪家更說除生滅黃老惟知養自然肯與蜉蝣同幻化秪應龜鶴羡長年吾儒自有中和在誰㑹求之未發前次韻張廷實謝病後約逰羅浮見寄滄波共擬一桴浮欲斫扶桑作釣舟箕頴舊知堯舜大留侯𥘉伴赤松逰空中鶴爪拿雲上橋下泉聲洗鐡流却憶平湖林縣慱仙山從我竟何由胸中千頃著南𬈑何物岑啼莾愛爭但得百千同買醉不曽三十便收名鶯花衮衮新搜句烟水茫茫舊路程莫倚芳容欺老病手扶青玉並君行與謝胖風波來往十年身舊事淒涼不可陳當道豈非鈎距手青山不問打眠人酒醒旅館城南月夢破茆茨海角春何日定携妻子去水田稼好最娛親夢崔清獻坐床上李忠簡坐床下野服搭颯而豫參其間清獻堂堂四百春夢中眉宇識天人報君西蜀青油幕老我東籬白葛巾萬里歸心長短賦九天辭表十三陳南風欲理增江棹也借青山卜墓僯公在蜀中嘗賦水調歌頭一篇其詞曰萬里雲間戍立馬劍門關亂山極目無際西北是長安人苦百年塗炭鬼泣三邉鋒鏑天道久應還手寫留屯奏炯炯寸心丹對青燈搔白髮漏聲殘老來勳業未􅈬妨却一身間蒲澗淸泉白石梅嶺緑隂青子怪我舊盟寒烽火平安夜歸夢到家山夢中對菊坡論舉此詞故中聮及之宋史記中堪列傳菊坡門下豈無人彈文驚世頻登閣散髮從師懶著巾嶺海一星元屬李古今全華揔歸陳山齊夢破公何在夜半歌聲徹四僯館廷實進士于白沙社率爾成章兼呈丁明府壇有青松埭有花煙籠寒水月籠沙人間何處堪棲鳯歲次今年正屬蛇樹杪看山橫半靣水邊尋路入三乂髙軒若肯終年住應沒間愁上鬢華廷實偕丁明府逰圭峯雨中奉寄腳頭到處是天台多少風光在草菜花縣偶携眀府去玉臺還少道人來清流赴海無千里白骨封苔有幾堆對雨一樽須強飲為君呼起鼻中雷次韻鄉人送酒四時㓛德正恢台仲蔚門前十畒萊恨我未䏻終日醉夫君又送一尊來江山雨過聊供眼書卷年深謾作堆午枕南風吹不醒可䏻破柱作驚雷廷實歸贈以瑞香之花次韻留別是誰溪裡放船來溪月隨身上釣臺衰骨可供連日語後生真有不羈才笑呼白鳥同詩社旋掬清流當酒杯欲贈夫君何所有畫闌新帶瑞香回次韻丘太守見寄兼懷賀克恭黃門緑水青山置我曹江西遼左一神交短籬霜菊誰供酒破屋秋風自補茆勳業都歸窗下枕行藏更問易中爻癡兒多病慈親老不向清時嘆繫匏西良容君携孫來訪不見夫君心緒亂忽過茅宇鬢毛班稚孫看弄窗前筆舫子忘歸月下灣衰病欲尋西華枕舊逰半落北邙山洛陽詩酒耆英社分付江門主客間次韻定山先生種樹東崦芳菲已碧桃更移紅杏占西坳每逢好雨扶笻看不要先生抱甕澆與一野僧吟憩石無諸俗事坐持醪不將物我來分別觀化于今是幾遭橋下泉流十丈窪橋頭草屋萬株花關關終日鳥鳴樹歲歲春風人在家何處三杯歌浦口夜來一夢在天涯尊前不見滄𬈑闊浩浩還君一笑誇花時風日美新晴北沜南垞迤邐行春色酣酣薰我醉年光衮衮嘆人生竹林背水題將遍石筍穿沙坐欲平客問定山何所有滿山紅紫數聲鶯題畫王太姥像夀家慈八十一三元甲子不須論帝遣長生住此村花水前頭瞻太姥雲霞裏靣拜曽孫一天星彩分南極千歲桃花發舊根議擬人間都未是壷中自有一乾坤至日病𥘉起至日哦詩起坐床梅花墻角為誰香暖臍一盞金櫻酒降氣連朝附子湯旋整巾裳還客拜未堪歌舞趂孫狂赤藤杖點廬岡石向晚猶須望八荒兩度書雲傍玉臺不才知幸乞恩回梅花果解撩詩思弓影何須落酒杯四大形骸從老去一年風日想春來眼前不獨南枝蚤未臘江桃也爛開睡足龍溪舊草堂晨開東牗望扶桑四方雲物書同日半夜梅梢度一陽行不愧人貧亦樂藥䏻除老瘦何妨春來試約張東所何處投竿弄渺茫山人家世夲陳摶供奉何堪晚得官菽水可寬垂老意江山不比向來看教兒別煮新年藥問客䏻餐老菜盤欲上飛雲更何日典裘沽酒掛驢鞍殘菊寄兼素此菊自九江舁來徙檻編籬與護持託根何謝九江時數花寂寞元髙品一賞延緣有舊知把酒忽驚今日意餐英誰弔古人悲風霜未改微馨在看到玄冬復幾詩晨起將出尋梅朝煙橫野犢鳴陂索杖山齊睡起時田父許留今日酒梅花不缺去年詩衝寒索笑來何處帶病尋香出每遲倣佛西湖夢中見水邉籬落忽橫枝半樹橫枝太逼真暗香踈影亦傳神芝蘭失寵元無雪桃李生嫌更媚春老幹最冝千丈石香風不動九衢塵相思滿眼天涯暮迢遞無因寄逺人虬枝髙望鐡橋開禀氣寰中寡所諧樵塢夜寒花索酒山厨香近月橫階何處畫圖空議擬他時羮鼎絶安排相逢也恨孤山淺那得詩情到簡齊村南乂路細縈蛇注目寒江不見花逺樹帶煙風裊斷長稍離岸石鈎斜看來欲洗溪邉竹折去須乘水上槎買地結庵何處所老梅今擬作東家挽敕總兩廣軍務都御史郴陽朱公十年持節嶺西東奏疏金門月幾封都府清虛如到寺家徒冷淡不隨公瘡痍已拯人間溺經略還收戰外㓛猶與後時憂餽餉羡餘不以獻重瞳髮踈齒豁瘴天涯已道頭顱事可知萬里忽聞徵召起九泉應恨乞歸遲事方年少常如鈍慮過時人忽似癡愛惜餉軍三十萬至今猶繫陜人思楚天春望思難任生死交情秪自深豈有鵬程髙萬里故收駿骨破千金姓名叨入黃公傳絮酒空懷孺子心拂拭孤桐向眀月哀紘彈絶不成音六子少保誠庵朱公歸葬郴陽適㑹憲長陶公遣生員陳諫偕景暘往祭其墓遂併以公意作詩贈之銘旌前日別金臺故吏門生安在哉黃葉孤村荆桂老青山連騎越香來人思舊德聞吹笛鳥避新阡下啄苔欲了平生㓛德狀到時須打墓碑回黃金誰問買端溪羊祜殘碑我解題一飯可忘公吐握千秋遺愛廣東西寒瀧急雨飛濤惡夜峽啼猿哭月低不為髙堂兼卧病天涯絮酒肯教携讀張進士挽丁明府彥誠詩次韻六年官守斃諸難七月孤兒護一棺作縣未逢真事會濟人𥘉試小還丹思張公道多違俗入叙年勞不轉官今日桐鄉須愛我還公爼豆黃雲間寄莊定山兼謝藥鼎祭器青燈白馬共延緣半樹梅花一大顛謂太虛師色笑親公剛一月江山別我忽三年懸車有病時將晚辟榖無方意可傳祭器逺來人不見夜焚香炷拜青天易郴訃至乞書銘旌三年不欵白沙扉病枕春來耗亦稀天地無窮流水逺江山猶是昔人非群賢半逐春雲散老泪還隨暮雨飛八字銘旌吾敢愛知君不愧舊儒衣謁諸墓宿草荒墳秪自悲百年心事欲奚為劵堂有鼠䏻穿地神道無人可假碑數口仍憂開歲給一錢未領到官支赤泥淺土嗟何及早晚牀金盡一揮悼林琰青湖山下抱琴回人道藩籬自此開澡雪果嫌身抱柱甘眠真有鼻呼雷塵埃衮衮荒書課鴻鵠翩翩落酒杯多謝急難兄弟好為收遺骨葬蒿萊扶胥早寄坐中身晚入黌宫忽四春放意自名狂者事到頭誰是醉鄉人世緣可狥聊同俗習氣難除每喪真聞道平湖㱕漸近相逢空有一沾巾㬌雲如郴陽未返懷之舊韻曲江忠襄鄉先逹過兩廟拜看留題鳥還英德山當面人向芙蓉路更西蓋頂拂霜羸馬怯擔頭衝雨跛奴低西風兩眼龍門泪灑向桂陽何處溪袁侍御夜過白沙萬里心期共杳然春風何處酒相延霜臺白髮三千丈草閣青燈十九年酩酊放歌聞浦口支離從事說南川乾坤此意誰拈出盡是庖羲未畫前候緝熙何日江邉艤畫航春風先客到林塘鳥性亦知長傍樹人情莫甚久離鄉蕭蕭白髮春還短悄悄丹心老更長不負平生袁御史嶺南無地著秋霜悵望春江醉欲呼諸君還契此機無花開小沜供持酒水到垂楊可繫艫暮景何勞方伯玉前程端勿問平湖故鄉不似前回別江閣青燈對老夫寄張兼素歸舟逺泝長江水信息𥘉通五嶺雲此日山林聊共病幾時風月許平分諸賢在位當扶世我輩何人敢避群蚤晚求丹還入海風濤滿地却懷君緝熙至用寄兼素先生韻寫懷黃鸝啼破海山春萬里滄𬈑一片雲童子燒香賔客坐老妻謀酒隔墻分間花塢裏藏春色麋鹿山中失舊群今夜蒲團空對我明朝煙艇不隨君草閣春風忽兩人坐臨江水看江雲尋常肝肺詩中寫六十頭顱鏡裡分落絮風驚還著樹行人日出便離群孤舟逺下南亰道望斷梅關不見君次韻張廷實舟中寫興春浪江門又打山孤舟誰蕩兩山間雙眸少見鸞髙翥百歲當如蔗倒餐影響何勞空說夢㓛名真個不如間何人解脫葫蘆纒跳下漁磯共釣竿白沙先生六十年腳頭到處是靑天幾場世事攢眉應千丈雲根枕頂眠今夕髙談真不偶後來勝㑹恐無緣白頭不起江門浪打住吟風弄月船好月江門客未眠水風吹冷緑楊烟望窮碧海三山路興滿羅浮七洞天勢利可䏻驅我輩路人剛道是神仙千峯不語留君醉乞與人間作畫傳白沙子卷之七終
