  text: 白沙子卷之一
  hash: sha256:9913546c0ea436329e46cfda565326a02399eda056f4a5093e25ef2b0bc9c423
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0108_SBCK_001-1a}
body:
  text: 奏䟽乞終養䟽臣原籍廣東廣州府新㑹縣人由本縣儒學生員應正統十二年郷試中式正統十三年㑹試禮部中副榜告入國子監讀書景㤗二年㑹試下第成化二年本監撥送吏部文選清吏司歷事成化五年復㑹試下第告囬原籍累染虚弱自汗等疾又有老母朝夕侍養不能赴部聴選成化十五年以來廣東左布政使彭韶欽差總督兩廣軍務兼理廵撫右都御史朱英前後具本薦臣堪充任使吏部移文廣東布政司等衙門趣令起程臣以舊疾未平毋年加老未䏻輙行府縣官吏承行文書日夕催逼不免強起􅈬道而沿途病發随地問醫扶衷𥙷羸僅不大憊扵成化十九年三月三十日到亰朝見赴部乃以乆勞道路舊疾復作延至月餘扵五月二十五日蒙吏部題奉聖㫖恁部裏還考試了量擬軄事來說欽此欽遵臣時方在床褥聞命媿悚未能􅈬試郎令姪男陳景星赴通政使司告轉行本部暫令調治再歷晦朔心不自安七月十六日扶病赴部聴試而筋力杇弱立歩艱難自揣虚薄未堪筆硯因續具状再延旬日日復一日病势轉増耳鳴痰壅面黄頭暈視昔所染無慮數倍衆目所覩不敢自誣又扵八月二十二日得男陳景易書報臣母别臣以來憂念成疾寒熱迭作痰氣交攻待臣南歸以日爲歲臣病中得此魂神飛䘮仰思君命俯念親情展轉欝結終夜不寐臣之愚迷實不知所以自䖏也臣自㓜讀書雖不甚觧然扵君臣之義知之乆矣伏惟我國家敎育生成之㤙陛下甄録收采不遺卑賤之徳至深至厚扵此而不速􅈬以圖報稱扵萬一非其情有甚不得巳者孰敢騖虚名餙虚譲趑趄進却扵日月之下以冐雷霆之威㢤臣所以一領郷書三試禮部承部檄而􅈬道聞君命而驚心者正以此也縁臣父陳琮年二十七而棄養臣毋二十四而寡居臣遺腹之子也方臣㓜時無歲不病至扵九齡以乳代哺非毋之仁臣委扵溝壑乆矣臣生五十六年臣毋七十有九視臣之衷如在襁褓天下毋子之愛雖一冝未有如臣毋憂臣之至念臣之深者也臣扵毋㤙無以爲報而臣毋以守節應例爲有司所白已蒙聖㤙表厥宅里是臣以毋氏之故荷陛下之深㤙厚徳又出扵尋常萬萬也顧臣毋以貧賤早寡俯仰無聊殷憂成疾老而彌劇使臣逺客異郷臣毋之憂臣曰甚愈憂愈病愈病愈憂憂病相仍理難長乆臣又以病軀憂老毋年未暮而氣則衷心有爲而力不逮雖欲効分寸扵旦夕豈復有所惜㢤臣所以日夜憂憊欲䖏而未䏻者又以此也夫内無攻心之疾則外不見從事之難上有至仁之君則下必多曲成之士惟陛下以大孝化天下以至誠體萬物海宇之内無匹夫匹婦不獲其所者則臣之㣲亦豈敢終有所避而不自盡㢤伏望聖明察臣𥘉年願仕之心憫臣乆病思親不䏻自已之念乞勅吏部放臣暫歸田里日􅈬醫藥奉侍老毋以竆餘年俟毋養獲終臣病全愈仍前赴部以聴侍用則臣毋子未死之年皆陛下所賜臣感恩益深圖報益切雖死扵道路無所復辭矣臣干冐天威無任皇恐戰栗之至謝㤙䟽臣扵成化十九年八月二十八日具本陳情乞還養毋兼理舊疾九月𥘉一日欽奉聖㫖陳獻章旣該廵撫等官薦他學行老成可用今懇切求囬養毋吏部還查聴選監生碩告囬家的例來說欽此及吏部查例覆奏扵本月𥘉四日欽奉聖㫖陳獻章旣係巡撫等官薦他今自陳有疾乞囬終養與做翰林院檢討去親終疾愈仍來供軄欽此伏念臣本菲才誤蒙薦舉又以老毋在念沉疴在躬未得以仰承試用陛下憫其愚誠不加誅責使少寛旦夕之假巳云幸矣而又慰之以温言寵之以清秩使遂其欲去而勉其復來此誠天地之量日月之明雨露之澤出扵㝷常條格之外者臣雖至愚亦知􅋦負㤙徳圖報稱扵親終疾愈之日不敢負朝廷待士之盛意不敢違臣子効用之𥘉心也但身在床褥實難動履輒欲具本稱謝以不親拜舞益不自安即令姪男陳景星具状鴻臚寺告欲俟筋力稍紓尚當強勉赴闕庶㡬少伸報謝之萬一而又爲風寒所中肢節沉痛卧不䏻與臣竊復自念舊疾方殷新病復繼恐非旬月可愈不惟有稽入謝之期抑且不䏻亟副歸養之詔心未酬而罪愈甚矣臣瞻望朝廷離違在邇雖圖報有日而遲速未占俯仰愧怍無任感激戀慕之至序認真子詩集序詩之工詩之衰也言心之聲也形交乎物動乎中喜怒生焉扵是乎形之聲或疾或徐或洪或微或爲雲飛或爲川馳聲之不一情之變也率吾情盎然出之無適不可有意乎人之賛毀則子虚長楊飾巧夸冨媚人耳目若俳優然非詩之敎也甚矣詩之難言也李伯藥見王通而論詩上陳應劉下述沈謝四聲八病剛柔清濁靡不畢究而王通不荅薛收曰吾嘗聞夫子之論詩矣上明三綱下逹五常扵是徴存亡辨得失小人歌之以貢其俗君子賦之以見其志聖人采之以觀其變今子之言詩是夫子之所痛也南朝姑置勿論白唐以下㡬千年于兹唐莫若李杜宋莫若黄陳其餘作者固多率不是過烏虖工則工矣其皆三百篇之遺意歟率吾情盎然出之不以賛毀歟發乎天和不求合扵世歟明三綱逹五常徴存亡辨得失不爲河汾子所痛者殆希矣故曰詩之工詩之衰夫道以天爲至言詣乎天曰至言人詣乎天曰至人必有至人能立至言堯舜周孔至矣下此其顔孟大儒歟宋儒之大者曰周曰程曰張曰朱其言具存其發之而爲詩亦多矣世之能詩者近則黄陳逺則李杜未聞舎彼而取此也學者非歟将其所謂大儒者工扵道不工扵詩欤将未至扵詣乎天其言固有不至欤将其所謂聲口弗類欤言而至者固不必其類扵世或者又謂詩有别材非關書也詩有别趣非關理也則古之可與言詩者果誰歟夫詩小用之則小大用之則大可以動天地可以感鬼神可以和上下可以格鳥獸四時行焉百物生焉皇王帝覇之褒貶雪月風花之品題一而已矣小技云乎㢤都憲朱公以其所爲詩編次成帙題曰認真子集授簡扵白沙陳獻章曰爲我序之公昔語我扵蒼梧曰詩非吾所長公豪扵辭矣而未始以爲足認真子名集公意有所属顧覧者未必知而吾以是覘公之晩節也詩雖工不足以盡詩而况扵盡人乎謂吾不䏻扵詩而好爲大言不知言者也公名英字時傑郴陽人由進士歴官中外節用而愛人奉餞方伯張公詩序昔魏野送㓂忠愍之詩云好去上天辭冨貴歸來平地作神仙當是時㓂公自永興召入其志方銳扵事爲野遽止之故㓂公不恱後來通州始書此詩扵壁間朝夕諷詠之論者以是善野之言而以㓂公之始終爲可議夫君子出處去􅈬之義固未可盡責之㓂公軰而山人䖏士例以不出爲髙故其所責望扵人亦止以輕冨貴爲第一等事則野之扵㓂公其相與之言如此亦冝方伯張公不以㒒愚徃徃欲置之門下近者疊􅑚責以贈言㒒何敢爲倿誠慕古人出處之大不敢狥一已之私主一偏之見以必人之從我而忘天下故區區之辭惟以已與公進退竝言之而不敢效尤扵野之必其義可否公請自擇胡文定公平生出處未嘗謀扵朋友如人飲水冷暖自知惟公裁焉其辭曰去夢勞精爽投書阻歲年壮逰眇車盖虚卧老江烟公徳清南服帝心簡時賢神仙休嘱付卿相待囬旋東暁序成化庚寅十二月作居之有名惡乎始君子之居也興扵斯息扵斯目之所視心之所随苟無所事乎畏則怠而入扵忘其主扵畏乎何氏子隠南海之濵更名潜榜其居曰東曉盖亦以其識見之超卓䏻及於㣲逺如陽氣始舒昭晣無間故以其象諭之云耳時乎見則見矣冝潜而見過也則有畏潜惡乎畏而取扵是故直以爲喻已然予謂潜之畏不終無也晹谷始旦萬物畢見而居扵蔀屋之下亭午不知也忽然夜半起振衣於四千丈羅浮之岡引盻於扶木之區赤光在海底皎如晝日仰見群星不知其爲夜半此無他有蔽則闇無蔽則明所處之地不同所遇随以變况人易於蔽者乎耳之蔽聲目之蔽色蔽口鼻以臭味蔽四肢以安佚一掬之力不勝群蔽則其去禽獸不逺矣於此得不甚恐而畏乎知其蔽而去之人欲日消天理日明羅浮之扵扶木也溺扵蔽而不勝人欲日熾天理日晦蔀屋之於亭午也二者之機間不容髮在乎思不思畏不畏之間耳潜隠者也理亂黜陟刀鋸非所畏尚亦有畏扵斯乎因其乞言序以朂之李文溪文集序成化庚寅九月作予嘗語李徳孚曰士從事扵學㓛深力到華落實存乃浩然自得則不知天地之爲大死生之爲變而况扵冨貴貧賤㓛利得䘮詘信予奪之間㢤今觀其先世文溪先生遺藁𥘉渉其流渺茫汪洋若江河之奔駛而又好爲生語險恠百出讀者徃徃驚絶至或不䏻以句以謂文溪直文耳徐考其實則見其重内輕外難進而易退蹈義如弗及畏利若懦夫卓乎有以自立不以物喜不以已悲盖亦庶㡬乎吾所謂浩然而自得者矣然後置書以嘆曰嗟乎此文溪所以爲文也亟讀而亟思之執卷務盡乃至目倦神疲欠伸欲起輙囬顧屑屑焉不忍舎也夫因言以求其心攷跡以觀其用故人之深淺畢見愚不敢自謂有得扵文溪之藴顧平昔所以告徳孚者乃區區願學而未䏻忽焉親諸簡冊之中𥘉若冥㑹雖不盡觧其說要其歸與此異者盖寡矣則以之而嗟嘆慕恱尚奚疑㢤傳曰生乎百世之上百世之下聞者莫不興起此之謂也徳孚念先緒之落落遺稿僅存復多訛闕乃深自愳恧悉訪諸族之人得舊所刋本與所謄本叅校闕其所疑刻之家塾命胤子昭董其事而俾予爲序之扵乎自予爲兒時而獨恨未識其心胸氣象爲何如比歲亰師獲交徳孚亦嘗一閱其世譜今幸寘目扵先生之文而知冨貴果不足慕貧賤果不足羞㓛利得䘮屈信予奪一切果不足爲累天地之爲大死生之爲變自得者果不可得知而奮乎百世之上興起百世之下孟軻氏果不予誣其所恃者盖有在也故士必志道然後足以語此徳孚好學老當益壮昭也尚亦有激於予之斯言也乎澹齋先生挽詩序昔人求哀辭扵林􅛽􅛽謝之書有曰君子無苟扵人患其非情也夫感而哀之所謂情也情之發而爲辭辭之所不能已者凡以哀爲之也苟無其哀矣則又惡以辭爲㢤此之謂不苟扵人也余頃居京師二年間從貴公卿㳺入其室見新故卷冊滿案其端皆書謁者之辭􅈬而閱之凢以其親故求挽詩者十恒八九而莫不與也一或拒之則艴然矣懼其艴然而且爲怨也而強與之豈情也㢤噫習俗之移人一至扵此亦可嘆也天下之僞其自兹可憂矣澹齋先生姓某氏名某秫坡黎先生門人也吾郷稱先逹以文行敎後進百餘年間黎秫坡一人而已秫坡與余連里第余之生也後不及侍其門弱冠與澹齋之子益㳺始拜澹齋誨余以秫坡事縷縷此豈一日忘其師者耶當是時秫坡之門存者不少獨澹齋以其學敎授扵羅山之下子弟有所矜式焉夫不背其師於旣死而傳其學扵來世信也愛其子以及其友仁也益之子執饋扵我雲也今爲梁氏甥戚也藉是三者死也䏻無哀乎哀而後爲之詩詩之發率情爲之是亦不可苟也已不可僞也已緑圍伍氏族譜序伍氏系出汴梁先世有仕宋爲嶺南第十二将卒于官遺其二子新㑹遂有緑圍之伍曰朝佐曰朝愷今爲緑圍始遷之祖而氓又始遷之祖所自出所謂第十三将者是也氓以上世次莫詳今㫁自可知以氓爲第一世自氓而下或隠或仕垂三四百年邑之稱望族曰衣冠之羙無替厥先術業之隆有光厥後者得伍氏焉吾友光宇自其先大父某始徙居外海之南山山之坡陀有石延袤丈餘下可容一榻光宇築爲室石旁樹松竹徃徃造其間危坐收歛爲持敬之學又扵白沙築小室三間命曰㝷樂以爲問業之所至則啇論彌月而後返用心良苦時人無有䏻窺其際者惟寳安林光與余知之余交最乆光纔一再見退謂其弟琰曰伍光宇君子人也素有肺疾然喜聞議論之益當其呻吟疾苦之時遇有得輙若亡去辛卯首夏疾大作中益以他恙遂不可支是秋九月余徃視之坐甫定便語云還我族譜序吾無憾焉耳退見其季父絢洎伯兄𥙿咸申之曰絢等殆未有請也惟先生之於雲也實望之寧獨愛一言且使聞之病亦㝷起嗚呼若光宇者困而益堅老而愈壮危至而知惕樂矣而不淫可謂篤信有守者矣其扵伍氏所謂無替而有光者其在斯人歟其在斯人歟夕惕齋詩集後序受朴扵天弗鑿以人禀和扵生弗淫以習故七情之發發而爲詩雖匹夫匹婦胸中自有全經此風雅之淵源也而詩家者流矜竒眩䏻迷失本真乃至旬鍜月煉以求知扵世尚可謂之詩乎晉魏以降古詩變爲近體作者莫盛扵唐然已限其拘聲律工對偶竆年卒歲爲江山草木雲煙魚鳥粉餙文貌盖亦無𥙷扵世焉若李杜者雄峙其間號稱大家然語其至則未也儒先君子類以小技目之然非詩之病也彼用之而小此用之而大存乎人天道不言四時行百物生焉徃而非詩之妙用㑹而通之一真自如故䏻樞機造化開闔萬象不離乎人倫曰用而見鳶飛魚躍之機若是者可以輔相皇極可以左右六經而敎無竆小技云乎㢤今之名䏻詩者如吹竹彈絲𫾣金撃石調其宫啇髙者爲霓裳羽衣白雪陽春稱寡和雖非韶頀之正亦足動人之聴聞是亦詩也吾敢置不足扵人㢤少叅任君蒞吾省間過白沙携其先公詩集求一言扵卷末予故以詩道畧陳之若夫先公吟詠之情具在集中覧者當自得云送張進士廷實還亰序郷後進吾與之㳺者五羊張詡廷實始舉進士觀政吏部稽勲㝷以疾請歸五羊五羊大省地廷實所居戸外如市漠然莫知也自始歸至今六年間歲一至白沙吾與之語終日而忘疲城中人非造廷實家不得見廷實而疑其簡實不然也盖廷實之學以自然爲宗以忘已爲大以無欲爲至即心觀妙以揆聖人之用其觀扵天地日月晦明山川流峙四時所以運行萬物所以化生無非在我之極而思握其樞機端其衘綏行乎日用事物之中以與之無竆然則廷實固有甚異扵人也非簡扵人以爲異也若廷實清虚髙邁不苟同扵世也又何憂其不䏻審扵仕止進退語黙之槩乎道也兹當聖天子登寳位之眀年思得天下之賢而用之而廷實之病適愈太守公命之仕廷實不得以未信辭扵家庭扵是卜日告行扵白沙留二十餘日去歲之冬李世卿別予還嘉魚贈以古詩十三首其卒章云上上崑崙峯諸山髙㡬重望望滄𬈑波百川大㡬何卑髙入揣料小大窮多少不如兩置之直扵了處了世卿豪扵文者也予猶望其深扵道以爲之本廷實至亰師見世卿重爲我告之廷實所以自期廷實其自信自養以逹諸用他人莫能與也送李世卿還嘉魚序弘治元年戊申夏四月湖廣嘉魚李承箕世卿自其卿褁粮南望大庾嶺沿途歌吟入南海訪予白沙一見語合意先是五六年予㑹都憲公之子承㤙于北亰承㤙世卿從弟也示予以世卿之文岀入經史跌宕縦横筆端衮衮不竭來數千言沛然岀之若不爲勢利所拘者予時未識世卿而知世卿抱負有大扵人旣不忘于心亦時扵詩焉發之或聞論當世士有文章必問曰如李世卿否然又意世卿少年凌邁髙逺則有之優㳺自足無外慕嗒乎若忘在身忘身在事忘事在家忘家在天下忘天下世卿未必䏻與我合孰知世卿有意扵來耶自首夏至白沙至今凡七越月中間受長官聘修邑志于大雲山五十餘日餘皆在白沙朝夕與論名理凡天地耳目所聞見古今上下載籍所存無所不語所未語者此心通塞徃來之機生生化化之妙非見聞所及将以待世卿深思而自得之非敢有愛扵言也時時呼酒與世卿投壺共飲必期扵醉醉則賦詩或世卿唱予和之或予唱而世卿和之積凢百餘篇其言皆本於性情之真非有意扵世俗之賛毀至是世卿以太夫人在堂辭去欲留不可爲古詩十三首別之諸友相繼有言世卿歸以所聞扵予者質諸伯氏茂卿登大崖山吟弄赤壁之風月予所未言者世卿終當自得之世卿之或岀或處顯晦用舎則繫扵所遇非予所䏻知也予老且病行将采藥扵羅浮四百三十二峯以畢吾碩世卿䏻復索我扵飛雲之上否耶序以送之望雲圖詩序弘治辛亥十二月作意所嚮徃處非乗雲御風身不可得而至竆之乎山川委之乎官守曠之乎歲月當食食忘當寝寝廢一有感乎外而動乎中終日視而目不瞬以言乎化外不化而内化以言乎情則哀而不傷至矣乎非子之於親則臣之於君過而不過其狄梁公歟梁公仕唐在武后朝以一身繋唐宗社之重扶陽抑隂光復唐祚事載簡冊昭若日星夫梁公可謂有大㓛扵唐矣賢者識其心自望雲一念中來故曰求忠臣必扵孝子之門今王公少孤事毋夫人以孝聞稱扵藩臬諸公者無異辭公山西人也奉命來南海㡬年念太夫人春秋髙不得左右朝夕侍以爲憂與人言輙流涕鳴咽而不自勝先公之逝公方委齒已䏻慟絶復蘇盖公之孝自天性非由勉慕乎外扵是諸公命工繪望雲思親圖以表之復相與賦詩道其事扵古岡病夫陳某俾序之頃者公乗廣海之舟道經新㑹吏民親公如親賢大夫忘乎公之爲貴也時情俗態好倿䛕而樂承奉皆是也公一濯之清風而民稱其不擾夫以今日之所聞徴諸古若梁公之事然後識其中之所存苟無是心有文章足以收譽扵衆口有㓛業足以耀榮扵一時有名節足以警動乎流俗皆僞而已豈䏻乆而不變㢤夫孝百行之源也通扵神明光扵四海堯舜大聖也孟子稱之曰孝弟而已矣故君子莫大乎愛親嘗取李令伯陳情表讀之有不感咽流涕廢書以嘆者乎烏虖令伯之表太行之雲也斯圖也若之何使王公見之慰其憂增其憂殆非所以處王公也雖然君與親一也在親爲親在君爲君世寧有篤扵親而遺其君者乎圖而賦之以表公之孝以勸公之忠而又以公之能媿人之不䏻振頽風扶世敎固有位者之事諸公豈無意乎覧者當自得贈李劉二生使還江右詩序匡廬白鹿之故址自宋考亭朱晦翁一嘗作新之後遂無聞焉我朝文教誕敷郷先軰翟公守南康日始圖創復舊觀潮陽李先生繼之白鹿書院之名復聞扵天下成化十七年江西按察使耻庵陳先生乃謀扵提督學校憲副鍾公僉事冷庵陳公大叅祁公慨然以作新斯文爲已任謂余扵考亭之學亦私淑諸人者冝領敎事乃具書幣告于巡鎮遣二生李士逹劉希孟如白沙以請同時司藩臬諸賢咸與聞之外則東白張先生廣東大方伯彭公按察使閔公吉水袁徳純各以書遺予雲輝日映交迸衡宇二生以諸公之命命予予覧幣而驚置書而走走且告曰二生莫誤諸公欲興白鹿之敎復考亭之舊必求䏻爲考亭之學者夫然後可以稱諸公之任使乃下謀扵予是何異借聴扵聾求視扵盲也予聞之君子之使人也由其誠不強其所不䏻諸公即居予扵廬山予所䏻也居廬山以奉諸公之敎非予所䏻也二生其審諸扵是邑中聞有諸侯之使自邑令佐以下至士庶耆老源源而來靡不觀感李生丰姿秀發言論是非不苟雷同劉生貌恭而言慎確有㩀守俱稱爲東白門人也予甚愛之留且彌月矣二生以諸公之命乆不復辭去予旣返諸公幣復爲詩别之所以致區區扵二生而申景仰扵廬山也是日憲副陶公過白沙邑長丁侯郷諸士友各賦詩以贈帙成俾予序之味月亭序成化丙午春正月五羊何子有載酒過白沙對月共飲延縁數夕告予曩夢逰仙甚適扁所居第爲味月亭識夢境也碩乞一言以歸予口占一絶句云騎羊仙客去仙城風韻千年落杳冥羅浮道士來何處笑倒君家味月亭戯謂子有曰君不知羅浮道士耶嘗俛仰子之亭矣因撫掌笑前此五年予𬒳徴過郡通名子有之廬道士即予盖寓意耳贈容一之歸番禺序容生卓錐無地從予㳺者十有一載未嘗對人作皺眉状入亰師見聲利烜赫輙不樂語人曰古之仕者将以行其志耳徒食人禄而不知耻雖吾不䏻以一日居生之志可謂篤矣顧以予之踈繆不䏻輔其爲仁是生雖有羙貭而其學未底于成由吾之虚名誤之也雖然生之志豈易量㢤聖賢之言具在方冊生取而讀之師其可者改其不可者直截勇徃日進不巳古人不難到也但恐㳺心太髙著蹟太竒将來成􅈬結褁處旣非庸常意料所及而予素蹇鈍胡能追攀逸駕仰視九霄之上何許茫茫生方銳意以求自得亦将不屑􅈬予又安知足履平地者果爲何如也千里之行始乎跬歩生慎由之陳先生習忘乆矣生歸見毅卿其亦以是語之道學傳序成化乙巳年閠四月作自炎漢迄今文字記録著述之繁積數百千年扵天下至扵汗牛充棟猶未巳也許文正語人曰也須焚書一遭此暴秦之迹文正不諱言之果何謂㢤廣東左方伯陳公取元所脩宋史列傳中道學一編鏤板與同志者共之宋史之行扵天下有全書矣公復扵此留意焉噫我知之矣孔子曰十室之邑必有忠信如丘者焉不如丘之好學也後世由聖門以學者衆矣語忠信如聖人鮮能之何其與夫子之言異也夫子之學非後世人所謂學後之學者記誦而巳耳詞章而巳耳天之所以與我者固懵然莫知也夫何故載籍多而㓛不專耳目亂而知不明冝君子之憂之也是故秦火可罪也君子不諱非與秦也盖有不得巳焉夫子没微言絶更千五百年濂洛諸儒繼起得不傳之學扵遺經更相講習而傳之載扵此編者備矣雖與天壤共弊可也抑吾聞之六經夫子之書也學者徒誦其言而忘味六經一糟粕耳猶未免扵玩物䘮志今是編也采諸儒行事之迹與其論著之言學者苟不但求之書而求諸吾心察扵動靜有無之機致養其在我者而勿以聞見亂之去耳目支離之用全虚圎不測之神一開卷盡得之矣非得之書也得自我者也盖以我而觀書随處得益以書博我則釋卷而茫然此野人所欲獻扵公與四方同志者之芹曝也承公命爲序故及之公名選字士賢浙之臨海人先公勿齋先生宰新城遺愛在民公稱其家學云襍詩序余自成化辛卯秋九月以來絶不作詩值興動輙遏之至今年夏四月余病小愈扶杖出門俯仰上下欣慨于心師友代凋知已悠邈殆亦不可爲懐反乎中堂童子絃歌蹶然厥中情危境逼因縁成聲積旬所爲凢得詩若于此外又有聞蛙聞杜䳌示跛奴詰李翁奴送西賔筆等通若干詩微覺曠日既反于故戒晦日取閱之皆誠意所發辭不虚假序而蔵之用示児子送李山人詩序成化辛卯春永豊人李立武挾風水之術過白沙訪予一曰以其術相地扵蓬萊館指其上土渦謂余曰仰天湖也余不䏻識其然否西北歴崑崙之麓岀入十二郍環以青山蒙以白雲余扵是俯仰樂甚李君旣四顧無所得復嘆仰天湖之勝以爲竒絶余扵李君盖各適其適也作詩以貽之送容一之如永豊詩序縣主丁侯景仰一峯羅先生扵旣殁乃以學生容貫充吊祭使如永豊而歸其賵于先生之子清極貫云當自永豊東走金陵謁木齋荘先生扵江浦然後歸一念懷賢無間存殁可壮也歌以送之謌曰還從江北話江西謁墓人來見木齋長江亦是東湖水何處吟風弄月䑓今朝何事又離群南北東西一片雲如此行蔵都未定老夫扶病欲随君東圃詩序南海范規從予㳺嘗聞規之父東圃翁朴茂扵人無怨惡早歲岀入江湖旣倦而歸圃扵西江之滸花山之隂因寄號曰東圃東圃方十畒沼其中架草屋三間傍植花卉名木𬞞果翁寄傲于兹或荷丈人蓧或抱漢隂甕興至便投竿弄水撃壤而歌四時之花丹者摧白者吐或飲露而飡英或㝷芳而索笑科頭箕踞檉隂竹影之下徜徉獨酌目諸孫上樹取果實嬉戯笑語以爲適醉則曲肱而卧藉之以緑草灑之以清風窹寐所爲不離乎山雲水月大抵皆可樂之事也規別白沙去逰曹溪洞不相見數年矣一日復來與規語如聞陳子昻李太白賦感遇詩一喜一愕規亦竒矣㢤比歸以東圃詩爲請且曰無以娯親故也予樂聞東圃翁爲人而憐規之志不可違也賦排律十韻以贈之東圃名真字則未聞也詩曰一老胥江卧瀕江一圃開林春煙淡泊地暝月徘徊盡曰扄茆宇殘年寄酒杯山蹊人不到庭竹鳯飛來靜得丘園樂清無市井埃雲封朝几白風入夜絃哀細雨携鉏去輕笻㸔藥囬江山吾晚暮梨栗爾嬰孩天上群龍逺花前獨鶴陪誰爲求仲侣心蹟緫悠㢤記韶州風采樓記弘治丁巳冬作宋仁宗朝除四諌官其一人忠襄余公也蔡君謨詩云必有謀猷禆帝右更敎風采動朝端弘治十年春韶守錢君鏞始作風采樓與張文獻風度樓相望忠襄之十八世孫英走白沙謁文以表之夫自開闢逹唐自唐逹宋至于今不知其㡬千萬年吾瞻扵前㤗山北斗曲江公一人而已耳吾瞻扵後㤗山北斗公與菊坡公二人而已耳噫士生扵嶺表歴兹年代之乆而何其寥寥也則公之風采在人爭先睹之爲快如鳯凰芝草不恒有扵世也可知矣如公之才得行公之志所謂障百川而東之囬狂瀾扵旣倒公固有之公有益扵人國也大矣雖然一諌官豈䏻盡公㢤顔淵問爲邦孔子斟酌四代禮樂告之顔淵䖏士也何與斯理耶居陋巷以致其誠飲一瓢以求其志不遷不貳以進扵聖人用則行舎則蔵夫子作春秋之㫖不明扵後世矣後之求聖人者顔子其的乎時乎顯則顯矣時乎晦則晦矣語黙岀處惟時豈苟㢤英乎勉諸毋曰忠襄可爲也聖人不可爲也古蒙州學記立山復州治之㡬年今雲南左布政使樂安謝公綬始領右方伯之命來廣西其民舉欣欣然喜而相告曰公復來公復來廬陵彭君栗適知州事問扵諸父老諸父老跽而言曰是再造我民者我何可忘吾州古蒙州也唐改立山縣國朝洪武間革爲古眉廵檢司時草㓂竊發民亡者過半比年以來猺獞横㩀其地盗日滋而民日孤成化丙申廵撫都御史朱公英督兩廣軍征荔浦破賊賊懼招之徸老李恭著首遣其子來納欵公前以叅議佐巡撫于戒議城立山立山本州治在桂林平樂之間爲藩腹心今之憂無控暴之地以居民耳州復則民定㝷請扵上許之乃營立山是役也公與按察副使范公鏞都指揮王公輔更主相之明年丁酉州治成方進軍荔浦時桂山岩恃險後下一軍怒将盡殱之公廉其脅從者得七百餘人釋遣歸農賊以此傾信招所至猺徸視我立山咸來此公以好生一念之仁代血戰數萬之兵也今也吾民之亡者復復而爲州昔之戕吾民者今革面爲編氓我有農桑我有塾庠生我有養死我有蔵公之再造我民也我何可忘扵是彭君籍記諸父老之言将碑扵學宫以傳而謀扵提學時可周先生周先生三致彭君之懇扵予俾爲之記嗟乎彭君誠不私扵公而思惠其州之人士乎請爲言之七百死命歸農何致群兇之納欵州亡州復在民何關扵公之一念動扵此應於彼黙而觀之一生生之機運之無窮無我無人無古今塞乎天地之間夷狄禽獸草木昆蟲一體惟吾命之沛乎盛㢤程子謂切脉可以體仁仁人心也充是心也足以保四海不能充之不足以保妻子可不思乎聖朝訪古設學立師以敎天下師者傳此也學者學此也由斯道也希賢亦賢希聖亦聖希天亦天立吾誠以徃無不可也此先王之所以爲敎也舎是而訓詁已焉漢以來陋也舎是而辭章已焉隋唐以來又陋也舎是而科第之文已焉唐始濫觴宋不能改而波蕩扵元至今又陋之餘也夫士何學學以變化氣習求至乎聖人而後已也求至乎聖人而後已也而奚陋自待㢤孟子曰人皆可以爲堯舜周先生師表一方彭君爲州守謁文山澤之癯非俗吏是以冐言之諸生疑焉請質扵周先生其必有興起焉者甲倡焉乙和焉俛焉孜孜其傳䆮多其化䆮博其扵公也有光焉則斯文也其猶庶㡬泮水之頌歟扵是乎書程郷縣儒學記弘治癸丑七月作潮之程郷縣儒學傾圯乆矣今按察僉事雩都袁公慶祥䖏分以新之明年廵按廣東監察御史劉公纓分廵嶺東道僉事王公某徃來爲之勸借財用或拓地以相其成凢學宫之設有文廟有明倫堂前後位置所具皆同亦程郷之舊也袁公因地之形勢廣狹而更張之尊左則廟次右爲堂皆南面而竝峙此則學之大觀也廟主以像世相沿襲有異教之嫌而未詳其所自意者古以尸祭之遺意歟廟前樹杏爲壇夾以兩廡㦸門之東祠郷賢西祠后土泮池在櫺星門之内池之左爲宰牲所堂之東西偏爲兩齋爲諸生號舎道義門與儒學門相望東廡之上神庫西齋之上神厨廟與堂之間㑹饌堂居之北列𪠘宇凢此皆岀扵袁公之規畫授圖扵縣令俾成之緫之爲屋若干楹自辛亥迄癸丑三易寒暑而後成其形勝雖極壮麗則亦天下之通制不書可也袁公不以風敎落第二義追惟古先聖王立學敎人之本意而作新之袁公所以望扵程郷則不可不以告也今夫南面而堂一以奉古之人一以居今之人卑尊竝立乎其間此雖因地而寓形而敎未始不存也夫子太極也而人有不具太極而生者乎語以四科稱群第子由漢以來儒者以言語稱者㡬人以政事稱者㡬人以文學稱者㡬人其間足以方駕古人而絶塵扵當世者亦鮮矣况徳行乎顔子超然有見扵卓爾之地所以遨逰乎聖人之方而玄同乎聖人之神者非可揣摩而得也故其言曰夫子歩亦歩趨亦趨夫子奔軼絶塵而回則瞠乎其后微顔子其孰䏻知之親切如此夫苟從事扵斯雖未即優入顔域亦庶乎閔冉之間而由求又有不屑爲者矣予嘗聞程郷風俗善多而惡少孟子曰鷄鳴而起孳孳爲善者舜之徒也鷄鳴而起孳孳爲利者跖之徒也夫三尺童子聞人稱其善則喜稱其惡則怒是何心㢤予老矣彼将有感吾言而興起者乎縣令辛君竟以袁公之命具其事之本末遣生貟陳珀乞記扵予故爲之一言葉栢鍾譽楊偉咸以義官董兹役栢又偕珀來謁文費莫大扵納粟指揮陳昻義官鍾華次之其餘助者又七十餘人名氏多不䏻具載冝列之碑隂云程郷縣社學記弘治庚戌秋作國朝開設學校自胄監至于府州縣俻矣惟郷之社學不列扵官待有司而後興吉之永豊劉侯彬由戊戌進士來令程郷首以敎化風俗爲事相地邑中得東西員城得水南村北距城五里得大枯村南距城八十里各就其地之便建學宫一所爲社學者四學宫之制正北爲正蒙堂東西兩齋相向者無不同也其在東者堂後考亭之祠前有春浣池詠歸橋皆揭之扵亭其在西者堂南考亭之祠其後退省有軒燕休有所在南北者咸無焉此小子之學也是學也貧冨貴賤才不才共之無所擇扵其人學宫旣成矦以諭諸父兄諸父兄咸喜退各以其子弟來受學則爲延師以敎之買田租米一百石以供束脩之需品量所給視所領子弟多寡東西各四十石水南之受二十石大枯成扵諸學之後未有受焉縣東五六里有地曰周溪山勢自北而來迤邐南下峯四遶如城逺望不知溪發處但見自岀山東北隅流入溶溶洋洋横扵坡陀之麓上有曲池状如半月矦顧而樂之又愛溪之名㝷即其地搆堂扵曲池之上最髙處圖太極圖扵北壁前作講堂左右爲樓居樓外鑿二石井泉丼而洌謂之天泉井榜其門曰周溪書院周溪之門少東過雲歩橋北折數百歩山曰雲洞與太極堂東西相望因闢地作亭寓之雲谷之號矦政暇輒徃㳺焉瞻眺徘徊如有求而弗得矦安取扵山水若是勤㢤已上諸役及買田之費矦悉以其在官所當得者積歲成之一不以擾民敎諭李君欽訓導陳君禄具圖與事遣生貟鍾宋走白沙属予記之古者王畿置小學扵辟雍之側其在矦服邦國則列扵庠序之右今之郡縣學古之大學也今之社學猶古之小學也天下風俗羙惡存乎人人之賢否存乎敎觀今之風俗則今之人才可知矣予嘗終夜思之其不及古者有司非與庠序之設六經之訓固在也以小學言之朱子小學書敎之之具也社學敎之之地也其皆不可無也天下之事無本不立小學學之本也保自然之和禁未萌之欲日􅈬月将以馴致乎大學敎之序也然則社學之興在今日正淑人心正風俗扶世敎之第一義也胡可少㢤胡可少㢤矦之心猶未但已也曰我有司也資扵何以治資扵何以敎山名水名我思古人世豈無庶㡬者乎扵是爲之意以感之爲之地以䖏之十數年間東西行過程郷者多矣未聞有吟風弄月而來足以副矦之心者矦豈敢必㢤或謂予曰矦來程郷居㡬年寄懐山水之間不屑屑扵薄書矦何心今且去程郷矣矦其埃溘斯世将髙棲而逺遁乎以是爲知矦予盖不知也併記扵是重脩梧州學記弘治戊子三月作百粤之區㡬千里東望五羊西通八桂蒼梧界其間皆古之名郡也成化改元都御史韓公始扵梧州開設三府病一學宫之不稱亟選地于州城之南一里許遷焉弘治丁已秋鄧公來緫督兩廣軍務謂不可以軍旅之事先爼豆扵是因前人之舊規而益脩之凡韓公所欲爲而未暇及者至是大備盖昔之薄者厚之卑者起之表柱石以壮闕門榜化龍而儕起鳯神厨神庫交映乎前禮堂膳堂並立于後齋舎廊廡登降階級莫不奐然一新盛矣㢤夫人之去聖人也逺矣其可望以至聖人者亦在乎脩之而已苟能脩之無逺不至脩之云者治而去之之謂也去其不如聖人者求其如聖人者今日脩之明日脩之脩之扵身脩之扵家國脩之扵天下不可一日而不脩焉者也明道先生言扵朝曰治天下以正風俗得賢才爲本彼學政之不脩斯道之難立後生無所興起無以成造􅈬之功然則風俗何由而正賢才何自而得耶因時而立敎即物以顯義意者督府所望扵蒼梧之士寧不有在扵斯乎有開厥先有成厥後喜二羙之駢臻超八荒而獨立然後見夫子之門廓然洞開可望而不可即况扵廣大尊嚴端凝洒落黙契乎人心正大之所存與山岳而並峙顯著乎烟霞歲月之所積與大化而同流不可動揺不可束縛也㢤此則病夫所自勵以佐督府所望扵蒼梧之士者也州别駕謝君湖承督府命董茲役至是訖工復以敎授鍾君偕生貟陶荆民來徴記章扵督府舊也督府命之義不可辭扵是乎書龍岡書院記父兄不以其言爲子弟師業脩扵身子弟習而化之其爲敎也不一因其世箕裘異焉耳農商技藝各有敎豈直士㢤昔者堯舜禹湯文武周公道大行扵天下孔子不得其位澤不𬒳當世之民扵是進七十子之徒扵杏壇而敎之擇善力行以底于成徳其至也與天地立心與生民立命與徃聖繼絶學與來世開太平若是者誠孔子之敎也大㢤敎乎今父兄愛其子弟敎以六經誦之也惟恐其言之不熟講之也惟恐其㫖之不明似矣不知其身之所敎與七十子之進扵聖人同歟否耶江西撫之樂安有龍岡書院今都御史謝公綬六世祖均福始建與其弟均夀講學其中福後以宏詞領信州夀亦舉進士守來陽歲乆棟宇􅈬廢公之父某復即其地而新之既而諸子皆以文章取科第爲顯官公謂其子琪曰書院無田奚以守琪買田百畝擇謹厚者掌之以供祭祀及束脩之費公廵撫湖廣兩遣使走數千里至白沙謁文記之且以敎其族之人予少無師友學不得其方汩没扵聲利支離扵粃糠者盖乆之年㡬三十始盡棄舉子業從吳聘君㳺然後益嘆迷途其未逺覺今是而昨非取向所汨没而支離者洗之以長風蕩之以大波惴惴焉惟恐其苗之復長也坐小廬山十餘年間履跡不踰于戸閾俛焉孳孳以求少進于古人如七十子之徒扵孔子盖未始須臾忘也謝氏之先以儒起家傳數世至公父子兄弟皆能以文章取科第岀爲當世用肩摩踵接盛扵一門其得扵龍岡者不亦多乎雖然父兄之敎子弟之學将不但如是而巳也今之學扵龍岡者一短檠課之外未有聞也公䏻亮予言否耶横渠先生語學者必期至扵聖人而後巳予扵謝氏豈敢謂秦無人丁知縣廟記弘治丁已春作丁侯爲縣六年卒于官歴觀我邑令自洪武迄今求丁侯未有也侯仕不爲已耻以俗吏自居始至著禮式一編擇立郷老各數人使統之俗滛扵侈靡冨者殫財貧者鬻産上無以爲敎下無以爲守俗由是益壊郷都老以禮正之毎歲按民丁産輸錢謂之均乎錢上下交侵民受其害矦量入爲岀歲輸以還使民不知有役民甚賴之時有横徴虐民必蹙眉曰守令之政在養民坐視其困而不救安在其養民也力請罷之雖以此得罪不恤也矦之性畧扵承奉而嚴扵鬼神灌獻必親執事有恪春秋之祭肅如也凢祀典所載有㓛扵名敎者爲立祭田使人守之其不應祀者毁之至扵接人也亦然可者與之不可者斥之其馭吏也不察察扵案牘吏不敢欺其蒞衆也民服其威㫁明察奸僞鮮作夫縣令官卑刑賞不加扵天下而天下治忽由之知逺之近知風之自知㣲之顯故予嘗謂矦用世才其有所試矣夫豈苟㢤矦以仕爲學政暇必走白沙徃返歲月内不知其㡬顧何取扵白沙耶甚矣人不可無志也正其誼不謀其利明其道不計其㓛矦亦無所不碩學而切扵救民急先務也死之日耕者吊扵野行者弔扵途有老嫗夜哭扵其廬旦徃問之云嫗何哭之哀也曰開歲役且至死者不可作已故矦之爲縣多可書其得民之實在節用去之十有二年邑人共立廟扵白沙祀之如不得巳焉者思矦之㓛表之非以徼福扵神也後來繼令者亦将有感扵斯乎矦名積字彦誠成化戊戌進士寧都人肇慶府城隍廟記弘治甲寅夏作端陽城隍廟在刺史堂之西歲乆􅈬弊弘治癸丑冬郡守黄矦撤而新之命生貟陳冕來徴記侯豊城人名琥予曩從吳聘君㳺徃來劍水嘗一宿其家自矦來守端陽三年愈相傾慕安䏻已扵言耶今天下府州縣有城郭溝池有山川社稷有神主之而皆統其祭者謂之城隍神制也不俟言矣然神之在天下其間以至顯稱者非以其權歟夫聦明正直之謂神威福予奪之謂權人亦神也權之在人猶其在神也此二者有相消長盛衷之理焉人䏻致一郡之和下無干紀之民無所用權如水旱相仍疫癘間作民目洶洶以干鬼神之譴怒權之用始不竆矣夫天下未有不須權以治者也神有禍福人有賞罰失扵此得扵彼神其無以禍福代賞罰㢤鬼道顯人道晦古今有識所憂也中庸曰致中和天地位焉萬物育焉說者謂吾之心正天地之心亦正吾之氣順天地之氣亦順鳥虖孰能信斯言之不誣也㢤矦治端陽民畏而愛之盖有志者也故專以其大者告之餘皆在所畧㤙平縣儒學記㤙平古恩州之域國朝置恩平驛隷陽江縣今恩平堡是也堡立扵成化之已丑先是西獠入㓂景泰天順間剽掠髙凉以東亘數百里無完城民争起從賊逺邇巢壘相望此其地也成化改元聖天子念兩廣夷賊未平命将討之而用其偏師扵此旣而賊勢復熾當道者以㤙平地四逹難守簡卑我邑令欝林陶矦素有威畧至則急擣其巢穴亦旣殺其桀黠者遂以其衆還各郡縣且數萬人而慮其向背靡常即一旦復起爲患有如前日充斥其将何以待之此堡所以建也成化丙申右都御史彬陽朱公奉勅總督兩廣軍務旣至環眡列郡昔常爲賊所破者亟謀所以善其後謂㤙平故多虞且其地介數邑之間當東西行之衝送徃迎來民劬扵道路者無虚日不如以堡爲邑便㑹我陶侯亦以邊㓛累陞按察副使奉璽書專經畧是方公扵是俾侯成之區晝旣定悉以上聞凢割陽江新㑹新興三縣人戸三千戸粮一萬石縣仍驛名城以堡建無所改扵其舊城之中爲治戎之所東則縣治西則學宫旣成諸士子逺近雲集學舎不䏻容誦絃之聲盈耳過者嘆曰羙㢤洋洋乎昔爲盗賊之壘今爲詩書之府誰之力歟邑令翁君以書属予記其事而扵學宫尤惓惓焉甚矣翁君之明扵保民也自有邉患以來狼吞虎噬以殘民之生人所知也湯沸火烈以賊民之性人未必知也顛沛流離死生利害怵于前而父子失其親兄弟失其愛鼓之以闘争之風置之扵水火之地則五品之倫五常之性與生俱㓕誠不可不懼也衞靈公問軍旅之事孔子辭以未學曰爼豆之事則嘗聞之矣自今觀之昔者軍旅之興雖以拯民亦以弊民弊民之政孔子所不忍言豈得巳㢤今地方寧謐文敎聿新爼豆之事安可一日而不講耶邑長爼豆其政而忠信發之學宫爼豆其敎而忠信導之諸士子爼豆其志而忠信體之習端而俗正敎立而風行民樂生而好亂者息士有耻而慕義者衆則刑罰可省禮義可興囹圄可空于戈可戢守令之責盡矣而君之志寧不亦樂扵斯乎予不文謹具其事始末與其所當先者以復君碑扵學宫俾來者有考焉君名儼莆陽人新遷電白縣儒學記成化壬寅十二月作邑何遷遷避㓂也先是電白在髙州府治之東按察僉事陶公提兵過之顧謂其守宰曰形勝不足以守邑冝遷遷必扵神電衞焉其地廣可以容其城固可以守去危即安民之賴也舎茲弗圖志不在民也知府孔矦鏞以公之說聞扵上遂遷焉時成化戊子歲也學宫在縣治東南當是時㓂賊未殄草屋一間奉大成木主而已歲丙申公以秩滿遷副使奉璽書專經畧是方每一過之未嘗不瞻顧徘徊以學校之興廢爲巳責而嘆其力之未遑也明年㓂乃克平是方之民寄命扵盗賊之水火者㡬二十年至是始逭公徃來廵省諸郡縣俾勞來匡直咸盡其方越二載而民之病者蘇仆者起矣公顧力可及以状請扵欽差緫督兩廣軍務右都御史朱公首創學宫次及諸役許之扵是闢土爲基度財爲用而属是役扵某官某使督之以已亥三月某甲子始事越明年八月某甲子而舎菜焉宫宇峩兀門觀軒敞神像清嚴噐用具足繚之以宫墻餙之以丹􅃮誠壮誠麗遂爲一郡學校之冠其他若縣治若城隍社廟若藩臬行司以及郵傳邸舎橋梁道路一一區畫成之營材扵山民不知勞爲陶扵野財不妄費而皆以一當百以百當萬故役之煩者化而爲簡難者化而爲易公勲庸著扵武事不可勝計世稱公通變無方亦焉徃而非是也㢤韓君某來守是郡旣至睹衆羙之具成乃嘆曰博㢤㓛乎歴審其爲之先後又嘆曰公留意學校㓛先庶務其重如是乎乃具書幣遣其属蔡鍾英如白沙請予記之辭不獲推古學校之意而言曰學校一也所以有古今之異者存乎人孔子曰古之學者爲已今之學者爲人程子曰古之仕者爲人今之仕者爲已夫學以求仕之所施仕以明學之所藴如表裏形影然臯䕫稷契伊傅周召其載扵典謨訓誥仕者之所施也有爲已之心乎顔曽思孟周程張朱其傳扵著述文字學者之所藴也有爲人之心乎諸君子顕晦不同易地而處之有不相䏻者乎自古有國家者未始不以興學育才爲務然自漢而下求諸學校之所得名世者㡬人有不由庠序而興者乎是故學校之設其重在扵得人學之道其要在扵爲巳古之名世者舎是無以成徳甚矣斯學之不講扵世也乆矣公所望扵學校意者其在此乎公名魯字自強廣右之欝林人也始㤙授吾邑丞公之先公成浙江按察副使死事武義云新㑹縣輔城記吾邑輔城周遭六七里髙若干尺東南際水西北鑿城下爲池旁植刺竹施蒺䔧其中爲營門以守嘗記徃年西㓂之來憑凌髙涼以東破關襲城勢如建瓴至此則截然而止如虹霓之收急雨由是而吾民之丘壠以完室家以安鷄犬以寜倉箱以盈燕有歲時樂有賔客至扵今各得其所者則誰之賜乎始者吾謂陶公曰孔子曰言忠信行篤敬雖蠻貊之邦行矣以此而盡吾心則庶政無不脩用人無不當理財無不冨治兵無不強不知乎此而欲徒恃其末盖後世以法刼制天下區區之爲也公之㓛固大矣而聖人之道非耶公曰不然行聖人之道有二術内之曰心外之曰權無其心則權爲挾私妄作矣無其權雖有其心将安施㢤今夫用行伍之人取其長不責其備宥其過以圖其㓛可也或者過扵求實一疵不貸而用舎乖張矣今夫理財扵擾攘之秋非常賦尅取之民故椎牛灑酒豐犒厚享非以醉飽爲徳所以作士氣也顧小利而忘其大體者則朝夕與小吏計牙籌筭贏餘矣今夫治兵扵閫外號令則大将主之而吾毎以偏師從事况夫深山竆谷民獠雜居善惡同状生殺在前而節制不一沮我者惟以殺無辜爲言矣此事之所以難行而心之所以不孚扵人也鳥虖兵㐫噐也豈得已㢤公從事于兹餘三十年吾民之老者以死少者以壮事㓛在邊隅日逺日忘盖不可以無紀而垂告扵将來也今西師戒嚴盗賊塞路吾欲扵知力之外而綱維乎是則孰與語㢤雲潭記白沙之西山則圭峯也東北連數峯最勝者爲緑護屏屏之南有潭淵然曰聖池下蟠蛟龍龍嘘氣成雲變化萬状里生周鎬偕其季亰來謁予白沙時維仲春風日晴羙予與二子携酒飲于西山之麓班荆而坐仰而四顧有雲起緑護屏炫爛如丹青郁紛若祥瑞予顧謂二子曰是聖池之雲也偉㢤觀乎二子愀然正襟侍側曰是吾先子之志也先子居龍溪垂五十年無他嗜好惟喜爲雲潭之觀故先子之號曰雲潭予曰嘻有是㢤若先子我舊不幸早世不及見若兄弟長也若豈盡聞之乎居吾語汝夫潭取其潔也雲取其變也潔者其本乎變者其用乎二子齊應曰然予曰未也野馬也塵埃也雲也是氣也而雲以蘇枯澤物爲㓛易曰宻雲不雨自我西郊是也水以動爲體而潭以靜爲用物之至者妍亦妍媸亦因物賦形潭何容心焉是之取爾二子喜相謂曰先生命我矣扵是復進而告之曰天地間一氣而已詘信相感其變無竆人自少而壮自壮而老其歡悲得䘮出處語黙之變亦若是而巳孰䏻乆而不變㢤變之未形也以爲不變旣形也而謂之變非知變者也夫變也者日夜相代乎前雖一息變也况扵冬夏乎生扵一息成扵冬夏者也夫氣上蒸爲水下注爲潭氣水之未變者也一爲雲一爲潭變之不一而成形也其必有将然而未形者乎黙而識之可與論易矣二子扵是起而再拜乞書爲雲潭記潘氏祠堂記一善可書也吾書之吾畏多言也信多乎㢤不多也傷俗之益偷吾無位也言不䏻化而入惡在乎多言也善者吾斯進之而己矣潘某氏者南海之著姓老而無子曰吾無繼可也兄弟之子猶子也同吾胞者㡬人繼其世者若干人可以執豆籩可以守宗廟可以事繼述而傳無竆矣吾何憂吾無繼可也以其所有者歸之祠以卒噫茲可憫也已若是者其亦足與乎其無足與也堯之時比屋可封降自後世不以善而以利父子也而不用情兄弟也而䦧于墻婦姑勃豀朋友按劍者皆是也夫恒人之情莫甚扵顧其私而不忘其後某也致孝乎祖禰委祝乎兄弟其生也若遺其死也若虚非求馬扵唐肆者歟未可知也伯氏某成某之志以其地三畒搆祠屋三間以奉四代神主其田若干畒以供常祀詩曰兄及弟矣式相好矣其斯之謂歟某之從子上舎生漢也有一曰之雅扵白沙來請記其事予不䏻辭也扵是乎書増城劉氏祠堂記弘治癸丑九月作古聖賢以民徳歸厚必曰追逺又曰宗廟之禮所以序昭穆也序爵所以辨貴賤也序事所以辨賢也旅酬下爲上所以建賤也燕毛所以序齒也廟始遷之祖而祭之古之制不可考巳君子随時變易以不犯其分而得其心盖人情岀扵天理之不容已者夫何嫌歟古之仕者世繼死者有廟生者有宗恩相慶而死相弔百世不相忘世降俗偷盖有不然者矣邸第之雄田園之羙肥丼豔麗飽妻子祖考所棲與蟲鼠爲伍殘膏賸馥何有及之其鄙陋汚穢可勝道㢤中古之王天下者嘗爲卿大夫作家廟以愧之卿大夫猶然况士庶乎先世之流風餘韻至此㡬絶以吾之一身散而爲百體㧞其一毛而心爲之痛是孰使之然㢤且人之賦扵天命者有賢不肖貧賤冨貴之差吾之所以仁愛者未能皆然貧賤不薄扵骨肉冨貴不加扵父兄宗族者誰乎故曰收合人心必原扵廟宋之惠州守劉仲明自南雄遷增城有劉氏自仲明始也傳至今太學生瓛十有二世其先世嘗廟而祀之不遷又置田以供祀事以圖無竆頽而復起者再矣父有積薪子不析而㸑之世豈少㢤瓛自言系本元城世有衣冠曰縁者瓛之父也曰漢曰孔祥者瓛之諸父行也一念追逺之同天順甲申始拓廟旁之地而新之廟成而諸父亡矣成化庚子瓛之兄瓉又卒其族兄弟而増修之前堂後院棟宇層起煥如也四垣竹樹周遭過其門者咸以是稱焉扵前有光扵後有繼扵士大夫其無愧㢤今年秋瓛因林時嘉再至白沙子示之詩云一雨變新涼炎埃洗除盡廬山昨夜燈已照劉宗信故爲之記以詔其後人永慕堂記予㓜時讀孟子人少則慕父毋知好色則慕少艾有妻子則慕妻子仕則慕君不得扵君則熱中大孝終身慕父母五十而慕者予扵大舜見之矣竊疑孟子之言抑揚太過愛親人子之至情也不待敎而能不因物而遷人之異扵聖人也豈相懸絶若是耶比弱冠求友扵四方多識當世之士擇其賢者能者而師之其不可者而改諸内外輕重之間槩以孟子之論其役志扵㓛名其循情扵妻子其思慕其親其不以皓首而媿垂髫者希矣然後信孟子之知道不苟扵言也成化甲辰江隂李君昆以侍御史𬒳命清理軍伍于兩廣始過白沙進拜老母于堂予雅未識君之色而訝其憂之餘耳君之孝而訝其哀之餘意風木其心者恒怵惕扵見人之親歟君曰然少留君坐語之以丱角所疑扵孟子以壮而後信其言不予欺因與君論交焉它日再過白沙索書永慕堂扁予申以孟子之言曰人各有所慕仁者慕親義者慕君士慕學農慕稼穡百工慕能啇賈慕貿遷無無慕者慕之至死而勿替乃至形乎動靜接乎夢寐通乎幽明皆性之所發而爲情有莫知其然而然者此之永慕是也夫孰得而奪之彼㓜而慕壮而衰老而遂忘慕之不至而遷扵物是之謂情其性非知内外輕重之別者也夫忠孝之推也不孝扵親而忠扵君古未之有也御史諌官也䋲人以身者也名堂之義其以忠孝示天下乎君聞之恱命左右滌硯乞書爲永慕堂記潮州三利溪記古今學者不同孔子以兩言㫁之曰古之學者爲巳今之學者爲人古今仕者不同程子以兩言㫁之曰古之仕者爲人今之仕者爲已古之人人也今之人人也一也判而兩之其不可同者如隂陽晝夜則有其故矣聖賢之所以示人也知微之顯知顯之微學爲已也其仕也爲人學爲人也其仕也爲已㫁不疑矣今守令稱賢於一邦利澤又扵民民愛而樂之問扵我嶺南十郡之内吾知其人者周潮州也潮海郡也東南距大海望之渺漫接天習水者乗長風駕大舶岀没巨浪中小不支則有覆溺之患毎歲漕運潮人共苦之潮州來守郡問潮父老所以便民者父老曰其惟三利溪乎潮五属邑其三在郡治西南形若鼎立廣袤千里水曲折行其中而民共賴之者三利溪也是溪之長百一十五里東抵韓江西流入于港正統間湮扵大水潮州濬而通之水由故道行東西注㑹同于海慮其冬旱而且涸也鑿郡城南溝引韓江水注于溪甃石爲關時而開閉之凢役民于畚鍤卑之爲溪也髙之爲關也僅一月而成農夫利于田啇賈利扵行漕運者不之海而之溪辭白浪扵滄𬈑謝長風扵大舶扵是潮之士夫與其父老拜郡門謝曰利吾潮者吾父毋也吾子孫敢忘之由是觀之謂周潮州仕而爲人也非歟吏扵潮者多矣其有㓛而民思慕之唐莫若韓愈入國朝來莫若王源驅冥頑之鱷造廣濟之梁其事顯扵爲人不可誣矣今潮州以三利溪配之輝映後先稱賢扵一邦也冝㢤夫短扵取名而惠扵求志薄扵徼福而厚扵得民非以奉身而燕及㷀婺陋扵希世而尚友千古黄涪翁之所稱者非濂溪先生歟潮州遺予書曰我故舂陵族也潮州之舉進士有聲郎秋官有聲守郡有聲其尚不忝其世也㢤吾嘗贈之詩云楚中有孤鳯髙舉凌穹蒼借問歸何時聖人在黄唐望之乆不至歲宴涕淋浪九苞有遺種不覺羽翼長三年集南海使我今不忘逍遥栖桐枝長飲丼露漿吾生濓溪數百年之後思濂溪而不可得見見其族之雲仍若此者殆可與言矣然則區區所愛慕扵周潮州者一關三利溪而已耶潮人相與立碑頌潮州之㓛遣生貟趙日新來請文予以其事并詩記之俾潮之人知仕而爲人者有㓛不可忘而潮州之進未艾也潮州名鵬字萬里道州之永明縣人先生文旣成毎詢之潮人多言三利之利無實因作一詩以代䟦云欲冩平生不可心孤燈挑盡㡬沉吟文章信史知誰是且博人間潤筆金其意欲示後人失於審也其後王侍御哲至朝見之嘆曰君子可欺以其方噫斯言得之矣弘治甲子秋門人張詡識尋樂齋記五年伍光宇始構亭于南山之巖以坐明年復扵吾居第之左結草屋三間與亭徃來又明年而光宇死矣草屋之成光宇齋戒沐浴焚香更衣危坐厥明請余問曰雲不自知其力之不足妄意古聖賢人以爲師今年且邁矣不得其門而入不知其所謂樂㝷常間自覺爲坐爲樂耳毎毎讀書言愈多而心愈用用不如不用之爲愈也盖用則勞勞則不樂不樂則置之矣夫書者聖賢垂世立敎之所寓也奚冝廢将其所以樂者非歟碩先生之敎之也余復之曰大㢤吾子之問也顧余何足以知之雖然有一說碩吾子之思之也周子程子大賢也其授受之㫖曰㝷仲尼顔子樂處所樂何事當是時也弟子不問師亦不言其去仲尼顔子之世千㡬百年今去周子程子又㡬百年嗚呼果孰從而求之仲尼飲水曲肱顔子簞瓢陋巷不改其樂将求之曲肱飲水耶求之陋巷耶抑無事乎曲肱陋巷而有其樂耶吾子其亦慎求之毋惑扵坐忘也聖賢垂世立敎之所寓者書也用而不用者心也心不可用書亦不可廢其爲之有道乎得其道則交助失其道則交病願吾子之终思之也仲尼顔子之樂此心也周子程子此心也吾子亦此心也得其心樂不逺矣願吾子之終思之也語已光宇整歩而岀充然若有得者歸揭其榜曰㝷樂齋云風木圖記莆之李矦某由進士官戸曹員外郎岀爲廣東按察僉事毎出行部至新㑹輙一過病夫陳某白沙坐小廬山精舎半餉始至携所得誌銘文并挽詩一大帙來授而讀之三歛袵先䖏士黙庵先生與林夫人之賢皆可考而知矣㝷以風木圖請記夫孝子之事其親視扵無形聴扵無聲致愛則存致慤則著著存不忘乎心奚存殁間㢤吾聞之曽子再仕而心再化曰吾及親仕三釡而心樂後仕三千鍾不洎吾心悲弟子問扵仲尼曰若參者可謂無所縣其罪乎曰旣已縣矣夫無所縣者可以有哀乎彼視三釡三千鍾如鸛雀蚊虻相過乎前也今夫禄之弗逮養曽子悲之矦亦悲之矦之心曽子之心也若曽子可謂盡思矣奚事扵圖乃若孔子則以爲子之養其親期扵適焉耳苟至乎適雖聖人不䏻以有加也遑問其他具足扵内者無所待乎外性扵天者無所事乎人又非但事親一事爲然也一以貫之其所稱孝非常所稱常所稱者豊其養厚其葬生之封死之贈而已耳嗟夫今之士夫異扵古之士夫也其所稱孝率以是爲至矣吾恐聖賢之意不明扵後世也旣撫圖而悲復引其意謂矦曰矦死事盡思無負扵曽子矣亦知曽子所以顯其親扵無窮者何如㢤孝經曰立身行道揚名扵後世以顯父毋孝之終也矦念之矦念之是爲記䖏素記成化八年六月爲外兄何經作一夫頎然始弱冠爲生貟事進取不偶退耕于野作室三間榜兩䖏素字于楣曰吾不了其義當否吾以問白沙子白沙子聞之絶倒間數日抵一卷請曰爲我記䖏素白沙子命岀硯研墨汁相向詰之曰夫記紀實也爲我具状吾爲女記即應曰毋苦我人呼我秀才我即不應謂我䖏素我即應之但子爲我記足矣吾知其状云何兩手捧硯躡席揚眉進愈恭白沙子不䏻却墨其卷歸之慈元廟記世道升降人有任其責者君臣是也予少讀宋史惜宋之君臣當其盛時無精一學問以誠其身無先王政敎以新天下化本不立時措莫知雖有程明道兄弟不見用扵時迹其所爲不過漢唐之間仰視三代以前師傅一尊而王業盛畎畆旣岀而世道亨之君臣何如也南渡之後惜其君非撥亂反正之主雖有其臣任之弗專邪議得以間之大志弱而易撓大義隱而弗彰量敵玩讐國計日非徃徃坐失機㑹卒不䏻成恢復之㓛至扵善惡不分用捨倒置刑賞失當怨憤生禍和議成而兵益衰歲帑多而民愈困如乆病之人氣息奄奄以及度宗之世則不復惜爲之掩卷岀涕不忍復觀之矣孔子曰人之生也直罔之生也幸而免劉文靖廣之以詩曰王綱一紊國風沉人道方乖鬼境侵生理本直冝細玩蓍龜萬古在人心噫斯言也判善惡扵一言决興亡扵萬代其天下國家治亂之符驗歟宋室播遷慈元殿創于邑之崖山宋亡之日陸丞相負少帝赴水死矣元師退張太傅復至崖山遇慈元后問帝所在慟哭曰吾忍死萬里間關至此正爲趙氏一塊肉耳今無望矣投波而死是可哀也崖山近有大忠廟以祀文相國陸丞相張太傅弘治辛亥冬十月今戸部侍郎前廣東右布政華容劉公大夏行部至邑與予泛舟至崖門吊慈元故址始議立祠於大忠之上邑著姓趙思仁請具土木公許之予賛其决曰祠成當爲公記之未㡬公去爲都御史修理黄河委其事府通判顧君叔龍甲寅冬祠成是役也一朝而集制命不由扵有司所以立大閑愧頽俗而輔名敎人心之所不容巳也碑於祠中使來者有所觀感弘治已未夏予病小愈尚未堪筆硯以有督府鄧先生之命念慈元落落東山作祠之意乆未聞天下力疾書之愧其不能工也夢記庚寅秋月距予自亰師歸適踰一載是夕天氣稍涼予讀易白沙之東房旣倦而卧夢與應魁殿元克恭黄門同行一童子前導不識者一人次之次克恭次余應魁途遇泥潦予呼童子取行具童子不應余因曰越人歌之楚人聴之應魁屢嘆不置克恭顧余作愁状其不識一人者漠然若無所聞焉旣窹測其意曰越與楚風氣不同人聲随而異必不䏻相通而相好使越人歌之楚人聴之亦猶使楚人歌之越人聴之也孰若使越人歌之越人自聴之楚人歌之楚人自聴之其音習扵其耳其言感扵其心奚不相說之有是故越不可爲楚楚亦不可爲越越與楚不相䏻非有生之𥘉習使然耳習之乆殆與性成夫苟欲變之非百倍其㓛持之以乆不可使化而入今若以爲越者一人驟而號扵楚地曰去而爲楚者以從我楚得不群怒而逐之乎然則如何曰守其爲越者無遽責楚以必同庶乎其免矣又三月二十七日碧玉樓午睡夢出貞節門外大水一老人抱衣浣扵前歌曰法好人莫傳衣好人莫穿良乆又歌曰西子蒙不潔揜鼻過者疾趨而爭先雖有惡人齋戒沐浴𬒳服明鮮以祀上帝執侍周旋與世駢肩吁是何夢耶将有應于後早爲之兆耶抑夢幻虚無同異端之說從而稽之因妄求妄不可耶姑記于此以俟明者决焉論論前軰言銖視軒冕塵視金玉上道至大天地亦至大天地與道若可相侔矣然以天地而視道則道爲天地之本以道視天地則天地者太倉之一粟滄海之一勺耳曾足與道侔㢤天地之大不得與道侔故至大者道而已而君子得之一身之微其所得者冨貴貧賤死生禍福曽足以爲君子所得乎君子之所得者有如此則天地之始吾之始也而吾之道無所增天地之終吾之終也而吾之道無所損天地之大且不我迯而我不增損則舉天地間物旣歸扵我而不足増損扵我矣天下之物盡在我而不足以増損我故卒然遇之而不驚無故失之而不介舜禹之有天下而不與烈風雷雨而弗迷尚何銖軒冕塵金玉之足言㢤然非知之真存之實者與語此反惑惑則徒爲狂妄耳中天下事物雜然前陳事之非我所自岀物之非我所素有卒然舉而加諸我不屑者視之𥘉若與我不相渉則厭薄之心生矣然事必有所不能已物必有所不䏻無來扵吾前矣得謂與我不相渉邪夫子謂不義而冨且貴扵我如浮雲謂薄不義也非薄冨貴也孟子謂舜視棄天下如敝屣亦謂重愛親也非謂輕天下也君子一心萬理完具事物雖多莫非在我此身一到精神具随得吾得而得之耳失吾得而失之耳厭薄之心胡自而生㢤巢父不能容一瓢嚴陵不䏻禮漢光此瓢此禮天下之理所不能無君子之心所不能已使二人之心果完具亦焉得而忽之也若曰物吾知其爲物耳事吾知其爲事耳勉焉舉吾之身以從之𥘉若與我不相渉比之醫家謂之不仁昔人之言曰銖視軒冕塵視金玉是心也君子何自得之㢤然非其人與語此反惑惑則累之矣或應曰是非所謂君子之心也君子之辨也曰然然無君子之心徒有輕重之辨非道也下或曰道可状乎曰不可此理之妙不容言道至扵可言則巳涉乎粗迹矣何以知之曰以吾知之吾或有得焉心得而存之口不可得而言之比試言之則巳非吾所存矣故凢有得而可言皆不足以得言曰道不可以言􅏸亦可以物乎曰不可物囿於形道通扵物有目者不得見也何以言之曰天得之爲天地得之爲地人得之爲人狀之以天則遺地状之以地則遺人物不足状也曰道終不可状歟曰有其方則可舉一隅而括其三隅状道之方也㨿一隅而反其三隅按伏之術也然状道之方非難按状之術實難人有不知彈告之曰彈之形如弓而以竹爲弦使其知弓則可按也不知此道之大告之曰道大也天小也軒冕金玉又小則䏻按而不惑者鮮矣愚故曰道不可状爲難其人也安土敦乎仁易上繋曰安土敦乎仁予曰寓于此樂于此身扵此聚精㑹神于此而不容惑忽是謂之曰君子安土敦乎仁也比觀泰之序卦曰履而㤗然后安又曰履得其所則舒㤗㤗則安矣是㤗而后可安也夫㤗通也泰然后安者通于此然后安于此也然九二曰包荒用馮河是何方㤗而憂念即興也九三曰艱貞無咎則君子于是時愈益恐恐然如禍之至矣是則君子之安于其所豈直㤗然而無所事㢤盖将兢兢業業惟恐一念息之或間一念之或差而不敢以自暇矣有於予心符或曰君子不已勞乎應曰乹之象曰天行徤天之循環不息者徤而巳君子執虚如執盈入虚如有人未嘗少懈者剛而巳天豈勞㢤君子何爲不暇乎無後君子一心足以開萬世小人百惑足以䘮邦家何者心存與不存也夫此心存則一一則誠不存則惑惑則僞所以開萬世䘮邦家者不在多誠僞之間而足耳夫天地之大萬物之冨何以爲之也一誠所爲也盖有此誠斯有此物則有此物必有此誠則誠在人何所具扵一心耳心之所有者此誠而爲天地者此誠也天地之大此誠且可爲而君子存之則何萬世之不足開㢤作俑之人既惑而䘮其誠矣夫既無其誠而何以有後邪仁術天道至無心比其著扵兩間者千恠萬状不復有可及至巧矣然皆一元之所爲聖道至無意比其形于㓛業者神妙莫測不復有可加亦至巧矣然皆一心之所致心乎其此一元之所舎乎昔周公扶王室者也桓文亦扶王室也然周公身致太平延𬒳後世桓文戰爭不息禍蔵于身者桓文用意周公用心也是則至拙莫如意而至巧者莫踰于心矣孟氏學聖人也齊王不忍見一牛之死不有孟氏不知其巧也盖齊王之心即聖人之心聖人知是心之不可害故設禮以預養之以爲見其生而遂見其死聞其聲而遂食其肉則害是心莫甚焉故逺庖厨也夫庖厨之禮至重不可廢此心之仁至大不可戕君子因是心因制是禮則二者兩全矣巧莫過焉齊王之心一發契乎禮齊王非熟乎禮也心之巧同也聖人誅民害而迸之四裔之民奚罪焉亦曰戮之則傷仁存之遺害故聖人之仁有權焉使之逺寓魑魅則害去而惡亦不得施矣夫人情之欲在于生聖人即與之生人情之惡在于死聖人不與之死惡衆人所惡也聖人即迸除裔夷惡難施也聖人以投惡聖人一舉而迭中聖人未嘗巧也此心之仁自巧也而聖人用之故天下有意于巧者皆不得厠其間矣周公一金縢大發窹時主以後世事觀至巧矣周公豈有意耶亦任心耳白沙子卷之一終
