front:
  text: 秋開化吴廷介縣愽校文於我省念太夫人
  hash: sha256:4bd9a9b4f801a3b3b7bf808c3e6e156be0b2781e9bcbf1f328051671688488c0
body:
  text: 初度之辰在十月八日撤棘之後幸公程之便趨歸為壽詩以送之高下原從脚板分江山富貴幾般人吾家子弟官情薄欲把行藏壽老親題伍光宇碑隂幾年滄海一碑成身後何須歎不平天遣老兄生少子千秋寒食祭公塋兄伯饒近生一子為伍光宇後喜黄在登科半醒半醉一儒巾黄巻青燈二十春晩醉鹿鳴君莫訝龍頭還屬老成人龍頭還屬老成人夜半雷聲己變春莫為晨昏留不去安車扶上白頭親在有老母在堂故云安車扶上白頭親徐積當年也為貧憶昨扁舟淮上路青山吾拜墓中人題松雪圗元時有個趙松雪松雪于今又屬誰一幅丹青一瓢酒廖公來乞老夫詩半江十詠為謝徳明賦江湖城市氣交吞誰放蘭舟繫柳根肯與漁翁通水界白頭破浪在江門獨速溪邊舞短蓑月明醉影共婆娑手中握得桐江線釣破江天不要多水面烟濃白鳥低數峯青鎻夕陽西隔波莫是仙源否恰到波心路已迷隔波晴色裊孤烟萬樹桃花錦一川夜半天風吹海立探花人在半江船水到江心五百弓白鷗雙起雁孤衝竹篙㸃碎菰蒲月如此風光我共公畵紙敲針一杜詩水生花落兩天機西風捲市塵高起也到江心不觧飛溪槎汎汎月中眠横占波間一半天何許少年三五軰夜深隣舫呌攤錢碧海雲深鶴夢勞人間無地著盧敖不知居士曾來否試向波心問小舠醉則高歌醒復悲老仙那有獨醒時江間波浪三千頃都與囘公入酒巵半江秋水映斜陽幾個神仙坐水旁酒是逡廵花頃刻一尊韓愈對韓湘經陳氏家廟牡蠣墻高一廟深縁岡松栢晝隂隂我家俎豆茅茨下只少黄金不少心題萬松庵壁昔年曾賦萬松軒一飯松根有俗縁旋摘黄花傅白酒真成東老對囘仙過東涌周貢士抱乳兒久住出迓鄉曲論交大父餘耳根狼籍病翁書小兒莫道無靈性也傍寒塘望笋輿經曝日臺周鎬所築鎬亡無子止一女何處猿聲更斷腸夜聞孤女哭凄凉淚痕滴著䑓旁樹縱到春風亦少芳寄袁暉林敬頗憶江湖林子翼小齋留飯更袁暉人心人面人人異賢軰如前共飯時南州香櫃久流傳亦賣東湖草屨錢莫共諸賢理鉛槧只治香櫃過年年暉治香櫃自給近為社學師矣嵗首詩緘寄草梅路傍先倩秉之開而今兩眼西風淚誰解傳聲到夜臺若道鴟夷解了心五湖何用更千金魯連長揖平原去風月無邊碧海深林緝熈縣博張廷實進士何孝子子完先後見訪既而緝熈往平湖廷實歸五羊子完還博羅因賦四絶春水江門一葉舟幾人來此看垂鈎浮雲一散無踪跡飛盡桃花江水流昨夜江門把春酒滿船明月唱陽闗五羊城中消息斷君去東吴幾日還四百峯頭白鶴知老夫八月有幽期爾家正在羅浮下莫向春風怨别離長髯遺我一囊山鐵橋流水非人間我今决䇿山中去踏斷鐵橋無路還夢遊天台路入天台第八重洞門剛與赤城通脚根㸃到虹橋下一笑那知是夢中伍伯饒送蜂窼至用韻答之獨憐溪竹隱花叢待得南山後到蜂昔日往來南谷口如今只用一丸封晩蜂隊隊過山房何處歸來嘴脚香辛苦奉君臣子分可堪奴軰日偷嘗賽蘭花開晴光三日轉花枝坐對微馨忽有詩涓滴未嘗花上露南風莫只報人知曲欄砌下少人窺戯蝶遊蜂忽滿枝君欲尋花須早計只今猶是未開時微風巾袂細氤氲楚畹叢中别有春啜茗亦嫌風景殺明朝載酒是何人山花豔豔綴旒傍君愛深紅愛淺黄楚客見之揮不去向人說是賽蘭香次韻南山送蜜萬古西山朽骨叢中有魂魄化為蜂餓死空窼不飛去猶為君王守故封寒花索寞不成叢口腹吾慙入臘蜂􅟪蜜嬌兒啼夜半未成新釀又開封知從何處宿花叢清曉飛來又幾蜂定有香魂招不返逺尋芳氣落花封處處山花好蜜房絪緼巖壑為誰香相思道逺無由寄此味年來只獨嘗戱贈館賓松風和雨灑柴闗過午雕胡飯始飡今日華卿休怪訝往年飢䑕囓陳山嘗館白沙讀林進士信宜祭母墓文淚血今朝灑鳯山鳯山元只在人間非闗旅殯無尋處不與皇華共載還天涯四尺不封墳一去鳯山三十春莫辭更向山前問恐有漁樵是異人袁侍御道龍川訃至何處龍川去不歸山南山北雨雲飛晩風晴捲三千尺好與歌筵作舞衣憶昔青陽動海濱隔年草木預知春如今行路無顔色盡是青陽去後人次韻柳渡頭答鄉友溪南溪北荔枝垂五月荷花欲捲旗忽有酒船邀半路三杯不記主人誰飯罷雕胡坐石磯白雲閒與鶴同飛神仙若道吾無分那得身輕減帯圍題林進士廷玉繼母陳氏挽巻廷玉㓜好嗜醤薑其母每求於旁舎給之與兒醤薑兒勿號前母生之後母勞大統岡頭寒食酒一杯和淚灑香茅五月菊露飲霜飡不記秋黄花三昧室中求區區形色多相似争得先生為㸃頭小變春紅作淡粧山亭初見一枝黄醉中忽眩東籬眼起視金錢著屐忙二頃南風秫正青督郵未到長官亭眼前雖有黄花在不與陶公觧醉醒題梁景行天壺書屋打土編茅費幾錢白雲深夜一燈懸知君未是壺山主只借壺山過兩年虀粥朝朝長白寺衣冠夜夜百原山三年枕席何曾設一紙家書亦不看元夕村南村北此宵同好景難消一老翁在處恐妨年少樂踏歌歸去月明中正月菊春到東籬花亦知紅桃白李更當時東風自領芳菲去也為秋香作意吹廬阜高歌九日杯盡将秋意放花開誰敎也向東風裏㸃破千紅萬紫堆次韻吴縣愽别後見寄聖賢生處是中華何處天涯何處家夫君認得幽棲處江門月底釣魚槎昨夜江門詠月歸今朝又領衡山詩千仭岡頭一振衣乃見廬岡㸃化機題一峯遺墨後何知巻穆穆熈熈在眼中君家巻裏忽相逢蒼烟緑樹湖西路何處金牛弔一峯何生告還新喻因憶希仁先生平生故人不相見十有六年悵然有作附生它日見之為我道之忽忽人間十六年與公信息兩茫然不知今日江門路還到湖西是幾千淵明愛菊白衣剛到黄花下醒長官為醉長官社裏新知僧酒主門前高枕石蒲團和靖愛梅懊惱梅花未有詩孤山馬上又攅眉後人拈出前人句作者元來自不知茂叔愛蓮不枝不蔓體本具外直中通用乃神我即蓮花花即我如公方是愛蓮人潘岳愛桃潘郎本自愛桃花種向河陽幾萬家世有長官如孟子還除花地付桑麻廢宅逢梅花間無主竹籬空小徑斜穿曲巷通賴是暗香能不息短笻破帽得相逢與客夜飲擊節歌聲未出門照書燈火已眠尊老妻唤醒蒲團夢更與殷勤煮菜根辭徵文者平生語黙鬼神知破戒隨人老可􅎀三日裹糧無此客手攜空巻下階遲崔潛送菊坡先生遺像至適鄉人送紫菊一株遂以答之高風千古鎮浮華儗酌寒泉薦菊花江上一株紅帯雨丹青同日到山家舫子此身天地一虛舟何處江山不自由六十一來南海上買船吹􅅇共兒謀木犀曉枕東窻睡不來木犀造次隔籬開阿田小孫名也拍手黄鸝到寫盡春風得意杯東風披拂滿林塘脚債東山也未償捫虱不禁春意動日華初吐木犀香茗碗朝朝怕侍兒采花莫采稱心枝床敷愛就東窻暖分付東風敵面吹人間花草鬪春肥粉蝶黄鶯接翅飛也愛白頭肝肺好木犀墻下嚥朝暉名花得見太平年擊壤聲高壓管絃化日熈熈春蕩蕩華夷何處不同天白頭無酒不成狂典盡春衫醉一塲只許木犀知此意晩風更為盡情香書易隠求銘旌後感而有作一題八字八低囘滿眼淒凉筆下來春社去年人不見茅簷燕子又飛來山林交分晩相投詩在寒江紫菊舟君去落英還對我獨吟春雨看江流半雨半晴鶯亂啼溪邊丈人還杖藜不見舊時遊走伴白頭衝雨更衝泥移海棠花小朶輕紅帯雨香柔條深翠引風長道人不是看花客肻把墻隈借海棠曉飲忽醉擁禪衣坐睡三杯過卯得瞢騰坐擁禪衣問殺更下砌握刀山竹冗開門負水海棠生弄筆白日一醒塵土夢青山誰計髑髏春時當可出寧須我道不虚行只在人弄水忘歸真灑脱看山扶歩小逡廵等閒未許丹青手撘颯平生畵此中鴝鵒育雛于貞節堂東壁壁高且危二雛墮地下乃就而哺之悲鳴徬徨如在無人之境予憐之取雛納之巢紀以是作将雛無力上榱題聲斷殘陽翅忽低高棟托身君亦悮鷦鷯安稳只卑棲海鷗來往未忘機鴝鵒能言掠砌飛母去巢危雛落盡銜蟲巢畔待雛歸江上遲遲春日滿花枝江上羣兒弄影時漁翁睡足船頭坐笑巻圎荷當酒巵有懐故友張兼素穆穆熈熈只此風今人未見古誰同意中我了牛醫子且放山齋水墨中長安風雨閉門間陌上浮雲沒馬鞍從此江西人勿論夫君高只比廬山萬里長安看我病夜闌兩馬出攜燈如今只有西涯在宿草江邊露滿塋何宇新赴南京來白沙告别云此行且復見定山時秋已盡矣以詩送之孝子已為人所稱世間留者乃何情故鄉莫作多時别阿母墳頭草又生浦口柴扉幾日開江門烟艇暮秋囘交情亦似長江水南北年年送往來閲光宇傳君艇君齋古所呼忘年忘病舜之徒莫言外史無慿據曾見當時拉背奴戱題顧進士瓊林宴圗黄屋門前緩轡行上林花映賜衣明怪來老眼糢糊甚道是尋春杜少陵梅花湖上詩仙骨已塵江門半樹復撩人擕田拉畹朝朝去江上田家秫酒新雲隔溪扉水隔塵梅花留月月留人江門半醉踏歌去紗㡌籠頭白髪新春風處處馬蹄塵岸北花神冷笑人二十四畨紅紫醉一畨零落一畨新馬蹄懶踏六街塵閒憶當年拄頰人江海衣冠零落盡梅花還對白頭新精神交月不交塵看到黄昏故可人拈出孤山難状處一年詩債又從新桃李安能踵後塵玉妃全是耐寒人瘦笻拄破梅村月要看南枝出格新梅塢風高不起塵短笻聊立探花人山塘水淺時窺影喜與年光不鬪新風逓微香洗渴塵獨行山路不逢人梅花嵗嵗還依舊只看何人著句新詩思梅花兩絶塵破窻殘月夜窺人明朝走馬東西去壁上空留醉墨新雪崖江畔杳香塵天與孤高逺俗人不忘滄波别時意一枝還遣到圗新次韻廷實進士送倫長官出逰我夢名山為㸃頭名山到處是真逰床頭買酒黄金盡那向長江更買舟新年田家古田同井今同村同坐杯盤到子孫合是田家愛元日白頭拄杖拜人門麥秀夫於城南小渚中累土結茅居之容一之馬伯幹取酒共醉桃花下各賦詩為樂秀夫謁余同作附其韻春江淡蕩桃花潯絶岸回風落醉金一路潺湲烟鎻斷無人知道此溪深川練縈紆島上花世間遥望出城霞仙源不比函闗路老子來時坐一槎我夢桃花何處潯水清蘋白一籬金美人家住紅雲島欲往從之江水深手拄藤枝鬢挿花夜收沆瀣曉飡霞貴人已隔門前水野老還通月下槎紅白花開緑渚潯風光買我不論金輞川不借閒人看只愛詩家著語深漠漠春烟淡淡花竹邉孤嶼閣飛霞春江水滿秋江水更著新槎换舊槎安期只在海東潯何處名山浪鑄金欲向桃花問消息柴門深鎻碧溪深武陵春盡水流花洗却耶溪十丈霞晝坐竹根看未足滿蓑明月夜縈槎東潯披巻盡西潯海水秋連萬頃金巻裏我能題百首溪蓬斟酒莫辭深閉門春雨可憐花誰共花前傾紫霞但放此杯深似海囘公肚裏得横槎得倫長官詩疑其果於遊而未可以遊次韻復之一百青錢解杖頭罇中有酒勝閒遊門前春浪高於屋莫向長江弄破舟短檠細字寫蠅頭衰老而今尚好遊何處與君談半偈玉臺留作濟人舟贈張進士入京五年不出獨何心萬里行囊又一琴難寫别離今日意江門春水不如深有心誰莫弄兒嬉孔老枝條我亦知風日小塘君不顧竹林藤簟自皇羲能将糟粕委諸書影響人間不受驅五百年中名世出先王政敎果何如津頭日暮送夫君别意那堪更遣聞芳樹鳥啼山雨過柴門空閉一溪雲玉臺居士玉臺眠碧海三山病枕前君欲有為休問我白頭世事已茫然㑹餘湯餅欲春䦨往即公程亦不難不獨有官兼有子老親嬴得一開顔南風吹上石門舟又到西華寺裏遊記得聨舟此相送而今空有雪盈頭昔曾寄住長安寺潦倒滄溟夢不回何處思君還有夢青山斜日兩徘徊次韻東所送薑酒寧知生蚤與生遲真鳯真麟出以時何處氤氲薑酒氣香風吹入野人巵病起朝天果未遲出門剛遇鳯來時兩山居士何如喜一飲從敎累百巵與廷實看李世卿題竹來看竹上舊題名已有清風挹世卿夭矯龍蛇不堪捕安知不是野狐精題熊氏桐軒湖海逢君四十年破琴殘韻尚依然棹歌本是閩南調傳到于今更不傳桐軒云是勿軒孫何處江湖何處村古錦囊中風韻在幾時彈向白沙門飲馬氏園贈童子馬國馨日轉芭蕉雙竇鳴飛飛蜂蝶喜新晴衰翁醉臥溪園裏一曲春牛和國馨六嵗能誦予春牛之句白髪跏趺溪樹根還從地主見諸孫醉中自唱漁家傲擊碎花邊老瓦盆喜晴西林收雨鵓鳩靈巻被開窻對曉晴風日醉花花醉鳥竹門啼過兩三聲得沈大叅時暘漳州發來書答之前後題緘兩度收春風無雁過漳州青燈一榻南都夢囘首于今二十秋悼舊里中興沒一浮雲六十年中幾度聞只恨墳荒無祭掃前村更有未封墳何潜死踰十年并其母皆未塟馬文祥寄五氣朝元罏至隱者年來少在山白雲幾片落人間玉臺小徑蓬蒿底吾對吾罏盡日閒人間葷血共歡娱誰作朝元五氣罏自汲山泉煮春茗不留俗客炰江魚合是神仙太乙罏旁通五竅似蓮珠如何水火收功用去問劉安下手初眼前詩景浩相撩何處丹罏火又消莫笑道人歸未得秋風雲路幾扶揺五月二十六雨民謂二十五六七日有雨主豐時雨時暘歌帝力今年今雨卜年豐路傍酒價知天道何處醉鄉眠此翁六月一日不雨民謂此日有雨主旱窻眼隂晴曉未分一年憂樂稍相尋山林自慣清凉極且放今朝到鑠金圗新書舎中植蕉數本壁間李世卿題句潮州饒鑑至讀之有所興起勉以小詩一寸芳心巻却春竹枝遺響落圗新潮州客子來何暮還對芭蕉索楚人贈梁景行赴春闈宗烈平生讀書處老夫題作小壺山壺山不觧留君住君著壺山夢裏看夢亡友袁徳純侍御再試宜興割雞手置之栢府公巖巖如何不返龍川駕遺恨千年在嶺南自别君來十九秋江門暮雨忽相投當時呼酒留君語却到于今羡海鷗周侍御文化将訪白沙阻風江上連日以詩迓之長風不打畵船囘更為山靈掃玉臺走馬城中具茶果青天白日繡衣來積雨是日得大霽将晴積雨此何時我病山中久不知驄馬今朝在何處江邊人吏望旌旗昔者吾聞周柱史青牛紫氣出函闗有心來鼔南溟柁信息朝來已到山懐胡大㕘希仁魯連謝去都無事范蠡歸來未了心三十餘年窮學道而今方識古人深先生齒髪今如何我髪秋來白又多若與先生論出處江門只好聽漁歌梅下雜詩虚名每被詩家賣素艶常遭俗眼􅎀聞向人間非得計移根天上白龍池向暖南枝已播詩北枝向冷尚遲遲肩輿欲過江門去争得春風剪拂之梅花信是菊花傳賞到梅花又一年處士豈非詩俊傑長官元是酒神仙題瑞鵲巷序云成化九年余被薦入京過江浦訪孔暘荘先生先生送予揚州偕行至六合縣經宿而去當是時周君文化令六合有聲後八年荘先生病猶臥家予乞終養歸侍下亦衰且老周君以監察御史按治吾廣過寒舍道舊於是周君舉荘先生昔者所為賦瑞鵲詩俾予和之瑞鵲多年我眼中笑烹牛鼎夜燈同如今栢府開詩巻還對樽前兩病翁贈化州守鄭順觧官歸湖上鴟夷久買舟清風明月幾宜休未知進退存亡事只問歸來鄭化州贈羅梁還程鄉一峯諸子在通家生死交情俗可嗟泉壤有知開口笑江門來去看梅花飛出一㠶何處風道人眠處玉臺東春光一路相隨去朝雨渡頭花欲紅世道如今覺我非衝寒猶肻到柴扉江門春酒無多少須勸羅生一醉歸翩翩雙屨一長笻意氣慿凌四百峯肯向程鄉留一載長官真好主人翁一客三旬住玉臺梅花正傍玉臺開客心暗與梅花契去到明年臘又來蓬島烟霞圗贈羅定直一峯先生之子也丹青誰弄烟霞筆題贈湖西公子行攜過羅浮莫開看羅浮怕有異人争輓林别駕汝和昔嵗逢君在鬱臺揚眉撫劒泰山摧紛紛白眼輕豪俊只有余公觧愛才别駕一城聊塞北短檠諸子自江南平生抱負何由見塚上銘詩仔細叅赤岡經雨草萋萋山北山南路欲迷怕到使君投轄處黒雲堆隴鷓鴣啼有時江畔倚秋藤裊裊如聞擊楫聲春色眼前人不見江花江水總含情大田看山春泥沒屐大田潮溪北初經獨木橋千丈峯頭望東海三山正對杖頭瓢縣取脚色蕭蕭白髪映春漪脚色年來自不知滿眼江山難具報只将年月載公移炒蜆憶世卿蜆酒三鍾一曲歌江邊長袖舞婆娑如今歌舞人何處慚愧春鐺蜆子多奴拾枯枝給早炊鐺中風味此奴知春風觧憶江門否正是江門蜆賤時雨中漫興種桃之嵗在單閼種竹如今又幾年竹長桃枯人老去釣船春雨日高眠急起翩翩白鶴雙黒雲将雨欲迷江人間未有高棲地何處深山著老龎問厚郭胡父子起居於其鄉人蘇居隣厚郭一雞飛桂樹于今大幾圍老憶舊時燈火伴青山何處望霏微讀宛陵先生歴覽昔賢皆冺冺尋思魯叟自波波几上凝塵封玉軫南風不入琵琶引仲由言志夫子哂當冺冺時須冺冺著漁蓑了唱漁歌受制江山老奈何溪上女兒閒抹鬢東塵西市走波波冺冺波波世與身都官兩語到頭真後生更把遺詩笑公亦人間半醉人波波冺冺不同時静久無憂動輙疑聖人坐北吾遭逸天下蒼生怨望伊次韻羅明仲先生見寄白頭一枕小廬山偶寄孤松十竹間朝市山林俱有事今人忙處古人閒高軒頻過武夷山曽聽仙歌九曲間坡公莫被山僧笑只得今朝半日閒誰輕朱紱愛青山囘首波波冺冺間萬籟無聲天宇静先生還似老夫閒三月啼鶯正滿山傍花隨柳水雲間古來曽㸃稱如許不是天公不放閒武夷碧水照丹山按部時還到彼間東坡也被山僧笑只得