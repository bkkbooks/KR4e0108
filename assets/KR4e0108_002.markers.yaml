  - {type: variant, offset: 12569, length: 743, content: 平湖語連日不如與賔州一尺簡易曰𥘉筮告再三瀆瀆則不告此敎者之事夫豈有所隠㦲承示教近作頗見意思然不欲多作恐其滯也人與天地同體四時以行百物以生若滯在一處安䏻爲造化之主耶古之善學者常令此心在無物處便運用得轉耳學者以自然爲宗不可不著意理㑹俟面盡之民澤足下李世卿書來問守䑓者老朽以民澤告之冷㷔并騰殆出楚雲之山盖以勉世卿使求諸言語之外如世卿可惜平生只以歐蘇軰人自期安䏻逺到賢郎在病可徐徐而來眼中未有䏻奪公楚雲手叚也五月十二日䂖翁書此學以自然爲宗者也承諭近日來頗有湊泊處譬之適千里者起脚不差将來必有至處自然之樂乃真樂也宇宙間復有何事故曰雖之夷狄不可棄也今世學者各標榜門墻不求自得誦說雖多影響而已無可告語者暮㬌侵㝷不意復見同志之人託區區於無竆者已不落莫矣幸甚幸甚楚雲雖日望囬萬一髙堂意有未安亦未可率尓行也珍重草白民澤進士章乆處危地以老母在堂不自由耳近遣人徃衡山問彼田里風俗㝷胡致堂住處古人託居必有所見儻今日之圖可遂老脚一登祝融峯不復下矣是将託以畢吾生非事逰觀也三年之䘮在人之情豈由外㢤令之人大抵無識見便卑闒得甚愛人道好怕人道惡做出世事不得正坐此耳吾軰心事質諸鬼神焉徃而不㤗然也耶病中不欲多言幸以意推而盡之未可草草也五月五日石翁書復民澤侍者民澤足下去冬十月一日發來書甚好日用間随處體認天理著此一鞭何患不到古人佳處也章自去秋感疾迄今尚未平昔者髙堂未傾病轍叩天願少假之年今廬岡之木且拱吾何求㢤其未忘者衡山一念而已皇皇靈芝一年三秀予獨何爲有志不􅈬其可念也夫其亦可嘆也夫廷實近多長進但憂其甚銳耳子長病且愈曰髙音耗亦無黄巾納婦舘中惟一之與服周敎諸孫海北汪提舉向慕亦切作懐沙亭扵海上此外有脩古書院冷香橋之作所費不少恨無以成􅈬之耳民澤在郷安否禍福原扵人情不可不仔細察也謾及之不一一戊午季春三月𥘉二日䂖翁在碧玉樓力疾書與荘, WYG: 莊}
