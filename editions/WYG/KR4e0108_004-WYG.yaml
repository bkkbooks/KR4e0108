body:
  text: 墓誌銘表封署郎中事員外郎魯公墓誌銘公諱真字伯真别號素軒右副都御史魯公父也其先寧國之涇縣人洪武間太父以寧國守禦民調戍南昌歸老于涇其子通寳由南昌轉戍廣之新會因家焉通寳生公父保輗勤儉理生實基乃家及公而新會之魯始大公長者初補隊長卒伍爭較曲直不屑為辯而以理譬解之恒愧服謝去於所事尊貴人有過面折之無少回讓貸者告窘或索劵焚之正統間民虞黄賊之患將至挈所有赴城老㓜扶攜塞路守闗者為不便於民公力爭止之曰城守所以扞民民有急宜早為之所奈何拒之既而賊奄至城下圍旬日不解瀕海騷然官出榜招諭民之從賊者公使人於常所往還之地曉以利害所在使民趨避之不疑由是得免於兵患人至今徳之公生於永樂癸未某月日卒於成化甲辰某月日享年八十有二先是予歸自京師未抵家前一夕夢見公化為嬰孺嘗夢數人為嬰孺者輒死未幾公病遂不起嘻豈非數也耶公娶同邑訓科周旋之女賢克相公先公若干年卒葬歸徳里之鳯山子男六人長曰賢先卒次曰能即都憲公曰英曰俊曰秀曰傑英秀皆義官俊未仕傑陽朔訓導女二人適何宏葉蒼及公之存孫男十五人曾孫幾人壽祉子孫之繁人以為積善所致也都憲公由進士官户部以其官封公署郎中事員外郎贈母宜人初有司命選武衞子弟之良者入學公環眡諸子以都憲公充選蓋識之於穉孺時也都憲巡撫甘肅公訃至解官歸薨於路諸弟奉公柩將以今年丙午冬十二月十九日合𦵏于鳯山之原以狀來請銘吾先子處士與公舊思先子而不得見見其所與猶父也不銘公墓奚以辭銘曰源之華舒舒柯之實纍纍人無固本兮草木弗如澤不竭兮公之餘我銘示後昆兮勿替厥初朱君惟慶墓誌銘君名惟慶字汝善桂陽外沙朱氏贈資政大夫右都御史諱思諫之子故太子太保誠庵先生之弟也君生三歲而孤兄弟二人同受學於掌教凌先生某先補太保儒學生員次將補君家籍戎偏橋衞有司以君充戍母夫人胡氏謀盡棄其所有以贖君君奮曰男子之始生也懸弧以志偏橋戍於吾何有貨以圖之不恤家恤我遂太夫人心室如懸磬使吾兄朝夕憂衣食之不暇而暇為筆硯憂乎於是毅然請行至則見者無貴賤遇以禮不敢以常卒伍例視之其地有横蠻黄一奇奪孀婦李氏為妻君於其夫為族兄弟李氏使人告難於君斷一指以示信蠻知禍將及亟餽金以冀免君叱以狗彘即日以其狀白於官捕蠻投衞獄死焉君隣盜者君知之而未能徙盜憂不見容以所刼帛獻君從容喻之於義火其帛盜亦感悟都指揮告某由是重君為人將謀進之君一不以介意而獨以母老哀鳴一衞憐之遂得解伍以歸間奉太夫人來廣就其兄參議之養遇鹽商餽白金百餘不顧而去其在困也不自卑而失守其處亨也不藉勢以儌利其才如此與太保俱學其不遷業於戎伍以需其成其亦可觀也夫君娶何氏生男子四人恒益巽節女二人長適何紹箕次適胡紹海君生於永樂己亥十月十五日卒於成化丁未二月二十五日壽七十及君之存孫男十人玭珸璠珂琨珦琯玠璝琚恒與諸弟卜今年十二月辛丑葬君里之栗堆節以其狀走南海干銘於予為請者曰太保知先生者先生以太保銘不可乎乃序而銘之外沙之族何以名詩書先後著簮纓汝善可欲介以清匪我不學困于兵搜抉幽隱為君銘有譽於試惟我徵李子髙墓誌銘君姓李氏諱昻字子髙别號鈍齋少孤奉母王氏孝謹處于兄弟之間上順下友宗黨稱之景泰庚午之秋母以兵革之患客死金陵君得報慟絶失於顛沛之初不能捐生以赴飲恨而卒予從何宗濓跡君甚矣君之所為不足以盡君之心也遭時擾攘母子兄弟異處君獨以一身周旋其間恩非不足於膝下而病於仁愛非不足於同氣而窮於智天地鬼神臨之親戚朋友鄉黨孰不知之而終不足以釋君之心至不能瞑目以死甚可哀也君與宗濓同邑里世居番禺之沙灣宗濓久從予游實君之子壻也與君之族子珍撰述君之世次行實為其子孫請銘於予君名臣之後八世祖文溪先生忠簡公諱昴英宗龍圖閣待制尚書吏部侍郎考諱彦章君娶同里趙氏生子男一人曰元宗早卒女一人適宗濓者是也孫男四人振綱振裕振安振芳君之生以永樂甲申其卒以景泰辛未二月二十六日年四十八是年冬十二月二十八日塟里之金釵山趙氏祔焉狀稱君長厚恬靜自適喜讀書手未嘗釋巻尤樂吟詠春秋致嚴於祀事接人無親疎一以誠宗濓當不可誣也銘曰生不足歸於天義不足何有於年烏虖子髙之心匪我銘之而誰與傳處士陳君墓誌銘始者郡諸生馬龍為其友陳東淵乞銘其祖父處士忍庵之墓於我生之言曰處士居增城之仙村無聲色嗜好以亂其耳目無形勢奔走以瀆其交際無是非毁譽以干其喜戚上下原隰相地之便宜宜田亦田宜圃亦圃長鑱大笠往來於蔗畦稻壠之間躬樹藝自旦至暮不少休収田圃之入以裕乃家夫處士行乎無名以能拓土業治生為樂事故不知老之將至敢以是請惟先生念之將無擇於細大而畀之銘既而東淵承其父永榮君之命來謁予白沙館之小廬山精舎自冬徂春戀戀不忍别去余游厓山東淵請執杖屨以從余既與東淵凡所紀述令一一録之東淵朝夕侍我側略無一言及于銘余益重之乃命取馬生之狀來考其世之麤可知者始遷番禺之祖宋天聖間教授南雄儒學因家番禺生五子曰守寧者遷增城山美村數傳至朝奉大夫文徳有女適李忠簡公文溪先生其中子曰汝霖為縣尉縣尉以下至處士九世其遷仙村自文徳始處士諱誠字致明質木少言與物無競非横之干直受之而不報故自號曰忍庵云處士娶伍氏曰永榮者其子也一女適徐禧孫男三人東淵東沂東瀾處士卒𢎞治戊申四月十三日年七十三永榮以其年冬十二月某甲子塟處士于曾岡頭祖榮之左未銘烏虖一善可稱也亦可傳也顧處士於余初無一臂之交與之銘以一馬生之言猶未也豈不曰東淵在白沙館下能謹子弟之職事先生于厥祖有光耶此吾所以為處士銘也其詞曰世無我遺安以隱為世不我須其隱亦宜不求異乎人不求合乎人委歲月於農圃手足胼胝既裕其身又以及其後昆則以彼之危易此之安以遺之其不可也復奚疑處士李君墓誌銘㓜而能求父書於死喪顛沛散亡之餘長而能誦朱文公資治通鑑綱目真西山文章正宗及他書而不以媒仕進志非不立也才非不充也富貴貧賤愛惡之出於已非與人異也父歿於官母挈諸孤匍匐萬里扶護來歸憂極成疴是以不能去離左右旦夕與婦謀所以便母者母痛亦痛母飯亦飯其兄慨慷嗜酒衆目之為酒豪一飲或盡酒一石毎出從所親飲自旦至日晡既醉而歸率諸卑幼迓於途或徑至飲處扶前曵後徐徐而隨肅肅而趨莫敢少拂其意雖以弟之貴至公卿自視漠如足未嘗至公府若是者吾謂之賢不可乎此故處士嘉魚李君行實之著於州閭吾聞其子承箕之言也李氏之先世自江西武寧來居嘉魚至名逺仕元為譯史君之四世祖也大父奐洪武間舉巡檢父善教諭叙珙咸以弟官贈至通議大夫副都御史祖母熊氏母童氏俱贈淑人君名阜字元春伯曰陵是為酒豪非直為酒豪於義亦豪季曰田曰郊田即所謂貴至公卿而以其官贈三代者也兄弟四人相為師友而庭無間言君娶鄧氏承芳承箕其二子也皆舉進士有名長女適王鉅臣次適游恢皆蒲圻儒家子承箕以今年首夏至白沙留數月不去因得問君家世之詳君年五十一卒塟蒲圻之某山今七年矣承箕至是屬予以墓銘予少不樂多學老益孤世豈以文而望予何承箕所嗜與人異謹為序而銘諸有道於此匪難匪易能者謂賢不能者恥母疾子侍弟扶兄醉堯舜之道孝弟而已寳安林彦愈墓誌銘君姓林氏諱彦愈字抑夫居室外種竹十數個自號曰竹齋君上世閩之莆田人有諱喬者宋紹定間為廣州路别駕卒于官其子日新塟於寳安之茶園山因家茶園日新生慕升慕升生可久可久生茂賢茂賢生信本娶黄氏君之考妣也自别駕至君凡七世世為茶園人君性快朗贍於才而周於事有忤之者聲色為突然其消也可立而待少衣食于賈賈所至勘耳目所接事好惡久之若有得者手書小紙帖示𦙍兒光曰樹立宜如是乃范文正畫粥長白山時事也復畀之全集曰是為汝師居常於外見一名文字時所稱者亟手錄與光攜錢入市買書卒惟光所欲得不問值多寡光為舉子業夜分起讀輒為戒曰兒勿苦吾聞亥子之交血行經心設令勩形神得官於輕重計不亦左乎欲速不速不欲速速之非善為速者也光既領鄉薦未即仕來與余游君益為喜光誅茅欖山為修業之所君笠屐日至視工築不少廢暇時為光録朱子語類至四十三巻值板本出乃已光感而歎曰父師覆育光得一日於此如得一月一月如得一年不培不暢不晦不光君聞而頷之時論多弗合者君視之漠如也光既杜門欖山同時士往往有紆青曵紫照曜閭里者親舊以其落莫告君裁君為不省答徐呼光謂曰汝學如是欲有立即汝能立吾啜菽飲水死瞑目矣蓋父子間自為知己人莫能間也君虔於事死遇宗族内外有恩接小夫孺子常情所不屑者君惟恐小咈其意治家不遺細碎庭宇必潔畚帚必親田圃樹藝之事與僮僕均勞逸身所服用非極弊不忍棄至承祭祀接賓客則儼然明盛也嘗以仲秋天日晴朗攜諸子壻暨後生可意者數輩往遊羅浮登黄龍飛雲頂坐磐石引葫蘆酌酒徜徉信宿而後返君所好奇也哉君娶游氏生二男子四女曰明者光弟也孫男一人曰仲孺尚幼君卒之前一日植菊數本石竹一本與客行酒笑語竟夕淩晨將起就盥倐逝去實成化己亥四月二十日也春秋六十五光卜以其年十二月某日葬君于銀瓶嶺以原狀來乞銘乃序而銘之先世英自莆田少服賈困魚鹽僥弗長積乃宣誰其徵在欖山處士容君墓誌銘東良處士既歿之二十八年為今之成化十一年歲值乙未其子珪始以其狀乞銘于白沙陳先生辭之曰銘以昭徳考行予生也晩不及見鄉先進而今談者亦不聞鄉先進某有某事某異也惡乎銘珪以狀進予閲狀喟曰是何足以驚動世俗儌譽於鄉黨閭里耶蓋世所恒稱道者其事必有異乎其衆驟而語之可喜可愕故相與樂道而傳之也處士才不為世用施於其家者亦曰為子不得罪於父為弟不得罪於兄為父兄不虐棄其子弟云爾處士之不見稱於時宜也雖然常道如菽粟布帛時而措之如冬裘夏葛不離人倫日用之間故道率其常者無顯顯之形也惟夫事變生於不測智者盡謀勇者盡力捐軀握節死生以之夫然後見其異也而豈人之所願哉處士韜光里閭正終袵席則其見諸銘者殆亦不過是而已兹其常也處士姓容氏名某字某娶阮氏生四男一女處士之生以永樂庚寅二月十九日卒時年三十九珪率其弟珽璿璣以某年月日塟處士于三岡社馬鞍山木已拱云銘曰伏其龍蛇逍遥雲霞綱紀孝友以裕乃家干我銘者其在兹耶朱夫人胡氏墓誌銘夫人姓胡氏諱盧桂陽處士胡廣之女年十九歸同邑朱氏為誠庵先生夫人誠庵先生者故資政大夫都御史贈榮禄大夫太子太保朱公英也公幼而岐嶷夫人之大父芳見而異之手捫公頂以夫人許之卒定昏焉公自游邑庠舉進士為監察御史厯諸大藩政績顯著至入臺為股肱晝為夜思四十餘年無内顧之憂者夫人實相之夫人之事姑也以姑為心以心為孝和氣蒸于一家聞從公于外常攜族孫奇奇得痢病穢不可近夫人親與湯藥夜禱于天曰諸叔祖無一後獨此孫尚存天若弗祐願吾子代之奇疾愈平居事紡績不少替既貴猶以身率下自旦至夜分不寐以為常謂食祿之家惟一侈易流為之鐵簮布裙以防之男未冠女未笄不識繒帛珠翠之華者夫人教之也過蘇見故黎邦伯長子凍餒無可仰給於人為解衣衣之以粟周之顧謂諸子曰邦伯食二品祿足以佑其後人使其家不驕不侈不逞威而作勢以取快於目前寧有是戒之戒之夫人以勤儉成性而教其家不能者約之其視朝領一官暮取諸民作器皿宫室衣服以愚弄其妻子者何如也昔者吾嘗見公於蒼梧服食不踰常人語予曰吾在於得已雖一錢惜之而不以病民吾入其室神爽頓清便如向夜入三洲巖秉燭讀蘇子瞻題名陶長官不以家累自隨公舎人自桂陽來者老蒼頭一人而已是謂有之不居得而不為吾以觀於夫人事往往槩之公不約而同殆天合也夫人居家事小大處之咸宜至臨大利害决大去就矻然以身當之尤人之所難也正統己巳盜起閩浙間公以名御史治盜留夫人於北京是時英宗北狩未返敵騎將薄都城或謂夫人盍去諸夫人面叱之召諸子前曰敵何能為設有不幸臣為君死義也奈何去之夫人先後累受誥封至夫人揆於徳真無愧也夫子五人守孚守頥守謙守蒙守賁守孚舉進士厯官刑部郎中先夫人一年卒守頥守謙未仕守蒙領鄉薦守賁生員側室徐氏出也夫人一視之二女皆適官人及夫人之存孫男十五人女六人曾孫男五人女二人夫人生永樂某年其卒以成化某年壽七十三是年十月甲子守頤等塟夫人於髙陂祔公墓也以狀來請銘銘曰徳之愛孰與色之愛奈何乎配身之華孰與後之華奈何乎家配之既良家道用昌乃天錫之祥蘭桂承芳以世其光繄夫人之澤兮百世不忘歸骨於髙陂兮永與公同藏何廷矩母周氏墓誌銘成化八年壬辰四月日番禺何廷矩之母卒卜以其年冬十二月某甲子塟邑之永泰鄉石馬山祔其親之兆廷矩先事告伯兄廷桂以狀走白沙來請銘廷矩在諸生中齒長而賢首率諸生事余余懼與廷矩比諸生咸進曰是生廷矩者也非是母不生是子徵賢母也子宜以其賢銘予乃閲狀母姓周氏諱某畨禺人福建都司都事君諱普敬之女澤庵何先生諱淵之妻性孝敏勤恕始辭襁褓得一果必以獻諸母事鍼縷刀尺巧不俟教接人臨事恪而有法勞不厭也博愛而善喻人不待矯而至也年若干歸何為冡婦愛舅姑如愛父母奉賓客如奉祭祀雖居流離未嘗窘戚為滅裂平居處於娣姒得娣姒處於媵侍得媵侍處於族親無貴賤内外尊卑賢否咸宜故視其疾者無不憂哭其死者無不哀也自澤庵歿專家政至是若干年而終春秋七十二子皆已出二女皆已有歸始新喻胡公以按察僉事提調學校嶺南廷矩為郡學生員以文行見器重及秋將試廷矩一旦謝去公弗能止親舊欲其仕進羣來譁廷矩廷矩閉門拒之有讓其母謝曰兒削行為君子耳吾何尤廷矩倍益厲若負重進進不敢為少懈母之訓使然也嗚呼賢哉銘曰昔有尹母和靖實賢今有廷矩豈無母焉卓彼兩母輝光後先我銘其墓以永於傳王徐墓誌銘君姓王氏名徐字行安别號蕖軒莆之耕埧里人也自其先大父舜臣父師佩至君連三世不仕而豐其家君孝友和樂與弟行陽居四十餘載嚢無私蓄撫養孤遺以嫁以娶則視諸從昆弟所生同於已子凶歲貸貧者粟傾廪倒囷而出粟雖多不以息歸在親舊者不責償而凡公私勸借助修壇宇津梁陂河水利君亦往往有焉其所濟大者數百金捐之弗計也有司以聞官給冠帶榮之君平居不尚為山林落莫勝日置酒邀賓客飲於臺池社院酣歌徜徉其所與游者率時之貴人耳君既卒大理評事黄君仲昭狀君之事如此云君兩娶李氏四子某某舉進士未第而卒五女皆適縉紳家君生永樂丁酉卒之時年七十二將以某年月𦵏某山某原惠州别駕林君仲璧以大理之狀為致其孤之懇乞銘於予屢辭而屢復别駕卒與予書曰必得先生銘以報王君於地下别駕則誠愛君矣寧不愛吾言乎向夕吾夢與人謳髣髴記之其辭曰富而居畎畆體便輕暖口足甘肥左右僮僕隨意指揮騎款段坐藍輿出入閭里施施親友相過飲酒忘歸縱觀山雲水月魚沉鳥飛引滿髙歌吹竹彈絲以相諧嬉過此以往舉無所用其心黜陟不聞理亂不知老死巖穴之間蓋福人也賢於世之患得患失者多矣吾猶為子孫願之其王君之謂乎以是銘君之墓至當尚奚言漁讀居士墓誌銘何氏世居番禺之沙灣當宣徳正統間有號漁讀居士者名貞字紹元取適於漁常讀書遇良夜皓魄當空水天上下一色居士手持竿線呼童冠三五髙歌走舴艋遨嬉于江歸則焚香佔畢坐牖下吟哦過夜分不􅄰以為常尤喜飲酒子弟取杜詩之可歌者為越聲歌以侑觴居士頽然真率從之飲者孔伯平胡孟時呉侃王子儒皆鄉之名士非四人之儔者弗與飲焉景泰己巳之秋盜起南海東西亘數百里沒于賊居士見幾而作不俟終日王師至討叛玉石俱焚始為請于官持檄至鍾村鎮招之全活甚衆沙灣人至今徳之居士行必顧義言必顧道將屬纊猶顧諸子申以平日之誨言曰吾世宦之後族大以蕃勿倨以髙寧儉而卑忠信基之禮義行之親賢取善佞者逺之培之植之勿替書詩先其義後其利薄已而厚彼廣積而約費惟家廟之奉墳域之治賓師之養窶弱之施則致隆而不可復惜俾子孫承守世世而勿以淫侈壊之則何氏之福與家法並傳無涯矣語已而卒居士生洪武戊寅卒之時天順己卯六月十六日也六世祖諱起龍仕宋官至太常大卿考諱志明妣趙氏初娶三山崔氏清獻公七世孫也生子男六人浩瀚淳淑瀞沂女二人繼室簡氏楊氏無子崔氏先居士二十年卒𦵏里之羅山六子奉居士柩以卒之年十二月十二日合𦵏其地儷兩繼室焉成化嵗丙申瀞始至白沙從予游又七年壬寅夏五月乃以其狀來乞銘銘曰世之昧昧奔名與利有卓其英以不混世或貴而賤或賤而貴揮觴以為適投竿以為戲故不知老之將至馬甘泉墓銘宋有名馬其名甚大衞公得之空羣莫駕九世曰禎育徳于野一本於身祖徳勿舎今其歸矣附于馬灑我則銘之後有興者陳冕墓銘伯道有子劉蕡登科責報於天所得幾何邁邁子文蹈此髙墳我銘為子顯於千春志孫机壙成化丙午之歲秋九月七日景易之婦苑氏生次孫以周易筮之得渙之比占曰渙奔其机悔亡因以机名之明年春夏之間疫作里中之兒十五亡于疹机朝病夕愈面光射人見者咸驚其異未幾婦攜机如外氏得疾將歸俄而風雨暴至連數日不止比歸療弗及張目視左右淚澘然下如不忍捨其母然少頃遂絶七月十六日也机生質異常兒清揚婉兮太夫人撫之喜曰似其祖又熟察其寢興啼笑蚤夜之有常曰無不似天畀我机將恤我後我固無以活之痛哉是月己丑𦵏白沙蓢園岡冡婦梁氏墓左志其壙以畢予哀云生之異保之未至愧極生哀哀極生媿何以寫之為壙記封燕山左衞經厯張公墓表公諱子真字伯大姓張氏家南海之西􅝱村自西􅝱鼓柁並南下得風水之便其至白沙一日耳余嘗聞公於番禺李禎徳孚曰有行人少力田給數口無贏衣食不為恥晩歲既家裕又以其子官徵仕郎贈燕山左衞經厯公不色喜自奉養儉約如厯田時對鄉人輒自稱姓名以語篋命服不以新易故葛巾布裘曰吾素性乃爾即不爾吾敢忘吾初故公之度大一鄉一鄉人咸嗟以為有徳余聞士不恥賤貧雖富貴而弗驕則不失義不離道入於患得患失碌碌為鄙夫以是考公之迹而揆其所用心謂其無以異於今之人則吾不信也公積於家者厚矣余特表其大節以為世勸公以農業起家故自號曰稼軒示有初也𦵏西淋鄉之某原望之木已拱髙其封若馬鬛題曰燕山左衞經厯者公之墓也考諱可達背公於娠鞠公于外氏以成者公之妣梁也生于洪武己酉卒天順辛巳壽九十三妻何氏子男五長者某徵仕郎也次某某孫男八屬於余以表公之墓者徵仕郎所出丙戌羅倫榜進士泰也近以宰沙陽政最被徴時徴者類有御史之拜云祭文禱雨祭五方土神文代丁知縣作六月不雨田苖將槁愆伏為災孰非天造探殃所由誰實召諸惟令不令斯民何辜神不宥過某敢辭死願沛甘澤以綏赤子禱雨告各神文代丁知縣作邦有常祀祀為邦主食民知報罔間今古神宜惠民民實頼之彌月不雨苖則槁而某忝為令我民是軫敬祈神休蘇我民窘謝雨文代丁知縣作今令所急者簿書期會而已政教不修何以為邑徒食七品之禄以在民上安能使隂陽和風雨時乎故若某者履任以來未及一載惟不能修厥職而亢旱是憂幸頼天地神靈憫民之窮䧏兹甘澤誠欣誠荷謹具牲醴用答神賜惟神尚終惠之使永有年祭大忠祠文代丁知縣作儼其堂堂沛其洋洋是謂正氣至大至剛上有青天下有黄壤不亡者存焄蒿悽愴維兹仲春謹以牲帛醴齊粢盛庶品式陳明薦尚享祭菊坡像文先生宋代之名臣吾鄉之前哲巻舒太空之雲表裏秋潭之月淮蜀委之而有餘凝丞尊之而不屑故能効力於當年而全身於晩節猗歟先生挺生南越廣厚深沉清通朗徹藐予區區心馳夢謁稽首丹青㸃兹頑鐵庶幾百年不逺途轍秋菊之芳寒泉之洌奚而薦之用表貞潔祭先妣林夫人文維𢎞治十年歲次丁巳冬十月己巳朔越廿又一日己丑孝子陳某敢昭告先妣林氏夫人友人刑部主事蘭谿姜麟肅具香一束帛一端俾告夫人之墓焚之以表哀慕之誠謹以茶酒時饌用申虔告祭先師康齋墓文維成化十八年嵗次壬寅十一月日門人新會陳某被徴赴闕道出劒江謹具牲醴告于先師聘君康齋先生之墓曰於乎元氣之在天地猶其在人之身盛則耳目聰明四體常春其在天地則庶物咸亨太和絪緼先生之生孕三光之精鍾河嶽之英其當皇明一代元氣之淳乎始焉知聖人之可學而至也則因純公之言而發軔既而信師道之必尊而立也則守伊川之法以迪人此先生所以奮起之勇擔當之力而自况於豪傑之倫也先生之教不躐等由涵養以及致知先據徳而後依仁下學上達日新又新啓勿助勿忘之訓則有見於鳶魚之飛躍悟無聲無臭之妙則自得乎太極之渾淪弟子在門牆者幾人尚未足以窺其閾域彼丹青人物者或未暇深考其故而徒摘其一二近似之跡描畫之又焉足以盡先生之神某也生長東南摳趨日少三十而後立志五十而未聞道今也欲就而正諸而悲不及先生之存先生有知尚鑑斯文尚享祭太子少保朱公誠庵先生文代陶亷憲作烏虖公不為矯矯亢亢以要譽於衆口而其端方儉約以事乎其上者足以為忠不為烈烈轟轟以震耀於當世而其清靜簡易以臨乎其下者足以為功昔者兩廣盜賊充斥自西而東韓公率師擣穴攘兇兵由義勝民以盜窮公來繼之以守易攻隂慘陽舒相為始終甚矣公之厚於民而薄於躬也一食之費必計曰民其不聊生一役之興必計曰民其不堪命故人之遂其生養者若赤子之慕慈母人之免於塗炭者若枯槁之遇春風某奉韓律未弛我弓公曰撫之敢為異同知我任我實惟兩公天子以公久勞於外還公於朝齒雖落而志則雄食雖少而神則充於是乎竭股肱之力而效臣鄰之職旁引善類以扶天地之元氣大明公道以夀國家之命脉士以此望於公公亦以此自期胡天之不憗遺俾公之功著於四方者雖成乎昭昭之美而公之忠奮于廟堂者未底乎赫赫之隆烏乎哀哉尚饗祭誠庵先生文維成化二十二年歲次丙午冬十二月壬申朔越初八日己卯門人翰林院檢討古岡陳獻章謹具牲醴粢盛庶品遣子陳景雲致祭于誠庵老先生太子少保朱公之靈曰於乎昔我抱病造公戎府公曰時哉毋戀衡宇賢才用世小大有補長笻下山可以撑拄羣龍在朝可以參伍皇皇仲尼與世為矩獵較不行然後去魯好髙欲速為戒自古再拜謝公不我色許短疏叩天歸寧老母公曰嘻哉不忘陟岵甲辰之春公委齋斧帝命還臺以親四輔炳如日星衆目所覩我貢尺書傾竭心腑公在廟堂當為砥柱公去廟堂當為鴻羽公攬臺綱閲兩寒暑或弛或張或黙或語迹公所為誰奪誰予萬石之鍾千鈞之弩我欲言之猶懼莽鹵胡天弗弔禍來二豎於乎公乎是謂巻婁豈惟門生匹夫匹婦遼哉郴陽欺我疾苦犬子執巵往澆墓土索紙題情涕下如雨於戲哀哉尚享祭袁侍御文思昔南京傾蓋而語垂二十年君出我處君由進士宰邑太平再涖宜興亷惠有聲遂簡霜臺來巡弊省未至而孚姦吏縮頸頃以公務過於白沙夜闌秉燭相對咨嗟君病未衰我衰而病進退存亡必得其正與君論易托詩以宣君口不言豈不謂然除虐救民負荷以往止于龍川其勞可想或云非也無疾而委道路流言將信將疑惟君英明夫誰敢犯茍得其正死亦無憾君司風紀寔茂才猷天佑下民而不少留吁嗟君兮民之司命君子之窮小人之幸兼素之訃繼此亦聞海門知己存者幾人烏虖哀哉尚享祭陶方伯文樹立大者不羈小節其行翩翩其光烈烈公攘冦患于嶺西東百里大藩勞貫始終四十年來枕戈捲甲力能誅夷威足鎮壓公在嶺表長城是依公今逝矣人胡不悲某也於公雅匪朝夕東朢仙城有淚霑臆昔者枉棹扶病過予笑語竟夕放歩徐徐將謂百年精力猶在别幾何時忽此顛沛乖厓將去逸人復來一訣萬古豈偶然哉世烈光前錦衣裕後俾公子孫世享其有死生一致公何憾焉有未厭者六十五年惟天命之窮達壽夭惟心安之泰山毫杪老病日益跬歩莫支敬陳薄奠以寫我私尚享祭顧勉庵别駕於乎昔倅我邦公才獨優往貳端陽實恵一州通達萬變可期一面止于郡僚督府之薦公車翩翩愈勵愈騫一病不起孰云非天少有抱負受知當路衆論同異孰識其故晩節不虧浩然賦歸進退可觀吾寧不悲一息不至今其已矣神乎洋洋歆此誠意祭丁知縣彦誠嗚呼登賢名於甲榜與多士而並馳試牛刀於小邑稱庶物以平施恥溷溷以希合寧戚戚而謀私嘗錚錚以陷獄亦蹇蹇而忘危故法不貸於豪右而惠可及乎㷀嫠汛掃淫祠綱維化典載勸載懲條章顯顯雖小人之難化亦向風而革面兩考于兹夙夜有常殷憂成疾二豎為殃方其在病斯民皇皇今其既往行路涕滂此見好惡之公出於人心之天不容已君雖死而有光念昔從游禮崇信篤旅魂何之遺孩在目扶䕶者誰我力不足生死交情盡付一哭想英爽之未亡故焄蒿之可掬烏乎哀哉尚享祭黄君朴文於乎逍遥乎半月之舟留連乎澤垓之酒面圭峯以放懐唱竹枝而拍手春月秋花巻為已有何百年之未半與衆木而同朽大塊無心孰夭孰壽消息自然匪物有咎委變化於浮雲達榮枯於疎栁有肉在爼有羮在豆公死如生薦滿一斗祭李磐石文公鄉之父兄行也子弟輩事公于兹有年矣公坦直而不華約而有恒其中舒舒其於事得喪無大欣戚又不作富家翁様巾屨雖極粗垢不恥也凡公之事如此人之詭譎侈靡者孰不笑之然公以此賢於鄉人逺矣烏乎哀哉尚享為景易撰祭劉氏外母文烏乎外舅之生二十八年奄棄之孤孰維其顛恭惟外姑守一秉貞勤儉始終家用不傾男女五人以母為命奚有室家内外各正古之賢士比徳則同母於苑氏可謂有功自昔于歸迄乎就木徳亦可師功亦可録於乎哀哉尚享祭伍光宇文烏乎光宇麗麗而强其執則固其謀則方惟其篤於善也不忘乎一飯之頃故其向於道也寖近乎數仭之牆予觀之子久矣子初為人烈烈亢亢其味桂薑人不敢嘗世之病子者謂子好伐乖於和而軒於直予獨畏子感激而慷慨其才如此故變而至善也去故習如脱屣而人之望之也若斷鴻天路之翺翔茍不纒於宿疾限於短命而肆其力於學也又焉可量哉使其辭烟霞而依日月展股肱而佐廟廊砥定海岳燮調隂陽下撫黎庶上佐元良吾不知子之究於用何如也至若犯顔敢諫正論堂堂可以引裾批逆鱗之怒可以折檻干刀鋸之芒直而不回死而愈光若是者非子之望而誰望耶古之榮於進者聽其言若可信也觀其色若可壯也至於臨死生利害之變鮮不回顧而彷徨故士之可貴者不于其身之彰于其志之臧不臧而彰匪事之常臧而弗彰庸或何傷古之豐于才而嗇于命者多矣奚獨子哉惟其不待生而存兮故不待死而亡夫既信其如此兮又焉論其行藏嗚呼光宇其何可忘祭容彦禮文維𢎞治三年歲次庚戌冬十有一月己夘朔白沙先生門人容彦禮之柩以明日庚辰發引將就窆于大田先生許為之墓銘而未具乃命其子陳景雲持庶羞粢盛酒果致奠於彦禮柩前而告之烏虖士而好奇揆道則離士而無奇罔聞于時彦禮之生五十五年于兹矣彦禮之處乎宗族行乎閭里同不同者為誰彦禮之希慕乎古而取法於今而誰與歸觀其所與而人之賢否可知彦禮之墓吾將徵於彼以銘之嗚呼哀哉奠丘閣老文於乎先生之志見于行事先生之言存於著述既大顯於當年必有聞於異代某一病當年老於林下足不至先生之門目不睹先生之書比歲得所遺瓊臺吟稿纔一編而已而何足以知先生之大全哉於乎有言依乎教有行槩乎道行由教宣言以道傳沒而有知尚鑑斯言奠何教授文於乎生之謂來死之謂往往來之間奚得奚喪河嶽星辰䑕肝蟲臂小大則殊由其所遇載鳴教鐸載典文衡引年而休於乎先生奠舉人譚士直文於乎士直遽至此耶天不與之年與之才將誰咎耶彼碌碌者老無聞於世又何貴於年耶哀哉尚享奠汪海北文烏虖天馬行空歩驟不凡自然世外衆莫能參氣雄萬夫徳罔二三予何人哉為公指南修古日新懐沙匪堪譬彼世味甘其所甘江門秋月廬阜晴嵐海北二年朝諷夕談如飲醇酒無日不酣從事數至命我則慙我賦白洋句不待探可以立懦可以激貪雖有百鈞何足以擔擴而充之奚適不堪烏虖千古在前萬古在後上下四方誰無宇宙負大翼者其風必厚惡木道旁往來莫覯昔人之交傾蓋如舊蓋不待傾金石亦透天俾爾才不俾爾壽厥初受之今也奚咎尚享奠梁貞文於乎惟正思慕古之人師之非不足於才也歲月永謝於呻吟回翔今之世行之非無其志也科第未殫其胸襟昔之來也碧玉樓中指蒲團而語静今之去矣白雲何處想鶴駕以傷心果司命之在天不可以人力勝耶抑所養之未至不可委之命耶今館中之士求如惟正者守一而殁蓋亦希矣薄俗移人始終􅌞歸不自知其非也於乎哀哉尚享奠表兄何處素文維𢎞治八年歲次乙卯四月甲寅朔越二十一日甲戌孤哀子陳某謹以牲特柔毛粢盛酒果遣子景雲等奠于表兄處素何君之靈曰當披髪袒跣之初聞兄之訃兄不幸屬纊與先妣同日某摧裂肝肺之餘無由往哭烏虖哀哉烏虖痛哉兄年七十不為不壽兄有二子不為無後死生晝夜萬物芻狗復何言哉尚享奠謝伯欽文烏虖伯欽知吾言否六十年中通家之舊親我事我凄凄自幼情若兄弟為足為手吾行東西不離左右矢心靡它乃若之厚庭有佳植雪霜為冦如何弗顧身木已就遺憂孔深奚測奚究積善餘慶反躬可久茍無令人夭損必受誰其憂之不負良友於乎哀哉尚享告羅一峯墓文維成化十八年歲次壬寅十月某甲子白沙陳某應徵起赴京行過永豐謹具酒果庶羞告于亡友一峯羅先生之墓曰嗚呼先生今曷為而往始曷為而來處則畎畆之逸民出則文章之鉅魁其洞徹不欺之心炳中天之杲日而轟動出羣之氣殷百蟄之春雷知先生者儗先生于北海不知先生者謂松柟弗類反見目于榆槐先生見賢必親聞善必録遇惡必摧存而知亡過而能裁隨時變化有闔有開而平生念慮所存其大者正君正朝廷正三綱正萬民正四方皇皇之憂耿耿之忠則致死而勿頽貧賤而不為戚患難而不以回成化己丑之夏予過先生于南畿盍簮之讙忘形爾汝既三宿而後别去屢反顧而徘徊先生贈予南歸之文予處先生草亭之什既而各申其戒曰我不枉已君無鑿坏孰謂先生去官而死曹溪之約不遂麗澤之資何有而今而後復仰望於何誰於戲惜哉宿草之墓朋友弗哭禮之常也非予與先生之宜也先生有知歆此絮醅尚享奠容彦昭文白沙先生聞容生彦昭將歸窀穸遣子景雲持隻雞之奠告于彦昭之靈曰嗚呼彦昭顔子之壽過于彭祖王公之樂不如匹夫彦昭居吾門不可謂不久矣四十一而亡不可謂夭矣已矣乎吾將以悼彦昭者自悼而又以悼衆人乎烏虖哀哉尚享奠容彦潛文白沙先生聞容生彦潜之卒遣其子陳景易具隻雞酒果致奠於容生柩前而告之曰俯江流而嗚咽望雲山而徘徊歎一生而已矣悵獨立以興哀游好幾時音容永謝致奠一觴有淚如瀉尚享奠伍光宇文壬辰歲首月之二日某甲子白沙陳某過亡友伍光宇㝷樂齋撫物興懐澘然瀉涕遂命子景雲持炙雞絮酒奠于南山之廬而哭焉烏虖光宇遽至此耶去年今日版築㝷樂其聲登登隱然在耳手植庭蕉上牆緑逐日新光宇何之斯文一縷千鈞我輩三綱五典左顧右盼兩壁間聨句想見當時負荷一段精神耿耿不滅天道予善斯人也而不永年嗚呼哀哉尚享告伍光宇文成化壬辰夏六月戊寅白沙陳某奉柬于亡友伍光宇之靈曰一死一生乃見交情某平生於光宇至誠相與無異骨肉不幸光宇早世某在何敢以死生相背凡百舉措一如光宇存時近日家塾刋拙書真草百餘字與諸生臨寫尚有板四隅匡郭未整欲借安仔刀斧一日又所卜屋後山近請得李立武來看云此地三台落穴有氣是可藏矣敢告新刋孔易來鶴亭詩并拙作數首奉去㝠覽賦湖山雅趣賦丙戌之秋余策杖自南海循庾闗而北涉彭蠡過匡廬之下復取道蕭山泝桐江艤舟望天台峯入杭觀于西湖所過之地盼髙山之漠漠涉驚波之漫漫放浪形骸之外俯仰宇宙之間當其境與心融時與意會悠然而適泰然而安物我於是乎兩忘死生焉得而相干亦一時之壯遊也迨夫足渉橋門臂交羣彦撤百氏之藩籬啓六經之闗鍵于焉優游于焉収斂靈臺洞虛一塵不染浮華盡剥真實乃見鼓瑟鳴琴一回一㸃氣藴春風之和心游太古之面其自得之樂亦無涯也出而觀乎通達浮埃之濛濛游氣之㝠㝠俗物之茫茫人心之膠膠曽不足以獻其一哂而况於權爐大熾勢波滔天賓客慶集車馬駢填得志者揚揚驕人於白日失志者戚戚伺夜而乞憐若此者吾哀其為人也嗟夫富貴非樂湖山為樂湖山雖樂孰若自得者之無愧怍哉客有張瑮者聞余言拂衣而起擊節而歌曰屈伸榮辱自去來外物於我何有哉爭如一笑解其縛脱屣人間有真樂余欲止而告之竟去不復還噫斯人也天隨子之徒與振衣千仭岡濯足萬里流微斯人誰將與儔止遷蕭節婦墓賦昔兵戈之攘兇盜兮孰倀倀而握之符號令紛其不一兮汨珠玉于泥塗抺之亂之執兵之狗而慾兮胡寧知恥而畏誅若美人兮宗廟之瑚毋我即帶兮毋我捫袪毋我執手兮手可斷而不可汚奮犬豕之罵以冒刃兮貎凛凛其若蘇死則快兮生安用諸嗟此烈婦兮彼丈夫弗如丁侯為縣兮徳教用敷表貞塜兮營祭畬行路嗟歎兮掲聲教於海隅蠢兹弗畏兮託日者以為誣欲改封以自便兮動有識之長吁匪今侯之繼軌兮隳四尺其奚辜我將告外史兮筆之于書贊忍字贊七情之發惟怒為遽衆逆之加惟忍為是絶情實難處逆非易當怒火炎以忍水制忍之又忍愈忍愈勵過一百忍為張公藝不亂大謀其乃有濟如其不忍傾敗立至銘世頼堂銘恭惟我祖渭川府君所立殊衆七十八年漢隂抱瓮自是以來我家用開堂以世名徳音孔恢家廟鐘銘其質重其聲遲其動靜有時永以為神之依丁氏祠堂鐘銘代彦誠作出佛山冶入濟陽堂厥聲鏜鏜震于無疆改鑄邑譙樓鐘銘并序費而不傷壊則有成同百里之聲存萬世之經我民不信視此鐘銘鐘始造模而丁侯卒惜侯之志不及成此銘亡後有繼之者何以考故録之啓聘啓成化癸巳二月代兄作伏以持鈍舌者必淡顔良易投於正士工巧言者宜令色毎見悦於常流蓋夙分之雅同豈强能而茍比兹者幸遇尊親家鄭處士閥閲偉而着眼髙不鄙小弱弟某秀才章句疎而用心苦是故聲氣之相感庶幾物我之相忘雖首院以難諧必東床而獲選鄭髙楊郭幸扳貴邑之甲科馬聶鍾容徒竊弊鄉之商品適侔四姓敢贊一言此不往而彼不來隂則升而陽則䧏慙魚緘之莫罄念雁幣之宜將浩矣滄溟寧郤一蹄涔之水巍哉太華何辭五弓許之陵乞箋起居用􅇺注仰謹奉啓不宣又成化辛卯十二月作文啓伏以得陋巷顔一瓢趣味儘殊于俗尚著清門羅三字品題蓋屬于鄉評惟此翁之可人宜吾弟之有室始者曠十年而莫遇訪㝷顧屑屑于執巾兹焉比兩姓以克諧期待乃惓惓于舉案正將求閨門之助必無忝伉儷之名至誠斯合于天人素志何疑于夢卜片言賜允束帛宜先懐素履而仰髙山躋攀絶矣接清絃以奏流水風韻悠哉奉啓不宣請期啓成化辛卯十二月代兄作文啓伏以鸞膠續好庶幾無擇於髙明雁幣將誠蓋已不嫌於菲薄遂入芝蘭之室况逢桃李之晨須傳采牘以求通當載墨車而攝盛斯文未喪故事宜遵絶言資送之有無盡屬去來之感應遲佳期之甚邇庶獲瞻依承至况之匪加奚勝悚懼謹奉啓不宣與李宗成化壬辰正月代兄作文啓猥蒙不鄙弱弟某遂兹室家之願實吾子之惠幸甚幸甚某以序次當為主人不得詣吾子躬專請也倘吾子不憚劬於路而以歸羅氏子於白沙某也則願吾子之終賜愛焉説菊逸説草木之品在花桃花於春菊花於秋蓮花於夏梅花於冬四時之花臭色髙下不齊其配於人也亦然潘岳似桃陶元亮似菊周元公似蓮林和靖似梅惟其似之是以尚之惟其尚之是以名之今之托於花者吾得一人焉吉水處士張某號菊逸蓋賢而隱者屈子曰飡秋菊之落英陶子曰秋菊有佳色浥露掇其英皆以菊為悦者也皆古之賢人也菊之美不待賛菊花之美而隱者也某之托於菊也亦不待賛素馨説草木之精氣下發於上為英華率之謂花然水陸所産妍媸髙下美惡不等蓋萬不齊焉而人於其中擇而愛之凡欲其有益於事非愛之而溺焉者也産於此邦曰素馨者香清而體白郁郁盈盈可掬可佩貫四時而不凋供一賞而有餘亦花之佳者也好事者致於余余既愛之遂益究其用取花之蓓蕾者與茗之佳者雜而貯之又於月露之下掇其最芬馥者置陶瓶中經宿而俟茗飲之入焉然則是花之用於人雖不若麻縷之與菽粟然盖亦不為無用也人之資于麻縷為其可以温也資於菽粟為其可以飽也得之則生弗得則死今是花也吾取焉姑以其能郁郁盈盈少禆於茗耳雖不汲汲可也不汲汲由用之可己也使是花之於人如麻縷之與菽粟然又安可已哉可已而已不可已而不已引而伸之觸類而長之於道其庻幾乎治國其庶幾乎大頭蝦説客問鄉譏不能儉以取貧者曰大頭蝦父兄憂子弟之奢靡而戒之亦曰大頭蝦何謂也予告之曰蝦有挺鬚瞪目首大於身集數百尾烹之而未能供一啜之羮者名曰大頭蝦甘美不足豐乎外餒乎中如人之不務實者然鄉人借是以明譏戒義取此歟言雖鄙俗明理甚當然余觀今之取貧者亦非一端或原於博塞或起於鬬訟或荒於沉湎或奪於異好與大頭蝦皆足以致貧然考其用心與其行事之善惡而科其罪之輕重大頭蝦宜從末減譏取貧者反捨彼摘此何耶恒人之情刑之則懼不近刑則忽博塞鬬訟禁在法典沉湎異好則人之性有嗜不嗜者不可一槩論也大頭蝦之患在於輕財而忘分才子弟類有之蓋其才髙意廣恥居人下而雅不勝俗專事已勝則自畋獵馳騁賓客支酬輿馬服食之用侈為美觀以取快於目前而不知窮之在是也如是致貧亦十四五孔子所謂難乎有恒者是也以為不近刑而忽之故譏其不能自反以進於禮義教誨之道也孳孳於貧富之消長錙銖較之而病其不能者曰大頭蝦此田野細民過於為吝而以䋲人之驕非大人之治人也夫人之生隂陽具焉陽有餘而隂不足有餘生驕不足生吝受氣之始偏則為害有生之後習氣乘之驕益驕吝益吝驕固可罪吝亦可鄙驕與吝一也不驕不吝庶矣乎禽獸説人具七尺之軀除了此心此理便無可貴渾是一包膿血裹一大塊骨頭飢能食渇能飲能著衣服能行淫慾貧賤而思富貴富貴而貪權勢忿而爭憂而悲窮則濫樂則淫凡百所為一信氣血老死而後已則命之曰禽獸可也批答張廷實詩箋首章似胡文定解春秋以義理穿鑿二章發揮得道理極致非所敢當然此心亦自不能已願與公共勉之三章仙術多門姑置勿論然興致髙逺者非此無以托古有留意於參同契而為詩則斥以盜竊四章箋得之余清老唱道歌云世間膏火煎熬可厭亦在其中五章要看第二句與第四句相應親切六章醉以溷俗醒以行獨醒易於醉醉非深於易者不能也漢郭林宗晉陶淵明唐郭令公宋邵堯夫善醉矣夫七章其失與首章同黄涪翁大雅堂記似為此箋發者正詩家大體所闗處不可不理會大抵詩貴平易洞達自然含蓄不露不以用意裝綴藏形伏影如世間一種商度隱語使人不可模索為工欲學古人詩先理㑹古人性情是如何有此性情方有此聲口只看程明道邵康節詩真天生温厚和樂一種好性情也至如謝枋得雖氣節凌勵好説詩而不識大雅觀其註唐絶句諸詩事事比喻是多少牽强多少穿鑿也詩固有比體然專務為之則心己陷於一偏將來未免此弊不可不知八章不知馬其失在人不在馬少知進退去就而己者亦未以馬稱也平湖之進吾惜之九章珠珮用鄭交甫事十章箋得之詩從後定本統論好非但拙作所能當持以論詩可矣槩觀所論多只從意上求語句聲調體格尚欠工夫在若論詩家一齊要到莊定山所以不可及者用句用字用律極費工夫初須訪古久而後成家也今且選取唐宋名家詩數十來首諷誦上下効其體格音律句句字字一毫不自滿莫容易放過若於此悟入方有蹊徑可㝷傳狀羅倫傳𢎞治癸丑三月作吾平生有故人曰羅倫字彛正江西永豐人宋羅開禮之後也性慷慨樂善不疑人欺遇事無所回避有不可輒面斥之舉成化丙戌進士策對大廷頃刻萬言中引程正公語人主一日之間接賢士大夫之時多親宦官宫妾之時少執政欲截其下句倫不從直聲震於時奏名第一為翰林修撰㑹内閣大學士李賢遭喪朝廷留之臺諫皆不敢論説倫詣其私第告以不可李公始以其言為然既數日復上疏厯陳古今起復之非是且曰如其不然必準富弼故事終喪劉珙故事言事反復數千言一本於天理人心之不可已者孔子曰勿欺也而犯之倫以犯顔切諫為大救時行道為急其負荷之重未嘗一日忘天下故發憤如是疏奏遂落職提舉泉州市舶司倫雖見逐而士論益榮之由是天下之士爭自刮磨向之不言以養忠厚者為之一變而終倫之世臺省未聞有起復者矣雖以此為人所知然亦以此取嫉於人明年召還復修撰改南京㝷以疾辭歸開門授徒日以註經為業垂十年卒於退居之金牛山世之知倫者不過以其滂沛之文奇偉之節果敢之氣而已至其心之所欲為而力之所未逮未必盡知也嘗欲倣古置義田以贍族人或助之堂食之錢謝而弗受或衣之衣行遇乞人死於途輒解以覆之客晨至留具飯其妻語其子曰瓶粟罄矣之旁舎干之比舉火日已近午亦曠然不以為意提舉泉州時官例應得折薪錢其人欺以乏告即放遣之不復問予嘗遣人訪之山中結茅以居取給於隴畆往來共樵牧若無意於世者時或作為文章以發其感慨之意而人亦莫知之也論曰倫之必為君子而不為小人較然矣如倫之才少貶以狥人雖欲窮晦其身寧可得也以其所學進説於上世目之為狂何足怪也孟子稱豪傑之士雖無文王猶興若倫者今所謂豪傑非歟無導於前而所立卓然人莫能奪之又曰倫才大不及志其青天白日足稱云丁知縣行狀成化丙戌七月代容珪作侯姓丁氏名積字彦誠别號三江漁樵人世家寧都之西闗丁氏系出丹陽司馬司馬之後世有顯人曾祖某祖某父某皆隱徳弗仕曾祖妣某祖妣某妣某侯生有美質自少岐㠜入邑庠補弟子員挺立不為時輩所喜登成化戊戌進士明年出知新㑹縣新會廣藩巨邑素號難治侯聞邑中有白沙陳先生喜曰吾得所師矣侯之同年梁編修儲李主事祥皆先生門人侯請書以為先容比下車未視篆即上謁先生欲事以師禮月分其所得俸先生每避還之凡有所聞行之惟恐後四方學者往來白沙之門侯聞林縣博光張進士詡至必欣然往㑹旦夕聴其議論若渇得飲焉與一峯羅先生雖素昧平生然毎思慕其賢訃聞專使走湖西致奠捐俸金以助𦵏事其尊賢樂善無間於存亡如此有中貴弟梁長責民償逋過倍復妄訴之侯侯亷知其情繫長獄悉追貸劵焚之由是權豪縮頸是是非非茍罹于法雖素親愛不少貸未踰年民大趨令侯於干謁之來厲詞色以拒之甚者掲其姓名以示衆嚴賭博竊盜之禁既寘于法復大榜其門曰某賭博某竊盜之家月朔令赴縣庭聽戒諭俟其悔然後去其榜其良家子弟陷于賭博者侯悉聚之廡下使日誦小學書親為講解冀變化其氣習嘗為民辯寃忤當道繫獄且危百姓惶懼欲用計為侯解侯示以手書曰君子但求無愧於心而已禍福之來有命爾等慎勿妄動以貽我羞有積年起滅詞訟者官司病之莫敢誰何侯盡擒之斃于獄侯尤善節財用前此上下往來非誼之餽一歲所費無算民苦之侯痛革其弊蓋異時當甲首者均平錢悉貯于官復令出私錢供用名曰當月錢官吏里胥乘時侵尅毎歲雖單丁小户所費亦至五六千餘貧者鬻子女故逃亡者衆侯為處當每丁𣲖均錢月支里胥供用備足外不妄科一錢毎歲甲首納均平錢畢即歸田畆更不令在縣當月白沙先生樂歲詩云長官願似丁明府甲首終年不到衙蓋實錄也民窮於侈且僣侯為申明洪武禮制參之文公冠婚喪祭之儀節為禮式一書使民有所據守毎鄉擇老成者數人主之月朔進問於庭優禮其能者都老馬廣為衆所推讓侯於原日進廣於庭率諸鄉老再拜謝之春秋祭祀品物牲牢極其精潔役者悉令沐浴更衣然後將事爼豆既陳侯周視行列必極其整方止壬寅歲大旱春盡種未入土侯憂之曰此令之責也遂於圭峯絶頂築壇禱雨時當酷暑山氣鬱蒸侯晨夕齋沐伏壇下致禱凡七日未雨羸甚左右進曰軀命所闗可以少止侯呵曰民得雨吾病何憾至八日暑氣愈熾侯觸暑跪壇下衣汗浹踵大風忽作巻爐中火著侯衣略不為動雨遂迸空下左右張蓋侯命撤之衣盡濕翌日雨止侯復禱至十有一日雨足乃已如是者凡三次焉節義所闗或廟或墓各置祭田擇人守之如大忠祠置田二百餘畆節婦何氏莊氏蕭氏等墓置田共一頃六十餘畝民所敬事者惟修復里社一壇而已其不載祀典之祠無大小咸毁之此其政蹟顯著之大者一念終始在民既得疾羸甚猶日究心於民事朋友遺之書不能止遂卒于官侯生正統丙寅十二月初十日至是卒年四十一也配羅氏生子男二人長曰一芳次曰某生於公卒之五月女二俱幼侯卒之日民相弔哭於途歸徳里有一嫗夜哭于家隣人怪而問之曰來年甲首到丁大人死吾殆不能聊生矣是以哭至今邑人之思侯者甚於在任之日雖古桐鄉之遺愛不是過也珪邑人也侯之善政善教皆所親覩故為狀其行以俟他日觀風者采焉謹狀伍光宇行狀君諱雲字光宇系出汴梁伍氏先世仕宋為嶺南第十三將曰氓之子始來新㑹至君為若干世世為士夫家君自少軒整有志於世無所屈讓與人語惟其所欲語輒語必竭乃已或忤之爭必務勝人有善好之若出諸己巳所欲為必以强人為之垂四十始交於余余之所可君亦可之余之所否君亦否之惟余言之適從南山之南有大江君以意為釣艇置琴一張諸供具其中題曰光風艇遇良夜皓魄當空水天一色君乘艇獨釣或設茗招余共啜君悠然在艇尾賦詩傲睨八極余亦扣舷而歌仰天而嘯飄飄乎任情去來不知天壤之大也所居之北為巖亭髙不盈一丈其中閴寂視之窈如也而君以夙疾未除齒髪日耗其為學也蓋不能無日暮途逺之憂便杜門息交不擇逺近為趨舎凡平居一切與往還者皆抗顔謝焉入處于亭焚香正襟趺坐竟日聞者異之别於白沙築草屋三間號曰㝷樂齋與巖亭往來居之蓋自成化庚寅之冬至明年首夏凡四閲月無日不在㝷樂始與家人約云吾不可去白沙吾其齋戒有事于家廟吾疾作須扶持吾乃歸一日二日小健吾當返慎無以家事累我既而果如其言學主力行與之語雖不便了而能鞭策益力肯擔負確乎不移前此惟務意氣勝人不自覺束幾出籓籬事亦無所不為至是痛自懲艾痛自改革嘗激昻厲聲語云雲不自樹立為人不如死曉夕約己以進有所弗及無所憚劬焉間與余論為文必曰黄涪翁題摹燕郭尚父圖盡之論書曰􅇠起鶻落法語也知畫者必知書其惟蘇長公乎至於詩則謂唐以下多近體古詩沖淡之流吾其陶處士師乎凡此項皆君篤好而願為之及其卒也十九無成則亦慨乎歲月之已晩而其力之所及有未暇焉耳君篤於事死之禮謂斯禮之興廢在人後世無以為籩豆之費則不省者有以藉口乃告於季父絢洎伯兄裕割田若干畆以供祀事權以所居第為祠有事於此必誠必敬月旦十五日君率以夜半起衣冠端拱立祠下以俟尊㓜男女咸來無或敢不䖍歲辛卯秋始大營材為祠當病未亟時尚日經度兹役將諏日始事語人曰吾息奄奄吾旦夕死不可知惟是祖考之神所棲未有定處吾深懼焉雖存一日不敢怠語斯須未畢痰湧出喉中滚滚不絶如縷日夜且數升親舊憫其如此咸勸之令止勿聽卒之前數夕焚香秉燭招余與訣父兄子弟具在直云雲薄命雲負先生數日遂卒卒之時年四十又七實辛卯十月十八日也君娶某氏無子裕以其次子秉中為君後云題跋跋清獻崔公題劍閣詞𢎞治甲寅十月作萬里雲間戍立馬劒門闗亂山極目無際直北是長安人苦百年塗炭鬼哭三邊烽鏑天道久應還手寫留屯奏炯炯寸心丹對青燈搔白髪漏聲殘老來勳業未就妨却一身閒梅嶺緑隂青子蒲澗清泉白石怪我舊盟寒烽火平安夜歸夢到家山右調水調歌頭吾鄉先輩菊坡先生宋丞相清獻崔公鎮蜀時題劒閣即此詞也曩夢拜公坐我於床與語平生仕止久速偶及之仰視公顔色可親一歩趨間不知其已翺翔於蓬萊道山之上欲從之上下而無由因請公手書公欣然命具紙筆烏虖古今幽明一理人之所見則有同異感而通之其夢也耶其非夢也耶今書遺其後七世孫同壽云書思徳亭碑後成化八年壬辰夏廣右陶公由吾邑長進秩憲僉六年考滿如京師將行也諸父兄相與攜思徳碑文一首詣余請文以贈曰將以是考也諸父兄坐既定余撫碑歎曰嗟夫昔壬午之冬冦忽大至城下民被剽掠死者甚衆公方備冦于外報至哭徑歸及郊哭入城呼士卒慟哭撫之告以滅賊皆感激增氣捐軀赴難震動一邑此吾與諸父兄所共見也賊益充斥公由是建子城與民固守又量地逺邇連為營以塞四境要害設守備之法内外戒嚴賊不敢犯民到今頼之凡使吾兄弟妻子得免流離老稚謳歌田里與鄰壤異者公也公有識慮善揆度其所施為事務實而不為虛文故能取必于此經厯久逺民受其賜而公之功有成此吾與諸父兄所共知也公家廣右之鬱林去賊近吾邑在吾省之西南近省多饒資民賊利得之每歲入冦公遏之賊不得逞退過公先塋衆賊將伐木取坯土以懼公頼忠烈之靈震怒在天賊尋畏不敢近嗚呼此公捨一家之危以易一邑之安吾與諸父兄所共聞也夫是三者之難能公實能之以惠吾民吾民所以頌公之徳在此一片石則或聞之而不言或言之而非專豈諸父兄與作碑者之意耶公為縣久其有勞於吾民不可具書蓋公之治民如其治兵因應隨機初無定體其治兵也如文士作文奇生筆端無事蹈襲故能使人畏之而率以取勝此皆公精神心術之奥之運人不可得窺故尤不可得書可見者跡之顯者耳書其跡而民莫不信余是以冒言之以補碑之弗及若夫述職贈言以勉當道此僚友之分君子之任非吾與諸父兄之宜書韓莊二節婦事烏虖二氏之生其相去且千載韓故相國休之孫女莊雷郡庶人妻貴賤雖殊其死於義一也心事如青天白日皎乎其不可尚辭氣如大冬嚴雪凛乎其不可犯是豈資學問之功哉是豈嘗聞君子之道於人哉亦發於其性之自然耳今之誦言者咸曰餓死事極小失節事極大故臨利害比二氏乃能之學者故不能於此然則從事於詩書反無所益彼之弗學乃能不壊其性何邪是必有所以然者學止於誇多鬭靡而不知其性為何物變化氣質為何事人欲日肆天理日消其不陷於禽獸者幾希矣余讀二氏之辭有感故錄而藏之書孔髙州平賊詩巻後王别駕所為孔髙州平賊十二詩并圖説余覽之歎曰嗟夫太守誠有功於民也太守今進秩憲副使其視民如傷必不偏於一隅安於一日以為足吾意副使之賢勞謙而不伐雖有同時詠歌之美蓋未知其果樂聞之而首肯否雖然或亟稱之必深願望之亦君子所不能巳於言也書蓮塘書屋册後成化十九年春正月予訪予友莊定山於江浦提學南畿侍御上饒婁克讓來會予白馬庵三人相與論學賦詩浹辰而别侍御之兄克貞先生與予同事呉聘君予來京師見克貞之子進士性及其髙第門人中書蔣世欽因與還往居無何侍御官滿來朝予卧病慶壽寺之數人者無日不在坐師友蟬聫􅆨味相似亦一時之勝會也侍御示予蓮塘書屋圖山雲水石竹樹隂翳恍然若蓮塘之在目藹然絃誦之聲盈耳也予玩而樂之謂侍御曰地由人勝不勝誰傳周茂叔濯纓於濓溪而世濓溪程叔子著書於龍門而世龍門朱晦菴講道於考亭而世考亭今婁氏居蓮塘宜世蓮塘使蓮塘之名有聞於天下後世者婁氏也使婁氏有聞於天下後世者婁氏自為之非蓮塘也蓮塘之遇不其幸歟濓溪以茂叔勝龍門以叔子勝考亭以晦翁勝蓮塘以婁氏勝古人今人無不同也抑不知婁氏之所修而執之者同於古人否歟惡乎同乎同其心不同其迹可也同其歸不同其入可也入者門也歸者其本也周誠而程敬考亭先致知先儒恒言也三者之學於聖人之道孰為邇孰知之無逺邇歟周子太極圖説聖人定之以中正仁義而主静問者曰聖可學歟曰可孰為要曰一為要一者無欲也遺書云不專一則不能直遂不翕聚則不能發散見静坐而歎其善學曰性静者可以為學二程之得於周子也朱子不言有象山也此予之狂言也婁氏何居焉予以景泰甲戌遊小陂與克貞先後至凡克貞之所修而執之者予不能悉也書予説於蓮塘圖侍御質諸克貞先生以為何如誡子弟人家成立則難傾覆則易孟子曰君子創業垂統為可繼也若夫成功則天也人家子弟才不才父兄教之可固必耶雖然有不可委之命在人宜自盡里中有以彈絲為業者琴瑟雅樂也彼以之教人而獲利既可鄙矣傳於其子託琴而衣食由是琴益微而家益困展轉歲月幾不能生里人賤之恥與為伍遂亡士夫之名此豈嘗為元惡大憝而喪其家乎才不足也既無髙爵厚業以取重於時其所挾者率時所不售者也而又自賤焉奈之何其能立也大抵能立於一世必有取重於一世之術彼之所取者在我咸無之及不能立諉曰命也果不在我乎人家子弟不才者多才者少此昔人所以歎成立之難也汝曹勉之示學者帖諸君或聞外人執異論非毁之言請勿相聞若事不得己言之亦須隱其姓名可也人氣禀習尚不同好惡亦隨而異是其是非其非使其見得是處决不至以是為非而毁他人此得失恒在毁人者之身而不在所毁之人言之何益且安知已之所執以為是者非出於氣禀習尚之偏亦如彼之所執以議我者乎茍未能如顔子之無我未免是己而非人則其失均矣况自古不能無毁盛徳者猶不免焉今區區以不完之行而冒過情之譽毁固其所也此宜篤於自修以求無毁之實不必以為異而欲聞之也昔吕䝉正拜副相一朝士指之曰此子亦參政乎同列欲詢其名遽止之曰知當終身不忘不如勿聞賢者所存固異於人也諸君亦宜念之手帖讀一之自罰帖所謂喜三代之餼羊猶存也此舉雖過然究其為心蓋亦可憫且自罰之辭甚實其進固未可涯也若夫久居師席不能致門人於無過舉之地此則老夫之罪請附此於日錄算一過諸君其誌之喻塾中帖不邀人敬不受人慢某今日方曉待深之之道大抵情不可過會不可數抑情以止慢疎會以增敬終身守此然後故舊可保請自今後朔望免禮諸生在塾中者亦不勞進揖容珪持此紙往喻俾悉知余意與容珪帖絢等雖在門牆其與拙者之意實未相接徒以名分相繫為美談耳雖然賢於吠雪者多矣廣収而勿拒小警而大遺其諸全交與待衰俗之意乎書一之自罰帖後此帖某實命之而云自書者貫不自以為過導之使知悔也貫之此舉某初蓋以為可卒歸於貫者貫主之托始於貫謀事愆義規畫無度皆貫之失不容於公議故與士友共責之而不得私焉其不可自恕者謹以書諸日錄矣自罰必一年而後復者過之小大為限復深責望之昭仁示義殆亦孔門鳴鼓之遺意歟子曰由也升堂矣未入於室也逮其晩年進徳極於髙逺未必非此門人之助而由之名光於後世矣則貫其可侮哉漫筆示李世卿湛民澤昨夕樓上聞雨聲澎湃睡不能著枕因檢㑹鄉里平時還往人十亡七八中間年及七十者才一二餘皆六十而下四十蚤晩死者恒多嗚虖人所得光隂能幾生不知愛惜漫浪虛擲卒之與物無異造物所賦於人豈徒具形骸喘息天地間與蟲蟻並活而已耶浮屠氏雖異學亦必以到彼岸為標準學者以聖人為師其道何如彼文章功業氣節世未嘗乏人在人立志大小歲月固不待人也書漫筆後文章功業氣節果皆自吾涵養中來三者皆實學也惟大本不立徒以三者自名所務者小所喪者大雖有聞於世亦其才之過人耳其志不足稱也學者能辯乎此使心常在内到見理明後自然成就得大論語曰朝聞道夕死可矣孔子豈欺我哉跋沈氏新藏考亭真蹟巻後張宣公城南雜詠廿首考亭朱子為和之楊鐵厓評其詩謂宣公有古風思緻於考亭惟曰朱子之辭不敢評其信然耶抑别有所指不欲盡發之耶昔之論詩者曰詩有别材非闗書也詩有别趣非闗理也又曰如羚羊挂角無迹可㝷大詩必如是然後可以言妙近代之詩逺宗唐近法宋非唐非宋名曰俗作後生溺於見聞不可告語安得鐵厓生並世余將叩之其亦有以復我耶鐵厓補書宣公詩與文公真蹟併藏沈氏都憲公書來俾予題予既未及見因附論鐵厓之後如此云跋梁曉挽李唐詩曉為詩悼李唐唐卒未娶無顯然悔尤皆以為幸然曉之於唐既送其往復迎其來何曉之不憚煩也造化固無是理矣但如曉説苟無聖人之徳而有妻子之累雖曉不能以一日活世間况於唐乎曉之為人謀亦疎矣曉乎其自處可也跋張聲逺藏康齋真蹟後先師康齋遺稿某藏之十二年矣出入必偕天順初先師膺聘入京途中紀行諸作皆當日手書寄白沙凡七紙成化己丑春三月行李出北京是日次于析木之店以示東呉張聲逺鍈一見驚絶閲之竟日不目瞬以手撫弄以口吟哦某憐之割一紙是歲六月過清江以手書問先師尚無恙也明年秋鍈書來求跋又二年壬辰二月豐城友人始以訃來先師之卒在己丑十月至是三易歲當鍈求跋語時屬纊來一年矣烏虖悲乎先師道徳名譽傾一世婦人小子知之華夏蠻貊咸知之平生愛一字一辭不以假人某之所得徒以一日在門下然誦其言想見其丰采而得其為人則宜其有惕然而感勃然而興者矣某猶望此於百世之下况其邇者乎後生可畏鍈其念諸門人某謹識跋漳州功徳碑後漳州姓張名璝字徳潤别號兩山居士番禺人詡之父也讀漳州功徳絶句云罷守三州卧兩山漳州面目此碑間郡人欲識蒙庵老也傍斯文捉一班作碑者林䝉庵曩於京師見其人慎許可人以是信之今直靠也作證明師也蒙庵見拙詩想為抵掌但未知肻勒於碑隂否也論詩不易宋歐陽文忠公最愛唐人遊寺詩曲徑通幽處禪房花木深又愛一人送别詩曉日都門道微凉草樹秋云修平生欲道此語道不得朱文公謂今人都不識此等好處是如何二公最知詩者也後人誠未易及如此兩聨予始因歐公歎賞之至欲求見其所以妙如歐公之意了不可得徧問諸朋友無知者徐取魏晉以下諸名家所作凡為前輩㸃出者反覆玩味久之乃若麤有得焉間舉以告今之善言詩者亦但見其唯唯於吾所已言者而已吾所不言者彼未必知也夫然後歎歐公之絶識去今之人逺甚而信文公之言不誣也噫詩可易言哉書自題大塘書屋詩後予既書婁克讓蓮塘書屋圖後蔣世欽繼之以大塘書屋之請予賦五言近體一章既以答世欽世欽少之予乃究言詩中之㫖首言大塘書屋乃中書蔣世欽所建頷聨言為學當求諸心必得所謂虛明静一者為之主徐取古人緊要文字讀之庶能有所契合不為影響依附以陷於狥外自欺之弊此心學法門也頸聫言大塘之景以學之所得易所謂復其見天地之心乎此理洞如然非涵養至極胸次澄徹則必不能有見於一動一静之間縱百揣度秪益口耳所謂何思何慮同歸殊塗百慮一致亦必不能深信而自得也末聫借方士之丹以喻吾道之丹卒歸之龍門者明其傳出於程子而人未之知也拙見如此未知是否然予於世欽不可謂無意矣所病者辭采不足以動人耳世欽胡為而少之予以世欽厭夫為文字章句之學者勇於求道不恥下問於予予是以重言之謂予俯仰於時姑喋喋以塞夫人之意非予所以處世欽也速勾丁知縣廟疏立一祠既以表茂宰之賢又以見吾鄉尚徳慕義一唱百和視死如生又孰不咨嗟而歆羡其美耶且報往可以勸來此祠立必有聞義而興起者問所由來鄉諸父兄子弟不忘舊令之徳章與有榮矣幸甚幸甚即辰春日布和工匠畢集其告諸義士及是時慨然念此舉之不易發誠心而共濟幸無辭曰姑俟來日區區不勝至禱書鄭檢討所編劉閔札後此吾翰林鄭先生廷綱取吾平日所得於其友劉閔子賢手書會而編之以為此巻子賢嘗以孝行聞于鄉之人今閱此巻意其天資可與共學而鄭先生不沒人善也皆可敬中間一簡告鄭先生以處貧之難吾獨惜子賢之困於不足無所於謀也三旬九食亦昔人之常事必不得已而干人雖謀於鄭先生可也而徒告之難鄭先生豈難於濟人者哉觀者疑焉雖不以編入可也書鄧政求濟帖後於乎勢利為市朋友道絶昔人所能者例不可望於俗輩政之號不足於余固其所矣惜予貧且賤無以副政之請此昔人所謂旋渦底佛安能救落水羅漢不然余之所欲濟與所識求濟於余者多矣豈獨政哉雖然政於余無一日之雅奚以亮余之能惠予負政多矣十室之邑尚有忠信如夫子政其廣求之必得一士如予而無予之貧賤政其庶幾乎撫紙太息書其後歸之書玉枕山詩話後余又有回龍寺夜坐詩云孤燭江邊寺疎鐘雨後天愁人知永夜逺客惜流年不買南安酒留充玉枕錢床風無意緒吹斷藥爐烟第三聨亦以玉枕而發東海乃不収入詩話中偶忘之耶東海平日自謂具隻眼能辨千古是非人物而近遺夫康齋又何也康齋易知耳予年二十七游小陂聞其論學多舉古人成法由濓洛闗閩以上達洙泗尊師道勇擔荷不屈不撓如立千仭之壁蓋一代之人豪也其出處大致不暇論然而世之知康齋者甚少如某輩往往譏呵太甚羣味交競是非混淆亦宜東海之未察也微吾與蘇君今日之論則東海之康齋其為晏嬰之孔子乎了翁之伯淳也噫成化壬寅九月二十八日新會陳獻章在南安横浦驛讀東海先生玉枕山詩話秉燭書此于蘇君巻中書鄭巡檢詩巻後吾邑沙岡巡檢鄭榮官滿告歸持此巻過白沙乞詩榮莆人也壯而仕老而休賢於不知止者予既贈之詩復錄近作七絶於此莆有大理黄先生故人也榮見問我以此巻呈之題呉瑞卿采芳園記後歲云暮矣冬雨凄凄牛僵馬危商旅不歸號寒啼飢窮民怨咨采芳何為將以遺所思所思在逺道天寒日短誰為致之不如待時時維仲春陽道既亨萬物得時和風披披人情熈熈博采衆芳汎汎輕航駕言出游不泥一邦雲龍風虎其傳自古而徳之所被人將化之如是壑之水汨汨洋洋不亦深乎瑞卿天下未有不本於自然而徒以其智収顯名於當年精光射來世者也易曰天地變化草木蕃時也隨時詘信與道翺翔固吾儒事也吾志其行乎猗歟休哉題余别駕中流砥柱圖後别駕余先生命余題中流砥柱圖余讀彭秋官序文雖非正説此圖而意己足末舉元貞事一段結裹尤警䇿有力故予倣其意而切言之蓋不言則己言必欲其有益於别駕非相啖以利者也故不為諛辭其辭曰使君使君不厭真使君為臣莫愛身使君不以榮落為詘信死生為戚忻而以嗜欲為伐性之斧斤千秋萬歲難磨滅乃見中流砥柱人偶書遺湛民澤龔曰髙遊羅浮者仙人譚景升詩云蓬萊料想無多路只在譚生拄杖前羅浮海上山葛仙治之真蓬萊哉方竹君入手振之鏗然有聲上撑天下拄地四方惟意所如諸君即日東遊度鐵橋登飛雲坐黄龍嘯明月是真神仙矣譚生豈欺我哉久矣吾夢長髯翁遺予羅浮山盡四百三十二峯一囊括之開半面以待遊笻之入次王半山韻詩跋一日忽興動和得半山詩一十八首稿寄時矩収閲作詩當雅健第一忌俗與弱予嘗愛看子美后山等詩蓋喜其雅健也若論道理隨人深淺但須筆下發得精神可一唱三歎聞者便自鼓舞方是到也須將道理就自已性情上發出不可作議論説去離了詩之本體便是宋頭巾也大槩如此中間句格聲律更一一洗滌平日習氣渙然一新所謂濯去舊見以來新意作詩亦正用得著也批判去改定乞再錄來見示為幸稿中有工拙請下一轉語以觀識趣髙下可乎書和倫知縣詩後屠沽可與共飲而不飲彭澤公田之釀古之混於酒者如是與獨醒者不相能而同歸于正雖同歸于正而有難易焉醒者抗志直遂醉者韜光内映謂醉難於醒則可今之飲者吾見其易耳非混於酒而飲者也烏虖安得見古醉鄉之逃以與之共飲哉送張方伯詩跋某嘗謂作詩非難斟酌下字輕重為難耳如此詩第五句清字既研于心又參諸友左揆右度終不可易而非公九載之守不渝某亦豈敢孟浪蓋一字之下其難如此詩其易言哉書法予書毎於動上求靜放而不放留而不留此吾所以妙乎動也得志弗驚厄而不憂此吾所以保乎静也法而不囿肆而不流拙而愈巧剛而能柔形立而勢奔焉意足而竒溢焉以正吾心以陶吾情以調吾性吾所以游於藝也陳白沙集巻四欽定四庫全書陳白沙集巻五明陳獻章撰古詩和楊龜山此日不再得韻能飢謀藝稷冒寒思植桑少年負竒氣萬丈磨青蒼夢寐見古人慨然悲流光吾道有宗主千秋朱紫陽説敬不離口示我入德方義利分兩途析之極毫芒聖學信匪難要在用心臧善端日培養庶免物欲戕道德乃膏腴文辭固粃糠俯仰天地間此身何昻藏胡能追軼駕但能潄餘芳持此木鑚柔其如磐石剛中夜攬衣起沉吟獨徬徨聖途萬里餘髪短心苦長及此嵗未暮驅車適康莊行逺必自邇育徳貴含章邇來十六載滅迹聲利塲閉門事探討蜕俗如驅羊隱几一室内兀兀同坐忘那知顛沛中此志竟莫强譬如濟巨川中道奪我航顧兹一身小所繫乃綱常樞紐在方寸操舍決存亡胡為謾役役斵喪良可傷願言各努力大海終囘狂答
