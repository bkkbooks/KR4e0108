  - {type: variant, offset: 22611, length: 0, content: '', WYG: 欽定四庫全書陳白沙集巻五明陳獻章撰古詩和楊龜山此日不再得韻能飢謀藝稷冒寒思植桑少年負竒氣萬丈磨青蒼夢寐見古人慨然悲流光吾道有宗主千秋朱紫陽説敬不離口示我入德方義利分兩途析之極毫芒聖學信匪難要在用心臧善端日培養庶免物欲戕道德乃膏腴文辭固粃糠俯仰天地間此身何昻藏胡能追軼駕但能潄餘芳持此木鑚柔其如磐石剛中夜攬衣起沉吟獨徬徨聖途萬里餘髪短心苦長及此嵗未暮驅車適康莊行逺必自邇育徳貴含章邇來十六載滅迹聲利塲閉門事探討蜕俗如驅羊隱几一室内兀兀同坐忘那知顛沛中此志竟莫强譬如濟巨川中道奪我航顧兹一身小所繫乃綱常樞紐在方寸操舍決存亡胡為謾役役斵喪良可傷願言各努力大海}
