front:
  text: 寄太虚上人用舊韻衆生尊我我須勞公在吾儒公亦豪數㸃曉星滄海逺一牀秋月定山高性空彼我無差别力大乾坤可跌交十二萬年如指掌且􅂸閒弄在甄陶
  hash: sha256:50b53e05d63e803ea6dff6d1d0e33f8063c28abd2238829072b6155bd8574d9a
body:
  text: 寄定山影響驅馳等是勞風流今古幾人豪但聞司馬衣裳古更見伊川㡌桶高巖徑無風松子落翠屏終日白雲交定山様子從來别詩變堯夫酒變陶封博羅何孝子廬墓詩巻春夏誰開發育功直憑天地閉秋冬三緘欲了西涯意諸作還經老手封活水有源終到海遊絲無力祗隨風肯將吾道千年計跳入羅浮四百峯重約馬黙齋外海看山春風擬進赤泥舟曾約看山共此遊落蕋忽過三月半先生能復一來不不堪老我痴猶在且喜嬌兒病已瘳想得渡頭楊柳樹清隂閒弄釣魚舟代簡答黄大理仲昭先生靣目入中年海曲丹青不遣傳尺簡豈堪頻問訊兩京還説舊因緣餘生可試屠龍技畢嫁纔消鬻犬錢九曲棹歌君莫唱千秋誰和武夷仙代簡答林蒙庵用前韻忽忽浮生又一年圖書老矣待誰傳人非為己終無得我與先生似有緣六十懇辭兵部禄尋常亦欠酒家錢武夷九曲君應到爭向區區問學仙次韻答林别駕誰㰱南溟一口清惠陽别駕不勝情春雲可待成霖雨空谷還來問朽生每恨功名欺老病閒將律吕寄新聲白頭滿眼知音少却愛夫君蓋未傾杖一杖何妨九尺材白頭筋力小低佪西崖拄月翩翩去浦口挑雲得得來原壤見之休叩脛醉鄉扶我且銜杯一生用底公須愛持贈山僧恐未該與陳聰秋風兩見莆陽子皂㡌青笻去復回眼底流年三十許脚跟行路幾千來未知世事真能忘初得家書不肯開若問江門何所見兩涯春雨長青苔袁侍御輓詩九載宜興共太平長官能事問生靈霜臺白筆宜當路北極中天拱列星眼底兩途分淑慝手中三尺有雷霆却疑夜半龍川雨直為高賢洗汗青山齋秉燭話同遊十九年中酒一甌赤縣敢辭烏府召江湖先有廟堂憂諸公不意辰星少百計猶須晚境休何處龍川子規烏為君啼恨五更頭留朱甘節誠庵先生之姪也早從太保學闗西三十不官人得知到處自稱西楚客逢人只説李承箕百錢挂杖還雙屨千里低頭但一碑江上竹枝歌正好留君况是月明時中秋與朱甘節白沙賞月呈甘節兼寄其從子玭天壤與君分楚越中秋高坐白沙庵雖無絲管留人醉且對滄波與客談桂樹何年攀月窟竹枝今夜唱湖南外沙子弟通家舊一一煩君語阿咸元旦試筆六載虚叨供奉恩白頭吾亦兩朝臣閭閻擊壤今𢎞治簡册編年又戊申日色小薰穠李晝風光欲醉乳鶯春廬岡此景誰分付也到江門不屬人天上風雲慶㑹時廟謨爭遣草茆知隣墻旋打娛賔酒稚子齊歌樂嵗詩老去又逢新嵗月春來更有好花枝晚風何處江樓笛吹到東溟月上時次韻李子長抵江門之作江門之水流千春玉臺之山多白雲此山若解留人住此水應須與客分雲谷丈人終不老舞雩重子又成羣去時若問來時見尋樂齋前對此君送李子長還五羊津頭看水坐成痴天地閒人我却知此日江山初見子向來風韻更因誰春波蕩栁舟難繫曉樹啼鶯枕欲欹江上明朝空引望白雲何處久支頥寄廷實用前韻囀花黄鳥更狂痴報得春光滿地知千首有詩都寄子一瓢無酒可干誰夜來極飲花神喜江上長歌斗柄欹還憶舊遊三兩軰眼前今古涕交頥得陳庸書寄莊定山疾子不須疑用舎定山休更問行藏千年天地逢開闢一代規模見主張老惜筋骸雖伏枕分甘藜藿也高堂觀棋莫道無高著當局輸贏又未量約諸友遊圭峯文都報子病不果行西望蒼崖意已傾怪來天道與人情雲頭似墨朝垂幕兩脚如絲夜擁綾三約兩違真未信百憂千算卒無成相看獨有南山老打硬猶堪逐後生與廷實同遊圭峯别後奉寄且申後來崖山之約弄罷飛泉下玉臺青天何處首空回城中春雨君高卧竹下茆亭客未來坐隔談鋒終日笑碑封丹蹟幾回開孤舟莫負秋來約同到崖門白浪堆千尋嶺上更登臺再到丹丘忘却回雨歇山齋人已去月明江舫夢還來不􅂸鐵柱唐針利豈乏金箆刮眼開回首崖山多感慨英雄枯骨漫成堆用前韻寄文都曝日臺君家曝日有高臺君坐臺中日幾回旁舍先生扶杖過平湖縣博寄詩來不知天道晴還雨屢見山花落又開已有高人來指㸃白雲何處路旁堆次韻李世卿雨中南北東西服欲連簷頭風雨夜鳴泉天低鄂渚衡山外人在江門海水邊愛酒時時同李白論詩稍稍到庭堅故人解致西山鳳想脱漁蓑上畫船偶成秋月朗耀秋風清漁翁自歌還自聽却慙夜半留雙睫早為人間了六經賢聖當為天下極何人不共此心靈從前欲洗安排障萬古斯文看日星與世卿閒談兼呈李憲副風光何處可憐生共把閒愁向酒傾今日花非前日看少年人到老年更秦傾武穆憑張俊蜀取劉璋病孔明萬古此寃誰洗得老夫無計挽東溟禮樂猶存魯兩生至今聞者尚心傾乾坤已正高皇統制作還隨漢事更世情逈與淳風别山色須看􅂈雨明枕底白雲閒一片直從南斗跨東溟酒醒西巖看月生此懷此夜向誰傾百年自信官清淡兩耳那聞世態更露飲秋蘭分楚客詩連石鼎對彌明五湖烟水能多少更整絲綸釣八溟午枕清風汗不生鼻雷打到日西傾東西山色移床看六十年光轉瞬更廬阜白雲真太華玉臺高閣小朱明丹青若更閒分别老子江門是一溟草長津南薙復生隂晴天氣欲相傾短簷風暖偏宜睡古瑟絃歌且莫更有客艤舟留信宿呼兒問酒出黎明短衣江畔聊延竚又聽漁歌徹四溟病裡風光如隔生泥尊名酒為誰傾不將蓴菜還張翰也把茅根與率更松下白頭眠卓午沙邊赤脚步平明安期久矣無尋處知在南溟是北溟獨立滄茫笑此生瘦笻幾尺也扶傾新傳隻屨無多售舊濫吹竽亦小更往往詩囊隨李賀深深酒琖寄淵明世間未必如公足山有飛雲水有溟碧酒三杯春又生偶逢騷客各披傾楊雄識字終誰讓家媪知音却屢更舊管一題都迭蕩新收半巻轉高明封緘逺寄而宗老月在青天影在溟羞將白髮對黄生信未通前意已傾門靜客稀偏足話山廻埭逺不知更雞鳴桑柘孤村曉日出東南一角明我欲與君同辟穀不攜妻子住滄溟月下懷世卿時在南山世卿昔赴南山召今見南山問世卿信宿世卿向何處一片南山空自青滄波脚底機全活勾漏囊中藥果靈且傍鐵橋攜笛上亂峯明月試吹聽寄外史世卿玉臺兩崖樹石幾重衙富貴人間未足誇到寺客携元亮酒在山泉煑玉川茶高軒倘許重過我多病仍便久卧家對月不禁秋思得清吟分付一籬花病領詞官不到衙老慵無意向人誇四時好景偏留句兩腋清風每試茶司馬雖稱題柱客薛公猶在賣漿家近來山寺多高興更作詩豪對浣花城扉半掩更休衙客子山中句可誇階下西風吹落葉僧呼童子掃烹茶著書歲晚堪投筆見月宵來定憶家記得西甄舊遊處滿船秋雨木棉花江城吹笛月斜衙回首秋巖寂可誇世外一眠那有夢腹中三斗却須茶文衰東漢無高手詩過中唐少作家笑殺平原趙公子當年毛薛䀶全花記旱用前韻簫管聲停刺史衙豐穠無復去年誇禾焦百畆還輸税菊到重陽可泛茶隣壤兵戈悲此役隔村烟火問誰家諸公果解憂民極肯算腰金不鏤花得鄧俊圭書舞雩童子亦同遊陋巷高賢得自求漢老豈非徐孺子宋人何獨薛居州數莖雪報年華晚獨樹風驚昨夜秋書使逺來深有意白雲高幘岸羅浮九日李鴻兄弟攜酒從余登舍北小廬峯四望書所見寄世卿圭峯山愛廬峰節愛名登臨衮衮到諸生千巖已見昏鴉集兩榼還挑大鼈行隴稻不收交馬跡寒花莫賞更人情玉臺此日秋風賦誰敵縱橫李世卿六十一自夀世間甲子是何年母鬢雙皤子亦然十數曾孫羅膝下兩三杯酒笑燈前尋僧野寺花迷路吹笛江門月滿船聖主萬年歌不足黃河清了鳳翩躚孤子今來六十一慈親己過八旬三旌書門外題新榜拭淚床頭換舊衫少有菑畬供俯仰不妨漁釣老東南些兒别作長生計巖畔丹書有兩函侍御朱先生將還京再過白沙言别出示同寅周先生送行詩因附其韻老大師門浪我推飛騰天路是君期兩藩湏按兵民籍百姓當懸父母思燭剪山齋曾舊雨葢傾京國亦多時分携别作無言贈處處還君不暫離臨安守鍾美宣同姓將赴任過白沙言别出示莊定山所贈詩次韻崖門春弄海濤高太守當年共草茅山閣逺煩青眼顧世情渾是白頭交功名此去期當道風月何妨坐小舠敢冀千金收馬骨真成一笑擲鴻毛夜半海風來最高江亭巻我三重茆一林月色曉還在四壁波光寒欲交皂蓋忽聞催驛騎緑楊長繫釣魚舠也知窮達闗天命誰把行藏管鬢毛廷實累約遊厓山不遂世卿在數千里外不期而同固亦有數次舊韻寄廷實海中來􅟪羡門生雪浪如山故故傾畫舫兩期人不至蒼厓一别歲頻更嘈嘈鼓笛轟雲下弄弄波濤到月明誰道青蓮李居士一槎千里共浮溟和世卿留别韻笑索南枝冷未禁詩情翻益别情深杯中涕淚知郊意手裡推敲失島心赤壁去看橫白鶴大厓不著買黃金山僧許借山房睡只許僧分月一尋白首山中病不禁百年愚計謾成深四千客路旁人笑去位憂端各此心何限詩留何限意一囊書當一囊金江門細路細如線端為高軒廣尺尋代陳汝岳謝李世卿撰玩琴軒記先子當年一坐軒軒中高榜揭無絃斯文觸目休論價世徳流芳可盡年從此兒童堪我誦是何風韻與人傳道旁雖有崖千尺不得名家一字鐫𤣥真送柑溪園十月摘黃柑歲月將窮致小籃繞膝痴孫高起舞隔年乳酒正開罈色香本出梨之右風味真無嶺以南不惜霜根傳藥圃白頭還解荷長鑱讀丁知縣行狀申文後州里懽騰此郡推揮毫今徹九泉知古來士論都元氣天下人心自秉彝太史書須凡例定桐鄉愛是長官遺憑君更向郊原問怕有人間未采詩得世卿南安書嶺客歸時一信通匆匆燒燭待開封心知别去千回折詩長從來一格工大意天開曾㸃識前塗誰貸阮郎窮世間浩浩閒來往除是青山不負公世卿寄示經飛來寺和予壬寅秋舊律詩復用韻答之山寺燃燈客欲留客情到此淡於秋詩篇可續還杯酒行李無多共一牛峽水更看東逝急嶺猿那肯晝啼休夢題回首今如夢巢父猶應笑許由將營土閣使人取材於海山颶作舟踰期始至喜而賦此颶母徒懷一月憂眼中材木稱心求老妻洗爵傾紅秫秋浪來帆出白頭萬里滄波宜逺望四時風月欠高樓時哉版築休停手二頃陂田幸晩收秋夕偶成小兒失解聊以慰之崔顥賦詩黄鶴樓白雲黄鶴兩悠悠江山供眼不知老風月滿蓑還是秋三試吾兒雖失解一花司馬未簪頭何人久抱遺珠恨黑觜抽成白觜抽憶世卿廷實用寄景陽韻東西垣竹影交欹坐到芭蕉月上時何處塵蒙春試馬壁間苔沒舊題詩一杯脱粟吾將老萬里長風子可羈别有樵夫來歇擔晩涼松下一殘棋永豐劉景惠持吾亡友羅一峯事狀來訪白沙道其尊翁程鄉宰肅庵願友之意留余館中數日贈以示詩儒官秋晩謝遲回林下齋扉不浪開顧我敢辭千古述故人真為一峯來風流想見雷封下消息通傳雪浪堆明發仙舟聞解纜屋烏情在莫頻催贈潘上舍漢用前韻東山月上暮潮回誰遣歸帆趂月開草屋肯留潘上舍玉臺還對古如來纔看溪樹交成幄又見秋沙巻作堆半醉贈君歌亦半教兒還覆一杯催予欲為一峯傳而患無所本其子梁撰事狀托程鄉令劉君肅菴肅庵以授其子景惠至白沙予將考其事實為傳無所復辭顧吾文凡吾懼不如司馬可傳之逺景惠行復梁兄弟以詩用前韻北海英風夢始回誰將年譜到山開忽驚落月神如在却對秋花笑不來雛鳳一羣丹穴内殘星幾㸃慶雲堆春秋畫筆終難擬天地斯文更著摧晩酌示藏用諸友藏用先生門人梁文康公初字也何處氤氲到此溪香林高樹望中迷瘦藤拄月秋山逺破褐隨風晚袖低廬阜亦開新洞府玉臺還是古招提黄柑白酒誰賓主不放今朝醉似泥風清月朗此何溪幾個神仙被酒迷雲水此身聊起倒乾坤入眼謾高低因過紫極聞丹訣旋把黄金鑄水提問我何如蘇内翰夜觀赤壁踏黄泥四人把手過龍溪一路梅花了不迷滄海月明三島近白龍天逈衆山低客攜巻子抄詩草兒上松枝掛酒提盡日醉眠崖石上莓苔茵厚不沾泥涪翁指㸃好濓溪老眼青天醉不迷五老峯連湖月白綠荷風颭水烟低無窮光霽還相接太極圖書謹自提懶與時人談此事風流真個隔雲泥賞音無代無湏溪我為諸君略指迷開巻直疑韓愈錯吟頭剛向孟郊低貪修大藥遺真種爭得刀圭出粉提晉魏以前無近體獨憐陶謝不拖泥東溪牽犬過西溪短屐衝烟歩歩迷秋竹苔深人語靜古壇松冷鶴巢低山花折去空盈把春酒沽來不滿提笑把長竿弄江月草間郭索尚蟠泥屋上青山屋下溪溪山何處使人迷巖頭老樹排風正門外垂楊拂浪低東渚曉烟縈舴艋西山夜雨落菩提涓涓却笑三江水未洗嚴光脚板泥漁翁向夜宿何溪月色蘆花到處迷篷背風吹黃葉過船頭浪捲雪山低晚來竿綫殊堪弄老去干戈不著提自有平生烟水分何曾軒冕視塗泥丹青不冩武陵溪只記桃花也著迷芳草獨行山路僻白雲相送洞門低笑呼竹笠前頭拜交付詩嚢右手提風月滿山闗不住他時湏用一瓦泥十一月梅開滿溪探花長是被花迷巖前老樹藤纒殺路上橫枝竹掃低香動酒巵羌欲㰱影留山月不堪提逋仙此意還真否笑指江門屨底泥贈朱玭還郴陽君過衡山不上山祝融峯在有無間青燈此夜聞長歎白髪何年許共攀碑蹟我留諸叔久酒杯誰放世卿寛明朝又别東溟去還著東溟晝裡看得賀黄門克恭書一封初展制中書萬里遼天見起居何處江山還著我斯文今古正闗渠傷心入夜思賢母老眼當年識鳳雛濂洛諸公傳不逺風流衣鉢共團蒲疊前韻寄迺子諮少年誰授訪之書父子元來共廣居無極渾淪親茂叔西銘特達見横渠名駒獨歩空凡馬一鶚高飛失衆雛想得趨庭詩禮罷愕然木榻對盆蒲耳目無交不展書此身如在太清居雪消爐焰氷消日月到天心水到渠一一園花都傍暖飛飛江燕未將雛好春好伴湏行樂束起松根七尺蒲和元夕客中韻人間樂事此宵同高坐春風一葦中無地張燈聊對酒是時聞雨不開蓬推敲一字須公得剪刻千門亦女工厭見乾坤多事在紛紛萬有不如空次韻張侍御叔亨至白沙生死遭逢未可知兩生名氏至今疑自陳多病甘為退肯與閒愁博得衰冷雨侵人呼酒數瘦藤扶老看花遲繡衣未笑茅根秃來請延陵十字碑舊事追惟喜復悲一生羸馬著鞭遲春來花鳥偏留賞老去膏肓更莫醫蘇子瞻家真一酒邵堯夫様打乖詩同歌同醉同今夕絶勝長安别後思次韻張叔亨宿别春草江門緑兩涯隔江人唱浪淘沙好春剛到融融處細雨初開淡淡花僻地豈堪留客久連床端合拜君嘉明朝愛得酕醄别笑脱籐蓑付酒家次韻鄒汝愚陽江道中見寄幾畨形蹟落堪輿我亦人間一腐儒遺我數篇風格别思君一夜鬢毛疎未知滿眼誰能恕可復窮鄉自作孤十二窩中春自在打乖正坐不堯夫春寒江雲將雨弄春寒壞絮中宵裹作團二月北風還浩浩幾程西路更漫漫忽聞鶯語當窓沸想擬花枝翌日看天道隂晴也無定藥爐且可共泥丸容一之飲隣家酩酊仆地戲作一之少有足疾扶杖山人早拄十年笻勃率高低笑殺儂拾得田中雙草屐知傾花底幾郫筒虚空筋斗何妨打造次文章莫浪攻見説緑楊津口月玉山先倒主人公贈曹侍御吹斷南風雨一川畫船到處是青天公程我枉聊經宿吾道君憂正百年東海病夫身自逺九霄孤鳳眼將穿不知詩史千年下誰與平章贈處篇何宗濂書來推許太過復以是詩後來鄉里不如前五日乾坤浪數年何地可扳文獻駕平生願執菊坡鞭泰山北斗諸公地明月清風病瘦天竊比聖門吾豈敢汗顔窓下讀來箋題兩山居山圖為新淦李文光大賈盤谷不知何處山君家真是兩山環萬杯春覆酒遺老一枕日高天與閒水墨殘巾藏措大江湖前夢説邯鄲披圖一笑逢摩詰北沜南垞欲往還讀林和靖詩集序廟堂不坐周公旦到處山林有鹿麋北斗收名千古獨西湖送老一枰誰鶴知好客來尋主月為疎梅出併詩未肯低頭陶靖節掛懷身外五男兒寄劉東山方伯用送緝熈韻高山流水好鍾期不是西崖那得知舊雨僧齋勞枉駕秋風薇省近傳詩堂堂白日青天見昧昧蒼生赤子思神爽屢交終是夢幾時携手笑支離寄謝天錫不了從兼病與貧小廬峯裡白頭新問誰肯我同精舍垂老思君是故人世事轉頭渾覺夢烟花過眼可憐春幾時來伴江門釣開與諸孫講舊聞次韻鄺筠巢哭子八旬老眼為誰枯淚盡家兒不受呼天下誰還禁此哭人間春已背公徂肝腸裂斷詩能寫氣力傷多酒不扶正坐兩州消息好不違家訓逐貪夫次韻李子長至白沙山轉黃雲信脚行西風吹袂五銖輕勝遊自喜多閒日衰病還堪逐後生白髪我因何事笑黃河人見幾回清看君合伴廬岡睡不獨能詩一技成邀馬𤣥真用前韻閒眼閒坐或閒行身老溪雲病亦輕客至正當秋釀熱船來莫待晚潮生江山偶得三人對風月還添一榻清昨日書來張主事頭顱空訝老無成駐屐岡頭望且行轆轤閒轉釣絲輕秋風篙楫來無逺夜雨溪毛剪復生精舎晩開諸老共長江東滙此門清李家子弟雖能賦浩浩之歌老更成再和示子長名駒千里始能行向許雲霄一羽輕半箇先天無邵子幾回隔壁笑侯生幸逢聖主重華聖遮莫清流徹底清手弄一丸無剰欠山林廊廟總圓成支離病骨此閒行搭颯短蓑何太輕人世萬緣都大夢天機一㸃也長生借眠春草秋還綠偷賞黄花晚更清莫笑老慵無著述真儒不是鄭康成與子長説詩忽聞有談方伯華容劉先生徳政者因用韻以示皇皇孔孟老于行公履何階是不輕萬有乾坤渾欲動一波滄海莫令生閉門想見衡山大照眼遥分楚水清肻為蒼生留不去三年方岳豈無成侯𤣥真不至用前韻公來不來客亦行上江船逆下江輕空聞此日悲吟在誰問從前太瘦生竹月曉沉山閣冷石壇秋老菊花清人生佳㑹真難必十度商量九不成野菊籬前領客行白牛柂轉小車輕風流有様看前軰笑語忘機接後生霜簟夜攤巖屋冷月瓢秋泛釣湍清東溟望斷漁翁地只賣江門一劵成次韻羅冕高笠短蓑吾不疑白頭真結兩生知天生男子非無事公是閒人莫廢詩十月酒多留客久千峰月朗閉闗遲夜深自弄江門篴驚起前灣白鷺飛送譚士闕春試次世卿韻山藤短窄製蓑衣獸錦長披力不支挿㡌有花羞我老鈎詩無酒送君遲相依緑樹聞歌鳥肯著黄金買侍兒草尾河南俱有䜟不知來歳狀元誰種梅晚從種樹作生涯十一月梅移帶花根著不隨風偃仰牆低惟信月橫斜夢中山我羅浮到雪裡詩誰處士嘉君欲尋梅何處是江門樵路更旁义種樹早雨山泥滑屐牙瘦藤扶路入雲斜東原綠映西原白一徑松連兩徑花寒夜試看殘月掛春風須著短牆遮江門亦是東門地我獨胡為不種𤓰長日山齋不弄棋只憑種樹遣衰遲小將梅逕分枳殻不怕松根奪荔枝帶雨烟光春淡泊隔牆花影晝離披等閒俗計休相聒拄杖來看又有詩元旦次榮敷韻謝梅開杏了何疑一節花應一節知拍岸緑波春映閣囀枝黄鳥日撩詩江山若惜開懷早歳月偏驚聚首遲繫馬玉臺重引望白雲閒與鶴同飛輓黎雪青詩草人收味月亭先生何處獨登瀛山雲自映新墳白齋榜空懸舊雪青到了有生還似寄尋思是夢不如醒秪應更坐蒲團破讀盡琅函幾部經劉進盛書來勸著述用舊韻答之一入商量便作疑可堪垂老更求知追陪水月惟湏酒管勾風光却要詩孟子生憂傳道廢仲尼不怕著書遲青天試問東南上何處凌空拄杖飛用前韻寄羅養明工畫作東西舉踵笑人疑種種邯鄲夢豈知風雨揮毫千文竹江湖回首十年詩數杯歌舞嫌春淺高枕乾坤得老遲聞道一枝棲亦足刺天那肯逐羣飛玉臺次楊敷韻笑倚長松咏晩臺三三兩兩共無懷人間紫府千回夢我共黃雲一路來鹿洞當年尋李勃鵞湖今日想東萊將軍夜半還能飲欲引東溟入酒杯與楊敷投壺矢戰輸贏更不疑老年精力此壼知君期大㨗休疑手我放㣲酡好賦詩三舎避人心每下一牀對此意彌遲乾坤妙用安排外肯放絲毫到奕棋楊敷别後有懷春潮渺渺獨乗槎春雨霏霏别釣沙海味豈能甘此客華山真本屬吾家青垂綺陌千條柳紅脱荒溪幾樹花老脚尚堪遊走在紫藤高拄赤城霞江門春雨送歸槎破㡌排風落晚沙向暖野鶯猶戀樹感春遊子未還家山瓶免續沽來酒草閣空殘别後花明日越王臺上望白雲何處杳飛霞贈趙日新還潮州千里徴文到此堂東風歸棹夜相將雨餘㡌頂天如洗花落船頭水亦香考徳每勞休講席臨流親為㵼椒漿潮人共守文公敎趙徳文章獨擅塲送順徳李縣幕岳兼呈吳明府江上清風不巻沙山中濁酒未藏家數杯送客發孤唱半醉扶吾來小車莫使長官愁案牘當令滿縣種桃花敝居正在廬山下幸不來時路口义春日偶成蛺蝶飛飛花映窓流鶯恰恰柳垂江出牆老竹青千個泛棹春鷗白一雙暖日暄風酣獨卧來牛去馬亂相撞江山指㸃非無句誰致先生酒百缸贈余進士行簡别行藏今古漫云云誰把妍媸鏡裡分鄉里論年多拜我雲霄歩武不如君短檠課好都黃甲獨板門深只白雲欲識江門臨别意東風吹靣酒㣲醺雨中偶述效康節江門何處遣詩懷風雨終朝閉小齋同社客來休見問卧家人懶不安排烟浮石几香全妙露滴金盤酒極佳半醒半醉歌此曲不妨餘事略詼諧今雨還留舊雨氊滿襟凉氣似秋天偶因門外無來客得向山中作睡仙樽俎喜歡朝暮醉鶯花撩亂兩三聫只消詩酒為堅壘肯放閒愁入暮年山房四月紫棉衣無奈連朝雨欲欺老去杖藜終穏便朝来花酒又淋漓昔賢曾共骷髏語今日寧求俗子知莫笑狂夫無著述等閒拈弄盡吾詩次韻李憲副留别一莖白髪未生鬢四尺黄金猶帶身歸去且看湖上月相思還慰嶺頭人情闗逺别詩難冩花不能言鳥為申紫陌朱門天上事華山都道不如貧次韻薛廉憲見寄華衮之襃非所敢當惟喜詩律之嚴整命童子作越聲歌而和之耳謹依韻一首録上不俟傾葢之愛與區區頌禱之忱一寓于此惟髙明察之嶺表生民澤可涯九泉吾恐躍枯骸豁開天日驚人眼指㸃江雲詠此懷弄釣不生鯨尾浪入山休攟鹿門鞋松根坐滿廬岡月夜引壺觴望泰階承白洲李先生見惠白米蛇酒香茗諸品不勝榮感用韻以謝舎釣開緘緑水涯偶来雲水弄衰骸即炊雪粒供朝饌便㵼蛇漿放老懷海上旌旗頻照眼城中塵土未沾鞋廬岡此日還精舍賔主何時更兩階次韻劉程卿至白沙七月紫蘭開我家是誰醉挿滿頭花千峰有客同文酒三日無錢落畫乂製錦手将龍補衮釣魚船載月横沙人生出處各有意敢向秋江問去車九日小廬山示諸友九日風光滿薜蘿一年天氣最清和泛花琖小潘郎醉擊壤聲高葉子歌東海傾心狂措大南山當面老頭陀謝生愛卜葵根宅説道葵根月更多九日下廬山秋風浩浩洗芳蕤瘦盡千峰鴈始飛南海一波長不定西山半面却疑非醉拈秃筆題蒼壁笑挿寒花弄彩衣樂意滿腔推不去狂歌待得晩鴉歸奉陪方伯東山劉先生往厓山舟中作且作東山管病翁乾坤今古笑相同高松落落都擎日寒水粼粼又起風附子大黄天下藥蟲妖䑕怪世間兇數聲鼔角滄溟暮竒石船頭鬼拜公東山至厓山議立慈元廟因感昔者夢中之言成詩呈東山海上一陵何處封劉翁今日問陳翁天翻地覆諸王世草死厓枯十月風慷慨尚餘精爽在依稀猶作夢魂通江山指㸃真還我棟宇商量果待公元日有懷楊榮夫示陳東淵今年酒不對榮夫来嵗東淵對我無人結静縁依嶺屋日浮春色上桃符哀鴻呌月今何向野鶴穿雲不受呼老得身閒須愛惜蚤馳虚譽費支吾代簡答林䝉庵先生空山嵗晩未逢君天許窮交只白雲賢聖中庸非我夢東南風月可誰分浪求去馬真堪笑欲報來鴻未有因千古遺篇都剩語晩生何敢復云云䝉庵問所著書次韻興化王太守諸公㑹飲顧通府宅見憶白沙聫句兀兀騰騰且白沙鐵橋嵗晚未移家子規枕上無人喚枳殻江邊有酒賒萬物有成寜免壞百年無喜復何嗟漁翁欲語滄溟外安得諸公共釣槎次韻顧通府擬歸索和章山居還有事權無童子朝朝告水符我得此生真得矣公知人懶不知乎一春花鳥篇章廢萬里雲霄羽翼孤惟有白龍池上月夜深來伴老樵夫眼中魚鳥異飛沉天損真誰不受侵别駕何須稱我病諸公那肯借人深三年入報天官政再命來腰刺史金何許幔亭君欲去虹橋跨月㡬千尋次韻呉獻臣明府白雲流出一溪閒照見人間笑笑顔年少不妨投書早路危須信着鞭難乾坤許我具雙眼名利真誰破兩闗千古伏波如白日等閒猶謗載珠還千古聖賢孰與閒頴陽剛好對商顔看來彭澤都無累歸去柴桑便不難踏裏嬌兒方偃蹇登高羸馬怯間闗思君坐歇江亭雨何處蒼烟鳥欲還小酌次韻清齋不厭紫芝貧夢裡衡山欲借春日麗好花花當妓水流孤月月隨人香醪數斗過伏臘高笠一流無主賔醉睡不知春事晩風飄紅雨㸃苔茵次韻世卿贈蔡亨嘉還饒平大厓居士此彈琴誰繫孤舟僻渚尋滄海我真忘僻逺雲山公肯到高深䑕肝蟲臂都歸幻雪月風花未了吟滿眼欲知留客意廬岡孤月正天心林子逢至白沙作示之舊雨還君紫菊詩秋風過我白龍池應看衰俗人情破肯放中流柱脚欹弄影果誰非稚子請纓正自不男兒人間若問逍遥化紫極宫中有一碑世卿赴順徳呉明府之召五日不返詩以促之何處千杯一放歌楚雲剛好共婆娑百年㡬見都難説一日三秋不啻過笑索梅花催拄杖照眠山月滿行窩高溪逺卜衡陽下却到而今夢更多今雨相逢聴此謌江門漁父老婆娑紫霞酒琖千回醉黄鶴仙人兩遍過遮莫支離親藥裹何曾造次出眠窩廬岡准備明朝飯小市津頭蚌蛤多一之夜歸自楚雲臺失足墜臺旁溝諸生拽出之予聞大笑與世卿各賦詩唁之力危掉却手中笻正賴諸公救得儂横加斷岸懸雙足滿吸清溝到㡬筒綿力不禁心轉怯衰年長苦病交攻無端輕洩天機破能躍能潜果在公次韻顧通判夜泊江門見示病裏春秋六十更酒杯無日不淵明還將白髪供人事自許青山不世情版籍又勞今别駕風花帶管老先生紅蕖緑浪江門路肯放孤舟半夜行送羅服周解館戀戀江門愧爾曹不離酒處見揮毫等閒嵗月抛鉛槧不賣聲名到桔槔㡬個兒童供白髪一年燈火伴青袍看花肯續春來約莫待黄鸝辭碧稍尋梅飲李鴻宅用服周韻應有花神候水西曉林香霧隔忩迷君謀萊婦肯沽酒我愛孤山來杖藜香影句中無樂府梅花村裡有招提東風未到春先到莫向南枝著眼低次韻顧通守到處能開觀物眼平生不欠洗愁杯窻前草色烟凝緑門外波光月蕩開歌放霓裳仙李白醉空世界酒如来春山㡬幅無人畫紫翠重重疊晚臺留世卿飲用前韻大厓居士且徘徊老婦家中喚洗杯園花當檻春饒笑竹洞封雲晝不開一冬菜飯留君住萬里風船破浪來若此詩情似坡老楚雲臺是妙髙臺與雷震東何處黄公客欲還黄公山亦小廬山往來雲水兩三輩粧㸃春風花栁間岳色曉行湘浦望湖光晴到洞庭看有詩都㸃逍遥送九萬扶揺一日摶與雷震陽近午黄鸝鳴樹樹深春紅雨落山山誰開燈火書帷地郎在丹青畫幅間醉墨收歸湘篋富狂詩抄與郢人看牆隈只欠梧桐樹髙翼還隨老鳯摶與李嚴野鶴將雛到海還楚雲歸夢㡬鄉山􅃵牆見我三湘外嵗月還君五嶺間杏苑不禁春意閙美人争捲繡簾看長安莫買乖崖醉太華長留睡老摶次韻顧别駕江門夜泊雲巻晴波千里白帆收落日半江明遥看烟際樓臺逈不受人間鼔角驚碧玉偶逢須著眼黄花已過更揮觥眼中别駕如君少傾到尊前接後生次韻伍南山賀碧玉樓新成脚底江山不浪開小樓占此是天裁光流南極窻前枕春滿東溟掌裡杯碧玉久亡今復見白雲朝出暮還來梅花又報羅浮信月上江門載影回百尺空中天眼濶三更月底夢詩成安排枕几還公睡已有䦨干信客凭鄉里過從盧行者海山或遇羡門生當年碧玉無留賦何處青雲更擬陵再和碧玉樓韻乾坤真妙此臺開一一皆因造化裁意了梅花難著句眼空江海笑浮杯未分無極源頭在誰畫先天様子来碧玉樓中閒隠几千千山遶又川迴讀世卿藎卿挽五羊鍾狂客巻次韻李家兄弟各才良誰為酬知水鑑光天地好人還自好古今狂者豈皆狂碧油帳遶青絲鞚紫錦囊封白雪章萬里平江能送我十年燈火夢淮陽次韻見訪春曉不扄巖上扉遶䦨紅紫欲開時花來勸飲誰禁得天不能歌人代之滄海滙為雙帶遶青山髙起百重圍赤泥居士来相訪袖取雲笙月下吹飲酒酌酒勸公公自謌三杯無奈老狂何坐㤀碧玉今何世舞破春風是此蓑一笑功名卑管晏六經仁義沛江河江門詩景年年是每到春来詩便多君莫停杯我為謌我今忘我是誰何避人懶弄船頭笛對影非無月下蓑廬阜春雲眠華岳江門秋水釣銀河竹弓挽住閒人手漸覺年來射鴨多再依韻答子長罇酒相逢喜欲謌眼中人物又如何山光開户青遶几草色停舟緑滿蓑東泛與公剛到海西遊去我莫踰河古今勝負彈棊手閒笑人間局面多聴到人間寗戚謌馬周無病謝常何江邊野艇眠依竹日出東山催着蓑自古或由詩入相如公真有口懸河山樓盡日同揮琖花落黏罇晚更多逍遥華頂放仙謌華頂不登君謂何仰攀明月天㡬尺中借狂夫地一蓑亦見軒轅來鑄鼎不聞夫子歎臨河赤城路隔芳菲斷一醉碧桃春更多張主事報林縣博歸過五羊用飲酒韻太白峯頭太白謌太白不歸天奈何風雨驚回一塲夢江湖拈起十年蓑山僧借諭葫蘆纒武帝收功瓠子河若道維摩元示病老夫當日病還多張地曹見和飲酒數篇復韻答之若比漁翁别調謌不将遺響弄陰何徃来釣瀨生春水多少歸人著舊蓑學士有牋飛紫禁張東白上疏乞歸東山無計謝黄河劉時雍修黄河閒人只謾閒料理春雨階前草又多将至廬山有作和呉兆麟欲翕還舒雲以之半陰半晴三月時君謌一曲來陶謝我把諸峯坐武夷岸夾桃花蔵釣石春來江水入園籬孤山蕩破廬山影看到廬山㡬丈詩和景浮遊山樹底樵歌鳥欲飛澗邊苔色上人衣碧雲洞杳春蘿合紫蕨山深舊路㣲問我行蔵今老大伴人遊走只童兒采芳莫道無年少領得濃香滿䄂歸青雲偶共白雲飛白雲閒映山人衣一路風光春淡泊隔林烟靄晝霏㣲江山到我無前輩造物磨人是小兒花下一壺休㵼盡明朝留得送春歸得世卿書訝其大略曠年為别此封書應是山人半醉餘海月開罇聊復爾楚雲回首問何如春來㡬處藩籬破老夢千年木石居笑割衡山共君老黄公何處且茅廬黄公世卿住處山名答世卿書報答還山第一書筆端有眼笑談餘行蔵付酒君亦醉兄弟論文我不如髙榻忝同他雨坐西山剛對此溪居因君料理安身處多少人間未結廬追和劉文靖偶得韻千峰賒月飽清真到處風花對賞新菊徑豈無蓮社酒逺師當與長官親經綸誰試期年手著述空嗟百代人安得畫師深此意不将朱白浪描春三復遺詩有訂頑月中顔色見松闗頭顱本自成三極嘘吸猶堪塞兩間老至不知何嵗月古來無恙此江山莫輕語黙論前代天與閒人賸與閒呉明府約過廬山不果使人送菊酒至用世卿韻答之合是先生酒處偏菊邊月下不能眠兒謌野酌三杯後花近藜牀二尺前大塊了空無極眼濂溪分付小圓圏長官解記廬山否略欠廬山一日縁次韻顧别駕奉寄彭司㓂序云别駕顧勉庵聞司㓂彭從吾先生得請致仕還莆賦近體詩二章賀之為僕受知於先生者不可無言既示之詩尋又以簡来促因述所間附其韻為和答之謌非所欲聞於司㓂者也今代為官到六卿閩中此老最光榮面前路濶身須退闗下人嗟代有名晩秫還家新釀熟溪鋤試手藥苗生相看不厭壺山好笑拂松根坐月明二疏誰叅漢大夫都門今賣送歸圗豈無經濟酬當宁已道頭顱非故吾自古功名闗寵辱㡬人廊廟不江湖木蘭之水清無恙以配先生不可乎嘉㑹樓上梁和顧别駕逺離聲跡入無無又向人間見此模老去虚譽深自愧古來名教要人扶每留半餉陪諸老絶勝扁舟在五湖頗憶當年興國寺樽前高論欲何圗用顧别駕韻奉答熊侍御逺之非有近非無草色花香造化模俄頃笑談飛鳥過丹青樓閣為公扶烟霞舊隠移匡阜水月新墪有鑑湖若個江山可蔵拙幸來相賞莫相圗夀王松坡用西涯韻清戎王侍御父雪晴騘馬自知津誰道梅花不是春玉節趨歸生日酒松坡未了白雲身父子箕裘真有是江山富貴小看人往來獅子峰前路洞口榴花㡬度新待黄太守見訪時當考績入京端陽春好是公開公莫朝天不放囘肯来嘉㑹留一日更傍梅花勸㡬杯踏歌漁父江邊醉吹篴仙童海上來問我擁旌何處客畫船撑月此徘徊病中冩懐世間賢智皆青瑣海上田家只白雲多病一生長傍母孤臣萬死敢㤀君諸公莫要連章説先帝曾將短疏聞何處擁旌來勸駕買羊沽酒惜殷勤總為功名欺白髪不將富貴薄秋雲雖然久病無官况每拜名香祝聖君九十萱親誰待老㡬莖竹主話空聞定山何處無來耗惹得江門夢寐勤送左秀才次韻脚底千峰不作難天涯相望㡬間闗孤村水月能看客一路梅花直到山畎畆未應同我病乾坤那肯放人閒東南更有春如酒肯到明年二月還雲蘿處士挽詩誰開三畆臥雲蘿洛下元稱安樂窩風月尚留詩巻在經綸只放酒杯多身將沙鳥還賔主情擁山花當綺羅四十五年成一夢乾坤回首悵如何次韻汪御史留别百代文章百代儒小将碧玉贊黄虞功名路上多塵土桃李人間見此夫頃以髙談知識量未聞俗態是規模不因指示晨雞唱白日誰知有兩徒張生以詩来謁次其韻答之閒坐蒲團㡬個穿晚留一影畫魚船日長睡榻千峰裡春近柴門五栁邊在處雲山皆我樂後来衣缽是誰傳諸生莫有登瀛步愛結而今病鶴縁八年春部書復至顧别駕以兩司之命來勸駕用舊冩懐韻賦詩見示答之恰恰啼鶯初變樹翩翩官騎忽穿雲杯觴花底香迎客鼓笛樓前閙送君老態一時都共見公謌三疊敢相聞白頭空有丹心在此望天遥感戀勤其二名教可尊誰敢後少年空有氣凌雲得終殘喘留将母直擬孤誠死報君俗變唐虞今日計徳高堯禹萬方聞太平何處無歌頌卧聴蓬莱擊壤勤贈林府尊收斂精神入太清藉茅無計遣書程兩三别駕風隨動十數花封月最明露冕江山無愧色攀轅天地有真情東風欲别仙城樹滿路啼鶯是頌聲夀月溪翁為順徳主簿張如玘花影揺溪水半篙晚風送上釣魚舠乘流曳轉波間綫擊楫歌翻月下騷元亮此生惟盞酒瑤池何日更蟠桃隣封主簿徴詩急再拜江門致幣勞次韻鄺筠巢早春見寄城郭塵埃不到身扶溪看老百回春里中物態渾非舊牆外桃花只賣新此老直於三代見諸郎雖在一官貧楚天何處堪回首目斷襄陽不見人次韻王樂用僉憲見寄七十餘年未覺新躭眠猶是向來人春杯斟盡啼鶯外晩笛吹殘釣渚濵人世謹防開眼錯此懐得恐到頭真青山果是無心出何處眠窩共卜隣次韻孫御史别後見寄㝠㝠宇内繆相賢處世如撑石瀨船赤土喜逢三日雨清談留到二更天山中宿鳥知投樹水底潜魚不離淵明日畫船賓不顧游龍翔鳯有來篇白髪滄波了嵗年偶逢佳客話延縁鳯毛五色能驚世駿骨千金表好賢索莫杯盤津口月掃空雲霧水中天寜知此地千年下追詠能無千載前次韻張侍御叔亨見寄月出不扄溪上門白頭漁父向人言扁舟自唱濯纓曲四海共知明主恩小飲未嘗沽市酒狂書時復弄茅根相思也有臺官夢夢見當年住處村家國不分無二門君今與我皆忘言五倫首重君臣義一體元同骨肉恩長養嘉苗休失實剪除惡木不留根他年我見張文獻異代風流嶺外村北溪容球來訪答之孤月正酣東閣睡清風又到北溪船看君逈出諸客右問我何如十載前劍氣燭天堪引望桃花照眼未須憐山中碧玉仙家物已證先生作睡仙三月風光遍海埏誰家園裡棹觥船一身燮理三杯内萬古乾坤半醉前㡬度寄書言自愛何人挈榼荷相憐自從托契中山後却笑他仙是鬼仙鄧俊圭喪兄慰之每恨思君不見君一哀何處隔秋雲客來每及難兄問訃至那堪故友聞碧玉三年空枕塊廬岡四尺自封墳青天㡬度看明月骨肉無言兩地分次韻王叔毅𢎞行人見寄駐屐花邊聴鳥音青山何處想登臨肩頭伊尹方能任脚板鴟夷未了心歴歴更冝觀往古炎炎何敢羡于今相逢杯酒喜共醉相憶詩情還自深高樓何處可逃名説著衡山便有情不住三年思乃舅可無一字寄金陵麻衣豈是無高論若水還應作貴卿他日五峯供我粥不知誰是老門生次韻余行人濂見訪年富豈知行路永眼高猶喜閲人多荒村古木雲長鎖白鳥青天水不波老竹忽看高鳯下短墻無算小蟲窠憑君寄語東山道神禹無功在九河贈劉秀才江門舊雨長公詩今日江西學者師𢎞治以前無此詔宫牆之内少人知詩書豈但供時好進退多應與世疑百嵗光陰同轉瞬老夫雙鬢已如絲次韻答張天祥秀才十處尋芳九處空逺隨溪舫訪溪翁請還几杖歌春鳥學製綸竿弄晩風㡬樹江山憐晩暮十年遊走羡兒童張生來問衡山道又問衡山孰我同次韻孫御史擬弔崖瞬息人間三百年尋常興廢不須憐崖州此死終無補中國何年壊守邊信國不來知有罪魯齋當仕豈忘天太空不語乾坤病萬嵗千秋老淚漣容彦禮率諸弟同在館下彦昭彦禮彦貞相繼而逝彦濳今又卒感而有作水光山色兩依然不見當年載酒船老我交逰疎後進君家兄弟散朝烟兩峯彦昭號脚蹟今安在彦昭常逰永豐江浦謁羅一峯莊定山彦禮碑詩久未鐫某欲為彦禮墓誌未刻莫道江門空識我千秋遺話及璣璿悼彦潜用原韻山樓耿耿夜燈然誰借東良一日船淚逐花溝因暮雨愁迷鵑樹慘朝烟養生有命妨新學入社無題侈舊鐫塋次若将昭穆定九原新兆有東璇次韻劉少叅嘉㑹樓九曲江邊一小樓滿川風雨夜來收扁舟東泛桃花水香徑旁通杜若洲樓下脱蓑眠翠浪樓前揮袂揖浮丘公來二月春多少兩度詩筒向此游天氣初炎過此樓江邊春色未全收烟消垂栁初凝岸風逓平荷尚隔洲破屋數家還碧玉好山何處更丹丘兩公勝㑹真難遇結綺臨春是别游寄李世卿再過湘江踏浪過一帆西去傍烟蘿家臨漢水心無住人到衡山興亦多豈是兵戈愁阻絶不因婚嫁笑蹉跎白鷗肯信閒於我也解忘機浴逺波湖北竹枝高自歌釣絲千丈引垂蘿烟霞脚底真曾到嵗月人間頗厭多雲水與君終浩蕩題緘寄我莫蹉跎秋風税駕衡山下共泛清湘明月波次韻張東所元旦見寄未到朱陵古洞門一封先荷沈公恩睡窮殘臘還憂病吟倚東風欲斷魂紫葢不知誰是主青天無盡鳥空鶱山人只合山中老一嵗桃花種一根再用韻答黄大叅見寄數篇何處好懐開疑是江門得意回嘉㑹樓前曾駐節芰荷香裡小持杯急呼童子燒香讀重遣黎生送酒來咫尺端溪不能到只憑清夢與徘徊别來幽抱不曾開長夏思君日㡬回使我能吟白雪曲須君共對紫霞杯凋零老鬢尚未巳狂殺春風肯再來莫為廬山動歸興紫薇花下少徘徊答鄧督府不見如今五十年賢闗風韻想依然衰齡我有無窮朽督府公通第一箋願托經綸均嶺海莫辭將相作神仙孤山鶴啄孤山月不要諸司費俸錢次韻臨汀鄔先生水滿江門弄釣時一篇誰借病翁詩忽聞天外舒長嘯都與人間作廣基海月偶紆南海望風花未遣北人知欲知此後相思處千載神交在舞雩贈童子久住侍父入京還著小坡隨長公天葩未吐孝經通青襟誰不羡童子白髪我徒成老翁曝日家聲從此大凌雲氣魄葢人雄曲江清獻鄉先逹敢道後來無此風三贈文都小住江門四十年隔坡相應荷相憐窻開四面客通刺酒覆三杯月到船身上紫袍知有相畫中碧眼亦真傳明朝庾嶺高回首萬里晴波正接天静軒次韻莊定山崆峒道士出山頻還入崆峒作主人當説夢時都是夢未逢真處更求真蒲團坐破千峰目信手推開六合塵無極老翁無慾教一畨拈動一畨新次韻奉答廷贊别駕王先生見寄年去年來無復年浮生此夢尚依然不知草閣千峰外坐到蒲團㡬個穿馬跡交時駑亦進鳥鳴哀處鳯還遷兖州别駕憐同姓不欠人間二頃田次韻梁平樂見寄江山吾愛艶陽天花栁青紅共一川眼底秪應無外物筆端何病不能圏㡬畨作夢因何事兩度傳緘莫有縁共語喜逢丘御史沉疴端為長官痊次韻答太虚上人雨過山中百卉寒人間回首又春殘徒聞有病肱三折未試回生藥一丸石洞棲賢終苦節太虛持律最清端年來雖闡蓮經教却與無言是一般次韻沈督府見寄誰是朱陵洞裡人世間此畫合描真一瓢未醉山中聖七字先傳筆下神青玉有期看我老紫芝無語為誰春還公一岳一萬丈半㸃飛雲是近隣不住東西四百峯鐵橋山淺笑迷踪喜聞世外無塵地來伴巖頭掛月松藥鼎便分煨芋火道人元是賣薑翁先生數上衡山頂紫葢峰前望白龍夀呉黄門母何處思親錦巻封荷花高映夀顔紅喜看遝雜來天上不覺依稀是夢中㡬嵗風光依北極半簾月色見真容不辭頌禱遥相賀却對江山語未工用筠巢翁韻兼呈翁酒處能歌未盡陶還從酒處説功勞每因興去開三徑日對花來醉㡬遭春意滿胸成浩笑花神覿面見揮毫南山向晚無真意只謾悲吟也未高邸報劉亞卿先生以今冬十月得請還東山喜而有作衡岳五峰青貼天諸仙高步碧雲巔特書八字非常見遣告三生是别傳一壺想共朱陵酒七字先哦紫葢篇紫葢山名今夜江門看邸報東山元與岳相連和答李子長見寄賢聖由來病有之那堪一病屢移時心寛不怕思眠早性慢終應得老遲白首喜同湛雨坐青燈細話子長詩定山却喜劉文靖賢輩如何都不思次韻莊定山曲阜道中曲阜之民如崇陽五畆之宅樹以桑太牢不驚天子詔百里豈負聖人鄉争得緑蓑挿羽翼可憐白髪來􅃵牆先生也未忘洙泗獨立源頭一詠長次韻莊定山謁孔廟六經如日朝出東夫子之教百代崇揆之千聖無不合施之萬事無不中水南新抽桃葉碧山北亦放桃花紅乾坤生意每如是萬古不息誰為功卧游上游荘湛民澤上游洗足意如何到我來時還放歌秋半寫空迷菊酒月明舞爛釣江蓑閒将野馬為賔主笑把山花當綺羅人道上游真個好上游固好遇人多黄雲之高高㡬何黄雲山人發浩歌短響入雲白雪曲長裙拖地赤藤蓑黄鸝自愛蔵深谷野鶴高飛出罻羅山路相逢休問訊山靈掩口笑何多次韻張主事答鄧督府萬古人心萬古天江門漁父笑空眠幸逢嶺外千山静共荷臺端一老賢羣趨豈尚班行簇美譽當令世代傳却憶東山天下望不留今日鎮三邊撥悶謾書撥悶江樓病有詩詩成即事直堪嗤江山莫歎無前輩造物何嘗不小兒物遇嵗寒形至性天于定後見真機大易發揮羣聖達碧玉山人近有詩自怡堂為增江湛演題民澤世父也十畆林中半是塘一蒲團卧花中央百年真樂起人世萬壑清風在此堂洗足正當鐵橋水振衣小坐黄雲岡四百影斜孤頂月任是神仙也括囊丁長官祠秋祭示里人蒼凉月色皎秋晴海濶天高思已㝠當日疲癃均乳哺于今畎畆盡牆羮一祠已表桐鄉愛列傳還須國史成霜耀星華朱鳥上水㴠山骨鐵橋清夢莊定山遣使來問夢中以詩答云定山歸後再清康夜半呼兒喜欲狂夢遣長鬚來問病故應早嵗見羹牆文靖一生隨老筆太虛四大作禪床南北地殊生異世先生何處問行蔵曉枕碧玉山樓曉枕眠獨吟樓上笑陽闗人世誰為兒女態道流空説化形仙衡岳開山秋正好舂陵望岳地相連碧雲野路無羈絆五尺丹藤兩屨烟答雪齋先生惠厯滄波老父多閒日碧玉先生著破巾一榻久便深谷卧百年長借内臺春新書每用知時令寵貺多應及里人鶴舞雲飛皆得意坐看百粤盡歸仁次韻吾縣博見寄黄菊開時霜滿林山風吹冷薜蘿襟肯忘沂水歸時詠也到廬山酒處尋自得不須言有命太虛元只是無心白頭不作人間夢一笑江門契亦深次韻鄧督府見寄眼看百物隨時過路有千岐到處多想見精神官裏坐不離文字手中摩白衣管領千峰醉黄菊商量九日謌堯舜浮雲無一㸃廬山何敢更嵯峨衡山和李子長見懐欲過江門新詩把讀大開懐久病諸生擬到崖身上緑蓑都舞破雨中黄葉忽飛來酒逢菊日何人送子長八月五日書至江門與重陽尚隔一月已言菊日者識喜也詩人興到落筆類多不實如此云月照柴闗每夜開廬阜歸來見束髪華陽巾好為君裁秋來風月不開懐暮遶朱陵百丈崖青玉拂開壇上舞紫鸞摶入手中來野心雲水潛孤笑老眼乾坤病一開誰道李家無子弟紫㝠句在不堪裁再次韻答子長懐極開懐是惱懐捉君手拍到天崖杖桃南極星隨去人到西山鳯不來久坐或聞仙馭過登高時見洞門開誰知山石書題遍笑倩何人為總裁次韻汪鼎夫侍御夀母生日可恨白雲無羽翼白雲朝暮在江南君親於我皆無盡忠孝須君兩不慙錫命有封當第一折肱治病不論三高堂夀斚重陽近又借黄花一度酣次韻吾縣博登嘉㑹樓見寄醉下江邊百尺樓浩歌一曲有陳留想當詩舫忘眠夜正是廬岡見月秋青紫要途何足顧江湖豪氣未全收去尋野馬氤氲地即是人間第一流贈林教諭汝惇舞雩聲響在春殘只隔人間㡬片山偶此通名秋竹院共君弄艇蘆花灣常於嶺右觀諸夏剛被梅花送一寒普贈乾坤唯一㸃萬古長留宇宙間贈鐫者何侃一鐫一字一磨礱萬嵗千秋感激同未蠟碑前元屬我到書丹後却須公萬里雲霄回鸑鷟滿池風雨舞蛟龍不知費盡閒心力誰傍斯文與計傭贈何侃如潮州刻三利溪記用潮州見寄韻咫尺荆州地肯容清光偏照蓽門中獨憐孺子才堪賞不道詩人巧更窮已見千碑傳好事可辭束帛聘鐫公潮陽父老如相問為説周陳共此風九日和朱子韻示陳冕正是詩忙酒亂時滿樓風雨不湏歸碧苔院裡多秋色紅樹溪邊又夕暉九日共餐花有菊暮年誰羡錦為衣滄江野艇來何處遥望孤雲在翠微答馬龍惠筆揮毫殺盡山中兎雪管秋風又到門入手當為天下技秃頭終瘞水邊材八分墨妙還江浦科斗書成也状元思與兩賢同把筆夕陽江郭斷離魂未推賢輩上騷壇宗廟前頭有一門已近宫牆窺此道恐如遊騎走他村圗書有秘誰先覺坤復求端我亦元到得滿懐風月在不妨行坐弄吟魂示諸生無我無人無古今天機何處不堪尋風霆示教皆吾性汗馬收功正此心水火鼎中非玉液鴛鴦譜裏失金針道人欲向諸君説只恐諸君信未深浮生擾擾白頭新又見人間一度春爾輩何時宜發憤老聞夜雨欲傷神此身天地逢人少落日江門呌鶴頻為報楊朱莫相笑孟軻不是褊心人聞緝熈授平湖掌教偶從道路得行藏南北音書又一鄉溟海心情真自逺平湖風月可誰將山中舊坐香根老耳畔新聲木鐸長衰病未知何日起扶留窻下正抄方次韻廷實示學者樹倒藤枯始一扶諸賢為計得無疎閲窮載籍終無補坐遍蒲團亦是枯定性未能忘外物求心依舊落迷塗弄丸我愛張東所只學堯夫也不孤讀茂卿次韻呈定山先生詩有夢入羅浮之句用韻寄答時世卿在白沙鶴避茶烟信有之買田招鶴是何時百年睡息深華岳九曲歌聲斷武夷有客到齋言種樹呼兒挿栁當編籬誰知萬里東橋月夢破羅浮亦有詩東橋茂卿住處彼此衰榮更共之年過六十是衰時藜羹頗恨無萊婦卉服都忘在島夷水暖河豚吹細浪露寒秋蠏過疎籬江天好景無人畫每要先生藉入詩太虛上人以所註定山種樹詩見寄喜而賦此兼稿呈定山四十年前從事勞老來萬首放詩豪這回種樹心全了若個山僧眼總高尖送定山居寺近音來南海與神交白蓮不結楊州祖賔主依然是逺陶追次康節先生小圃逢春之作時物紛紛共鬬妍好春多在語鶯邊傍花隨栁我尋句剰水殘山天賜年竹逕旁通沽酒市桃花亂㸃釣魚船而今我愛孫思邈自古高人方又圓悼李九淵九韶已死徴君老我與深之事偶同此夜北風吹白髪舊時明月對蒼松聲名還許輩流上嵗月忽消鉛槧中莫笑腐儒無厚業尊前又手鳯駒鴻過康齋呉與弼先生墓桐園三尺聘君墳猶有門人為掃雲此日英靈應識我斯文風氣莫如君吟殘老杜詩千首看破伊川易㡬分未了平生端的事九原風露倍酸辛弔鄒汝愚謫石城少年為意儘峥嶸謫死天涯二十春舊雨不留花縣榻秋風還閃石城旌兒啼母絶家何處水宿山居路㡬程人事每將天不定文章何用博虛名江月無光江水寒角聲杳杳夜漫漫孤兒嵗月初離乳夫子風流儘葢棺身後豈知名可貴世間長苦路行難鴟夷不亂當年計還得雲門枕上看弱女孤兒哭作團歸槎渺渺倩誰看乾坤敬士此邦伯生死交情非長官逺陌不堪窮望眼寸腸何直百憂端欲陳薄奠無由致園橘山蔬領一盤脩短榮枯分各該荒江落日為誰哀詞林當日人如夢唐肆今朝馬又來功利紛紛難入手乾坤滚滚負多才若將禍福論天道顛沛如公豈理哉留别諸友時赴召命臺書春晚下漁磯中嵗行蔵與願違鷗鷺自来還自去江山疑是又疑非難将寸草酧萱草且著鶉衣拜衮衣但得聖恩憐老母滿船明月是歸時崑崙西北是官陂滅跡烟霞我自遲獨往恐逢江上雪相思還寄隴頭枝風雲想見千年㑹消息終還七日期總為髙堂難離别乾坤行道豈無時欠服松花一大車顛毛垂白齒牙疎非闗聖代無賢路自愛清風卧絳厨道上或逢人賣屨眼中誰謂我非夫他時得遂投閒計只對青山不著書鈞渚風長裊故絲水花含笑海鷗疑都将老子行蔵意分付東溟水月知自昔願從巢許後而今豈異帝堯時憑君寄語張東所更與飛雲作後期石門次林緝熈韻與君傾葢定前言來往青山十五年老我自知難用世勞君相送過貪泉清言晩對江邊寺離思秋生鳥外天留取西華一樽酒春風還擬上江船孤舟昔繫飛來寺白首重來十四秋君看秋風吹彩鷁何如老子坐青牛留情世事終何補得意雲山亦易休見説䕫龍滿朝著九重應許放巢由不寐一飯不忘溝壑心白頭氷雪更相侵妻烹野菜供晨饌兒㸃松燈對夜琴賦拙但留司馬壁碑成不賣退之金無端婚嫁相料理獨聴疎鐘到夜深次韻張東海老去人間久廢談青衫不改舊圖南道超形氣元無一人與乾坤本是三何物坐中春坱北㡬時鏡裏雪䰐鬖白沙詩語如禪語試著南安太守參南安贈龍溪李知縣玉枕山前逢使君西風吹破玉臺巾手中玉斚休辭醉鬢脚黄花别是春鳯厯流年供俯仰龍溪他日看經綸憑君若見蒙菴老為説于今白髪新回岐道中回岐接水樹㝠㝠又是朝京一日程兩耳如聞重譯語㡬時不見五仙城朝無兒稚歌行酒夜有巡船卧打更欲識羈情多少在崑崙深處白雲生聴秀夫誦定山先生之作高格英風忽兩聨故人耳順是今年誰還敢擬三千首我也前知八百仙淡淡菊花秋滿把陶陶松蟻日高眠定山倘許吾扳駕突過堯夫擊壤前廬阜書舍和潘百石半畆還叨地主恩北來岡阜亦稱尊水揺荔子紅當檻雨洗萆蔴緑遶門飯後一床便獨卧晡時三􅊦喜㣲温何人為借丹青手冩過書齋也未村一飯區區亦有恩千秋罍洗定誰尊先生終日卧隠几童子㡬人來掃門晴旭滿窻啼鳥亂春寒如酒著人温江門烟景還多少獨倚寒松望逺村青山别様與人恩絶勝黄金買得尊從此往來喬木下可人風日短籬門窻臨緑沼晴曦動爐有丹砂伏火温莫道我無徐孺子又同廬阜又同村滄溟著艇未還恩又結廬岡土宇尊六十乃扶居士杖尋常不過酒人門江山儘放襟懐濶風日頻來笑語温只欠一詩閒道破無人走告定山村城中借竹且䝉恩竹在崇岡竹故尊萬里滄溟都座下一條官路自江門長驅李白詩中逸不舍堯夫酒後温笑問地官張主事病翁今日住何村程鄉學生鐘宏求社學記贈之千里來攜欠一圖東南村構㡬糢糊人扶世教何妨切老向斯文自愧疎雲谷許還徽國主周溪流到長官居秋風海上無窮意也向程鄉社學書陳秉常雨中看栁種得東風栁一千江山意思日無邊閒遮一老青春坐更縳孤舟白日眠近水雲烟相隠映他山桃李自嫣妍莫辭細雨頻來看争得風光在眼前四言詩題畫松泉為張别駕吉水流石澗生兩松樹洗耳掛飄無此佳處幸逢堯舜那無巢許撥悶久病在床展轉莫舒我欲觀化有握其樞人有善願天必從之我病㡬時我念西馳我行次且如飢思食如寒思衣動惟厥時匪亟匪徐魚躍鳶飛乃見真機天豈不知天偶遺之吾將尤誰我聊任之撥悶以詩示湛雨有學無學有覺無覺千金一瓢萬金一諾天命流行真機活潑水到渠成鳶飛魚躍得山莫杖臨濟莫渇萬化自然太虛何説繡羅一方金針誰掇示黄昊高明之至無方不覆反求諸身霸柄在手與民澤聖人之學惟求盡性性即理也盡性至命理由化遷化以理定化不可言守之在敬有一其中養吾徳性五言排律月桂自白石移來金粟初分我花仙不吝人烟霞三畆宅草木百年身影入青霄舊香傳白石新為誰工態度本自惜精神翠竹旁通徑緋桃正隔津生憂兒女狎莫摘老夫嗔坐久風回席行遲露在巾當時尊玉茗平地隠氷輪收斂還真性生成荷大鈞相逢山水地一笑武陵春貞節堂栢栢下拜羣孫年華栢既尊皇風動高葢聖澤溉深根一事堪詩傳千年仗魯論撑空疑有力印月自無痕日出江門近春回海角暄細香浮竹院深色映籬門身謝看花塢家貧賣酒村陶然緑陰處髙枕弄吾丸景雲田蓢尾蓑笠堪從事少年農圃情乘潮打兩槳落日照孤城山廟題詩過汀鷗伐皷驚提攜新耒耜寂寞舊棋枰挾被防春冷擁書讀晚晴兒曹依本分吾道在躬耕旌節亭瓦雀瓦雀喜亭棲丹青意自迷雨餘穿麗日花底啅香泥並語聲全碎追飛羽忽低悠悠去繒繳欵欵戀榱題卵育非無地兒羣或引梯慣行書案上漸滿井欄西不羡雕籠養真堪畫巻攜由來親白首那更避青藜狎久如私眤喧多類滑稽行蔵非社燕飲啄溷家雞度嶺千回歇排風㡬寸躋冥鴻於汝輩滄海一涔蹄七言排律王僉憲問一謾述客來問我一如何碧玉高樓夜夜歌廬阜一壺開我酒江門八尺贈人蓑杏壇多士無顔子洛下遺書病首科且就玉衡觀轉運那曾珠斗見森羅古來相遇難如此無怪人間説夢多南海祠下短述虎門千頃雪翻騰中有長鯨鼔鬛行看弄漁舟移白日欲抛塵土住滄溟江西不得誇彭蠡李白何須醉洞庭天際有山皆古色水邊無樹不秋聲一春桃李風吹盡萬里乾坤雨洗清畫舫乘空書巻白晴霞映水布衣明不辭海上兒童識亦有祠前老樹精嵗嵗放歌來此地晩年偏喜不簪纓代疏答五羊諸友白頭哭子豈堪聞信有𤣥穹怨不仁精爽已歸千佛國𤣥纁未贈九原身求之夢後心如失病是愁中藥不神鬢脚又添今日白庭花何異昔年春東君此意誰分付又遣黄鸝喚向人古風歌行聴李深之説緑護屛聖池歌天風吹斷雲㝠㝠陰崖露滴池水清牧童投竿蛟龍怒空山白曰雷霆驚好事何人解尋􅟪李生為我言歴歴安得健步上峥嶸萬里直見滄波横更憑猛手碎嵯峨一徑宻遶青松多池旁是我安樂窩近者青松逺滄波紅塵溷溷如吾何除夕呈家兄去年除夕色未槁今年除夕兄已老小弟朱顔不如昨但説窮通無醜好山中茅屋二十年日月逝矣如奔川兄弟五男并四女啜菽飲水同炊烟慈母年高白髪少二十孀居憂未了眼前黄口那得知爭􅟪梨栗相喧炊我年未老筋力衰耒耜即付大頭兒童牛生角禾登壠為我且給通家麋别蒼梧席間呈謝大叅段都閫蒼梧城中三日雨曉坐肩輿辭兩府叅西藩者謝大夫枉與段侯同出祖麻衣搭颯濫西席對坐一文兼一武三人相逢豈易得一金便作華筵主酒酣擁葢回仙亭立馬蒼茫别容與贈陳冕南有滄溟水北有崑崙山我屋正在溪山間瞻望不逺行實難白雲朝暮常漫漫桃花欲開梅又殘問君此去何時還過端溪硯坑峽雲鎖斷端溪水白鶴羣飛峽山紫獨憐深山老鴝鵒萬古西風吹不起安得猛士提千鈞亂石溪邊夜搥碎行路難潁川水洗巢由耳首陽薇實夷齊腹世人不識將謂何子獨胡為異兹俗古來死者非一人子胥屈子自殞身生前杯酒不肯醉何用虛譽垂千春修外海赤坭嶺墓作赤坭岡頭封馬鬛生荆死竹無日月晩生曾孫賤又劣仰首蒼天淚流血載鉏入山日已决北風吹我篙櫓折悲鳴中夜聲嗚咽曉踏荒山馬蹄熱開榛伐樹功務㨗指揮羣僕口喋喋須㬰豁見天然穴高下山川甚蟠結西南諸峯青不絶東北漫漫海波貼向來淺土悲滅裂再握又恐靈氣洩復以𤣥石置墓碣永云雲來千萬刦人生貴賤那可必下山復作兒女别釣魚效張志和體紅蕖風起白鷗飛大網攔江魚正肥㣲雨過又斜暉村北村南買醉歸秋雨書事寄黄叔仁嶺南氣候殊中土七月初窮乃無暑樹杪晝蒙宻宻雲簷前夜滴絲絲雨忽聞海上長風生巻入寒城翳鐘鼓東舍今晨母歛兒西隣昨夜夫葬婦人間生死不可期慟哭蒼生奈何許與黄叔仁乃父題東溪巻并引昔余大父渭川府君居此溪上與黄氏故鄰也去之六十年矣閲此巻有感而作春烟漠漠溪溶溶鳥鳴終朝低竹叢桃花亂落溪水紅白首一人扶一笻醉中忘却溪西東誰載咿啞進酒篷朝歌夕舞煩兒童吾廬若在兹溪上如此風光不讓公憫雨寄叔仁去年無雨榖不登今年雨多種欲死農夫十室九不炊天道胡為乃如此自從西賊來充斥一十九年罷供億科徴不停差役多嵗嵗江邊民荷戈舊債未填新債續里中今有逃亡屋安能為汝上訴天五風十雨無凶年得林憲副待用書奉寄午枕起攀庭樹株見戴白笠送君書開緘快讀不見字世間滚滚終何如傾葢一談未可少悵望萬里徒區區願言保此無壊身烈火不解燔空虛自伍光宇墓還登蓬萊絶頂故人墳前澆我酒白日欲西回馬首磴危道險不可躋下馬長鬚扶兩肘三步一噫五步停引絙出舌肺腸鳴此時平地慮闕昂首十丈梯闕以手捉僕肩以足踏崖頸躋攀欲上分寸闕恐翻身落深阱山北鳴鵂鶹山南呌􅚗輈豺虎伏莽闕令人愁小童魚貫上復休絶頂闕一望隘九州弱水涓涓闕一杯滄溟流穹然青者吾羅浮神仙葛白俱蜉蝣湖西先生去十秋五羊詩客徒淹留數公陳迹或可搜死者已矣吾何憂後來諸生繼前修努力莫倦蓬萊遊有鶴寓懐先闕有鶴獨睨臨江樓雪衣闕幽問爾莫是蘇耽流蘇耽一去三十秋人間膏火不可留欲往從之嗟無由鶴聞我言九回頭欲去不去増綢繆四野無雲風颼颼奮翮萬里須臾周顧我闕非丁侯蘭蘭兮蘭兮翳灌莽棘刺蒲芽遞消長野竹抽稍一千丈巨石盤雲覆仙掌鶺鴒三三兼兩兩鼓翼飛鳴齊下上仰視𤣥穹極高廣稊稗瓦甓皆真賞半酣一爬誰老癢五羊城中鍾雪舫答惠菊玉臺山中冬酒熟玉臺氤氲聞紫菊香㠶帶雨來山家九尺一莖紛天葩主人持酒向花笑坐下無花詩不妙近者擊壤歌二千菊花之音如響泉陳村老人植菊手玉蘂金華光照牖世人有眼不識真愛菊還他晉時人一瓢酩酊廬山下萬乘之君不得臣讀東坡年譜坡翁春秋六十六脚債一生償不足黄州去後惠州來無何又向儋州宿瘴雨蠻風經㡬時放歸旋就昆陵木熈寜以下至元符中間老稚圍船哭婦女倉皇吏卒欺坡翁已就臺官獄平生幾册篋中書一一旁搜付回禄西望眉山不知處俯仰乾坤何局促假令坡翁活百年長領詞官稱玉局氣節文章古所難先知孰與愚公谷丈夫當自慎出處何爾呶呶䝉毁辱戲題張千户畫松張侯畫松人不識松不畫横惟畫直上干青霄下盤石倒巻蒼龍二千尺神物安可留屋壁變化虛空了無迹不然恐遭雷斧闢左手執弓右持㦸取勝無過萬人敵侯莫畫松費筆力夢匡廬老年心折何處山昨夜夢鼓潯陽柁九天無雲瀑布飛聲落長江震呉楚望湖亭邊延五老逺之近之無不可欲攜五老還滄溟一囊又借長髯我與世卿同遊厓山作海風晝號山木折墨浪夜撼蒼厓裂有廟於此昭臣節吾昔大書吾腦熱天冠地屨華裔别萬古不使綱常滅角聲嗚鳴旗獵獵樓船將軍過擊楫楚客傍觀黙無説肝腸裏有三公鐡南山老人紅玉頰久坐松根待明月題梁先生芸閣聖人與天本無作六經之言天注脚百氏區區贅疣若汗牛充棟故可削世人聞見多尚博恨不堆書等山岳舍東丈人號芸閣髙坐松根自鳴鐸摳趨童子慎唯諾口授心傳為小學孝經論語時叅錯子史平生盡拈却寄以斯名聊自謔講下諸郎頗淳樸誰敢作嘲侮先覺讀書不為章句縳千巻萬巻皆糟粕野鳥晝啼山花落舍西先生睡方著題馬默齋壁屋後青山屛翳合簷前緑樹烟花匝主人閉門履不納跏趺明月光遶榻客來問我笑不答但聞山鶯啼恰恰橙橘盈園野芳雜門外一江深映閤四時八風誰管押烟飛霧走龍騰甲拙者孤舟持酒榼成化十年甲午臘偶得衡山西遊何時還暫寄漁蓑水石間又恐風吹江日殘扁舟打落蘆花灣教兒且築大雲山可左言贈憲府王樂用歸瑞昌可可可左左左費盡多少精神惹得一塲笑唾百年不滿一瞬煩惱皆由心作若是向上輩人達塞一齊覷破歸來乎青山還我白雲滿座莫思量但高卧贈左明府考績之京六十花封一高要高要得公當不小阿衡事業世豈知天下經綸此中了百里萬夫大小同語默出處非殊調君今老績赴天官我只弄我江門釣力疾書慈元廟碑記北窻一榻羲皇前青燈碧玉眠三年慈元落落吾所憐兩崖山髙青閣天崖門之水常涓涓一碑今為東山傳虚言不扶名教顛久病江湖落日前嗚呼此意誰與言墜牀詩母子之愛天所維廬岡數步扄幽扉近者夢寐常追隨墜身床下如僵尸把火來照我為誰久病不死長命雛側身東面魂依依六月十夜枕上嵗嵗與年年㡬見春秋過枕前有時自放春風顛堯夫擊壤歌千篇大醉起舞春風前碧玉不知今㡬年望望衡山眼欲穿世卿兹來何延縁枕上江門水上廬山顛蒲團展卧羲皇前洗手一弄琴無絃江門之水常淵淵月光雲影江吞天安得古今名家如劉文靖莊定山題一言洞視千古如浮烟江門水與銀河連又何必棲棲向釣魚臺上来打眠夫然後信性氣果江湖行蔵動星象同符羊裘老子未化之跡可見之形以為曠世之賢而思齊其賢也耶示諸生江門洗足上廬山放脚一踏雲霞穿大行不加窮亦全堯舜與我都自然大者使問躍與濳守身當以藩籬先世間膏火來熬煎市朝名利相喧填百年光景空留連丈夫事業何由宣昔者緑鬢今華嶺嗚呼老去誰之愆病中寄張廷實用杜子美韻碧玉丈人天性直長以語人人不識胸中一部蓮華經江雲浩浩江泠泠時取黄鶴樓中老鐵笛傍崖吹之江神斂袵無人聴安得張乖崖來分與衡山一半今日在衡山為我作粥便是當年事業成與謝天錫先生大事久未襄造次千人不啟齒先生老窮旋渦佛滅頂驚心羅漢水麥舟遇我葢非難凶嵗探囊誠未易佳城許讓白牛岡借助希㣲非我意為我寄聲謝韓子紛紛薄俗古今然所幸男兒窮有志後山之後豈無人百丈中流看砥柱民澤自白沙館告還謁母故以歸為望黄雲山人風韻竒擊壤亦唱堯夫詩頃者省母増江湄梅花雪月如見之西風千畆稻埀垂再把葫蘆斬纒歸山門莫作兒女態陽闗三疊走嘘唏黄雲乃民澤所居之洞也贈黎申兼呈克修梧州蒼梧夜雨連床廬阜冬㠶獨透夢中彩筆子須投海上黄雲我當種短歌送子子合知無病呻吟何足諷王樂用僉江門看病别後賦此木葉吾衣草吾屨鳥解唱歌花解舞天際虹橋萬丈高袖裏青蛇三尺許破㡌衝開華頂雲西望衡山久延佇堂堂名教天命之六六洞天誰是主五羊城中老法星日昨江門看病去感事示黄生叔仁親老需甘軟家貧乏囷倉賣文應不免為恨故難忘揮俗黄生激辭賓子覺剛爾曹雖得罪無愧在門牆陳白沙集巻八欽定四庫全書陳白沙集巻九明陳獻章撰五言古詩補遺聞陳宗湯湛民澤欲過江門遇􅄓風不果用張廷實韻寄之斬蛟須射虎水石敢誰欺老夢不知逺客来何怨遲千休千處得一念一生持衰白如曽見斯言或可依與民澤漠漠黄雲岡珊珊鐵橋水宇宙㡬千年洞天今有主借問子為誰平生子湛子題民澤九日詩後我思陶長官廬山一杯酒世逺道彌光嵗嵗此重九酒中有歌者劃然金石奏謂從秦漢下藩籬士夫口藩籬茍不顧其中更奚有寥寥二千里長夜不復晝俛仰宇宙間孤光映疎栁民澤長者言藩籬自兹厚兹晨偶拈出以洗薄俗陋景易讀書潮連賦此朂之日往則月来東西若推磨及時愿有為何啻短檠課强者能進取不能空墜堕四書與六經千古道在那願汝勤誦數一讀一百過嗟予老且病終日面壁坐古稱有志士讀書萬巻破如何百年内能者無一個書生赴塲屋勢若疾風柁不悟進為退反言勇者懦吾聞邵康節撤席廢眠卧又聞范仲淹畫粥充飢餓砥柱屹中流有力始能荷汝患志不立不患名不大師友為汝資薪水為汝助黽勉在朝夕用為老夫賀噩洲阻風平岡儗農事一語五日留今晨阻長江風雨眠歸舟老牛不乳犢寜為水草憂念此結吾懐人生易澆浮父子且有此他人復何求㝠㝠蒼山屛㶁㶁清溪流童僕屢反側晨炊渇薪槱鳴鞭走泥潦視我能来不行止各有時天道匪我由會當息風濤鼓柁辭鳴鷗送李世卿還嘉魚楚地多佳人可慕不可求長江崩西浪五嶺障東曍翩翩李叔子晤語滄溟秋諸賢當未衰濟世吾何憂歸去襄南州問詢李與劉襟懐有全楚勝處多卧遊大崖月同同赤壁風颼颼行蔵君自知可以與我否我若登南嶽寄聲黄鶴樓富貴何欣欣貧賤何戚戚一為利所驅至死不得息夫君坐超此俗眼多未識勿以聖自居昭昭謹形跡在物有常性水濕而火燥在人無常情所惡變所好昨日見其恭今日見其傲蔓草輕芝蘭清源亦黄潦世情毎如斯聊為行者告疾風起驚濤舟以柁為命柁乎茍不操舟也何由静是舟如我身孰知身之穽是柁如我心孰祛心之病不如棄其舟免與風濤競送梁國鎮葢有蔵器人我病元非果徘徊思逺道欲往悲定跛梁生千里駒東西無不可飛轡入長安垂楊春婀娜喜康沛至五言六句三年念遊侣奄至廬岡曲睍睆枝上鶯相呼入幽谷平生真淡意至老方恥獨七言古詩補遺擬移木犀於上游黄雲示民澤木犀金粟散天香在秋之季廬山陽湛生期我上游庒移根千丈黄雲岡萬丈黄雲千丈山金粟花開不等閒金粟氤氲塞兩間先生與爾同嵗䦨對菊淵明無錢不沽酒九日菊花空在手我今酒熟花正開可惜重陽不再來今日花開顔色好昨日花開色枯槁去年對酒人面紅今年對酒鬢成翁人生百年會有終好客莫放樽罍空貧賤或可驕王公胡乃束縳塵埃中簪裾何者同牢籠五言絶句補遺羅浮羅浮海上來高高㡬千丈鐵橋倘不闗諸峰竟流浪世人未得仙斯事安知妄九等真洞天朱明惟上上題子長寓舍壁子長亦何病夜夜此呻吟世無白家媪誰㑹子長心驢背推敲去君知我是誰如何义兩手剛被子長笞慈母石為門人區越慈孝相感激天機謝人力誰來石下歌見母不見石鄉賢詠馬持國平生十數策决定要經綸不惜魏公幕知心是直臣馬晞驥我邑登賢載君家父子俱清風端一硯五馬達鄉閭伍逢起宋義士中原不可復志士願終違直把真心去何妨假首歸羅希吕孤高還寂寞道否即詩窮自古皆賢達今人有此風周脩剛直為黄斌所殺閉目青天下捐軀百刃前匹夫如有志溝瀆不須憐張撝城西十日雨病叟得無飢亦有羅希吕厓山賞小詩黎秣坡名貞戍遼東儒術聲名舊戎衣日月長酩然尊酒下眼孔得遼陽題莊子泉閒看千丈雪飛下玉臺山爭知白沙子不是南華仙題茂叔蓮船入荷花内船衝荷葉開先生歸去後誰坐此船來題淵明菊籬下花堪把先生有酒不遥看白衣者不復問江州題和靖梅髮與疎梅白身將寡鶴親孤山殘雪後清絶凭欄人六言絶句補遺夜書南安店壁千里紅塵倦客㡬年白髪衰翁野店孤燈夜雨寒房四壁秋蟲次韻景雲蒼梧徃復朝辭白土低岸晩泊和尚高岡樵唱雲邊細路漁家石角輕航雲木幽疑絶境江流東見通津蒼梧逺尋仙侣端溪頗恨人情天地安排蓑笠江湖放浪漁船或者天隨是我斜風細雨前川六言栁渡一㠶秋月江門㡬樹春雲來往一時意思江山萬古精神贈陳聰還莆緼袍不妨學道絶榖可以求仙相府胡為慢士紙田自有豐年青錢不滿杖頭雪繭徒勞免頴相逢浪勸歸耕實欠蘇秦二頃七言絶句補遺懐張詡南北東西一馬塵相思何處不傷神竹邊閉閣長無事猶厭山雲軟素巾魯兩生示民澤九五當朝須勸駕兩生朝突不留琴想見古來交會事鴛鴦譜裡盡傳鍼黄雲右闗長短句萬丈黄雲千丈山金粟花開不等閒吁嗟乎金粟丈人與爾同嵗闌黄雲左闗長短句萬丈黄雲千丈山金粟花開不等閒金粟氤氲塞兩間吁嗟乎金粟丈人與爾同嵗䦨贈秀夫如江東乙巳秋作浦口來尋舊路岐柴門過午未開時青山十里花圍斷不許遊人折半枝讀陳庸詩稿天上霓裳久寂寥人間何處不詩瓢寄言雪月風花好都在騷人仔細描張廵獨蔽江淮阻賊兵乾坤回首盡羶腥何人肯救睢陽急不使忠臣負忍名許逺援絶城孤力不任逆胡天討竟成擒却憐當日奴􅃵進酸盡平生長者心南霽雲萬人回首看浮屠肯訊將軍躍馬呼誰續睢陽三日命進明先斬後擒胡秫坡先生釣臺少年朝暮釣池傍嬉戲哦吟送夕陽却憶子陵臺上月至今千古共流光樂嵗呈楊大尹舍北歌童搥破鼔舍南舂婦著新裙田家少遇豐年樂盡道今年是十分元夕将來拍鼔譁茅簷燈火醉家家長官願似丁明府甲首終年不到衙夀陳静軒七十次世卿韻甲子如何管得翁全無白髪有青瞳赤泥更是遊仙枕兄卧西頭弟卧東午睡起道人本自畏炎炎一榻清風捲晝簾無奈華胥留不得起凭香几讀楞嚴用韻寄鍾美宣緑栁黄鶯紫水涯市橋沽酒醉春沙江花一與詩人别如此風光屬自家晝睡為雀所喧野風吹隙簷翻雀晝攪床風雀攪眠若道神仙無一事老夫當日未神仙失僕粥罷腰鎌亦上山晡時悵望負芻還乍疑乍到忘歸路月滿東楹未上闗定山許撰一峯墓誌東白許墓表久不見示先生老去銘當出東白人來表可聞却愛大流山上月清光先到一峯墳今古多聞遷史記一峯何必我同年先生存作垂千古東白曰然我亦然金鰲閣横浦秋成百尺橋金鰲閣上見山遥凭高無限歸来思何處飛雲不可招鐵漢樓鐵漢元來亦是誇羈魂入夜遶天涯數聲𦍑笛樓前月落盡寒梅一樹花墨花臺東坡遺跡汝弼即是張長史堯夫方愛陳公甫何處思君不見君墨花臺上廉纎雨横浦橋乘輿十月猶溱洧子産未知為政在隔河騎馬是何人下馬問訊張東海濂溪臺黄菊花開又一年南山無分對陶潛不知風雨隨儂否惱殺臺中一夜眠葵庵葵花愛日臣愛君臣與葵花共此真試問春来桃李樹紛紛同者是何人春中時光堪喜亦堪悲嵗嵗春隨斗炳移送老一條卭竹杖夜挑明月上臺磯北風吹我早裘輕不借肩輿一日晴九十日春都不見跏趺榻上看雲生龍溪不賞去年花今嵗春光喜在家多謝花神憐舊識盡情開向白牛車夢長髯道士以一囊貯羅浮山攜以遺予紀以絶句一口囊盛四百峰翠林香霧春㝠濛低頭笑問長髯老何處方壺有路通千仞飛雲隻手拏采鸞停處是仙家青牛騎過鐵橋去踏碎璚瑶一路花同馬黙齋候麥秀夫夜過白沙和韻東風吹老桂花天坐久寒生月下氊見許夜深移艇過笛聲何處二更前待馬黙齋不至諷以是詩花前誰共引杯長風送歌聲到赭郎莫唱雍門絃上曲從来此曲斷人腸白沙社有懐書張廷實詩後海上竹枝非楚聲壁間科斗是賢名粤堂東望不知處惟見白雲天際生依韻答周太守瑛見寄白馬山前雪滿扉隔江雲樹晚依㣲津頭日日行人過不見長安舊布衣相逢記得入京年夢破邯鄲不受牽更説莆陽風景好木蘭溪裏木蘭船醉鄉管勾仙家碧酒春醉鄉今日屬何人天高地逈無人到試就陶潛一問津睡鄉漆園蝴蝶故翩翩一落人間今㡬年試向髑髏原上朢八荒明月正堪眠梅花下感事桃李村村待發䝉孤芳憔悴不成叢天涯一寸腸如結吹斷江城曉角風月夜與何子有飲梅村社贈之溪北溪南踏月遊梅花村落似羅浮東風夜巻殘潮去留得何郎半日舟人日今年又共君他人交態白頭新開懐一夜梅村酒時復停杯問故人夢先兄持絶句見示及覺忘其前聫以意足之松林土屋閉斜曛人世悲歡那得聞閒處釀成𤣥碧酒秋来攜過武夷君京師初歸答容琴月舊遊風月未應㤀到手新詩喜欲狂記得長安秋雨夜三人燈下説西良三洲巖聞虎草動雲飛十里風三洲巖下吼聲雄先生自對山靈笑不道前身是逺公經坡亭水繞寒柯霧半籠逰絲輕曵釣船風三洲覧遍題名處閒向坡亭説長公枳殻䔒蕾枝頭春意長卧看蜂蝶往來忙不知今日聞多少熏得先生枕席香題攜琴訪友圗松崖日暮水聲深何處攜來緑綺琴磵石隔林人不見只疑魍魎是知音答徐侍御索草書寒窻弄筆敢辭難也得先生一破顔不要鍾王居我右只傳風雅到人間代簡舊友克明梁先生瓊山緑水舊遊行滄海歸来語後生㡬醉㡬醒醒後醉世間何事合留情至日梁聽松􅷄白石惠生魚克明弟朝來何處得庖鮮白日村邊響夜舷布被䝉頭呼不起真成至日閉闗眠周文都伍伯饒馬𤣥真諸友約釣河豚值雨弗果伯饒復遣人來約答之時𤣥真文都在病七月十日秋正來漁翁夜上臨江臺斜風細雨不歸去若個𤣥真安在哉秋入江門風怒號江水未落濤頭高晴明三五君須記月下溪邊遲小舠河豚正美周郎病𤣥真不出公奈何絲綸一握三千丈獨釣東溟雨滿蓑梅月用莊定山韻四時萬物無非教人傍梅花月傍軒若道不闗梅月事宣尼何事欲無言溪上梅花月一痕乾坤到此見天根誰道南枝獨開早一枝自有一乾坤和世卿越山楚山皆白雲楚越如今不必分三十六峰同一樣不如何處武夷君草樹雲霞亦假名高齋何處不先生解尋正路宫牆下榜也如今是典刑次韻董子仁見寄兼以林䝉菴周時用提學江門花鳥欲春闌脚帶雲霞步步寛君到閩中試借問龍山何事别長安還將病骨畏秋聲一枕江流是我生若道嚴陵偏不事漢人更有聖之清鱷洲山遇虎登高停棹鱷洲山獨自㤀機虎跡間忠信於人真可仗爪牙當道却須還鱷洲阻風牛飢僕冷不能嗔短曲長歌互有神今日誰家能走馬泥深還掛一壺春晩發厓山江水初寛白鷺飛厓山欲莫赤楓㣲孤舟獨背湯瓶去不共前川釣艇歸厓山雜詩寒雲黯黯日糢糊南有蒼厓對撚鬚今夕孤舟不成寐白鷗飛盡我跏趺北風半夜巻滄溟杖屨船頭候曉晴滿目寒雲吹不散一㠶細雨濕湯瓶萬古青山自落暉白鷗穿破水雲飛孤舟江畔無情思閒與兒童咏緑衣北風何事更長吹盡日孤㠶逗水湄吟遍天涯歸未得江神應愛石齋詩經都會故居臘月四日仡歸裝舴艇衡寒到石塘忽見溪邊舊環堵恨隨流水繞春長總角展書溪樹根風光不比洛陽園碧桃盡屬西王母緑橘先分小弱孫秋日東軒漫題離崩匏落不禁秋卧對蕭騷月半鈎彭澤須收三頃秫菊花無酒笑人不黄葉紛紛江水流人間何處不悲秋江邊野老無名姓笑向滄江任白頭寄馬黙齋江山風月滿吟壇誰把漁郎薦老官眼底秋光供㸃筆等閒休作負彭鸞追和白石馬教授奉寄其𤣥孫馬竹隠山深谷冷老烟霞君住孤村第一家一榻清風明月夜鈎窻閒對紫薇花贈曾確還博羅風袂飄飄過五羊五仙遮道問行蔵廬山莫道無分付領得春風古桂香示兒張公九世尚同居忍字専書一百餘受唾由来稱長者而今市軰却嗤予門前賔客偶相投忽忽浮生五十優君貴我貧俱是分敢將丘壑傲王侯聖心太極一明蟾影落千江個個圎五十年來如夢覺臨岐更出示兒篇遊白雲擔頭行李但書囊撰勝尋幽到上方身與白雲同去住客從何處問行蔵灌溉忽縣尹送酒至一瓶西注一瓶東兩徑初移緑未濃忽見白衣持酒至擬留一斗待秋風次韻答丘侍郎五月江門荔子叢繡衣下馬擘殘紅兒童争走鳥臺節笑挽青荷立水中玉臺贈黎民瑞青天何處一登臺脚踏黄雲萬丈開聞説程鄉長官好抱琴歸去抱琴來讀近思錄楊墨偏高子莫疑孟軻精一古心期日長對巻無人到風雨巡簷一詠詩六經不假羣賢補却憶宣尼下手時白首齋心顔子坐青燈横几大臨詩大學西銘迤􅆔攤從前只假半年閒誰家繡得鴦鴛譜不惜金針度世間寄黄仲昭江西諸子在春風我有新碑落永豐海濶天空無可寄只将狂斐為君通次韻胡提學訪􆆑山斜風細雨緑蓑衣江上人家半掩扉莫向天涯歌獨醒白頭漁父笑人非今朝黄鳥唤春回桃李還知帝力栽昨夜殷雷無意緒黑雲将雨滿山來訪教諭何宗道樹隠肩輿行欵欵花催春鳥閙闗闗蘇公渡口雲連水宗道廬前雨滿山峽山别胡提學還至九江作峽山飛出兩三航滿載離愁下九江夜泊孤舟不能􅄰自燒銀燭到秋江畫蘭誰將水墨冩横披竹石荆蘭也自冝記得湘潭秋雨後清香猶帶楚臣悲對菊陶家園裏舊開叢復入山窻對此翁一曲一杯花下醉人生能得㡬回逢喜孫讀書閒看溪水繞橙根自握刀鉏斸小園日午課詩孫漸長上堂誇與阿婆言芙蓉文筆丈人日暮看芙蓉湘水西來第㡬峰兎頴刺天無屬我今為松桂主人公寄李子長能將𤣥酒注金巵混沌誰教更鑿之我借元初溟滓好為君驚喜為君悲題孔雀圗兒女心情未遣知白頭笑賦雀屛詩可能乳得西周鳯來夀君王億萬朞題蒲石畫一石青青蔭㡬蒲半篙烟水欠糢糊江門有個丹青手也把江門畫作圗雨中送客江上偶成細雨江邊送畫橈肩輿如夢看春潮不知此處誰分付笑倚南風酒未消次韻呈長官贈鄒汝愚江門還我自由僊七洞天西小洞天南去北來船過盡無人肯住釣臺前再韻呈呉獻臣雙鳬海上果誰僊竚看飛騰上九天為問南遷鄒吏目㡬時歸去玉皇前候方伯劉東山先生至客從天柱得琅函來試丹砂嶺以南有個道人眠不起洞門深鎖白龍菴易傳遺書共此函偶拈一事問河南數千里外涪州夢透到龍門何處菴次韻謝天錫登三層頂望崑崙池作兩眼高憑何處空白龍猶在有無中旁觀莫道崑崙小氣葢東南萬萬峰手拍崑崙歌泬寥虹橋月下拜相邀回頭笑向𤣥真子纔到葵山怕路遥卜居茶井海鳥回翔何處歸海山春到白龍西欲搏九萬無風力認著崑崙便托棲寄陳秉常用天錫韻早援深谷探花原舉手來扳笠頂天誰與浪傳青鳥信君今疑是白龍仙次韻沈别駕見寄我生之初我有真百年泡沬往來身一丸也恨無分付誰是乾坤會弄人夜坐露冷風清正酒酲誰家今夕不勝情人間老去無愁思獨倚疎梅看月明次韻復趙提學雨打風吹一樹花孤根不肯向人斜晩逢青眼何須恨未到朱樓莫浪誇與倪麟沙水東西兩石橋夕陽飛馬剪山腰不知酒興還多少一路清風吹不消挽竹齋屋裏沾裳羅一峯門前又報竹齋翁一年氣運天何極兩歎交情日未窮題畫鷹秋風垂翅下雲衢野性翩翩不受羈欲借一枝江畔宿等閒花鳥莫相疑夢曾晳傾葢寜知是夢中絶塵標致却春風千秋此意吾能説不與由求面目同讀韋蘇州詩夜雨齋燈巻未收清謠白首對蘇州晦翁兩眼滄浪碧也為先生一㸃頭五言夙昔慕陶韋句外留心晩尚癡敢為堯夫添註脚自從刪後更無詩道經七星巖百丈巖前石鼓鳴山人今夜動山靈同舟亦有知音者共聴乾坤第一聲七星巖下醉神仙猶占龍床水底眠我有一尊延夀酒月明今夜對南山戲贈二謝生婉轉青囊傳二謝淵源來自馬蹄洲山人眼是庖丁手解把屠牛破土牛與李世卿約遊圭峰方壺使者與公期老我三山乞住持且約圭峰為社會一圗今古付王維和世卿山靄霏霏碧滿蓑清風不奈俗塵何人間久矣無高鳯何處如今楚鳯歌次韻奉答李方伯介軒潮連見寄姓名秋榜忝同鄉四十年來守故常拄地撑天吾亦有一莖青玉過眉長不侍氷顔累十秋可堪相近阻相求此心未許旁人識公在山齋僕在舟𢎞治己酉春姜仁夫進士以使事貴州還取道廣東過予白沙自己夘至丙戌凡八日辭别三首予亦次韻為别明日仁夫至潮連寨方十餘里遣𨽻回幷得三絶和之通前九首吾與仁夫之意皆不在詩也豈尚多乎哉仁夫浙之蘭溪從學章先生徳懋吾廿年舊好故吾詩兩及之江門綫路㡬人通兩月公程來向東何處敢勞君著眼短牆疎竹是家風雲去雲來等是浮獨凭高閣看江流南風莫送東歸客更共江門一日遊家近桐江舊釣臺鳯林何日暫歸來平生章子如相問道我山中日閉齋一著將窮一著通謝公全局算江東眼中論事如章子是有當年國士風洞門終日白雲浮洞裏桃花覆磵流誰道乃公閒似我不曽攜杖白雲遊百尺江邊有築臺自從君去望君來黑頭了却人間事更約焚香共小齋次韻仁夫潮連寨見寄極目長江傷我心滿身風雨立江潯帝城此去㡬千里一度逢闗一寄音今古相望日已賒包羲已上孰名家不識乾坤真易簡借人門户甚摶沙得到鳶飛魚躍處正當隨栁傍花時今人不見程明道只把中庸屬子思彈子磯候黙齋不至軍人打皷泊官船黒霧濛濛水下灘隔岸相呼不相見竹籠牽火上桅竿清溪道中西風吹冷峽山雲紅葉清溪㸃綴新惟有白頭谿裏影至今猶戴玉臺巾濛裏驛呈送行諸友相隨征路二旬餘笑指前山别老夫却到前山心未了西風燈燭兩踟蹰南雄讀羅一峯記書院文丘墳何處草離離千里湖西夢覺時落日小池橋上路催人下馬讀殘碑度嶺天地風雲會有辰開元可是欠經綸千尋松下看流水十八年中度嶺人玉枕山和南安太守張汝弼一枕秋横碧玉新金鰲閣上見嶙峋使君得此元無用賣與江門打睡人過天柱峯天柱峯前望故鄉西風淅淅鬢蒼蒼愁腸暗為慈親斷誰道青山是劍鋩宿迴龍寺酒醒迴龍欲二更迢迢秋漏徹江城何須不理東湖棹徐孺庭前月自明題雲嶺路旁指㸃一峯墳一老西巖坐白雲盡是唐人詩境界千林紅葉訪徴君與豐城知縣王本儉劍水相逢梅始花春風吹動長官衙詩家到此須分别不共河陽一處誇贈劉進夫還永豐兼寄羅養明楊榮敷羅清極湖西諸友江船戀戀費行纒我托劉郎亦是仙何處青山君憶我月明湖上酒醒眠一峯原上夕陽斜雲掩閒門㡬樹花見説西風吹不死散分春色與隣家淦川銀燭照離情畫舫行人一月程相憶却憐山寺逺不曽夜半到鐘聲題劉主事顯仁挽册曾傾白下郎官葢忍讀青田太守文今日九原誰是伴里中新有一峯墳和婁侍御偶與梅花作主賔旋將幽意托龍唇曲中若有千年調也要先生會入神贈祝秀才鄉試祝生南赴應天闈萬里秋雲一鶚飛我有蘭溪他日意敢將裁入送君詩蘭溪章子多詩别得見平生祝器之衰老不知言語費逢人信口話庖羲和羅洗馬韻五十東溟始願違安知不是慕甘肥今朝怕上花衢馬猶恐黄塵染素衣贈江通判明朝别駕過金壇暫到茅山亦不難我憶江門歸未得為君沽酒慶茅山謝何秋官恵米追次陳後山韻相逢不肯訴家貧眼底斯人又姓陳慙愧太倉分一斗乾坤多少病飢人過漷縣風大作取舟中儲酒飲之黄菊開時歸意濃泥尊名酒未開封不辭拚作陶潛醉受盡長河一日風謝壁間李學士和予藤蓑詩偶成奉寄西涯一曲我藤蓑對此相思可奈何今日玉臺應説我海門何處扣弦歌春雨江門著舊蓑釣船相近問如何白鷗分定閒眠界猶唱西涯學士歌剡溪剡曲溪中雙槳鳴老翁訪戴是虚名雪消月出歸来夜只有詩情與世情雲封寺有曲江遺像戲題嘗疑大塊本全渾不受人間斧鑿痕今日雲封禪寺裏曲江遺像任塵昏不寐舊雨今雨漏湔湔長更短更聲相連何人酌我今尊酒暫醉慈親卧帳前石門讀貪泉碑芙蓉花發西華寺逺訪殘碑到石門一曲貪泉歌未了夕陽紅近水西村贈曹侍御璘謝病飽蕨青山更飽眠襄陽歸去自今年眼中未有如公早柱史前頭或姓錢雜詠過午城中走帖還老夫對酒社東山詩家進步如撑艇又上前溪一兩灣傍花隨栁興飄飄澗水牽情到石橋勃窣未堪還自笑眼前剛好被春撩不坐人間彩鷁舟怕逢漁父問因由君家酒艇輕於葉試遣長鬚為我謀拍月縈爐一小舟欲窮仙島路何由須君一見安期老指㸃蒼茫為汝謀得世卿詩笑顔别後㡬回開詩到衰翁輒舉杯擊壤狂歌千首在一春無計寄君來東野功深偏洗削退之意到每優柔眼前一二聊拈掇正好承箕對孔脩夢中作日出東山尚未眠閒尋溪水弄溪船人間一種惟予樂只在溶溶浩浩間躑躅江邊水沒橋沿溪貪賞不辭遥獨憐歸馬無鞭策未忍臨風折栁條題徴仕郎張公孺人區氏墓誌後衛幕已鐫東白誌西涯又撰孺人碑莫道不傳家世事當年兼有兩公知種萆麻山渠面面擁萆麻鎖盡東風一院花江上行人迷指顧老夫於此煉丹砂短檠他夜照書床一􅊦萆麻也借光老去圗書收拾盡只憑香几對羲皇紅朶青條擺弄同人間無地不春風莫輕此軰萆麻子也在先生藥圃中萆麻得雨緑成畦如此風光亦老黎飲後小菴搜句坐山禽啼近竹門西萆麻遶竹逕通雲雲裏樵歌隔竹聞手把長鑱種春雨風光吾與老黎分種子萆麻合種𤓰青山周折兩三家老夫來搆茅茨畢别種秋風一徑花次韻李憲副若虚白沙别後途中見寄江門春浪兩涯平半醉船如天上行坐冷燭花歸問夜逢逢津鼔欲三更咫尺圭峰不見臺春雲将雨㡬時開山中一徑無人到除是青天畫舫來江城無處不通潮風疊寒漪色更嬌詩舫飄飄向何處高凉西去不勝遥和鹿步韻黑甜一枕鼻呼雷江浪如山夢裏來乾坤何處留雙眼不向三洲鹿步開贈湯地理師春泥沒屐大江潮溪北初經獨木橋千丈峰頭望東海三山正對杖頭瓢錦囊以上不堪言老郭元来亦是仙笑殺城中諸年少欲持阿堵問君傳南越山川拄杖交東風何處送歸舠一條路打朱明過直下潮陽看海濤雲水相逢是偶然江亭燒燭話新年眼中但有牛眠地指㸃青山不要錢贈鄒處士還合州人間憂喜也無期萬里間闗一馬歸莫灑東風别時淚春光又滿老萊衣石城米賤雲門鎮吏目身輕翰苑官歸去山中偏好睡家人不用逺來看題也可荘上見一空交交黄鳥弄春晴也可山荘隠几聴莫以山林笑流俗山人元是此山靈青山何處倚鳩藤回首塵埃㡬折肱林下一壺誰共醉淵明只好對高僧醉中作酩酊高歌掩舊書青山日月笑居諸一畨春雨無分付枉種桃花三兩株酩酊放歌何處来東風吹笠上溪臺臺傍有箇高飛鳥飛向三山去不回觀物一痕春水一條烟化化生生各自然七尺形軀非我有兩間寒暑任推遷早飲輒醉示一之清晨隠几入無窮浩浩春生酩酊中我若扶衰出門去可能筋斗打虚空得廷實書洗竹添花張户曹忽抛閒散事煎熬東門春水無人釣又長溪頭㡬尺高田夜讀田白沙孫也朝来窻璧尚塗鴉燈下吾伊且賞𤓰不是風雲天上夢阿田家世本桑麻掃突炊秔及早鴉東臯時有未芸𤓰田家樂事如翁少男戀詩書女戀麻憶年童稚髪如鴉稍稍東陵學種𤓰今日肯嗟頭似雪江門三畆但萆麻紀夢偶然嘉恵得隣封無數金錢出袖中欲向萱闈談此夢隔簾斜月未聞鐘得世卿子長近詩賞之漠漠江天對把詩竹壇風日引杯遲翁歌此曲兒當續問著别人都不知飛雲高起大厓深兩處天教兩鳥吟莫把隴山來比並山頭鸚鵡被人擒詩到堯夫不論家都隨何栁傍何花無住山僧今我是夕陽庭樹不聞鴉鄒吏目書至有作兼呈呉縣尹傾葢投緘不自輕人間造次㡬晨星天涯放逐渾閒事消得金剛一部經落花遥對石城春半篋殘書一病身茶筅粟瓶供客盡不妨人笑長官貧天涯仙客病渾家開過東風㡬様花容易江山得重九問君何地落烏紗張侍御叔亨将赴京遣人告行求贈言不已賦此以答不為冺冺即波波天命委之人奈何秋鴈未来君好去文章覆瓿不須多梁文冠抄詩口謾吟哦手謾抄風壇疎竹晝相敲不知今日滄溟上天放何聲此處高雪月風花信手抄皇王帝霸入推敲伊川擊壤三千首都共南風一項高君到詩情每被抄玉臺秋磬借僧敲門前荷簣知心否雲鎖千峰月正高屋下塵編不暇抄狂歌試把鐵橋敲秋風背取詩囊去且看擎天柱杖高夢緝熈花前把酒問平湖君到閩中憶此無夢裡征帆西下疾兩人江畔笑相扶宗廉送明瓦屛風至次韻答之小中雖異大中同明處韜光暗處通三直五横真本子人間無路獻重瞳瓦木鋪排得此身乾坤何物到頭真道人具得屛風眼還向小齋來卜隣渡厓海争如天上弄銀河不使鳴榔亂我歌有酒只邀王母醉托身明月挂婆娑題石泉蟹眼不絶西坡陀涓流直下成江河君釣石泉歌不得江門漁父為君歌贈宗兄汝學使廣西還匹馬行行西復東一鞭騰破雪千重寒梅初放一枝白間破江南無數紅五言律詩補遺承張方伯報旌表家慈貞節大喜来何處勞公一札香聖恩元浩蕩老母自氷霜此報符佳夢他時益大防無論一家恵舉俗頼虞唐旌表家慈書至十一月二十七冬至後一日迢逓來金闕光輝動蓽門世知慈母節人帶聖君恩笑喜翻疑夢榮封却未言痴兒何以報忠孝策諸孫荆扉無外事散步數雞孫特地開雙眼從天降一言江山同出色存歿各沾恩斟酌杯中酒春風欲到門病中詠梅去嵗誇身健尋梅到㡬山酒傾崖影盡衣染露香還北斗今何向南枝半已殘下堂兒女笑老脚正蹣跚孤山一片雪千古獨稱竒此外不能到人間都未知正嗟同賞絶又過半閒時回首西巖下南枝映北枝人生如逝水花發見南枝對影身猶隔聞香席不移延縁看月久勃窣下階遲坐恐芳時暮扶衰了一枝何處梅梢月流光到枕屛江山都太極花草亦平生閣冷香難即窻晴影似横凍崖妨足蹇藜杖意高撑隠几日初下東巖興復饒月高寒自照花近夜相撩濁酒頻堪冩清絃豈易調羅浮在何處魂夢與逍遥水陸花何限梅花太絶塵如何開眼處不見賞花人北塢風㣲動南梢月自真老夫前席坐得意不無神山閣數株梅山翁手自栽有花娯我老無計避人開色映書帷浄香尋墨沼来庶㡬吾服汝不作委蒿萊風月江山外乾坤草木間巻簾疎影動拄頰暗香還約伴多為地吟詩别作壇終南雖白閣不恃小廬山何處花堪憶江門水背過滿身都著月一片未隨波高倚松為葢清連竹作窩白鷗銜不去飛入釣魚蓑借如桃有實方朔不来偷山近重重見人無淺淺休路經寒水斷香被白雲留寄語林和靖江門是一丘陶僉憲約逰厓山立張陸公祠西風吹桂楫公泛兩厓間落日看碑過中流掩袂還蹟留新棟宇名落舊江山二百餘年下誰無一日閒遊厓山次李九淵韻前刼消磨盡中原恨未沉興亡先有䜟秦賈竟何心一一憑天地勞勞笑古今千秋厓石角泛艇一來臨不待祥興後神州已陸沉孤臣空有淚大塊本無心索寞皇圗舊經營廟宇新暫攜二三友斜日共登臨答丘蘇州三年思楚水尺牘走蘇州滄海疑真蹟黄堂是舊逰遼東憶賀子廣徳問周侯頃日相傳報青天更倚樓壬午京城除夕爆竹沿更響燕城覺嵗除客懐元自在詩興乃何拘大地行蔵活風花㸃弄迂天遭老文侍華酒幸相娯五言排律補遺鍾氏席上賦四十韻九日江濤穏孤舟客子来兩畨驚老瘦一別長嬰孩㸑婢攜筐出溪童負水回家家秋釀熟處處菊花開饌有江魚美拳無俗子猜敬恭存酌醴意思劇甘醅暫去終投轄将留故下鋂稍喧防笑語屢起雪罇罍石榻偏成卧柴闗莫亂推交情雙爛漫高興一崔嵬樹暗蟲飛亂山深猿嘯哀蕭騷鳴磵竹緑浄映溪苔吹篴丹楓浦鳴榔白浪堆平生羡漁牧此地訝雲雷掬澗頭垂膝看雲手拄頦天機聞答響物理識枯荄小立依林隙㣲吟近水隈直防紗帽落不放玉山頺穉子能看客諸君總愛才燒茶供小枕醒酒當殘杯跡混何須滅心空不假灰相依南郭倚獨傲北枝梅孔氏終懐寶顔公未鑿坏因君投僻逺為我剪蒿萊𤓰接青門邵堂開緑野裴疏渠下滚滚辨土得每每盛恵兼羣從香名盡八垓自慚非俊傑何足憂瓊瑰欲報王孫飯深愁漂母咍流連過日暮感激把詩裁問客分粇粒呼奴拾芋魁生涯從料理勝事亦胚胎松栢當軒大桑麻繞舍栽清泉㡬仙井白石一天台閬苑何勞擬桃源若可陪東臯晨傲睨南陌夕低佪或作騎牛者何嘗躍馬哉峰巒皆錦繡屛翳亦樓臺堪覺賡詩苦無寜苦雨催憑将一斛水盡滌句中埃又五言古詩補贈容珽翳翳峯頂木裊裊峽中溪下有飛古寺上有哀􅆐啼我昔經過日登臨上扶藜中流日黯黯兩岸風凄凄逺行會離索四顧仍低迷羡子意氣豪別我無一悽行行至斯峽為我試留題真樂吟效康節體真樂何從生生於氤氲間氤氲不在酒乃在心之𤣥行如雲在天止如水在淵静者識其端此生當乾乾又古風歌補慈母石歌為門人區越作巖石江頭峻如壁舟人指為慈母石慈母名來不可聞巉巖兀嵂秋江碧我聞慈母名起我父母思人有父母誰不思我思父母徒傷悲憶昔生我童穉時家貧逐日圗生資析薪與我代燈燭鬻衣與我買詩書朝夕俾我苦勤學戒我勿似庸常兒况生我命苦多疾父母提挈綿嵗月一朝我病忽呻吟父母吚啞面如漆父母衣我兮寜自寒父母食我兮寜自飢我今身為一命仕薄俸堪将備甘㫖二親已去掩荒丘薄俸還将飽妻子㡬迴舉筯食腥膻黙黙不知雙淚漣收淚還将酒杯奠杯奠不到音容前慈母石世罕有汝在江頭天地久我思父母不能養恨恨當同爾齊朽嗚呼㒺極恩難報幸今頼有移忠孝尚當竭力事吾君庶可揚名酬二親詩曰誰化江邊石世傳慈母名神枯真可想意得貎如生行路三迴顧題詩獨見稱丹青在人目千古共沾纓戒懶文大舜為善雞鳴起周公一飯凡三止仲尼不寝終夜思聖賢事業勤而已昔聞鑿壁有匡衡又聞車𦙍能囊螢韓愈焚膏孫映雪未聞懶者留其名爾懶豈自知待我詳言之官懶吏曹欺将懶士卒離母懶兒號寒夫懶妻啼飢猫懶䑕不走犬懶盗不疑細看萬事乾坤内祗有懶子最為害諸弟子聴訓誨日就月将莫懈怠舉筆從頭冩一篇貼向座右為警戒陳白沙集巻九欽定四庫全書陳白沙集附録行狀先生諱獻章字公甫姓陳氏系出太丘髙祖判鄉曾祖東源祖永盛號渭川少戇不省世事好讀老氏書嘗慕陳希夷之為人父琮號樂芸居士讀書能一目數行下善詩年二十七卒卒之一月而先生生母太夫人林年二十有四守節教育之祖居都㑹村至先生始徙居白沙村白沙村在廣東新㑹縣北二十里後天下人重先生之道不敢斥其名字因共稱之曰白沙先生以宣德三年戊申十月二十有一日生於都㑹村先是有望氣者言黄雲紫水之間當有異人生黄雲紫水者新㑹之山川也又有占象者言中星見浙閩分視古河洛百粤為鄒魯符昔賢所説及先生生身長八尺目光如星左臉有七黑子如北斗狀音吐清圓大類中州産嘗戴方山巾逍遥林下望之若神仙中人也自㓜警悟絶人讀書一覽輒記嘗夢拊石琴其音泠泠然有一偉人笑謂曰八音中惟石音為難諧今能若是子異日得道乎因别號石齋既老自謂石翁少讀宋亾厓山諸臣死節事輒掩巻流涕一日讀孟子有天民者達可行於天下而後行之慨然歎曰嗟夫大丈夫行已當如是也弱冠充邑庠生其師某者見其所為文異之曰陳生非常人也世網不足以羈之明年丁卯中鄉試第九人錄經義一篇戊辰辛未兩赴禮闈俱下第聞江右呉聘君康齋先生講伊洛之學於臨川之上遂棄其學從之遊時年二十有七也康齋性嚴毅來學者絶不與語先令治田獨待先生有異朝夕與之講究受業歸講學之暇時與門徒於曠野習射禮未幾流言四起以為聚兵衆皆為先生危先生獨處之超然時翰林院侍讀學士錢溥謫知順德縣事雅重先生遺書先生亟起毋重貽太夫人憂先生以為然遂復遊太學祭酒邢某一日試先生和楊龜山此日不再得詩大驚曰龜山不如也明日颺言於闕出由是名振京師一時名闕莊㫤賀欽輩皆樂從之遊欽時為給事中聞先生議論歎曰至性不顯寶藏猶霾光即用我而我奚以為用即日抗疏解官去既出太學歴事吏部文選司先生日捧案牘與羣吏雜立㕔事下朝往夕返不少怠郎中等官皆勉令休對曰某分當然也識者謂其抱負之大而克勤小物如此得孔子為委吏乘田之意侍郎闕而賢之遣子某從學先生力辭凢六七往竟不納成化己丑禮闈復下第有神見夢於人曰陳先生巻為人投之水矣其後二十年御史鄺某聞之禮部尚書某從吏云某所為也先是先生寓居神樂觀科道諸公往來請益無虚日既而某被科道劾疑出先生故特惡之深且曰彼戴秀才頭巾爾動人若是脱居要路當何如耶揭曉編修某時為同考試官主書經房索落巻不可得欲上章自劾冀根究不果時京中有㑹元未必如劉戩及第何人似獻章之語下及輿夫敗卒莫不嘖嘖稱屈曰可惜陳先生不中時即有人夢曰經綸不屬陳先生矣羣公行慰先生先生大笑莊㫤進曰他人戚戚太低先生大笑太髙二者過不及先生頷之其居神樂觀也北士麤鄙者數人約曰必共往困折之及見先生神樂觀洞然氣沮口噤各不能發一語反致羞而退因語人曰果異人不可狎也今右布政使周某時同遊太學所藏古人墨跡愛踰拱璧先生因借閲經旬不還某數取先生笑曰闕君爾君得非所謂玩物喪志者乎某遂有所啟發南歸杜門却掃潛心大業道價嚮天下四方學者日益衆往來東西兩藩部使以及藩王島夷宣慰無不致禮於先生之廬先生具飲食供賓客了不知其囊之罄也自朝至夕與門人賓友講學論天下古今事或至漏下亹亹不少厭倦翌旦精神如故雖少壯者自以為不及也江右藩臬左布政使陳某等修復白鹿闕以山長書幣走生員劉某等聘先生為十三郡士者師先生報書謝不往壬寅廣東左布政使彭韶上疏略曰國以仁賢為寶臣才德不及獻章萬萬猶叨厚祿顧於獻章醇儒乃未見收用誠恐國家坐失為賢之寶疏聞憲宗皇帝可其奏部書下有司以禮勸駕先生以母老并乆病辭時巡撫右都御史朱英懼先生終不起也具題薦末云臣已趣某就道矣且告之故曰先生萬一遲遲其行則予為誑君矣先生不得已遂起至京師朝廷用故事敕吏部考試㑹疾不果赴上疏略曰臣母以貧賤蚤寡俯仰無聊殷憂成疾老而彌劇使臣逺客異鄉臣母之憂臣日甚愈憂愈病愈病愈憂憂病相仍理難長乆臣又以病軀憂老母年未暮而氣則衰心欲為而力不逮夫内無攻心之疾則外不見從事之難上有至仁之君則下多曲全之士願乞養病終養疏上憲宗皇帝親閲者再三明日受翰林院檢討俾親終疾愈仍來供職葢異數也先生以表謝不辭學士李某贈别詩云只有報恩心未老更無辭表意全真葢實錄也祭酒某先生同省人也素忌先生重名及至京師使人邀先生主其家已而先生僦居慶壽寺某寓之後因修述隂令所比誣先生學士某見之不平為削去歸經南安知府張某問出處對曰康齋以布衣為石亨薦所以不受職而求觀祕書者冀得間悟主也惜乎當時宰相不悟以為實然言之上令受職然後觀書殊戾康齋意遂决去某以聽選監生薦又疏陳始終願仕故不敢偽辭以釣虚名或受或不受各有攸宜爾某唯唯暨歸嵗有薦辟先生皆援詔不行初應詔而起也道出羊城所至觀者如堵至擁馬不得行歸之日五色慶雲遶其所居之第經日始散𢎞治庚申給事中呉某以先生及尚書王某侍郎劉某學士張某祭酒謝某等八人同薦與二三儒臣入内閣柄用上方勑吏部查勘命將及門而先生殁矣是年二月十日也享年七十有三殁之前數日蚤具朝服朝冠令子弟扶掖焚香北面五拜三叩首曰吾辭吾君復作一詩云託仙終被謗託佛乃多修弄艇滄溟月聞歌碧玉樓曰吾以此辭世殁之日頂出白氣貫天勃勃如蒸竟日乃息前一夕五皷隣人聞車馬駢闐異之急出見一人若王者狀儀節甚都出先生廬而去以為大官至及旦詢之無有也先配張生子二人曰景雲作小詩得唐人體裁曰景暘充邑庠生先生生卒女二人壻黃彥民指揮倪麟後改譚某孫男三人曰田曰畹皆庠生曰豸尚㓜繼室羅無出先是知縣左某以醫來先生病已亟矣門人進曰藥不可為也先生曰飲一匕盡朋友之情飲已作詩遣之殁後一月提學僉事宋某移文當道請入祀鄉賢祠都御史鄧某疏乞恩典草已具尋卒御史費某疏乞不拘常例贈官諭祭不報是年七月二十有一日葬於圭峯之􅅢辛向之原逺近㑹葬者幾千人左布政使周某贈白金三十星助葬誄之以辭刻石于墓三府暨藩臬諸公門人親友逺近相續設奠致賻殆無虛日於戲生榮死哀吾於先生乎見之矣先生少負氣節每出少挫歸輒對伯兄泣不食房婢偶露體告太夫人必黜之乃已迨晚年涵養深至不可測孝弟出於天性事太夫人甚謹太夫人非先生在側輒不食食且不甘先生在外太夫人有念輒心動亟歸果然母愛子慕惟日不足太夫人頗信浮屠法及病命以佛事禱先生從之御史王某曰此見先生變通處也北行時不能别太夫人欲倣徐仲車故事伯兄不可曰吾弟為人子吾獨不為人子兄弟泣爭義感行路太夫人卒從伯兄之請太夫人殁以七十年之孤子居九十年之母喪哭擗食素一如先王之禮太夫人老耋康强如壯先生以古稀年顧多病嘗慮一旦身先朝露不能送太夫人終故自太夫人七十年之後也每夕具衣冠秉燭焚香露禱於天曰願某後母死後喪太夫人服闋絶不衣錦繡曰向者為親娯耳通判顧某曩見先生束木帶解所束玳瑁帶贈至是反之一念衡山靡間朝夕曰自今以往未死之年皆贅也事伯兄如父坐必隅坐雖跡處山林其愛君憂國之心視諸食祿者殆有甚焉憲廟之升遐也哀詔至先生如喪考妣故其詩曰三旬白布裹烏紗六載君恩許卧家溪上不曽㩦酒去空敎明月管梅花知言者讀之當知先生之心無一日不在天下國家也為人豁達大度不見小利未第時隣人有侵其屋地者欲威之以力揚言於衆曰陳氏子異日他出我必辱於途及見不覺自失先生曰尺寸地吾當為若讓其人慚竟不能作惡而去又有侵其田者處亦如之後復有盗葬其祖墓者先生怒曰此義不共戴天也彼不即悛吾即訟之官吾敢沽虛名而失大義哉盗葬者聞之果悛巡撫湖廣都御史謝某遺先生夀木甚美一日其交厚陳某者卒遺言必得木如先生者其子以告先生即舉以畀之林良者以畫名天下嘗專意作一圖為先生夀惠州同知林某至閲之愛甚先生亦即畀之無吝色知縣趙某頗著貪聲懼先生遇嘗道露其事遺白金數鋌為太夫人夀先生不得已受之戒家人勿啓後某以贓去官先生追而還之其人感泣提舉汪某慕先生特甚在北海特作懷沙亭以寓仰止亦數以白金為先生夀其卒于官也先生盡封還以為賻叅政伍某僉事戴某輩以次各遺白金欲新先生居却不可乃營小廬山書屋以處四方學者初年甚窶嘗貸粟於鄉人僉事陶某知之遺田若干頃晚年按察使李某倣鄭富公故事破數百金買園一區於羊城先生皆却不受封劵至於三四往返御史熊某倣洛陽故事欲建道德坊於白沙以風士類先生力止不可乃議創樓於江滸為往來嘉賓盍簪之所榜曰嘉㑹先生曰斯可矣先是某亦以疏薦于朝都御史鄧某倣林逋故事檄有司月致米一石嵗致人夫二名先生郤之以詩云孤山鶴啄孤山月不要諸司費俸錢行人左某出使外夷以其師某意致白金三十星先生亦郤之太夫人兄弟之子陳某㓜無依先生收育敎之成人至割田廬以樹其家嘗買婢得邑人尹氏女既而知之歎曰良家子也命内人撫育之如已女及笄擇壻嫁之友人莊㫤病遺書求先生門人知醫范規者往規貧不能赴先生即備行纒服食津遣與人交無生死炎凉之别都御史朱某柩歸桂陽為文遣子不逺數千里設奠尚書彭某御史袁某經歴張某輩之殁也亦然其聞羅某袁某張某之訃也皆設位哭為之緦服三月叅政胡某為提學僉事時雅重先生常選生員有異質者十餘人往受業今學士梁某叅政李某輩與焉其後某遭憂先生特弔其母喪於新喻及弔呉康齋墓於崇仁羅某墓於永豐訪莊某宅於江浦其論治道以正風俗成人才為急務知縣丁某之初知新㑹縣事也出其鄉人給事中董某書為介求執弟子禮先生百凡啓廸以致四禮大行民愛之如父母及卒于官先生綜理其後事如已事後民立祠于白沙先生記之其始終成就皆先生之力也顧某為同知知德慶州卒事遭不測先生毅然任其事曰朋友之責也後聞其子至乃已李某裹糧自嘉魚數千里從學白沙凡二年先生服食行纒待如子弟復築楚雲臺以居之臺榜一聯云有月嚴光瀨無金郭隗臺其欲來天下之善葢如此學士王某聞而歎之盛稱先生見黃公釣臺記門人林某始有志於學後為貧累先生欲成之謀田於肇慶同知張某以某不歸乃不果迎先哲宋丞相菊坡像為文祭于家隅坐瞻仰若子弟之於師者乆之程節婦鍾氏子也孀居二十七年貧甚先生加其節表之以詩復嵗時遺以綾布君子謂先生使其大得志表先德舉賢才當不遺餘力也厓山大忠祠慈元廟之建與夫祀典之舉也皆發議於先生與副使陶某右布政劉某僉事徐某共成之大忠祠成太夫人夢金冠三人從甲士數百謝於門慈元廟之未建也先生夢一女人后飾立于大忠之上曰請先生啓之後十年建廟即其所也故先生弔慈元詩有依稀猶作夢魂通之句先生精神嘗與神明通居外海陳某宅有異人來見語秘不傳臨殁夢與濓溪兩厓答歌於衡山之五峯皆紀之以詩北歸時泊舟江滸夜半有人呼急起未幾水至溺死人畜無算因得免先生德氣睟面盎背無貴賤老少莫不起敬給事中賀某執弟子拜跪禮至躬為之捧硯研墨既别肖先生小像懸于家之别室出告反面有大事必白羅某改官南京修撰先生謂曰子未可以去乎某即日解官去壬寅别都御史朱某於蒼梧也某預約束叅隨官竢先生至掖之從甬道出入先生力辭不能某曰古之聖帝明王尊賢之禮有膝行式車者况區區乎中貴某謁先生廬至江滸却肩輿走數百歩入京師時經南安知府張某倣曹叅師盖公禮以待先生道出淮陽總戎平江伯陳某往復差官具人船䕶送極其禮意之隆暮年欲卜築衡嶽都御史沈某創屋士人某等割田以待左布政使周某甫下車即謁先生於白沙欲請先生入省南面坐受拜咨問以風一方以先生病不果嘗經山鄉熱甚思生菜值山氓植者良少前此貴客重價求之弗獲先生至山氓羣來獻之京師走家童市靴於肆工人問自先生亟易以佳者其至誠能動往往如是先生之始為學也激勵奮發之功多得之康齋自臨川歸足跡不至城府朱某時為叅議造廬求見卒避不見閉戸讀書盡窮天下古今典籍旁及釋老稗官小説徹夜不寢少困則以水沃其足乆之乃歎曰夫學貴乎自得也自得之然後博之以典籍則典籍之言我之言也否則典籍自典籍而我自我也遂築一臺名曰春陽日静坐其中足不出閾外者數年故其答某問學詩曰古人棄糟粕糟粕非眞傳𦕈哉一勺水積累成大川亦有非積累源泉自涓涓至無有至動至近至神焉發用茲不窮緘藏極淵泉吾能握其機何必窺陳編學患不用心用心滋牽纒本虚形乃實立本貴自然戒慎與恐懼斯言末云偏後儒不省事差失毫釐間寄語了心人素琴本無弦乆之又歎曰夫道非動静也得之者動亦定静亦定無將迎無内外茍欲静即非静矣於是隨動隨静以施其功故示其門人張某詩曰知夜則知朝西風漲暮潮千秋一何短瞬息一何遥有物萬象間不隨萬象凋舉目如見之何必窮扶揺又曰登高未必高老脚且平歩平歩人不疑東西任囘顧豈無見在心何必擬諸古異體骨肉親有生皆我與失之萬里途得之咫尺許得失在斯須誰能别來去明日立秋來人方思處暑又曰兩脚著地此何闗白雲與爾同去還正當海濶天高處不離區區跬歩間葢其學初則本乎周子主静程子静坐之説以立其基其自得之效則有以合乎見大心泰之説故凡富貴功利得喪死生舉不足以動其心者其後造詣日深則又以進乎顏氏之卓爾雖欲從之末由也已之地位而駸駸乎孔子無意必固我之氣象矣其學有本原進有次第的然可據如此迨其晚年超悟極於高逺則又有非他人所能窺測言語所能形容者矣其始懼學者障於言語事為之末也故恒訓之曰去耳目支離之用全虚圓不測之神其後懼學者淪於虛無寂滅之偏也故又恒訓之曰不離乎日用而見鳶飛魚躍之妙門人各隨其所見所聞執以為則天下之人又各隨其所見所聞執以為稱果足以知先生之道也哉故其詩曰千年無鮑叔一懶有柴桑葢亦歎天下之莫我知也所恃天下之大千百世之逺其心同其理同必有知言者誦其詩讀其書當有以知其人卓卓哉孔氏道脉之正傳而伊洛之學葢不足道也是故見諸日用雖與百姓同也至於不言而信不怒而威聞風者興起沐化者心服葢有莫知其為之者使得大用於世綏來動和之效庶幾乎先生嘗以道之顯晦在人而不在言語也遂絶意著述故其詩曰他年儻遂投閒計只對青山不著書又曰莫笑老慵無著述眞儒不是鄭康成有勸之者對曰伏羲著述數畫耳况畫前又有易乎君子曰先生著述可謂富矣自一言演之可萬言自萬言斂之可無言今其詩文不下萬餘首獨非著述乎其為文也主理而輔之以氣雖不拘拘於古人之繩尺故自有以大過人者其為詩也則功專而入神品有古人所不到者矣葢得李杜之製作而兼周邵之情思妙不容言故其詩曰子美詩中聖堯夫又别傳後來操翰者二妙少能兼今蒼梧山東皆梓行其集惜乎未全也至於揮翰如其詩能作古人數家字山居筆或不給至束茅代之晚年專用遂自成一家時呼為茅筆字好事者踵為之故其詩曰神往氣自隨氤氲覺初沐賢聖一切無此理何由矚調性古所聞熙熙兼穆穆恥獨不恥獨茅根萬莖秃又曰茅君頗用事入手稱神工又曰茅龍飛出右軍窩皆指茅筆也天下人得其片紙隻字藏以為家寶康齋之壻某貧不能自振造白沙求書歎十幅歸小陂每一幅易白金數星庚申朝廷遣官使交南交南人購先生字每一幅易絹數疋時從人僕攜一二幅恨不能多也先生敎人隨其資稟髙下學力淺深而造就之循循善誘其不悟者不强也至於浮屠羽士商農僕賤來謁者先生悉傾意接之有叩無不告故天下被其化者甚衆南畿僧太虛知名當世亦以其學求正於先生先生復書以逝者如斯夫不舎晝夜告之曰我以此證也先是先生道南畿見太虛告以念老母太虛為朝夕聖前祝願至先生歸相見乃已其篤信如此嗚呼若先生者君子謂周子之後一人而已者非耶某也無似自成化辛丑見我先生於白沙我先生即以國士待其後受教多而辱愛厚臨殁具書趣至白沙寄以斯文告門人羅冕曰吾道吾付吾某矣示以詩云古徃今來幾聖賢都在心上契心傳孟子聰明還孟子誰今且莫信人言又曰萬丈祝融何處山三年碧玉夢相闗多少盡工傳不去都沒賢今盡幅寛又曰病乆唯聽命詩成不浪傳門前花十丈玉井正開蓮數椽剛到地一棟正横天不亡吾道在萬萬嵗相連因執某手曰出宇宙者子也既而曰孔子之道至矣願母畫蛇添足又曰用斯行舎斯藏子其勉之吾言止是矣嗚呼言猶在耳不肖某斗筲之器何修何為而後可以少副我先生付託之重乎先生殁後門人聚議以湛某為行狀李某為墓誌銘梁某為傳而墓表則屬之某也某之為行狀也倉卒事多未備某竊懼乆而湮晦無傳暇日因重為補葺以為天下後世君子告且備異日史氏采錄焉謹狀𢎞治十四年嵗在辛酉閏七月甲申門人承直郎戸部主事張詡狀白沙先生墓表天旋地轉今浙閩為天地之中然則我百粤其鄒魯歟是故星臨雪應天道章矣哲人降生人事應矣於焉繼孔氏絶學以開萬世道統之傳此豈人力也哉若吾師白沙先生葢其人也先生以道德顯天下天下人嚮慕之不敢名字焉共稱之曰白沙先生先生生而資稟絶人㓜覽經書嘅然有志於思齊讀秦漢以來忠烈諸傳輒感激齎咨繼之以涕洟其嚮善葢天性也壯從江右呉聘君康齊遊激勵奮起之功多矣未之有得也暨歸杜門獨掃一室日静坐其中雖家人罕見其面如是者數年未之有得也於是迅掃夙習或浩歌長林或孤嘯絶島或弄艇投竿於溪涯海曲忘形骸捐耳目去心志久之然後有得焉於是自信自樂其為道也主静而見大葢濓洛之學也由斯致力遲遲至於二十餘年之乆乃大悟廣大高明不離乎日用一眞萬事眞本自圓成不假人力其為道也無動静内外大小精粗葢孔子之學也濓洛之學非與孔子異也中庸曰誠者天之道也誠之者人之道也誠者誠之其理無二而天人相去則逺矣由是以無思無為之心舒而為無意必固我之用有弗行行無弗獲有弗感感無弗應不言而信不怒而威故病亟垂絶不以目而能書不以心而能詩章雲漢而諧金石胡為其然也葢其學聖學也其功效絶倫也固宜或者以其不大用於世為可恨者是未知天也天生聖賢固命之以救人心也救人心非聖功莫能也聖功叵測其可以窮達限邪且治所以安生也生生而心死焉若弗生也吾於是乎知救人心之功大矣哉孟子曰禹稷顔囬同道韓子曰孟子之功不在禹下此之謂也先生雖窮為匹夫道德之風嚮天下天下人心潛移默轉者衆矣譬諸草木一雨而萌芽者皆是草木葢不知也其有功於世豈下於救洪水驅猛獸哉若此者天也非人力也先生諱獻章字公甫别號石齋既老曰石翁吾粤古岡産也祖居都㑹先生始徙居白沙白沙者村名也天下因稱之其世系出處見門人李承箕銘湛雨狀者詳矣詡特以天人章應之大者表諸墓以明告我天下後世俾知道統之不絶天意之有在者葢如此𢎞治庚申春三月望後門人張詡廷實撰明故翰林院檢討白沙陳先生改葬墓碑銘惟明宣德戊申嵗十月二十一日白沙陳夫子公甫誕于新㑹惟育成於妣旌節林氏惟生於考琮樂芸之既卒樂芸生於渭川渭川生於東源東源生於判鄉惟乃高祖惟夫子有生乃異始讀孟子志於天民二十年舉於鄉二十有七年罷於禮闈從學於呉聘君聞伊洛之緒既博記於羣籍三載罔攸得既又習静於春陽臺十載罔協於一乃喟然嘆曰惟道何間於動静勿忘勿助何容力惟仁與物同體惟誠敬斯存惟定性無内外惟一無欲惟元公淳公其至矣故語東白張子曰夫學至無而動至近而神藏而後發形而斯存知至無於至近則何動而非神故藏而後發明其幾矣形而斯存道在我矣夫動已形者也形斯實矣其未形者虚而已矣虛其本也致虛所以立本也語南川林生曰夫斯理無内外無終始無一處不到無一息不運㑹此則天地我立萬化我出而宇宙在我矣得此霸柄更有何事上下四方往古來今渾是一片自茲以往更有分殊合要理㑹終日乾乾存此而已甘泉湛生因梁生景行以見語之曰噫乆矣吾之不講於此學也惟至虛受道然而虛實一體矣惟休乃得然而休而非休矣惟勿忘勿助學其自然矣惟無在無不在斯無忘助矣問體認天理曰其茲可以至聖域矣問參前倚衡曰惟子是學矣問東所張子敏也子何不之講白弗問弗講且順其髙談然幾禪矣甘泉生曰人至無無欲也至近近思也神者天之理也宇宙以語道之體也乾乾以語其功也勿忘勿助一也中正也自然之學也皆原諸周程至矣惟夫子道本乎自然故與百姓同其日用與鬼神同其幽與天地同其運與萬物同其流㑹而通之生生化化之妙皆吾一體充塞流行於無窮有握其機而行其所無事焉耳矣惟夫子學本乎中正中正故自然自然故有誠有誠故動物惟嵗丁亥遊於太學祭酒邢公為之彰厥譽一峯羅子定山莊子為之左次遼陽賀子為之執贄惟嵗壬寅方伯彭公督府朱公為之薦其才夫子疏於朝曰臣母以貧賤早寡俯仰無聊殷憂成疾老而彌劇使臣逺客異方臣母之憂臣日甚愈憂愈病愈病愈憂憂病相仍理難長乆臣又以病軀憂老母年未暮而氣則衰心有為而力不逮乞歸養欽授翰林院檢討不敢辭自爾薦書嵗至不行或勸之著書不答夫不辭以嘗係仕籍也恭君命也不行達可行也夙志也不答著述之精寓諸詩也夫道知語默動静而不失其正焉耳矣惟𢎞治戊午遘疾彌留弗興越二年庚申二月十日乃卒方伯周公孟中葬之圭峯越二十有一年惟正徳辛巳𦙍子景雲謀及門下晉江知縣梁生景行翰林編修湛生若水庠生鄧生徳昌湯生䨞大學生趙生善鳴處士梁生景孚曰惟予家中否惟予兄弟二人景暘也先折惟諸子弗振惟我顯考之藏卜罔知吉至以累子若水輩乃以鄧生湯生具以十一月十二日改葬皂帽峯下聞於憲長汪公鋐以聞於巡按謝公珊下於府太守簡公沛為助之金總鎭韓公慶聞而先助之吏部方公獻科益助之府命縣典史賀恩義官鄧南鳳士人馬國馨董葬事乃襄事餘置祭田買其前湖湖曰自然昭至學也昔者水也聞諸夫子曰天下未有不本於自然而徒以智力收顯名於當年精光射來世者也夫自然則誠矣故夫子之生也人榮之其死也人哀之其誠之所為乎銘曰混沌既鑿源逺益分分乃支離體用弗原孔孟而下若更一門門各為戸競出異言渾渾濓溪有沿其源一為聖學示我大全學絶道喪千載棼棼天篤夫子握㑹之元泝程而周再復渾淪何名渾淪溥博淵泉直指本體挽漓而淳孰惑寓言孰惑其禪惟此天理二途判然師於捄世可謂元勳念功考德永䕶茲墳母毁支木以傷其根門人翰林院編修甘泉生湛若水撰白沙陳先生應召錄獻章自㓜頴悟一日讀孟子有天民者達可行於天下而後行之慨然歎曰大丈夫行已當如是正統十二年丁卯中鄉試戊辰辛未兩赴禮闈不第年二十有七從撫州呉與弼講伊洛之學丁亥復游太學祭酒邢讓試和楊龜山此日不再得詩驚曰龜山不如也以為真儒復出云成化十五年壬寅廣東左布政使彭韶總督兩廣軍務右都御史朱英前後具本薦於朝韶疏畧曰心術正大識見髙明涵養有素德性堅定立志願學於古人榮辱不足以介意云云吏部移文廣東布政司等衙門趣令起程獻章以母老及病未輒行英疏先有曰臣已令獻章就道矣謂章曰先生不行如英欺君上何不得已强起於成化十九年三月三十日至京師朝見赴部告以久勞道路舊病復作延月餘於五月二十五日吏部題奉聖㫖恁部裏還考試了量擬職事來説以病在床褥即令姪男陳景星赴通政司告轉行本部暫令調治七月十六日扶病聽試至部門復以病發再告復延旬日八月二十二日得報母氏憂念病作待章南歸以日為嵗二十八日遂疏為患病陳請乞恩終養事疏畧曰臣母以貧賤早寡俯仰無聊殷憂成疾老而彌劇使臣逺客異鄉臣母之憂臣日甚愈憂愈病愈病愈憂憂病相仍理難長乆臣又以病軀憂老母年未暮而氣則衷心有為而力不逮夫内無攻心之疾則外不見從事之難上有至仁之君則下必多曲成之士惟陛下以大孝化天下以至誠體萬物海宇之内無匹夫匹婦不獲其所者乞勑吏部放臣暫歸田里俟母養獲終臣病全愈仍前赴部以聽試用則臣母子未死之年皆陛下所賜疏上九月聖㫖陳獻章既該巡撫等官薦他學行老成可用今懇切求囘養母吏部還查聽選監生願告回家的例來説吏部查例覆奏初四日聖㫖陳獻章既係巡撫等官薦他今自陳有病乞囬終養與做翰林檢討去親終疾愈仍來供職以動履艱難不能拜舞令景星具狀鴻臚寺告俟筋力稍紓勉強赴闕稱謝既又病不能興乃具疏命景星謝恩而歸先羅倫送之有曰白沙先生處南海者二十餘年矣觀天人之微究聖賢之蘊充道以富尊德以貴天下之物可愛可求漠然無動其中者歸經南安張弼問出處對曰康齋以布衣為石亨所薦所以不受職求觀祕書者冀得間悟主也惜乎當時宰相不悟以為實然言之於上令受職然後觀書殊戾本意遂决去某以聽選監生薦又疏陳始終願仕故不敢偽辭以釣虛名或受或不受各有攸宜爾弼唯唯徴吾錄曰公膺薦時當國者不及李南陽輒令公就試吏部葢南陽能優禮康齋而公之禮數似不及公無加損但當時宰相人品之不同可見矣李南陽閣老于康齋處士千古稀見豈可以此責之萬安輩况媢嫉者乃鄉人耶余獨恨一峯修撰之謫曽不少遇以待處士之心嗟夫此脱然榮利者所以稱難而於二公應召故獨詳之也與陳建通紀曰築一室曰陽春日杜門端默其中以明心為務以明心為務之説不知從何得來又曰内監梁芳素慕獻章名言于上特授翰林檢討俾親終疾愈仍來供職獻章不辭上疏謝恩即歸意以授官出自梁芳及不辭為非不知謝恩疏具陳聖㫖查例與吏部覆奏鑿鑿可考授官不由梁芳明矣疏曰臣雖至愚亦知銜負恩徳圗報稱於親終疾愈之日不敢負朝廷待士之盛意不敢違臣子効用之初心此所以不辭其大意亦已見于東海之對矣彼建者烏足以汚之康齋先生之薦本自内閣大臣所以展盡大賢之禮石齋先生之薦由於司撫外臣所以禮數不及石齋徵時瓊臺丘公方為海内所重而石齋又以公居顯位不相見遂以此不合故人多疑石齋為公所沮後來三原劉氏求退科道劾丘公媢嫉或其漸然矣讀山雨不來昏晝景及南極海旁諸郡淺之句吁石齋豈尤人者哉送白沙陳先生叙白沙先生處南海者廿餘年矣觀天人之微究聖賢之蘊充道以富尊德以貴天下之物可愛可求漠然無動其中者孟子曰飽乎仁義不願人之膏梁令聞廣譽不願人之文繡周子曰見其大則心泰心泰則無不足無不足則富貴貧賤處之一也其斯之謂與夫天生物也人為貴其與人也心為大其人居之以禮位之以義道之以知出之以信成之以配天地以明日月以行鬼神以流河海以奠山岳以綏萬邦以蕃草木育鳥獸大行為伊呂窮居為孔孟不其大與孔子曰富與貴是人之所欲也貧與賤是人之所惡也先生不欲富貴而樂貧賤獨何心哉見其大而已矣堯舜禹天下大聖也為天子天下大貴也有四海天下大富也孟子曰人皆可以為堯舜荀子曰途之人可以為禹為堯舜為禹豈其為富貴哉為其大而已矣走而為大者麟飛而為大者鳳介而為大者龜鱗而為大者龍人而為大者聖賢飛走鱗介有為大者以人而不為焉不亦禽獸之耻乎趙孟之所貴彼能大之亦能小之也自我而大者彼惡得而小哉大自人者小人大之一時大之君子不大也小人大之君子大之天下大之後世大之大自我也然後可以為大也先立乎其大者然後小者不能奪也然後亦可以為大也可大者獨先生哉先生南歸道金陵諸君各為四韻詩以别謂余言余顧謂諸君自立其大者余何言成化五年已丑夏五月廿又四日永豐羅倫書贈詩建安周源人物明時第一人欲將斯道覺斯民才追班馬文章古學究闗閩道德新虞網豈能籠綵鳳魯郊終見獲麒麟孤舟日向金陵去囘首春風入夢頻禹穴涂志文洙泗汪洋詎有限𣲖分濓洛與闗閩茫茫泣面嶺南去濯盡人間多少塵湖南謝文祥白沙先生年四十屹然砥柱中流立肩頭負擔重千鈞萬古顏曾與長揖先生豈是不憂君先生豈是忘民急先生豈是薄公卿先生豈是躭蓑笠大行此道便鋪張窮來此道還收拾先生明日辭金陵我懷􅈝覺殷憂增白雲大袖弄溪水吁嗟堯舜誰與為仁和項麒秋水青瞳静青天白帽高吾儒有矜式斯世孰甄陶跡混山林槁心親湖海豪乾坤好風月吟弄樂陶陶姑蘇沈鍾名字流傳宇宙間鯫生何幸此躋攀光隂半百隨流水培塿之中見泰山閱世雙瞳如許大括囊萬里又空還斯人未得霑恩澤著作功成定不刋括蒼潘琴潮生晚風急孤舟去何之誰知三載間乃有三别離平生曠達懷不以去國悲辟彼縱壑鱗萬里焉能縻所嗟參與商未有重見期深林翳長林不肯炫所竒幽花出灌莾恐受衆目疑君應慎所履慰我長相思華亭郁雲旅館驚相見同為上國賓問年皆老大惜别又逡巡湖海雙蓬鬢乾坤一偉人掉頭留不住歸卧碧山春蘭溪章懋洙泗逈且深伊洛浩不息建溪一以逝淵源遂湮没浙水泛功利西江浸虛寂漂淪二百年未流靡終極明經取青紫滔滔不知溺誰哉障汪瀾為我存一脉有美羅浮仙金聲玉為質巖棲四十春遺編自探索章甫非我心鏗然只鳴琴寤寐千載人今古如一日興喪天豈知棄捐吾自失負重道路長行行慎無斁安得辭世紛雲山隨杖舄共對梅花春細問先天易江東龍瑄獻納違初願行藏任此身欲論天下事誰是眼中人嵗月歸時晚江山到處春相逢烟水外尊酒話垂綸宜興沈暉獻筞未得志拂衣歸海東大材偏不偶吾道豈終窮著述誰來裔衣冠復古風天長羽翼短安得附㝠鴻於越姚璟多君志道德英邁允超羣元氣時應㑹光風世更聞隴梅開夜月溪水漲秋雲昨幸韓荆識東歸惜袂分莆田黄仲昭考亭遺蹟久荆榛風度眞堪繼後塵千載武夷人仰止羅浮從此共嶙峋天涯兩度挹春風甕裏醯雞待發蒙明日又從江上别離心一片逐𡨕鴻江浦莊㫤百年吾道在東周天下斯人豈易求誰為齊王留孟子自知堯舜有巢由鳳凰氣象終千仭北斗光芒共九州萬里東南溟海濶蒼生何處問乘桴題貞節堂四首茶陵李東陽高門綽禊過高樓節婦名題在上頭綽楔如山屹不動門前江水自東流面面青山遶白沙蕭蕭白髪映烏紗欲知内翰先生宅元是南州節婦家嶺南風景値千金楚客謌成萬里心莫作楚謌謌此曲阿婆元解嶺南音大忠祠下非無路貞節門中更有人莫道人心不如古湏將節婦比忠臣夀石翁陳先生六十一詩序先生今年兩見戊申葢六十有一矣箕楚人也在門下作竹枝歌載尊酒於堂上為先生夀時先生之鄉閭諸君亦相率為詩歌俾予冠以文為先生夀承箕曰前申秋時太夫人進夀八十有四箕嘗再拜為禮太夫人不以其疎逺而拒我也諸孫肅然衣冠長者在前少者在後皆北面立階下輕清紆徐抑抑揚揚歌古之詩以侑觴先生西面立喜形於色先生非樂我也太夫人在高堂康健和悦氣静而志閑子孫皆恂恂寡過先生心無悔恨身逺利祿天下之人異之今翕然以順無逺近無貴賤咸來問學先生怡然隨問而答初不强括之亦未嘗輕拒人也暇則閉門高卧人不能以勢相誘孔子曰不知老之將至此豈人之所能知也今孟冬廿有一日先生初度晨諸君誦予文予歌諸君詩諸君又從而和之相與拜跪成禮而退將無煩先生顧客使箕他年披然白髪重上先生之堂作曲于首所謂鵲南飛者毎遇斯晨載歌而觴觴而醉醉而起舞相與忘先生弟子之老得隨杖屨飄然遺世獨立而樂夫天命焉先生豈遺諸君與我也諸君於是再拜先生言曰承箕之言盖以人事之至順而信天道之必然天豈不可必乎陳白沙集附録
