  - {type: variant, offset: 19074, length: 0, content: '', WYG: 遺言湛民澤孟子見人便道性善言必稱堯舜此以堯舜望人也横渠見人便告以聖人之事此以聖人望人也吾意亦若是耳竊附孟子横渠之後彼何人哉予何人哉有為者亦若是文王我師也周公豈欺我哉區區之意在覽者深思而自得之既以寄民澤亦以告有志於門下者咸得自勵而日勉焉非但為美言以悦人也與平湖語連日不如與賓州一尺簡易曰初筮告再三瀆瀆則不告此教者之事夫豈有所隱哉承示教近作頗見意思然不欲多作恐其滯也人與天地同體四時以行百物以生若滯在一處安能為造化之主耶古之善學者常令此心在無物處便運用得轉耳學者以自然為宗不可不著意理會俟面盡之民澤足下李世卿書來問守臺者老朽以民澤告之冷焰并騰殆出楚雲之山蓋以勉世卿使求諸言語之外如世卿可惜平生只以歐蘇輩人自期安能逺到賢郎在病可徐徐而來眼中未有能奪公楚雲手段也五月十二日石翁書此學以自然為宗者也承諭近日來頗有凑泊處譬之適千里者起脚不差將來必有至處自然之樂乃真樂也宇宙間復有何事故曰雖之蠻貊之邦行矣今世學者各標榜門牆不求自得誦説雖多影響而已無可告語者暮景侵尋不意復見同志之人託區區於無窮者已不落莫矣幸甚幸甚楚雲雖日望囘萬一髙堂意有未安亦未可率爾行也珍重草白民澤進士章久處危地以老母在堂不自由耳近遣人往衡山問彼田里風俗㝷胡致堂住處古人託居必有所見儻今日之圖可遂老脚一登祝融峯不復下矣是將託以畢吾生非事遊觀也三年之喪在人之情豈由外哉今之人大抵無識見便卑闒得甚愛人道好怕人道惡做出世事不得正坐此耳吾輩心事質諸鬼神焉往而不泰然也耶病中不欲多言幸以意推而盡之未可草草也五月五日石翁書復民澤侍者民澤足下去冬十月一日發來書甚好日用間隨處體認天理著此一鞭何患不到古人佳處也章自去秋感疾迄今尚未平昔者髙堂未傾病輒叩天願少假之年今廬岡之木且拱吾何求哉其未忘者衡山一念而已皇皇靈芝一年三秀予獨何為有志不就其可念也夫其亦可歎也夫廷實近多長進但憂其甚鋭耳子長病且愈曰髙音耗亦無黄巾納婦館中惟一之與服周教諸孫海北汪提舉向慕亦切作懐沙亭於海上此外有修古書院冷香橋之作所費不少恨無以成就之耳民澤在鄉安否禍福原於人情不可不仔細察也謾及之不一一戊午季春三月初二日石翁在碧玉樓力疾書陳}
