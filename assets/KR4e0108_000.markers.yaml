  - {type: variant, offset: 286, length: 841, content: 得遺集二三冊焉爰増其未有者削其不必存者以付梓人也軰廼欣然成之其志可知矣因謂之曰兹刻也豈徒存載籍巳㢤将以求先生之心焉耳不然彌文而已矣生軰謝曰謹受敎因識之且題曰白沙子猶孟氏七篇而題曰孟子之義也嘉靖癸已仲秋吉旦前進士西蜀後學髙簡謹序白沙子目録一卷前叙目録奏䟽二首序十八首記二十二首論六首二卷書簡八十七首三卷書簡八十九首四卷墓誌銘表十五首祭文三十首賦二首賛一首銘四首啓四首說五首批荅張廷實詩箋十首傳状三首題䟦三十二首五卷古選一百二十七首五言絶句一折百九十首六言絶句十一折首七言絶句二百一十一首六卷七言絶句四百七十首七卷九十八葉五言律詩二百九十六首五言六句一首七言律詩一百三十一首八卷七言律詩四言詩四首五言排律四首七言排律三首古風歌行三十八首白沙子目録終論白沙子丼泉子曰夫先生聖人之徒也先生詩文其中古之制作乎其詩歌如風雅頌其文詞如謨訓誥或聞之愕然曰何㢤若是其大也不亦少誇矣乎今觀其詩歌之體裁猶夫今之詩也何耴乎風雅頌觀其文詞之矱度猶夫今之文也何耴乎謨訓誥曰非是之謂也孟軻有言今之樂猶古之樂也何謂乎聖賢之言發乎人心之同然故與古訓異體而同道夫惟求於牝牡驪黄之外者而后得馬之真相忘於言語形似之外者而后得聖賢之藴是故以其中和之性情發而爲中和之永嘆優柔而敦厚焉是亦風雅頌而巳矣以其自得之精意以發其未發之藴載道而典則焉是亦謨訓誥而巳矣曰然則何以異乎曰言詞古今之不同猶之東西南北之方言聲氣之異耳矣而因以爲人情有異可乎今以詞之古今而疑聖賢之異者則亦猶求人性扵東西南北之音之類也求馬扵牝牡驪黄之類也曰然則果若是同乎曰以詩觀之風殊于頌頌殊于雅矣遂謂詩果不同可乎以書觀之誥殊于訓訓殊于謨矣遂謂書果不同可乎則又何疑乎后世之詩之文也㢤故求先生之詩文者當求先生之道扵言外之意以合扵古訓而不當求先生扵言詞之間則惑也夫然后知先生之詩文不可以后之詩人文士之詩文觀之矣門人髙簡曰吾師丼泉先生過維揚謂灤州亦刻是集乃吾同年友柯侍御意也先生既手校付之而因序焉此論是也簡請觀之真足以破文人才子之訾矣因畧其序刻之由而附其要語于此以俟眀者覧焉, WYG: ''}
