  - {type: variant, offset: 16306, length: 2748, content: 讀韋詩夜雨齋燈卷未收清謡白首對蘇州晦翁兩眼秋波碧也爲先生一點頭寄廷實南北東西一馬塵相思何處不傷神竹邊閉閣長無事猶厭山雲軟素巾弘治已酉春姜仁夫進士以史事貴州還取道廣東過予白沙自已卯至丙戍凢八日辭别三首予亦次韻爲别明日仁夫至潮連寨方十餘里遣隸囬并得三絶和之通前九首吾與仁夫之意皆不在詩也豈尚多乎㢤仁夫浙之蘭溪從斈章先生徳懋吾廿年舊好故吾詩两及之江門淺路㡬人通两月公程來向東何䖏敢勞君着眼短墻踈竹是家風雲去雲來等是浮獨凭髙閣看江流南風莫送東歸客更共江門一日逰家徃桐江舊釣䑓鳯林何日暫歸來平生章子如相問道我山中日閉齋次韻仁夫潮連見寄進到鳶飛魚躍處正當随栁傍花時今人不見程明道只把中庸說子思樂歲呈楊大尹舎北歌童搥破鼓舎南春婦着新裙田家少遇豊年樂盡道今年是十分夀東静軒七十次世卿韻甲子如何管得翁全無白髮有青瞳赤泥便是逰仙枕兄卧西頭弟卧東對璧間李賔之學士和予藤蓑詩偶成奉寄之西涯一曲我藤蓑對此相思可奈何今日玉䑓應說我江間何處扣舷歌午睡起道人本自畏炎炎一榻清風捲晝簾無柰華胥留不得起凭香几讀楞嚴次韻奉荅李方伯介軒潮連見寄姓名秋榜忝同鄕四十年來守故常拄地撑天吾亦有一莖青玉過眉長不侍氷顔累十秋可堪相近阻相求此心未許傍人識公在山齋㒒在舟用韻寄鍾羙宣緑桞黄鶯紫水涯市橋沽酒醉春沙江花一與詩人别如此風光属自家晝睡爲雀所喧野風吹隙簷翻雀晝攪床風雀攪眠若道神仙無一事老夫當日未神仙失㒒粥罷腰膁亦上山晡時悵望負芻還乍疑乍到忘歸路月滿東楹未上關别後膝痛甚扵前日夲無詩悰獨念吾與廷實不可無言以别故及之五年不岀獨何心萬里行囊又一琴難冩别離今日意江門春水不如深定山許撰一峯墓誌東白許墓表乆不見示先生老去銘當出東白人來表可聞却愛大流山上月清光先到一峯墳今古多聞遷史記一峯何必我同年先生存作垂千古東白曰然我亦然南雄書院讀羅一峯碑丘墳何䖏草離離千里湖西夢覺時落日小池橋上路催人下馬讀殘碑金鰲閣横浦秋成百尺橋金鰲閣上見山遥凭髙無限歸來思何處飛雲不可招玉枕山一枕秋横碧玉新金鰲閣上見嶙峋使君得此元無用賣與江門打睡人鐡漢樓鐡漢元來亦是誇覊魂入夜遶天涯數聲羗笛樓前月落盡寒梅一樹花携琴圖松崖日暮水聲深何處携來緑綺琴磵石隔林人不見只疑罔兩是知音墨花䑓東坡遺跡汝弼即是張長史堯夫方愛陳公甫何處思君不見君墨花䑓上㢘纎雨横浦橋乗輿十月猶溱洧子産未知爲政在隔河騎馬是何人下馬問訊張東海濂溪䑓黄菊花開又一年南山無分對陶潜不知風月随儂否惱殺䑓中一夜眠葵庵葵花愛日臣愛君臣與葵花共此真試問春來桃李樹紛紛同者是何人曹溪别諸友相随征路二旬餘笑指前山别老夫却到前了心未了西風孤燭两踟蹰天柱山天柱山前望故郷西風浙浙鬂蒼蒼愁膓暗爲慈親㫁誰信青山是劍芒剡溪剡曲溪中雙槳鳴老翁訪戴是虚名雪消月出歸來夜只有詩情與世情雲封寺有曲江遺像戯題嘗疑大塊夲全渾不受人間斧鑿㾗今日雲封禪寺裡曲江遺像任塵昏度嶺有懐張曲江天地風雲㑹有辰開元可是欠經綸千㝷松下㸔流水十八年中度嶺人與王知縣劍水相逢梅始花春風吹動長官衙詩家到此須分别不共河陽一處誇挽劉先生顯仁曽傾白下郎官蓋忍讀青田太守文今日九原誰是伴里中新有一峯墳崖山襍詠北風半夜捲滄𬈑杖屨船頭候暁晴滿目寒雲吹不散一㠶細雨濕湯瓶萬古青山自落暉白鷗穿破水雲飛孤舟江畔無情思閑與児童詠緑衣訪敎諭何宗道樹隠肩輿行欵欵花催春鳥閙關關蘇公渡口雲連水宗道廬前雲滿山不寐舊雨今雨漏湔湔長更短更聲相連何人酌我金尊酒暫醉慈親卧帳前次韻荅丘侍御五月江門荔子叢繡衣下馬擘殘紅児童争走烏䑓節笑挽青荷立水中峽山别胡提學還至九江作峽行飛岀两三舫滿載離愁下九江夜泊孤舟不䏻寐自燒銀燭倒秋缸過羅一峯墓一峯原上夕陽斜雲掩閑門㡬樹花見說西風吹不死散分春色與僯家彈子磯候諸友不至軍人打鼓泊官船黒霧𪷟𪷟水下灘隔岸相呼不相見竹籠牽火上桅竿石門讀貪泉碑芙蓉花發西華寺逺訪殘碑到䂖門一曲貪泉歌未了夕陽紅近水西村贈曹侍御璘謝病飽蕨青山更飽眠㐮陽歸去自今年眼中未有如公早柱史前頭或姓錢雜詠過午城中走帖還老夫對酒社東山詩家進歩如撑艇又上前溪一两湾傍花随栁興飄飄澗水牽情到石橋勃率未堪還自笑眼前剛好𬒳春撩不坐人間彩鷁舟怕逢漁父問因由君家酒艇䡖扵葉試遣長鬚爲我謀拍月縈爐一小舟欲竆仙島路何由須君一見安期老指點蒼茫爲汝謀得世卿詩笑顔别後㡬回開詩到衰翁輙舉杯擊壤狂歌千首在一春無計寄君來東野㓛深偏洗削退之意到每優柔眼前一二聊拈掇正好承箕對孔脩東白張先生借予藤蓑不還戯之水北原南秋更多滿川明月濯纓歌長官要結溪山好去問南昌乞釣蓑咫尺溪光谷口分谷中人語隔溪聞明朝便下山亭去溪上清風可送君夢中作木葉爲衣草爲屨鳥共唱歌花共舞䄂裡青蛇三尺許六六洞天中作主風動㣲香洗得塵獨行山路不逢人梅花歲歲還依舊只㸔行人著句新日出東山尚未眠閑㝷溪水弄溪船人間一種惟予樂只在溶溶浩浩間躑躅江邊水沒橋沿溪貪賞不辭遥獨憐歸馬無鞭䇿未忍臨風折栁條題徴仕郎張公孺人區氏墓誌后衞幕已鐫東白誌西涯又撰孺人碑莫道不傳家世事當年兼有两公知種萆􅏘六首山渠面面擁萆􅏘鎻盡東風一院花江上行人迷指顧老夫扵此煉丹砂短檠他夜照書床一􅊦萆􅏘也借光老去圖書收拾盡只憑香几對羲皇紅朶青條擺弄同人間無地不春風莫䡖此軰萆蔴子也在先生藥圃中萆􅏘得雨緑成畦如此風光亦老黎飲後小庵搜句坐山禽啼近竹門西萆蔴遶竹徑通雲雲裏樵歌隔竹聞手把長鑱種春雨風光吾與老黎分種了单蔴合種瓜青山周折两三家老夫來搆茅茨畢别種秋風一徑花次韻李憲副若虚白沙别後途中見寄江門春浪两涯平半醉船如天上行坐冷燭花歸問夜逢逢津皷欲三更咫尺圭峯不見䑓春雲将雨㡬時開山中一徑無人到除是青天畫舫來江城無處不通潮風疊寒漪色更嬌詩舫飄飄向何處髙涼西去不勝遥和鹿歩韻黒甜一枕鼻呼雷江浪如山夢裡來乹坤何處留雙眼不向三洲鹿歩開贈湯地理師春泥沒屐大江潮溪北𥘉經獨木橋千丈峯頭望東海三山正對杖頭瓢錦嚢以上不堪言老郭元來亦是仙笑殺城中諸年少欲持阿堵問君傳南越山川拄杖交東風何處送歸舠一條路打朱明過直下潮陽看海濤雲水相逢是偶然江亭燒燭話新年眼中但有牛眠地指點青山不要錢贈鄒處士還合州人間憂喜也無期萬里間関一馬歸莫灑東風别時淚春光又滿老萊衣石城米賤雲門鎮吏目身輕翰苑官歸去山中偏好睡家人不用逺來㸔題也可庄上見一空交交黄鳥弄春晴也可山庒隱几聴莫以山林笑流俗山人元是此山靈青山何處倚鳩藤囬首塵埃㡬折肱林下一壼誰共醉淵明只好對髙僧醉中作酩酊髙歌掩舊書青山日月笑居諸一畨春雨無分付枉種桃花三两株酩酊放歌何處來東風吹笠上溪䑓䑓傍有箇髙飛鳥飛向三山去不囬觀物一㾗春水一條煙化化生生各自然七尺形軀非我有兩間寒暑任推遷早飲輒醉示一之清晨隠几入無竆浩浩春生酩酊中我若扶衰出門去可䏻筋斗打虚空得廷實書洗竹添花張戸曹忽抛閑散事煎熬東門春水無人釣又長溪頭㡬尺髙忽聞戸外歌聲以爲馬玄真将至不知其累約而累違也諷以是詩花前誰共引杯長風送歌聲到𧹞郎莫唱雍門絃上曲從來此曲㫁人腸荅, WYG: 答}
