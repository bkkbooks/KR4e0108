front:
  text: 刻白沙子叙夫道貫古今匪明弗在孔孟而後延蓋昭如矣唯明嗣興若白沙先生都其周程之徒與蓋先生起于南粵獨悟道妙而非有䏻授之者是故其見道明故其體道至其體道至故其言論簡易而弗支且多夫其弗支且多也故凡形諸動靜存諸語默播諸詩文徴諸出處罔非道妙呈華譬諸化工流形萬彚森布各止其所而其文固煥煥乎莫之繪焉夫豈雕鏤綴竒苦思模擬役心垂後而故存之簡冊者哉雖然其猶先生之緒餘焉矣乎是故道𥙿諸心精明應妙固莫能覿矣而自有與天地悠久不滅者存非賴是能彰之也然志士君子非得之其胡所考見儀刑故其門人張東所既采集之梓諸其里矣四方猶罕覩焉豫柄維楊教與諸士講學暇偶談及兹書共以未得為憾遂出豫本命卞生也輩刻之因訪諸吾友沈汝淵氏得遺集二三冊焉爰增其未有者削其不必存者以付梓人也輩乃欣然成之其志可知矣因謂之曰兹刻也豈徒存載籍巳哉將以求先生之心焉耳不然彌文而已矣生輩謝曰謹受教因識之且題曰白沙子猶孟氏七篇而題曰孟子之義也嘉靖癸已仲秋吉旦前進士西蜀後學髙簡謹序白沙子目録
