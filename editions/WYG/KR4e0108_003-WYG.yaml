body:
  text: 簡與陳進士時周時周水菽之養自垂髫迄今三十年韓退之稱孟東野無田而衣食事親左右無違混混與世相濁獨其心追古人而從之時周葢有之矣時周别去益思時周平生履歴之難大略與老朽同而又過之求之古人如徐節孝者眞百鍊金孝子也頃歲有答林府主壽老母生日詩云有母年齡暮逄辰喜懼深多儀焉敢郤揣分故難任錦段拈香拜仙醅喜盞斟獨慙非節孝未了百年心因事惟賢寄不足於詞詩中發之盡矣抑聞之子不私於親非子也士不明於義非士也賢者審擇内外取舎之宜以事其親愛日之誠而無不及之悔在我而已與袁進士書足下去青山登黄甲一旦取貴官如反掌人皆華足下而不知足下之不樂乎内足下之心形於書尺足下之辭甚直誦之揆之凡足下之事無是非可否得失足下一一具言之足下過於時人逺矣時人或錚錚自許其不欺反出足下下雖然足下慷慨自任不能吞炭為啞以取容於時則將大聲長鳴於仗馬間乎此非僕所敢聞也緝熈坐青湖山三年矣徳孚旦夕過我其問足下也告之復林府尊順徳令來辱書承以送東山先生序文屬之僕東山先生愛百姓如已子百姓戴之如父母徧觀當世未見有如此者僕所目擊序奚宜辭顧僕平生拙學於出處語默有不容不致其愼者不敢不告也僕於送行之文間嘗一二為之而不以施於當道者一則嫌於上交一則恐其難繼守此戒來三十餘年矣茍不自量勇於承命後有求者將何辭以拒之僕聞愛其人必欲其美僕之辱愛於執事不可謂不厚獨於此偶未之察耳伏惟執事終始此愛不强其所不能幸甚幸甚有李某者嘉魚人近自其鄉來白沙其人東山先生知之其為文有氣采僕讓之慷慨特達樂聞人之善而樂道之僕謂執事倘可以此文托之乎然否惟命與黄太守聖天子即日命下拜端守黄公叅政病夫某聞之喜連日病夫與公舊故能知公剛方有力能集事使得髙位以行其志以有聞于後病夫之心公之心也能勿慶乎謹具羊酒菲儀帕一方絹一疋以表下忱伏希鑑納與張太守克修邇者修建祠宇墓亭各已有緒實賴仁者廣濟之力知感知感竊聞治郡以嚴令下而人爭趨之無敢後者向去買木人不知所裁木被雨漂流者民之負約者一切宜置之而以聞於左右夫利乃衆人所趨義則君子所獨萬一以我故干累於民非細事也告乞已之千萬之懇自兹以徃更不發人買木亦乞明示該縣將來切囑切囑制中不他及與丘蘇州辱書知起處甚慰僕以疾病跧伏海隅比於縉紳往還中非平昔素知不敢輒上問多罪多罪承喻周翠渠守廣徳有聲因記曩歲周侯贈賀克恭詩云黄門仙客歸遼左少室山人憶嶺南我亦塵埃難乆住木蘭溪上浣青衫周侯後以進士留京以書來番禺僕次韻戲之未及寄去周侯尋守廣徳僕以不能默默而竊喜周侯之有為又喜先生能與人善益思周候所以處於克恭與僕之間其始終去就可不可之權先生葢未知之也為絶句一篇并前次韻録去以發千里一笑又自閣下領郡去京師與僕不相見者五年矣閣下宦業益進僕沾疾來凡百事不如昨今羸然一衰氓矣常常思慕閣下然但意其在黄耳不知其去而為蘇也比者獲手教承先府君棄世已乆閣下復守此大郡豈無悲忻終闕弔賀不罪不罪閣下秉好徳之常性有成物之美意辭氣所發藹然盛大如閣下之心達之天下有餘也奚論一郡僕於是不能不一賀非賀閣下也賀蘇之人得賢守使鰥寡孤獨者得其所也雖然閣下不以行道自任而以養親為辭僕於此葢又不能無疑也郡準古封建爵為諸侯出入備五馬之容刑賞行一郡之政邦之安危民之休戚無不繫也孟子曰有官守者不得其軄則去言不可濡滯也僕聞之君子之事親也盡其在我者不必其在人者茍吾之所為不畔乎道不愆乎義則其為孝也大矣禄之失得弗計也閣下以為何如朱侯詩跋向何處批判幸飛示僕在京時居仁嘗通一札但未識面耳梁石克恭皆僕平生所深望便中聲意為感與鍾地曹所卜新兆形勢甚具穴甚的竊料其中當有好土昨日所見止是膚淺處更宜深掘見之但不及水泉儘深無害葢土色美惡不同氣亦隨之而異乗其美者則吉乘其惡者則否此可理推不可拘泥葬法淺深之文如范越鳯云凡穴宜及一丈外則不為草木之根所及其説亦似有拘若掘止八九尺間見有好土不止則傷龍若深掘而無好土則無如之何今限以葬隴宜淺之説恐其下實有好土而或為浮面粗惡所隔則舉全地而棄之矣可不愼歟程子以土色光潤為地之美葬家以驗土色為辨吉凶㨗法此不易之論可以默㑹矣况此山來勢極是雄猛必得融液之土方為全美亦不可草草也與林春官辱書乆未謝今者寄到手札并手扇二握仰仞來忱可勝愧感閣下以六品之秩居部官非禄仕明矣要能脱外榮樹立功名天下共責望况於僕者哉僕非不願為此顧無閣下之才與閣下之位矧今髪日就種老逐病來病與懶遭於世間凡百事脱落盡故於左右期之耳承諸公起居甚慰周先生為廣徳得人心稍稍前此丘蘇州書來亦謂如此可賀可賀往者京師與廣徳歩月閒談異日或出或處必相料理今日閲此紙罷因寄木蘭溪上浣青衫之句不覺呵呵遂成拙詩梁石終為廣徳州木蘭溪上水空流詩中往昔三人共海上如今兩鳥囚給事易為清靜退山人眞脱網羅愁如何皂葢不歸去應為蒼生未肻休以為使廣徳及克恭軰見之當發一笑故并録奉左右倘達之諸公亦足當一簡也與吳惠州繹思僕腐儒也生嶺左四十又七年矣乃無以自見於天下頃因一二軰流妄加推讓於有所不為之中置賤姓名焉執事從而齒録之乃不自矜重具酒與幣勤一介於千里賜之手札而問焉僕何足以當此慚悚慚悚然僕之所以不辭於執事非昧於自度辱執事使也徒欲以廣執事之心使天下稱執事者以執事為有禮且曰執事於不賢而譽且禮之况其所謂賢者乎亦昔人請自隗始之義也郡大封也太守大官也當風化未還之日獄訟日繁幸而主者不敢怠於其職疲神竭知夜以繼日孳孳猶恐弗及如此者今之所謂賢守也執事光明磊落優游而敦大規模氣象逈異常流使勤於聽訟矣而又不遺其本焉此僕所以乘風而知慕覽幣而弗辭其心葢又有激於此也若夫君子進為君退為親進退可否之機執事研之熟矣僕何敢仰疑於萬一哉使回并此布悃不罪與汪提舉弘治戊午月九日作白沙陳某啓千里一緘由辭以得意足下垂愛之至非尺牘能盡章何徳以報之承示近作足見盛年英邁之情大抵論詩當論性情論性情先論風韻無風韻則無詩矣今之言詩者異於是篇章成即謂之詩風韻不知甚可笑也情性好風韻自好性情不眞亦難强説幸相與勉之知廣大髙明不離乎日用求之在我毋泥見聞優游厭飫乆之然後可及也人自海南來者稱足下事功之偉阮從事至益聞所未聞足慰翹企雖然局於見聞者未必知也如修古等作誠美矣人徒知慕修古之名抑孰知修古之實之著於今日者何如也觀往可以知來一眞一切眞得其門而入者無逺弗届也慕竹記文章心許之病未能耳足下欲顯其親於無窮豈專待是耶白洋眞境想像不來别紙塞命良慕高尚耳不多及又足下事功之竒襟韻之勝安得一寄目於冷香以盡作者之妙今者畵圖能令武夫俗吏見者莫不鼓舞稱快况吾人哉雖然非病夫意也病夫何足以當之足下以是心求進於古之人庻乎無逺之不至矣嘉貺不一照領録來諸作毎讀一篇輒欲奉和而病未能慕竹記文大書表墓均之未可牽勉小詩四首録於巻中徒於阮從事過江門一次依准還海上耳高明必能亮之李世卿期我於朱陵沈督府書來問行張東所已辦一杖雙屨隨我顧今病勢尚未可動餘無足道者與顧别駕止建白沙嘉㑹樓執事未有不以公務而止敝邑者今日之事欲為名教樹無窮風聲於後代而姑托始於僕以為之名伏惟按治廣東侍御熊公揭名嘉㑹選能集事一人使相地白沙問於我府主林先生以得執事遂盡聞於我藩憲諸老先生倡斯和之興一役而衆論攸同舉一義而多士知勸百餘年間嶺海之内未聞有如今日之盛者也顧僕何人俾以虚譽濫竽斯㑹區區不勝感激愧悚之至執事以才識卓異見重於時諸公誠信而委之僕愚以今地方多虞民苦力役斯亭之建雖以賢别駕主之然寸土尺木不無勞費在民願執事再加處分以復按治之命茍可已之不但紓民之力而負且乘之譏亦且不及老朽以貽玷諸賢尤見執亊相愛之至也幸甚幸甚又山樓小搆清白俸餘之助得之公不以隗謝士詘於不知已而信於知已此僕所以每受賜而每不辭於公也雖然厚徳不可以不報尚友古人永矢一心進以禮退以義不受變於時俗近之則可親逺而望之益光此僕所願望於公如是若徒以身為溝壑無所規益舎已循人與時勢上下非僕之志也鐫者偶有所適碧玉樓詩刻俟後寄所示從吾先生送張廵檢詩何不類平生之言也分惠諸兒軰及諸士友厯日分付一一感公盛徳并此為謝與金通守某啓今日里長付到黄歴五本前此寄來鄉試小録一本具有封識已一一驗領疊辱台貺豈勝榮幸某本田野之人濫竽士列凡於公卿之門惟知尊敬盡禮而已不敢隨衆奔走以負其初其有賜於某者既於家中拜受更不進謝惟照亮不具復胡推府辱書英特不羣之氣溢於言外而其中耿耿欲與世抗尤於詩焉見之前數日托倪指揮送去手書弗及想未達也承以得卑官為喜古之善處困者如是雖然未若忘之愈也忘之都無亊矣詩本温厚和平深沉婉宻然後可望大雅之庭執事之作其果近之乎如其未近則當易故求新増其所未高濬其所未深然不獨作詩為然也臥病餘旬不能舉動感兹逺别又重違左右强勉數紙不能佳也不審何日離省區區馳戀之私想能亮之書墨并此謝與左知縣章啓頃者欲留一飯為他客所併别去匆匆一語不能究至今惜之黎生來辱書兼多貺硯石之竒尤為難得昔伊川先生以一詩酬王佺惠藥傳之至今明府善為邑使百姓歌之老朽雖不習於辭尚能為明府執筆作循吏傳傳之天下後世以為美也明府寧不許我耶瞻奉未涯謹奉啓不宣又昨來枉顧老夫胸中又著一左明府矣由鄧生之言知明府遺愛仁化已多今者隣封得此賢牧幸甚幸甚老病林下每聞四方郡縣得人輒為生靈喜况目擊其人乎公程還日過白沙少留片餉細話平生志業以慰老懷是所願也與順徳吳明府頃者從事至辱書貺為感適姜仁夫在坐不即裁答仁夫説足下縷縷去歲首夏李世卿過白沙至臘初始别閒與論一時人物世卿亦以後進之才稱足下章於足下所存不待書而悉也念昔蒼梧之㑹潦略幾於失君矣顧今乃蒙不鄙瞻望清光於咫尺得非幸歟章衰疾不出足下拘於官守未有相見之期惟當洗耳林下以冀隣壤頌聲之來足下將不以循吏之事讓古人也又出處語默咸率乎自然不受變於俗斯可矣以張梧州先生與獻臣近日所為章皆未得其詳不敢懸决是非俟面盡又梁生至辱手書具審被誣亊今已釋然甚慰明府惠愛在民民以是報何耶凡天損之來吾無以取之可以言命矣唐中丞稱潘時用之賢悼鄒汝愚之死小抑大扶朝低夕昻張梧州之於督府皆可謂知已之遇夫復何憾承一一示明府豈徒羡彼者耶陶邦伯才能集事威能禦暴便可當一面之寄其它未敢輕議大抵用人不求備議者謂中丞公人物一大鑪冶百錬之則眞金出焉順徳小邑治之不難而有難者其誠乎誠則不言而民信無為而化成觀於明道先生治縣則可知用智之不足貴矣承下問不敢不盡明府以為何如與趙明府平後山碑文僕已謝於陶公非敢有愛於言也夫文以紀功必書首事主後山之役者誰乎今秦公已去存者兩府皆非知僕者也孟子譏未同而言此豈止於未同而已也一二十年來僕與人為記序等文多不過十數碑而已為陶公者半之謂僕於公有所擇於言乎必不然矣司馬公作相欲除諫官而難其人問於伊川先生不對公曰出於子口入於光耳何害伊川終不為言之語默要自有當也若不問可否惟以相與之宻而責之言伊川為不忠矣僕廢退之餘恐收斂之不謹以取罪累實非有他也惟執事亮之答陽江柯明府頃者有胡秀才來謁白沙能道執事志行之美章多病少出於執事無一日之雅聞秀才言為之動容起敬已置執事於東南十郡内賢守宰之列所謂生而民愛戴之死而且爼豆之以此期待陽江而注仰之乆矣蒙辱手教承已表識張太傅墓又於墓前搆祠祀之與厓山同幸甚幸甚以今觀之執事所作皆風化首事尋常只是簿書俗吏取辦於目前耳何嘗望見陽江脚板耶祠記某當作昔聞秀才言執事表墓建祠某已心許執事矣顧今拙病未能脱體少延歲月為之未晩也病倦不能具大狀使囘聊此復餘不一一與任明府昨蒙枉顧感感一談之頃愧乆病未得脱體精神不能自達愧負何限雖然造次間已覺明府英邁之氣出於人上者可畏可喜異時當為賢宰牧有聞於天下後世新寧之民一何幸歟今日又蒙多貺之及感怍感怍以新作之邑遇新除之令凡百政令皆自我出未有壞於前者事機之㑹如此亦可賀也老拙以為天下之事成之惟在威信威信一立無事不可為茍無威信則無其本難乎其立政矣明府裁之病倦執筆匆匆不究所欲言謹此布謝而已惟照亮幸幸與曹知縣執事去新㑹二十年矣何由復見執事日侍正節堂延接四方賓友與言昔者土木之興衆工一日具舉執事悉心於名教常在人目雖不見猶見也堂成而執事解官堂今存而老母下世俯仰今昔情如之何恭惟執事才足以立事勇足以行志而竟不為世用或云見曹長官於京師或云退而家居慷慨如平時欲致一書慰執事無可托者男子葢棺事方定士所遇有時焉耳鮑叔有聞於後代以其能眞知管仲也雖不仕齊有功九合諸侯一匡天下鮑叔賢之烏乎世復有斯人乎執事以某之言為然則凡世所汲汲而後見者皆不足以望執事亦非所以厚執事也李世卿還嘉魚輒此奉候粗布二端表逺忱制中不多及與梁知縣三郎囘能道漳平初政甚慰懐仰居下而能獲乎上事功將日大聲聞將日著可賀今之從政者豈必盡如古之人但髣髴其一二世必以良吏目之矣又能始終表裏無間將來必大有可觀幸卒勉之老拙之望也比者小廬山塋封粗畢逺煩致奠哀感無涯竒娘子母計各安好漳平風土想與此間無甚異惟善調攝勿令生疾惠絹感感耳邊常得好消息不用寄物也與鄺知縣兄弟丁明府彥誠今之良宰官也遺愛在邑邑人思其徳欲為廟以報之此義舉也吾軰當為之倡今附去疏文一首幸留意富者多助貧者一錢勿棄大要見此舉報往勸來出於民心之公庻幾光明正大可以傳逺今卜地在白沙里社前與嘉㑹樓相望亦其平生所樂遊之地留題眞蹟尚在壁間吾知其必享也與林郡博先生門人近連得緝熈兩書烏乎尚忍言哉平湖别家踰十年官滿來歸不見仲氏見母夫人豈非幸耶再如京師謁選未及一載歸哭几筵前有就禄之請而人見疑後有終養之圖而母不待且母與褒之恩孰重章謂哭子之愛尚可割哭母之恨無時休不肖孤不丐先帝之仁寧免終天之憾耶緝熈孝禀自天豈無念母之誠因斗升之禄以求便養無難處者特於語默進退斟酌早晩之宜偶欠一决遂貽今日之悔而世之議緝熈者多矣當是時雖使一恒人非沉酣利欲得已不已者處之亦必不能不為之動心而變色况賢者乎自茲以往緝熈其皎潔磊落不為混混之迹所以慰慈靈於地下而解羣惑於當年如毛義焉可也若不理㑹此處則大錯雖二十四州鐡打不就矣素辱厚愛計必不見訝是以盡言之定山近日之出誰實啓之其意云何希垂示江西來日者未過白沙銀瓶嶺合葬只看年月利否餘不用問人憂病中未由奔慰謹奉疏不盡欲言又子逢家人至得書具審太夫人以正月六日祔于竹齋府君銀瓶嶺之墓褒亦祔焉為慰是月二日章亦奉遷先考墓于小廬山與先妣同處日者云是歲官交承之日百無所忌遂用之居喪不能免俗多此類也君子所以報其親葢自有其大者顧吾之所立何如耳來喻知孔而不知毛老朽所朢於賢非歟此翁明年滿七十世寧有七十老人發狂著書與故舊作炒也有言無補於人之不足託於靈龜以正朶頥而不知止耶李世卿自嘉魚來與湛民澤往遊羅浮今殆一月矣未知所得何如老朽亦欲深潛逺去為終老計此間民日變為盜地方多虞白洲李先生為卜地於省城破數百金古人之事不意今復見之顧今暮景所以落莫耳目之用不息事隨日生委餘齡於尋常喧囂之境恐卒不能成其美未易裁也歲首白沙嘉㑹樓成白洲李先生遣人走定山求記比得南京李學録書中間報莊驗封以去秋八月履任尋得疾臥家至冬間發此書時已聞定山將出謝病未審然否想欲知故及又碧玉樓上聨句云大海從魚躍長空任鳥飛吾以待時之人可也聖人不為也吾以待門人子弟不已薄乎有不得不然者免怨而已緝熈抱耿耿于茲幾年今發於此適有客及門求見不暇詳答然大略具矣如何如何又違濶日多忽枉來問不啻如珠貝之入手也亡兄不幸早世十月在殯後此尚二十日始克就窆積痛成疾章不足念如老母何承少寛之喻伏紙摧咽頃者與子逢書中間一二近况與悼秉之等詩想次第經目矣餘非面莫究主考閩藩令譽藹然可賀可賀傳聞鄉試録好文字想皆出總裁之手恨未及見耳别紙見示奏草此事在今日不言而去揆諸易果不當歟夫以無所著之心行於天下亦焉往而不得哉老孺人之旁計未能猝離而平湖之斾亦難乆留不審何以處之區區注仰之私與月俱積録近作一一見意早晩能一過白沙否耶景雲如桂陽未返張憲僉日夕至學景昜惟課訪是急諸姪營塟事往候無人惟加照又承諭進學所見甚是超脱甚是完全病臥在床忽得此柬讀之慰喜無量自不覺呻吟之去體也終日乾乾只是收拾此而已此理干渉至大無内外無終始無一處不到無一息不運㑹此則天地我立萬化我出而宇宙在我矣得此覇柄入手更有何事往古來今四方上下都一齊穿紐一齊收拾隨時隨處無不是這個充塞色色信他本來何用爾脚勞手攘舞雩三三兩兩正在勿忘勿助之間曾㸃些兒活計被孟子一口打併出來便都是鳶飛魚躍若無孟子工夫驟而語之以曾㸃見趣一似説夢㑹得雖堯舜事業只如一㸃浮雲過目安事推乎此理包羅上下貫徹終始衮作一片都無分别無盡藏故也自茲已往更有分殊處合要理㑹毫分縷析義理儘無窮工夫儘無窮書中所云乃其統體該括耳病中還答不周言多未瑩乞以意㑹前此所諭命之理以下數段亦甚切實有味愧不時復草席香各領賜感感復梁二教伯鴻尹秀才至辱書兼拜汝帖之貺感感足下病不能任官貧不能供母迂不能入俗直不能干人足下持此孑孑何以度世哉承欲挾卜以遊足下設言之以自遣耶將仰給於是如昔君平之為耶頃者何廷矩在胥江開卜肆竟無一人售者足下聞之否耶此非愚慮所及足下善自謀之無令古人笑今人也顏淵季路皆可師法聞足下有少田業勤耕而節用可以不死雖甘㫖之奉不足亦士之常分揆於道義無不安也舎此而他圖心日勞而困日甚足下其如命何哉人還匆匆聊此復不能悉與湛民澤先生門人來諭與拙裁意不相渉無怪乎前此之多言也乆居於危不在仕止之間葢嘗兩遭不測之變幾陷虎口矣不得已為謁銓之行所以避之非出處本意也吾子其亦聞之否乎平生故人朱少保李閣老潘待詔往往寄聲以不能去離此邦為懼假令見幾而作當不俟終日遑恤其他特患不得其時耳康節詩云幸逢堯舜為眞主且放巢由作外臣然則百年之遇宜未有今日所恨子孫世家于越老朽亦欲為後人立少基緒使可傳也目今要建幾祠宇修幾墳墓政恐小祥在轉瞬間若更因循措辦不來更一轉瞬大祥至矣吾事不了奈何奈何憂病相持歲云暮矣安知其終不汨没於塵土耶區區可疑者吾子其深亮之又飛雲之高幾千仞未若立本於空中與此山平置足其巔若覆平地四顧脱然尤為竒絶此其人内忘其心外忘其形其氣浩然物莫能干神遊八極未足言也承羅浮之游甚樂第恐心有所往情隨境遷則此樂亦未免俗樂耳黄龍朱明不可居吾之此心已在祝融之上矣吾非厭近而求逺顧民澤何以處我耶世卿録去近稿二幅可以代面語不具又碧玉樓臥病踰半月忽得手札讀之喜甚遂忘其病也學無難易在人自覺耳才覺退便是進也才覺病便是藥也眼前朋友可以論學者幾人其失在於不自覺耳近因衰病精力大不如前恐一旦就木平生學所至如是譬之行萬里之途前程未有脱駕之地眞自枉了也思於吾民澤告之非平時漫浪得已不已之言也倘天假之年其肻虚擲耶附去藥錢一百煩手丸寄渡子囘景雲在病也囘祝主簿未拜一顧之勤此貺疊至皇恐皇恐閣下以至公待民使一邑受賜則惠之所及廣矣豈獨某哉夫公必有養而後能某於今日之賜不敢不受亦不敢不讓所以廣閣下之亷以養公也僣率不罪與寳安諸友章衰矣齒髮日變于舊亡兄屬纊之初老母哭之欲絶積憂之餘面足俱腫由某獲罪于天不死延禍同氣以上累于高堂痛徹骨髓如何可言諸君不遺老朽慰之咫尺撫狀不勝悲哽傾感之至子逢别紙具得平湖履任之詳可歎可歎彭澤不折腰於督郵平湖不屈膝於當道樂則行之憂則違之古今一揆也數日前閲甲辰舊詩改贈平湖章云偶從道路得行藏南北東西又此鄉滄海一身堪自逺平湖數口為他忙江山舊宅香株老籬落東風荳角長小與先生分出處扶留窓下細抄方又改次章頷聨云到手閑官如處士從頭詩巻又江湖去秋與張進士唱和絶句云不求老馬在長途誰道乾坤一馬無伯樂未來幽薊北憑君傳語到平湖諸詩謾爾豈遂為之兆乎諸君其亟椽㰖山之室南川之歸無日矣景易今秋不免隨俗應試非得已也家貧不能日給無可仰干於人一也祖母年高氣衰悼往憂來懐抱作惡希得一解可以慰解二也是兒賦分已定責之以越常之事必不能堪三也功服不得科試程子㨿禮言之當如此亦古人常事耳在今日可以望於賢者而不律衆人也若曰祖父喪在淺土雖服已除亦不應試此又過今之人逺甚子逢自量力為之孟子曰持其志無暴其氣為之而力弗逮反暴其氣矣秉之在獄安否禍變之成非一朝夕今日之事不知秉之平生費多少麯糵醞釀來也為我謝平湖秉之雖窮使甘心觚翰如藏用軰低佪於里塾寧有此惜哉與鄧勝之勝之足下自頃歲寒舎一話别去未嘗忘但懶作書耳春初聞太夫人委蜕又闕一疏多罪多罪僕之心事惟足下知其無他則知僕之交於人者如是使世之知僕者異於足下幾何不斥其簡而怒且譏耶足下勤勤于僕之意每見徳孚與語未嘗不増戚戚於胸次顧足下之所欲為者其機未始不在我如足下亦何所不至愼勉之母以畏難止也承枉隂陽家諏日等問僕不究其得失然大槩以為術家之書其説主於禍福故不宜盡拘盡拘則害理聖人無是也吾徒作事宜何所法守聽命於術家之説而我無所可否焉僕竊惟今人不取也小五星等書自地理家秘而不傳然其説亦動靜兩端而止耳足下將求之不一耶反求之吾心以觀其㑹耶抑徒寳愛其術而思藏其故紙耶足下欲之必有其指不愛一言以慰懸仰幸甚幸甚復李世卿先生門人圭峯山靈相候已乆何濡滯爾耶世情不可盡狥盡狥則失已與諸鄉老龍興寺舎相對竟日孰與置一榻於圭峯為足快也邑中山水白龍玉臺最勝諸前軰有賦詠可盡收拾志中愼勿留意拙作為世卿累也切囑切囑昨晩陳伯謙過白沙出示與僧文定詩頗有援捄意不審聞於邑主否封去某近作記文一首㨿拙見詞格不古終傷安排不知世卿以為何如朋友間評論文字在於求益奚事虛讓為讀畢還一字示可否乃老拙所望於世卿者也與賀諮賀生秀才得生書把讀未半亟乎童子使召犬子來讀之何生之言似乃翁也幸甚昔在長安日過乃翁生時方毁齒能知兩翁意見輒呼曰我老先生來矣坐則置生膝前撫生項與乃翁語至今岐嶷可想生猶略記老先生面目乎味生之言其志逺且大恨生不生南海又恨夙疾支離老脚不能及逺冀一見生容止接生言論有疑相與對面折衷之何可得哉里生陳紹裘行託以告區區禮闈之㑹可必否耶答陳宗湯先生門人得宗湯六月十日書書中作字太竒老眼不識服周讀之以告我耳丘侍御取道還閩過白沙留語竟日獲聞考察事詳微侍御宗湯索我於黄雲矣周憲長半辭之頃詘已信人洞見肺腑二公為天下惜人才公去取同此心也侍御尤拳拳於桓溫問孟嘉之一語噫何愛人之無已也宗湯念之一時交游東顚西覆民澤可期逺到西望衡山神爽飛去然自去秋感疾迄今未堪舉踵餘亦無足觀者所須縣誌謾往一册世卿為此書葢亦自以為未足云與周文都先生門人來喻具悉畜來始末前此未知也昨日簡中言偶與之合耳然不害為義也非子來死於道路乆矣度來之心不肯舎子而之我來若自記日不違主之命是亦報子也吾斯納來矣來雖小所以處於來大者存焉吾此心是也此心滌之則明物涴之則暗此吾所以不敢茍於子也傳曰以友輔仁與梁貞先生門人肺病外感則風内感則煩調攝之方莫先虚靜棄置一切人能置之否耶戒鄺珙闕覆轍念老朽闕與羅冕先生門人得是月十九日手書具審比來侍奉吉慶徒以老朽旦夕以來于心憂之深言之切有如吾服同者不肖老不勝喪賴諸友之助亡妣得安小廬山之兆域今塋封麤畢遣人去買藤縣木歸建塋前小祠為祭享之所立祭田使人守之孝子欲報於親之心如此而已耶痛哉無可議者矣溽暑不可處近遷於砦玉西偏病稍輕於昔幸未即死吾子無為老朽戚戚也官窰牛商云於館中便略此見區區不能悉與鄭文吉章之内兄羅經水母灣金氏之婿闕内兄存日窘甚棄其居第還車闕二親女一居孀一在其室其困日甚章欲來白沙恃愛干瀆倘遇人船之便先令金成支車彼闕至廣信附來白沙極感極感頃者市闕又闕者借勞一日盖有弗獲已者闕恃知愛𤨏瀆為愧老朽衰替之餘一坏土賴闕有雖在螟蛉吾闕且隨力剪闕徳之也茶果闕前此藥資闕名二裹表忱與黎潛羅倫先生門人先妣不幸卒於今年二月十六日即日塋封甫畢穴在小廬山圖新書舎旁某以衰疾執喪氣息奄奄如賓客知舊往來記一忘十間獨於潛也倫也思之不置二生之思我從可知矣愛之深言之切老朽何以答二生之拳拳發憤進歩一日千里與趙日新乆不見生一日得生手書如語予館中不知其在羅城也去白沙幾年味生之言欲再見白沙而不可得甚矣生不忘白沙也憂病之餘泯泯默默可為他人言者念生忠信之人可與共學然問之者未切告之者無序生雖有求於我其何補於日用乎賓陽陳掌教可人也可一通之餘不具與太虛太虛師眞無累於外物無累於形骸矣儒與釋不同其無累同也太虚尚能覔我於衡山否耶别紙録去舊稿試為我誦之章非能言者太虚豈俟多言哉與鄭舉人昔錢宣靖公推官同州有富民亡其女奴女奴父母訟于州州命録事參軍鞫之録事實貸於富民不獲乃劾富民父母其殺女奴罪應死公疑其獄留數日不决録事詬曰若受富民錢欲出其死罪耶公笑謝宻使人訪求女奴得之則免富民父子於死知州以公雪寃死者數人欲為論奏其功於朝公固辭曰若水但求獄事正人不􅁈耳論功非本心也且朝廷若以此為若水功當置録事於何地耶録事詣公叩頭請謝公曰獄情難知偶有過誤何謝也僕每讀書見此等事未嘗不歎息古人用意之厚而平生區區所存亦未多愧頃因田土細故與足下有言足下遽賜之手札辭亦費矣假令質成於官司尺寸壤得未足為喜而此事一白則直在已而曲在人斯自慚耳僕非不願為古人之高特事有專主義不容於自遂惟足下亮之而已與鄧球先生門人韶廣相去未逺一問不通今幾年悵想無已即日蒼頭至辱手書并惠米布諸物具審雅履佳勝志業日新為慰某奉母之外無他况惟益衰耳首夏湖廣嘉魚貢士李承箕世卿者過白沙甚聰明有文章留白沙數月不忍别去議論間頗覺有益恨足下不與同也眼中朋友求可與言者不可得世味之移人者不少大者文章功業然亦為道之障為其溺也足下茍有見於此幸甚幸甚章所欲告於足下者非尺牘能盡與趙壽卿蔡三兄弟欲求壽卿長蓢田耕住以舊於我佃故求通一言為裁之不可則止亦無固必也謝伯倚近至白沙以前所托通好於李氏者委之唯唯可見人心所同也知之與周用中兄弟天地自然之利人得而取之何分彼我使諸子姪如老朽何所不讓使老朽如諸子姪亦何所不爭向義不如就利尚徳不如用智朝三暮四口與心違强之以其所不能則怨諸君豈不謂然乎今只以鄭明府所書劵為實更不問其是非但據用中用到價銀若干老朽願償之如此既不獲罪於鄭又不負用中諸子姪亦可以釋然矣解紛之䇿莫過於此諸君其亮之與李孔修先生門人子長乳瘡當一塲重病今脱然矣聞之慰喜賴朋友之助先妣得安小廬山之兆即日塋封甫畢三月而葬禮也亦時也始以吾為殯宮論者紛紛今帖然矣寢食夢寐舉安事不揆諸道徒人言是狥奚可哉未有㑹晤之期惟加愛與范規先生門人近有人自南京來承定山先生偶得右手足風痺之疾近雖小愈尚未脱然欲求養生之術非能用莫能盡之以此相托定山平生故人老而嬰疾可念可念能用定山之交亦不可謂淺淺者何愛一行如能用寄跡山水間去來自由自此至彼數千里坦途計日可到然亦不敢必葢行止非人所能頃來衡山之約如許又可固必耶專此馳問倘蒙金諾先乞飛示早晩須一至精舎商量切望切望與趙汝䕫即辰聞舜英護母夫人喪歸無逺道無虞幸甚幸甚但未審几筵安在何處近來邑里中夜刼之盜横甚可畏宜得一穩便處無水火盜賊之虞方可停柩此送死第一義君子見幾而作時義當然幸自裁之勿奪於浮議憂病中未由奔慰想能亮之與董子仁前九月得周文選書知子仁乆乞省家居多賀多賀又云在高亦養病歸或不可起不審此語何謂前此獲手教及克恭書感歎屢日凡百且置之勿論只平生問學一事極索理㑹不可悠悠人一身與天地參立豈可不知自貴重日與逐逐者伍耶某奉别後更無他惟一味守此益信古人所謂自得者非虚語今幸老母麤康地方無事日夕與二三友討論所未至亦殊不厭惟有志者少薄俗振作尤難日邁月征良可憂耳聞羅先生杜門廣昌張内翰㑹講西山克恭闢書齋於後圃靜坐皆不以病廢學子仁何日復京尚希一札以慰惓惓某自春間一病自汗到今尚未脱體臨紙牽勉言不能盡惟亮察與張聲逺先生門人乆不得字去年託賀官人往一紙尚未卜沉浮一别音耗便爾難得可歎可歎秋試㨗否不足憂喜謾欲知之耳時用孑然客帝京忍寒餓二十年為母家不去誠亦可憫萬一了此心事不東入吳即南走羅浮與兒軰下上四百峯頭采蕨亦可供也謾思及之此日病正愈臨紙不復一一又得正月十一日手書悲憤塡紙幾不可讀平居相與論議慷慨未始不以外生死為達塡溝壑為賢一旦臨大故不可堪忍之時尊卑疾病盈室家無錢財作何措置况於束吳反葬水陸數千計亦不下二十金所費將誰仰耶勢利風馳朋友道缺昔人所能者例不可望於俗軰如某一二麤知抑皆所謂旋渦裏佛不能捄落水羅漢奈何奈何情切事違心邇人逺撫紙興懷徒増悲怍惟亮察不具與譚有蓮比日家僮自貴里來承口諭欲為小孫田議婚以平卿之孫女平卿善士與古愚先兄游處亦通家也幸甚幸甚第恐傳言或誤好事多魔於是叩諸蓍得大過之豫葢吉占也未審果如尊意否夫量才求配聞之先賢計産許婚甚於流輩癡孫疑未中東床之選世業恐重貽西隣之憂是以未能釋然於鬼神之謀也專此馳白庻幾為是一來倘不以疎外見疑拱俟拱俟與陳徳禎聞近被繫郡獄懸切懸切計今當道多明察想不加害於無罪之人否泰數也勿過為隕越人不幸所遭有甚於此者亦無可奈何且安心順命善將攝為禱復陳冕蒼頭至得書承貴恙漸平復喜慰之至更愼小愈以赴秋闈之選幸甚幸甚得失雖云有命然更委之命亦恐未盡今一科所取士若干多備數一時耳安可據以自比耶如莆中舉子多眞舉子與僥倖尋常者相去奚啻十倍如是而失解誦伊川之言以自解可以無愧矣餘不悉與舊生陳魁生仰給歲月於鉛槧瓶無贏粟以畜其妻子年幾六十益以疾病困以盜刼士一窮至若是哉昨望見生龍鍾如東田老人稍就之疲頓與石翁異者幾希然與之論舊事寫平生於我三沐三熏之歴歴猶是也使我囊中有九還大丹能反老為童與生共之庻幾其成也可待生既絶望於我矣我更望於何人惟日孜孜斃而後已生與我皆然復何道哉復何道哉佃者還聊此復制中不具與容一之先生門人幾日不得至祠下眠食何如一之平時筋力倍予今云瘠甚則老者可知矣古人處老有道處病有道處死有道夫子曰朝聞道夕死可矣其處之之道乎旦夕欲見一之與論之不審力疾乘竹兠子能一至碧玉樓否耶專此馳問惟自量又今日貴恙輕否老梁課好决定不死可無憂也昨晩手書與陶公勸勿建書舎未見報札為此一事數日往來于心殊無好况章因多病厭苦人事决䇿往平岡朋友間多不省事多言平岡土瘠難朢成田老母聞之遂阻此行奈何奈何此非不忠愛於我抑未知所以忠愛也平岡土雖瘠然便謂其終不成田則又疎矣天下豈有棄物而人欲爭者乎不信人之言眼前事所見往往如此可笑也何日可動到齋一話甚懸懸也比聞足疾傷於勞而發由老朽故今思之但有慙負而已奈何奈何先妣墓即日塋封麤畢遣人去采藤縣木為祭享之室使人守之立祭田求墓誌事皆不可缺又不知人子思慕其親而欲報之其大者安在耶困於財限於分葢亦無可議矣近苦憂病相持無以自遣尋思只有虚寂一路又恐名教由我壊佛老安能為我謀也付之一歎而已何日對面罄其所欲言與馬貞前日舟中與一之談及神理為天地萬物主本長在不滅人不知此虚生浪死與草木一耳神理之物非但不可戀着亦其勢終不能相及於我何有伯幹病至此當大為休置縱未至灑脱地亦漸省得些撓亂幸而天年未盡便從此覺悟神理日著非小益也老倦不能再省視令眞福往候以此能一開目否與陳秉常先生門人辱書見勉勿斷酒肉扶養衰軀眞情苦語足仞拳拳頃者賴諸友之助先妣得安小廬山之兆即日塋封甫畢遣人去采藤縣木為祭享之室立祭田求墓誌事皆不可缺又不知人子思慕其親而欲報之大者安在耶限於分困於財葢亦無可議者矣到京見定山先生潘時用姜主事問我以是告餘不敢囑别紙所議禮想是但老朽檢閲未得且置之病畏多言念吾子逺别聊復此耳途次見東山劉都憲先生告厓山慈元廟成甚完好因以先母訃告某在病不具疎與崔楫先生門人承示諸作見意思始者期民澤九月入羅浮四百僊峯依舊見之但不在脚底耳來喻不忘在學幸甚但恐進退未决不立背水陣終難勝敵希説勉之歲月不待人也李子長落水羅漢吾軰皆旋渦佛耶何故無一人救之狶薟草果神效當求識者致之感掛意某復希説秀才又某疏不意先府君奄忽頃逝衰病多遺不時奉慰罪罪比日寒甚想孝履如宜棄禮從俗壊名教事賢者不為願更推廣此心於一切事不令放倒名節道之藩籬藩籬不守其中未有能獨存者也老拙所見多矣願希説勉之與伍光宇昨晩景雲歸具悉老兄動定某通夕為之不能寐覺得老兄此病非止疾痛之為心害心寓於形而為主主失其主反亂於氣亦疾病之所由起也今人惟知形體之為害而不知歸罪其心多矣心之害大而急者莫如忿爭夫有所不平然後爭爭至於忿斯不平之至而氣為之逆逆則病生矣雖所致疾之由寒暑饑飽勞佚失節居多而此之弗謹實吾自為之不可不知也據景雲所説老兄於此一項罪過全未肯認全未磨洗縱疾痛不積於此氣象所關尤非細故林緝熈所謂怡怡之説殆亦忠告之言也盍深省之否則未有入道之期也不罪不罪又賤軀失養百病交集近過胡按察請教以心馭氣之術試效立見驗但日用應接事煩不勉妨奪工夫不精今欲自五月一日為始以家事權屬之老母非大賓客令諸兒管得及光宇未復白沙借尋樂齋靜居百日有驗即奉還也光宇决䇿往青湖則此屋亦須有分付某將來却是東道非僦屋人矣呵呵又今晩叔貞兄弟過白沙適有客逺方來而賤疾又作遂辭去晡時螟姪歸自南山具審比日遺恙増劇皇恐皇恐天果無意於善類耶未可知也陳後山之詩一時人皆不好獨山谷與坡翁知之卒能行於世後山亦到今不死夫茍有可恃雖死可也况未必死乎不具與陳徳雍某啓清江之去白沙幾山幾水一夕恍然與徳雍先生葛巾青藜相值於寳林拍手笑語坐佛燈前促膝嬉戲若平生不知其在夢也及覺始悵然若有所失即復閉目入華胥尋向來所見一恍惚既不可得則又歎清江之去我逺徳雍今存亡不可知况欲與之握手耶某别後况味如昨但年來益為虚名所苦應接既多殊妨行樂耳平生只有四百三十二峯念念欲往亦且不果男女一大俗縁何日可盡雖云道無凝滯其如野性難抝尋欲振奮一出又未能也徳雍老矣頗復能記憶寳林昔日之言否乎臨紙不勝悵惘與李徳孚某聞古之亷士資送其子有鬻一犬而足者今犬之值幾何貧者雖有百犬不以資送鬻也不鬻則耻之矣耻非其所耻何所不至甚矣俗之能移人也别紙稱清門羅某何敢不從脱尚未免芥葉人言則莫若崇儉以導之令盡去俗様異時資送之來白沙必勿留一塵以累吾自然幸甚幸甚凡此一聘之費大率不過十金但如來教則太近俗而惡無文故以釵與幣易之而侑以羊酒不審以為何如又別紙乞恕專擅聞老兄近復假館禪林靜坐此囘消息必定勝常耳根凡百所感便判了一個進退老兄今日此心比諸平時更穩帖無疑否賤疾幸少脱體但尋常家中亦被聒噪情緒無歡大抵吾人所學正欲事事㸃檢今處一家之中尊卑老少咸在才㸃檢著便有不由已者抑之以義則咈和好之情於此處之必欲事理至當而又無所忤逆亦甚難矣如此積漸日乆恐别生乖戾非細事也將求其病根所在而去之秪是無以供給其日用諸兒女婚嫁在眼不能不相責望在已既無可増益又一切裁之以義俾不得妄求此常情有所不堪亦乖戾所宜有也與潘徐二生去冬得二生手書半月置床頭日一展展時一發歎後生所急者何後生所畏者何轉瞬來便都望三十四十不自激昻不自鞭䇿將來伎倆又似拙者模様耳奈何奈何蕭先生書報潘生近聘岳家甥女可喜可喜然自是轉多事矣拙者正在不了中自曉事者觀之未必不以為憂也呵呵與伍伯饒有牛眠於此意中了了而不能使人信得伯樂一顧増價十培幸甚幸甚山人眼家人夢卜人卜三事不期而合復奚疑謹此馳賀餘不具與林蒙庵某啓不聞問乆矣忽得手書讀之恍若蒙庵之登我堂也昔者嘗一造蒙庵於京師則拜蒙庵今思蒙庵而不見見蒙庵之書則拜其書如對蒙庵焉嗚呼可勝慰哉賢者之愛人也期於徳不賢者之愛人也期於姑息讀蒙庵之書知蒙庵之愛我亦如我之愛蒙庵也雖然有甚愛者有甚憂也蒙庵之愛我甚其於人也則憂僕之自愛則憂其於人也則否憂其憂無憂人之憂其亦有以異乎蒙庵官於朝也則行乎朝僕之居山林也則行乎山林蒙庵欲以其道施諸人僕猶未免於自治其不能無憂一也在已在人則殊耳梁石時可之憂在已者而亦為人憂克恭則舎其在人者以自憂是三人者僕皆有慕焉而其憂不同又何怪乎出處之殊也蒙庵所稱胡提學亦如蒙庵之憂者也彼其意以為古之道不徵於今則人不信不信民弗從是固憂時者之所圖也其為人也雍容平恕樂善而忘勢其於僕也有一日之雅焉僕之得譽於提學茍非其為人之急亦朋友相好之私耳非提學之心本然也蒙庵置之勿言可也古之為士者急乎實之不至今之為士者急乎名之不著周子曰實勝善也名勝耻也僕竊願與諸公共勉焉若夫往來音問之有無各隨所感應之宜疏疏宜數數不過乎情不弛乎敬惟當乎時義焉耳此之謂易也必曰我無利乎彼我勿言不可也持此以廣蒙庵之意何如與時矩先生門人宇宙内更有何事天自信天地自信地吾自信吾自動自靜自闔自闢自舒自巻甲不問乙供乙不待甲賜牛自為牛馬自為馬感於此應於彼發乎邇見乎逺故得之者天地與順日月與明鬼神與福萬民與誠百世與名而無一物奸於其間烏乎大哉前軰云銖視軒冕塵視金玉此葢略言之以諷始學者耳人爭一個覺纔覺便我大而物小物盡而我無盡夫無盡者微塵六合瞬息千古生不知愛死不知惡尚奚暇銖軒冕而塵金玉耶又某慰言四月二十五日得黎三報悲惋連日太夫人一旦厭世時矩不幸遭此痛極奈何奈何今日之慟昔日之思何者為怨何者為憾縱浪大化此往彼來吾將校計其短長非耶溝塡壑委在我者一切任之而獨留情於水菽非耶賢者力行已志惟恐一事不底於道其能合於親者幾何吾重為時矩悲之老病支離不供走弔惟强粥自大不宣又禪家語初看亦甚可喜然實是儱侗與吾儒似同而異毫釐間便分霄壤此古人所以貴擇之精也如此辭所見大體處了了如此聞者安能不為之動但起脚一差立到前面無歸宿無準的便日用間種種各别不可不勘破也拙和一首奉去可一閲更將中庸首尾緊要處沉潜要見著落却還一字也獻章書於時矩與謝伯欽聞子酣於鬬矣老衰無能為援請竭端未利害為子籌之知貪得之為害絶禍於未形上䇿也不役一錢不損一人以直道爭之官府失得付之於數必不已而與之均焉中䇿也損財而爭而家日耗殺人以爭而寃日積僥倖錙銖難得之利自遺鈞石不測之憂此下䇿也若能歸咎於已舎之勿爭以分産悉推諸弟清修苦節以立於世如子才不出十年天下皆服其義而仰其徳令聞洋洋播於四方輝光赫赫流于無極視平生不得意處如秋風之振木葉零亂脱落無復芥蒂之蹟因敗成功此又䇿之竒者也諸䇿惟上䇿省力而易行然已無及矣其餘可否更請擇之又葫蘆甚美山厨得此免乞憐之瀆感感聞近欲遷居木洲求靜可喜可喜然未若北角就田而家尤便也韓子云恨入山之不深入林之不宻去煩入靜當亦有漸乎未間閒來一話與潘舜絃儀禮一書訛缺板多一經先生與黄大理手校便為完帙野人平生際遇未有如此竒者敢不拜賜空山深夜兀爾一榻撫巻即如對面耿耿達旦與庠中諸友春初承諸君枉顧屬有哀事既不獲披接又不果以時還謝多罪多罪近按察胡先生過白沙青燈叙舊之餘輒及此方人士惓惓以為已之學望諸君甚盛意也某親領誨言不勝感感尋欲與諸君共言之賤疾固未及諸君方急於秋試區區迂濶之談恐難驟聽然又不敢淺窺諸君而謂吾言之無益而不言也謹此奉瀆萬一諸君之留意焉與僧文定僧文定嘗參學四方坐關於觀音山三年葢廣僧中之知者也偶以事繫縣獄慮是非之不見察也懇予為白之予以邑主楊侯公明必不妄加害於無罪之人予嚴干謁人之戒乆不可破文定從西方之教茍有得焉則能以四大形骸為外物榮之辱之生之殺之物固有之安能使吾戚戚哉示以是詩一戒持來三十年何曽長揖長官前山僧若有西來意不把形骸乞世憐慰馬黙齋喪子吾子得數之竒孰與孟郊孟郊産三子哭之連日今吾子之哭凡幾抑又有不盡同者焉郊為詩盡泄天地鬼神之秘而不為造物所予不知其後何如吾子厚積隂徳知必有鳯雛麟種降為家寳此未足深惜也慰鍾五令兄竟為泉下客矣足下當甚悲痛令兄今生幾何矣眼中如此逝者不少又何足怪但人未死前一日誰肯信著此事終日勞勞而不自足及至死時便無可主張亦可悲也已拙疾未由奔慰謾往此紙惟足下亮之與林時表時表而代而父侍奉大夫人几筵何得舎朝夕奠而來應試老朽聞之竟日不樂欲致一書計已無及於事遂不果比發去兖州訃否褒弟去冬死北京果然惜哉適得尊甫翁濟寧四月望日發來手書進退不能無遺憾矣奈何奈何老母塋封甫畢未由遣人致慰幸亮區區緝熈行時云到部須求便養而自去冬謁選至今年春四越月矣授以山東兖州府教授然後奏請便親冡宰不許前此何不引例告選司當言而黙欲焉待哉舉措如此謂之不濡滯人孰信之宜其不見許也中間揀選冡宰見怪假令不病將不計其不便於養而就選耶自古進退不决於内則其形於外依違可否之間而欲人之不我疑不可得也烏乎惜哉陳白沙集巻三欽定四庫全書陳白沙集巻四明陳獻章撰
