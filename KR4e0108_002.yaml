front:
  text: 白沙子卷之二
  hash: sha256:968d9e3689ac273cb85c687a427dad669ec8aac54f806156b9484260aa963ed1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0108_SBCK_002-1a}
body:
  text: 書簡與西涯李學士相别六七年邇者不通問于亰師然自周文都南歸後先生之音耗遂絶于耳曩聞先生在喪且歸長沙無一知舊自北亰來者無不問其詳不敢奉狀每一見周生相與悵然久之尚未審所值何艱長沙無舊業未必可歸當歸何處也近者白洲李憲副過寒舍乃知先府君塋于都下嬴博之􅌾古今未必以為非然亦有非其情之所安顧吾力有所弗及萬里外某能亮先生之心也奈何奈何居今之世欲超然無纍于心無纍于後先生計之亦熟矣然事往往有不期而至非人思慮所䏻及惟在我者所當盡而或牽制于外為之弗豫至不可為然後圖之亦弗及矣此亦先生平昔所嘗慮及漫一道之耳頃歲承惠貞節堂八詩真嶺南竹枝也李世卿已收入縣志門户之光非言語可謝也藤蓑尚缺𥙷章能復賜之否乎世卿自去年首夏至白沙臘然後歸蚤晚㑹試入亰區區衰病百狀問之可知已去秋得時用一書足慰鄙懷他人愛我不如時用先生諒䏻悉之也張進士附此不䏻盡所欲言粗絹二匹表忱外苧一端奉時用不别具與鄧督府翰林院檢討古岡病夫陳某再拜復書督府都憲鄧大人先生執事某不得望見于執事五十年矣南海野人徒抱迂拙不可為世用執事鴻猷盛烈聲聞四逹皎如日星之照臨甚賀甚賀兹者伏蒙手書錫之名香歲曆别奉鈞帖令本縣月給白米一石撥人夫二名不敢當不敢當執事所稱逋野誠隱逸士如今日之賜使逋等受之冝也其不受未見其讓之過也某何敢自列於古之名流哉某無寸善可以及人有田二頃耕之足以自養而又受賜于當道以自列于古之名流其怠于自修亦甚矣引領蒼梧衰病無由自致拙作一首紀述仁政傳示嶺海以彰盛德餘二小詩以撰慈元記望西涯閣老以請祀典望督府共成東山之美此野人之志也伏乞鈞裁與朱都憲頃者獲拜執事于蒼梧十餘年間執事之心不忘乎㒒與㒒願見執事之誠交慰並沃于一堂之上一日之間至矣盡矣執事負一世之豪才際百年之嘉㑹故䏻受知當寧進位都憲奉璽書督三軍以經營于一方誰不瞻仰誰不歸戴㒒一介書生生長東南聞見寡陋徒負虛名無𥙷于世乃蒙追憶十餘年相與尺牘往來之雅而賜見焉幸甚幸甚㒒之齒非少然以方于執事則為後進執事先生長者也長者有問不辭讓而對非禮也隱而不告非禮也㒒之始至執事問以出處㒒未敢率爾執事又益之以薦進之說且令回自决之㒒于是乎若負芒刺避席而不敢言慚也退而思之又大慚也明日具以情告且言其不可當是時也執事亦見㒒之顔色乎始者㒒欲往見執事于蒼梧凡三復計之而後果行誠以執事之賢固所願識然自念二三十年所守進退之節一旦由此而變亦不䏻不少踧踖也况諭之以薦進之說耶㒒竊以為執事好崇奬人之善偶見一士少異乎人亟以此言寵之使勉乎善云耳不然則將悼其窮且老踽踽焉無所與同恤恤焉無所與歸故問而遣之使自為祿仕之計焉耳不然執事之明足以照物豈不知㒒之駑鈍不可驅䇿而思進之萬里之途也執事又以韓退之之事見朂退之雖賢不及孟子孟子不肯枉尺直尋退之以書千宰執㒒固不得舍孟而學韓也㒒之歸白沙幾一月矣鄉之逄掖士無日不來問詢㒒告以所接盛德之光莫不鼓舞興起信乎德之流行速于置郵而傳命也惟是進退出處之念尚日往來于心誠懼執事所以待㒒者如此而人之知㒒者淺也此意已託丘侍御逹之左右不審亮之否乎未䏻默默伏此布聞且以代面謝惟少垂鑒焉又陳某頓首啓伏蒙今月十八日遣使降臨衡茅惠以羊酒粟楮諸儀君子之賜光動閭里顧愚何人可以當此恭惟執事位髙而望重德博而民化而恆患乎善之不彰士罔攸勸故䏻尊重名教秩秩其儀以興起山林之遺逸大哉執事之心㒒雖駑鈍敢不夙夜秪奉然㒒竊觀來喻之言大意欲勸㒒出仕耳非直勸之且加責焉是固出于愛㒒之誠而㒒之心亦有未蒙照察者何則掇科登仕固㒒之素志抱病違時非㒒之得已㒒自染疾來六七年間每遇疾作遍身自汙若雨或遭數月不止既止復作畏勞怯冷沉綿反復元氣䆮耗力加防慎庶幾保全而母氏年益髙百疾交苦是以未䏻出門耳假令㒒疾愈可以出矣而忘親之老豈人之情也哉在親為親在君為君無所往而不然矣夫天下之理至于中而止矣中無定體隨時處冝極吾心之安焉耳若昔之李密是也密𬒳徴時密之心蓋自揆安于事劉則止為中而行非中也今若槩以聖賢出處之常責密以必仕恐非密之心密之心天理之時中也㒒今自處亦欲無愧于密耳執事信以為何如哉願終教之㒒不敢固執也承録示諸公子文稿筆勢滔滔有氣𦦨當是一才子可畏可畏若導其志使不差開其學使有益又在教者何如耳使回謹此申覆辰下哭一姪婦故言無文采伏乞台照又陳某啓伏承此月二十四日都憲老大人命使降臨衡茅諭令某即日起程赴亰春闈在邇不許推延聞命悚惶為慰為懼伏念某質本庸愚賴蒙聖朝作養于兹三十餘年雖無用世之才竊有忠君之志其未仕也豈果于自為而忘世哉誠欲吾身親見之豈不知時之可為哉執事知之久而愛之深既重之以手書復勤之以口喻執事于後進拳拳接引如此某雖駑疲豈無飛動之意哉直以受氣不豐病與年長去年秋自汗才息因得進謁執事于蒼梧比歸途間冒風舊病尋發至今年七月𥘉寒熱交攻自汗猶劇而必欲驅此疾羸之軀行于風波之途萬一不虞雖悔何益伏願執事垂日月之明擴天地之量假之歲月俾得調治疾愈之日自行起程赴部不敢推延以負尊命干冒威嚴某不勝戰越之至與劉方伯東山先生餘寇未殄先生得無為百姓戚戚耶比聞下令各鄉村自為城守伏計當道憂民之至必無過舉恨未得其詳耳曹匪石抵家病即愈先生冒大暑負疴而出動靜勞逸仕與止固不同也未涯瞻奉謹此申忱匪石所徴樂記文字已托周汝愚具稿早晚録上轉逹又亡妣墓于小廬山居舍之旁襄事于乙卯夏四月八日去始喪才四十日耳萬里一疏無任哀感之至崖山慈元廟久完但未立主耳拙記録去想已經目若西涯閣老有作用之制中别無佳思作得文字強勉塞命無以老朽為嫌也祀典記當與西涯閣老圖之屢聞先生上疏乞休致然每于邸報中未見端的未審何如也近陳進士茂烈過寒舍與語東山先生告歸西涯閣老留之疑先生未䏻去者以此故也又得五月二十日書良慰想仰先生即日命駕還東山山靈輒喜雖然先生不忘天下之心山靈未必識也章近有衡山之約去東山非甚逺他日東山漁釣之暇尚䏻索我于朱陵洞中否耶昔者寄去慈元記稿幸一字批破還示為感又賞倪指揮知感激矣弊邑民得免于盜賊水火之害公一瓢酒之力耳活國者手假固如是耶感服感服里人問徭役告以昔者舟中所聞聽者雀躍交慶如赤子之慕慈母不審比日斟酌何如救民水火之中惟恐其不早也貪官汚吏侵漁百姓甚于盜賊此輩不除雖有良法美意孰與行之竊謂徭法雖更必痛懲一二貪黷然後法行之可久也祭田事料理恐未免水火之相射欲乞少緩裁之如何恃愛饒舌復彭方伯書古岡陳某薰沐頓首復書大方伯彭大人先生執事新凉惟台履吉慶去冬林别駕過白沙得執事手書後又得所寄絶句詩具悉雅愛繼又聞諸人執事以賤名汚薦尺天官以執事之言為重亟賜允行近者蒙遣守令降臨衡宇書幣煒煌先後疊至太守執犖宣喻于庭曰是大方伯彭公使某歸陳白沙徵幣也聞命兢惶罔知攸措執事當世之豪傑也吾黨以執事為模範斯文以執事為司命廟堂以執事為柱䂖執事一嚬笑一舉措天下將視以為輕重取舍甚哉執事之動不可輕也㒒本麋鹿之性者也雖少讀書全無抱負中歲閉門惟近藥餌好事相傳類多失實執事徒信人言以為可用斯名一出士類揚之閭里榮之㒒不知何以得此于執事意者方今之俗廉耻未興將以興之歟奔兢未抑將以抑之歟不然執事眼髙一世必不以天下之望負天下之人也夫天下非誠不動非才不治誠之至者其動也速才之周者其治也廣才與誠合然後事可成也孔子曰如有用我者朞月而已可也三年有成聖人過化存神之妙不可一二窺測天下不動不治動以治之聖人與學者一爾未有不須誠以動不須才以治者也如㒒者忠信不修章句為陋才既不足以集事誠又不足以動物徒以虛名玷汚薦尺進則無益於事徒喪所守以上纍執事之明止則人將以我為固守一節非通于道者亦非所以立大中而奉明訓也二者之慮往來乎胸中幾日而後决之子使漆雕開仕對曰吾斯之未䏻信開以夫子為的者也夫子不能使之仕何則人之知已不如已之自知苟未信也師不能強于弟子㒒自知甚明惟謹素履罔彼玷缺庶幾丘園之義尚足以少禆明時奔競者愧而恬退者勸亦㒒所以報執事之萬一也若曰可以仕焉㒒不知其可也矧今自汗又作俯仰或過衣裳盡濕此亦郡守所目擊設任之勞事何以堪之伏惟執事察㒒之志矜㒒之愚而弗強焉幸甚幸甚與陶方伯比聞在師中能坐馬矣幸甚幸甚周二來得書人情世態相見多不合奈何處之交遊中有不勸人進者乎某獨不然是以退為進也非髙明莫䏻亮之承問改題諸墓石可否書法與銘旌略同所以存其名不當云某府君忠烈公則書其自得于先朝者至顯矣後來恩典所加冝列諸神道碑不必改題也李世卿久在館中恐要知不多及又潭滘拘晋稻舫稱大府下差人果出于尊意否耶乞降指揮比歲鹹田之入㒒于執事所謂待晏子而後舉火者也然非鄧馬二生㒒安得坐享此田哉㒒與二生約每歲入三分之㒒猶以為愧焉黃田苐四蓢諸姪與易贊共成之贊比二生用力尤難所費十未酬一伏惟執事擴造化之量垂不朽之仁念㒒平生不苟取之小廉不負人之小節無易舊圖則㒒始終受賜大矣恃愛輕瀆不罪與歐總戎逺枉專使下問某不幸今年二月間先妣下世自是以來憂病相持不復知有人世事忽枉手教具審朝廷大閫外之任寄于公府江之患已平可賀可賀雖然平蠻之頌老杇竊願公忘之昔者斷藤峽凱歌適足為韓公之纍此廣右之役所以有煩于今日諸公也公識量宏逺所到豈可涯安地方復民業惟公晋意焉病畏多言感公厚愛故及此幸勿示他人以為詬也厚賜謹已拜領感怍無量南井昨為致區區于察院此不贅復張東白內翰承諭義理須到融液處操存須到灑落處㒒僻處海隅相與麗澤者某輩數人耳抱愚守迷無足以副內翰期待之重然嘗一思之夫學有由積纍而至者有不由積纍而至者有可言傳者有不可以言傳者夫道至無而動至近而神故藏而後發形而斯存大抵由積纍而至者可以言傳也不由積纍而至者不可以言傳也知者䏻知至無于至近則無動而非神藏而後發明其幾矣形而斯存道在我矣是故善求道者求之易不善求道者求之難義理之融液未易言也操存之灑落未易言也夫動已形者也形斯實矣其未形者虛而已虛其本也致虛之所以立本也戒慎恐懼所以間之而非以為害也然而世之學者不得其說而以用心失之者多矣斯理也宋儒言之備矣吾嘗惡其太嚴也使著于見聞者不睹其真而徒與我嘵嘵也是故道也者自我得之自我言之可也不然辭愈多而道愈窒徒以亂人也君子奚取焉㒒于義理之原窺見髣佛及操存處大略如此不知是否疾病之餘言不逮意惟髙明推而盡之還示一字㒒之幸也比者婁克貞教諭亦有書來㒒既未接其人不可遽有往復內翰倘以愚言為有益擇其中一二可者示之否則置之陳布衣竟不及面而卒當此衰否之極又失此人可嘆可嘆良晤無由伏惟順時以道自重不宣與賀克恭黃門離隔年多彼此交夢神亦勞止老矣寧復有相見之時耶今年春二月十六日老母傾背毀瘠不能自制與死為僯平生知舊幾人死者已矣存者或失其故步奈何奈何今之論人于出處曰賀黃門賀黃門亦蒙厠賤名于黃門之下豈不以同志者少不同者多耶比歲得所惠書繼又得賢郎北京書甚慰甚慰有子如此足矣天將以是大賀之門蓋可知也三十年妄意古人之學衆說交騰如水底撈月恨不及與克恭論之今自謂少有見處得其門而入一日千里其在咨耶南北萬里意所欲言非尺簡所䏻盡里中舉子赴春官附此草草前有詩稿一冊寄范長史處託渠轉逹遼東久不報為無便耳亮之又為學須從靜中坐飬出箇端倪來方有啇量處林緝熙此𥿄是他向來經歷過一箇㓛案如此是最不可不知録上克恭黃門歲首已託鍾鍈轉寄未知逹否今再録去若未有入處但只依此下工不至相悮未可便靠書䇿也前𥿄所録往來書問二首又記夢一首後有林緝熙秉之跋尾通奉去病中不能作書然所欲言者大略不過此而已亮之與吳黃門世美小詩不足以光先德但比於他文此為切實耳凡觀人者審于愛惡取舍去就之間足以見之矣所貴乎作者謂其言之不妄可以傳逺若筆鋒無力拈掇不起則無如之何與丘侍御承差草裏來得至蒼梧書起居通例也而何其辭之切切前此兩附問皆不至死者已矣宋先生旦夕臨弊邑將必見之無狀何以致公之惓惓如是耶感怍至矣聖天子念逺方簡命名御史出按治公以井泄之才治之廣右幸甚幸甚夫人之才大小必用之而後見不遇盤根錯節無以别利器閒居竊聞廣右之積弊甚矣斯民之望治切矣樹公道明賞罰去故即新使人人盡力于所事而民𬒳實惠正今日圖任之盛意亦公之䏻事也老朽何足以知之引領蒼梧徒深向往比與李世卿期至南嶽世卿今行矣道路其有藉哉酒楮不瀆謝與葛侍御古岡病夫陳某頓首奉書侍御葛大人先生執事頃者廉憲陶公惠書稱執事之命以平後山碑文委㒒為之既辭以不能矣恐執事者不察㒒之心而以為慢别簡托于東山劉先生白之今者趙知縣自省還過白沙復申前命竊計區區之私非但執事與當道諸公雖東山亦未之悉也㒒請略言之㒒每讀宋史至曹彬克金陵一事未嘗不對卷斂袵而嘆趙太祖之仁與曹武惠之不伐也蓋自出師以至凱旋士衆畏服無敢䡖肆克城之日兵不血刃凡所得一十九州三兵一百八十縣可謂有㓛矣武惠視之若無有也捷至群臣稱賀太祖泣曰宇縣分割民受其禍攻城之際必有橫罹鋒刃者實可哀也命出米一萬賑恤之當是時君不知以得地為喜將不知以克敵為㓛一念好生之仁洋溢上下自秦漢以來未及見也史臣稱武惠位兼將相不以等威自異遇大夫士于塗必引車避之不名下士噫何其謙之至也易曰勞謙君子有終吉武惠有之今後山之役信有㓛于民矣諸公豈自與耶此賊近之省城民遭其毒者幾年于兹前此有司固有任其咎者矣夫以今日平盜之㓛𥙷前禦武之不及正相乘除在于仁人君子之心視民如傷豈容有彼此先後之間哉夫上之治民當休戚同之夫久病者不以得一日之安而棄𥙷羸之劑病飢者不以得一飯之飽而忘終歲之憂執事試求之百姓憂樂之情而忘其在巳必䏻以趙太祖之所存者處民以曹武惠之所存者處㓛則光明者益光明矣以㒒觀于一時開誠布公未有如執事舍己從人未有如執事樂善忘勢未有如執事以執事之才應天下之務何所不可㒒所望于執事者非直以曹武惠輩人為法姑舉其一事之近似者為執事言之耳惟亮之裁之復江右藩憲諸公七月二十四日㒒方困暑閉齊獨卧而李劉二生適至書幣交陳輝映茅宇㒒再拜讀書識其所以來之意不敢當不敢當匡廬五老名山也白鹿名書院也諸公皆世偉人也修名山復名書院之舊希世偉事也㒒生于海濵今五十有四年矣未始聞天下有如是之事悠然得趣于山水之中超然用意于薄書之外旁求儒師俾式多士將以培殖化原輔相皇極以無負于斯世斯民也于乎盛哉昔朱文公之晋意于斯也一賦一詩足以見之其與諸公之心蓋異世同符也諸公讀文公之書慕文公之道亦罔不惟文公是師也自文公殁至今垂四百載仕於江右者多矣其間有䏻一動其心于白鹿之興廢者誰歟文公固有待于諸公也諸公誠念之不冝謀及鄙人鄙人非不欲斯道之明也學焉而不得其術其識昏以謬其志弱以小其氣乏餒其行怠肆其文落莫而不章歲月侵尋老將至矣其于聖賢之道非直不能至而已其所求于其心措于其躬者亦若存而若亡雖欲自信自止而不可得况以導人哉百鈞之任以與烏獲而不與童子慮弗稱乎力也故夫天下之事慮而作者患恆少不慮而作者患恆多千里之足不蹶于逺途萬斛之舟不虞于大水其才足以勝之非不慮而作者也使之不以其誠任之而過其分與自欺而誤人者其失均耳諸公獨不慮至此乎天下有任大責重而祿位不與者苟䏻勝之則至大至通無方無體故䏻為天地立心為立極為往聖繼絶學為萬世開太平所謂建諸天地而不悖質諸鬼神而無疑百世以俟聖人而不惑此其分內也宇宙無窮誰當負荷伏惟諸公念之慮之勿遷惑于衆口期匹休于先賢收回束幣更聘真儒俾諸士子有所效法以無負于今日之意也幸甚幸甚與李白洲憲副近者諸姪以鹵田之訟上干臬司此未論是非只觀古人所以教于家化於州閭其道何如甚可愧也甚可愧也今聞臬司公處分之一一論之如法加強占者罪恐其不堪故具此白此輩愚民亦嘗遣人諭之不肯信卒罹于法誠可哀憫伏乞先生操縱法外之意曲垂寬貸老朽此外别有處之使知感激彼此無怨乃為盡耳亮之裁之干瀆死罪又郁丞來得手書并近稿二幅元日扶醉等作殊有意思非但言語之工而巳也來喻所以處病夫至矣病夫何德以堪之頃答張主事書尚未聞于左右耶北門園池之勝孰與潭州山泉先生冨馬之惠孰與弘農公今且使病夫為邵堯夫乎為戴簡乎病夫得附驥尾為羊城添勝迹于後代豈假言哉破數百金先生不惜與人顧受之者未易耳病夫平生山水稍癖待明年服缺後采藥羅浮訪醫南嶽上下黃龍洞嘯歌祝融峯少償夙願然後歸拜先生之賜未晚也河洛後天數過九九病夫一生不受人間供養或者其超出六合乎顧别駕送契來且與領狀若委人承管則未也先生亮之又劉門子帶來書信必欲自致白沙不附他人卒歸之水府對之太息而已數日前鄧督府附到東山手書獲聞東山好消息喜慰無量頃者雖遭劾者之口計不足為盛德纍周生行時有奉懷拙詩想聞之一笑區區憂病之餘精力日不如舊但偶未死耳無足為故人道者尋醫南嶽耿耿一念未䏻出門蓋自去秋七月感風手足不仁至今尚未脫體嶺南地方寇盜日益民已窮而徵斂無已天下理亂所關謂何誰其憂之北門園池之惠每念及此慨息久之仁人君子之為朋友慮至此乎周生倘及面必䏻盡所欲言劉門子告回病中草草致此不䏻悉又數日前山東邦伯之報至矣彼有來蘇之望此有卧轍之憂奈何奈何不審何日啓行制中但有心送南北日逺日踈歲云暮矣復有盍簮之期否耶北門園池之賜聞者以為美談某不欲以一時虛名纍左右劵書一通謹封納平生山水債欲償之餘年者託周生口陳髙明想䏻亮之復陶廉憲使至辱手書承當道諸公欲以平後山碑文見委為之㒒竊怪執事之知㒒猶未至也今天下䏻文章冨經術言足以取信將來如一時諸公㑹于省中可謂盛矣不自操筆而以委于不䏻若㒒者素無文彩比年以來益以衰病愈見荒落無足觀者強顔為之徒為有識所哂况于多言干譽尤非退者所安區區之私執事䏻亮之使回謹復又昨縣如彥誠其賢未皆古之循吏邑人懷其惠矣議立廟以報之倘以聞于執事頷之民將歸心焉蓋民之所好好之民之所惡惡之此得民之要道也况丁令在官簡于事上執事嘗抑而教之今因民之請廟而與之而遂成其名執事之量宏矣抑聞之千金市駿骨况生馬乎㒒知執事百歲後爼豆于斯民當自我始則有徵矣又比日邑中聞執事至凡近年以邑科取民者皆罷之民大恱服為可賀也前此豈不恤其情而強徵之歟感應之機捷於影響願執事永矢此心所以保㓛名于晚節期爼豆于將來耳憂病中聞此消息不勝慰喜之至謹此布忱未涯瞻奉惟兾以時調攝以慰注仰之拳拳又李剛回具審福履康佳甚慰懸仰近傳方伯之除的否造次未敢奉賀竊惟寵辱在外惟以時倍加保嗇事獲已力辭就間此最上䇿拙見如此不審髙明以為何如荷公厚愛不敢不盡又秋暑既退伏惟體况清和納福勝常頃者陳都閫過白沙具言當道所以論薦執事之詳想朝廷不日命下班次必崇付卑必重執事自此可以樹大勳業酬平生之言而東西託處亦惟便之圖令名不失公私兩全此人情所至願而不可必得非積纍之厚其孰能當之某病卧一齊寄名于䂖而無其實英德石形峭立或層起十數尺竒絶可愛者能致數片置庭兩隅朝夕趺坐對之志願足矣然須得便舟可付閧然勞人則又非所愛欲也不具又辱手教興師弭患動中機㑹為可喜也後山禍機久伏使謹于微則無今日之役今首惡既誅暫停搜捕之師冝慎玉䂖之辨于疑似不决者寧詘法以信恩此則天地好生之仁子孫享無彊之慶執事固有之奚容贅復趙提學僉憲來教摘諸聖賢垂世之言與㒒之事參而辨之大抵愛我深而告我盡也㒒用是知執事之心一峯明白不欺之心也一峯死㒒哭之慟以為自今而後不復有如一峯者今乃有執事幸甚幸甚執事為說本之經訓與㒒所以為學所以語人者同歸而殊途但㒒前簡失之太略執事見之太明故疑㒒之意異于執事而實不異也執事謂浙人以胡先生不教人習四禮為疑㒒因謂禮文雖不可不講然非所急正指四禮言耳非統論理也禮無所不統有不可須㬰離者克己復禮是也若橫渠以禮教人蓋亦由是而推之教事事入途轍去使有所據守耳若四禮則行之有時故其說可講而知之學者進德修業以造于聖人緊要却不在此也程子曰且省外事但明乎善惟進誠心外事與誠心對言正指文為度數若以其至論之文為度數亦道之形見非可少者但求道者有先後緩急之序故以且省為辭省之言略也謂姑略去之不為害耳此蓋為𥘉學未知立心者言之非𥘉學不云且也若以外事為外物纍巳而非此之謂則當絶去豈直省之云乎不規規于往迹以干譽目前㒒之此言亦有為而發嘗與胡先生言之矣非諷執事也此不欲形于筆札俟靣告執事于㒒謂無間者也苟事有未當㒒得盡言之豈假諷哉㒒才不逮人年二十七始發憤從吳聘君學其于古聖賢垂訓之書蓋無所不講然未知入處比歸白沙杜門不出專求所以用力之方既無師友指引惟日靠書冊尋之忘寢忘食如是者亦纍年而卒未得焉所謂未得謂吾此心與此理未有湊泊吻合處也于是舍彼之繁求吾之約惟在靜坐久之然後見吾此心之體隱然呈露常若有物日用間種種應酬隨吾所欲如馬之御銜勒也體認物理稽諸聖訓各有頭緒來歷如水之有源委也于是渙然自信曰作聖之㓛其在兹乎有學于㒒者輒教之靜坐蓋以吾所經歷粗有實效者告之非務為髙虛以誤人也執事知我過胡先生而獨不察此㒒是以盡言之􅛽少留意餘不屑屑又易元至辱手教數幅并諸作見示更相規益有交友之道幸甚幸甚然謂㒒示諸生詩末聮有激而發則恐觀者過于求索㒒之意往往不然也此詩亦但謂歲月流邁諸生學不加進故汲汲焉告之兾其有所感發而自憂耳至于末聮則為我所以為諸生憂若但如楊朱為我而不恤人則彼楊朱何為者耶于是終告之曰闢楊氏者孟子也豈若是𥚹哉道固爾也反復言之不過使學者知吾之憂出于當然而不容已則其所當自憂者將惕然于中而亦不容已也乃作詩者屬意于此訂頑砭愚咸此焉在何嫌于人我為敵與自任孟軻之重耶記語類所載文公力疾與學者語勉齊見而止之文公曰除是楊朱不理㑹人我即不曽學得楊朱亦此類也執事顧以為不可乎海雲更號極是率爾敢不承教執事録示張東白詩且疑㒒更號逃禪不能擺脫此語聞之不覺失笑執事固愛助我者請問今所疑于㒒如此果何自來耶若出于東白未可據也東白蓋㒒昔論學書中一二語偶未深契而料想至此從而疑之竊恐未為至論只如此詩者偶讀宋文鑑和得半山詩數首論者云陳公甫喜荆公輩人直如此草草㒒平生得無巴鼻之謗多類此可怪也聞執事將赴京不獲數侍誨聊復此不一一又古岡病夫陳某再拜書復僉憲趙大人先生執事伏讀來諭執事所以進㒒者至矣所以教㒒者亦至矣㒒一顓愚人耳凡百無所通曉惟知自守而巳曩者至亰師與諸賢士大夫遊日聽其論議天下之事亦頗有益惟是愚懵終不䏻少變以同乎俗是以信已者少疑已者多也㒒之所深與者皆執事同年而獨執事之名未聞也奉附到董給事書其中稱道盛德不少置㒒私心喜甚以為此來當得一見非子仁㒒無以知執事然以子仁之言又未嘗不追恨于亰逰之日也承喻有為毀㒒者有曰自立門戶者是流于禪學者甚者則曰妄人率人于僞者凡于數者之詆執事皆不信之以為毀人者無所不至自古聖賢未免見毀于人甚矣執事之心異于時人之心也㒒又安敢與之強辨姑以迹之近似者為執事陳之孔子教人文行忠信後之學孔氏者則曰一為要一者無欲也無欲則靜虛而動直然後聖可學而至矣所謂自立門戶者非此類歟佛氏教人曰靜坐吾亦曰靜坐曰惺惺吾亦曰惺惺調息近于數息定力有似禪定所謂流于禪學者非此類歟㒒在亰師適當應魁養病之𥘉前此克恭亦以病去二公皆䏻審于進退者也其行止𥘉無與于㒒亦非㒒所䏻與也不幸其迹偶與之同出亰之時又同是以天下之責不仕者輒涉于㒒其責取證于二公而㒒自已丑得病五六年間自汙時發母氏加老是以不䏻出門耳則凡責㒒以不仕者遂不可解所謂妄人率人于僞者又非此類歟㒒嘗讀程子之書有曰學者當審己何如不可恤浮議㒒服膺斯言有年矣安敢爭天下之口而浪為憂喜耶其晦也不久則其光也不大其詘也不甚則其信也不長物理固亦有然者矣㒒或不為此戚戚也且㒒聞投規于矩雖工師不䏻使之合雜工于羽雖師曠不能使之一何則方圎之體不同緩急之聲異也尚何言哉尚何言哉惟執事矜其志而略其迹取之群咻之中置之多士之列則天下之知㒒者無如執事矣幸甚幸甚都憲公雖未見顔色然仰之十餘年矣比聞下車以來德政之布沛若時雨上自士大夫下至閭閻小民莫不欣躍鼓舞㒒固願一見况始者嘗辱一言之譽㒒又豈敢自為踈放比于固執者乎使回謹此以復冒瀆威尊惶恐無已復當道疏頃者亡妣出殯之日伏蒙藩臬列位老先生大賢遣使臨祭備極情文光生泉壤不肖孤無任感激慚負之至今者仙舟來過江門扶病褰帷引領流涕不敢任情乖禮以遂謁見之私徒抱哀忱無由上逹謹奉疏荒迷不次謹疏與徐嶺南切見本縣近年以來盜賊日生訟牒日繁人情放濫略無檢束風俗惟見日不如前矣未聞有反復之機于乎安得賢守令識理亂之源者與語是耶頃者誤蒙寵顧衰病不出無由進謝自念老病山林徒負虛名無㳙埃可以答一顧之辱謹以是言進惟閣下亮之程子曰治天下以正風俗得賢才為本秦漢以下論天下之治者必以復三代為至三代之君何君也其政教何政教也苟欲復之從何處下手耶必如明道先生之言是真䏻復三代手假也而不見用于時惜哉伏惟大賢為政務實而行庶幾䏻順復人情為國家樹立長治久安之根本非如俗吏其所用心者惟簿書期㑹取辦于目前而已也自今而往一令之下一政之行必求其有關于風俗者三致意焉是誠聽訟理人之第一義也是誠經綸天下之實地也幸甚幸甚與張憲副廷學亰師一别逮今六年中間不幸彭年早世㒒自已丑得疾以來人事十廢八九雖承訃以興哀乃無疏以奉慰尋自度于閣下如此冝得棄絶之罪然而終不復疑者誠以閣下愛㒒亦猶㒒之愛閣下故也比者獲手書三四讀之然後知衆人所以待㒒之心異于閣下之心然閣下不欲正言之但微示其端于㒒非㒒有嫌于閣下乃閣下引而不發其不可者以意示之將使㒒深思而識之耳雖然㒒何敢以望于閣下者望衆人哉不知其人而好之畏其人之加已而勿與之爭自古未嘗有此也是故始求之深以取困大易所以凶浚恆也言不離乎道行不迷乎窮出處語默去􅈬之權操而用之必槩乎義苟如是榮辱之至自外者斯任之而已㒒之所守如此閣下信以為何如哉㒒不善交人數十年間所交其在上者久而不衰惟閣下與莆守潘舜絃而已然止于相愛之深知已則未也而以望于一切之人此㒒所以不敢也㒒受氣本不多疾病乘之近年以來齒髮都耗精力䆮衰故又不樂與人俯仰方將投名山選幽谷枕流漱石而老焉幸而老母粗康諸兒女婚嫁漸次可畢往無日矣閣下仕于朝為臺官其在外也為按察官可謂進得其地矣大丈夫欲行其道于當時自宰執而下冝無有先焉者矣閣下謂鷹鸇不如鳯凰即如引𥚑折檻請劍斬倿臣頭埋輪都亭將壞白麻而慟哭凡若此類疑閣下小之而不為耳至如明刑弼教保任皇極以夀國家無窮之脉其次抑邪與正彰善疸惡必行已志不為利誘障百川而東之回狂瀾于既倒此冝無不在我者顧猶有掣肘之嘆耶閣下昔何所自任今忽諭以乞身之圖㒒之所不敢聞也恃故縷縷辭多率易伏惟恕納而賜聽焉幸甚幸甚與黃大參某啓人出處進退去就之節不可苟也非但不可苟仕亦不可苟止始者執事由端陽入省履任之𥘉枉棹白沙獲聞仕止之言夫絶塵步驟固知其不與凡馬同然不謂得意而往超然脫其銜勒一息萬里如是速也相逢盡道休官去林下何曽見一人非靈徹寄韋丹詩耶流傳世間識者笑之執事真無負斯言哉病卧山樓聞此信息竊以為喜他皆未暇論只不為苟出始終一意進退合義如此于名教何如哉于世道何如哉未審何日就道專此馳問伏乞飛示與戴憲副恭聞執事榮拜憲副之命引領台階陪增喜躍不知微痾之在體也小廬岡書屋近方粗完四方士來逰白沙者于此處之䏻使退休腐人暮齒不忘于學猶日與二三子周旋考德問業其中庶幾其少有得焉則此屋之名或者可配此山林無窮是亦執事之賜也并此叙謝帕二方表賀忱耳不拒為榮與胡僉事提學惠曆久不謝罪罪李山人至蒙賜相山骨髓等書珍感無已㒒常粗涉郭景純􅌾書愛其辭約而㫖奧反復讀之蓋無難曉及乎真形在目美惡雜陳則又茫然無所區别以此知讀書非難領悟作者之意執其機而用之不泥于故𥿄之難也况此經鄭玄默所注穴法處謂不得師傳口授終無自悟之理吳草廬亦云提耳而誨之可使不識一字之凡夫立造神妙如其言盡讀堪輿家書不若得其人而問之易了李君經宿别去非久當回白沙其人頗謹厚而又為髙明所與疑亦有過人者第患無䏻深扣之耳承喻欲來新㑹企渴企渴豫久卧衡茅未即進拜則有其說布衣陋儒謬為王公大人所愛惟恐不自重以為門下辱矧今士習非古一驕一諂交病天下有識方以為憂如㒒者縱不䏻救忍助之乎惟亮察幸幸又奉别忽已踰年想望之私無日不爾昨者生員易彬送到羅明仲林蒙庵丘蘇州書札得知先生體况安佳深慰勤企某近又以人事過煩自汗時發畏風如昨閉齊偃卧竟日絶去思慮酬應以俟此氣之復而已下車之始即欲遣人上問尋聞往梧州昨晚兒自五羊回乃知先生自梧州還尚未知何日得拜見也閩中陳剩夫者先生所知不幸去年秋間死矣其人雖未面然嘗粗聞其學術専一教人靜坐此尋向上人也可惜可惜舊歲莆田有一舉人林體英來訪白沙與語兩月比歸亦䏻激昻自進不知其後何如也此學寥寥世間無人整頓得起士習日見頽靡殊可憂也疲極未由往拜専令學生持此候先生起居别後相遇何人伏乞垂示幸幸又某啓昨來枉駕感愧無量承寄示逰山詩改定次聮又佳又佳上下二句大小氣力停勻自是實事魚鳥亦指隱居而言晦庵詩云我是湖山舊主人歸來魚鳥便相親意亦如此或以為形容道體之言則恐涉于太深上下承接不來未知是否大凡文字不厭改患改之不多耳惟改方䏻到妙處而發之易者恆不䏻多改比見閣下于此詩略不經意以為當終置之不復改此詩雖不改亦無害但不知其于他文如何深以不及對靣一扣為恨後得此𥿄然後知閣下非吝于改而改之益善日令兒輩誦此二句以為喜昔者嘗聞歐公作一小簡反復改之有改至八九次者歐公期于言者也其不苟有如此冝其傳之逺也吾人大抵以不專之學方其為之也鹵莾潦略而不自知又何怪夫古人之不可及也推之凡事亦莫不皆然蓋非止作文一事而已使回謹此奉瀆不罪不罪拙作末一章屬意尤切尚未知何日可遂此約男女一大俗緣比于軒冕外物誠未易盡湖山之盟信如何也江山魚鳥何處非吾樂地閣下既以此自信而無疑于㒒望終賜之首㫖與王樂用僉憲以詩之盛莫如唐然而世之大儒君子類以技目之而不屑效焉則所謂詩之至者果何人哉㒒于此道未嘗一得其門戶尋常間聞人說詩輒屏息退聽不敢置一語可否問其孰為工與拙罔然莫知也比歲聞南亰有莊孔易者䏻自樹立于辭不一雷同今人語心竊喜之稍􅈬而問焉果出竒無窮及退取陶謝少陵諸大家之詩學之或得其意而亡其辭或得其辭而遺其意或并辭意而失之蓋其所謂夙生暈血終缺一洗之力而又愳其見譏于大儒君子終所謂技不可曠歲月于無用故絶意不為凡學于㒒者亦以是語之而無有疑焉者矣又執事懷抱利器退處林下者幾三十年晚用薦者復起為臺官出臨嶺海首舉盛禮酹于亡妣墓前逺近聞者興嘆不肖孤無任感德愧謝之至一峯先生墓木拱矣執事言必稱一峯豈但思慕之不忘而已亦將以一峯平生念念不肯忘天下卒莫逹之天下者小試之見道之可行耳夫士能立于一世或以道德或以文章或以事㓛各以其所長其出處語默進退去􅈬不䏻皆同亦不期于同也執事安于所遇不求其迹之似其未慊于用者姑置之以其䏻者用之而益小心焉幸甚幸甚某病且老無足為世用或能為執事紀録一二成績以昭示後代慎無曰人莫知我也過辱厚愛謹此復制中不果自書又惠州孔子廟作者不自為記而以委諸人某屏棄筆硯事于今三年矣吳秀才請試之不亦左乎國滅臣死歷代之常堂堂華夏夷狄據而有之非常之變也遇變而死為君義也為中國死內夏外夷春秋大義也故大之大之者謹之也文山與張陸同祀扁曰大忠謹書法也今廟于海陽直取文山所存與其所遇拈出碑之以風勵百代其亦可也不必襲大忠之名與崖山同也拙見如此可否幸裁之幣金留面謝奉和佳作三章近以附五羊驛送去不審經目否餘不及與左行人廷弼片腦大惠也前此寄示傑作兼喻以風水所冝感慰之極不審比日起居何如秋且盡矣拉何山人駕扁舟出扶胥口東望羅浮鐡橋之勝遂登飛雲訪朱明洞天此其時乎因想足下䏻飄然自適益覺某之匏繫于病為可厭也近藁十數首録在别𥿄早晚東逰則此𥿄或可隨行有至飛雲頂且令從者歌之為我通一語于山靈也呵呵黃秀才行令犬子專此馳候基茗山蕉貧者之獻于人止此勿笑與光祿何子完先生門人久别想念無已比年承貺不一張秀才南都還又承寄到坐几一事老拙每日飽食後輒瞑目坐竟日甚穩便也好事者或借出效為之多荷多荷近陳汝學報子完即日謝事歸矣不知其實非也昔者致幣于定山者儀多不足非子完誰其助之然以為求文者可也為老拙非也諸公始作嘉㑹樓白沙以地參焉耳記者自有其說子完嘗一日在館下顧不䏻以謙恭自處掠他人之美以為巳有耶竊為子完不取也子完出處語默進退之冝子完自知之非老拙所䏻與也獨憂定山先生平生故人或因子完之言而為斯文留意焉則未免為識者所議且笑之矣故具此白餘不悉與羅一峯大忠祠碑皎皎烈烈見先生之心矣可嘆可賞諸生蒙薰炙歸來又是一畨人物多荷多荷三峯叙文并諸作實有意思但恐入未得禪耳先生欲理㑹著述及諸外事莫若且打疊令我潔潔淨淨先生平昔所篤信者非朱紫陽乎非全放下終難湊泊是紫陽語否門中有鄧秀才可試問之幹異兒也一日千里寧不厭家雞耶一笑餘不具遺言湛民澤孟子見人便道性善言必稱堯舜此以堯舜望人也橫渠見人便告以聖人之事此以聖人望人也吾意亦若是耳竊附孟子橫渠之後彼何人哉豫何人哉有為者亦若是文王我師也周公豈欺我哉區區之意在覽者深思而自得之既以寄民澤亦以告有志于門下者咸得自勵而日勉焉非但為美言以恱人也與平湖語連日不如與賔州一尺簡易曰𥘉筮告再三瀆瀆則不告此教者之事夫豈有所隱㦲承示教近作頗見意思然不欲多作恐其滯也人與天地同體四時以行百物以生若滯在一處安䏻為造化之主耶古之善學者常令此心在無物處便運用得轉耳學者以自然為宗不可不著意理㑹俟面盡之民澤足下李世卿書來問守臺者老朽以民澤告之冷㷔并騰殆出楚雲之山蓋以勉世卿使求諸言語之外如世卿可惜平生只以歐蘇輩人自期安䏻逺到賢郎在病可徐徐而來眼中未有䏻奪公楚雲手假也五月十二日䂖翁書此學以自然為宗者也承諭近日來頗有湊泊處譬之適千里者起腳不差將來必有至處自然之樂乃真樂也宇宙間復有何事故曰雖之夷狄不可棄也今世學者各標榜門墻不求自得誦說雖多影響而已無可告語者暮㬌侵尋不意復見同志之人託區區於無窮者已不落莫矣幸甚幸甚楚雲雖日望回萬一髙堂意有未安亦未可率尓行也珍重草白民澤進士章久處危地以老母在堂不自由耳近遣人往衡山問彼田里風俗尋胡致堂住處古人託居必有所見儻今日之圖可遂老腳一登祝融峯不復下矣是將託以畢吾生非事逰觀也三年之喪在人之情豈由外哉令之人大抵無識見便卑闒得甚愛人道好怕人道惡做出世事不得正坐此耳吾輩心事質諸鬼神焉往而不泰然也耶病中不欲多言幸以意推而盡之未可草草也五月五日石翁書復民澤侍者民澤足下去冬十月一日發來書甚好日用間隨處體認天理著此一鞭何患不到古人佳處也章自去秋感疾迄今尚未平昔者髙堂未傾病轍叩天願少假之年今廬岡之木且拱吾何求哉其未忘者衡山一念而已皇皇靈芝一年三秀豫獨何為有志不􅈬其可念也夫其亦可嘆也夫廷實近多長進但憂其甚鋭耳子長病且愈曰髙音耗亦無黃巾納婦館中惟一之與服周教諸孫海北汪提舉向慕亦切作懷沙亭于海上此外有修古書院冷香橋之作所費不少恨無以成􅈬之耳民澤在鄉安否禍福原于人情不可不仔細察也謾及之不一一戊午季春三月𥘉二日䂖翁在碧玉樓力疾書與莊定山李上舍回辱賻帛為感承口諭比年手足作秋風痺尚未全愈今專托范生往視未知此生能了此疾否耶聞諸李學録之子數日前謝病疏已上甚慰翹企自古賢人出處不同世多議之此豈衆人所䏻識哉太虛近往來石洞否向揮使處不奉簡因見為道下懇病中不一不一又不意凶變太夫人奄棄榮飬前九月龍克溫報繼又得周文選書連𥿄不勝驚怛仰惟先生孝德純備不幸際此荼毒心死形留何可想擬伏願撙哀自防勉副憂禱某支離之人不堪走哭束芻之忱可見于此惟照察不具與張廷實主事先生門人盜走海上及今不即料理令盡絶後難圖北方信息不到耳竊以為憂也順德人謗李世卿由吳獻臣王嶺南怪李世卿由某多言孟子曰愛人者人恆愛之敬人者人恆敬之今之愛人者人惡之敬人者人侮之與古不同置之勿復道矣緝熙携家謁選不過白沙以書來别今有一簡復之昨見范䏻用道定山事可怪恐是久病昏了也出處平生大分顧令兒女輩得專制其可否耶吾意定山為窘所逼無如之何走去平湖商量幾日求活一齊誤了也緝熙畏天下清議苦不肯承認耳今此簡與之更不道著一字大海從魚躍長空任鳥飛何與吾事耶謾及之又孫侍御屏置公事千里一顧别後連枉數詩不可謂無意于區區者惜其所急者筆札間細事某且引之于道既有以復之矣又慮薄俗不可處喻人亦難不知我者且以我為慢㑹間以一言擴之使彼此有益幸甚幸甚又來詩感憤之速足慰所望著此一鞭無難于天下矣他人讀拙詩只是讀詩求之甚淺何足與語此也抑猶有未盡者更諷詠之千周燦彬彬兮萬變將可覩神明或告人兮魂靈忽自悟雖拙作之淺陋能以是法求之恐更有自得處非言語可及也犬子應科在省百凡可告教之幸毋吝又承示跋語推之欲其髙反之欲其實用心于內者如是以示一之亦未灑然讀至贈行之作則斂袵嘆賞不已林郡博何日過五羊不留一字耶舶司昨遣吳瑞卿携所作雲窩圖至白沙題云若個丹青可此翁雲窩自有主人封扁舟一去無消息黃鶴樓前望五峯衡山之興勃然矣未審開春䏻便行否耶湛民澤近無一耗廷實䏻過白沙一話為慰然未敢必也又陳留市隱使不遇陳后山黃涪翁一市傭而巳耳雲谷老人李孔修非吾廷實吾安知吾郡有二賢士哉得手書讀之喜而不寐所惜者拙疾拘綴而雲谷巳老雲谷將不可得見則雲谷之所有者吾安䏻揣摩之而得其真耶獨孔修妙年如廷實所稱非俯首當世之人也萬一他日往來雲水之便庶幾一接其緒論以信吾廷實䏻知人善取友以為快也把渡人去復此病倦不多及又承喻求靜之意反復圖之未見其可若遂行之秪益動耳惡在其䏻靜耶必不得已如來喻搆所居旁小屋處之庶幾少靜耳適與容一之論李廣射石沒羽曰至誠則金石可開又舉莊子語云置之一處無事不辦此理殊可恱顧今老矣惟日孳孳豈能及也并此告又得正月草日書百錢自喜貧者說金學能以此自檢其過人逺矣甚賀甚賀斬釘截鐡工夫當自益但須由其道耳由其道而往無逺不至也或謂廷實氣髙好自是不䏻下人比觀與民澤諸作殊有意思未必盡如或者之論也大抵虛巳極難若䏻克去有我之私當一日萬里其它往來踈數不計也睡起憒憒不多及又譬之歌曲遺響直唐調耳近見偶拈諸作斬新以為絶倡而何求和者多耶百凡如人飲水冷暖自知老朽所望于賢夫豈淺淺哉此據景元口告李子長懷集之行恐未免內顧之慮䏻照之否石翁白廷實地曹又數旬來無一的便故不奉問後山不意騷擾昆岡之焚玉石雜處䏻無誤傷者乎承示諸作驟看似勝前細看詞調缺古無優柔自得忘言之妙看來詩真是難作其間起伏往來脉絡緩急浮沉當理㑹處一一要到非但直說出本意而已此亦詩之至難前此未易語也文字亦然古文字好者都不見安排之跡一似信口說出自然妙也其間體制非一然本于自然不安排者便覺好如栁子厚比韓退之不及只為太安排也據拙見如此不審然否世卿修志邑中近方下手其行恐在冬春之間崖山之逰不遂約秉常早晚可得一㑹否近稿頗有之倦不多録俟續寄又簡復張君席珍足下㒒知秉常秉常知足下故不待面知足下過人逺矣老拙無所為但碩足下輩䏻樹立于世俾斯文有賴幸甚幸甚蒙示諸作健逸可愛但得稍入規矩乃佳耳拙稿數篇録去以代靣語浮謗未息老母眠食不忘甚無聊不多及又時矩語道而遺事秉常論事而不及道時矩如師也過秉常如啇也不及胥失之矣道無往而不在仁無時而或息天下何思何慮如此乃至當之論也聖人立大中以教萬世吾儕主張世道不可偏髙壞了人也重作别章感感夜坐第二篇佳復時矩對病之藥也蒼梧歸後人事益冗煩暑為災起倒不供行期尚在後八月也都憲有意催促緝熙廷實只在明年春夏間行耳俟面既又近來弊邑夜寇甚于前日有盡殺一家十餘口者矣地方如此不可不蚤為之所况有大于此者乎意欲􅈬省城內求一地頗幽僻且寬廣及此時築室奉老母居之適得白洲口信亦惓惓以此為言與鄙意正合需者事之賊見幾而作不俟終日可也幸為我裁之數日後令兒輩詣左右聽處分也所欲與語非筆札所䏻盡非相愛深者告且密之切囑切囑又半江改稿翻出窼臼可喜學詩至此又長一格矣前輩謂學貴知疑小疑則小進大疑則大進疑者覺悟之機也一畨覺悟一畨長進章𥘉學時亦是如此更無别法也凡學皆然不止學詩即此便是科級學者須循次而進漸到至處耳近稿録在别𥿄别後所作惟此耳緝熙諸稿覽畢還一字章復廷實心契前日半江遣子來白沙拜謝至則仙舟行矣幸照又章因起倒傷煩諸疾乘之自汗耳鳴心氣虛損肌膚由是不實得七月五日書承養生在去其害生者章之病多自取由不介意生死故一切任之今則末如之何矣古人漏船之喻良有以也他日見雲谷丈人試為叩之曰閭丘之命將懸于豐干之手屈平數語盡攝生之妙或者知之而為之弗蚤終亦無𥙷于漏船不如探囊中一丸與之又恐分薄緣淺者無以當之如何書中斷制平湖去􅈬章亦未敢率爾蓋一時事體所關萬一有甚難處者非但欲存忠厚而巳俟更得其曲折詳細是非不難見也别𥿄報袁德純來按治陳邦伯死于道路此于天命亦何所增損而使人動念耶是豈無害于生終不如坐忘之愈也又近得林子逢書頗悉平湖履任來消息大都是雅不勝俗寡不敵衆非但所執者古之道祖宗來制典昭昭亦依不得了可歎可歎緝熙此出固不得已終是缺打算聞去秋九月巳在告此直圖歸計耳别無分付也秉常想巳􅈬道前承寄手疏賻帛謹已拜領感感歐太素傳好章舊亦聞鄉里有此人但不得其詳耳周文都如省託渠一訪雲谷老隱竟以疾弗果此老自世外恐亦未易謁也溽暑不審體况何似朋友凋落交道陵夷士風頽靡莫甚此時置之勿以汚筆墨可也又左廷弼遺來白金二十兩簡中疑似若只出于東白借助之意則㒒巳辭之矣㑹問為叩其的還一字東白販𥿄失利故不欲受又曩辱佳章并賀儀愧感千萬李世卿行時諸友追餞倥􅘓不及奉簡亦謂與世卿相知不待面安事簡耶世卿闊逹善評文想青燈對榻髙論層出麗澤之益多矣更兾寬廣以來天下不一之善别有贈章勿愛垂示又承示諸作以拙者觀之近體可驟看久看則别古選才看便不似不知平日與秉常論者何如以吾子之才加以涵飬之力久當得之未用催促也拙庵記文字議論好非拙者可及但不知較于古人情性氣象又何如也更須自討分曉大作規模不墮落文士蹊徑中乃佳也九月四日章復廷實廬墓詩若未登卷請更作又近作皆已經目詩不用則已如用之當下工夫理㑹觀古人用意深處學他語脉往來呼應淺深浮沉輕重疾徐當以神㑹得之未可以言盡也到得悟入時隨意一拈即在其妙無涯每見所作只是潦草如忙中應事無味可味大略如此難一二指點病痛處欲告又恐見難而止反為所沮故不欲輒言耳子長亦未有捉摸撞來撞去不知如何用心也如李世卿平日自負至論詩則以為甚難不敢出一語亦近方得覺也秉常南亰寄來諸稿讀之不䏻竟又不知所養者近來何如也别𥿄録去拙作間呼子長共讀之懷世卿末一聮以問容一之亦不能了知音者真難得也正月人日石翁書復廷實侍者前柬相逹見漢清囑勿漏恐倉卒生謗也草率石翁云又半江十詠接引意然有次第前後一一相照求柬所為作一跋為此號者謝德明居邑之南郭疇昔有桓溫少年之習喜其勇于改革閉戶不出與俗交者四年矣鄉曲往還忠于門下者也跋中略見此意然亦不必專繫其人也若興動和拙詩亦可不必跋也髙作每見跌蕩可喜但不知置之古人文字中䏻入得他規矩否如王節婦墓表只以信手寫出古之作者意鄭重而文不煩語曲折而理自到此等處似未能無少缺也何如觀其言可以知其人彼沉酣世味者泥滓滿腔又惡可與論此哉讀漳州功德碑絶句别𥿄録上兩山先生一笑得便即寄去也餘不悉又承屢寄示近作得之憂病之中雋永之味咀嚼不來尋常喜言詩值小煩惱開卷釋然今則末如之何矣合是障得重後與物扞挌非干詩力弱打不破也藏之篋中以俟他日披閲又文祥兄弟繼逝甚可憫也存者季弟諸姪䏻不墜其家業否文祥始從湖西遊頗見意趣後為仕進纍心遂失其故步至不得一第而死是亦命也夫人生幾何徒以難得之歲月供身外無益之求弊弊焉終其身而不知悔惜哉頑姪景鍾最為老母所愛今之亡也正如來詩所謂奈何奈何老朽此旬來體中頗熱甚無聊不一一又李世卿承箕也不逺數千里來訪白沙朝夕與之談英偉特逹鄙陋當世欲于聲利外立腳者非但文辭之工而已期過秋方還嘉魚因便䏻一來㑹否耶又柬所寄興壼字韻下五首遣辭寬緩稍就沉著可以望作者之庭矣謂非學力可乎自餘皆不及此至日在病數首近日方寄到近作皆勝舊聲口與拙作相近可愛可愛晦翁自云𥘉學陶詩平仄皆依韻閉門兩箇月方得逼真自古未有不專心致志而得者更望完養心氣臻極和平勿為豪放所奪造詣深後自然如良金美玉略無瑕纇可指摘若恣意橫為詞氣間便一切飛沙走石無老成典雅規矩蕩然識者笑之台字韻首句以間字易眠字何如間字韻第二句當改途字韻俯慙作每慙佳目昏筆駑不䏻一一又久病未脫體猥蒙督府鄧先生數年知待之厚無以報之甚懸懸也昨承見示和答督府見寄髙作病中牽勉次韻一首少見區區近見邸報亰師戒嚴正求才如不及之時也東山先生為天下屬望不見起取甚以為疑故末聮及之雖受饒舌之誚所不敢辭也國家安危所繫全視用人如何耳且如我兩廣地方雖逺然用人小大得失事體則無二致人才有無顧作興如何耳倪指揮可用之才久𬒳誣在獄人共惜之當道處分如此因循不决下人不免有疑且將以倪某為覆轍而怠于立事此事雖微所關于國家用人之機當轉移以救一時之弊則甚急也若見督府言次可及無吝一言謂此能分理一人之冤尤未也有益于地方用人有益于國家不可不慮也切囑切囑又得定山三月九日書云于是月告病不識此幾發之早晚在考察前尚有一分之說在考察後則更無說矣拙詩云百年將滿日心亂不成詩易曰見幾而作不俟終日竟何謂㦲據如是殆不可開眼衡山之行吾其可已耶緝熙書中怨非已者云一涉䆠途即為棄物天下固有棄之者矣章何敢棄朋友也報帖即封寄緝熙雖非所喜然不可不報也五月十八日石翁書于碧玉樓雨中廷實閲此簡畢有便轉寄民澤可也又省城之遷不决緩急無所歸决恐于纍于人今歲創修祠墓凡五處財用竭矣不如且置之近聞總督之請于上萬一東山復來地方可以少安亦未可知也廷實念我深不自知其傷于饒舌昨見白洲憲長問何以不决老朽不敢盡言正為此也蓋有離世樂道如戴簡以居東池之地然後可當弘農公之賜主之以鄭公司馬在康節則可無康節之才與量豈不為識者所譏乎有可得之勢無可受之義取舍之間甚不茍也亮之亮之又承示楊栁之曲情蹙辭盡幾不可讀樂莫樂兮新相知悲莫悲兮生别離騷人真得此心所同然耳沿途遇便風得一字為慰慎無若區區之懶也近來弊鄉東西盜劫連夜白石談蘭雪一家遭害馬默齊輩剝床以膚可畏之甚眼中惟倪舜祥可委捕盜一事顧今無可告語者未信而言將不免于人之我疑况于欲取一善之長而遺衆疪之短主者豈䏻聽此一夫之言而遽為之豫奪哉但為鄉里憂盜之至不得已而有言耳見子長寄定山先生詩可是率爾定山豈可輒寄以詩耶後生且存取謙退此進學之地也仁夫㑹間多為申覆見示諸作實有意思更不奉字章白廷實從者又前後寄到病中志喜及寫懷諸作讀之嘆曰進修在我成我者天也兩山先生識量終非時流可比前此廷實不以出處之義告豈非惑耶今而後父子間自為知己他人莫䏻與也幸甚幸甚漳州功德碑絶不類時樣文字亦一竒也中秋食冷芉腹中作痛連日痛已當為作絶句詩寄漳州託林蒙庵刻于功德碑隂以彰太守之美可否俟報又近承寄示手稿讀之比舊稍勝莫有悟入處否秉常亦每有新得大抵辭氣終缺自然廷實乘快時有粗硬處不類此情性所發正在平日致養到醇細處則發得又别章告廷實侍者稿通五𥿄看畢煩寄秉常以代一簡又秉常近㑹否何久不聞耗也前承録示贈安指揮詩序讀之令人快意亦一時傑作也章間居和陶淵明古詩十餘篇一二篇中頗自以為近之欲録去一笑未䏻也廷實近作詩否不必作不必不作道固爾也近看祭鱷魚文作絶句云刺史文章天下無海中靈物識之乎可憐甫李生人世不及潮州老鱷魚録去一笑又袁侍御無病暴卒于龍川其跡可駭不審當道何以處之張兼素一病遂不起昨見李僉憲云此訃得之朱茂恭侍御當是的耗也天道于善人如此如國家何平生交舊凋謝殆盡聞此殆不䏻為情也哭而為之緦踰月乃已聊以申吾心而已兩山先生近眠食何似服藥見效否古今庸醫誤處方殺人如麻此不可不慎也非久遣犬子往奠德純先生不知柩行在何時便示一字近稿奉寄廷實見意承惠書已悉近况行人告急不及奉簡惟心照又右稿寄東所收閲病久轉覺淹淹無以自解倘還一字以自廣是所望也卜者多云此病至立冬節脫體立冬在今九月二十四日去此不逺今病如此恐未為的斷如何如何只得順受而已此外更無他可仰廷實將安為我謀㦲淹病之餘聊此草草又承欲學詩自古未有足于道而不足于言者也學人言語終是舊套子長病小愈曾親見之否耶子長服黃柏不死必且以黃柏為有㓛諸君為子長憂黃柏也白沙村裏老人呈縣發去渡船一夫造言百啄交扇亦有數乎㦲數旬來左手足不仁每于中夜起坐卜者謂必至大雪前後疾乃可平是亦數也寶安道白日殺人可畏北方信息近復何如民澤還增江非久龔志明亦還潮地方多虞朋友各散萬一不免避寇之行奈何病卧山樓如在井底凡有聞但頻示數字切望切望九月十三日章簡復廷實足下送丁一桂詩不可不作􅈬附來登卷石齊書又承喻出處與逃患兩事此重則彼輕足下之論偉矣但須觀今日事體所關輕重大小酌以淺深之冝隨時屈信與道消息若居東微服皆順應自然無有凝滯孔子曰知幾其神乎今以衆人有滯之心欲窺聖人至神之用恐其不似也更似他日面論以决之見示與時矩詩痛至然知其不䏻回矣惜哉先夫人挽詩不詳善行只如此亦何益于死者聊以紓足下哀思耳奉去苑筆書通六𥿄凡書視筆楮工拙固不䏻工也勿訝又廷實守道無求于人携十數口在路日飯米一斗何以給之使內不遺于親外不欺于君進退取舍概以義此古人難之非直今日也自廷實别去每念廷實至此世之論人物者觀其外而遺其內以是為非以非為是者多矣在人自審處何如古人不必盡賢于今今人不必不如古但當日勉其難勿輕自恕此則區區所望于廷實者不敢不盡也李子長在館中已半月梁貢士告行草草奉此不䏻悉不䏻悉别詩奉懷廷實世卿録與世卿𥿄此不再書又傳曰道在邇而求之逺事在易而求諸難又曰行之而不著焉習矣而不察焉終身由之而不知其道者衆矣聖賢教人多少直截分曉而人自不察索之渺茫求諸髙逺不得其門而入悲乎次韻廷實見寄二首其言因廷實而發非專為廷實也又承録寄近稿讀之作者如是豈易得然便謂之然竊恐未然不審廷實自視以為何如也言詞不能盡人詞氣足以見人有諸內形諸外識者觀之思過半矣故老朽嘗謂文字之學非也學豈在詩耶廷實資甚明敏當以古之立言者自期彼汲汲于人之贊毀無病而呻吟若是者亦何與論斯理也病中不多及白沙子卷二終
