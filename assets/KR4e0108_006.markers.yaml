  - {type: variant, offset: 19174, length: 575, content: 女戀􅏘憶年童稚髮如鴉稍稍東陵學種瓜今日肯嗟頭似雪江門三畒但萆蔴紀夢偶然嘉惠得僯封無數金錢出䄂中欲向萱闈談此夢隔簾斜月未聞鍾得世卿子長近詩賞之漠漠江天對把詩竹壇風日引杯遲翁歌此曲児當續問著别人都不知飛雲髙起大崖深兩處天敎两鳥吟莫把壠山來比並山頭鸚鵡𬒳人擒詩到堯夫不論家都随何栁傍何花無住山僧今我是夕陽庭樹不聞鴉鄒吏目書至有作兼呈呉縣尹傾蓋投緘不自䡖人間造次㡬晨星天涯放逐渾閑事消得金剛一部經落花遥對䂖城春半篋殘書一病身茶筅粟瓶供客盡不妨人笑長官貧天涯遷客病渾家開過東風㡬様花容易江山得重九問君何地落烏紗張侍御叔亨将赴亰遣人告行求贈言不已賦此以荅不爲泯泯即波波天命委之人柰何秋雁未來君好去文章覆瓿不須多梁文冠抄詩口謾吟哦手謾抄風壇踈竹晝相𫾣不知今日滄𬈑上天放何聲此處髙雪月風花信手抄皇王帝覇入推𫾣伊川擊壤三千首都共南風一項髙君到詩情每𬒳抄玉䑓秋磬借僧𫾣門前荷簣知心否雲鎻千峯月正髙屋下塵編不暇抄狂歌試把鐡橋𫾣秋風背取詩嚢去且看擎天柱杖髙夜行流槎泛泛月中眠横與波間一半天何許少年三两軰夜深鄰舫呌攤錢夢緝熈花前把酒問平湖君到閩中憶此無夢裡征㠶西下疾两人江畔笑相扶雜詠西林收雨卜鳩靈卷𬒳開窓對暁晴風日醉花花醉鳥竹門啼過两三聲宗㢘送明瓦屏風至次韻荅之小中雖異大中同明處韜光暗處通三直五横真夲子人間無路獻重瞳瓦木鋪排得此身乹坤何物到頭真道人具得屏風眼還向小齋來卜僯, WYG: 陳}
