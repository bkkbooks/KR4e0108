body:
  text: 五言律詩題新村書齋壁日色催江渡潮痕上石梯趂墟村婦出索哺襁兒啼樹接黄村塢船移白石溪落花誰省記何必武陵迷再題茅棟依嚴靜柴門斫竹通桑榆巷南北煙火埭西東一逕漁樵入孤村井臼同隣家得美酒吹笛月明中新年隂雨方連日新年損物華呼兒酌我酒騎馬到誰家黯黯寒雲密蕭蕭暮景斜人生正無賴狼藉任桃花今日勝元日江天乍放晴呼瓶汲井水煮茗待門生山鳥鳴将下桃花暗復明所嗟人易老况復嵗華更朝雨黄鸝靜春風暗蕋低極知來令節未肯踏深泥狼藉桃無語侵尋草滿蹊還聞騎馬客躑躅向沙堤止客宿為恨開年雨江村馬跡稀諸君能枉拜今夕不須歸嵗酒堪投轄人家欲掩扉仍聞僕夫語畏逐駿蹄飛暮雨客去入郭路初暝過橋客已勞僕夫亦人子馬足徇吾曹春色歸詩妙花枝愛酒豪良宵只孤負遮莫雨蕭騷送客濃緑新春酒疎紅隔水花官人坐馬醉江路遶山斜桃李成春徑牛羊散暮沙林泉無宿客興盡且還家登陶公壯哉亭新亭開石窟逺勢借崑崙天地雙眸迥滄溟一口吞公來席不暖士死廟長存憶昔干戈際南征萬馬奔是夕范生小酌日月雙輪轉乾坤一氣旋是時冬始閏細雨夜如年人語斜風外天機落葉邊憑誰給燈火更坐讀殘篇至容貫宅在昔偶相遇如今共白頭敝衣寒露肘破屋早知秋家業憑觚翰厨煙管去留老夫如辟榖與子入羅浮福童灌園綰瓶行百步池在小橋東抱甕雖無忝寒衣却未豐數畦仍待緑十趾遂流紅口腹終同及能無愧此童寄胡寧夀康齋先師之甥年華當轉鳥詩思更塗鴉父子皆吾友箕裘一舅家人猶思嶺北書不到天涯莫作妻孥計浮生日易斜石門白髪非公事扁舟進此門山雲寒不雨江路曲通村玩世吾何有長途馬不存晚來堪一醉江月照空樽悦城山作旌幢擁江絣鏡面平舟航乘曉發雲日入冬晴鼓到江心絶槎衝石角横經過悦城曲無語笑浮生嵗晚江上追次王半山韻山寒煙錯寞江曉日荒涼水際風巾動梅邊䗶屐香低頭挈小榼拍手笑輕航何但供遊走而須此日光辱和拙作見示九日醉中再次奉答激楚嗟難和霓裳更可同更䦨朱鳥下聲斷碧雲中稍歇沾花雨還吹落帽風萬松期不至半偈欲騰空九日馬黙齋送姑蘇酒至次韻奉答姑蘇一壺酒九日到山開即事焉能賦頽齡漫愛杯清風生菊徑落日滿溪臺酩酊藜床上雲來覆老萊求茘枝栽貞節堂髙榜近東溟朝光滿北楹欲便清晝睡須待緑隂横名木從誰假幽居賴母成君家多黑葉火急送雙莖華山飛翠何處青天外穹然起一丘山名疑屬我詩景盡歸樓九夏雲長潤千巖翠欲流野夫好遊走衰病只羅浮對鶴潦倒溪翁誰人疑鳥不疑閒將鶴起舞不作老無竒任病還親酒雖慵不廢詩悠然清唳外一枕到皇羲吾晚病兼貧麻衣穩稱身朝來叅兩鶴花底作三人日出東南雨鶯啼宇宙春三杯下衫袖拂拭舊龍唇題羅一峰贈馬龍道南巻花發春來少愁添老去長髙才想傾蓋昨夜語連床天下羅公佛湖西馬子香離筵一杯酒歌苦莫相忘飲陂頭入崦花叢宻遵陂石路髙柴門過午飯村老對春醪水白都如練風清不作刀自然五字句非謝亦非陶呉村弔莊節婦墓豺虎何由近風濤浩若無行人看墓榜英爽在清都江暝雲長合原寒草不枯乾坤不朽事持此報君夫此里有此墓千年亦不磨世方逐蔡琰吾甚敬曹娥淫盜死殊色良人及逝波江翻練裙帶激烈有遺歌懷古次韻王半山三徑五株栁孤村獨板門先生正髙卧衆鳥莫交喧晉宋當時改乾坤此老存手中一把菊秋色滿丘園相逢疎栁下賔主兩忘言處士乃無履江州初到門低頭入茅宇散髪對金罇長揖朱轓别狂歌向小園即事龍溪一片水何處是真源沈吟搔白首竚立向黄昏宿鳥争投樹歸牛漸滿村少年誰氏子歌吹隔江繁經故居到溪田作圃環堵樹為門老憶先廬在貧知草座温三遷時己後二紀恨空存舊事無人話斜暉滿故園容琴月生孫以詩來賀之春意復西良孫枝茁更芳自堪為喜極誰肯笑詩狂竹杖還渠撰金杯與客長簪花垂白髪疊暎緑衣香贈何廷桂罷館歸科頭行百里笠影落煙霞四十親舒巻尋常過酒家兒童非講席鉛槧此歸槎共待春芳發來看舊種花贈謝德明有事赴廣還畢嫁吾何有勞君作犬商釵裙是荆布嵗月勝資粧月動江濤白山衰木葉黄無錢入城府來往但輕艕月落五仙城天空一雁鳴離愁動江色歸䌫解鐘聲鷺應船謳起溪尋酒幔行經過不買醉貪嗅早梅馨有傳羅一峯觀化悲風何處起散作斷腸聲乘彼白雲去湖西問死生四海方懸仰一峯何可傾平生不下淚今日盡沾纓問訊南川子東莞林光也金牛有是非憂為妻子地淚濕故人衣嵗晚流言惡天涯信使稀西風吹落葉故故傍愁飛四月四月隂晴裏山花落漸稀雨聲寒月桂日色暖􅙐􅀈病起初持酒春歸尚掩扉午風吹蛺蝶低趂乳禽飛生意日無涯乾坤自不知受風荷柄曲擎雨栢枝垂静坐觀羣妙聊行􅟪小詩臨階愛新竹抽作碧參差風雨夜有數十客共飯達旦不寐老覺生涯少貧添食指繁雨中誰舉火夜半客推門室暗承塵濕階飜墜瓦喧平明不曾睡負鍤理花根聞方伯彭公上薦剡當時尊孔孟用世必詩書夫我何為者先生非過歟長歌扶晚醉短髪向秋疎坐惜籬前水垂竿試釣魚骨相合長貧巖棲累十春忽傳邦伯疏見笑北山神伎倆只餘子行藏獨老親古來稱氷鑑誰是鑑中人初秋夜四時相代謝已度一日秋風吹露下葉月照水邊樓堯舜今當御巢由竟􅆺幽山靈邀夢去昨夜又羅浮自我不出户嵗星今十週丹砂求未遂緑鬢去難留時節來將晚山河值早秋西風捲雨去星月滿池流秋夢山斗英魂在江湖秋夢深還將百年淚滴破一峯心絮酒熏天地金牛恨古今龍泉不挂墓吾欲殉吾琴南海五千里不來莊定山何由到江北此㑹非人間短短目相屬悠悠心自閒莫言但是夢好夢亦云慳夜來何所夢洗耳白龍池秋月下相照天風髙自吹永持一瓢水細嚼萬年枝山鬼向我拜先生是希夷答惠州鄭别駕惠葛布惠我一疋葛縫衣笑不奢賦詩酬别駕愛酒典隣家獨酌秋風裏浩歌山月斜醉魂不覺逺卧探惠陽花世澤世澤由來逺何年播廣東吾廬依外海分𣲖自南雄家剩為裘業山餘偃斧封千秋文物類并與刼灰空世澤由來逺時當阨難中長鬚躬隴畆赤脚話兒童骨肉危相保干戈晚益窮存亡一絲髪端為謝蒼穹世澤由來逺中更幾替隆市廛懷直道夷險信隂功地接華山隱家嚴涑水翁百年還舊物報事亦無窮世澤由來逺誰興啓迪功今無夭顔子古有聖重瞳想像千年下凄凉百感中痴兒何足了徒只愧家風江門墟十步一茅椽非村非市廛行人思店飯過鳥避墟煙日漾紅雲島魚翻黄葉川誰為問津者莫上趂墟船中秋期友賞月遣蒼頭致餽以詩迓之籠鵝并榼酒食有一金攜寂寂慙吾子依依向隔溪開筵面華月出户望青藜若負今宵醉何不西山棲即席賦夕風生㣲凉池塘散月光呼兒看酒具待客飲江鄉月對歌筵徙風拖舞袖長人生行樂耳歸棹夜相將盆池栽蓮至秋始花栽種已後時花發秋將遲雖無女伴采亦有山蜂知葉稀因地力香逺是天資安得三閭手臨軒賦楚詞秋露開炎萼非時不遣誇盆中玉井水溪上舂陵家酒醒凉風發詩成缺月斜願為若耶叟種水作生涯開花恨不早花落却生愁白露能消物紅蓮不耐秋頻來痴小女對此淚長流不識榮枯理哀樂空相仇此夕不能寐此樂殊無央下堂步明月月印花自長涓涓花間露夜滴池水香但惜花月好那知風露傷圭峯閣勝處不在逺杪秋何處尋步崖碧澗落眠石青松隂地少滄溟入山髙雁鶩沈此時閒佇望誰識倚闌心庚子元旦風日佳元日乾坤自此春蒸空雲氣濕照水栁芽新笑語聊供客杯盤少對人能寛垂老意花鳥不無神春興野晴花簇白山暖樹更青卯酒醉欲睡午風吹又醒閒拈曲江句勝讀法華經自在山牕下跏趺趣己㝠晨起羣雀曉啾啾閉門春事幽下床花到眼招手鶴朝頭永日還書巻衰年但酒甌醉來江栁下笑引子陵鈎早起推枕起新晴披衣向小明坐忘新病减夢少夙心清軋軋開隣户鼕鼕殺縣更跛奴呼具盥旋起遶花行春懷次韻陸放翁江發溶溶緑山開面面青春風何氣力吹動綵雲亭時物歸春雨交游散曉星十年江海夢誰道不曽醒清明日往孔家山墓舊隱經都㑹佳城入孔家春雲低拂馬山路曲縈蛇只隔飄香處猶疑壞圃花九原無曉夜誰管夕陽斜春興追次後山韻萬物各得性天開一嵗春風柔翻弱羽波暖躍纎鱗穉栁初成趣芳芹亦賞新川雲將岳雨何者不供人雨坐風雨坐前楹闗闗雙鳥鳴正當落花處更作送春聲大化歸無極斯人樂久生不知川上水東逝幾時停弔陳毅卿墓㣲風松下起落日照蜻蜓絮酒知吾軰春山憶毅卿由來都大夢終寄一浮萍極目蒼岑外波濤滿地生蓬萊山祭伍光墓道骨成仙蜕名山是閬丘雲中騎欵段天上叫􅚗輈人世黄梁熟吾儕白髪秋仍㽞一杯酒何處酹金牛樹穴蘭樹穴疑生理花開不記年靈根那藉土芳氣值薫天瘦比飡芝老清於辟榖仙平生誰得見雲嶠但蒼然大托千尋樹真堪托此生春風巻騷怨秋月照琴聲南極峯連起東溟水一横所棲非近地持贈若為情家兄攜秉常看山予病不能往行色千崖裏風光三月中山家愁酒少造物愛詩工好鳥簧為韻新花錦作叢吾能騎瘦馬不惜逺追從題龜山小隱賀聶清碧新居瀕海地三畆連雲厦數間龜山愛清碧清碧愛龜山笠屐誰同往江湖我自閒芙蓉小溪水曽此照衰顔山下别業豕脚有濡需乾坤胡適隨看雲因坐久抱甕得歸遲家累無多口生涯但一陂歸哉五湖樂吾未羨鴟夷弄孫畫棟三重簷曈曨曉雀穿一兒卧我膝一兒坐奴肩風日秋逾美詩書老未傳二雛當慰我心賞獨悠然戲贈都老蔡坑黄野舟獨坐小園幽被命為都老傾心向縣侯萬家春且至一紀俗全偷莫倚無言化須君九借籌韋夫人挽兩山先生配詡之母也人生如朝露死亦同蜕蟬有子能如詡夫人可以仙春臺花灼灼秋浦月娟娟喚醒何州夢歸來淚迸泉次韻何宗濓灑落儀曹句遺名得自求如何行不顧膠向漆中投無事由來得多言大抵浮結趺樗木下即此是良謀至陳冕家逺樹晴堪數孤雲暝欲遮自憐江海迹能到友生家落日明江色輕風動麥花相看吾鬢白不必問年華金洲石在江中舟楫公餘日金洲不少㽞中流幾丈石明月五湖秋目擊金山寺春來白鷺洲西風從此去幾日到羅浮弔李九淵水竹更新主風花失故權夜臺無起日春草自流年萬有終歸盡千秋不必傳倒巾此相對只有玉臺山古椰寄周京西來何處水千里不平流入海魚龍喜懷山草木愁雨邊明落日石角上孤舟寄語周京道勞生不自由德慶州舟中呈伍南山江漲麻墟雨天低德慶城正當擊楫處空有結趺情入夏尋雙井沿流到七星同行鄒道士勸我學長生德慶峽是年大水舟行不由故道客路一千里羊腸八百盤時時行樹杪往往異人間竹䌫牽江暝絺衣入峽寒倚門應盡日誰與報平安和尚石舟楫行天上斜暉巻浪花迴流忽吞吐鳴櫓極嘔啞便可通星漢還堪著釣槎雲根僧一個疑我不袈裟南歸寄鄉舊家在桃源裏龍溪是假名蕉衫溪女窄木屐市郎輕生酒鱘魚膾邊罏蜆子􅃵行窩堪處處只少邵先生居士舊茅齋蕭然倚玉臺獨尋寺裏去每到日西回魚躍水萍破風推巖户開小橋殘板在長訝有人來省事除煩惱端居養静虛栽花終恨少飲酒不㽞餘山徑兒吹笛村田婦把鋤殷勤謝閭里勝事莫相疎碧草東西埭黄鸝逺近山巖春花氣足簷日鳥聲閒文字虛堆几園林不設闗一條煙際路朝往暮來還江邊逢野叟乂手問官名立雀黄牛近銜魚白鷺腥西田餘故宅北崦多新塋駐馬斜陽外悽然感廢興山童呼犬出狂走狺諸孫乳鴨争嬉水寒牛不出村墟煙浮樹杪田水到桑根隣叟忻相遇笑談忘日曛自愛愚公谷誰過野老家時依當户竹閒數上墻花鳥立溪槎静牛争崦路斜懷中嬌小女學語解呼爺紫水團沙北黄雲古刹東樓吞滄海日幔巻玉臺風物色求鍾鼎丹砂訪葛洪芙蓉開十丈天際白龍宫出處有分付將非人所能君看飛鳥軰誰不顧髙騰放意三杯酒㽞情半夜燈韋丹非俗吏靈澈自髙僧沙渠風日美弄水愛羣兒花落鸎猶語春歸蝶未知惜芳心未巳髙咏社公祠四序毎如此獨憂無乃癡春興野鳥飛窓静春蘿補屋穿時時嚥花氣翳翳傍林園山鳥日暮至長鳴芳樹煙喚醒陶令醉驚覺華山眠社西村孤村比屋静疎竹小塘幽何處還三徑如公也一丘晚田行布狗春草散􅚗輈汲澗誰家女金櫻插滿頭結茅依里社村以社西名客至惟談稼年衰不入城隣雞上樹宿水鶴傍人鳴向晚尋牛去前岡笛又轟君家里社西我家里社東平分社公雨不隔馬牛風𤓰地妻能種衣巾俗與同雲邊采芝逕髙盡玉臺峯社主對諸阡居廬散百烟共來鄉社㑹同樂帝堯年折花潮沒屐吹笛月隨船偶尋社西去又賦社西篇社西逢酒伴埭北有花枝詎識愚公意聊同牧豎嬉圍碁松崦久度馬板橋遲袖有葳㽔草還家不告飢卜築真何意施為但自由鄉音還社阮家業且陂頭野老眠看客山童坐飲牛無生知樂否更為問骷髏寄馬黙齋山隂元有興畫舫在須登閉閣思君子開門見老僧騎驢山路隱挂席海波騰揣度安危事如公恐未能倒載輕駢駕徒行謝衆扶無錢欺老杜失策問長鬚山雨􅙐􅀈病林風枳殻疎待君君不至春盡又何如月坐林深月到遲愛月坐成癡平生不戚戚衰老尤嬉嬉曾西卑管仲孟子述宣尼何事由求軰區區欲有為懷古千里拜林宗行藏未始同諸賢皆好義夫子獨時中東漢非劉氏西山是閬風堂堂四百載載籍為誰空讀西涯李學士撰趙員外滄江别墅記江空秋月清月出秋江明水月自相得乾坤誰與争作亭趙員外屬記李先生何時理烟艇載酒下南京思親堂父子自天性誰能詠蓼莪聲容想如在風木悲奈何草露滴秋隴庭烏號夜柯思親兩眼淚萬古注江河送鄭巡檢休官還莆卑棲一枝足髙舉入雲層大鵬非斥鷃斥鷃非大鵬卑髙各有適小大不相能歸去木蘭溪溪魚美可罾懷古皇皇復皇皇開闢到陶唐遲日江山麗春風花草香閭閻盡孝弟簡册無禎祥乾坤十二㑹巳午任中央寄容一之直以傭為業何妨睡作魔吟詩終日少飲酒一生多坐久頭鳴籟行遲脚有鵝林居三十載一室小維摩萬松草屋南山愛夫子夫子愛南山孤鶴去千載萬松棲半間無愁催白髪有藥駐朱顔夜半風雷作龍來問大還畏途千百轉回首見諸山若個幽求子結茅松樹間希夷歸華頂黄綺在商顔分我青精飯從君亦不還寄太虛上人太虛石洞居孤絶少人依逺客攜琴至逢師乞食歸一莆青草上四面白雲飛盡日無言説巖花落滿衣定山聊作主石洞更無隣勸我無多事如公是一人朝聞履虎尾莫見批龍鱗莫笑楊朱小楊朱解愛身九日寄丁明府病裏登髙意村邊社樹蒼有歡開酒禁無力控詩狂老鬢花簪醜秋襟水照凉如何丁明府不肯共重陽菊節後五日丁明府彦誠攜酒來飲白沙社賦補㑹秋色上籬尖天髙霜氣嚴對花無阿堵笑我似陶潛節去杯盤在公來吏隱兼江門賦補㑹勝話無窮年此日還供酒人情蓋亦難暫隨明府醉斷送菊花殘極浦明秋日臨流弄晚竿遥憐張閫幕相憶在長安百里非無地東籬不借人因君九日愛傾此一杯春菊謝人間世官閒酒處身想無厭花意投轄暮江濵對菊種菊不盈區揮金毎顧餘古今閒計較俄頃失歡娛西廩髙堆粟東樓賸貯書路旁楊栁樹顦顇不成疎秋晚皎皎月又缺鮮鮮菊可收汀雲迷島嶼山雨落扶㽞市有屠牛杌江連邏吏舟恐無賖酒處垂白對清秋陳方伯恥庵挽詩乾坤如此老沒齒向斯文公自滄溟水人無觳觫君衣冠全素履江海挹清芬病起須持酒青山欲到墳中年倦俯仰上疏乞山林黽勉南州牧遲回北極心民䝉三日雨世病一鈎金殄瘁聲悲處龍蛇嵗值今苦熱揮汗書難繼清心雨未來手提弱絲去風撼社門開指㸃封君句摩挲土棟苔松根吾欲卧返照又相催晚凉慰我渴秋暑著人煩拄杖縁溪足看湖到栁根哦詩衰骨痛開巻病眸昏六月飛雲冷相思只斷魂晚步水國秋先至江村晚更幽泥筌收郭索山網落􅚗輈凉入社門樹隂連渡口舟獨憐經略地吾得放歌遊居常懶出户肯到社西頭海國諸峯暝乾坤六月秋㣲凉生浦樹返照下西樓今夕蒲團上前山更卧遊崔清獻公裔孫潛示遺芳巻復許示遺像予既書紀夢之作於其還也贈之詩積雨階苔上經旬斷履痕誰為門下客公是菊坡孫澤與流風逺名因避相尊丹青遺像在何日照江門太夫人晚歸攜諸孫候於貞節橋下寒花明隔塢暝色欲歸潮未愁山路黒莫放板車揺耄耋供人事兒孫候此橋殷勤望四崦風急暮雲飄延縁看落日伊軋到溪西丫路依岡轉垂蘿拂蓋低喜從中道見痴效小兒啼報賜心何極乾坤聖夀齊枕上偶成翰苑無官府蒲團了嵗年巖雲交樹白水月印沙圓懶甚陶元亮閒於魏仲先吾曹生分薄於福敢求全梅村詩次韻黎雪青梅村梅發早已過賞花期𤣥酒初無味名家豈在詩井寒人汲少川暝鳥飛卑髙枕滄溟者神仙定不疑次韻秋興感事録寄東所醉眠山影裏恨不與君同松下泉來冷雞鳴日過中就床梳白髪開户納清風起視滄溟暮孤鴻没逺空秋露落芙蓉河山日不同物情詩巻裏天道雨聲中朝出馬愁坂暮行船逆風欲投雲谷隱鞭鶴上層空崑崙一池水色與銀河同問子為誰氏從師向此中短檠非世業破笠是家風回首唐虞際浮雲㸃太空首陽非立異栁下不妨同嵗月黒甜外乾坤軟飽中腐儒甘糲食烈士死長風今古誰