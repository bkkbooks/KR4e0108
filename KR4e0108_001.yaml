front:
  text: 白沙子卷之一
  hash: sha256:9913546c0ea436329e46cfda565326a02399eda056f4a5093e25ef2b0bc9c423
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0108_SBCK_001-1a}
body:
  text: 奏疏乞終養疏臣原籍廣東廣州府新㑹縣人由本縣儒學生員應正統十二年鄉試中式正統十三年㑹試禮部中副榜告入國子監讀書景泰二年㑹試下第成化二年本監撥送吏部文選清吏司歷事成化五年復㑹試下第告回原籍纍染虛弱自汗等疾又有老母朝夕侍養不能赴部聽選成化十五年以來廣東左布政使彭韶欽差總督兩廣軍務兼理巡撫右都御史朱英前後具本薦臣堪充任使吏部移文廣東布政司等衙門趣令起程臣以舊疾未平毋年加老未䏻輒行府縣官吏承行文書日夕催逼不免強起􅈬道而沿途病發隨地問醫扶衷𥙷羸僅不大憊于成化十九年三月三十日到亰朝見赴部乃以久勞道路舊疾復作延至月餘于五月二十五日蒙吏部題奉聖㫖恁部裏還考試了量擬職事來說欽此欽遵臣時方在床褥聞命愧悚未能􅈬試郎令姪男陳景星赴通政使司告轉行本部暫令調治再歷晦朔心不自安七月十六日扶病赴部聽試而筋力杇弱立步艱難自揣虛薄未堪筆硯因續具狀再延旬日日復一日病勢轉增耳鳴痰壅面黃頭暈視昔所染無慮數倍衆目所覩不敢自誣又于八月二十二日得男陳景易書報臣母别臣以來憂念成疾寒熱迭作痰氣交攻待臣南歸以日為歲臣病中得此魂神飛喪仰思君命俯念親情展轉鬱結終夜不寐臣之愚迷實不知所以自處也臣自幼讀書雖不甚解然于君臣之義知之久矣伏惟我國家教育生成之恩陛下甄録收采不遺卑賤之德至深至厚于此而不速􅈬以圖報稱于萬一非其情有甚不得巳者孰敢騖虛名飾虛讓趑趄進却于日月之下以冒雷霆之威哉臣所以一領鄉書三試禮部承部檄而􅈬道聞君命而驚心者正以此也緣臣父陳琮年二十七而棄養臣毋二十四而寡居臣遺腹之子也方臣幼時無歲不病至于九齡以乳代哺非毋之仁臣委于溝壑久矣臣生五十六年臣毋七十有九視臣之衷如在襁褓天下毋子之愛雖一冝未有如臣毋憂臣之至念臣之深者也臣于毋恩無以為報而臣毋以守節應例為有司所白已蒙聖恩表厥宅里是臣以毋氏之故荷陛下之深恩厚德又出于尋常萬萬也顧臣毋以貧賤早寡俯仰無聊殷憂成疾老而彌劇使臣逺客異鄉臣毋之憂臣曰甚愈憂愈病愈病愈憂憂病相仍理難長久臣又以病軀憂老毋年未暮而氣則衷心有為而力不逮雖欲效分寸于旦夕豈復有所惜哉臣所以日夜憂憊欲處而未䏻者又以此也夫內無攻心之疾則外不見從事之難上有至仁之君則下必多曲成之士惟陛下以大孝化天下以至誠體萬物海宇之內無匹夫匹婦不獲其所者則臣之微亦豈敢終有所避而不自盡哉伏望聖明察臣𥘉年願仕之心憫臣久病思親不䏻自已之念乞敕吏部放臣暫歸田里日􅈬醫藥奉侍老毋以窮餘年俟毋養獲終臣病全愈仍前赴部以聽侍用則臣毋子未死之年皆陛下所賜臣感恩益深圖報益切雖死于道路無所復辭矣臣干冒天威無任皇恐戰栗之至謝恩疏臣于成化十九年八月二十八日具本陳情乞還養毋兼理舊疾九月𥘉一日欽奉聖㫖陳獻章既該巡撫等官薦他學行老成可用今懇切求回養毋吏部還查聽選監生碩告回家的例來說欽此及吏部查例覆奏于本月𥘉四日欽奉聖㫖陳獻章既係巡撫等官薦他今自陳有疾乞回終養與做翰林院檢討去親終疾愈仍來供職欽此伏念臣本菲才誤蒙薦舉又以老毋在念沉疴在躬未得以仰承試用陛下憫其愚誠不加誅責使少寬旦夕之假巳云幸矣而又慰之以溫言寵之以清秩使遂其欲去而勉其復來此誠天地之量日月之明雨露之澤出于尋常條格之外者臣雖至愚亦知􅋦負恩德圖報稱于親終疾愈之日不敢負朝廷待士之盛意不敢違臣子效用之𥘉心也但身在床褥實難動履輒欲具本稱謝以不親拜舞益不自安即令姪男陳景星具狀鴻臚寺告欲俟筋力稍紓尚當強勉赴闕庶幾少伸報謝之萬一而又為風寒所中肢節沉痛卧不䏻與臣竊復自念舊疾方殷新病復繼恐非旬月可愈不惟有稽入謝之期抑且不䏻亟副歸養之詔心未酬而罪愈甚矣臣瞻望朝廷離違在邇雖圖報有日而遲速未占俯仰愧怍無任感激戀慕之至序認真子詩集序詩之工詩之衰也言心之聲也形交乎物動乎中喜怒生焉于是乎形之聲或疾或徐或洪或微或為雲飛或為川馳聲之不一情之變也率吾情盎然出之無適不可有意乎人之贊毀則子虛長楊飾巧夸冨媚人耳目若俳優然非詩之教也甚矣詩之難言也李伯藥見王通而論詩上陳應劉下述沈謝四聲八病剛柔清濁靡不畢究而王通不答薛收曰吾嘗聞夫子之論詩矣上明三綱下逹五常于是徴存亡辨得失小人歌之以貢其俗君子賦之以見其志聖人采之以觀其變今子之言詩是夫子之所痛也南朝姑置勿論白唐以下幾千年于兹唐莫若李杜宋莫若黃陳其餘作者固多率不是過烏呼工則工矣其皆三百篇之遺意歟率吾情盎然出之不以贊毀歟發乎天和不求合于世歟明三綱逹五常徴存亡辨得失不為河汾子所痛者殆希矣故曰詩之工詩之衰夫道以天為至言詣乎天曰至言人詣乎天曰至人必有至人能立至言堯舜周孔至矣下此其顔孟大儒歟宋儒之大者曰周曰程曰張曰朱其言具存其發之而為詩亦多矣世之能詩者近則黃陳逺則李杜未聞舍彼而取此也學者非歟將其所謂大儒者工于道不工于詩歟將未至于詣乎天其言固有不至歟將其所謂聲口弗類歟言而至者固不必其類于世或者又謂詩有别材非關書也詩有别趣非關理也則古之可與言詩者果誰歟夫詩小用之則小大用之則大可以動天地可以感鬼神可以和上下可以格鳥獸四時行焉百物生焉皇王帝霸之褒貶雪月風花之品題一而已矣小技云乎哉都憲朱公以其所為詩編次成帙題曰認真子集授簡于白沙陳獻章曰為我序之公昔語我于蒼梧曰詩非吾所長公豪于辭矣而未始以為足認真子名集公意有所屬顧覽者未必知而吾以是覘公之晚節也詩雖工不足以盡詩而况于盡人乎謂吾不䏻于詩而好為大言不知言者也公名英字時傑郴陽人由進士歷官中外節用而愛人奉餞方伯張公詩序昔魏野送寇忠愍之詩云好去上天辭冨貴歸來平地作神仙當是時寇公自永興召入其志方鋭于事為野遽止之故寇公不恱後來通州始書此詩于壁間朝夕諷詠之論者以是善野之言而以寇公之始終為可議夫君子出處去􅈬之義固未可盡責之寇公輩而山人處士例以不出為髙故其所責望于人亦止以輕冨貴為第一等事則野之于寇公其相與之言如此亦冝方伯張公不以㒒愚往往欲置之門下近者疊􅑚責以贈言㒒何敢為倿誠慕古人出處之大不敢狥一已之私主一偏之見以必人之從我而忘天下故區區之辭惟以已與公進退竝言之而不敢效尤于野之必其義可否公請自擇胡文定公平生出處未嘗謀于朋友如人飲水冷暖自知惟公裁焉其辭曰去夢勞精爽投書阻歲年壯逰眇車蓋虛卧老江烟公德清南服帝心簡時賢神仙休囑付卿相待回旋東曉序成化庚寅十二月作居之有名惡乎始君子之居也興于斯息于斯目之所視心之所隨苟無所事乎畏則怠而入于忘其主于畏乎何氏子隱南海之濵更名潜榜其居曰東曉蓋亦以其識見之超卓䏻及於微逺如陽氣始舒昭晣無間故以其象諭之云耳時乎見則見矣冝潜而見過也則有畏潜惡乎畏而取于是故直以為喻已然豫謂潜之畏不終無也晹谷始旦萬物畢見而居于蔀屋之下亭午不知也忽然夜半起振衣於四千丈羅浮之岡引盻於扶木之區赤光在海底皎如晝日仰見群星不知其為夜半此無他有蔽則暗無蔽則明所處之地不同所遇隨以變况人易於蔽者乎耳之蔽聲目之蔽色蔽口鼻以臭味蔽四肢以安佚一掬之力不勝群蔽則其去禽獸不逺矣於此得不甚恐而畏乎知其蔽而去之人欲日消天理日明羅浮之于扶木也溺于蔽而不勝人欲日熾天理日晦蔀屋之於亭午也二者之機間不容髮在乎思不思畏不畏之間耳潜隱者也理亂黜陟刀鋸非所畏尚亦有畏于斯乎因其乞言序以朂之李文溪文集序成化庚寅九月作豫嘗語李德孚曰士從事于學㓛深力到華落實存乃浩然自得則不知天地之為大死生之為變而况于冨貴貧賤㓛利得喪詘信豫奪之間哉今觀其先世文溪先生遺藁𥘉涉其流渺茫汪洋若江河之奔駛而又好為生語險怪百出讀者往往驚絶至或不䏻以句以謂文溪直文耳徐考其實則見其重內輕外難進而易退蹈義如弗及畏利若懦夫卓乎有以自立不以物喜不以已悲蓋亦庶幾乎吾所謂浩然而自得者矣然後置書以嘆曰嗟乎此文溪所以為文也亟讀而亟思之執卷務盡乃至目倦神疲缺伸欲起輒回顧屑屑焉不忍舍也夫因言以求其心考跡以觀其用故人之深淺畢見愚不敢自謂有得于文溪之藴顧平昔所以告德孚者乃區區願學而未䏻忽焉親諸簡冊之中𥘉若冥㑹雖不盡解其說要其歸與此異者蓋寡矣則以之而嗟嘆慕恱尚奚疑哉傳曰生乎百世之上百世之下聞者莫不興起此之謂也德孚念先緒之落落遺稿僅存復多訛闕乃深自愳恧悉訪諸族之人得舊所刋本與所謄本參校闕其所疑刻之家孰命胤子昭董其事而俾豫為序之于乎自豫為兒時而獨恨未識其心胸氣象為何如比歲亰師獲交德孚亦嘗一閲其世譜今幸置目于先生之文而知冨貴果不足慕貧賤果不足羞㓛利得喪屈信豫奪一切果不足為纍天地之為大死生之為變自得者果不可得知而奮乎百世之上興起百世之下孟軻氏果不豫誣其所恃者蓋有在也故士必志道然後足以語此德孚好學老當益壯昭也尚亦有激於豫之斯言也乎淡齊先生挽詩序昔人求哀辭于林􅛽􅛽謝之書有曰君子無苟于人患其非情也夫感而哀之所謂情也情之發而為辭辭之所不能已者凡以哀為之也苟無其哀矣則又惡以辭為哉此之謂不苟于人也余頃居京師二年間從貴公卿遊入其室見新故卷冊滿案其端皆書謁者之辭􅈬而閲之凡以其親故求挽詩者十恆八九而莫不與也一或拒之則艴然矣懼其艴然而且為怨也而強與之豈情也哉噫習俗之移人一至于此亦可嘆也天下之僞其自兹可憂矣淡齊先生姓某氏名某秫坡黎先生門人也吾鄉稱先逹以文行教後進百餘年間黎秫坡一人而已秫坡與余連里第余之生也後不及侍其門弱冠與淡齊之子益遊始拜淡齊誨余以秫坡事縷縷此豈一日忘其師者耶當是時秫坡之門存者不少獨淡齊以其學教授于羅山之下子弟有所矜式焉夫不背其師於既死而傳其學于來世信也愛其子以及其友仁也益之子執饋于我雲也今為梁氏甥戚也藉是三者死也䏻無哀乎哀而後為之詩詩之發率情為之是亦不可苟也已不可僞也已緑圍伍氏族譜序伍氏系出汴梁先世有仕宋為嶺南第十二將卒于官遺其二子新㑹遂有緑圍之伍曰朝佐曰朝愷今為緑圍始遷之祖而氓又始遷之祖所自出所謂第十三將者是也氓以上世次莫詳今斷自可知以氓為第一世自氓而下或隱或仕垂三四百年邑之稱望族曰衣冠之美無替厥先術業之隆有光厥後者得伍氏焉吾友光宇自其先大父某始徙居外海之南山山之坡陀有石延袤丈餘下可容一榻光宇築為室石旁樹松竹往往造其間危坐收斂為持敬之學又于白沙築小室三間命曰尋樂以為問業之所至則啇論彌月而後返用心良苦時人無有䏻窺其際者惟寶安林光與余知之余交最久光才一再見退謂其弟琰曰伍光宇君子人也素有肺疾然喜聞議論之益當其呻吟疾苦之時遇有得輒若亡去辛卯首夏疾大作中益以他恙遂不可支是秋九月余往視之坐甫定便語云還我族譜序吾無憾焉耳退見其季父絢洎伯兄𥙿咸申之曰絢等殆未有請也惟先生之於雲也實望之寧獨愛一言且使聞之病亦尋起嗚呼若光宇者困而益堅老而愈壯危至而知惕樂矣而不淫可謂篤信有守者矣其于伍氏所謂無替而有光者其在斯人歟其在斯人歟夕惕齊詩集後序受朴于天弗鑿以人禀和于生弗淫以習故七情之發發而為詩雖匹夫匹婦胸中自有全經此風雅之淵源也而詩家者流矜竒眩䏻迷失本真乃至旬煆月煉以求知于世尚可謂之詩乎晉魏以降古詩變為近體作者莫盛于唐然已限其拘聲律工對偶窮年卒歲為江山草木雲煙魚鳥粉飾文貌蓋亦無𥙷于世焉若李杜者雄峙其間號稱大家然語其至則未也儒先君子類以小技目之然非詩之病也彼用之而小此用之而大存乎人天道不言四時行百物生焉往而非詩之妙用㑹而通之一真自如故䏻樞機造化開闔萬象不離乎人倫曰用而見鳶飛魚躍之機若是者可以輔相皇極可以左右六經而教無窮小技云乎哉今之名䏻詩者如吹竹彈絲𫾣金擊石調其宫啇髙者為霓裳羽衣白雪陽春稱寡和雖非韶頀之正亦足動人之聽聞是亦詩也吾敢置不足于人哉少參任君蒞吾省間過白沙携其先公詩集求一言于卷末豫故以詩道略陳之若夫先公吟詠之情具在集中覽者當自得云送張進士廷實還亰序鄉後進吾與之遊者五羊張詡廷實始舉進士觀政吏部稽勳尋以疾請歸五羊五羊大省地廷實所居戶外如市漠然莫知也自始歸至今六年間歲一至白沙吾與之語終日而忘疲城中人非造廷實家不得見廷實而疑其簡實不然也蓋廷實之學以自然為宗以忘已為大以無欲為至即心觀妙以揆聖人之用其觀于天地日月晦明山川流峙四時所以運行萬物所以化生無非在我之極而思握其樞機端其銜綏行乎日用事物之中以與之無窮然則廷實固有甚異于人也非簡于人以為異也若廷實清虛髙邁不苟同于世也又何憂其不䏻審于仕止進退語默之槩乎道也兹當聖天子登寶位之眀年思得天下之賢而用之而廷實之病適愈太守公命之仕廷實不得以未信辭于家庭于是卜日告行于白沙留二十餘日去歲之冬李世卿別豫還嘉魚贈以古詩十三首其卒章云上上崑崙峯諸山髙幾重望望滄𬈑波百川大幾何卑髙入揣料小大窮多少不如兩置之直于了處了世卿豪于文者也豫猶望其深于道以為之本廷實至亰師見世卿重為我告之廷實所以自期廷實其自信自養以逹諸用他人莫能與也送李世卿還嘉魚序弘治元年戊申夏四月湖廣嘉魚李承箕世卿自其卿褁糧南望大庾嶺沿途歌吟入南海訪豫白沙一見語合意先是五六年豫㑹都憲公之子承恩于北亰承恩世卿從弟也示豫以世卿之文出入經史跌宕縱橫筆端衮衮不竭來數千言沛然出之若不為勢利所拘者豫時未識世卿而知世卿抱負有大于人既不忘于心亦時于詩焉發之或聞論當世士有文章必問曰如李世卿否然又意世卿少年凌邁髙逺則有之優遊自足無外慕嗒乎若忘在身忘身在事忘事在家忘家在天下忘天下世卿未必䏻與我合孰知世卿有意于來耶自首夏至白沙至今凡七越月中間受長官聘修邑志于大雲山五十餘日餘皆在白沙朝夕與論名理凡天地耳目所聞見古今上下載籍所存無所不語所未語者此心通塞往來之機生生化化之妙非見聞所及將以待世卿深思而自得之非敢有愛于言也時時呼酒與世卿投壺共飲必期于醉醉則賦詩或世卿唱豫和之或豫唱而世卿和之積凡百餘篇其言皆本於性情之真非有意于世俗之贊毀至是世卿以太夫人在堂辭去欲留不可為古詩十三首別之諸友相繼有言世卿歸以所聞于豫者質諸伯氏茂卿登大崖山吟弄赤壁之風月豫所未言者世卿終當自得之世卿之或出或處顯晦用舍則繫于所遇非豫所䏻知也豫老且病行將采藥于羅浮四百三十二峯以畢吾碩世卿䏻復索我于飛雲之上否耶序以送之望雲圖詩序弘治辛亥十二月作意所嚮往處非乘雲御風身不可得而至窮之乎山川委之乎官守曠之乎歲月當食食忘當寢寢廢一有感乎外而動乎中終日視而目不瞬以言乎化外不化而內化以言乎情則哀而不傷至矣乎非子之於親則臣之於君過而不過其狄梁公歟梁公仕唐在武后朝以一身繫唐宗社之重扶陽抑隂光復唐祚事載簡冊昭若日星夫梁公可謂有大㓛于唐矣賢者識其心自望雲一念中來故曰求忠臣必于孝子之門今王公少孤事毋夫人以孝聞稱于藩臬諸公者無異辭公山西人也奉命來南海幾年念太夫人春秋髙不得左右朝夕侍以為憂與人言輒流涕鳴咽而不自勝先公之逝公方委齒已䏻慟絶復蘇蓋公之孝自天性非由勉慕乎外于是諸公命工繪望雲思親圖以表之復相與賦詩道其事于古岡病夫陳某俾序之頃者公乘廣海之舟道經新㑹吏民親公如親賢大夫忘乎公之為貴也時情俗態好倿諛而樂承奉皆是也公一濯之清風而民稱其不擾夫以今日之所聞徴諸古若梁公之事然後識其中之所存苟無是心有文章足以收譽于衆口有㓛業足以耀榮于一時有名節足以警動乎流俗皆僞而已豈䏻久而不變哉夫孝百行之源也通于神明光于四海堯舜大聖也孟子稱之曰孝弟而已矣故君子莫大乎愛親嘗取李令伯陳情表讀之有不感咽流涕廢書以嘆者乎烏呼令伯之表太行之雲也斯圖也若之何使王公見之慰其憂增其憂殆非所以處王公也雖然君與親一也在親為親在君為君世寧有篤于親而遺其君者乎圖而賦之以表公之孝以勸公之忠而又以公之能愧人之不䏻振頽風扶世教固有位者之事諸公豈無意乎覽者當自得贈李劉二生使還江右詩序匡廬白鹿之故址自宋考亭朱晦翁一嘗作新之後遂無聞焉我朝文教誕敷鄉先輩翟公守南康日始圖創復舊觀潮陽李先生繼之白鹿書院之名復聞于天下成化十七年江西按察使耻庵陳先生乃謀于提督學校憲副鍾公僉事冷庵陳公大參祁公慨然以作新斯文為已任謂余于考亭之學亦私淑諸人者冝領教事乃具書幣告于巡鎮遣二生李士逹劉希孟如白沙以請同時司藩臬諸賢咸與聞之外則東白張先生廣東大方伯彭公按察使閔公吉水袁德純各以書遺豫雲輝日映交迸衡宇二生以諸公之命命豫豫覽幣而驚置書而走走且告曰二生莫誤諸公欲興白鹿之教復考亭之舊必求䏻為考亭之學者夫然後可以稱諸公之任使乃下謀于豫是何異借聽于聾求視于盲也豫聞之君子之使人也由其誠不強其所不䏻諸公即居豫于廬山豫所䏻也居廬山以奉諸公之教非豫所䏻也二生其審諸于是邑中聞有諸侯之使自邑令佐以下至士庶耆老源源而來靡不觀感李生丰姿秀發言論是非不苟雷同劉生貌恭而言慎確有據守俱稱為東白門人也豫甚愛之留且彌月矣二生以諸公之命久不復辭去豫既返諸公幣復為詩别之所以致區區于二生而申景仰于廬山也是日憲副陶公過白沙邑長丁侯鄉諸士友各賦詩以贈帙成俾豫序之味月亭序成化丙午春正月五羊何子有載酒過白沙對月共飲延緣數夕告豫曩夢逰仙甚適扁所居第為味月亭識夢境也碩乞一言以歸豫口占一絶句云騎羊仙客去仙城風韻千年落杳冥羅浮道士來何處笑倒君家味月亭戲謂子有曰君不知羅浮道士耶嘗俯仰子之亭矣因撫掌笑前此五年豫𬒳徴過郡通名子有之廬道士即豫蓋寓意耳贈容一之歸番禺序容生卓錐無地從豫遊者十有一載未嘗對人作皺眉狀入亰師見聲利烜赫輒不樂語人曰古之仕者將以行其志耳徒食人祿而不知耻雖吾不䏻以一日居生之志可謂篤矣顧以豫之踈繆不䏻輔其為仁是生雖有美質而其學未底于成由吾之虛名誤之也雖然生之志豈易量哉聖賢之言具在方冊生取而讀之師其可者改其不可者直截勇往日進不巳古人不難到也但恐遊心太髙著蹟太竒將來成􅈬結褁處既非庸常意料所及而豫素蹇鈍胡能追攀逸駕仰視九霄之上何許茫茫生方鋭意以求自得亦將不屑􅈬豫又安知足履平地者果為何如也千里之行始乎跬步生慎由之陳先生習忘久矣生歸見毅卿其亦以是語之道學傳序成化乙巳年閠四月作自炎漢迄今文字記録著述之繁積數百千年于天下至于汗牛充棟猶未巳也許文正語人曰也須焚書一遭此暴秦之迹文正不諱言之果何謂哉廣東左方伯陳公取元所修宋史列傳中道學一編鏤板與同志者共之宋史之行于天下有全書矣公復于此留意焉噫我知之矣孔子曰十室之邑必有忠信如丘者焉不如丘之好學也後世由聖門以學者衆矣語忠信如聖人鮮能之何其與夫子之言異也夫子之學非後世人所謂學後之學者記誦而巳耳詞章而巳耳天之所以與我者固懵然莫知也夫何故載籍多而㓛不專耳目亂而知不明冝君子之憂之也是故秦火可罪也君子不諱非與秦也蓋有不得巳焉夫子沒微言絶更千五百年濂洛諸儒繼起得不傳之學于遺經更相講習而傳之載于此編者備矣雖與天壤共弊可也抑吾聞之六經夫子之書也學者徒誦其言而忘味六經一糟粕耳猶未免于玩物喪志今是編也采諸儒行事之迹與其論著之言學者苟不但求之書而求諸吾心察于動靜有無之機致養其在我者而勿以聞見亂之去耳目支離之用全虛圎不測之神一開卷盡得之矣非得之書也得自我者也蓋以我而觀書隨處得益以書博我則釋卷而茫然此野人所欲獻于公與四方同志者之芹曝也承公命為序故及之公名選字士賢浙之臨海人先公勿齊先生宰新城遺愛在民公稱其家學云雜詩序余自成化辛卯秋九月以來絶不作詩值興動輒遏之至今年夏四月余病小愈扶杖出門俯仰上下欣慨于心師友代凋知已悠邈殆亦不可為懷反乎中堂童子絃歌蹶然厥中情危境逼因緣成聲積旬所為凡得詩若于此外又有聞蛙聞杜䳌示跛奴詰李翁奴送西賔筆等通若干詩微覺曠日既反于故戒晦日取閲之皆誠意所發辭不虛假序而藏之用示兒子送李山人詩序成化辛卯春永豐人李立武挾風水之術過白沙訪豫一曰以其術相地于蓬萊館指其上土渦謂余曰仰天湖也余不䏻識其然否西北歷崑崙之麓出入十二郍環以青山蒙以白雲余于是俯仰樂甚李君既四顧無所得復嘆仰天湖之勝以為竒絶余于李君蓋各適其適也作詩以貽之送容一之如永豐詩序縣主丁侯景仰一峯羅先生于既殁乃以學生容貫充吊祭使如永豐而歸其賵于先生之子清極貫云當自永豐東走金陵謁木齊莊先生于江浦然後歸一念懷賢無間存殁可壯也歌以送之歌曰還從江北話江西謁墓人來見木齊長江亦是東湖水何處吟風弄月臺今朝何事又離群南北東西一片雲如此行藏都未定老夫扶病欲隨君東圃詩序南海范規從豫遊嘗聞規之父東圃翁朴茂于人無怨惡早歲出入江湖既倦而歸圃于西江之滸花山之隂因寄號曰東圃東圃方十畒沼其中架草屋三間傍植花卉名木𬞞果翁寄傲于兹或荷丈人蓧或抱漢隂甕興至便投竿弄水擊壤而歌四時之花丹者摧白者吐或飲露而餐英或尋芳而索笑科頭箕踞柳隂竹影之下徜徉獨酌目諸孫上樹取果實嬉戲笑語以為適醉則曲肱而卧藉之以緑草灑之以清風窹寐所為不離乎山雲水月大抵皆可樂之事也規別白沙去逰曹溪洞不相見數年矣一日復來與規語如聞陳子昻李太白賦感遇詩一喜一愕規亦竒矣哉比歸以東圃詩為請且曰無以娛親故也豫樂聞東圃翁為人而憐規之志不可違也賦排律十韻以贈之東圃名真字則未聞也詩曰一老胥江卧瀕江一圃開林春煙淡泊地暝月徘徊盡曰扄茆宇殘年寄酒杯山蹊人不到庭竹鳯飛來靜得丘園樂清無市井埃雲封朝几白風入夜絃哀細雨携鉏去輕笻看藥回江山吾晚暮梨栗爾嬰孩天上群龍逺花前獨鶴陪誰為求仲侣心蹟總悠哉記韶州風采樓記弘治丁巳冬作宋仁宗朝除四諌官其一人忠襄余公也蔡君謨詩云必有謀猷禆帝右更教風采動朝端弘治十年春韶守錢君鏞始作風采樓與張文獻風度樓相望忠襄之十八世孫英走白沙謁文以表之夫自開闢逹唐自唐逹宋至于今不知其幾千萬年吾瞻于前泰山北斗曲江公一人而已耳吾瞻于後泰山北斗公與菊坡公二人而已耳噫士生于嶺表歷兹年代之久而何其寥寥也則公之風采在人爭先睹之為快如鳯凰芝草不恆有于世也可知矣如公之才得行公之志所謂障百川而東之回狂瀾于既倒公固有之公有益于人國也大矣雖然一諌官豈䏻盡公哉顔淵問為邦孔子斟酌四代禮樂告之顔淵處士也何與斯理耶居陋巷以致其誠飲一瓢以求其志不遷不二以進于聖人用則行舍則藏夫子作春秋之㫖不明于後世矣後之求聖人者顔子其的乎時乎顯則顯矣時乎晦則晦矣語默出處惟時豈苟哉英乎勉諸毋曰忠襄可為也聖人不可為也古蒙州學記立山復州治之幾年今雲南左布政使樂安謝公綬始領右方伯之命來廣西其民舉欣欣然喜而相告曰公復來公復來廬陵彭君栗適知州事問于諸父老諸父老跽而言曰是再造我民者我何可忘吾州古蒙州也唐改立山縣國朝洪武間革為古眉巡檢司時草寇竊發民亡者過半比年以來猺獞橫據其地盜日滋而民日孤成化丙申巡撫都御史朱公英督兩廣軍征荔浦破賊賊懼招之徸老李恭著首遣其子來納欵公前以參議佐巡撫于戒議城立山立山本州治在桂林平樂之間為藩腹心今之憂無控暴之地以居民耳州復則民定尋請于上許之乃營立山是役也公與按察副使范公鏞都指揮王公輔更主相之明年丁酉州治成方進軍荔浦時桂山岩恃險後下一軍怒將盡殱之公廉其脅從者得七百餘人釋遣歸農賊以此傾信招所至猺徸視我立山咸來此公以好生一念之仁代血戰數萬之兵也今也吾民之亡者復復而為州昔之戕吾民者今革面為編氓我有農桑我有孰庠生我有養死我有藏公之再造我民也我何可忘于是彭君籍記諸父老之言將碑于學宫以傳而謀于提學時可周先生周先生三致彭君之懇于豫俾為之記嗟乎彭君誠不私于公而思惠其州之人士乎請為言之七百死命歸農何致群凶之納欵州亡州復在民何關于公之一念動于此應於彼默而觀之一生生之機運之無窮無我無人無古今塞乎天地之間夷狄禽獸草木昆蟲一體惟吾命之沛乎盛哉程子謂切脉可以體仁仁人心也充是心也足以保四海不能充之不足以保妻子可不思乎聖朝訪古設學立師以教天下師者傳此也學者學此也由斯道也希賢亦賢希聖亦聖希天亦天立吾誠以往無不可也此先王之所以為教也舍是而訓詁已焉漢以來陋也舍是而辭章已焉隋唐以來又陋也舍是而科第之文已焉唐始濫觴宋不能改而波蕩于元至今又陋之餘也夫士何學學以變化氣習求至乎聖人而後已也求至乎聖人而後已也而奚陋自待哉孟子曰人皆可以為堯舜周先生師表一方彭君為州守謁文山澤之癯非俗吏是以冒言之諸生疑焉請質于周先生其必有興起焉者甲倡焉乙和焉俯焉孜孜其傳䆮多其化䆮博其于公也有光焉則斯文也其猶庶幾泮水之頌歟于是乎書程鄉縣儒學記弘治癸丑七月作潮之程鄉縣儒學傾圯久矣今按察僉事雩都袁公慶祥處分以新之明年巡按廣東監察御史劉公纓分巡嶺東道僉事王公某往來為之勸借財用或拓地以相其成凡學宫之設有文廟有明倫堂前後位置所具皆同亦程鄉之舊也袁公因地之形勢廣狹而更張之尊左則廟次右為堂皆南面而竝峙此則學之大觀也廟主以像世相沿襲有異教之嫌而未詳其所自意者古以尸祭之遺意歟廟前樹杏為壇夾以兩廡㦸門之東祠鄉賢西祠后土泮池在櫺星門之內池之左為宰牲所堂之東西偏為兩齊為諸生號舍道義門與儒學門相望東廡之上神庫西齊之上神厨廟與堂之間㑹饌堂居之北列𪠘宇凡此皆出于袁公之規畫授圖于縣令俾成之總之為屋若干楹自辛亥迄癸丑三易寒暑而後成其形勝雖極壯麗則亦天下之通制不書可也袁公不以風教落第二義追惟古先聖王立學教人之本意而作新之袁公所以望于程鄉則不可不以告也今夫南面而堂一以奉古之人一以居今之人卑尊竝立乎其間此雖因地而寓形而教未始不存也夫子太極也而人有不具太極而生者乎語以四科稱群第子由漢以來儒者以言語稱者幾人以政事稱者幾人以文學稱者幾人其間足以方駕古人而絶塵于當世者亦鮮矣况德行乎顔子超然有見于卓爾之地所以遨逰乎聖人之方而玄同乎聖人之神者非可揣摩而得也故其言曰夫子步亦步趨亦趨夫子奔軼絶塵而回則瞪乎其后微顔子其孰䏻知之親切如此夫苟從事于斯雖未即優入顔域亦庶乎閔冉之間而由求又有不屑為者矣豫嘗聞程鄉風俗善多而惡少孟子曰雞鳴而起孳孳為善者舜之徒也雞鳴而起孳孳為利者跖之徒也夫三尺童子聞人稱其善則喜稱其惡則怒是何心哉豫老矣彼將有感吾言而興起者乎縣令辛君竟以袁公之命具其事之本末遣生貟陳珀乞記于豫故為之一言葉柏鍾譽楊偉咸以義官董兹役柏又偕珀來謁文費莫大于納粟指揮陳昻義官鍾華次之其餘助者又七十餘人名氏多不䏻具載冝列之碑隂云程鄉縣社學記弘治庚戌秋作國朝開設學校自胄監至于府州縣備矣惟鄉之社學不列于官待有司而後興吉之永豐劉侯彬由戊戌進士來令程鄉首以教化風俗為事相地邑中得東西員城得水南村北距城五里得大枯村南距城八十里各就其地之便建學宫一所為社學者四學宫之制正北為正蒙堂東西兩齊相向者無不同也其在東者堂後考亭之祠前有春浣池詠歸橋皆揭之于亭其在西者堂南考亭之祠其後退省有軒燕休有所在南北者咸無焉此小子之學也是學也貧冨貴賤才不才共之無所擇于其人學宫既成矦以諭諸父兄諸父兄咸喜退各以其子弟來受學則為延師以教之買田租米一百石以供束修之需品量所給視所領子弟多寡東西各四十石水南之受二十石大枯成于諸學之後未有受焉縣東五六里有地曰周溪山勢自北而來迤邐南下峯四繞如城逺望不知溪發處但見自出山東北隅流入溶溶洋洋橫于坡陀之麓上有曲池狀如半月矦顧而樂之又愛溪之名尋即其地搆堂于曲池之上最髙處圖太極圖于北壁前作講堂左右為樓居樓外鑿二石井泉井而洌謂之天泉井榜其門曰周溪書院周溪之門少東過雲步橋北折數百步山曰雲洞與太極堂東西相望因闢地作亭寓之雲谷之號矦政暇輒往遊焉瞻眺徘徊如有求而弗得矦安取于山水若是勤哉已上諸役及買田之費矦悉以其在官所當得者積歲成之一不以擾民教諭李君欽訓導陳君祿具圖與事遣生貟鍾宋走白沙屬豫記之古者王畿置小學于辟雍之側其在矦服邦國則列于庠序之右今之郡縣學古之大學也今之社學猶古之小學也天下風俗美惡存乎人人之賢否存乎教觀今之風俗則今之人才可知矣豫嘗終夜思之其不及古者有司非與庠序之設六經之訓固在也以小學言之朱子小學書教之之具也社學教之之地也其皆不可無也天下之事無本不立小學學之本也保自然之和禁未萌之欲日􅈬月將以馴致乎大學教之序也然則社學之興在今日正淑人心正風俗扶世教之第一義也胡可少哉胡可少哉矦之心猶未但已也曰我有司也資于何以治資于何以教山名水名我思古人世豈無庶幾者乎于是為之意以感之為之地以處之十數年間東西行過程鄉者多矣未聞有吟風弄月而來足以副矦之心者矦豈敢必哉或謂豫曰矦來程鄉居幾年寄懷山水之間不屑屑于薄書矦何心今且去程鄉矣矦其埃溘斯世將髙棲而逺遁乎以是為知矦豫蓋不知也併記于是重修梧州學記弘治戊子三月作百粵之區幾千里東望五羊西通八桂蒼梧界其間皆古之名郡也成化改元都御史韓公始于梧州開設三府病一學宫之不稱亟選地于州城之南一里許遷焉弘治丁已秋鄧公來總督兩廣軍務謂不可以軍旅之事先爼豆于是因前人之舊規而益修之凡韓公所欲為而未暇及者至是大備蓋昔之薄者厚之卑者起之表柱石以壯闕門榜化龍而儕起鳯神厨神庫交映乎前禮堂膳堂並立于後齊舍廊廡登降階級莫不奐然一新盛矣哉夫人之去聖人也逺矣其可望以至聖人者亦在乎修之而已苟能修之無逺不至修之云者治而去之之謂也去其不如聖人者求其如聖人者今日修之明日修之修之于身修之于家國修之于天下不可一日而不修焉者也明道先生言于朝曰治天下以正風俗得賢才為本彼學政之不修斯道之難立後生無所興起無以成造􅈬之功然則風俗何由而正賢才何自而得耶因時而立教即物以顯義意者督府所望于蒼梧之士寧不有在于斯乎有開厥先有成厥後喜二美之駢臻超八荒而獨立然後見夫子之門廓然洞開可望而不可即况于廣大尊嚴端凝灑落默契乎人心正大之所存與山嶽而並峙顯著乎烟霞歲月之所積與大化而同流不可動搖不可束縛也哉此則病夫所自勵以佐督府所望于蒼梧之士者也州别駕謝君湖承督府命董茲役至是訖工復以教授鍾君偕生貟陶荆民來徴記章于督府舊也督府命之義不可辭于是乎書龍岡書院記父兄不以其言為子弟師業修于身子弟習而化之其為教也不一因其世箕裘異焉耳農商技藝各有教豈直士哉昔者堯舜禹湯文武周公道大行于天下孔子不得其位澤不𬒳當世之民于是進七十子之徒于杏壇而教之擇善力行以底于成德其至也與天地立心與生民立命與往聖繼絶學與來世開太平若是者誠孔子之教也大哉教乎今父兄愛其子弟教以六經誦之也惟恐其言之不熟講之也惟恐其㫖之不明似矣不知其身之所教與七十子之進于聖人同歟否耶江西撫之樂安有龍岡書院今都御史謝公綬六世祖均福始建與其弟均夀講學其中福後以宏詞領信州夀亦舉進士守來陽歲久棟宇􅈬廢公之父某復即其地而新之既而諸子皆以文章取科第為顯官公謂其子琪曰書院無田奚以守琪買田百畝擇謹厚者掌之以供祭祀及束修之費公巡撫湖廣兩遣使走數千里至白沙謁文記之且以教其族之人豫少無師友學不得其方汩沒于聲利支離于粃糠者蓋久之年幾三十始盡棄舉子業從吳聘君遊然後益嘆迷途其未逺覺今是而昨非取向所汨沒而支離者洗之以長風蕩之以大波惴惴焉惟恐其苗之復長也坐小廬山十餘年間履跡不踰于戶閾俯焉孳孳以求少進于古人如七十子之徒于孔子蓋未始須臾忘也謝氏之先以儒起家傳數世至公父子兄弟皆能以文章取科第出為當世用肩摩踵接盛于一門其得于龍岡者不亦多乎雖然父兄之教子弟之學將不但如是而巳也今之學于龍岡者一短檠課之外未有聞也公䏻亮豫言否耶橫渠先生語學者必期至于聖人而後巳豫于謝氏豈敢謂秦無人丁知縣廟記弘治丁已春作丁侯為縣六年卒于官歷觀我邑令自洪武迄今求丁侯未有也侯仕不為已耻以俗吏自居始至著禮式一編擇立鄉老各數人使統之俗淫于侈靡冨者殫財貧者鬻産上無以為教下無以為守俗由是益壞鄉都老以禮正之每歲按民丁産輸錢謂之均乎錢上下交侵民受其害矦量入為出歲輸以還使民不知有役民甚賴之時有橫徴虐民必蹙眉曰守令之政在養民坐視其困而不救安在其養民也力請罷之雖以此得罪不恤也矦之性略于承奉而嚴于鬼神灌獻必親執事有恪春秋之祭肅如也凡祀典所載有㓛于名教者為立祭田使人守之其不應祀者毁之至于接人也亦然可者與之不可者斥之其馭吏也不察察于案牘吏不敢欺其蒞衆也民服其威斷明察奸僞鮮作夫縣令官卑刑賞不加于天下而天下治忽由之知逺之近知風之自知微之顯故豫嘗謂矦用世才其有所試矣夫豈苟哉矦以仕為學政暇必走白沙往返歲月內不知其幾顧何取于白沙耶甚矣人不可無志也正其誼不謀其利明其道不計其㓛矦亦無所不碩學而切于救民急先務也死之日耕者吊于野行者弔于途有老嫗夜哭于其廬旦往問之云嫗何哭之哀也曰開歲役且至死者不可作已故矦之為縣多可書其得民之實在節用去之十有二年邑人共立廟于白沙祀之如不得巳焉者思矦之㓛表之非以徼福于神也後來繼令者亦將有感于斯乎矦名積字彥誠成化戊戌進士寧都人肇慶府城隍廟記弘治甲寅夏作端陽城隍廟在刺史堂之西歲久􅈬弊弘治癸丑冬郡守黃矦撤而新之命生貟陳冕來徴記侯豐城人名琥豫曩從吳聘君遊往來劍水嘗一宿其家自矦來守端陽三年愈相傾慕安䏻已于言耶今天下府州縣有城郭溝池有山川社稷有神主之而皆統其祭者謂之城隍神制也不俟言矣然神之在天下其間以至顯稱者非以其權歟夫聰明正直之謂神威福豫奪之謂權人亦神也權之在人猶其在神也此二者有相消長盛衷之理焉人䏻致一郡之和下無干紀之民無所用權如水旱相仍疫癘間作民目洶洶以干鬼神之譴怒權之用始不窮矣夫天下未有不須權以治者也神有禍福人有賞罰失于此得于彼神其無以禍福代賞罰哉鬼道顯人道晦古今有識所憂也中庸曰致中和天地位焉萬物育焉說者謂吾之心正天地之心亦正吾之氣順天地之氣亦順鳥呼孰能信斯言之不誣也哉矦治端陽民畏而愛之蓋有志者也故專以其大者告之餘皆在所略恩平縣儒學記恩平古恩州之域國朝置恩平驛隸陽江縣今恩平堡是也堡立于成化之已丑先是西獠入寇景泰天順間剽掠髙凉以東亘數百里無完城民爭起從賊逺邇巢壘相望此其地也成化改元聖天子念兩廣夷賊未平命將討之而用其偏師于此既而賊勢復熾當道者以恩平地四逹難守簡卑我邑令鬱林陶矦素有威略至則急搗其巢穴亦既殺其桀黠者遂以其衆還各郡縣且數萬人而慮其向背靡常即一旦復起為患有如前日充斥其將何以待之此堡所以建也成化丙申右都御史彬陽朱公奉敕總督兩廣軍務既至環視列郡昔常為賊所破者亟謀所以善其後謂恩平故多虞且其地介數邑之間當東西行之衝送往迎來民劬于道路者無虛日不如以堡為邑便㑹我陶侯亦以邊㓛纍升按察副使奉璽書專經略是方公于是俾侯成之區晝既定悉以上聞凡割陽江新㑹新興三縣人戶三千戶糧一萬石縣仍驛名城以堡建無所改于其舊城之中為治戎之所東則縣治西則學宫既成諸士子逺近雲集學舍不䏻容誦絃之聲盈耳過者嘆曰美哉洋洋乎昔為盜賊之壘今為詩書之府誰之力歟邑令翁君以書屬豫記其事而于學宫尤惓惓焉甚矣翁君之明于保民也自有邉患以來狼吞虎噬以殘民之生人所知也湯沸火烈以賊民之性人未必知也顛沛流離死生利害怵于前而父子失其親兄弟失其愛鼓之以鬪爭之風置之于水火之地則五品之倫五常之性與生俱滅誠不可不懼也衛靈公問軍旅之事孔子辭以未學曰爼豆之事則嘗聞之矣自今觀之昔者軍旅之興雖以拯民亦以弊民弊民之政孔子所不忍言豈得巳哉今地方寧謐文教聿新爼豆之事安可一日而不講耶邑長爼豆其政而忠信發之學宫爼豆其教而忠信導之諸士子爼豆其志而忠信體之習端而俗正教立而風行民樂生而好亂者息士有耻而慕義者衆則刑罰可省禮義可興囹圄可空于戈可戢守令之責盡矣而君之志寧不亦樂于斯乎豫不文謹具其事始末與其所當先者以復君碑于學宫俾來者有考焉君名儼莆陽人新遷電白縣儒學記成化壬寅十二月作邑何遷遷避寇也先是電白在髙州府治之東按察僉事陶公提兵過之顧謂其守宰曰形勝不足以守邑冝遷遷必于神電衛焉其地廣可以容其城固可以守去危即安民之賴也舍茲弗圖志不在民也知府孔矦鏞以公之說聞于上遂遷焉時成化戊子歲也學宫在縣治東南當是時寇賊未殄草屋一間奉大成木主而已歲丙申公以秩滿遷副使奉璽書專經略是方每一過之未嘗不瞻顧徘徊以學校之興廢為巳責而嘆其力之未遑也明年寇乃克平是方之民寄命于盜賊之水火者幾二十年至是始逭公往來巡省諸郡縣俾勞來匡直咸盡其方越二載而民之病者蘇仆者起矣公顧力可及以狀請于欽差總督兩廣軍務右都御史朱公首創學宫次及諸役許之于是闢土為基度財為用而屬是役于某官某使督之以已亥三月某甲子始事越明年八月某甲子而舍菜焉宫宇峩兀門觀軒敞神像清嚴器用具足繚之以宫墻飾之以丹􅃮誠壯誠麗遂為一郡學校之冠其他若縣治若城隍社廟若藩臬行司以及郵傳邸舍橋梁道路一一區畫成之營材于山民不知勞為陶于野財不妄費而皆以一當百以百當萬故役之煩者化而為簡難者化而為易公勳庸著于武事不可勝計世稱公通變無方亦焉往而非是也哉韓君某來守是郡既至睹衆美之具成乃嘆曰博哉㓛乎歷審其為之先後又嘆曰公留意學校㓛先庶務其重如是乎乃具書幣遣其屬蔡鍾英如白沙請豫記之辭不獲推古學校之意而言曰學校一也所以有古今之異者存乎人孔子曰古之學者為已今之學者為人程子曰古之仕者為人今之仕者為已夫學以求仕之所施仕以明學之所藴如表裏形影然臯䕫稷契伊傅周召其載于典謨訓誥仕者之所施也有為已之心乎顔曽思孟周程張朱其傳于著述文字學者之所藴也有為人之心乎諸君子顯晦不同易地而處之有不相䏻者乎自古有國家者未始不以興學育才為務然自漢而下求諸學校之所得名世者幾人有不由庠序而興者乎是故學校之設其重在于得人學之道其要在于為巳古之名世者舍是無以成德甚矣斯學之不講于世也久矣公所望于學校意者其在此乎公名魯字自強廣右之鬱林人也始恩授吾邑丞公之先公成浙江按察副使死事武義云新㑹縣輔城記吾邑輔城周遭六七里髙若干尺東南際水西北鑿城下為池旁植刺竹施蒺䔧其中為營門以守嘗記往年西寇之來憑凌髙涼以東破關襲城勢如建瓴至此則截然而止如虹霓之收急雨由是而吾民之丘壠以完室家以安雞犬以寧倉箱以盈燕有歲時樂有賔客至于今各得其所者則誰之賜乎始者吾謂陶公曰孔子曰言忠信行篤敬雖蠻貊之邦行矣以此而盡吾心則庶政無不修用人無不當理財無不冨治兵無不強不知乎此而欲徒恃其末蓋後世以法劫制天下區區之為也公之㓛固大矣而聖人之道非耶公曰不然行聖人之道有二術內之曰心外之曰權無其心則權為挾私妄作矣無其權雖有其心將安施哉今夫用行伍之人取其長不責其備宥其過以圖其㓛可也或者過于求實一疵不貸而用舍乖張矣今夫理財于擾攘之秋非常賦尅取之民故椎牛灑酒豐犒厚享非以醉飽為德所以作士氣也顧小利而忘其大體者則朝夕與小吏計牙籌算贏餘矣今夫治兵于閫外號令則大將主之而吾每以偏師從事况夫深山窮谷民獠雜居善惡同狀生殺在前而節制不一沮我者惟以殺無辜為言矣此事之所以難行而心之所以不孚于人也鳥呼兵凶器也豈得已哉公從事于兹餘三十年吾民之老者以死少者以壯事㓛在邊隅日逺日忘蓋不可以無紀而垂告于將來也今西師戒嚴盜賊塞路吾欲于知力之外而綱維乎是則孰與語哉雲潭記白沙之西山則圭峯也東北連數峯最勝者為緑護屏屏之南有潭淵然曰聖池下蟠蛟龍龍噓氣成雲變化萬狀里生周鎬偕其季亰來謁豫白沙時維仲春風日晴美豫與二子携酒飲于西山之麓班荆而坐仰而四顧有雲起緑護屏炫爛如丹青郁紛若祥瑞豫顧謂二子曰是聖池之雲也偉哉觀乎二子愀然正襟侍側曰是吾先子之志也先子居龍溪垂五十年無他嗜好惟喜為雲潭之觀故先子之號曰雲潭豫曰嘻有是哉若先子我舊不幸早世不及見若兄弟長也若豈盡聞之乎居吾語汝夫潭取其潔也雲取其變也潔者其本乎變者其用乎二子齊應曰然豫曰未也野馬也塵埃也雲也是氣也而雲以蘇枯澤物為㓛易曰密雲不雨自我西郊是也水以動為體而潭以靜為用物之至者妍亦妍媸亦因物賦形潭何容心焉是之取爾二子喜相謂曰先生命我矣于是復進而告之曰天地間一氣而已詘信相感其變無窮人自少而壯自壯而老其歡悲得喪出處語默之變亦若是而巳孰䏻久而不變哉變之未形也以為不變既形也而謂之變非知變者也夫變也者日夜相代乎前雖一息變也况于冬夏乎生于一息成于冬夏者也夫氣上蒸為水下注為潭氣水之未變者也一為雲一為潭變之不一而成形也其必有將然而未形者乎默而識之可與論易矣二子于是起而再拜乞書為雲潭記潘氏祠堂記一善可書也吾書之吾畏多言也信多乎哉不多也傷俗之益偷吾無位也言不䏻化而入惡在乎多言也善者吾斯進之而己矣潘某氏者南海之著姓老而無子曰吾無繼可也兄弟之子猶子也同吾胞者幾人繼其世者若干人可以執豆籩可以守宗廟可以事繼述而傳無窮矣吾何憂吾無繼可也以其所有者歸之祠以卒噫茲可憫也已若是者其亦足與乎其無足與也堯之時比屋可封降自後世不以善而以利父子也而不用情兄弟也而䦧于墻婦姑勃豀朋友按劍者皆是也夫恆人之情莫甚于顧其私而不忘其後某也致孝乎祖禰委祝乎兄弟其生也若遺其死也若虛非求馬于唐肆者歟未可知也伯氏某成某之志以其地三畒搆祠屋三間以奉四代神主其田若干畒以供常祀詩曰兄及弟矣式相好矣其斯之謂歟某之從子上舍生漢也有一曰之雅于白沙來請記其事豫不䏻辭也于是乎書增城劉氏祠堂記弘治癸丑九月作古聖賢以民德歸厚必曰追逺又曰宗廟之禮所以序昭穆也序爵所以辨貴賤也序事所以辨賢也旅酬下為上所以建賤也燕毛所以序齒也廟始遷之祖而祭之古之制不可考巳君子隨時變易以不犯其分而得其心蓋人情出于天理之不容已者夫何嫌歟古之仕者世繼死者有廟生者有宗恩相慶而死相弔百世不相忘世降俗偷蓋有不然者矣邸第之雄田園之美肥井豔麗飽妻子祖考所棲與蟲鼠為伍殘膏賸馥何有及之其鄙陋汚穢可勝道哉中古之王天下者嘗為卿大夫作家廟以愧之卿大夫猶然况士庶乎先世之流風餘韻至此幾絶以吾之一身散而為百體拔其一毛而心為之痛是孰使之然哉且人之賦于天命者有賢不肖貧賤冨貴之差吾之所以仁愛者未能皆然貧賤不薄于骨肉冨貴不加于父兄宗族者誰乎故曰收合人心必原于廟宋之惠州守劉仲明自南雄遷增城有劉氏自仲明始也傳至今太學生瓛十有二世其先世嘗廟而祀之不遷又置田以供祀事以圖無窮頽而復起者再矣父有積薪子不析而㸑之世豈少哉瓛自言系本元城世有衣冠曰緣者瓛之父也曰漢曰孔祥者瓛之諸父行也一念追逺之同天順甲申始拓廟旁之地而新之廟成而諸父亡矣成化庚子瓛之兄瓉又卒其族兄弟而增修之前堂後院棟宇層起煥如也四垣竹樹周遭過其門者咸以是稱焉于前有光于後有繼于士大夫其無愧哉今年秋瓛因林時嘉再至白沙子示之詩云一雨變新涼炎埃洗除盡廬山昨夜燈已照劉宗信故為之記以詔其後人永慕堂記豫幼時讀孟子人少則慕父毋知好色則慕少艾有妻子則慕妻子仕則慕君不得于君則熱中大孝終身慕父母五十而慕者豫于大舜見之矣竊疑孟子之言抑揚太過愛親人子之至情也不待教而能不因物而遷人之異于聖人也豈相懸絶若是耶比弱冠求友于四方多識當世之士擇其賢者能者而師之其不可者而改諸內外輕重之間槩以孟子之論其役志于㓛名其循情于妻子其思慕其親其不以皓首而愧垂髫者希矣然後信孟子之知道不苟于言也成化甲辰江隂李君昆以侍御史𬒳命清理軍伍于兩廣始過白沙進拜老母于堂豫雅未識君之色而訝其憂之餘耳君之孝而訝其哀之餘意風木其心者恆怵惕于見人之親歟君曰然少留君坐語之以丱角所疑于孟子以壯而後信其言不豫欺因與君論交焉它日再過白沙索書永慕堂扁豫申以孟子之言曰人各有所慕仁者慕親義者慕君士慕學農慕稼穡百工慕能啇賈慕貿遷無無慕者慕之至死而勿替乃至形乎動靜接乎夢寐通乎幽明皆性之所發而為情有莫知其然而然者此之永慕是也夫孰得而奪之彼幼而慕壯而衰老而遂忘慕之不至而遷于物是之謂情其性非知內外輕重之別者也夫忠孝之推也不孝于親而忠于君古未之有也御史諌官也繩人以身者也名堂之義其以忠孝示天下乎君聞之恱命左右滌硯乞書為永慕堂記潮州三利溪記古今學者不同孔子以兩言斷之曰古之學者為巳今之學者為人古今仕者不同程子以兩言斷之曰古之仕者為人今之仕者為已古之人人也今之人人也一也判而兩之其不可同者如隂陽晝夜則有其故矣聖賢之所以示人也知微之顯知顯之微學為已也其仕也為人學為人也其仕也為已斷不疑矣今守令稱賢於一邦利澤又于民民愛而樂之問于我嶺南十郡之內吾知其人者周潮州也潮海郡也東南距大海望之渺漫接天習水者乘長風駕大舶出沒巨浪中小不支則有覆溺之患每歲漕運潮人共苦之潮州來守郡問潮父老所以便民者父老曰其惟三利溪乎潮五屬邑其三在郡治西南形若鼎立廣袤千里水曲折行其中而民共賴之者三利溪也是溪之長百一十五里東抵韓江西流入于港正統間湮于大水潮州濬而通之水由故道行東西注㑹同于海慮其冬旱而且涸也鑿郡城南溝引韓江水注于溪甃石為關時而開閉之凡役民于畚鍤卑之為溪也髙之為關也僅一月而成農夫利于田啇賈利于行漕運者不之海而之溪辭白浪于滄𬈑謝長風于大舶于是潮之士夫與其父老拜郡門謝曰利吾潮者吾父毋也吾子孫敢忘之由是觀之謂周潮州仕而為人也非歟吏于潮者多矣其有㓛而民思慕之唐莫若韓愈入國朝來莫若王源驅冥頑之鱷造廣濟之梁其事顯于為人不可誣矣今潮州以三利溪配之輝映後先稱賢于一邦也冝哉夫短于取名而惠于求志薄于徼福而厚于得民非以奉身而燕及㷀婺陋于希世而尚友千古黃涪翁之所稱者非濂溪先生歟潮州遺豫書曰我故舂陵族也潮州之舉進士有聲郎秋官有聲守郡有聲其尚不忝其世也哉吾嘗贈之詩云楚中有孤鳯髙舉凌穹蒼借問歸何時聖人在黃唐望之久不至歲宴涕淋浪九苞有遺種不覺羽翼長三年集南海使我今不忘逍遙栖桐枝長飲井露漿吾生濓溪數百年之後思濂溪而不可得見見其族之雲仍若此者殆可與言矣然則區區所愛慕于周潮州者一關三利溪而已耶潮人相與立碑頌潮州之㓛遣生貟趙日新來請文豫以其事并詩記之俾潮之人知仕而為人者有㓛不可忘而潮州之進未艾也潮州名鵬字萬里道州之永明縣人先生文既成每詢之潮人多言三利之利無實因作一詩以代跋云欲寫平生不可心孤燈挑盡幾沉吟文章信史知誰是且博人間潤筆金其意欲示後人失於審也其後王侍御哲至朝見之嘆曰君子可欺以其方噫斯言得之矣弘治甲子秋門人張詡識尋樂齊記五年伍光宇始構亭于南山之巖以坐明年復于吾居第之左結草屋三間與亭往來又明年而光宇死矣草屋之成光宇齊戒沐浴焚香更衣危坐厥明請余問曰雲不自知其力之不足妄意古聖賢人以為師今年且邁矣不得其門而入不知其所謂樂尋常間自覺為坐為樂耳每每讀書言愈多而心愈用用不如不用之為愈也蓋用則勞勞則不樂不樂則置之矣夫書者聖賢垂世立教之所寓也奚冝廢將其所以樂者非歟碩先生之教之也余復之曰大哉吾子之問也顧余何足以知之雖然有一說碩吾子之思之也周子程子大賢也其授受之㫖曰尋仲尼顔子樂處所樂何事當是時也弟子不問師亦不言其去仲尼顔子之世千幾百年今去周子程子又幾百年嗚呼果孰從而求之仲尼飲水曲肱顔子簞瓢陋巷不改其樂將求之曲肱飲水耶求之陋巷耶抑無事乎曲肱陋巷而有其樂耶吾子其亦慎求之毋惑于坐忘也聖賢垂世立教之所寓者書也用而不用者心也心不可用書亦不可廢其為之有道乎得其道則交助失其道則交病願吾子之終思之也仲尼顔子之樂此心也周子程子此心也吾子亦此心也得其心樂不逺矣願吾子之終思之也語已光宇整步而出充然若有得者歸揭其榜曰尋樂齊云風木圖記莆之李矦某由進士官戶曹員外郎出為廣東按察僉事每出行部至新㑹輒一過病夫陳某白沙坐小廬山精舍半餉始至携所得志銘文并挽詩一大帙來授而讀之三斂袵先處士默庵先生與林夫人之賢皆可考而知矣尋以風木圖請記夫孝子之事其親視于無形聽于無聲致愛則存致慤則著著存不忘乎心奚存殁間哉吾聞之曽子再仕而心再化曰吾及親仕三釡而心樂後仕三千鍾不洎吾心悲弟子問于仲尼曰若參者可謂無所縣其罪乎曰既已縣矣夫無所縣者可以有哀乎彼視三釡三千鍾如鸛雀蚊虻相過乎前也今夫祿之弗逮養曽子悲之矦亦悲之矦之心曽子之心也若曽子可謂盡思矣奚事于圖乃若孔子則以為子之養其親期于適焉耳苟至乎適雖聖人不䏻以有加也遑問其他具足于內者無所待乎外性于天者無所事乎人又非但事親一事為然也一以貫之其所稱孝非常所稱常所稱者豐其養厚其葬生之封死之贈而已耳嗟夫今之士夫異于古之士夫也其所稱孝率以是為至矣吾恐聖賢之意不明于後世也既撫圖而悲復引其意謂矦曰矦死事盡思無負于曽子矣亦知曽子所以顯其親于無窮者何如哉孝經曰立身行道揚名于後世以顯父毋孝之終也矦念之矦念之是為記處素記成化八年六月為外兄何經作一夫頎然始弱冠為生貟事進取不偶退耕于野作室三間榜兩處素字于楣曰吾不了其義當否吾以問白沙子白沙子聞之絶倒間數日抵一卷請曰為我記處素白沙子命出硯研墨汁相向詰之曰夫記紀實也為我具狀吾為女記即應曰毋苦我人呼我秀才我即不應謂我處素我即應之但子為我記足矣吾知其狀云何兩手捧硯躡席揚眉進愈恭白沙子不䏻却墨其卷歸之慈元廟記世道升降人有任其責者君臣是也豫少讀宋史惜宋之君臣當其盛時無精一學問以誠其身無先王政教以新天下化本不立時措莫知雖有程明道兄弟不見用于時迹其所為不過漢唐之間仰視三代以前師傅一尊而王業盛畎畝既出而世道亨之君臣何如也南渡之後惜其君非撥亂反正之主雖有其臣任之弗專邪議得以間之大志弱而易撓大義隱而弗彰量敵玩讐國計日非往往坐失機㑹卒不䏻成恢復之㓛至于善惡不分用捨倒置刑賞失當怨憤生禍和議成而兵益衰歲帑多而民愈困如久病之人氣息奄奄以及度宗之世則不復惜為之掩卷出涕不忍復觀之矣孔子曰人之生也直罔之生也幸而免劉文靖廣之以詩曰王綱一紊國風沉人道方乖鬼境侵生理本直冝細玩蓍龜萬古在人心噫斯言也判善惡于一言决興亡于萬代其天下國家治亂之符驗歟宋室播遷慈元殿創于邑之崖山宋亡之日陸丞相負少帝赴水死矣元師退張太傅復至崖山遇慈元后問帝所在慟哭曰吾忍死萬里間關至此正為趙氏一塊肉耳今無望矣投波而死是可哀也崖山近有大忠廟以祀文相國陸丞相張太傅弘治辛亥冬十月今戶部侍郎前廣東右布政華容劉公大夏行部至邑與豫泛舟至崖門吊慈元故址始議立祠於大忠之上邑著姓趙思仁請具土木公許之豫贊其决曰祠成當為公記之未幾公去為都御史修理黃河委其事府通判顧君叔龍甲寅冬祠成是役也一朝而集制命不由于有司所以立大間愧頽俗而輔名教人心之所不容巳也碑於祠中使來者有所觀感弘治已未夏豫病小愈尚未堪筆硯以有督府鄧先生之命念慈元落落東山作祠之意久未聞天下力疾書之愧其不能工也夢記庚寅秋月距豫自亰師歸適踰一載是夕天氣稍涼豫讀易白沙之東房既倦而卧夢與應魁殿元克恭黃門同行一童子前導不識者一人次之次克恭次余應魁途遇泥潦豫呼童子取行具童子不應余因曰越人歌之楚人聽之應魁屢嘆不置克恭顧余作愁狀其不識一人者漠然若無所聞焉既窹測其意曰越與楚風氣不同人聲隨而異必不䏻相通而相好使越人歌之楚人聽之亦猶使楚人歌之越人聽之也孰若使越人歌之越人自聽之楚人歌之楚人自聽之其音習于其耳其言感于其心奚不相說之有是故越不可為楚楚亦不可為越越與楚不相䏻非有生之𥘉習使然耳習之久殆與性成夫苟欲變之非百倍其㓛持之以久不可使化而入今若以為越者一人驟而號于楚地曰去而為楚者以從我楚得不群怒而逐之乎然則如何曰守其為越者無遽責楚以必同庶乎其免矣又三月二十七日碧玉樓午睡夢出貞節門外大水一老人抱衣浣于前歌曰法好人莫傳衣好人莫穿良久又歌曰西子蒙不潔掩鼻過者疾趨而爭先雖有惡人齊戒沐浴𬒳服明鮮以祀上帝執侍周旋與世駢肩吁是何夢耶將有應于後早為之兆耶抑夢幻虛無同異端之說從而稽之因妄求妄不可耶姑記于此以俟明者决焉論論前輩言銖視軒冕塵視金玉上道至大天地亦至大天地與道若可相侔矣然以天地而視道則道為天地之本以道視天地則天地者太倉之一粟滄海之一勺耳曾足與道侔哉天地之大不得與道侔故至大者道而已而君子得之一身之微其所得者冨貴貧賤死生禍福曽足以為君子所得乎君子之所得者有如此則天地之始吾之始也而吾之道無所增天地之終吾之終也而吾之道無所損天地之大且不我逃而我不增損則舉天地間物既歸于我而不足增損于我矣天下之物盡在我而不足以增損我故卒然遇之而不驚無故失之而不介舜禹之有天下而不與烈風雷雨而弗迷尚何銖軒冕塵金玉之足言哉然非知之真存之實者與語此反惑惑則徒為狂妄耳中天下事物雜然前陳事之非我所自出物之非我所素有卒然舉而加諸我不屑者視之𥘉若與我不相涉則厭薄之心生矣然事必有所不能已物必有所不䏻無來于吾前矣得謂與我不相涉邪夫子謂不義而冨且貴于我如浮雲謂薄不義也非薄冨貴也孟子謂舜視棄天下如敝屣亦謂重愛親也非謂輕天下也君子一心萬理完具事物雖多莫非在我此身一到精神具隨得吾得而得之耳失吾得而失之耳厭薄之心胡自而生哉巢父不能容一瓢嚴陵不䏻禮漢光此瓢此禮天下之理所不能無君子之心所不能已使二人之心果完具亦焉得而忽之也若曰物吾知其為物耳事吾知其為事耳勉焉舉吾之身以從之𥘉若與我不相涉比之醫家謂之不仁昔人之言曰銖視軒冕塵視金玉是心也君子何自得之哉然非其人與語此反惑惑則纍之矣或應曰是非所謂君子之心也君子之辨也曰然然無君子之心徒有輕重之辨非道也下或曰道可狀乎曰不可此理之妙不容言道至于可言則巳涉乎粗迹矣何以知之曰以吾知之吾或有得焉心得而存之口不可得而言之比試言之則巳非吾所存矣故凡有得而可言皆不足以得言曰道不可以言􅏸亦可以物乎曰不可物囿於形道通于物有目者不得見也何以言之曰天得之為天地得之為地人得之為人狀之以天則遺地狀之以地則遺人物不足狀也曰道終不可狀歟曰有其方則可舉一隅而括其三隅狀道之方也據一隅而反其三隅按伏之術也然狀道之方非難按狀之術實難人有不知彈告之曰彈之形如弓而以竹為弦使其知弓則可按也不知此道之大告之曰道大也天小也軒冕金玉又小則䏻按而不惑者鮮矣愚故曰道不可狀為難其人也安土敦乎仁易上繫曰安土敦乎仁豫曰寓于此樂于此身于此聚精㑹神于此而不容惑忽是謂之曰君子安土敦乎仁也比觀泰之序卦曰履而泰然后安又曰履得其所則舒泰泰則安矣是泰而后可安也夫泰通也泰然后安者通于此然后安于此也然九二曰包荒用馮河是何方泰而憂念即興也九三曰艱貞無咎則君子于是時愈益恐恐然如禍之至矣是則君子之安于其所豈直泰然而無所事哉蓋將兢兢業業惟恐一念息之或間一念之或差而不敢以自暇矣有於豫心符或曰君子不已勞乎應曰乾之象曰天行健天之循環不息者健而巳君子執虛如執盈入虛如有人未嘗少懈者剛而巳天豈勞哉君子何為不暇乎無後君子一心足以開萬世小人百惑足以喪邦家何者心存與不存也夫此心存則一一則誠不存則惑惑則僞所以開萬世喪邦家者不在多誠僞之間而足耳夫天地之大萬物之冨何以為之也一誠所為也蓋有此誠斯有此物則有此物必有此誠則誠在人何所具于一心耳心之所有者此誠而為天地者此誠也天地之大此誠且可為而君子存之則何萬世之不足開哉作俑之人既惑而喪其誠矣夫既無其誠而何以有後邪仁術天道至無心比其著于兩間者千怪萬狀不復有可及至巧矣然皆一元之所為聖道至無意比其形于㓛業者神妙莫測不復有可加亦至巧矣然皆一心之所致心乎其此一元之所舍乎昔周公扶王室者也桓文亦扶王室也然周公身致太平延𬒳後世桓文戰爭不息禍藏于身者桓文用意周公用心也是則至拙莫如意而至巧者莫踰于心矣孟氏學聖人也齊王不忍見一牛之死不有孟氏不知其巧也蓋齊王之心即聖人之心聖人知是心之不可害故設禮以預養之以為見其生而遂見其死聞其聲而遂食其肉則害是心莫甚焉故逺庖厨也夫庖厨之禮至重不可廢此心之仁至大不可戕君子因是心因制是禮則二者兩全矣巧莫過焉齊王之心一發契乎禮齊王非熟乎禮也心之巧同也聖人誅民害而迸之四裔之民奚罪焉亦曰戮之則傷仁存之遺害故聖人之仁有權焉使之逺寓魑魅則害去而惡亦不得施矣夫人情之欲在于生聖人即與之生人情之惡在于死聖人不與之死惡衆人所惡也聖人即迸除裔夷惡難施也聖人以投惡聖人一舉而迭中聖人未嘗巧也此心之仁自巧也而聖人用之故天下有意于巧者皆不得厠其間矣周公一金縢大發窹時主以後世事觀至巧矣周公豈有意耶亦任心耳白沙子卷之一終
