body:
  text: 墓誌銘表封署􅀰中事員外􅀰魯公墓誌銘公諱真字伯真別􅃅素軒右副都御史魯公父也其先寧􅀦之涇縣人洪武間大父以寜􅀦守禦民調戌南昌歸老于涇其子通寳由南昌轉戌廣之新㑹因家焉通寳生公父保輗勤儉理生實基乃家及公而新㑹之魯始大公長者􅀄􅀘隊長卒伍爭較曲直不屑爲辯而以理譬觧之恒愧服謝去扵所事尊貴人有過面折之無少囬譲貸者告窘或索劵焚之正統間民虞黄賊之患􅀅至挈所有赴城老㓜扶携塞路守關者爲不便扵民公力争止之曰城守所以扞民民有急冝早爲之所奈何拒之旣而賊奄至城下圍旬日不觧瀕海騷然官岀榜招諭民之從賊者公使人扵常所徃還之地暁以利害所在使民趨避之不疑由是得免扵兵患人至今徳之公生扵永樂癸未某月日卒扵成化甲辰某月日享年八十有二先是予歸自亰師未抵家前一夕夢見公化爲嬰孺嘗夢數人爲嬰孺者輙死未㡬公病遂不起嘻豈非數也耶公娶同邑訓科周旋之女賢克相公先公若干年卒塟歸徳里之鳯山子男六人長曰賢先卒次曰䏻即都憲公曰英曰俊曰秀曰傑英秀皆義官俊未仕傑陽朔訓導女二人適何宏葉蒼及公之存孫男十五人曽孫㡬人夀祉子孫之繁人以爲積善所致也都憲公由進士官戸部以其官封公署􅀰中事貟外􅀰贈母冝人初有司命選武衞子弟之良者入學公環眡諸子以都憲公􅂶選盖識之扵穉孺時也都憲巡橅甘肅公訃至觧官歸薨扵路諸弟奉公柩􅀅以今年丙午冬十二月十九日合塟于鳯山之原以状來請銘吾先子處士與公舊思先子而不得見見其所與猶父也不銘公墓奚以辭銘曰源之華舒舒柯之實纍纍人無固本􅀆草木弗如澤不竭􅀆公之餘我銘示後昆􅀆勿替厥􅀄朱君惟慶墓誌銘君名惟慶字汝善桂陽外沙朱氏贈資政大夫右都御史諱思諫之子故太子太保誠庵先生之弟也君生三􅀊而􅀌兄弟二人同受學扵掌敎凌先生某先􅀘太保儒學生貟次􅀅􅀘君家籍戎偏橋衞有司以君􅂶戌母夫人胡氏謀盡棄其所有以贖君君􅁬曰男子之始生也懸弧以志偏橋戌扵吾何有貨以圖之不恤家恤我遂太夫人心室如懸磬使吾兄朝夕憂衣食之不暇而暇爲筆硯憂乎於是毅然請行至則見者無貴賤遇以禮不敢以常卒伍例視之其地有横蠻黄一竒奪孀婦李氏爲妻君扵其夫爲族兄弟李氏使人告難於君㫁一指以示信蠻知禍􅀅及亟餽金以冀免君叱以狗彘即日以其状白於官捕蠻投衞獄死焉君僯盗者君知之而未䏻徙盗憂不見容以所刼帛獻君從容喻之於義火其帛盗亦感悟都指揮告某由是重君為人􅀅謀進之君一不以介意而獨以母老哀鳴一衞憐之遂得觧伍以歸間奉太夫人來廣就其兄叅議之養遇塩啇餽白金百餘不顧而去其在困也不自卑而失守其䖏亨也不藉􅀔以徼利其才如此與太保俱學其不遷業扵戎伍以需其成其亦可觀也夫君娶何氏生男子四人恒亦選節女二人長適何紹箕次適胡紹海君生扵永樂己亥十月十五日卒扵成化丁未二月二十五日夀七十及君之存孫男十人玭珸璠珂琨珦琯玠璝琚恒與諸弟卜今年十二月辛丑塟君里之栗堆節以其状走南海干銘扵予爲請者曰太保知先生者先生以太保銘不可乎乃序而銘之外沙之族何以名詩書先後著簮纓汝善可欲介以清匪我不學困于兵搜抉幽隠爲君銘有譽扵試惟我徵李子髙墓誌銘君姓李氏諱昻字子髙別􅃅鈍齋少􅀌奉母王氏孝謹䖏于兄弟之間上順下友宗黨称之景㤗庚午之秋母以兵革之患客死金陵君得報慟絶失扵顛沛之􅀄不䏻捐生以赴飲恨而卒予從何宗濂跡君甚矣君之所爲不足以盡君之心也遭時擾攘母子兄弟異處君獨以一身周旋其間恩非不足扵􅂰下而病扵仁愛非不足扵同氣而竆扵智天地􅀑神臨之親戚朋友郷黨孰不知之而終不足以釋君之心至不能􅊕目以死甚可哀也君與宗濂同邑里世居番禺之沙湾宗濂乆從予㳺實君之子壻也與君之族子􅈿撰述君之世次行實爲其子孫請銘於予君名臣之後八世祖文溪先生忠簡公諱昴英宗龍圖閣待制尚書吏部侍􅀰考諱彦章君娶同里趙氏生子男一人曰元宗早卒女一人適宗濂者是也孫男四人振綱振􅁉振安振芳君之生以永樂甲申其卒以景㤗辛未二月二十六日年四十八是年冬十二月二十八日塟里之金􅁫山趙氏祔焉状稱君長厚恬静自適喜讀書手未嘗釋卷尤樂吟詠春秋致嚴扵祀事接人無親踈一以誠宗濂當不我誣也銘曰生不足歸於天義不足何有於年烏虖子髙之心匪我銘之而誰與傳䖏士陳君墓誌銘始者郡諸生馬龍爲其友陳東淵乞銘其祖父處士忍庵之墓扵我生之言曰處士居増城之仙村無聲色嗜好以亂其耳目無形􅀔奔走以瀆其交際無是非毀譽以干其喜戚上下原隰相地之便冝冝田亦田冝圃亦圃長鑱大笠徃來扵蔗畦稻壠之間躬􅀣藝自旦至暮不少休􅀵田圃之入以􅁉乃家夫䖏士行乎無名以䏻拓土業治生爲樂事故不知老之􅀅至敢以是請惟先生念之􅀅無擇扵細大而􅂌之銘既而東淵承其父永榮君之命來謁予白沙館之小廬山精舎自冬徂春戀戀不忍別去余逰崖山東淵請執杖屨以從余既與東淵凢所紀述令一一録之東淵朝夕侍我側畧無一言及于銘余亦重之乃命取馬生之状來考其世之粗可知者始遷番禺之祖宋天聖間敎授南雄儒學因家番禺生五子曰守寜者遷增城山羙村數傳至朝奉大夫文徳有女􅃴李忠簡公文溪先生其中子曰汝霖爲縣尉縣尉以下至處士九世其遷仙村自文徳始處士諱誠字致明質木少言與物無競非横之干直受之而不報故自號曰忍庵云處士娶伍氏曰永榮者其子也一女適徐禧孫男三人東淵東沂東瀾處士卒弘治戊申四月十三日年七十三永榮以其年冬十二月某甲子塟䖏士于曾岡頭祖茔之左未銘烏虖一善可稱也亦可傳也顧處士於余􅀄無一臂之交與之銘以一馬生之言猶未也豈不曰東淵在白沙館下䏻謹子弟之職事先生于厥祖有光耶此吾所以爲處士銘也其詞曰世無我遺安以􅀮爲世不我須其􅀮亦冝不求異乎人不求合乎人委􅀊月扵農圃手足胼胝既􅁉其身又以及其後昆則以彼之危易此之安以遺之其不可也復奚疑處士李君墓誌銘㓜而䏻求父書扵死䘮顛沛散亡之餘長而䏻誦朱文公資治通鑑綱目真西山文章正宗及他書而不以媒仕進志非不立也才非不􅂶也冨貴貧賤愛惡之岀於已非與人異也父殁扵官母挈諸孤匍匐萬里扶護來歸憂極成疴是以不䏻去離左右旦夕與婦謀所以便母者母痛亦痛母飯亦飯其兄慷慨􅄝酒衆目之爲酒豪一飲或盡酒一石每岀從所親飲自旦至日晡既醉而歸率諸卑㓜迓扵途或徑至飲䖏扶前曵後徐徐而随肅肅而趨莫敢少拂其意雖以弟之貴竆公卿自視漠如足未嘗至公府若是者吾謂之賢不可乎此故䖏士嘉魚李君行實之著於州閭吾聞其子承箕之言也李氏之先世自西江武寕來居嘉魚至名逺仕元爲譯史君之四世祖也大父奐洪武間舉巡檢父善敎諭叙珙咸以弟官贈至通議大夫副都御史祖母熊氏母童氏惧贈淑人君名阜字元春伯曰陵是爲酒豪非直酒豪扵義亦豪季曰田曰郊田即所謂貴竆公卿而以其官贈三代者也兄弟四人相爲師友而庭無間言君娶鄧氏承芳承箕其二子也皆舉進士有名長女適王鉅臣次適㳺恢皆蒲圻儒家子承箕以今年首夏至白沙留數月不去因得問君家世之詳君年五十一卒塟蒲圻之某山今七年矣承箕至是属予以墓銘予少不樂多學老益􅀌世豈以文而望予何承箕所􅄝與人異謹爲序而銘諸有道扵此匪難匪易䏻者謂賢不䏻者耻母疾子侍弟扶兄醉堯舜之道孝弟而已寳安林彦愈墓誌銘君姓林氏諱彦愈字抑夫居室外種竹十數箇自􅃅曰竹齋君上世閩之莆田人有諱喬者宋紹定間爲廣州路別駕卒于官其子日新塟之寳安之茶園山因家茶園日新生慕升慕升生可乆可乆生茂賢茂賢生信本娶黄氏君之考妣也自別駕至君凢七世世爲茶園人君姓快朗贍扵才而周扵事有忤之者聲色爲突然其消也可立而待少衣食于賈賈所至勘耳目所接事好惡乆之􅀂有得者手書小􅁓帖示㣧兒􅊍曰􅀣立冝如是乃范文正畫粥長白山時事也復􅂌之全集曰是爲汝師居常扵外見一名文字時所稱者亟手録與􅊍擕錢入市買書卒惟􅊍所欲得不問值寡多􅊍爲舉子業夜分起讀輙爲戒曰兒勿苦吾聞亥子之交血行經心設令勩形神得官扵輕重計不亦左乎欲速不速不欲速速之非善爲速者也􅊍既領郷薦未即仕耒與余㳺君益爲喜􅊍誅茅㰖山爲脩業之所君笠􅄚日至視工築不少廢暇時爲􅊍録朱子語􅁼至四十三卷值板本岀乃已􅊍感而嘆曰父師覆育􅊍得一日於此如得一月一月如得一年不培不暢不晦不光君聞而頷之時論多弗合者君視之漠如也􅊍旣杜門㰖山同時士徃徃有紆青曵紫照曜閭里者親舊以其落莫告君裁君爲不省荅徐呼光謂曰汝學如是欲有立即汝䏻立吾啜菽飲水死􅉂目矣盖父子間自爲知已人莫䏻間也君䖍扵事死遇宗族内外有恩接小夫孺子常情所不屑者君惟恐小咈其意治家不遺細碎庭宇必潔畚帚必親田圃樹藝之事與僮㒒均勞逸身所服用非極弊不忍棄至承􅀕祀接賔客則儼然明盛也嘗以仲秋天日晴朗擕諸子壻暨後生可意者數軰徃逰羅浮登黄龍飛雲頂坐磐石引葫蘆酌酒徜徉信宿而後返君所好竒也㢤君娶㳺氏生二男子四女曰明者􅊍弟也孫男一人曰仲孺尚㓜君卒之前一日植菊數本石竹一夲與客行酒􅀏語竟夕凌晨􅀅起就盥倐逝去實成化己亥四月二十日也春秋六十五􅊍卜以其年十二月某日塟君于銀瓶嶺之原状來乞銘乃序而銘之先世英自莆田少服賈困魚塩僥弗長積乃宣誰其徵在㰖山處士容君墓誌銘東良䖏士旣殁之二十八年爲今之成化十一年􅀊值乙未其子珪始以其墓乞銘于白沙陳先生辭之曰銘以昭徳考行予生也晚不及見郷先進而今談者亦不聞郷先進某有某事某異也惡乎銘珪以狀進予閱状喟曰是何足以驚動世俗徼譽於郷黨閭里耶盖世所恒稱道者其事必有異乎其衆驟而語之可喜可愕故相與樂道而傳之也處士才不爲世用施扵其家者亦曰爲子不得罪扵父爲弟不得罪扵兄爲父兄不虐棄其子弟云爾處士之不見稱扵時冝也雖然常道如菽粟布帛時而措之如冬裘夏葛不離人倫日用之間故道率其常者無顯顯之形也惟夫事變生扵不測智者盡謀勇者盡力捐軀握節死生以之夫然後見其異也而豈人之所願㢤處士韜光里閭正終袵席則其見諸銘者殆亦不過是而已玆其常也䖏士姓容氏名某字某娶阮氏生四男一女䖏士之生以永樂庚寅二月十九日卒時年三十九珪率其弟珽璿璣以某年月日塟處士于三岡社馬鞍山木巳珙云銘曰伏其龍蛇逍遥雲霞綱紀孝友以􅁉乃家干我銘者其在兹耶朱夫人胡氏墓誌銘夫人姓胡氏諱盧桂陽處士胡廣之女年十九歸同邑朱氏爲誠庵先生夫人誠庵先生者故資政大夫都御史贈榮禄大夫太子太保朱公英也公㓜而􅄮嶷夫人之大父芳見而異之手捫公頂以夫人許之卒定昏焉公自㳺邑庠舉進士爲監察御史歷諸大藩政績顯著至入䑓爲股肱晝為夜思四十餘年無内顧之憂者夫人實相之夫人之事姑也以姑爲心以心爲孝和氣蒸于一家聞從公于外常擕族孫竒竒得痢病􅁾不可近夫人親與湯藥夜禱于天曰諸叔祖無一後獨此孫尚存天若弗祐願吾子代之竒疾愈平居事紡績不少替既貴猶以身率下自旦至夜分不􅄰以爲常謂食禄之家惟一侈易流爲之鐡簮布裙以防之男未冠女未笄不識繒帛珠翠之華者夫人敎之也過蘇見故􅀺􅀖伯長子凍餒無可仰給扵人爲觧衣衣之以粟周之顧謂諸子曰􅀖伯食二品禄足以佑其後人使其家不驕不侈不逞威而作􅀔以取快於目前寜有是戒之戒之夫人以勤儉成性而敎其家不能者約之其視朝領一官暮取諸民作噐皿宫室衣服以愚弄其妻子者何如也昔者吾嘗見公於蒼梧服食不踰常人語予曰吾在扵得巳雖一錢惜之而不以病民吾入其室神爽頓清便如向夜入三洲巖秉燭讀蘇子瞻題名陶長官不以家累自随公舎人自桂陽來者老蒼頭一人而巳是謂有之不居得而不爲吾以􅀚扵夫人事徃徃槩之公不約而同殆天合也夫人居家事小大處之咸冝至臨大利害决大去就矻然以身當之尤人之所難也正統已已盗起閩浙間公以名御史治盗􅇔夫人於北京時英宗北狩未返虜􅀐􅀅薄都城或謂夫人盍去諸夫人面叱之召諸子前曰虜何能爲設有不􅄑臣爲君死義也柰何去之夫人先後累受誥封至夫人揆扵徳真無愧也夫子五人守孚守頥守謙守蒙守賁守孚舉進士歴官刑部􅀰中先夫人一年卒守頥守謙未仕守蒙領郷薦守賁生貟側室徐氏出也夫人一視之二女皆適官人及夫人之存孫男十五人女六人曽孫男五人女二人夫人生永樂某年其卒以成化某年夀七十三是年十月甲子守熈等塟夫人於髙陂祔公墓也以状來請銘銘曰徳之愛孰與色之愛奈何乎配身之華孰與後之華柰何乎家配之既良家道用昌乃天錫之祥蘭桂承芳以世其光繄夫人之澤􅀆百世可忘歸骨扵髙陂􅀆永與公同蔵何廷矩母周氏墓誌銘成化八年壬辰四月日番禺何廷矩之母卒卜以其年冬十二月某甲子塟邑之永㤗郷石馬山祔其親之兆廷矩先事告伯兄廷桂以状走白沙來請銘廷矩在諸生中齒長而賢首率諸生事余余惧與廷矩比諸生咸進曰是生廷矩者也非是母不生是子徵賢母也子冝以其賢銘予乃閲状母姓周氏諱某番禺人福建都司都事君諱普敬之女澤庵何先生諱淵之妻性孝敏勤恕始辭襁褓得一果必以獻諸母事鍼縷刀尺巧不俟敎􅅸人臨事恪而有法勞不厭也愽愛而善喻人不待矯而至也年􅀂干歸何爲冢婦愛舅姑如愛父母奉賔客如奉􅀕祀雖居流離未嘗窘戚爲㓕裂平居處扵娣姒得娣姒處扵媵侍得媵侍處扵族親無貴賤内外尊卑賢否咸冝故視其疾者無不憂哭其死者無不哀也自澤庵殁專家政至是􅀂干年而終春秋七十二子皆已岀二女皆巳有歸始新喻胡公以按察僉事提調學校嶺南廷矩爲郡學生員以文行見噐重及秋􅀅試廷矩一旦謝去公弗䏻止親舊欲其仕進群來譁廷矩廷矩閉門拒之有譲其母謝曰兒削行爲君子耳吾何尤廷矩倍益厲􅀂􅀒重進進不敢爲少􅈈母之訓使然也嗚呼賢㢤銘曰昔有尹母和靖實賢今有廷矩豈無母焉卓彼两母輝光後先我銘其墓以永扵傳王徐墓誌銘君姓王氏名徐字行安別號蕖軒莆之耕垻里人也自其先大父舜臣父師至君連三世不仕而豊其家君孝友和樂與弟行陽居四十餘載囊無私蓄撫養􅀌遺以嫁以娶則視諸從昆弟所生同扵已子㐫􅀊貸貧者粟傾廪倒囷而岀粟雖多不以息歸在親舊者不責償而凢公􅀻勸借助脩壇宇津梁陂河水利君亦徃徃有焉其所濟大者數百金捐之弗計也有司以聞官給冠帶榮之君平居不尚爲山林落莫勝日置酒邀賔客飲扵䑓池社院酣歌徜徉其所與㳺者率時之貴人耳君旣卒大理評事黄君仲昭状君之事如此云君两娶李氏四子某某舉進士未第而卒五女皆適縉紳家君生永樂丁酉卒之時年七十二􅀅以某年月日塟某山某原惠州別駕林君仲璧以大理之状爲致其􅀌之懇乞銘扵予屢辭而屢復別駕卒與予書曰必得先生銘以報王君扵地下別駕則誠愛君矣寜不愛吾言乎向夕吾夢與人謳􅺾髴記之其辭曰冨而居􅅵畆體便輕暖口足甘肥左右僮㒒随意指揮􅀐欵叚坐藍輿出入閭里施施親友相過飲酒忘歸縦􅀚山雲水月魚沉鳥飛引滿髙歌吹竹彈􅁝以相諧嬉過此以徃舉無所用其心黜陟不聞理亂不知老死岩穴之間盖福人也賢扵世之患得患失者多矣吾猶爲子孫􅂅之其王君之謂乎以是銘君之墓至當尚奚言漁讀居士墓誌銘何氏世居番禺之沙湾當宣徳正統間有號漁讀居士者名貞字紹元取適扵漁常讀書遇良夜皓魄當空水天上下一色居士手持竿線呼童冠三五髙歌走舴艋遨嬉于江歸則焚香佔畢坐牅下吟哦過夜分不􅄰以爲常尤喜飲酒子弟取杜詩之可歌者爲越聲歌以侑觴居士頺然真率從之飮者孔伯平胡孟時呉侃王子倫皆鄊之名士非四人之儔者弗與飲焉㬌㤗己已之秋盗起南海東西亘數百里没于賊居士見㡬而作不俟终日王師至討叛玉石俱焚始爲請于官持檄至鍾村鎮招之全活甚衆沙湾人至今徳之居士行必顧義言必顧道􅀅属纊猶顧諸子申以平日之誨言曰吾世䆠之後族大以蕃勿倨以髙寜儉而卑忠信基之禮義行之親賢取善倿者逺之培之埴之勿替書詩先其義後其利薄已而厚彼廣積而約費惟家廟之奉墳域之治賔師之養窶弱之施則致􅂭而不可復惜俾子孫承守世世而勿以􅁋侈壊之則何氏之福與家法並傳無涯矣語已而卒居士生洪武戊寅卒之時天順己卯六月十六日也六世祖諱起龍仕宋官至太常大卿考諱志明妣趙氏􅀄娶三山崔氏清獻公七世孫也生子男六人浩瀚淳淑瀞沂女二人繼室簡氏楊氏無子崔氏先居士二十年卒塟里之羅山六子奉居士柩以卒之年十二月十二日合塟其地儷两􅁇室焉成化􅀊丙申瀞始至白沙從予㳺又七年壬寅夏五月乃以其状來乞銘銘曰世之昧昧奔名與利有卓其英以不混世或貴而賤或賤而貴揮觴以爲適投竿以爲戯故不知老之􅀅至馬甘泉墓銘宋有名馬其名甚大衞公得之空羣莫駕九世曰􅍬育徳于野一本於身祖徳勿舎今其歸矣附于馬洒我則銘之後有興者陳冕墓銘伯道有子劉蕡登科責報扵天所得㡬何邁邁子文蹈此髙墳我銘爲子顕于千春志孫杌壙成化丙午之􅀊秋九月七日景易之婦苑氏生次孫以周易筮之得渙之比占曰渙奔其杌悔亡因以杌名之明年春夏之間疫作里中之兒十五亡于疹杌朝病夕愈面光射人見者咸驚其異未㡬婦擕杌如外氏得疾􅀅歸俄而風􅀨􅁀至連數日不止比歸療弗及張目視左右泪􅏰然下如不忍捨其母然少頃遂􅅸七月十六日也杌生質異常兒清揚婉􅀆太夫人撫之喜曰似其祖又熟察其􅃦興啼􅀏蚤夜之有常曰無不似天􅂌我杌􅀅恤我後我固無以活之痛㦲是月己丑塟白沙蓢園岡􅃁婦梁氏墓左志其壙以畢予哀云生之異保之未至愧極生哀哀極生媿何以冩之爲壙記封燕山左衞經歴張公墓表公諱子真字伯大姓張氏家南海之西滘村自西滘鼓柁竝南下得風水之便其至白沙一日耳余嘗聞公於番禺李禎徳孚曰有恒人少力田給數口無贏衣食不爲耻晚􅀊既家􅁉又以其子官徵仕郎贈燕山左衞經歴公不色喜自奉飬儉約如歷田時對郷人輙自稱姓名以語篋命服不以新易故葛巾布裘曰吾素性乃爾即不爾吾敢忘吾􅀄故公之度大一鄊一郷人咸嗟以爲有徳余聞士不耻賤貧雖貴冨而弗驕則不失義不離道入於患得患失碌碌爲鄙夫以是考公之迹而揆其所用心謂其無以異扵今之人則吾不信也公積扵家者厚矣余特表其大節以爲世勸公以農業起家故自􅃅曰稼軒示有􅀄也塟西林郷之某原望之木已拱髙其封若馬鬛題曰燕山左衞經歷者公之墓也考諱可達背公扵娠鞠公于外氏以成者公之妣梁也生于洪武己酉卒天順辛巳壽九十三妻何氏子男五長者某徵仕郎也次某某孫男八属扵余以表公之墓者徴仕郎所岀丙戌羅倫榜進士㤗也近以宰沙陽政㝡被徵時徵者􅁼有御史之拜云􅀕文禱雨􅀕五方􅁟神文代丁知縣作六月不雨田苗􅀅稿愆伏爲災孰非天造探殃所由誰實召諸惟令不令斯民何辜神不宥過某敢辭死􅂅沛甘澤以緩赤子禱雨告各神文代丁知縣作邦有常祀祀爲􅀖主食民知報罔間今古神冝惠民民實頼之彌月不雨苗則稿而某忝爲令我民是軫敬祈神休蘇我民窘謝雨文代丁知縣作今令所急者簿書期㑹而巳政敎不修何以爲邑徒食七品之禄以在民上安能使隂陽和風雨時乎故若某者履任以來未及一載惟不䏻修厥軄而亢旱是憂幸頼天地神靈閔民之竆降兹甘澤誠忺誠荷謹具牲醴用荅神賜惟神尚終惠之使永有年􅀕大忠祠文代丁知縣作儼其堂堂沛其洋洋是謂正氣至大至剛上有青天下有黄壤不亡者存薰蒿悽愴維兹仲春謹以牲帛醴齊粢盛庶品式陳明薦尚享􅀕菊坡像文先生宋代之名臣吾郷之前哲卷舒太空之雲表裏秋潭之月淮蜀委之而有餘疑丞尊之而不屑故能効力扵當年而全身扵晩節猗欤先生挺生南越廣厚深沉清通朗徹藐予區區心馳夢謁稽首丹青􅀧兹頑鐡庶㡬百年不逺途轍秋菊之芳寒泉之洌奚而薦之用表真潔􅀕先妣林夫人文維弘治十年􅀊次丁巳冬十月已巳朔越廿又一日己丑孝子陳某敢昭于先妣林氏夫人友人刑部主事蘭谿姜麟肅具香一束帛一端俾告夫人之墓焚之以表哀慕之誠謹以茶酒時撰用申虔告􅀕先師康齋墓文維成化十八年􅀊次壬寅十一月日門人新會陳某被徴赴闕道岀劍江謹具牲醴告于先師聘君康齋先生之墓曰於乎元氣之在天地猶其在人之身盛則耳目聦明四體常春其在天地則庶物咸亨太和絪緼先生之生孕三光之精鍾河嶽之英其當皇明一代元氣之淳乎始焉知聖人之可學而至也則因純公之言而發軔既而信師道之必尊而立也則守伊川之法以迪人此先生所以􅁬起之勇擔當之力而自况扵豪傑之倫也先生之敎不躐等由􅆂飬以及致知先據徳而後依仁下學上逹日新又新啓勿助勿忘之訓則有見扵鳶魚之飛躍悟無聲無臭之妙則自得乎太極之渾淪弟子在門墻者㡬人尚未足以窺其閾域彼丹青人物者或未暇深考其故而徒摘其一二近似之跡描􅀞之又焉足以盡先生之神某也生長東南摳趨日少三十而後立志五十而未聞道今也欲就而正諸而悲不及先生之存先生有知尚鑑斯文尚享􅀕太子少保朱公誠庵先生文代陶㢘憲作烏虖公不爲矯矯亢亢以要譽扵衆口而其端方儉約以事乎其上者足以爲忠不爲烈烈轟轟以震耀扵當世而其清靜簡易以臨乎其下者足以爲㓛昔者两廣盗賊􅂶斥自西而東韓公率師擣穴攘􅇯兵由義勝民以盗竆公來繼之以守易攻隂􅃤陽舒相爲始終甚矣公之厚扵民而薄扵躬也一食之費必計曰民其不􅂓生一後之興必計曰民其不堪故人之遂其生養者若赤子之慕慈母人之免扵塗炭者􅀂枯稿之遇春風某奉韓律未弛我弓公曰撫之敢爲異同知我任我寔惟两公天子以公乆勞扵外還公扵朝齒雖落而志則雄食雖少而神則充扵是乎竭股肱之力而効臣鄰之軄旁引善􅁼以扶天地之元氣大明公道以夀􅀦家之命脉士以此望扵公公亦以此自期胡天之不慗遺俾公之㓛著於四方者雖成乎昭昭之羙而公之忠􅁬于廟堂者未底乎赫赫之􅂭烏虖哀㢤尚饗􅀕誠庵先生文維成化二十二年歳次丙午冬十二月壬申朔越􅀄八日己卯門人翰林院檢討古岡陳獻章謹具牲醴粢盛庶品遣子陳景雲致􅀕于誠庵老先生太子少保朱公之靈曰於乎昔我抱病造公戎府公曰時㢤母戀衡宇賢才用世小大有􅀘長笻下山可以撑拄群龍在朝可以參伍皇皇仲尼與世爲矩獵較不行然後去魯好髙欲速爲戒自古再拜謝公不我色許短䟽叩天歸寜老母公曰嘻㢤不忘陟岵甲辰之春公委齋斧帝命還䑓以親四輔炳如日星衆目所覩我貢尺書傾竭心腑公在廟堂當爲砥柱公去廟堂當爲鴻羽公攬䑓綱閱两寒暑或弛或張或黙或語迹公所爲誰奪誰予萬石之鍾千鈞之弩我欲言之猶懼莾鹵胡天弗弔禍來二竪於乎公乎是謂卷婁豈惟門生匹夫匹婦遼㢤郴陽欺我疾苦犬子執巵徃澆墓􅁟索􅁓題情涕下如雨於戯哀㢤尚享􅀕􅀽侍御文思昔南亰傾盖而語垂二十年君岀我處君由進士宰邑太平再蒞冝興廉惠有聲遂簡霜䑓來廵弊省未至而孚姦吏縮頸頃以公務過扵白沙夜䦨秉燭相對咨嗟君病未衰我衰而病進退存亡必得其正與君論易託詩以宣君口不言豈不謂然除虐救民􅀒荷以徃止于龍川其勞可想或云非也無疾而萎道路流言􅀅信􅀅疑惟君英明夫誰敢犯茍得其正死亦無憾君司風紀寔茂才猷天佑下民而不少留吁嗟君􅀆民之司命君子之竆小人之􅄑兼素之訃􅁇此亦聞海内知已存者㡬人烏虖哀㢤尙享􅀕陶方伯文􅀣立大者不覊小節其行翩翩其光烈烈公攘㓂患于嶺西東百里大藩勞貫始終四十年來枕戈捲甲力能誅夷威足鎮壓公在嶺表長城是依公今逝矣人胡不悲某也於公雅匪朝夕東望仙城有泪霑臆昔者枉棹扶病過予笑語竟日放歩徐徐􅀅謂百年精力猶在別㡬何時忽此顛沛乖厓􅀅去逸人復來一訣萬古豈偶然㢤世烈光前錦衣􅁉後俾公子孫世享其有死生一致公何憾焉有未厭者六十五年惟天命之竆逹壽夭惟心安之㤗山毫杪老病日益跬歩莫支敬陳薄奠以冩我􅀻尙享􅀕顧勉庵別駕於乎昔倅我􅀖公才獨優徃貳端陽實惠一州通逹萬變可期一面止于郡僚督府之薦公車翩翩愈勵愈鶱一病不起孰云非天少有抱􅀒受知當路衆論同異孰識其故晩節不􅃜浩然賦歸進退可觀吾寜不悲一息不至今其巳矣神乎洋洋歆此誠意􅀕丁知縣彦誠嗚呼登賢名扵甲榜與多士而並馳試牛刀扵小邑稱庶物以平施耻溷溷以希合寜戚戚而謀私嘗錚錚以䧟獄亦蹇蹇而忘危故法不貸扵豪右而惠可及乎㷀􅄔汛掃􅁋祠綱維化典載􅂆載懲條章顯顯雖小人之難化亦向風而革面两考于玆夙夜有常殷憂成疾二堅爲殃方其在病斯民皇皇今其既徃行路涕滂此見好惡之公出扵人心之天不容巳君雖死而有􅊍念昔從㳺禮崇信篤旅魂何之遺孩在目扶護者誰我力不足生死交情盡付一哭想英爽之未亡故莙蒿之可掬烏乎哀㢤尙享􅀕黄君朴文於乎逍遥乎半月之舟留連乎澤垓之酒面圭峯以放懐唱竹枝而拍手春月秋花卷爲巳有何百年之未半與衆木而同朽大塊無心孰夭孰夀消息自然匪物有咎委變化於浮雲逹榮枯扵踈栁有肉在爼有羮在豆公死如生薦滿一斗􅀕李磐石公郷之父兄行也子弟軰事公于兹有年矣公坦直而不華約而有恒其中舒舒其扵事得䘮無大欣戚又不作冨家翁様巾屨雖極粗垢不耻也凢公之事如此人之詭譎侈靡者孰不笑之公以此賢於郷人逺矣烏乎哀㢤尙享爲㬌易撰􅀕劉氏外母文烏乎外舅之生二十八年奄棄之􅀌孰維其顛恭惟外姑守一秉貞勤儉始終家用不傾男女五人以母爲命爰有室家内外各正古之賢母比得則同母扵苑氏可謂有㓛自昔于歸迄乎就木徳亦可師㓛亦可録於乎哀㢤尙享􅀕伍光宇文烏乎光宇麗麗而強其執則固其謀則方惟其篤扵善也不忘乎一飯之頃故其向扵道也䆮近乎數仭之墻予􅀚之子乆矣子􅀄爲人烈烈亢亢其味桂薑人不敢嘗世之病子者謂子好伐乖扵和而軒扵直予獨畏子感激而慷慨其才如此故變而至善也去故習如脱屣而人之望之也若斷鴻天路之翶翔茍不纒扵宿疾限扵短命而肆其力扵學也又焉可量㢤使其辭煙霞而依日月展股肱而佐廟廊砥定海岳爕調隂陽下撫􅀺庶上佐元良吾不知子之究於用何如也至若犯顔敢諌正論堂堂可以引􅅂批逆鱗之怒可以折檻干刀鋸之芒直而不囬死而愈􅊍􅀂是者非子之望而誰望􅁘古之榮扵進者􅃪其言若可信也觀其色若可壮也至扵臨死生利害之變鮮不囬顧而彷徨顧士之可貴者不于其身之彰于其志之􅆇不􅆇而彰匪事之常􅆇而弗彰庸或何傷古之豊于才而嗇于命者多矣奚獨子㢤惟其不待生而存􅀆故不待死而亡夫既信其如此􅀆又焉論其行藏嗚呼光宇其何可忘􅀕容彦禮文維弘治三年嵗次庚戌冬十有一月己卯朔白沙先生門人容彦禮之柩以明日庚辰發引􅀅就􅉎于大田先生許爲之墓銘而未具乃命其子陳景雲持庶羞粢盛酒果致奠扵彦禮柩前而告之烏虖士而好竒揆道則離士而無竒罔聞于時彦禮之生五十五年于兹矣彦禮之䖏乎宗族行乎閭里同不同者爲誰彦禮之希慕乎古而取法扵今而誰與歸􅀚其所與而人之賢否可知彦禮之墓吾􅀅徵扵彼以銘之嗚呼哀㢤奠丘閣老文於乎先生之志見于行事先生之言存扵著述旣大顯扵當年必有聞扵異代某一病多年老扵林下足不至先生之門目不睹先生之書比􅀊得所遺瓊䑓吟稿􅅻一編而已而何足以知先生之大全㢤於乎有言依乎敎有行槩乎道行由敎宣言以道傳沒而有知尚鑑斯言奠何敎授文於乎生之謂來死之謂徃徃來之間奚得奚䘮河嶽星辰䑕肝䖝臂小大則殊由其所遇載鳴敎鐸載典文衡引年而休於乎先生奠舉人譚士直文於乎士直遽至此耶天不與之年與之才􅀅誰咎耶彼碌碌者老無聞扵世又何貴扵年耶哀㢤尙享奠汪海北文烏虖天馬行空歩驟不凡自然世外衆莫䏻叅氣雄萬夫徳罔二三予何人㢤爲公指南脩古日新懐沙匪堪譬彼世味甘其所甘江門秋月廬阜晴嵐海北二年朝諷夕談如飲醇酒無日不酣從事數至命我則慙我賦白洋句不待探可以立懦可以激貪雖有百鈞何足以擔擴而充之奚適不堪烏虖千古在前萬古在後上下四方誰無宇宙􅀒大翼者其風必厚惡木道旁徃來莫覯昔人之交傾盖如舊盖不待傾金石亦透天俾爾才不俾爾壽厥􅀄受之今也奚咎尚嚮奠梁貞文於乎惟正思慕古之人師之非不足扵才也􅀊月永謝於呻吟囬翔今之世行之非無其志也科第未殫其胸􅁭昔之來也碧玉樓中指蒲􅇛而語靜今之去矣白雲何䖏想鶴駕以傷心果司命之在天不可以人力勝耶抑所養之未至不可委之命耶今館中之士求如惟正者守一而殁盖亦希矣薄俗移人始終殊歸不自知其非也於乎哀㢤尚享奠表兄何䖏素文維弘治八年嵗次乙卯四月甲寅朔越二十一日甲戌􅀌哀子陳某謹以牲特柔毛粢盛酒果遣子景雲等奠于表兄䖏素何君之靈曰當披髪􅃝跣之􅀄聞兄之訃兄不􅄑属纊與先妣同日某摧裂肝肺之餘無由徃哭烏虖哀㢤烏虖痛㢤兄年七十不爲不夀兄有二子不爲無後死生晝夜萬物芻狗復何言㦲尙享奠謝伯欽文烏虖伯欽知吾言否六十年中通家之舊親我事我栖栖自㓜情􅀂兄弟爲足爲手吾行東西不離左右矢心靡它乃君之厚庭有佳植雪霜爲㓂如何弗顧身木巳􅈬遺憂孔深奚測奚究積善餘慶反躬可乆茍無令人天損必受誰其憂之不􅀒良友於乎哀㢤尙享告羅一峯墓文維成化十八年􅀊次壬寅十月某甲子白沙陳某應徵起赴京行過永豊謹具酒果庶羞告于亡友一峯羅先生之墓曰嗚呼先生今曷爲而徃始曷爲而來處則􅅵畝之逸民出則文章之鉅魁其洞徹不欺之心炳中天之杲日而轟動岀群之氣殷百蟄之春雷知先生者儗先生於北海不知先生者謂松柟弗􅁼反見目於榆槐先生見賢必親聞善必録遇惡必摧存而知亡過而能裁随時變化有闔有開而平生念慮所存其大者正君正朝廷正三綱正萬民正四方皇皇之憂耿耿之忠則致死而勿頽貧賤而不爲戚患難而不以囬成化己丑之夏予遇先生扵南畿盍簮之讙忘形爾汝旣三宿而後別去屢反顧而徘􅆦先生贈予南歸之文予處先生草亭之什既而各申其戒曰我不枉已君無鑿坏孰謂先生去官而死曹溪之約不遂麗澤之資何有而今而後復仰望扵何誰於戯惜㦲宿草之墓朋友弗哭禮之常也非予與先生之冝也先生有知歆此絮醅尙享奠容彦昭文白沙先生聞生容彦昭􅀅歸窀穸遣子景雲持炙鷄之奠告于彦昭之靈曰烏虖彦昭顔子之壽過于彭祖王公之樂不如匹夫彦昭居吾門不可謂不乆矣四十一而亡不可謂夭矣已矣乎吾􅀅以悼彦昭者自悼而又以悼衆人乎烏虖哀㢤尙享奠容彦潜文白沙先生聞生容彦潜之卒遣其子陳景易具􅃗鷄酒果致奠扵容生柩前而告之曰俯江流而鳴咽望雲而山徘􅆦歎一生而已矣悵獨立以興哀㳺好㡬時音容永謝致奠一觴有淚如㵼尙享奠伍光宇文壬辰􅀊首月之二日某甲子白沙陳某過亡友伍光宇㝷樂齋撫物興懷􅏰然㵼涕遂命子景雲持炙鷄絮酒奠于南山之廬而哭焉烏虖光宇遽至此耶去年今日版築㝷樂其聲登登隠然在耳手植庭蕉上墻緑逐日新光宇何之斯文一縷千鈞我軰三綱五典左顧右盻兩壁間聮句想見時當􅀒荷一叚精神耿耿不㓕天道予善斯人也而不永年烏乎哀㢤尚享告伍光宇文成化壬辰夏六月戊寅白沙陳某奉柬于亡友伍光宇之靈曰一死一生乃見交情某平生於光宇至誠相與無異骨肉不􅄑光宇早世某在何敢以死生相背凢百舉措一如光宇存時近日家塾刋拙書真草百餘字與諸生臨冩尚有板四隅匡郭未整欲借安仔刀斧一日又所卜屋後山近請得李立武來㸔云此地三台落穴有氣是可蔵矣敢告新刋孔易來鶴亭詩并拙作數首奉去􅁳覧賦湖山雅􅃐賦丙戌之秋余䇿杖自南海循􅁃關而北渉彭蠡過匡廬之下復取道蕭山泝桐江艤舟望天台峯入杭觀于西湖所過之地盻髙山之漠漠渉驚波之漫漫放浪形骸之外俯仰宇宙之間當其境與心融時與意會悠然而適㤗然而安物我扵是乎两忘死生焉得而相干亦一時之壮逰也迨夫足渉橋門臂交群彦撤百氏之藩蘺啓六經之闗鍵于焉優㳺于焉􅀵歛靈䑓洞虚一塵不染浮華盡剥真實乃見鼓瑟鳴琴一囬一􅀧氣藴春風之和心㳺太古之面其自得之樂亦無涯也出而觀乎通達浮埃之濛濛㳺氣之􅁳􅁳俗物之茫茫人心之膠膠曽不足以獻其一哂而况扵􅁠爐大熾势波滔天賔客慶集車馬駢填得志者掦揚驕人扵白日失志者戚戚伺夜而乞憐若此者吾哀其爲人也嗟夫冨貴非樂湖山爲樂湖山雖樂孰􅀂自得者之無愧怍㢤客有張者聞余言拂衣而起擊節而歌曰屈伸榮辱自去來外物扵我何有㢤爭如一笑觧其縛脫屣人間有真樂余欲止而告之竟去不復還噫斯人也天随子之徒與振衣千仭岡濯足萬里流微斯人誰􅀅與儔止遷蕭節婦墓賦昔兵戈之攘􅇯盗􅀆孰倀倀而握之符號令紛其不一􅀆汨珠玉扵􅅺塗抹之亂之執兵之徇而慾􅀆胡寜知耻而畏誅若羙人􅀆宗廟之瑚毋我即帶􅀆毋我捫祛毋我執手􅀆手可㫁而不可汚􅁬犬豕之罵以冐刃􅀆貌凛禀其若蘇死則快􅀆生安用諸嗟此烈婦􅀆彼丈夫弗如丁侯爲縣􅀆徳敎用敷表貞塚􅀆營􅀕畬行路嗟嘆􅀆揭聲敎扵海隅蠢兹弗畏􅀆託日者以爲誣欲改封以自便􅀆動有識之長吁匪今侯之繼􅁤􅀆􅈥四尺其奚辜我􅀅告外史􅀆筆之於書賛忍字賛七情之發惟怒爲遽衆逆之加惟忍爲是􅅸情實難䖏逆非易當怒火炎以忍水制忍之又忍愈忍愈勵過一百忍爲張公藝不亂大謀其乃有濟如其不忍傾敗立至銘世頼堂銘恭惟我祖渭川府君所立殊衆七十八年漢隂抱瓮自是以來我家用開堂以世名徳音孔恢家廟鍾銘其質重其聲遲其動静有時永以爲神之依丁氏祠堂鍾銘代彦誠作出佛山冶入濟陽堂厥聲鏜鏜震于無彊改鑄樵樓鍾銘并序費而不傷壞則有成同百里之聲存萬世之經我民不信視此鍾銘鍾始造模而丁矦卒惜矦之志不及成此銘亡後有􅁇之者何以考故録之啓聘啓成化癸巳二月代兄作伏㠯持鈍舌者必淡顔良易投扵正士工巧言者冝令色毎見恱於常流盖夙分之雅同豈強能而苟比玆者􅄑遇尊親家鄭䖏士閥閲偉而着眼髙不鄙小弱弟某秀才章句踈而用心苦是故聲氣之相感庶㡬物我之相忘雖首院以難諧必東床而􅀗選鄭髙楊郭􅄑扳貴邑之甲科馬聶鍾容徒竊弊郷之啇品侔四姓敢賛一言此不徃而彼不來隂則升而陽則降慙魚緘之莫罄念雁幣之冝􅀅浩矣滄􅈚寜郤一蹄涔之水巍㢤太華何辭五弓許之陵乞箋起居用慰注仰謹奉啓不宣又成化辛卯十二月作文啓伏㠯得陋巷顔一瓢趣味儘殊扵俗尙著淸門羅三字品題盖属扵郷評惟此翁之可人冝吾弟之有室始者曠十年而莫遇訪㝷顧屑屑扵執巾玆焉比两姓以克諧期待乃惓惓扵舉案正􅀅求閨門之􅂇必無忝伉儷之名至誠斯合扵天人素志何疑扵夢卜片言賜􅁢束帛冝先懐素􅂂而仰髙山躋攀􅅸矣接清絃以奏流水風韻悠㢤謹奉啓不宣請期啓成化辛卯十二月代兄作文啓伏㠯鸞膠續好庶㡬無擇扵高明雁幣􅀅誠盖巳不嫌扵菲薄遂入芝蘭之室况逢桃李之晨須傳采牘以求通當載墨車而攝盛斯文未䘮故事冝遵􅅸言資送之有無盡属去來之感應遲佳期之甚邇庶􅀗瞻依承至况之匪加奚勝悚愳謹奉啓不宣與李宗成化壬辰正月代兄作文啓猥䝉不鄙弱弟某遂玆室家之􅂅實吾子之惠􅄑甚􅄑甚某以序次當爲主人不得詣吾子躬專請也倘吾子不憚劬扵路而以歸羅氏子于白沙某也則願吾子之終賜愛焉􅀃菊逸􅀃草木之品在花桃花於春菊花扵秋蓮花扵夏梅花扵冬四時之花臭色髙下不齊其配扵人也亦然潘岳似桃陶元亮似菊周元公似蓮林和靖似梅惟其似之是以尙之惟其尙之是以名之今之托扵花者吾得一人焉吉水䖏士張某􅃅菊逸盖賢而隠者屈子曰飡秋菊之落英陶子曰秋菊有佳色浥露掇其英皆以菊爲恱者也皆古之賢人也菊之羙不待賛菊花之羙而隠者也某之托扵菊也亦不待賛素馨􅀃草木之精氣下發扵上爲英華率謂之花然水陸所産妍媸高下羙惡不等盖萬不齊焉而人扵其中擇而愛之凢欲其有益於事非愛之而溺焉者也産扵此􅀖曰素馨者香清而體白郁郁盈盈可掬可佩貫四時而不凋供一賞而有餘亦花之佳者也好事者致扵余余旣愛之遂益究其用取花之蓓蕾者與茗之佳者雜而貯之又扵月露之下掇其㝡芬馥者置陶瓶中經宿以俟茗飲之入焉然則是花之用扵人雖不􅀂􅏘縷之與菽粟然盖亦不爲無用也人之資於􅏘縷爲其可以温也資扵菽粟爲其可以飽也得之則生弗得則死今是花也吾取焉姑以其䏻郁郁盈盈少禆扵茗耳雖不汲汲可也不汲汲由用之可巳也使是花之於人如􅏘縷之與菽粟然又安可巳㢤可巳而巳不可已而不巳引而伸之觸􅁼而長之於道其庶㡬乎治􅀦其庶㡬乎大頭蝦説客問郷譏不䏻儉以取貧者曰大頭蝦父兄憂子弟之奢靡而戒之亦曰大頭蝦何謂也予告之曰蝦有挺鬚瞪目首大扵身集數百尾烹之而未䏻供一啜之􅅅者名曰大頭蝦甘羙不足豊乎外餒乎中如人之不務實者然郷人借是以明譏戒義取此欤言雖鄙俗明理甚當然余觀今之取貧者亦非一端或原扵慱塞或起扵闘訟或荒扵沉湎或奪扵異好與大頭蝦皆足以致貧然考其用心與其行事之善惡而科其罪之輕重大頭蝦冝從末减譏取貧者反捨彼摘此何耶恒人之情刑之則懼不近刑則忽慱塞闘訟禁在法典沉湎異好則人之性有嗜不嗜者不可一槩論也大頭蝦之患在扵輕財而忘分才子弟􅁼有之盖其才高意廣耻居人下而雅不勝俗專事已勝則自畋獵馳騁賔客支酬輿馬服食之用侈爲羙􅀚以取快扵目前而不知竆之在是也如是致貧亦十四五孔子所謂難乎有恒者是也以爲不近刑而忽之故譏其不䏻自反以進扵禮義敎誨之道也孳孳扵貧冨之消長錙銖較之而病其不䏻者曰大頭蝦此田野細民過扵爲吝而以縄人之驕非大人之治人也夫人之生隂陽具焉陽有餘而隂不足有餘生驕不足生吝受氣之始偏則爲害有生之後習氣乗之驕益驕吝益吝驕固可罪吝亦可鄙驕與吝一也不驕不吝庶矣乎禽獸􅀃人具七尺之軀除了此心此理便無可貴渾是一包膿血褁一大塊骨頭飢䏻食渇䏻飲䏻著衣服䏻行􅁋慾貧賤而思冨貴冨貴而貪􅁠势忿而爭憂而悲竆則濫樂則􅁋凢百所爲一信氣血老死而後巳則命之曰禽獸可也批荅張廷實詩箋首章似胡文定觧春秋以義理穿鑿二章發揮得道理極致非所敢當然此心亦自不䏻已願與公共勉之三章仙術多門姑置勿論然興致高逺者非此無以托古有留意扵參同契而爲詩則斥以盗竊四章箋得之余清老唱道歌云世間膏火煎熬可厭亦在其中五章要㸔第二句與第四句相應親切六章醉以溷俗醒以行獨醒易扵醉醉非深扵易者不䏻也漢郭林宗晋陶淵明唐郭令公宋邵堯夫善醉矣夫七章其失與首章同黄涪翁大雅堂記似爲此箋發者正詩家大體所􅀜處不可不理㑹大抵詩貴平易洞逹自然含蓄不露不以用意装綴蔵形伏影如世間一種啇度􅀮語使人不可模索爲工欲學古人詩先理㑹古人性情是如何有此性情方有此聲口只㸔程明道邵康節詩真天生温厚和樂一種好性情也至如謝枋得雖氣節凌勵好􅀃詩而不識大雅􅀚其註唐絶句諸詩事事比喻是多少牽強多少穿鑿也詩固有比體然專務爲之則心已䧟扵一偏􅀅來未免此弊不可不知八章不知馬其失在人不在馬少知進退去就而巳者亦未以馬稱也平湖之進吾惜之九章珠珮用鄭交甫事十章箋得之詩從後定夲統論好非但拙作所䏻當持以論詩可矣槩􅀚所論多只從意上求語句聲調體格尚欠工夫在若論詩家一齊要到荘定山所以不可及者用句用字用律極費工夫初須訪古乆而後成家也今且選取唐宋名家詩數十來首諷誦上下効其體格音律句句字字一毫不自滿莫容易放過若扵此悟入方有蹊徑可㝷傳状羅倫傳弘治癸丑三月作吾平生有故人曰羅倫字􅃔正江西永豐人宋羅開禮之後也性慷慨樂善不疑人欺遇事無所囬避有不可輙面斥之舉成化丙戌進士䇿對大􅋝頃刻萬言中引程正公語人主一日之間接賢士大夫之時多親䆠官宫妾之時少執政欲截其下句倫不從直聲震於時奏名第一爲翰林脩撰㑹内閣大學士李賢遭䘮朝廷留之䑓諌皆不敢論􅀃倫詣其􅀻苐告以不可李公始以其言爲然既數日復上䟽歷陳古今起復之非是且曰如其不然必凖冨弼故事終䘮劉珙故事言事反復數千言一夲於天埋人心之不可巳者孔子曰勿欺也而犯之倫以犯顔切諌爲大救時行道爲急其􅀒荷之重未嘗一日忘天下故發憤如是䟽奏遂落軄提舉泉州市舶司倫雖見逐而士論益榮之由是天下之士争自刮磨向之不言以養忠厚者爲之一變而終倫之世䑓省未聞有起復者矣雖以此爲人所知然亦以此取嫉扵人明年召還復脩撰改南亰㝷以疾辭歸開門授徒日以註經爲業垂十年卒於退居之金牛山世之知倫者不過以其滂沛之文竒偉之節果敢之氣而巳至其心之所欲爲而力之所未逮未必盡知也嘗欲倣古置義田以贍族人或􅂇之堂食之錢謝而弗受或衣之衣行遇乞人死扵途輙觧以覆之客晨至􅇔具飯其妻語其子曰瓶粟罄矣之旁舎干之比舉火日巳近午亦曠然不以爲意提舉泉州時官例應得折薪錢其人欺以乏告即放遣之不復問予嘗遣人訪之山中結茅以居取給扵壠畝徃來共樵牧􅀂無意扵世者時或作爲文章以發其感慨之意而人亦莫知之也論曰倫之必爲君子而不爲小人較然矣如倫之才少貶以徇人雖欲竆晦其身寜可得也以其所學進􅀃於上世目之爲狂何足怪也孟子稱豪傑之士雖無文王猶興􅀂倫者今所謂豪傑非欤無導於前而所立卓然人莫䏻奪之又曰倫才大不及志其青天白日足稱云丁知縣行状成化丙戌七月代容珪作侯姓丁氏名積字彦誠別􅃅三江漁樵人世家寜都之西關丁氏系出丹陽司馬司馬之後世有顯人曽祖某祖某父某皆􅀮徳弗仕曾祖妣某祖妣某妣某侯生有羙質自少岐嶷入邑庠􅀘弟子員挺立不爲時軰所喜登成化戊戌進士明年岀知新㑹縣新㑹廣藩巨邑素號難治矦聞邑中有白沙陳先生喜曰吾得所師矣矦之同年梁編脩儲李主事祥皆先生門人矦請書以爲先容比下車未視􅂐即上謁先生欲事以師禮月分其所得俸先生毎避還之凢有所聞行之惟恐後四方學者徃來白沙之門矦聞林縣愽光張進士詡至必欣然徃㑹旦夕聴其議論􅀂渇得飲焉與一峯羅先生雖素昧平生然毎思慕其賢訃聞專使走湖西致奠捐俸金以􅂇塟事其尊賢樂善無間扵存亡如此有中貴弟梁長責民償逋過倍復妄訴之矦矦㢘知其情繫長獄悉追貸劵焚之由是􅁠豪縮頸是是非非苟罹于法雖素親愛不少貸未踰年民大趨令矦于干謁之來厲詞色以拒之甚者掲其姓名以示衆嚴賭愽竊盗之禁既寘于法復大榜其門曰某賭愽某竊盗之家月朔赴縣庭􅃪戒諭俟其悔然後去其榜其良家子弟䧟于賭慱者矦悉聚之廡下使日誦小學書親爲講解冀其變化其氣習嘗爲民辯􅁈忤當道繋獄且危百姓惶懼欲用計爲矦觧矦示以手書曰君子但求無媿扵心而巳禍福之來有命爾等愼勿妄動以貽我羞有積年起㓕詞訟者官司病之莫敢誰何矦盡擒之斃于獄矦尤善節財用前此上下徃來非􅁩之餽一􅀊所費無筭民苦之矦痛革其􅁦盖異時當甲首者均平錢悉貯于官復令出私錢供用名曰當月錢官吏里胥乗時侵尅每􅀊雖單丁小戸所費亦至五六千餘貧者鬻子女故迯亡者衆矦爲處當毎丁􅂀均錢月支里胥供用備足外不妄科一錢毎􅀊甲首納均平錢畢即歸田畝更不令在縣當月白沙先生樂􅀊詩云長官􅂅似丁明府甲首終年不到衙盖實録也民竆扵侈且僣矦爲申明洪武禮制叅之文公冠婚䘮􅀕之儀節爲禮式一書使民有所㨿守毎郷擇老成者數人主之月朔進問扵庭優禮其䏻者都老馬廣爲衆所推譲矦扵元日進廣扵庭率諸郷老再拜謝之春秋􅀕祀品物牲牢極其靖潔役者悉令沐浴更衣然後􅀅事俎豆旣陳矦周視行列必極其整方止壬寅嵗大旱春盡種未入􅁟矦憂之曰此令之責也遂扵圭峯絶頂築壇禱􅀨時當酷暑山氣欝蒸矦晨夕齋沐伏壇下致禱凢七日未􅀨羸甚左右進曰軀命所闗可以少止矦呵曰民得雨吾病何憾至八日暑氣愈熾矦觸暑跪壇下衣汗浹踵大風忽作卷爐中火著矦衣略不爲動􅀨遂迸空下左右張盖矦命撤之衣盡濕翌日􅀨止矦復禱至十有一日􅀨足乃巳如是者凢三次焉節義所􅀜或廟或墓各置􅀕田擇人守之如大忠祠置田二百餘畆節婦何氏荘氏蕭氏等墓置田共一頃六十餘畆民所敬事者惟修復里社一壇而巳其不載祀典之祠無大小咸毀之此其政蹟顯著之大者一念終始在民既得疾羸甚猶日究心於民事朋友遺之書不䏻止遂卒于官矦生正統丙寅十二月初十日至是卒年四十一也配羅氏生子男二人長曰一芳次曰某生扵公卒之五月女二俱㓜矦卒之日民相弔哭扵途歸徳里有一嫗夜哭于家僯人怪而問之曰來年甲首到丁大人死吾殆不䏻􅂓生矣是以哭至今邑人之思矦者甚於在任之日雖古桐郷之遺愛不是過也珪邑人也矦之善政善敎皆所親覩故爲状其行以俟他日􅀚風者采焉謹状伍光宇行状君諱雲字光宇系出汴梁伍氏先世仕宋爲嶺南第十三􅀅曰氓之子始來新會至君爲􅀂干世世爲士夫家君自少軒整有志扵世無所屈譲與人語惟其所欲語輙語必竭乃巳或忤之爭必務勝人有善好之若出諸巳巳所欲爲必以強人爲之垂四十始交扵余余之所可君亦可之余之所否君亦否之惟余言之適從南山之南有大江君以意爲釣艇置琴一張諸供具其中題曰光風艇遇良夜皓魄當空水天一色君乗艇獨釣或設茗招余共啜君悠然坐艇尾賦詩傲晲八極余亦扣舷而歌仰天而嘯飄飄乎任情去來不知天壌之大也所居之北爲巖亭髙不盈一丈其中閴寂視之􅆼如也而君以夙疾未除齒髪日耗其爲學也盖不䏻無日暮途逺之憂便杜門息交不擇逺近爲趨舎凢平居一切與徃還者皆抗顔謝焉入處于亭焚香正􅁭趺坐竟日聞者異之別於白沙築草屋三間號曰㝷樂齋與巖亭徃來居之盖自成化庚寅之冬至明年首夏凢四閱月無日不在㝷樂始與家人約云吾不可去白沙吾其齋戒有事于家廟吾疾作須扶持吾乃歸一日二日小健吾當返愼無以家事累我既而果如其言學主力行與之語雖不便了而䏻鞭䇿益力肯擔􅀒矻乎不移前此惟務意氣勝人不自􅁴束凡岀藩蘺事亦無所不爲至是痛自懲艾痛自改革嘗激昻厲聲語云雲不自􅀣立爲人不如死暁夕約已以進有所弗及無所憚劬焉間與余論爲文必曰黄培翁題摹燕郭尚父圖盡之論書曰兔起鶻落法語也知􅀞者必知書其惟蘇長公乎至於詩則謂唐以下多近體古詩冲淡之流吾其陶處士師乎凡此項皆君篤好而願爲之及其卒也十九無成則亦慨乎􅀊月之巳晚而其力之所及有未暇焉耳君篤扵事死之禮謂斯禮之興廢在人後世無以爲􅇼豆之費則不省者有以藉口乃告扵季父絢洎伯兄􅁉割田若干畝以供祀事權以所居第爲祠有事扵此必誠必敬月旦十五日君率以夜半起衣冠端拱立祠下以俟尊㓜男女咸來無或敢不䖍􅀊辛卯秋始大营材爲祠當病未亟時尙日經度兹役􅀅諏日始事語人曰吾息奄奄吾旦夕死不可知惟是祖考之神所棲未有定處吾深惧焉雖存一日不敢怠語斯須未畢痰湧岀喉中滚滚不􅅸如縷日夜且數升親舊憫其如此咸􅂆之令止勿聴卒之前數夕焚香秉燭招余與訣父兄子弟具在直云雲薄命雲􅀒先生數日遂卒卒之時年四十又七實辛卯十月十八日也君娶某氏無子􅁉以其次子秉中爲君後云題䟦䟦清獻崔公題劍閣詞弘治甲寅十月作萬里雲間戌立馬劍門闗亂山極目無際直北是長安人苦百年塗炭􅀑哭三邊烽鏑天道乆應還手鴈􅇔屯奏烱烱寸心丹對青燈搔白髪漏聲殘老來勲業未就妨却一身閑梅嶺緑隂青子蒲澗清泉白石恠我舊盟寒烽火平安夜歸夢到家山右調水調歌頭吾郷先軰菊坡先生宋丞相清獻崔公鎮蜀時題劍閣即此詞也曩夢拜公坐我扵床與語平生仕止乆速偶及之仰視公顔色可親一歩趨間不知其已翶翔扵蓬萊道山之上欲從之上下而無由因請公手書公欣然命具􅁓筆烏虖古今幽明一理人之所見則有同異感而通之其夢也耶其非萝也耶今書遺其後後世孫同夀云書思徳亭碑後成化八年壬辰夏廣右陶公由吾邑長進秩憲僉六年考滿如亰師􅀅行也諸父兄相與携思徳碑文一首詣余請文以贈曰􅀅以是考也諸父兄坐既定余撫碑歎曰嗟夫昔壬午之冬㓂忽大至城下民被剽掠死者甚衆公方備㓂于外報至哭徑歸及郊哭入城呼士卒慟哭撫之告以㓕賊皆感激増氣捐軀赴難震動一邑此吾與諸父兄所共見也賊益􅂶斥公由是建子城與民固守又量地逺邇連爲营以塞四境要害設守備之法内外戒嚴賊不敢犯民到今頼之凢使吾兄弟妻子得免流離老稚謳歌田里與鄰壤異者公也公有識慮善揆度其所施爲事務實而不爲虚文故䏻取必扵此經歷乆逺民受其賜而公之㓛有成此吾與諸父兄所共知也公家廣右之欝林去賊近吾邑在吾省之西南近省多饒資民賊利得之每􅀊入㓂公遏之賊不得逞退過公先塋衆憤􅀅伐木取坯􅁟以惧公頼忠烈之靈震怒在天賊㝷畏不敢近嗚呼此公捨一家之危以易一邑之安吾與諸父兄所共聞也夫是三者之難能公實䏻之以惠吾民吾民所以頌公之徳在此一片石則或聞之而不言或言之而非專豈諸父兄與作碑者之意耶公爲縣乆其有勞扵吾民不可具書盖公之治民如其治兵因應随機􅀄無定體其治兵也如文士作文竒生筆端無事蹈襲故䏻使人畏之而率以取勝此皆公精神心術之奥之運人不可得窺故尤不可得書可見者跡之顯者耳書其跡而民莫不信余是以冐言之以􅀘碑之弗及若夫述軄贈言以勉當道此僚友之分君子之任非吾與諸父兄之冝書韓荘二節婦事烏虖二氏之生其相去且千載韓故相􅀦休之孫女荘雷郡庶人妻貴賤雖殊其死於義一也心事如青天白日皎乎其不可尙辭氣如大冬嚴雪凛乎其不可犯是豈資學問之㓛㢤是豈嘗聞君子之道於人㢤亦發於其性之自然耳今之誦言者咸曰餓死事極小失節事極大故利害比二氏乃能之學者故不能於此然則從事於詩書反無所益彼之弗學乃䏻不壞其性何邪是必有所以然者學止扵誇多闘靡而不知其性爲何物變化氣質爲何事人欲日肆天理日消其不䧟扵禽獸者㡬希矣余讀二氏之辭有感故録而蔵之書孔髙州平賊詩卷後王別駕所爲孔髙州平賊十二詩并圖􅀃余覧之嘆曰嗟夫太守誠有㓛扵民也太守今進秩憲副使其視民如傷必不偏扵一隅安扵一日以爲足吾意副使之賢勞謙而不伐雖有同時詠歌之羙盖未知其果樂聞之而首肯否雖然或亟稱之必深􅂅望之亦君子所不能已扵言也書蓮塘書屋册後成化十九年春正月予訪予友荘定山扵江浦提學南畿侍御上饒婁克譲來會予白馬庵三人相與論學賦詩浹辰而別侍御之兄克貞先生與予同事呉聘君予來亰師見克貞之子進士性及其髙第門人中書􅃽世欽因與還徃居無何侍御官滿來朝予卧病慶夀寺之數人者無日不在坐師友蟬聮臭味相似亦一時之勝㑹也侍御示予蓮塘書屋圖山雲水石竹􅀣隂翳恍然若蓮塘之在目藹然絃誦之聲盈耳也予玩而樂之謂侍御曰地由人勝不勝誰傳周茂叔濯纓扵濂溪而世濂溪程叔子著書於龍門而世龍門朱晦翁講道扵考亭而世考亭今婁氏居蓮塘冝世連塘使蓮塘之名有聞扵天下後世者婁氏也使婁氏有聞扵天下後世者婁氏自爲之非蓮塘也蓮塘之遇不其􅄑欤濂溪以茂叔勝龍門以叔子勝考亭以晦翁勝蓮塘以婁氏勝古人今人無不同也抑不知婁氏之所脩而執之者同於古人否歟惡乎同乎同其心不同其迹可也同其歸不同其入可也入者門也歸者其夲也周誠而程敬考亭先致知先儒恒言也三者之學於聖人之道孰爲邇孰知之無逺邇歟周子太極圖説聖人定之以中正仁義而主静問者曰聖可學歟曰可孰爲要曰一爲要一者無欲也遺書云不專一則不能直遂不翕聚則不䏻發散見静坐而歎其善學曰性靜者可以爲學二程之得扵周子也朱子不言有􅁚山也此予之狂言也婁氏何居焉予以景㤗甲戌逰小陂與克貞先後至凢克貞之所修而執之者予不䏻悉也書予􅀃扵蓮塘圖侍御質諸克貞先生以爲何如誡子弟人家成立則難傾覆則易孟子曰君子創業垂統爲可繼也若夫成㓛則天也人家子弟才不才父兄敎之可固必耶雖然有不可委之命在人冝自盡里中有以彈􅁝爲業者琴瑟雅樂也彼以之敎人而􅀗利既可鄙矣傳及其子託琴而衣食由是琴益微而家益困展轉􅀊月㡬不䏻生里人賤之耻與爲伍遂亡士夫之名此豈嘗爲元惡大憝而䘮其家乎才不足也既無髙爵厚業以取重扵時其所挾者率時所不售者也而又自賤焉奈之何其䏻立也大抵􅀎立扵一世必有取重扵一世之術彼之所取者在我咸無之及不䏻立諉曰命也果不在我乎人家子弟不才者多才者少此昔人所以嘆成立之難也汝曹勉之示學者帖諸君或聞外人執異論非毁之言請勿相聞􅀂事不得已言之亦須􅀮其姓名可也人氣禀習尙不同好惡亦随而異是其是非其非使其見得是處决不至以是爲非而毀他人此得失恒在毀人者之身而不在所毀之人言之何益且安知已之所執以爲是者非岀扵氣禀習尚之偏亦如彼之所執以議我者乎茍未䏻如顔子之無我未免是已而非人則其失均矣况自古不䏻無毁盛徳者猶不免焉今區區以不完之行而冐過情之譽毁固其所也此冝篤扵自修以求無毀之實不必以爲異而欲聞之也昔吕蒙正拜副相一朝士指之曰此子亦參政乎同列欲詢其名遽止之曰知當終身不忘不如勿聞賢者所存固異扵人也諸君亦冝念之手帖讀一之自罰帖所謂喜三代之犧羊猶存也此舉雖過然究其爲心盖亦可憫且自罰之辭甚實其進固未可涯也若夫乆居師席不䏻致門人於無過舉之地此則老夫之罪請附此扵日録算一過諸君其誌之喻塾中帖不邀人敬不受人慢某今日方暁待深之之道大抵情不可過㑹不可數抑情以止慢踈㑹以増敬終身守此然後故舊可保請自今後朔望免禮諸生在塾中者亦不勞進揖容珪持此􅁓徃喻俾悉知余意與容珪帖絢等雖在門墻其與拙者之意實未相接徒以名分相繋爲羙談耳雖然賢扵吠雪者多矣廣􅀵而勿拒小警而大遺其諸全交與待衰俗之意乎書一之自罰帖後此帖某實命之而云自書者貫不自以爲過導之使知悔也貫之此舉某􅀄盖以爲可卒歸扵貫者貫主之托始於貫謀事愆義規畫無度皆貫之失不容扵公議故與士友共責之而不得􅀻焉其不可自恕者謹以書諸日録矣自罰必一年而後復者過之小大爲恨復深責望之昭仁示義殆亦孔門鳴鼔之遺意歟子曰由也升堂矣未入扵室也逮其晩年進徳極扵髙逺未必非此門人之助而由之名光扵後世矣則貫其可侮㢤漫筆示李世卿湛民澤昨夕樓上聞雨聲澎湃睡不􅀎著枕因檢會郷里平時還徃人十亡七八中間年及七十者才一二餘皆六十而下四十蚤晩死者恒多烏虖人所得光隂䏻㡬生不知愛惜澷浪虚擲卒之與物無異造物所賦扵人豈徒具形骸喘息天地間與䖝蟻並活而已耶浮屠氏雖異學亦必以到彼岸爲標凖學者以聖人爲師其道何如彼文章㓛業氣節世未嘗乏人在人立志大小􅀊月固不待人也書澷筆後文章㓛業氣節果皆自吾􅆂養中來三者皆實學也惟大夲不立徒以三者自名所務者小所䘮者大雖有聞扵世亦其才之過人耳其志不足稱也學者䏻辯乎此使心常在内到見理明後自然成􅈬得大論語曰朝聞道夕死可矣孔子豈欺我㢤䟦沈氏新蔵考亭真蹟卷後張宣公城南雜詠廿首考亭朱子爲和之楊鐡崖評其詩謂宣公有古風思緻扵考亭惟曰朱子之辭不敢評其信然耶抑別有所指不欲盡發之耶昔之論詩者曰詩有别材非闗書也詩有别趣非闗理也又曰如羚羊挂角無迹可㝷夫詩必如是然後可以言妙近代之詩逺宗唐近法宋非唐非宋名曰俗作後生溺扵見聞不可告語安得鐡厓生並世余􅀅叩之其亦有以復我耶鐡厓􅀘書宣公詩與文公真蹟併蔵沈氏都憲公書來俾予題予既未及見因附論鐡厓之後如此云䟦梁暁挽李唐詩暁爲詩悼李唐唐卒未娶無顯然悔尤皆以爲􅄑然暁之扵唐既送其徃復迎其來何曉之不憚煩也造化固無是理矣但如暁􅀃茍無聖人之徳而有妻子之累雖暁不䏻以一日活世間况扵唐乎暁之爲人謀亦踈矣暁乎其自䖏可也䟦張聲逺蔵康齋真蹟後先師康齋遺稿某蔵之十二年矣出入必偕天順􅀄先師膺聘入亰途中紀行諸作皆當日手書􅀉白沙凢七􅁓成化巳丑春三月行李岀北亰是日次于析木之店以示東呉張聲逺鍈一見驚􅅸閱之竟日不目瞬以手撫弄以口吟哦某憐之割一􅁓是􅀊六月過清江以手書問先師尚無恙也明年秋鍈書來求䟦又二年壬辰二月豊城友人始以訃來先師之卒在已丑十月至是三易􅀊當鍈求䟦語時属纊來一年矣烏虖悲乎先師道徳名譽傾一世婦人小子知之華夏蠻貊咸知之平生愛一字一辭不以假人某之所得徒以一日在門下然誦其言想見其丰采而得其爲人則冝其有􅅥然而感勃然而興者矣某猶望此扵百世之下况其邇者乎後生可畏鍈其念諸門人某謹識䟦漳州㓛徳碑後漳州姓張名璝字徳􅃳別號两山居士番禺人詡之父也讀漳州㓛徳􅅸句云罷守三州卧两山漳州面目此碑間郡人欲識蒙庵老也傍斯文捉一班作碑者林蒙庵􅇮扵亰師見其人愼許可人以是信之今直靠他作證明師也蒙庵見拙詩想爲抵掌但未知肯勒扵碑隂否也論詩不易宋歐陽文忠公最愛唐人逰寺詩曲徑通幽處禪房花木深又愛一人送別詩暁日都門道㣲凉草樹秋云修平生欲道此語道不得朱文公謂今人都不識此等好處是如何二公最知詩者也後人誠未易及如此两聮予始因歐公歎賞之至欲求見其所以妙如歐公之意了不可得徧問諸朋友無知者徐取魏晋以下諸名家所作凡爲前軰􅀧岀者反覆玩味乆之乃若粗有得焉間舉以告今之善言詩者亦但見其唯唯扵吾所已言者而巳吾所不言者彼未必知也夫然後歎歐公之􅅸識去今之人逺甚而信文公之言不誣也噫詩可易言㢤書自題大塘書屋詩後予既書婁克譲蓮塘書屋圗後􅃽世欽􅁇之以大塘書屋之請予賦五言近體一章既以荅世欽世欽少之予乃究言詩中之㫖首言大塘書屋乃中書蔣世欽所建頷聮言爲學當求諸心必得所謂虚明静一者爲之主徐取古人緊要文字讀之庶能有所契合不爲影響依附以䧟於狥外自欺之弊此心學法門也頸聮言大塘之景以學之所得易所謂復其見天地之心乎此理洞如然非􅆂養至極胸次澄澈則必不䏻有見扵一動一靜之間縦百揣度秪益口耳所謂何思何慮同歸殊塗百慮一致亦必不䏻深信而自得也末聮借方士之丹以喻吾道之丹卒歸之龍門者明其傳出於程子而人未之知也拙見如此未知是否然予於世欽不可謂無意矣所病者辭采不足以動人耳世欽胡爲而少之予以世欽厭夫爲文字章句之學者勇扵求道不耻下問於予予是以重言之謂予俯仰於時姑喋喋以塞夫人之意非予所以䖏世欽也速勾丁知縣廟䟽立一祠旣以表茂宰之賢又以見吾郷尚徳慕義一唱百和視死如生又孰不咨嗟而歆羡其羙耶且報徃可以勸來此祠立必有聞義而興起者問所由來郷諸父兄子弟不忘舊令之徳章與有榮矣􅄑甚􅄑甚即辰春日布和工匠畢集其告諸義士及是時慨然念此舉之不易發誠心而共濟􅄑無辭曰姑俟來日區區不勝至禱書鄭檢討所編劉閔札後此吾翰林鄭先生廷綱取其平日所得扵其友劉閔子賢手書㑹而編之以爲此卷子賢甞以孝行聞于郷之人今閲此卷意其天資可與共學而鄭先生不没人善也皆可敬中間一簡告鄭先生以處貧之難吾獨惜子賢之困於不足無所於謀也三旬九食亦昔人之常事必不得巳而干人雖謀於鄭先生可也而徒告之難鄭先生豈難於濟人者㢤觀者疑焉雖不以編入可也書鄧政求濟帖後於乎􅀔利爲市朋友道絶昔人所䏻者例不可望扵俗軰政之􅃅不足扵余固其所矣惜予貧且賤無以副政之請此昔人所謂旋渦底佛安䏻救落水羅漢不然余之所欲濟與所識求濟扵余者多矣豈獨政㢤雖然政扵余無一日之雅奚以亮余之能惠予􅀒政多矣十室之邑尚有忠信如夫子政其廣求之必得一士如予而無予之貧賤政其庶㡬乎撫紙太息書其後歸之書玉枕山詩話後余又有囬龍寺夜坐詩云􅀌燭江邉寺踈鍾雨後天愁人知永夜逺客惜流年不買南安酒留充玉枕錢床風無意緒吹斷藥罏煙第三聮亦以玉枕而發東海乃不􅀵入詩話中偶忘之耶東海平日自謂具隻眼䏻辨千古是非人物而近遺夫康齋又何也康齋易知耳予年二十七㳺小陂聞其論學多舉古人成法由濂洛闗閩以上逹洙泗尊師道勇擔荷不屈不撓如立千仭之壁盖一代之人豪也其岀處大致不假論然而世之知康齋者甚少如某軰徃徃譏呵太甚群啄交競是非混淆亦冝東海之未察也微君與蘇君今日之論則東海之康齋其爲晏嬰之孔子乎了翁之伯淳也噫成化壬寅九月二十八日新㑹陳獻章在南安横浦驛讀東海先生玉枕山詩話秉燭書此于蘇君卷中書鄭廵檢詩卷後吾邑沙岡廵檢鄭榮官滿告歸持此卷過白沙乞詩榮莆人也壮而仕老而休賢於不知止者予既贈之詩復録近作七􅅸扵此莆有大理黄先生故人也榮見問我以此卷呈之題吴瑞卿采芳園記後􅀊云暮矣冬雨淒淒牛僵馬危啇旅不歸號寒啼饑竆民怨咨采芳何爲將以遺所思所思在逺道天寒日短誰爲致之不如待時時維仲春陽道旣亨萬物得時和風披披人情熈熈慱采衆芳汎汎輕航駕言岀㳺不􅅺一􅀖雲龍風虎其傳自古而徳之所􅀍人􅀅化之如赴壑之水汨汨洋洋不亦深乎瑞卿天下未有不本扵自然而徒以其智􅀵顕名扵當年精光射來世者也易曰天地變化草木蕃時也随時詘信與道翶翔固吾儒事也吾志其行乎猗歟休㢤題余別駕中流砥柱圖後別駕余先生命余題中流砥柱圖余讀彭秋官序文雖非正􅀃此圖而意巳足末舉元貞事一叚結褁尤警䇿有力故予倣其意而切言之盖不言則巳言必欲其有益扵別駕非相啖以利者也故不爲䛕辭其辭曰使君使民不厭真使君爲臣莫愛身使君不以榮落爲詘信死生爲戚忻而以􅄝欲爲伐性之斧斤千秋萬􅀊難磨㓕乃見中流砥柱人偶書遺湛民澤龔曰髙逰羅浮者仙人譚景升詩云逢萊料想無多路只在譚生拄杖前羅浮海上山葛仙治之真蓬萊㢤方竹君入手振之鏗然有聲上撑天下拄地四方惟意所如諸君即日東逰度鐡橋登飛雲坐黄龍嘯明月是真神仙矣譚生豈欺我㢤乆矣吾夢長髯翁遺予羅浮山盡四百三十二峯一囊括之開半面以待逰笻之入次王半山韻詩䟦一日忽興動和得半山詩一十八首稿寄時矩􅀵閲作詩當雅徤第一忌俗與弱予嘗愛看子羙后山等詩盖喜其雅徤也若論道理随人深淺但須筆下發得精神可一唱三嘆聞者便自鼓舞方是到也須將道理就自巳性情上發岀不可作議論􅀃去離了詩之夲體便是宋頭巾也大槩如此中間句格聲律便一一洗滌平日習氣渙然一新所謂濯去舊見以來新意作詩亦正用得著也批判去改定乞再録來見示爲􅄑稿中有工拙請下一轉語以􅀚識趣髙下可乎書和倫知縣詩後屠沽可與共飲而不飲彭澤公田之醸古之混扵酒者如是與獨醒者不相䏻而同歸于正雖同歸于正而有難易焉醒者􅎨志直遂醉者韜光内映謂醉難扵醒則可今之飲者吾見其易耳非􅅺扵酒而飲者也烏虖安得見古醉郷之逃以與之共飲㢤送張方伯詩䟦某嘗謂作詩非難斟酌下字輕重爲難耳如此詩第五句清字旣研于心又叅諸友左揆右度終不可易而非公九載之守不渝某亦豈敢孟浪盖一字之下其難如此詩其易言㢤書法予書每扵動上求靜放而不放留而不留此吾所以妙乎動也得志弗驚厄而不憂此吾所以保乎静也法而不囿肆而不流拙而愈巧剛而䏻柔形立而􅀔奔焉意足而竒溢焉以正吾心以陶吾情以調吾性此吾所以㳺扵藝也白沙子卷四終
