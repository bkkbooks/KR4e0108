body:
  text: 書簡與西涯李學士相别六十年邇者不通問於京師然自周文都南歸後先生之音耗遂絶於耳曩聞先生在喪且歸長沙無一知舊自北京來者無可問其詳不敢奉狀每一見周生相與悵然久之尚未審所值何艱長沙無舊業未必可歸當歸何處也近者白洲李憲副過寒舎乃知先府君塋于都下嬴博之葬古今未必以為非然亦有非其情之所安顧吾力有所弗及萬里外某能亮先生之心也奈何奈何居今之世欲超然無累於心無累於後先生計之亦熟矣然事往往有不期而至非人思慮所能及惟在我者所當盡而或牽制於外為之弗豫至不可為然後圖之亦弗及矣此亦先生平昔所嘗慮及漫一道之耳頃歲承惠貞節堂八詩真嶺南竹枝也李世卿已収入縣誌門户之光非言語可謝也籐蓑尚欠補章能復賜之否乎世卿自去年首夏至白沙臈然後歸蚤晩會試入京區區衰病百狀問之可知己去秋得時用一書足慰鄙懐他人愛我不如時用先生諒能悉之也張進士行附此不能盡所欲言粗絹二疋表忱外苧一端奉時用不别具與鄧督府翰林院檢討古岡病夫陳某再拜復書督府都憲鄧大人先生執事某不得望見於執事五十年矣南海野人徒抱迂拙不可為世用執事鴻猷盛烈聲聞四達皎如日星之照臨甚賀甚賀兹者伏蒙手書錫之名香歲厯别奉鈞帖令本縣月給白米一石撥人夫二名不敢當不敢當執事所稱逋野誠隱逸士如今日之賜使逋等受之宜也其不受未見其讓之過也某何敢自列於古之名流哉某無寸善可以及人有田二頃耕之足以自養而又受賜於當道以自列於古之名流其怠於自修亦甚矣引領蒼梧衰病無由自致拙作一首紀述仁政傳示嶺海以彰盛徳餘二小詩以撰慈元記望西涯閣老以請祀典望督府共成東山之美此野人之志也伏乞鈞裁與朱都憲頃者獲拜執事於蒼梧十餘年間執事之心不忘乎僕與僕願見執事之誠交慰並沃於一堂之上一日之間至矣盡矣執事負一世之豪才際百年之嘉會故能受知於當宁進位都憲奉璽書督三軍以經營於一方誰不瞻仰誰不歸戴僕一介書生生長東南聞見寡陋徒負虚名無補於世乃蒙追憶十餘年相與尺牘往來之雅而賜見焉幸甚幸甚僕之齒非少然以方於執事則為後進執事先生長者也長者有問不辭讓而對非禮也隱而不告非禮也僕之始至執事問以出處僕未敢率爾執事又益之以薦進之説且令回自决之僕於是乎若負芒刺避席而不敢言慚也退而思之又大慚也明日具以情告且言其不可當是時也執事亦見僕之顔色乎始者僕欲往見執事於蒼梧凡三復計之而後果行誠以執事之賢固所願識然自念二三十年所守進退之節一旦由此而變亦不能不少踧踖也况諭之以薦進之説耶僕竊以為執事好崇奬人之善偶見一士少異乎人亟以此言寵之使勉乎善云耳不然則將悼其窮且老踽踽焉無所與同恤恤焉無所與歸故問而遣之使自為祿仕之計焉耳不然執事之明足以照物豈不知僕之駑鈍不可驅䇿而思進之萬里之途也執事又以韓退之之事見朂退之雖賢不及孟子孟子不肻枉尺直㝷退之以書千宰執僕固不得舎孟而學韓也僕之歸白沙幾一月矣鄉之逢掖士無日不來問詢僕告以所接盛徳之光莫不鼓舞興起信乎徳之流行速於置郵而傳命也惟是進退出處之念尚日往來於心誠懼執事所以待僕者如此而人之知僕者淺也此意已託丘侍御達之左右不審亮之否乎未能黙黙伏此布聞且以代面謝惟少垂鑒焉又陳某頓首啓伏䝉今月十八日遣使降臨衡茅惠以羊酒粟楮諸儀君子之賜光動閭里顧愚何人可以當此恭惟執事位髙而望重徳博而民化而恒患乎善之不彰士罔攸勸故能尊重名教秩秩其儀以興起山林之遺逸大哉執事之心僕雖駑鈍敢不夙夜秪奉然僕竊觀來諭之言大意欲勸僕出仕耳非直勸之且加責焉是故出於愛僕之誠而僕之心亦未有蒙照察者何則掇科登仕固僕之素志抱病違時非僕之得已僕自染疾來六七年間每遇疾作徧身自汗若雨或遭數月不止既止復作畏勞怯冷沉綿反復元氣䆮耗力加防慎庶幾保全而母氏年益髙百疾交苦是以未能出門耳假令僕疾愈可以出矣而忘親之老豈人之情也哉在親為親在君為君無所往而不然矣夫天下之理至於中而止矣中無定體隨時處宜極吾心之安焉耳若昔之李宻是也宻被徵時宻之心蓋自揆安於事劉則止為中而行非中也今若槩以聖賢出處之常責宻以必仕恐非宻之心宻之心天理之時中也僕今自處亦欲無愧於宻耳執事信以為何如哉願終教之僕不敢固執也承録示諸公子文稿筆勢滔滔有氣燄當是一才子可畏可畏若導其志使不差開其學使有益又在教者何如耳使回謹此申覆辰下哭一姪婦故言無文采伏乞台照又陳某啓伏承此月二十四日都憲老大人命使降臨衡茅諭令某即日起程赴京春闈在邇不許推延聞命悚惶為慰為懼伏念某質本庸愚賴䝉聖朝作養于兹三十餘年雖無用世之才竊有忠君之志其未仕也豈果於自為而忘世哉誠欲吾身親見之豈不知時之可為哉執事知之久而愛之深既重之以手書復勤之以口喻執事於後進拳拳接引如此某雖駑疲豈無飛動之意哉直以受氣不豐病與年長去年秋自汗纔息因得進謁執事於蒼梧比歸途間冒風舊病㝷發至今年七月初寒熱交攻自汗猶劇而必欲驅此疾羸之軀行於風波之途萬一不虞雖悔何益伏願執事垂日月之明擴天地之量假之歲月俾得調治疾愈之日自行起程赴部不敢推延以負尊命干冒威嚴某不勝戰越之至與劉方伯東山先生餘冦未殄先生得無為百姓戚戚耶比聞下令各鄉村自為城守伏計當道憂民之至必無過舉恨未得其詳耳曹匪石抵家病即愈先生冒大暑負疴而出動靜勞逸仕與止固不同也未涯瞻奉謹此申忱匪石所徴樂記文字已託鄒汝愚具稿早晩録上轉達又亡妣墓於小廬山居舎之旁襄事於乙夘夏四月八日去始喪才四十日耳萬里一疏無任哀感之至厓山慈元廟久完但未立主耳拙記録去想已經目若西涯閣老有作用之制中别無佳思作得文字强勉塞命無以老朽為嫌也祀典記當與西涯閣老圖之屢聞先生上疏乞休致然每於邸報中未見端的未審何如也近陳進士茂烈過寒舎與語東山先生告歸西涯閣老留之疑先生未能去者以此故也又得五月二十日書良慰想仰先生即日命駕還東山山靈輒喜雖然先生不忘天下之心山靈未必識也章近有衡山之約去東山非甚逺他日東山漁釣之暇尚能索我於朱陵洞中否耶昔者寄去慈元記稿幸一字批破還示為感又賞倪指揮知感激矣弊邑民得免於盜賊水火之害公一瓢酒之力耳活國者手段固如是耶感服感服里人問徭役告以昔者舟中所聞聽者雀躍交慶如赤子之慕慈母不審比日斟酌何如捄民水火之中惟恐其不早也貪官汚吏侵漁百姓甚於盜賊此輩不除雖有良法美意孰與行之竊謂徭法雖更必痛懲一二貪黷然後法行之可久也祭田事料理恐未免水火之相射欲乞少緩裁之如何恃愛饒舌復彭方伯書古岡陳某薰沐頓首復書大方伯彭大人先生執事新凉惟台履吉慶去冬林别駕過白沙得執事手書後又得所寄絶句詩具悉雅愛繼又聞諸人執事以賤名汚薦尺天官以執事之言為重亟賜允行近者蒙遣守令降臨衡宇書幣煒煌先後疊至太守執􅕸宣喻於庭曰是大方伯彭公使某歸陳白沙徴幣也聞命兢惶罔知攸措執事當世之豪傑也吾黨以執事為模範斯文以執事為司命廟堂以執事為柱石執事一嚬笑一舉措天下將視以為輕重取舎甚哉執事之動不可輕也僕本麋鹿之性者也雖少讀書全無抱負中歲閉門惟近藥餌好事相傳類多失實執事徒信人言以為可用斯名一出士類揚之閭里榮之僕不知何以得此於執事意者方今之俗亷恥未興將以興之歟奔競未抑將以抑之歟不然執事眼髙一世必不以天下之望負天下之人也夫天下非誠不動非才不治誠之至者其動也速才之周者其治也廣才與誠合然後事可成也孔子曰如有用我者朞月而已可也三年有成聖人過化存神之妙不可一二窺測天下不動不治動以治之聖人與學者一爾未有不須誠以動不須才以治者也如僕者忠信不修章句為陋才既不足以集事誠又不足以動物徒以虛名玷汚薦尺進則無益於事徒喪所守以上累執事之明止則人將以我為固守一節非通於道者亦非所以立大中而奉明訓也二者之慮往來乎胸中幾日而後决之子使漆雕開仕對曰吾斯之未能信開以夫子為的者也夫子不能使之仕何則人之知己不如已之自知茍未信也師不能强於弟子僕自知甚明惟謹素履罔俾玷缺庶幾丘園之義尚足以少禆明時奔競者愧而恬退者勸亦僕所以報執事之萬一也若曰可以仕焉僕不知其可也矧今自汗又作俯仰或過衣裳盡濕此亦郡守所目擊設任之勞事何以堪之伏惟執事察僕之志矜僕之愚而弗强焉幸甚幸甚與陶方伯比聞在師中能坐馬矣幸甚幸甚周二來得書人情世態相見多不合奈何處之交游中有不勸人進者乎某獨不然是以退為進也非髙明莫能亮之承問改題諸墓石可否書法與銘旌略同所以存其名不當云某府君忠烈公則書其自得於先朝者至顯矣後來恩典所加宜列諸神道碑不必改題也李世卿久在館中恐要知不多及又潭溶拘留稻舫稱大府中差人果出於尊意否耶乞降指揮比歲鹹田之入僕於執事所謂待晏子而後舉火者也然非鄧馬二生僕安得坐享此田哉僕與二生約每歲入三分於僕猶以為愧焉黄田第四蓢諸姪與易賛共成之賛比二生用力尤難所費十未酬一伏惟執事擴造化之量垂不朽之仁念僕平生不茍取之小亷不負人之小節無易舊圖則僕始終受賜大矣恃愛輕凟不罪與歐總戎逺枉專使下問某不幸今年二月間先妣下世自是以來憂病相持不復知有人世事忽枉手教具審朝廷大閫外之任寄於公府江之患已平可賀可賀雖然平蠻之頌老朽竊念公忘之昔者斷藤峽凱歌適足為韓公之累此廣右之役所以有煩於今日諸公也公識量宏逺所到豈可涯方地方復民業惟公留意焉病畏多言感公厚愛故及此幸勿示他人以為詬也厚賜謹已拜領感怍無量南井昨為致區區於察院此不贅復張東白内翰承諭義理須到融液處操存須到灑落處僕僻處海隅相與麗澤者某輩數人耳抱愚守迷無足以副内翰期待之重然嘗一思之夫學有由積累而至者有不由積累而至者有可以言傳者有不可以言傳者夫道至無而動至近而神故藏而後發形而斯存大抵由積累而至者可以言傳也不由積累而至者不可以言傳也知者能知至無於至近則無動而非神藏而後發明其幾矣形而斯存道在我矣是故善求道者求之易不善求道者求之難義理之融液未易言也操存之灑落未易言也夫動已形者也形斯實矣其未形者虛而已虛其本也致虛之所以立本也戒慎恐懼所以閑之而非以為害也然而世之學者不得其説而以用心失之者多矣斯理也宋儒言之備矣吾嘗惡其太嚴也使著於見聞者不暏其真而徒與我嘵嘵也是故道也者自我得之自我言之可也不然辭愈多而道愈窒徒以亂人也君子奚取焉僕於義理之原窺見髣髴及操存處大略如此不知是否疾病之餘言不逮意惟髙明推而盡之還示一字僕之幸也比者婁克貞敎諭亦有書來僕既未接其人不可遽有往復内翰儻以愚言為有益擇其中一二可者示之否則置之陳布衣竟不及面而卒當此衰否之極又失此人可歎可歎良晤無由伏惟順時以道自重不宣與賀克恭黄門離隔年多彼此交夢神亦勞止老矣寧復有相見之時耶今年春二月十六日老母傾背毁瘠不能自制與死為隣平生知舊幾人死者已矣存者或失其故步奈何奈何今之論人於出處曰賀黄門賀黄門亦蒙厠賤名於黄門之下豈不以同志者少不同者多耶比歲得所恵書繼又得賢郎北京書甚慰甚􅇺有子如此足矣天將以是大賀之門蓋可知也三十年妄意古人之學衆説交騰如水底撈月恨不及與克恭論之今謂少有見處得其門而入一日千里其在兹耶南北萬里意所欲言非尺簡所能盡里中舉子赴春官附此草草前有詩稿一册寄范長史處託渠轉達遼東久不報為無便耳亮之又為學須從靜中坐養出個端倪來方有商量處林緝熈此紙是他向來經厯過一個功案如此是最不可不知録上克恭黄門歲首已託鍾鍈轉寄未知達否今再錄去若未有入處但只依此下工不至相悮未可便靠書䇿也前紙所録往來書問二首又記夢一首後有林緝熈秉之跋尾通奉去病中不能作書然所欲言者大略不過此而已亮之與呉黄門世美小詩不足以光先徳但比於他文此為切實耳凡觀人者審於愛惡取舎去就之間足以見之矣所貴乎作者謂其言之不妄可以傳逺若筆鋒無力拈掇不起則無如之何與丘侍御承差廿裏來得至蒼梧書起居通例也而何其辭之切切前此兩附問皆不至死者已矣宋先生旦夕臨弊邑將必見之無狀何以致公之惓惓如是耶感怍至矣聖天子念逺方簡命名御史出按治公以井渫之才治之廣右幸甚幸甚夫人之才大小必用之而後見不遇盤根錯節無以别利器閒居竊聞廣右之積弊甚矣斯民之望治切矣樹公道明賞罰去故即新使人人盡力於所事而民被實惠正今日圖任之盛意亦公之能事也老朽何足以知之引領蒼梧徒深向往比與李世卿期至南岳世卿今行矣道路其有藉哉酒楮不瀆謝與葛侍御古岡病夫陳某頓首奉書侍御葛大人先生執事頃者亷憲陶公惠書稱執事之命以平後山碑文委僕為之既辭以不能矣恐執事者不察僕之心而以為慢别簡托扵東山劉先生白之今者趙知縣自省還過白沙復申前命竊計區區之私非但執事與當道諸公雖東山亦未之悉也僕請略言之僕毎讀宋史至曹彬克金陵一事未嘗不對巻斂袵而歎趙太祖之仁與曹武惠之不伐也蓋自出師以至凱旋士衆畏服無敢輕肆克城之日兵不血刃凡所得一十九州三府一百八十縣可謂有功矣武恵視之若無有也捷至羣臣稱賀太祖泣曰宇縣分割民受其禍攻城之際必有横罹鋒刃者實可哀也命出米一萬賑䘏之當是時君不知以得地為喜將不知以克敵為功一念好生之仁洋溢上下自秦漢以來未及見也史臣稱武惠位兼將相不以等威自異遇大夫士於塗必引車避之不名下士噫何以謙之至也易曰勞謙君子有終吉武惠有之今後山之役信有功於民矣諸公豈自與耶此賊近之省城民遭其毒者幾年于兹前此有司固有任其咎者矣夫以今日平盜之功補前禦侮之不及正相乘除在於仁人君子之心視民如傷豈容有彼此先後之間哉夫上之治民當休戚同之夫久病者不以得一日之安而棄補羸之劑病飢者不以得一飯之飽而忘終歲之憂執事試求之百姓憂樂之情而忘其在已必能以趙太祖之所存者處民以曹武恵之所存者處功則光明者益光明矣以僕觀於一時開誠布公未有如執事舎已從人未有如執事樂善忘勢未有如執事以執事之才應天下之務何所不可僕所望於執事者非直以曹武恵輩人為法姑舉其一事之近似者為執事言之耳惟亮之裁之復江右藩憲諸公七月二十四日僕方困暑閉齋獨卧而李劉二生適至書幣交陳輝映茅宇僕再拜讀書識其所以來之意不敢當匡廬五老名山也白鹿名書院也諸公皆世偉人也修名山復名書院之舊希世偉事也僕生於海濱今五十有四年矣未始聞天下有如是之事悠然得趣於山水之中超然用意於簿書之外旁求儒師俾式多士將以培殖化原輔相皇極以無負於斯世斯民也於乎盛哉昔朱文公之留意於斯也一賦一詩足以見之其與諸公之心蓋異世同符也諸公讀文公之書慕文公之道亦罔不惟文公是師也自文公歿至今垂四百載仕於江右者多矣其間有能一動其心於白鹿之興廢者誰歟文公固有待於諸公也諸公誠念之不宜謀及鄙人鄙人非不欲斯道之明也學焉而不得其術其識昏以謬其志弱以小其氣乏餒其行怠肆其文落寞而不章歲月侵㝷老將至矣其於聖賢之道非直不能至而已其所求於其心措於其躬者亦若存而若亡雖欲自信自止而不可得况以導人哉百鈞之任以與烏獲而不與童子慮弗稱乎力也故夫天下之事慮而作者患恒少不慮而作者患恒多千里之足不蹶於逺途萬斛之舟不沉於大水其才足以勝之非不慮而作者也使之不以其誠任之而過其分與自欺而誤人者其失均耳諸公獨不慮至此乎天下有任大責重而禄位不與者茍能勝之則至大至通無方無體故能為天地立心為生民立極為往聖繼絶學為萬世開太平所謂建諸天地而不悖質諸鬼神而無疑百世以俟聖人而不惑此其分内也宇宙無窮誰當負荷伏惟諸公念之慮之勿遷惑於衆口期匹休於先賢収囘束幣更聘真儒俾諸士子有所效法以無負於今日之意也幸甚幸甚與李白洲憲副近者諸姪以鹵田之訟上干臬司此未論是非只觀古人所以教於家化於州閭其道何如甚可愧也甚可愧也今聞臬司公處分之一一論之如法加强占者罪恐其不堪故具此白此輩愚民亦嘗遣人諭之不肻信卒罹於法誠可哀憫伏乞先生操縱法外之意曲垂寛貸老朽此外别有處之使知感激彼此無怨乃為盡耳亮之裁之干瀆死罪又郁丞來得手書并近稿二幅元日扶醉等作殊有意思非但言語之工而已也來喻所以處病夫至矣病夫何徳以堪之頃答張主事書尚未聞於左右耶北門園池之勝孰與潭州山泉先生富馬之惠孰與𢎞農公今且使病夫為邵堯夫乎為戴簡乎病夫得附驥尾為羊城添勝迹於後代豈假言哉破數百金先生不惜與人顧受之者未易耳病夫平生山水稍癖待明年服闋後采藥羅浮訪醫南岳上下黄龍洞嘯歌祝融峯少償夙願然後歸拜先生之賜未晩也河洛後天數過九九病夫一生不受人間供養或者其超出六合乎顧别駕送契來且與領狀若委人承管則未也先生亮之又劉門子帯來書信必欲自致白沙不附他人卒歸之水府對之太息而已數日前鄧督府附到東山手書獲聞東山好消息喜慰無量頃者雖遭劾者之口計不足為盛徳累周生行時有奉懐拙詩想聞之一笑區區憂病之餘精力日不如舊但偶未死耳無足為故人道者㝷醫南岳耿耿一念未能出門蓋自去秋七月感風手足不仁至今尚未脫體嶺南地方冦盜日益民已窮而徵斂無已天下理亂所闗謂何誰其憂之北門園池之惠每念及此慨息久之仁人君子之為朋友慮至此乎周生倘及面必能盡所欲言劉門子告回病中草草致此不能悉又數日前山東邦伯之報至矣彼有來蘇之望此有卧轍之憂奈何奈何不審何日啓行制中但有心送南北日逺日踈歲云暮矣復有盍簪之期否耶北門園池之賜聞者以為美談某不欲以一時虛名累左右劵書一通謹封納平生山水債欲償之餘年者託周生口陳髙明想能亮之復陶亷憲使至辱手書承當道諸公欲以平後山碑文見委為之僕竊怪執事之知僕猶未至也今天下能文章富經術言足以取信將來如一時諸公會於省中可為盛矣不自操筆而以委於不能若僕者素無文彩比年以來益以衰病愈見荒落無足觀者强顔為之徒為有識所哂况於多言干譽尤非退者所安區區之私執事能亮之使回謹復又作縣如彦誠其賢未皆古之循吏邑人懐其惠矣議立廟以報之倘以聞於執事頷之民將歸心焉蓋民之所好好之民之所惡惡之此得民之要道也况丁令在官簡於事上執事嘗抑而教之今因民之請廟而與之而遂成其名執事之量宏矣抑聞之千金市駿骨况生馬乎僕知執事百歲後爼豆於斯民當自我始則有徴矣又比日邑中聞執事至凢近年以邑科取民者皆罷之民大悦服為可賀也前此豈不恤其情而强徴之歟感應之機捷於影響願執事永矢此心所以保功名於晩節期爼豆於將來耳憂病中聞此消息不勝慰喜之至謹此布忱未涯瞻奉惟兾以時調攝以慰注仰之拳拳又李剛囘具審福履康佳甚慰懸仰近傳方伯之除的否造次未敢奉賀竊惟寵辱在外惟以時倍加保嗇事獲已力辭就閒此最上策拙見如此不審髙明以為何如荷公厚愛不敢不盡又秋暑既退伏惟體况清和納福勝常頃者陳都閫過白沙具言當道所以論薦執事之詳想朝廷不日命下班次必崇付畀必重執事自此可以樹大勲業酬平生之言而東西託處亦惟便以圖令名不失公私兩全此人情所至願而不可必得非積累之厚其孰能當之某病卧一齋寄名於石而無其實英徳石形峭立或層起十數尺奇絶可愛者能致數片置庭兩隅朝夕跌坐對之志願足矣然須得便舟可付閧然勞人則又非所愛欲也不具又辱手教興師弭患動中機會為可喜也後山禍機久伏使謹於微則無今日之役今首惡既誅暫停搜捕之師宜慎玉石之辨於疑似不决者寧詘法以信恩此則天地好生之仁子孫享無疆之慶執事固有之奚容贅復趙提學僉憲來教摘諸聖賢垂世之言與僕之事參而辨之大抵愛我深而告我盡也僕用是知執事之心一峯明白不欺之心也一峯死僕哭之慟以為自今而後不復有如一峯者今乃有執事幸甚幸甚執事為説本之經訓與僕所以為學所以語人者同歸而殊途但僕前簡失之太略執事見之太明故疑僕之意異於執事而實不異也執事謂浙人以胡先生不教人習四禮為疑僕因謂禮文雖不可不講然非所急正指四禮言耳非統論理也禮無所不統有不可須臾離者克已復禮是也若横渠以禮教人蓋亦由是而推之教事事入途轍去使有所據守耳若四禮則行之有時故其説可講而知之學者進徳修業以造於聖人𦂳要却不在此也程子曰且省外事但明乎善惟進誠心外事與誠心對言正指文為度數若以其至論之文為度數亦道之形見非可少者但求道者有先後緩急之序故以且省為辭省之言略也謂姑畧去之不為害耳此蓋為初學未知立心者言之非初學不云且也若以外事為外物累已而非此之謂則當絶去豈直省之云乎不規規於往迹以干譽目前僕之此言亦有為而發嘗與胡先生言之矣非諷執事也此不欲形於筆札俟面告執事於僕謂無間者也茍事有未當僕得盡言之豈假諷哉僕才不逮人年二十七始發憤從呉聘君學其於古聖賢垂訓之書蓋無所不講然未知入處比歸白沙杜門不出專求所以用力之方既無師友指引惟日靠書册㝷之忘寢忘食如是者亦累年而卒未得焉所謂未得謂吾此心與此理未有凑泊脗合處也於是舎彼之繁求吾之約惟在靜坐久之然後見吾此心之體隱然呈露常若有物日用間種種應酬隨吾所欲如馬之御銜勒也體認物理稽諸聖訓各有頭緒來厯如水之有源委也於是渙然自信曰作聖之功其在兹乎有學於僕者輒教之静坐蓋以吾所經厯粗有實效者告之非務為髙虛以誤人也執事知我過胡先生而獨不察此僕是以盡言之希少留意餘不屑屑又易元至辱手教數幅并諸作見示更相規益有交友之道幸甚幸甚然謂僕示諸生詩末聨有激而發則恐觀者過於求索僕之意往往不然也此詩亦但謂歲月流邁諸生學不加進故汲汲焉告之冀其有所感發而自憂耳至於末聨則為我所以為諸生憂若但如楊朱為我而不恤人則彼楊朱何為者耶於是終告之曰闢楊氏者孟子也豈若是褊哉道固爾也反復言之不過使學者知吾之憂出於當然而不容已則其所當自憂者將惕然於中而益不容已也乃作詩者屬意於此訂頑砭愚咸此為在何嫌於人我為敵與自任孟軻之重耶記語類所載文公力疾與學者語勉齋見而止之文公曰除是楊朱不理會人我即不曾學得楊朱亦此類也執事顧以為不可乎海雲更號極是率爾敢不承教執事録示張東白詩且疑僕更號逃禪不能擺脱此語聞之不覺失笑執事固愛助我者請問今所疑於僕如此果何自來耶若出於東白未可據也東白蓋僕昔論學書中一二語偶未深契而料想至此從而疑之竊恐未為至論只如此詩者偶讀宋文鑑和得半山詩數首論者云陳公甫喜荆公輩人直如此草草僕平生得無巴鼻之謗多類此可怪也聞執事將赴京不獲數侍誨聊復此不一一又古岡病夫陳某再拜書復僉憲趙大人先生執事伏讀來諭執事所以進僕者至矣所以教僕者亦至矣僕一顓愚人耳凡百無所通曉惟知自守而已曩者至京師與諸賢士大夫游日聽其論議天下之事亦頗有益惟是愚懵終不能少變以同乎俗是以信已者少疑已者多也僕之所深與者皆執事同年而獨執事之名未聞也奉附到董給事書其中稱道盛徳不少置僕私心喜甚以為此來當得一見非子仁僕無以知執事然以子仁之言又未嘗不追恨於京遊之日也承喻有為毁僕者有曰自立門户者是流於禪學者甚者則曰妄人率人為偽者凡於數者之詆執事皆不信之以為毁人者無所不至自古聖賢未免見毁於人甚矣執事之心異於時人之心也僕又安敢與之强辯姑以迹之近似者為執事陳之孔子教人文行忠信後之學孔氏者則曰一為要一者無欲也無欲則靜虚而動直然後聖可學而至矣所謂自立門户者非此類歟佛氏教人曰静坐吾亦曰静坐曰惺惺吾亦曰惺惺調息近於數息定力有似禪定所謂流於禪學者非此類歟僕在京師適當應魁養病之初前此克恭亦以病去二公皆能審於進退者也其行止初無與於僕亦非僕所能與也不幸其迹偶與之同出京之時又同是以天下之責不仕者輒涉於僕其責取証於二公而僕自己丑得病五六年間自汗時發母氏加老是以不能出門耳則凡責僕以不仕者遂不可解所謂妄人率人於偽者又非此類歟僕嘗讀程子之書有曰學者當審已何如不可恤浮議僕服膺斯言有年矣安敢爭天下之口而浪為憂喜耶其晦也不久則其光也不大其詘也不甚則其信也不長物理固亦有然者矣僕或不為此戚戚也且僕聞投規於矩雖工師不能使之合雜宫於羽雖師曠不能使之一何則方圓之體不同緩急之聲異也尚何言哉尚何言哉惟執事矜其志而略其迹取之羣咻之中置之多士之列則天下之知僕者無如執事矣幸甚幸甚都憲公雖未見顔色然仰之十餘年矣比聞下車以來徳政之布沛若時雨上自士大夫下至閭閻小民莫不欣躍鼓舞僕固願一見况始者嘗辱一言之譽僕又豈敢自為踈放比於固執者乎使回謹此以復冒瀆威尊惶恐無已復當道疏頃者亡妣出殯之日伏蒙藩臬列位老先生大賢遣使臨祭備極情文光生泉壤不肖孤無任感激慚負之至今者仙舟來過江門扶病褰帷引領流涕不敢任情乖禮以遂謁見之私徒抱哀忱無由上達謹奉疏荒迷不次謹疏與徐嶺南切見本縣近年以來盗賊日生訟牒日繁人情放濫略無檢束風俗惟見日不如前矣未聞有反復之機於乎安得賢守令識理亂之源者與語是耶頃者誤蒙寵顧衰病不出無由進謝自念老病山林徒負虚名無涓埃可以答一顧之辱謹以是言進惟閣下亮之程子曰治天下以正風俗得賢才為本秦漢以下論天下之治者必以復三代為至三代之君何君也其政教何政教也茍欲復之從何處下手耶必如明道先生之言是真能復三代手段也而不見用於時惜哉伏惟大賢為政務實而行庶幾能順復人情為國家樹立長治久安之根本非如俗吏其所用心者惟簿書期會取辦於目前而已也自今而往一令之下一政之行必求其有闗於風俗者三致意焉是誠聽訟理人之第一義也是誠經綸天下之實地也幸甚幸甚與張憲副廷學京師一别逮今六年中間不幸彭年早世僕自己丑得疾以來人事十廢八九雖承訃以興哀乃無疏以奉慰㝷自度於閣下如此宜得棄絶之罪然而終不復疑者誠以閣下愛僕亦猶僕之愛閣下故也比者獲手書三四讀之然後知衆人所以待僕之心異於閣下之心然閣下不欲正言之但微示其端於僕非僕有嫌於閣下乃閣下引而不發其不可者以意示之將使僕深思而識之耳雖然僕何敢以望於閣下者望衆人哉不知其人而好之畏其人之加已而勿與之爭自古未嘗有此也是故始求之深以取困大易所以凶浚恒也言不離乎道行不迷乎窮出處語黙去就之權操而用之必槩乎義茍如是榮辱之至自外者斯任之而已僕之所守如此閣下信以為何如哉僕不善交人數十年間所交其在上者久而不衰惟閣下與莆守潘舜絃而已然止於相愛之深知己則未也而以望於一切之人此僕所以不敢也僕受氣本不多疾病乘之近年以來齒髪都耗精力寖衰故又不樂與人俯仰方將投名山選幽谷枕流潄石而老焉幸而老母麤康諸兒女婚嫁漸次可畢往無日矣閣下仕於朝為臺官其在外也為按察官可謂進得其地矣大丈夫欲行其道於當時自宰執而下宜無有先焉者矣閣下謂鷹鸇不如鳯凰即如引裾折檻請劍斬佞臣頭埋輪都亭將壊白麻而慟哭凡若此類疑閣下小之而不為耳至如明刑弼教保任皇極以壽國家無窮之脈其次抑邪與正彰善癉惡必行已志不為利誘障百川而東之回狂瀾於既倒此宜無不在我者顧猶有掣肘之歎耶閣下昔何所自任今忽諭以乞身之圖僕之所不敢聞也恃故縷縷辭多率易伏惟恕納而賜聽焉幸甚幸甚與黄大參某啟人出處進退去就之節不可茍也非但不可茍仕亦不可茍止始者執事由端陽入省履任之初枉棹白沙獲聞仕止之言夫絶塵歩驟固知其不與凢馬同然不謂得意而往超然脱其銜勒一息萬里如是速也相逢盡道休官去林下何曽見一人非靈徹寄韋丹詩耶流傳世間識者笑之執事真無負斯言哉病卧山樓聞此信息竊以為喜他皆未暇論只不為茍出始終一意進退合義如此於名教何如哉於世道何如哉未審何日就道專此馳問伏乞飛示與戴憲副恭聞執事榮拜憲副之命引領台階倍增喜躍不知微痾之在體也小廬岡書屋近方粗完四方士來遊白沙者於此處之能使退休腐人暮齒不忘于學猶日與二三子周旋考徳問業其中庶幾其少有得焉則此屋之名或者可配此山林無窮是亦執事之賜也并此叙謝帕二方表賀忱耳不拒為榮與胡僉憲提學惠厯久不謝罪罪李山人至蒙賜相山骨髓等書珍感無已僕嘗粗涉郭景純塟書愛其辭約而㫖奥反復讀之蓋無難曉及乎真形在目美惡雜陳則又茫然無所區别以此知讀書非難領悟作者之意執其機而用之不泥於故紙之難也况此經鄭𤣥默所注穴法處謂不得師傅口授終無自悟之理呉草廬亦云提耳而誨之可使不識一字之凡夫立造神妙如其言盡讀堪輿家書不若得其人而問之易了李君經宿别去非久當回白沙其人頗謹厚而又為髙明所與疑亦有過人者苐患無能深扣之耳承喻欲來新會企渇企渇予久卧衡茅未即進拜則有其説布衣陋儒謬為王公大人所愛惟恐不自重以為門下辱矧今士習非古一驕一謟交病天下有識方以為憂如僕者縱不能捄忍助之乎惟亮察幸幸又奉别忽已踰年想望之私無日不爾昨日生員易彬送到羅明仲林蒙菴丘蘇州書札得知先生體况安佳深慰勤企某近又以人事過煩自汗時發畏風如昨閉齋偃卧竟日絶去思慮酬應以俟此氣之復而已下車之始即欲遣人上問尋聞往梧州昨晩兒自五羊回乃知先生自梧州還尚未知何日得拜見也閩中陳剰夫者先生所知不幸去年秋間死矣其人雖未面然嘗粗聞其學術專一教人静坐此尋向上人也可惜可惜舊歲莆田有一舉人林體英來訪白沙與語兩月比歸亦能激昻自進不知其後何如也此學寥寥世間無人整頓得起士習日見頽靡殊可憂也疲極末由往拜專令學生持此候先生起居别後相遇何人伏乞垂示幸幸又某啟昨來枉駕感愧無量承寄示遊山詩改定次聨又佳又佳上下二句大小氣力停勻自是實事魚鳥亦指隱居而言晦菴詩云我是湖山舊主人歸來魚鳥便相親意亦如此或以為形容道體之言則恐涉於太深上下承接不來未知是否大凡文字不厭改患改之不多耳惟改方能到妙處而發之易者恒不能多改比見閣下於此詩略不經意以為當終置之不復改此詩雖不改亦無害但不知其於他文如何深以不及對面一叩為恨後得此紙然後知閣下非吝於改而改之益善日令兒輩誦此二句以為喜昔者嘗聞歐公作一小簡反復改之有改至八九次者歐公期於言者也其不茍有如此宜其傳之逺也吾人大抵以不專之學方其為之也鹵莽潦略而不自知又何怪夫古人之不可及也推之凡事亦莫不皆然蓋非止作文一事而已使囘謹此奉瀆不罪不罪拙作末一章屬意尤切尚未知何日可遂此約男女一大俗緣比於軒冕外物誠未易盡湖山之盟信如何也江山魚鳥何處非吾樂地閣下既以此自信而無疑於僕望終賜之首肯與王樂用僉憲以詩之盛莫如唐然而世之大儒君子類以技目之而不屑效焉則所謂詩之至者果何人哉僕於此道未嘗一得其門户尋常間聞人説詩輒屏息退聽不敢置一語可否問其孰為工與拙罔然莫知也比歲聞南京有莊孔易者能自樹立於辭不一雷同今人語心竊喜之稍就而問焉果出竒無窮及退取陶謝少陵諸大家之詩學之或得其意而亡其辭或得其辭而遺其意或并辭意而失之蓋其所謂夙生暈血終欠一洗之力而又懼其見譏於大儒君子終所謂技不可曠歲月於無用故絶意不為凡學於僕者亦以是語之而無有疑焉者矣又執事懐抱利器退處林下者幾三十年晩用薦者復起為臺官出臨嶺海首舉盛禮酹於亡妣墓前逺近聞者興歎不肖孤無任感徳愧謝之至一峯先生墓木拱矣執事言必稱一峯豈但思慕之不忘而已亦將以一峯生平念念不肯忘天下卒莫達之天下者小試之見道之可行耳夫士能立於一世或以道徳或以文章或以事功各以其所長其出處語黙進退去就不能皆同亦不期於同也執事安於所遇不求其迹之似其未慊於用者姑置之以其能者用之而益小心焉幸甚幸甚某病且老無足為世用或能為執事紀録一二成績以昭示後代慎無曰人莫知我也過辱厚愛謹此復制中不果自書又惠州孔子廟作者不自為記而以委諸人某屏棄筆硯事于今三年矣呉秀才請試之不亦左乎國滅臣死厯代之常若夫險阻間闗出萬死一生之餘猶欲收合餘燼以圖匡復至勢窮力竭然後乃以一死報君故大之大之者謹之也文山與張陸同祀扁曰大忠謹書法也今廟於海陽直取文山所存與其所遇拈出碑之以風勵百代其亦可也不必襲大忠之名與厓山同也拙見如此可否幸裁之幣金留而謝奉和佳作三章近以附五羊驛送去不審經目否餘不及與左行人廷弼片腦大惠也前此寄示傑作兼喻以風水所宜感慰之極不審比日起居何如秋且盡矣拉何山人駕扁舟出扶胥口東望羅浮鐵橋之勝遂登飛雲訪朱明洞天此其時乎因想足下能飄然自適益覺某之匏繫於病為可厭也近藁十數首録在别紙早晩東遊則此紙或可隨行有至飛雲頂且令從者歌之為我通一語於山靈也呵呵黄秀才行令犬子專此馳候基茗山蕉貧者之獻于人止此勿笑與光禄何子完先生門人久别想念無已比年承貺不一張秀才南都還又承寄到坐几一事老拙每日飽食後輒瞑目坐竟日甚穩便也好事者或借出效為之多荷多荷近陳汝學報子完即日謝事歸矣不知其實非也昔者致幣於定山者儀多不足非子完誰其助之然以為求文者可也為老拙非也諸公始作嘉會樓白沙以地參焉耳記者自有其説子完嘗一日在館下顧不能以謙恭自處掠他人之美以為已有耶竊為子完不取也子完出處語黙進退之宜子完自知之非老拙所能與也獨憂定山先生平生故人或因子完之言而為斯文留意焉則未免為識者所議且笑之矣故具此白餘不悉與羅一峯大忠祠碑皎皎烈烈見先生之心矣可歎可賞諸生蒙薰炙歸來又是一畨人物多荷多荷三峯叙文并諸作實有意思但恐入末得禪耳先生欲理會著述及諸外事莫若且打疊令我潔潔淨淨先生平昔所篤信者非朱紫陽乎非全放下終難湊泊是紫陽語否門中有鄧秀才可試問之幹異兒也一日千里寧不厭家雞耶一笑餘不具與莊定山李上舎回辱賻帛為感承口諭比年手足作秋風痺尚未全愈今專托范生往視未知此生能了此疾否耶聞諸李學録之子數日前謝病疏已上甚慰翹企自古賢人出處不同世多議之此豈衆人所能識哉太虚近往來石洞否向揮使處不奉簡因見為道下懇病中不一不一又不意凶變太夫人奄棄榮養前九月龍克温報繼又得周文選書連紙不勝驚怛仰惟先生孝徳純備不幸際此荼毒心死形留何可想儗伏願撙哀自防勉副憂禱某支離之人不堪走哭束芻之忱可見于此惟照察不具與張廷實主事先生門人盜走海上及今不即料理令盡絶後難圖北方信息不到耳竊以為憂也順徳人謗李世卿由呉獻臣王嶺南怪李世卿由某多言孟子曰愛人者人恒愛之敬人者人恒敬之今之愛人者人惡之敬人者人侮之與古不同置之勿復道矣緝熈攜家謁選不過白沙以書來别今有一簡復之昨見范能用道定山事可怪恐是久病昏了也出處平生大分顧令兒女輩得專制其可否耶吾意定山為窘所逼無如之何走去平湖啇量幾日求活一齊誤了也緝熈畏天下清議苦不肻承認耳今此簡與之更不道著一字大海從魚躍長空任鳥飛何與吾事耶謾及之又孫侍御屏置公事千里一顧别後連枉數詩不可謂無意於區區者惜其所急者筆札間細事某且引之於道既有以復之矣又慮薄俗不可處喻人亦難不知我者且以我為慢會間以一言擴之使彼此有益幸甚幸甚又來詩感憤之速足􅇺所朢著此一鞭無難於天下矣他人讀拙詩只是讀詩求之甚淺何足與語此也抑猶有未盡者更諷詠之千周燦彬彬兮萬變將可覩神明或告人兮魂靈忽自悟雖拙作之淺陋能以是法求之恐更有自得處非言語可及也犬子應科在省百凡可告教之幸母吝又承示跋語推之欲其髙反之欲其實用心於内者如是以示一之亦未灑然讀及贈行之作則斂袵歎賞不已林郡博何日過五年不留一字耶舶司昨遣呉瑞卿携所作闕圖至白沙題云若個丹青闕此闕雲窩自有闕人封扁舟一去無消息闕五峯衡山之興勃然矣未審開春能遂行否耶湛民澤近無一耗廷實能過白沙一話為慰然未敢必也又陳留市隱使不遇陳后山黄涪翁一市傭而已耳雲谷老人李孔脩非吾廷實吾安知吾粤有二賢士哉得手書讀之喜而不寐所惜者拙疾拘綴而雲谷已老雲谷將不可得見則雲谷所有者吾安能揣摩之而得其真耶獨孔脩壯年如廷實所稱非俛首當世之人也萬一他日往來雲水之便庶幾一接其緒論以信吾廷實知人能自取反以為快也把渡人去復此病倦不更多及又承喻求静之意反復圖之未見其可若遂行之祇益動耳惡在其能静耶必不得已如來喻搆所居旁小屋處之庶幾少􅇺耳闕之論李廣射石闕曰至誠則頑石可開又述莊子語云置之一處無事不辦此理殊可恱顧今老矣惟日孳孳豈能及此并以告又讀三月廿日書百錢自喜貧者説金子能以此自檢其過人逺矣甚賀甚賀斬釘截鐵工夫將日益但須由其道耳由其道而往無之不至也或謂廷實氣髙好自是不能下人比觀與民澤諸作殊有意思未必盡如或者之論也大凡虛已極難若能克去有我之私當一日萬里其它往來踈與宻可也睡起憒憒不多及又譬之謌曲遺響直唐調耳近見偶拈諸作斬新以為絶倡而何求和者多耶百凡如人飲水冷暖自知老朽所朢於賢夫豈淺淺哉此據景元口告李子長懐集之行恐未免内顧之慮能照之否石翁白廷實地曺又數旬來無一的便故不奉問後山不意騷擾崑岡之焚玉石雜處能無誤傷者乎承示諸作驟看似勝前細看詞調欠古無優柔自得忘言之妙看來詩真是難作其間起伏往來脈絡緩急浮沉當理㑹處一一要到非但直説出本意而已此亦詩之至難前此未易語也文字亦然古文字好者都不見安排之跡一似信口説出自然妙也其間體制非一然本於自然不安排者便覺好如桞子厚比韓退之不及只為太安排也㨿拙見如此不審然否世卿修志邑中近方下手其行恐在冬春之間厓山之遊不遂約秉常早晩可得一會否近稿頗有之倦不多録俟續寄又簡復張君席珍足下僕知秉常秉常知足下故不待面知足下過人逺矣老拙無所為但願足下輩能樹立於世俾斯文有頼幸甚幸甚蒙示諸作健逸可愛但得稍入規矩乃佳耳拙稿數篇録去以待面語浮謗未息老母眠食不忘甚無聊不多及又時矩語道而遺事秉常論事而不及道時矩如師也過秉常如商也不及胥失之矣道無往而不在仁無時而或息天下何思何慮如此乃至當之論也聖人立大中以教萬世吾儕主張世道不可偏髙壊了人也重作别章感感夜坐第二篇佳復時矩對病之藥也蒼梧歸後人事益冗煩暑為災起倒不供行期尚在後八月也都憲有意催促緝熈廷實只在明年春夏間行耳俟面既又近來弊邑夜寇甚於前日有盡殺一家十餘口者矣地方如此不可不早為之所况有大於此者乎意欲就省城内求一地頗幽僻且寛廣及此時築室奉老母居之適得白洲口信亦惓惓以此為言與鄙意正合需者事之賊見幾而作不俟終日可也幸為我裁之數日後令兒輩詣左右聴處分也所欲與語非筆札所能盡非相愛深者告且宻之切囑切囑又半江改稿翻出窠臼可喜學詩至此又長一格矣前輩謂學貴知疑小疑則小進大疑則大進疑者覺悟之機也一畨覺悟一畨長進章初學時亦是如此更無别法也凡學皆然不止學詩即此便是科級學者須循次而進漸到至處耳近稿録在别紙别後所作惟此耳緝熈諸稿覽畢還一字章復廷實心契前日半江遣子來白沙拜謝至則仙舟行矣幸照又章因起倒傷煩諸疾乘之自汗耳鳴心氣虛損肌膚由是不實得七月五日書承養生在去其害生者章之病多自取由不介意生死故一切任之今則末如之何矣古人漏船之喻良有以也他日見雲谷丈人試為叩之曰閭丘之命將懸於豐干之手屈平數語盡攝生之妙或者知之而為之弗蚤終亦無補於漏船不如探囊中一丸與之又恐分薄縁淺者無以當之如何書中斷制平湖去就章亦未敢率爾蓋一時事體所闗萬一有甚難處者非但欲存忠厚而已俟更得其曲折詳細是非不難見也别紙報袁徳純來按治陳邦伯死於道路此於天命亦何所增損而使人動念耶是豈無害於生終不如坐忘之愈也又近來林子逢書頗悉平湖履任來消息大都是雅不勝俗寡不敵衆非但所執者古之道祖宗來制典昭昭亦依不得了可歎可歎緝熈此出固不得已終是欠打算聞去秋九月已在告此直圖歸計耳别無分付也秉常想已就道前承寄手疏賻帛謹已拜領感感歐太素傳好章舊亦聞鄉里有此人但不得其詳耳周文都如省託渠一訪雲谷老隱竟以疾弗果此老自世外恐亦未易謁也溽暑不審體况何似朋友凋落交道陵夷士風頽靡莫甚此時置之勿以汚筆墨可也又左廷弼遺來白金二十兩簡中疑似若只出於東白借助之意則僕已辭之矣會間為叩其的還一字東白販紙失利故不欲受又曩辱佳章并賀儀媿感千萬李世卿行時諸友追餞倥偬不及奉簡亦謂與世卿相知不待面安事簡耶世卿濶達善評文想青燈對榻髙論層出麗澤之益多矣更冀寛廣以來天下不一之善别有贈章勿愛垂示又承示諸作以作者觀之近體可驟看久看則别古選纔看便不似不知平日與秉常論者何如以吾子之才加以涵養之力久當得之未用催促也拙庵記文字議論好非拙者可及但不知較於古人情性氣象又何如也更須自討分曉大作規模不墮落文士蹊徑中乃佳也九月四日章復廷實廬墓詩若未登巻請更作又近作皆已經目詩不用則已如用之當下工夫理會觀古人用意深處學他語脈往來呼應淺深浮沉輕重疾徐當以神會得之未可以言盡也到得悟入時隨意一拈即在其妙無涯每見所作只是潦草如忙中應事無味可味大略如此難一二指㸃病痛處欲告又恐見難而止反為所沮故不欲輒言耳子長亦未有捉摸撞來撞去不知如何用心也如李世卿平日自負至論詩則以為甚難不敢出一語亦近方得覺也秉常南京寄來諸稿讀之不能竟又不知所養者近來何如也别紙録去拙作閒呼子長共讀之懐世卿末一聨以問容一之亦不能了知音者真難得也正月人日石翁書復廷實侍者前柬相達見漢清囑勿漏恐倉卒生謗也草率石翁云又半江十詠接引意然有次第前後一一相照求東所為作一跋為此號者謝徳明居邑之南郭疇昔有桓温少年之習喜其勇於改革閉户不出與俗交者四年矣鄉曲往還忠於門下者也跋中略見此意然亦不必專繫其人也若興動和拙詩亦可不必跋也髙作毎見跌蕩可喜但不知置之古人文字中能入得他規矩否如王節婦墓表只似信手寫出古之作者意鄭重而文不煩語曲折而理自到此等處似未能無少缺也何如觀其言可以知其人彼沉酣世味者泥滓滿腔又惡可與論此哉讀漳州功徳碑絶句别紙録上兩山先生一笑得便即寄去也餘不悉又承屢寄示近作得之憂病之中雋永之味咀嚼不來尋常喜言詩值小煩惱開巻釋然今則末如之何矣合是障得重後與物扞格非干詩力弱打不破也藏之篋中俟他日披閲又文祥兄弟繼逝甚可憫也存者季弟諸姪能不墜其家業否文祥始從湖西游頗見意趣後為仕進累心遂失其故歩至不得一第而死是非命也夫人生幾何徒以難得之嵗月供身外無益之求弊弊焉終其身而不知悔惜哉頑姪景鍾最為老母所愛今之亡也正如來詩所謂奈何奈何老朽此旬來體中頗熱甚無聊不一一又李世卿承箕也不逺數千里來訪白沙朝夕與之談英偉特達鄙陋當世欲於聲利外立脚者非但文辭之工而已期過秋方還嘉魚因便能一來㑹否耶又東所寄東壺字韻下五首遣辭寛緩稍就沉著可以朢作者之庭矣謂非學力可乎自餘皆不及此至日在病數首近日方寄到近作皆勝舊聲口與拙作相近可愛可愛晦翁自云初學陶詩平仄皆依韻閉門兩個月方得逼真自古未有不專心致志而得者更朢完養心氣臻極和平勿為豪放所奪造詣深後自然如良金美玉略無瑕纇可指摘若恣意横為詞氣間便一切飛沙走石無老成典雅規矩蕩然識者笑之矣字韻首句以閒字易眠字何如間字韻第二句當改途字韻俯慙作毎慙佳目昏筆駑不能一一又久病未脫體猥蒙督府鄧先生數年知待之厚無以報之甚懸懸也昨承見示和答督府見寄髙作病中牽勉次韻一首少見區區近見邸報京師戒嚴正求才如不及之時也東山先生為天下屬望不見起取甚以為疑故末聨及之雖受饒舌之誚所不敢辭也國家安危所繫全視用人何如耳且如我兩廣地方雖逺然用人小大得失事體則無二致人才有無顧作興如何耳倪指揮可用之才久被誣在獄人共惜之當道處分如此因循不决下人不免有疑且將以倪某為覆轍而怠於立事此事雖微所闗於國家用人之機當轉移以救一時之弊則甚急也若見督府言次可及無吝一言謂此能分理一人之寃尤未也有益於地方用人有益於國家不可不慮也切囑切囑又得定山三月九日書云於是月告病不識此幾發之早晩在考察前尚有一分之説在考察後則更無説矣拙詩云百年將滿日心亂不成詩易曰見幾而作不俟終日竟何謂哉據如是殆不可開眼衡山之行吾其可已耶緝熈書中怨非已者云一涉宦途即為棄物天下固有棄之者矣章何敢棄朋友也報帖即封寄緝熈雖非所喜然不可不報也五月十八日石翁書于碧玉樓雨中廷實閲此簡畢有便轉寄民澤可也又省城之遷不决緩急無所歸决恐干累於人今歲創修祠墓凡五處財用竭矣不如且置之近聞總督之請於上萬一東山復來地方可以少安亦未可知也廷實念我深不自知其傷於饒舌昨見白洲憲長問何以不决老朽不敢盡言正為此也蓋有離世樂道如戴簡以居東池之地然後可當𢎞農公之賜主之以鄭公司馬在康節則可無康節之才與量豈不為識者所譏乎有可得之勢無可受之義取舎之間甚不茍也亮之亮之又承示楊栁之曲情蹙辭盡幾不可讀樂莫樂兮新相知悲莫悲兮生别離騷人真得此心所同然耳沿途遇便風得一字為慰慎無若區區之懶也近來弊鄉東西盜刼連夜白石譚蘭雪一家遭害馬黙齋輩剝床以膚可畏之甚眼中惟倪舜祥可委捕盜一事顧今無可告語者未信而言將不免於人之我疑况於欲取一善之長而遺衆疵之短主者豈能聽此一夫之言而遽為之予奪哉但為鄉里憂盜之至不得已而有言耳見子長寄定山先生詩可是率爾定山豈可輒寄以詩耶後生且存取謙退此進學之地也仁夫會間多為申覆見示諸作實有意思更不奉字章白廷實從者又前後寄到病中志喜及寫懐諸作讀之歎曰進修在我成我者天也雨山先生識量終非時流可比前此廷實不以出處之義告豈非惑耶今而後父子間自為知已他人莫能與也幸甚幸甚漳州功徳碑絶不類時様文字亦一奇也中秋食冷芋腹中作痛連日痛已當為作絶句詩寄漳州託林蒙庵刻于功徳碑隂以彰太守之美可否俟報又近承寄示手稿讀之比舊稍勝莫有悟入處否秉常亦毎有新得大抵辭氣終欠自然廷實乘快時有觕硬處不類此情性所發正在平日致養到醇細處則發得又别章告廷實侍者稿通五紙看畢煩寄秉常以代一簡又秉常近會否何久不聞耗也前承録示贈安指揮詩序讀之令人快意亦一時傑作也章閒居和陶淵明古詩十餘篇一二篇中頗自以為近之欲録去一笑未能也廷實近作詩否不必作不必不作道固爾也近看祭鱷魚文作絶句云刺史文章天下無海中靈物識之乎可憐甫李生人世不及潮州老鱷魚録去一笑又袁侍御無病暴卒於龍川其跡可駭不審當道何以處之張兼素一病遂不起昨見李僉憲云此訃得之朱茂恭侍御當是的耗也天道於善人如此如國家何平生交舊凋謝殆盡聞此殆不能為情也哭而為之緦踰月乃已聊以申吾心而已兩山先生近眠食何似服藥見効否古今庸醫誤處方殺人如麻此不可不慎也非久遣犬子往奠徳純先生不知柩行在何時便示一字近稿奉寄廷實見意承惠書已悉近况行人告急不及奉惟心照又右稿寄束所収閲病久轉覺淹淹無以自解倘還一字以自廣是所朢也卜者多云此病至立冬節脱體立冬在今九月二十四日去此不逺今病如此恐未為的斷如何如何只得順受而已此外更無他可仰廷實將安為我謀哉淹病之餘聊此草草又承欲學詩自古未有足於道而不足於言者也學人言語終是舊套子長病小愈曾親見之否耶子長服黄栢不死必且以黄栢為有功諸君為子長憂黄栢也白沙村裏老人呈縣發去渡船一夫造言百喙交扇亦有數乎哉數旬來左手足不仁毎於中庭起坐卜者謂必至大雪前後疾乃可平是亦數也寳安道白日殺人可畏北方信息近復何如民澤還增江非久龔志明亦還潮地方多虞朋友各散萬一不免避冦之行奈何病卧山樓如在井底凡有聞但頻示數字切望切望九月十三日章簡復廷實足下送丁一桂詩不可不作就付來登巻石齋書又承喻出處與逃患兩事此重則彼輕足下之論偉矣但須觀今日事體所闗輕重大小酌以淺深之宜隨時屈信與道消息若居東微服皆順應自然無有凝滯孔子曰知幾其神乎今以衆人有滯之心欲窺聖人至神之用恐其不似也更俟他日面論以决之見示與時矩詩痛至然知其不能回矣惜哉先夫人挽詩不詳善行只如此亦何益於死者聊以紓足下哀思耳奉去茅筆書通六紙凡書視筆楮工拙是固不能工也勿訝又廷實守道無求於人攜十數口在路日飯米一斗何以給之使内不遺於親外不欺於君進退取舎槩於義此古人難之非直今日也自廷實别去每念廷實至此世之論人物者觀其外而遺其内以是為非以非為是者多矣在人自審處何如古人不必盡賢於今今人不必不如古但當日勉其難勿輕自恕此則區區所望於廷實者不敢不盡也李子長在館中已半月梁貢士告行草草奉此不能悉不能悉别詩奉懐廷實世卿録與世卿紙此不再書又傳曰道在邇而求之逺事在易而求諸難又曰行之而不著焉習矣而不察焉終身由之而不知其道者衆矣聖賢教人多少直截分曉而人自不察索之渺茫求諸髙逺不得其門而入悲乎次韻廷實見寄二首其言因廷實而發非專為廷實也又承録寄近稿讀之作者如是豈易得然便謂之然竊恐未然不審廷實自視以為何如也言詞不能盡人詞氣足以見人有諸内形諸外誠者觀之思過半矣故老朽嘗謂文字之學非也學豈在詩耶廷實資甚明敏當以古之立言者自期彼汲汲於人之贊毁無病而呻吟若是者亦何與論斯理也病中不多及遺言湛民澤孟子見人便道性善言必稱堯舜此以堯舜望人也横渠見人便告以聖人之事此以聖人望人也吾意亦若是耳竊附孟子横渠之後彼何人哉予何人哉有為者亦若是文王我師也周公豈欺我哉區區之意在覽者深思而自得之既以寄民澤亦以告有志於門下者咸得自勵而日勉焉非但為美言以悦人也與平湖語連日不如與賓州一尺簡易曰初筮告再三瀆瀆則不告此教者之事夫豈有所隱哉承示教近作頗見意思然不欲多作恐其滯也人與天地同體四時以行百物以生若滯在一處安能為造化之主耶古之善學者常令此心在無物處便運用得轉耳學者以自然為宗不可不著意理會俟面盡之民澤足下李世卿書來問守臺者老朽以民澤告之冷焰并騰殆出楚雲之山蓋以勉世卿使求諸言語之外如世卿可惜平生只以歐蘇輩人自期安能逺到賢郎在病可徐徐而來眼中未有能奪公楚雲手段也五月十二日石翁書此學以自然為宗者也承諭近日來頗有凑泊處譬之適千里者起脚不差將來必有至處自然之樂乃真樂也宇宙間復有何事故曰雖之蠻貊之邦行矣今世學者各標榜門牆不求自得誦説雖多影響而已無可告語者暮景侵尋不意復見同志之人託區區於無窮者已不落莫矣幸甚幸甚楚雲雖日望囘萬一髙堂意有未安亦未可率爾行也珍重草白民澤進士章久處危地以老母在堂不自由耳近遣人往衡山問彼田里風俗㝷胡致堂住處古人託居必有所見儻今日之圖可遂老脚一登祝融峯不復下矣是將託以畢吾生非事遊觀也三年之喪在人之情豈由外哉今之人大抵無識見便卑闒得甚愛人道好怕人道惡做出世事不得正坐此耳吾輩心事質諸鬼神焉往而不泰然也耶病中不欲多言幸以意推而盡之未可草草也五月五日石翁書復民澤侍者民澤足下去冬十月一日發來書甚好日用間隨處體認天理著此一鞭何患不到古人佳處也章自去秋感疾迄今尚未平昔者髙堂未傾病輒叩天願少假之年今廬岡之木且拱吾何求哉其未忘者衡山一念而已皇皇靈芝一年三秀予獨何為有志不就其可念也夫其亦可歎也夫廷實近多長進但憂其甚鋭耳子長病且愈曰髙音耗亦無黄巾納婦館中惟一之與服周教諸孫海北汪提舉向慕亦切作懐沙亭於海上此外有修古書院冷香橋之作所費不少恨無以成就之耳民澤在鄉安否禍福原於人情不可不仔細察也謾及之不一一戊午季春三月初二日石翁在碧玉樓力疾書陳白沙集巻二欽定四庫全書陳白沙集巻三明陳獻章撰
