front:
  text: 白沙子卷之四
  hash: sha256:4384f9372237f586d792e17d88f7f9a9945ff3c9367ba6d8e89b6839bd11ef44
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0108_SBCK_004-1a}
body:
  text: 墓志銘表封署郎中事員外郎魯公墓志銘公諱真字伯真別號素軒右副都御史魯公父也其先寧國之涇縣人洪武間大父以寧國守禦民調戌南昌歸老于涇其子通寶由南昌轉戌廣之新會因家焉通寶生公父保輗勤儉理生實基乃家及公而新會之魯始大公長者𥘉輔隊長卒伍爭較曲直不屑為辨而以理譬解之恆愧服謝去于所事尊貴人有過面折之無少回讓貸者告窘或索劵焚之正統間民虞黃賊之患將至挈所有赴城老幼扶携塞路守關者為不便于民公力爭止之曰城守所以扞民民有急冝早為之所奈何拒之既而賊奄至城下圍旬日不解瀕海騷然官出榜招諭民之從賊者公使人于常所往還之地曉以利害所在使民趨避之不疑由是得免于兵患人至今德之公生于永樂癸未某月日卒于成化甲辰某月日享年八十有二先是豫歸自亰師未抵家前一夕夢見公化為嬰孺嘗夢數人為嬰孺者輒死未幾公病遂不起嘻豈非數也耶公娶同邑訓科周旋之女賢克相公先公若干年卒葬歸德里之鳯山子男六人長曰賢先卒次曰能即都憲公曰英曰俊曰秀曰傑英秀皆義官俊未仕傑陽朔訓導女二人適何宏葉蒼及公之存孫男十五人曽孫幾人夀祉子孫之繁人以為積善所致也都憲公由進士官戶部以其官封公署郎中事貟外郎贈母冝人初有司命選武衛子弟之良者入學公環視諸子以都憲公充選蓋識之于稚孺時也都憲巡橅甘肅公訃至解官歸薨于路諸弟奉公柩將以今年丙午冬十二月十九日合葬于鳯山之原以狀來請銘吾先子處士與公舊思先子而不得見見其所與猶父也不銘公墓奚以辭銘曰源之華舒舒柯之實纍纍人無固本兮草木弗如澤不竭兮公之餘我銘示後昆兮勿替厥𥘉朱君惟慶墓志銘君名惟慶字汝善桂陽外沙朱氏贈資政大夫右都御史諱思諫之子故太子太保誠庵先生之弟也君生三歲而孤兄弟二人同受學于掌教凌先生某先輔太保儒學生貟次將輔君家籍戎偏橋衛有司以君充戌母夫人胡氏謀盡棄其所有以贖君君奮曰男子之始生也懸弧以志偏橋戌于吾何有貨以圖之不恤家恤我遂太夫人心室如懸磬使吾兄朝夕憂衣食之不暇而暇為筆硯憂乎於是毅然請行至則見者無貴賤遇以禮不敢以常卒伍例視之其地有橫蠻黃一竒奪孀婦李氏為妻君于其夫為族兄弟李氏使人告難於君斷一指以示信蠻知禍將及亟餽金以冀免君叱以狗彘即日以其狀白於官捕蠻投衛獄死焉君僯盜者君知之而未能徙盜憂不見容以所劫帛獻君從容喻之於義火其帛盜亦感悟都指揮告某由是重君為人將謀進之君一不以介意而獨以母老哀鳴一衛憐之遂得解伍以歸間奉太夫人來廣就其兄參議之養遇鹽啇餽白金百餘不顧而去其在困也不自卑而失守其處亨也不藉勢以徼利其才如此與太保俱學其不遷業于戎伍以需其成其亦可觀也夫君娶何氏生男子四人恆亦選節女二人長適何紹箕次適胡紹海君生于永樂己亥十月十五日卒于成化丁未二月二十五日夀七十及君之存孫男十人玭珸璠珂琨珦琯玠璝琚恆與諸弟卜今年十二月辛丑葬君里之栗堆節以其狀走南海干銘于豫為請者曰太保知先生者先生以太保銘不可乎乃序而銘之外沙之族何以名詩書先後著簮纓汝善可欲介以清匪我不學困于兵搜抉幽隱為君銘有譽于試惟我徵李子髙墓志銘君姓李氏諱昻字子髙別號鈍齋少孤奉母王氏孝謹處于兄弟之間上順下友宗黨稱之景泰庚午之秋母以兵革之患客死金陵君得報慟絶失于顛沛之𥘉不能捐生以赴飲恨而卒豫從何宗濂迹君甚矣君之所為不足以盡君之心也遭時擾攘母子兄弟異處君獨以一身周旋其間恩非不足于膝下而病于仁愛非不足于同氣而窮于智天地鬼神臨之親戚朋友鄉黨孰不知之而終不足以釋君之心至不能暝目以死甚可哀也君與宗濂同邑里世居番禺之沙灣宗濂久從豫遊實君之子壻也與君之族子珍撰述君之世次行實為其子孫請銘於豫君名臣之後八世祖文溪先生忠簡公諱昴英宗龍圖閣待制尚書吏部侍郎考諱彥章君娶同里趙氏生子男一人曰元宗早卒女一人適宗濂者是也孫男四人振綱振𥙿振安振芳君之生以永樂甲申其卒以景泰辛未二月二十六日年四十八是年冬十二月二十八日葬里之金叉山趙氏祔焉狀稱君長厚恬靜自適喜讀書手未嘗釋卷尤樂吟詠春秋致嚴于祀事接人無親踈一以誠宗濂當不我誣也銘曰生不足歸於天義不足何有於年烏呼子髙之心匪我銘之而誰與傳處士陳君墓志銘始者郡諸生馬龍為其友陳東淵乞銘其祖父處士忍庵之墓于我生之言曰處士居增城之仙村無聲色嗜好以亂其耳目無形勢奔走以瀆其交際無是非毀譽以干其喜戚上下原隰相地之便冝冝田亦田冝圃亦圃長鑱大笠往來于蔗畦稻壠之間躬樹藝自旦至暮不少休收田圃之入以𥙿乃家夫處士行乎無名以能拓土業治生為樂事故不知老之將至敢以是請惟先生念之將無擇于細大而卑之銘既而東淵承其父永榮君之命來謁豫白沙館之小廬山精舍自冬徂春戀戀不忍別去余逰崖山東淵請執杖屨以從余既與東淵凡所紀述令一一録之東淵朝夕侍我側略無一言及于銘余亦重之乃命取馬生之狀來考其世之粗可知者始遷番禺之祖宋天聖間教授南雄儒學因家番禺生五子曰守寧者遷增城山美村數傳至朝奉大夫文德有女適李忠簡公文溪先生其中子曰汝霖為縣尉縣尉以下至處士九世其遷仙村自文德始處士諱誠字致明質木少言與物無競非橫之干直受之而不報故自號曰忍庵云處士娶伍氏曰永榮者其子也一女適徐禧孫男三人東淵東沂東瀾處士卒弘治戊申四月十三日年七十三永榮以其年冬十二月某甲子葬處士于曾岡頭祖塋之左未銘烏呼一善可稱也亦可傳也顧處士於余𥘉無一臂之交與之銘以一馬生之言猶未也豈不曰東淵在白沙館下能謹子弟之職事先生于厥祖有光耶此吾所以為處士銘也其詞曰世無我遺安以隱為世不我須其隱亦冝不求異乎人不求合乎人委歲月于農圃手足胼胝既𥙿其身又以及其後昆則以彼之危易此之安以遺之其不可也復奚疑處士李君墓志銘幼而能求父書于死喪顛沛散亡之餘長而能誦朱文公資治通鑑綱目真西山文章正宗及他書而不以媒仕進志非不立也才非不充也冨貴貧賤愛惡之出於已非與人異也父殁于官母挈諸孤匍匐萬里扶護來歸憂極成疴是以不能去離左右旦夕與婦謀所以便母者母痛亦痛母飯亦飯其兄慷慨嗜酒衆目之為酒豪一飲或盡酒一石每出從所親飲自旦至日晡既醉而歸率諸卑幼迓于途或徑至飲處扶前曵後徐徐而隨肅肅而趨莫敢少拂其意雖以弟之貴窮公卿自視漠如足未嘗至公府若是者吾謂之賢不可乎此故處士嘉魚李君行實之著於州閭吾聞其子承箕之言也李氏之先世自西江武寧來居嘉魚至名逺仕元為譯史君之四世祖也大父奐洪武間舉巡檢父善教諭敘珙咸以弟官贈至通議大夫副都御史祖母熊氏母童氏懼贈淑人君名阜字元春伯曰陵是為酒豪非直酒豪于義亦豪季曰田曰郊田即所謂貴窮公卿而以其官贈三代者也兄弟四人相為師友而庭無間言君娶鄧氏承芳承箕其二子也皆舉進士有名長女適王巨臣次適遊恢皆蒲圻儒家子承箕以今年首夏至白沙留數月不去因得問君家世之詳君年五十一卒葬蒲圻之某山今七年矣承箕至是屬豫以墓銘豫少不樂多學老益孤世豈以文而望豫何承箕所嗜與人異謹為序而銘諸有道于此匪難匪易能者謂賢不能者耻母疾子侍弟扶兄醉堯舜之道孝弟而已寶安林彥愈墓志銘君姓林氏諱彥愈字抑夫居室外種竹十數箇自號曰竹齋君上世閩之莆田人有諱喬者宋紹定間為廣州路別駕卒于官其子日新葬之寶安之茶園山因家茶園日新生慕升慕升生可久可久生茂賢茂賢生信本娶黃氏君之考妣也自別駕至君凡七世世為茶園人君姓快朗贍于才而周于事有忤之者聲色為突然其消也可立而待少衣食于賈賈所至勘耳目所接事好惡久之若有得者手書小𥿄帖示㣧兒光曰樹立冝如是乃范文正畫粥長白山時事也復卑之全集曰是為汝師居常于外見一名文字時所稱者亟手録與光擕錢入市買書卒惟光所欲得不問值寡多光為舉子業夜分起讀輒為戒曰兒勿苦吾聞亥子之交血行經心設令勩形神得官于輕重計不亦左乎欲速不速不欲速速之非善為速者也光既領鄉薦未即仕耒與余遊君益為喜光誅茅欖山為修業之所君笠屐日至視工築不少廢暇時為光録朱子語類至四十三卷值板本出乃已光感而嘆曰父師覆育光得一日於此如得一月一月如得一年不培不暢不晦不光君聞而頷之時論多弗合者君視之漠如也光既杜門欖山同時士往往有紆青曵紫照曜閭里者親舊以其落莫告君裁君為不省答徐呼光謂曰汝學如是欲有立即汝能立吾啜菽飲水死瞑目矣蓋父子間自為知已人莫能間也君虔于事死遇宗族內外有恩接小夫孺子常情所不屑者君惟恐小咈其意治家不遺細碎庭宇必潔畚帚必親田圃樹藝之事與僮㒒均勞逸身所服用非極弊不忍棄至承祭祀接賔客則儼然明盛也嘗以仲秋天日晴朗擕諸子壻暨後生可意者數輩往逰羅浮登黃龍飛雲頂坐磐石引葫蘆酌酒徜徉信宿而後返君所好竒也哉君娶遊氏生二男子四女曰明者光弟也孫男一人曰仲孺尚幼君卒之前一日植菊數本石竹一夲與客行酒笑語竟夕凌晨將起就盥倐逝去實成化己亥四月二十日也春秋六十五光卜以其年十二月某日葬君于銀瓶嶺之原狀來乞銘乃序而銘之先世英自莆田少服賈困魚鹽僥弗長積乃宣誰其徵在欖山處士容君墓志銘東良處士既殁之二十八年為今之成化十一年歲值乙未其子圭始以其墓乞銘于白沙陳先生辭之曰銘以昭德考行豫生也晚不及見鄉先進而今談者亦不聞鄉先進某有某事某異也惡乎銘圭以狀進豫閲狀喟曰是何足以驚動世俗徼譽於鄉黨閭里耶蓋世所恆稱道者其事必有異乎其衆驟而語之可喜可愕故相與樂道而傳之也處士才不為世用施于其家者亦曰為子不得罪于父為弟不得罪于兄為父兄不虐棄其子弟云爾處士之不見稱于時冝也雖然常道如菽粟布帛時而措之如冬裘夏葛不離人倫日用之間故道率其常者無顯顯之形也惟夫事變生于不測智者盡謀勇者盡力捐軀握節死生以之夫然後見其異也而豈人之所願哉處士韜光里閭正終袵席則其見諸銘者殆亦不過是而已茲其常也處士姓容氏名某字某娶阮氏生四男一女處士之生以永樂庚寅二月十九日卒時年三十九圭率其弟珽璿璣以某年月日葬處士于三岡社馬鞍山木巳珙云銘曰伏其龍蛇逍遙雲霞綱紀孝友以𥙿乃家干我銘者其在兹耶朱夫人胡氏墓志銘夫人姓胡氏諱盧桂陽處士胡廣之女年十九歸同邑朱氏為誠庵先生夫人誠庵先生者故資政大夫都御史贈榮祿大夫太子太保朱公英也公幼而𡵨嶷夫人之大父芳見而異之手捫公頂以夫人許之卒定昏焉公自遊邑庠舉進士為監察御史歷諸大藩政績顯著至入臺為股肱晝為夜思四十餘年無內顧之憂者夫人實相之夫人之事姑也以姑為心以心為孝和氣蒸于一家聞從公于外常擕族孫竒竒得痢病穢不可近夫人親與湯藥夜禱于天曰諸叔祖無一後獨此孫尚存天若弗祐願吾子代之竒疾愈平居事紡績不少替既貴猶以身率下自旦至夜分不寐以為常謂食祿之家惟一侈易流為之鐡簮布裙以防之男未冠女未笄不識繒帛珠翠之華者夫人教之也過蘇見故黎邦伯長子凍餒無可仰給于人為解衣衣之以粟周之顧謂諸子曰邦伯食二品祿足以佑其後人使其家不驕不侈不逞威而作勢以取快於目前寧有是戒之戒之夫人以勤儉成性而教其家不能者約之其視朝領一官暮取諸民作器皿宫室衣服以愚弄其妻子者何如也昔者吾嘗見公於蒼梧服食不踰常人語豫曰吾在于得巳雖一錢惜之而不以病民吾入其室神爽頓清便如向夜入三洲巖秉燭讀蘇子瞻題名陶長官不以家纍自隨公舍人自桂陽來者老蒼頭一人而巳是謂有之不居得而不為吾以觀于夫人事往往槩之公不約而同殆天合也夫人居家事小大處之咸冝至臨大利害決大去就矻然以身當之尤人之所難也正統已已盜起閩浙間公以名御史治盜晉夫人於北京時英宗北狩未返虜騎將薄都城或謂夫人盍去諸夫人面叱之召諸子前曰虜何能為設有不幸臣為君死義也奈何去之夫人先後纍受誥封至夫人揆于德真無愧也夫子五人守孚守頥守謙守蒙守賁守孚舉進士歷官刑部郎中先夫人一年卒守頥守謙未仕守蒙領鄉薦守賁生貟側室徐氏出也夫人一視之二女皆適官人及夫人之存孫男十五人女六人曽孫男五人女二人夫人生永樂某年其卒以成化某年夀七十三是年十月甲子守熙等葬夫人於髙陂祔公墓也以狀來請銘銘曰德之愛孰與色之愛奈何乎配身之華孰與後之華奈何乎家配之既良家道用昌乃天錫之祥蘭桂承芳以世其光繄夫人之澤兮百世可忘歸骨于髙陂兮永與公同藏何廷矩母周氏墓志銘成化八年壬辰四月日番禺何廷矩之母卒卜以其年冬十二月某甲子葬邑之永泰鄉石馬山祔其親之兆廷矩先事告伯兄廷桂以狀走白沙來請銘廷矩在諸生中齒長而賢首率諸生事余余懼與廷矩比諸生咸進曰是生廷矩者也非是母不生是子徵賢母也子冝以其賢銘豫乃閲狀母姓周氏諱某番禺人福建都司都事君諱普敬之女澤庵何先生諱淵之妻性孝敏勤恕始辭襁褓得一果必以獻諸母事針縷刀尺巧不俟教絶人臨事恪而有法勞不厭也博愛而善喻人不待矯而至也年若干歸何為冢婦愛舅姑如愛父母奉賔客如奉祭祀雖居流離未嘗窘戚為滅裂平居處于娣姒得娣姒處于媵侍得媵侍處于族親無貴賤內外尊卑賢否咸冝故視其疾者無不憂哭其死者無不哀也自澤庵殁專家政至是若干年而終春秋七十二子皆已出二女皆巳有歸始新喻胡公以按察僉事提調學校嶺南廷矩為郡學生員以文行見器重及秋將試廷矩一旦謝去公弗能止親舊欲其仕進群來譁廷矩廷矩閉門拒之有讓其母謝曰兒削行為君子耳吾何尤廷矩倍益厲若負重進進不敢為少懈母之訓使然也嗚呼賢哉銘曰昔有尹母和靖實賢今有廷矩豈無母焉卓彼兩母輝光後先我銘其墓以永于傳王徐墓志銘君姓王氏名徐字行安別號蕖軒莆之耕壩里人也自其先大父舜臣父師至君連三世不仕而豐其家君孝友和樂與弟行陽居四十餘載囊無私蓄撫養孤遺以嫁以娶則視諸從昆弟所生同于已子凶歲貸貧者粟傾廪倒囷而出粟雖多不以息歸在親舊者不責償而凡公私勸借助修壇宇津梁陂河水利君亦往往有焉其所濟大者數百金捐之弗計也有司以聞官給冠帶榮之君平居不尚為山林落莫勝日置酒邀賔客飲于臺池社院酣歌徜徉其所與遊者率時之貴人耳君既卒大理評事黃君仲昭狀君之事如此云君兩娶李氏四子某某舉進士未第而卒五女皆適縉紳家君生永樂丁酉卒之時年七十二將以某年月日葬某山某原惠州別駕林君仲璧以大理之狀為致其孤之懇乞銘于豫屢辭而屢復別駕卒與豫書曰必得先生銘以報王君于地下別駕則誠愛君矣寧不愛吾言乎向夕吾夢與人謳􅺾佛記之其辭曰冨而居畎畝體便輕暖口足甘肥左右僮㒒隨意指揮騎欵假坐藍輿出入閭里施施親友相過飲酒忘歸縱觀山雲水月魚沉鳥飛引滿髙歌吹竹彈絲以相諧嬉過此以往舉無所用其心黜陟不聞理亂不知老死岩穴之間蓋福人也賢于世之患得患失者多矣吾猶為子孫碩之其王君之謂乎以是銘君之墓至當尚奚言漁讀居士墓志銘何氏世居番禺之沙灣當宣德正統間有號漁讀居士者名貞字紹元取適于漁常讀書遇良夜皓魄當空水天上下一色居士手持竿線呼童冠三五髙歌走舴艋遨嬉于江歸則焚香占畢坐牅下吟哦過夜分不寐以為常尤喜飲酒子弟取杜詩之可歌者為越聲歌以侑觴居士頺然真率從之飮者孔伯平胡孟時吳侃王子倫皆鄊之名士非四人之儔者弗與飲焉景泰己已之秋盜起南海東西亘數百里沒于賊居士見幾而作不俟終日王師至討叛玉石俱焚始為請于官持檄至鍾村鎮招之全活甚衆沙灣人至今德之居士行必顧義言必顧道將屬纊猶顧諸子申以平日之誨言曰吾世宦之後族大以蕃勿倨以髙寧儉而卑忠信基之禮義行之親賢取善倿者逺之培之埴之勿替書詩先其義後其利薄已而厚彼廣積而約費惟家廟之奉墳域之治賔師之養窶弱之施則致隆而不可復惜俾子孫承守世世而勿以淫侈壞之則何氏之福與家法並傳無涯矣語已而卒居士生洪武戊寅卒之時天順己卯六月十六日也六世祖諱起龍仕宋官至太常大卿考諱志明妣趙氏𥘉娶三山崔氏清獻公七世孫也生子男六人浩瀚淳淑瀞沂女二人繼室簡氏楊氏無子崔氏先居士二十年卒葬里之羅山六子奉居士柩以卒之年十二月十二日合葬其地儷兩繼室焉成化歲丙申瀞始至白沙從豫遊又七年壬寅夏五月乃以其狀來乞銘銘曰世之昧昧奔名與利有卓其英以不混世或貴而賤或賤而貴揮觴以為適投竿以為戲故不知老之將至馬甘泉墓銘宋有名馬其名甚大衛公得之空羣莫駕九世曰􅍬育德于野一本於身祖德勿舍今其歸矣附于馬灑我則銘之後有興者陳冕墓銘伯道有子劉蕡登科責報于天所得幾何邁邁子文蹈此髙墳我銘為子顯于千春志孫杌壙成化丙午之歲秋九月七日景易之婦苑氏生次孫以周易筮之得渙之比占曰渙奔其杌悔亡因以杌名之明年春夏之間疫作里中之兒十五亡于疹杌朝病夕愈面光射人見者咸驚其異未幾婦擕杌如外氏得疾將歸俄而風雨暴至連數日不止比歸療弗及張目視左右泪􅏰然下如不忍捨其母然少頃遂絶七月十六日也杌生質異常兒清揚婉兮太夫人撫之喜曰似其祖又熟察其寢興啼笑蚤夜之有常曰無不似天卑我杌將恤我後我固無以活之痛哉是月己丑葬白沙蓢園岡冡婦梁氏墓左志其壙以畢豫哀云生之異保之未至愧極生哀哀極生愧何以寫之為壙記封燕山左衛經歷張公墓表公諱子真字伯大姓張氏家南海之西滘村自西滘鼓柁並南下得風水之便其至白沙一日耳余嘗聞公於番禺李禎德孚曰有恆人少力田給數口無贏衣食不為耻晚歲既家𥙿又以其子官徵仕郎贈燕山左衛經歷公不色喜自奉飬儉約如歷田時對鄉人輒自稱姓名以語篋命服不以新易故葛巾布裘曰吾素性乃爾即不爾吾敢忘吾𥘉故公之度大一鄊一鄉人咸嗟以為有德余聞士不耻賤貧雖貴冨而弗驕則不失義不離道入於患得患失碌碌為鄙夫以是考公之迹而揆其所用心謂其無以異于今之人則吾不信也公積于家者厚矣余特表其大節以為世勸公以農業起家故自號曰稼軒示有𥘉也葬西林鄉之某原望之木已拱髙其封若馬鬛題曰燕山左衛經歷者公之墓也考諱可達背公于娠鞠公于外氏以成者公之妣梁也生于洪武己酉卒天順辛巳壽九十三妻何氏子男五長者某徵仕郎也次某某孫男八屬于余以表公之墓者徴仕郎所出丙戌羅倫榜進士泰也近以宰沙陽政最被徵時徵者類有御史之拜云祭文禱雨祭五方土神文代丁知縣作六月不雨田苗將稿愆伏為災孰非天造探殃所由誰實召諸惟令不令斯民何辜神不宥過某敢辭死碩沛甘澤以緩赤子禱雨告各神文代丁知縣作邦有常祀祀為邦主食民知報罔間今古神冝惠民民實賴之彌月不雨苗則稿而某忝為令我民是軫敬祈神休蘇我民窘謝雨文代丁知縣作今令所急者簿書期會而巳政教不修何以為邑徒食七品之祿以在民上安能使隂陽和風雨時乎故若某者履任以來未及一載惟不能修厥職而亢旱是憂幸賴天地神靈閔民之窮降兹甘澤誠忺誠荷謹具牲醴用答神賜惟神尚終惠之使永有年祭大忠祠文代丁知縣作儼其堂堂沛其洋洋是謂正氣至大至剛上有青天下有黃壤不亡者存薰蒿悽愴維兹仲春謹以牲帛醴齊粢盛庶品式陳明薦尚享祭菊坡像文先生宋代之名臣吾鄉之前哲卷舒太空之雲表裏秋潭之月淮蜀委之而有餘疑丞尊之而不屑故能效力于當年而全身于晚節猗歟先生挺生南越廣厚深沉清通朗徹藐豫區區心馳夢謁稽首丹青點兹頑鐡庶幾百年不逺途轍秋菊之芳寒泉之洌奚而薦之用表真潔祭先妣林夫人文維弘治十年歲次丁巳冬十月已巳朔越草又一日己丑孝子陳某敢昭于先妣林氏夫人友人刑部主事蘭溪薑麟肅具香一束帛一端俾告夫人之墓焚之以表哀慕之誠謹以茶酒時撰用申虔告祭先師康齋墓文維成化十八年歲次壬寅十一月日門人新會陳某被徴赴闕道出劍江謹具牲醴告于先師聘君康齋先生之墓曰於乎元氣之在天地猶其在人之身盛則耳目聰明四體常春其在天地則庶物咸亨太和絪緼先生之生孕三光之精鍾河嶽之英其當皇明一代元氣之淳乎始焉知聖人之可學而至也則因純公之言而發軔既而信師道之必尊而立也則守伊川之法以迪人此先生所以奮起之勇擔當之力而自况于豪傑之倫也先生之教不躐等由涵飬以及致知先據德而後依仁下學上逹日新又新啓勿助勿忘之訓則有見于鳶魚之飛躍悟無聲無臭之妙則自得乎太極之渾淪弟子在門墻者幾人尚未足以窺其閾域彼丹青人物者或未暇深考其故而徒摘其一二近似之迹描畫之又焉足以盡先生之神某也生長東南摳趨日少三十而後立志五十而未聞道今也欲就而正諸而悲不及先生之存先生有知尚鑑斯文尚享祭太子少保朱公誠庵先生文代陶廉憲作烏呼公不為矯矯亢亢以要譽于衆口而其端方儉約以事乎其上者足以為忠不為烈烈轟轟以震耀于當世而其清靜簡易以臨乎其下者足以為㓛昔者兩廣盜賊充斥自西而東韓公率師搗穴攘凶兵由義勝民以盜窮公來繼之以守易攻隂慘陽舒相為始終甚矣公之厚于民而薄于躬也一食之費必計曰民其不聊生一後之興必計曰民其不堪故人之遂其生養者若赤子之慕慈母人之免于塗炭者若枯稿之遇春風某奉韓律未弛我弓公曰撫之敢為異同知我任我實惟兩公天子以公久勞于外還公于朝齒雖落而志則雄食雖少而神則充于是乎竭股肱之力而效臣鄰之職旁引善類以扶天地之元氣大明公道以夀國家之命脈士以此望于公公亦以此自期胡天之不慗遺俾公之㓛著於四方者雖成乎昭昭之美而公之忠奮于廟堂者未底乎赫赫之隆烏呼哀哉尚饗祭誠庵先生文維成化二十二年歲次丙午冬十二月壬申朔越𥘉八日己卯門人翰林院檢討古岡陳獻章謹具牲醴粢盛庶品遣子陳景雲致祭于誠庵老先生太子少保朱公之靈曰於乎昔我抱病造公戎府公曰時哉母戀衡宇賢才用世小大有輔長笻下山可以撑拄群龍在朝可以參伍皇皇仲尼與世為矩獵較不行然後去魯好髙欲速為戒自古再拜謝公不我色許短疏叩天歸寧老母公曰嘻哉不忘陟岵甲辰之春公委齋斧帝命還臺以親四輔炳如日星衆目所覩我貢尺書傾竭心腑公在廟堂當為砥柱公去廟堂當為鴻羽公攬臺綱閲兩寒暑或弛或張或默或語迹公所為誰奪誰豫萬石之鍾千鈞之弩我欲言之猶懼莾鹵胡天弗弔禍來二竪於乎公乎是謂卷婁豈惟門生匹夫匹婦遼哉郴陽欺我疾苦犬子執巵往澆墓土索𥿄題情涕下如雨於戲哀哉尚享祭袁侍御文思昔南亰傾蓋而語垂二十年君出我處君由進士宰邑太平再蒞冝興廉惠有聲遂簡霜臺來巡弊省未至而孚姦吏縮頸頃以公務過于白沙夜闌秉燭相對咨嗟君病未衰我衰而病進退存亡必得其正與君論易託詩以宣君口不言豈不謂然除虐救民負荷以往止于龍川其勞可想或云非也無疾而萎道路流言將信將疑惟君英明夫誰敢犯茍得其正死亦無憾君司風紀實茂才猷天佑下民而不少留吁嗟君兮民之司命君子之窮小人之幸兼素之訃繼此亦聞海內知已存者幾人烏呼哀哉尚享祭陶方伯文樹立大者不羈小節其行翩翩其光烈烈公攘寇患于嶺西東百里大藩勞貫始終四十年來枕戈捲甲力能誅夷威足鎮壓公在嶺表長城是依公今逝矣人胡不悲某也於公雅匪朝夕東望仙城有泪霑臆昔者枉棹扶病過豫笑語竟日放步徐徐將謂百年精力猶在別幾何時忽此顛沛乖崖將去逸人復來一訣萬古豈偶然哉世烈光前錦衣𥙿後俾公子孫世享其有死生一致公何憾焉有未厭者六十五年惟天命之窮逹壽夭惟心安之泰山毫杪老病日益跬步莫支敬陳薄奠以寫我私尚享祭顧勉庵別駕於乎昔倅我邦公才獨優往二端陽實惠一州通逹萬變可期一面止于郡僚督府之薦公車翩翩愈勵愈鶱一病不起孰云非天少有抱負受知當路衆論同異孰識其故晚節不虧浩然賦歸進退可觀吾寧不悲一息不至今其巳矣神乎洋洋歆此誠意祭丁知縣彥誠嗚呼登賢名于甲榜與多士而並馳試牛刀于小邑稱庶物以平施耻溷溷以希合寧戚戚而謀私嘗錚錚以陷獄亦蹇蹇而忘危故法不貸于豪右而惠可及乎煢婺汛掃淫祠綱維化典載勸載懲條章顯顯雖小人之難化亦向風而革面兩考于茲夙夜有常殷憂成疾二堅為殃方其在病斯民皇皇今其既往行路涕滂此見好惡之公出于人心之天不容巳君雖死而有光念昔從遊禮崇信篤旅魂何之遺孩在目扶護者誰我力不足生死交情盡付一哭想英爽之未亡故莙蒿之可掬烏乎哀哉尚享祭黃君朴文於乎逍遙乎半月之舟留連乎澤垓之酒面圭峯以放懷唱竹枝而拍手春月秋花卷為巳有何百年之未半與衆木而同朽大塊無心孰夭孰夀消息自然匪物有咎委變化於浮雲逹榮枯于踈栁有肉在爼有羮在豆公死如生薦滿一斗祭李磐石公鄉之父兄行也子弟輩事公于兹有年矣公坦直而不華約而有恆其中舒舒其于事得喪無大欣戚又不作冨家翁樣巾屨雖極粗垢不耻也凡公之事如此人之詭譎侈靡者孰不笑之公以此賢於鄉人逺矣烏乎哀哉尚享為景易撰祭劉氏外母文烏乎外舅之生二十八年奄棄之孤孰維其顛恭惟外姑守一秉貞勤儉始終家用不傾男女五人以母為命爰有室家內外各正古之賢母比得則同母于苑氏可謂有㓛自昔于歸迄乎就木德亦可師㓛亦可録於乎哀哉尚享祭伍光宇文烏乎光宇麗麗而強其執則固其謀則方惟其篤于善也不忘乎一飯之頃故其向于道也䆮近乎數仭之墻豫觀之子久矣子𥘉為人烈烈亢亢其味桂薑人不敢嘗世之病子者謂子好伐乖于和而軒于直豫獨畏子感激而慷慨其才如此故變而至善也去故習如脫屣而人之望之也若斷鴻天路之翶翔茍不纒于宿疾限于短命而肆其力于學也又焉可量哉使其辭煙霞而依日月展股肱而佐廟廊砥定海嶽燮調隂陽下撫黎庶上佐元良吾不知子之究於用何如也至若犯顔敢諌正論堂堂可以引𥚑批逆鱗之怒可以折檻干刀鋸之芒直而不回死而愈光若是者非子之望而誰望耶古之榮于進者聽其言若可信也觀其色若可壯也至于臨死生利害之變鮮不回顧而倣徨顧士之可貴者不于其身之彰于其志之臧不臧而彰匪事之常臧而弗彰庸或何傷古之豐于才而嗇于命者多矣奚獨子哉惟其不待生而存兮故不待死而亡夫既信其如此兮又焉論其行藏嗚呼光宇其何可忘祭容彥禮文維弘治三年嵗次庚戌冬十有一月己卯朔白沙先生門人容彥禮之柩以明日庚辰發引將就窆于大田先生許為之墓銘而未具乃命其子陳景雲持庶羞粢盛酒果致奠于彥禮柩前而告之烏呼士而好竒揆道則離士而無竒罔聞于時彥禮之生五十五年于兹矣彥禮之處乎宗族行乎閭里同不同者為誰彥禮之希慕乎古而取法于今而誰與歸觀其所與而人之賢否可知彥禮之墓吾將徵于彼以銘之嗚呼哀哉奠丘閣老文於乎先生之志見于行事先生之言存于著述既大顯于當年必有聞于異代某一病多年老于林下足不至先生之門目不睹先生之書比歲得所遺瓊臺吟稿才一編而已而何足以知先生之大全哉於乎有言依乎教有行槩乎道行由教宣言以道傳沒而有知尚鑑斯言奠何教授文於乎生之謂來死之謂往往來之間奚得奚喪河嶽星辰鼠肝蟲臂小大則殊由其所遇載鳴教鐸載典文衡引年而休於乎先生奠舉人談士直文於乎士直遽至此耶天不與之年與之才將誰咎耶彼碌碌者老無聞于世又何貴于年耶哀哉尚享奠汪海北文烏呼天馬行空步驟不凡自然世外衆莫能參氣雄萬夫德罔二三豫何人哉為公指南修古日新懷沙匪堪譬彼世味甘其所甘江門秋月廬阜晴嵐海北二年朝諷夕談如飲醇酒無日不酣從事數至命我則慙我賦白洋句不待探可以立懦可以激貪雖有百鈞何足以擔擴而充之奚適不堪烏呼千古在前萬古在後上下四方誰無宇宙負大翼者其風必厚惡木道旁往來莫覯昔人之交傾蓋如舊蓋不待傾金石亦透天俾爾才不俾爾壽厥𥘉受之今也奚咎尚嚮奠梁貞文於乎惟正思慕古之人師之非不足于才也歲月永謝於呻吟回翔今之世行之非無其志也科第未殫其胸襟昔之來也碧玉樓中指蒲團而語靜今之去矣白雲何處想鶴駕以傷心果司命之在天不可以人力勝耶抑所養之未至不可委之命耶今館中之士求如惟正者守一而殁蓋亦希矣薄俗移人始終殊歸不自知其非也於乎哀哉尚享奠表兄何處素文維弘治八年嵗次乙卯四月甲寅朔越二十一日甲戌孤哀子陳某謹以牲特柔毛粢盛酒果遣子景雲等奠于表兄處素何君之靈曰當披髮袒跣之𥘉聞兄之訃兄不幸屬纊與先妣同日某摧裂肝肺之餘無由往哭烏呼哀哉烏呼痛哉兄年七十不為不夀兄有二子不為無後死生晝夜萬物芻狗復何言哉尚享奠謝伯欽文烏呼伯欽知吾言否六十年中通家之舊親我事我栖栖自幼情若兄弟為足為手吾行東西不離左右矢心靡它乃君之厚庭有佳植雪霜為寇如何弗顧身木巳􅈬遺憂孔深奚測奚究積善餘慶反躬可久茍無令人天損必受誰其憂之不負良友於乎哀哉尚享告羅一峯墓文維成化十八年歲次壬寅十月某甲子白沙陳某應徵起赴京行過永豐謹具酒果庶羞告于亡友一峯羅先生之墓曰嗚呼先生今曷為而往始曷為而來處則畎畝之逸民出則文章之巨魁其洞徹不欺之心炳中天之杲日而轟動出群之氣殷百蟄之春雷知先生者擬先生於北海不知先生者謂松柟弗類反見目於榆槐先生見賢必親聞善必録遇惡必摧存而知亡過而能裁隨時變化有闔有開而平生念慮所存其大者正君正朝廷正三綱正萬民正四方皇皇之憂耿耿之忠則致死而勿頽貧賤而不為戚患難而不以回成化己丑之夏豫遇先生于南畿盍簮之歡忘形爾汝既三宿而後別去屢反顧而徘徊先生贈豫南歸之文豫處先生草亭之什既而各申其戒曰我不枉已君無鑿壞孰謂先生去官而死曹溪之約不遂麗澤之資何有而今而後復仰望于何誰於戲惜哉宿草之墓朋友弗哭禮之常也非豫與先生之冝也先生有知歆此絮醅尚享奠容彥昭文白沙先生聞生容彥昭將歸窀穸遣子景雲持炙雞之奠告于彥昭之靈曰烏呼彥昭顔子之壽過于彭祖王公之樂不如匹夫彥昭居吾門不可謂不久矣四十一而亡不可謂夭矣已矣乎吾將以悼彥昭者自悼而又以悼衆人乎烏呼哀哉尚享奠容彥潛文白沙先生聞生容彥潛之卒遣其子陳景易具隻雞酒果致奠于容生柩前而告之曰俯江流而鳴咽望雲而山徘徊歎一生而已矣悵獨立以興哀遊好幾時音容永謝致奠一觴有淚如㵼尚享奠伍光宇文壬辰歲首月之二日某甲子白沙陳某過亡友伍光宇尋樂齋撫物興懷􅏰然㵼涕遂命子景雲持炙雞絮酒奠于南山之廬而哭焉烏呼光宇遽至此耶去年今日版築尋樂其聲登登隱然在耳手植庭蕉上墻緑逐日新光宇何之斯文一縷千鈞我輩三綱五典左顧右盻兩壁間聮句想見時當負荷一假精神耿耿不滅天道豫善斯人也而不永年烏乎哀哉尚享告伍光宇文成化壬辰夏六月戊寅白沙陳某奉柬于亡友伍光宇之靈曰一死一生乃見交情某平生於光宇至誠相與無異骨肉不幸光宇早世某在何敢以死生相背凡百舉措一如光宇存時近日家孰刋拙書真草百餘字與諸生臨寫尚有板四隅匡郭未整欲借安仔刀斧一日又所卜屋後山近請得李立武來看云此地三台落穴有氣是可藏矣敢告新刋孔易來鶴亭詩并拙作數首奉去冥覽賦湖山雅趣賦丙戌之秋余䇿杖自南海循庾關而北涉彭蠡過匡廬之下復取道蕭山泝桐江艤舟望天台峯入杭觀于西湖所過之地盻髙山之漠漠涉驚波之漫漫放浪形骸之外俯仰宇宙之間當其境與心融時與意會悠然而適泰然而安物我于是乎兩忘死生焉得而相干亦一時之壯逰也逮夫足涉橋門臂交群彥撤百氏之藩蘺啓六經之關鍵于焉優遊于焉收斂靈臺洞虛一塵不染浮華盡剝真實乃見鼓瑟鳴琴一回一點氣藴春風之和心遊太古之面其自得之樂亦無涯也出而觀乎通達浮埃之濛濛遊氣之冥冥俗物之茫茫人心之膠膠曽不足以獻其一哂而况于權爐大熾勢波滔天賔客慶集車馬駢填得志者掦揚驕人于白日失志者戚戚伺夜而乞憐若此者吾哀其為人也嗟夫冨貴非樂湖山為樂湖山雖樂孰若自得者之無愧怍哉客有張者聞余言拂衣而起擊節而歌曰屈伸榮辱自去來外物于我何有哉爭如一笑解其縛脫屣人間有真樂余欲止而告之竟去不復還噫斯人也天隨子之徒與振衣千仭岡濯足萬里流微斯人誰將與儔止遷蕭節婦墓賦昔兵戈之攘凶盜兮孰倀倀而握之符號令紛其不一兮汨珠玉于泥塗抹之亂之執兵之徇而欲兮胡寧知耻而畏誅若美人兮宗廟之瑚毋我即帶兮毋我捫祛毋我執手兮手可斷而不可汚奮犬豕之罵以冒刃兮貌凛稟其若蘇死則快兮生安用諸嗟此烈婦兮彼丈夫弗如丁侯為縣兮德教用敷表貞冢兮營祭畬行路嗟嘆兮揭聲教于海隅蠢兹弗畏兮託日者以為誣欲改封以自便兮動有識之長吁匪今侯之繼軌兮墮四尺其奚辜我將告外史兮筆之於書贊忍字贊七情之發惟怒為遽衆逆之加惟忍為是絶情實難處逆非易當怒火炎以忍水制忍之又忍愈忍愈勵過一百忍為張公藝不亂大謀其乃有濟如其不忍傾敗立至銘世賴堂銘恭惟我祖渭川府君所立殊衆七十八年漢隂抱甕自是以來我家用開堂以世名德音孔恢家廟鍾銘其質重其聲遲其動靜有時永以為神之依丁氏祠堂鍾銘代彥誠作出佛山冶入濟陽堂厥聲鏜鏜震于無強改鑄樵樓鍾銘并序費而不傷壞則有成同百里之聲存萬世之經我民不信視此鍾銘鍾始造模而丁矦卒惜矦之志不及成此銘亡後有繼之者何以考故録之啓聘啓成化癸巳二月代兄作伏以持鈍舌者必淡顔良易投于正士工巧言者冝令色每見恱於常流蓋夙分之雅同豈強能而苟比茲者幸遇尊親家鄭處士閥閲偉而著眼髙不鄙小弱弟某秀才章句踈而用心苦是故聲氣之相感庶幾物我之相忘雖首院以難諧必東床而獲選鄭髙楊郭幸扳貴邑之甲科馬聶鍾容徒竊弊鄉之啇品侔四姓敢贊一言此不往而彼不來隂則升而陽則降慙魚緘之莫罄念雁幣之冝將浩矣滄𬈑寧郤一蹄涔之水巍哉太華何辭五弓許之陵乞箋起居用慰注仰謹奉啓不宣又成化辛卯十二月作文啓伏以得陋巷顔一瓢趣味儘殊于俗尚著淸門羅三字品題蓋屬于鄉評惟此翁之可人冝吾弟之有室始者曠十年而莫遇訪尋顧屑屑于執巾茲焉比兩姓以克諧期待乃惓惓于舉案正將求閨門之助必無忝伉儷之名至誠斯合于天人素志何疑于夢卜片言賜允束帛冝先懷素履而仰髙山躋攀絶矣接清絃以奏流水風韻悠哉謹奉啓不宣請期啓成化辛卯十二月代兄作文啓伏以鸞膠續好庶幾無擇于高明雁幣將誠蓋巳不嫌于菲薄遂入芝蘭之室况逢桃李之晨須傳采牘以求通當載墨車而攝盛斯文未喪故事冝遵絶言資送之有無盡屬去來之感應遲佳期之甚邇庶獲瞻依承至况之匪加奚勝悚愳謹奉啓不宣與李宗成化壬辰正月代兄作文啓猥蒙不鄙弱弟某遂茲室家之碩實吾子之惠幸甚幸甚某以序次當為主人不得詣吾子躬專請也倘吾子不憚劬于路而以歸羅氏子于白沙某也則願吾子之終賜愛焉説菊逸説草木之品在花桃花於春菊花于秋蓮花于夏梅花于冬四時之花臭色髙下不齊其配于人也亦然潘嶽似桃陶元亮似菊周元公似蓮林和靖似梅惟其似之是以尚之惟其尚之是以名之今之托于花者吾得一人焉吉水處士張某號菊逸蓋賢而隱者屈子曰餐秋菊之落英陶子曰秋菊有佳色浥露掇其英皆以菊為恱者也皆古之賢人也菊之美不待贊菊花之美而隱者也某之托于菊也亦不待贊素馨説草木之精氣下發于上為英華率謂之花然水陸所産妍媸高下美惡不等蓋萬不齊焉而人于其中擇而愛之凡欲其有益於事非愛之而溺焉者也産于此邦曰素馨者香清而體白郁郁盈盈可掬可佩貫四時而不凋供一賞而有餘亦花之佳者也好事者致于余余既愛之遂益究其用取花之蓓蕾者與茗之佳者雜而貯之又于月露之下掇其最芬馥者置陶瓶中經宿以俟茗飲之入焉然則是花之用于人雖不若􅏘縷之與菽粟然蓋亦不為無用也人之資於􅏘縷為其可以溫也資于菽粟為其可以飽也得之則生弗得則死今是花也吾取焉姑以其能郁郁盈盈少禆于茗耳雖不汲汲可也不汲汲由用之可巳也使是花之於人如􅏘縷之與菽粟然又安可巳哉可巳而巳不可已而不巳引而伸之觸類而長之於道其庶幾乎治國其庶幾乎大頭蝦説客問鄉譏不能儉以取貧者曰大頭蝦父兄憂子弟之奢靡而戒之亦曰大頭蝦何謂也豫告之曰蝦有挺鬚瞪目首大于身集數百尾烹之而未能供一啜之羔者名曰大頭蝦甘美不足豐乎外餒乎中如人之不務實者然鄉人借是以明譏戒義取此歟言雖鄙俗明理甚當然余觀今之取貧者亦非一端或原于慱塞或起于鬪訟或荒于沉湎或奪于異好與大頭蝦皆足以致貧然考其用心與其行事之善惡而科其罪之輕重大頭蝦冝從末減譏取貧者反捨彼摘此何耶恆人之情刑之則懼不近刑則忽慱塞鬪訟禁在法典沉湎異好則人之性有嗜不嗜者不可一槩論也大頭蝦之患在于輕財而忘分才子弟類有之蓋其才高意廣耻居人下而雅不勝俗專事已勝則自畋獵馳騁賔客支酬輿馬服食之用侈為美觀以取快于目前而不知窮之在是也如是致貧亦十四五孔子所謂難乎有恆者是也以為不近刑而忽之故譏其不能自反以進于禮義教誨之道也孳孳于貧冨之消長錙銖較之而病其不能者曰大頭蝦此田野細民過于為吝而以繩人之驕非大人之治人也夫人之生隂陽具焉陽有餘而隂不足有餘生驕不足生吝受氣之始偏則為害有生之後習氣乘之驕益驕吝益吝驕固可罪吝亦可鄙驕與吝一也不驕不吝庶矣乎禽獸説人具七尺之軀除了此心此理便無可貴渾是一包膿血褁一大塊骨頭飢能食渴能飲能著衣服能行淫欲貧賤而思冨貴冨貴而貪權勢忿而爭憂而悲窮則濫樂則淫凡百所為一信氣血老死而後巳則命之曰禽獸可也批答張廷實詩箋首章似胡文定解春秋以義理穿鑿二章發揮得道理極致非所敢當然此心亦自不能已願與公共勉之三章仙術多門姑置勿論然興致高逺者非此無以托古有留意于參同契而為詩則斥以盜竊四章箋得之余清老唱道歌云世間膏火煎熬可厭亦在其中五章要看第二句與第四句相應親切六章醉以溷俗醒以行獨醒易于醉醉非深于易者不能也漢郭林宗晉陶淵明唐郭令公宋邵堯夫善醉矣夫七章其失與首章同黃涪翁大雅堂記似為此箋發者正詩家大體所關處不可不理會大抵詩貴平易洞逹自然含蓄不露不以用意裝綴藏形伏影如世間一種啇度隱語使人不可模索為工欲學古人詩先理會古人性情是如何有此性情方有此聲口只看程明道邵康節詩真天生溫厚和樂一種好性情也至如謝枋得雖氣節凌勵好説詩而不識大雅觀其注唐絶句諸詩事事比喻是多少牽強多少穿鑿也詩固有比體然專務為之則心已陷于一偏將來未免此弊不可不知八章不知馬其失在人不在馬少知進退去就而巳者亦未以馬稱也平湖之進吾惜之九章珠珮用鄭交甫事十章箋得之詩從後定夲統論好非但拙作所能當持以論詩可矣槩觀所論多只從意上求語句聲調體格尚欠工夫在若論詩家一齊要到莊定山所以不可及者用句用字用律極費工夫初須訪古久而後成家也今且選取唐宋名家詩數十來首諷誦上下效其體格音律句句字字一毫不自滿莫容易放過若于此悟入方有蹊徑可尋傳狀羅倫傳弘治癸丑三月作吾平生有故人曰羅倫字彛正江西永豐人宋羅開禮之後也性慷慨樂善不疑人欺遇事無所回避有不可輒面斥之舉成化丙戌進士䇿對大廷頃刻萬言中引程正公語人主一日之間接賢士大夫之時多親宦官宫妾之時少執政欲截其下句倫不從直聲震於時奏名第一為翰林修撰會內閣大學士李賢遭喪朝廷留之臺諌皆不敢論説倫詣其私苐告以不可李公始以其言為然既數日復上疏歷陳古今起復之非是且曰如其不然必凖冨弼故事終喪劉珙故事言事反復數千言一夲於天埋人心之不可巳者孔子曰勿欺也而犯之倫以犯顔切諌為大救時行道為急其負荷之重未嘗一日忘天下故發憤如是疏奏遂落職提舉泉州市舶司倫雖見逐而士論益榮之由是天下之士爭自刮磨向之不言以養忠厚者為之一變而終倫之世臺省未聞有起復者矣雖以此為人所知然亦以此取嫉于人明年召還復修撰改南亰尋以疾辭歸開門授徒日以注經為業垂十年卒於退居之金牛山世之知倫者不過以其滂沛之文竒偉之節果敢之氣而巳至其心之所欲為而力之所未逮未必盡知也嘗欲倣古置義田以贍族人或助之堂食之錢謝而弗受或衣之衣行遇乞人死于途輒解以覆之客晨至晉具飯其妻語其子曰瓶粟罄矣之旁舍干之比舉火日巳近午亦曠然不以為意提舉泉州時官例應得折薪錢其人欺以乏告即放遣之不復問豫嘗遣人訪之山中結茅以居取給于壠畝往來共樵牧若無意于世者時或作為文章以發其感慨之意而人亦莫知之也論曰倫之必為君子而不為小人較然矣如倫之才少貶以徇人雖欲窮晦其身寧可得也以其所學進説於上世目之為狂何足怪也孟子稱豪傑之士雖無文王猶興若倫者今所謂豪傑非歟無導於前而所立卓然人莫能奪之又曰倫才大不及志其青天白日足稱云丁知縣行狀成化丙戌七月代容圭作侯姓丁氏名積字彥誠別號三江漁樵人世家寧都之西關丁氏系出丹陽司馬司馬之後世有顯人曽祖某祖某父某皆隱德弗仕曾祖妣某祖妣某妣某侯生有美質自少岐嶷入邑庠輔弟子員挺立不為時輩所喜登成化戊戌進士明年出知新會縣新會廣藩巨邑素號難治矦聞邑中有白沙陳先生喜曰吾得所師矣矦之同年梁編修儲李主事祥皆先生門人矦請書以為先容比下車未視篆即上謁先生欲事以師禮月分其所得俸先生每避還之凡有所聞行之惟恐後四方學者往來白沙之門矦聞林縣博光張進士詡至必欣然往會旦夕聽其議論若渴得飲焉與一峯羅先生雖素昧平生然每思慕其賢訃聞專使走湖西致奠捐俸金以助葬事其尊賢樂善無間于存亡如此有中貴弟梁長責民償逋過倍復妄訴之矦矦廉知其情繫長獄悉追貸劵焚之由是權豪縮頸是是非非苟罹于法雖素親愛不少貸未踰年民大趨令矦于干謁之來厲詞色以拒之甚者揭其姓名以示衆嚴賭博竊盜之禁既置于法復大榜其門曰某賭博某竊盜之家月朔赴縣庭聽戒諭俟其悔然後去其榜其良家子弟陷于賭慱者矦悉聚之廡下使日誦小學書親為講解冀其變化其氣習嘗為民辨冤忤當道繫獄且危百姓惶懼欲用計為矦解矦示以手書曰君子但求無愧于心而巳禍福之來有命爾等愼勿妄動以貽我羞有積年起滅詞訟者官司病之莫敢誰何矦盡擒之斃于獄矦尤善節財用前此上下往來非誼之餽一歲所費無算民苦之矦痛革其弊蓋異時當甲首者均平錢悉貯于官復令出私錢供用名曰當月錢官吏里胥乘時侵尅每歲雖單丁小戶所費亦至五六千餘貧者鬻子女故逃亡者衆矦為處當每丁派均錢月支里胥供用備足外不妄科一錢每歲甲首納均平錢畢即歸田畝更不令在縣當月白沙先生樂歲詩云長官碩似丁明府甲首終年不到衙蓋實録也民窮于侈且僣矦為申明洪武禮制參之文公冠婚喪祭之儀節為禮式一書使民有所據守每鄉擇老成者數人主之月朔進問于庭優禮其能者都老馬廣為衆所推讓矦于元日進廣于庭率諸鄉老再拜謝之春秋祭祀品物牲牢極其靖潔役者悉令沐浴更衣然後將事俎豆既陳矦周視行列必極其整方止壬寅嵗大旱春盡種未入土矦憂之曰此令之責也遂于圭峯絶頂築壇禱雨時當酷暑山氣鬱蒸矦晨夕齋沐伏壇下致禱凡七日未雨羸甚左右進曰軀命所關可以少止矦呵曰民得雨吾病何憾至八日暑氣愈熾矦觸暑跪壇下衣汗浹踵大風忽作卷爐中火著矦衣略不為動雨遂迸空下左右張蓋矦命撤之衣盡濕翌日雨止矦復禱至十有一日雨足乃巳如是者凡三次焉節義所關或廟或墓各置祭田擇人守之如大忠祠置田二百餘畝節婦何氏莊氏蕭氏等墓置田共一頃六十餘畝民所敬事者惟修復里社一壇而巳其不載祀典之祠無大小咸毀之此其政迹顯著之大者一念終始在民既得疾羸甚猶日究心於民事朋友遺之書不能止遂卒于官矦生正統丙寅十二月初十日至是卒年四十一也配羅氏生子男二人長曰一芳次曰某生于公卒之五月女二俱幼矦卒之日民相弔哭于途歸德里有一嫗夜哭于家僯人怪而問之曰來年甲首到丁大人死吾殆不能聊生矣是以哭至今邑人之思矦者甚於在任之日雖古桐鄉之遺愛不是過也圭邑人也矦之善政善教皆所親覩故為狀其行以俟他日觀風者采焉謹狀伍光宇行狀君諱雲字光宇系出汴梁伍氏先世仕宋為嶺南第十三將曰氓之子始來新會至君為若干世世為士夫家君自少軒整有志于世無所屈讓與人語惟其所欲語輒語必竭乃巳或忤之爭必務勝人有善好之若出諸巳巳所欲為必以強人為之垂四十始交于余余之所可君亦可之余之所否君亦否之惟余言之適從南山之南有大江君以意為釣艇置琴一張諸供具其中題曰光風艇遇良夜皓魄當空水天一色君乘艇獨釣或設茗招余共啜君悠然坐艇尾賦詩傲晲八極余亦扣舷而歌仰天而嘯飄飄乎任情去來不知天壤之大也所居之北為巖亭髙不盈一丈其中閴寂視之窈如也而君以夙疾未除齒髮日耗其為學也蓋不能無日暮途逺之憂便杜門息交不擇逺近為趨舍凡平居一切與往還者皆抗顔謝焉入處于亭焚香正襟趺坐竟日聞者異之別於白沙築草屋三間號曰尋樂齋與巖亭往來居之蓋自成化庚寅之冬至明年首夏凡四閲月無日不在尋樂始與家人約云吾不可去白沙吾其齋戒有事于家廟吾疾作須扶持吾乃歸一日二日小健吾當返愼無以家事纍我既而果如其言學主力行與之語雖不便了而能鞭䇿益力肯擔負矻乎不移前此惟務意氣勝人不自覺束凡出藩蘺事亦無所不為至是痛自懲艾痛自改革嘗激昻厲聲語云雲不自樹立為人不如死曉夕約已以進有所弗及無所憚劬焉間與余論為文必曰黃培翁題摹燕郭尚父圖盡之論書曰兔起鶻落法語也知畫者必知書其惟蘇長公乎至於詩則謂唐以下多近體古詩沖淡之流吾其陶處士師乎凡此項皆君篤好而願為之及其卒也十九無成則亦慨乎歲月之巳晚而其力之所及有未暇焉耳君篤于事死之禮謂斯禮之興廢在人後世無以為籩豆之費則不省者有以藉口乃告于季父絢洎伯兄𥙿割田若干畝以供祀事權以所居第為祠有事于此必誠必敬月旦十五日君率以夜半起衣冠端拱立祠下以俟尊幼男女咸來無或敢不虔歲辛卯秋始大營材為祠當病未亟時尚日經度兹役將諏日始事語人曰吾息奄奄吾旦夕死不可知惟是祖考之神所棲未有定處吾深懼焉雖存一日不敢怠語斯須未畢痰湧出喉中滚滚不絶如縷日夜且數升親舊憫其如此咸勸之令止勿聽卒之前數夕焚香秉燭招余與訣父兄子弟具在直云雲薄命雲負先生數日遂卒卒之時年四十又七實辛卯十月十八日也君娶某氏無子𥙿以其次子秉中為君後云題跋跋清獻崔公題劍閣詞弘治甲寅十月作萬里雲間戌立馬劍門關亂山極目無際直北是長安人苦百年塗炭鬼哭三邊烽鏑天道久應還手鴈晉屯奏炯炯寸心丹對青燈搔白髮漏聲殘老來勳業未就妨却一身間梅嶺緑隂青子蒲澗清泉白石怪我舊盟寒烽火平安夜歸夢到家山右調水調歌頭吾鄉先輩菊坡先生宋丞相清獻崔公鎮蜀時題劍閣即此詞也曩夢拜公坐我于床與語平生仕止久速偶及之仰視公顔色可親一步趨間不知其已翶翔于蓬萊道山之上欲從之上下而無由因請公手書公欣然命具𥿄筆烏呼古今幽明一理人之所見則有同異感而通之其夢也耶其非蘿也耶今書遺其後後世孫同夀云書思德亭碑後成化八年壬辰夏廣右陶公由吾邑長進秩憲僉六年考滿如亰師將行也諸父兄相與携思德碑文一首詣余請文以贈曰將以是考也諸父兄坐既定余撫碑歎曰嗟夫昔壬午之冬寇忽大至城下民被剽掠死者甚衆公方備寇于外報至哭徑歸及郊哭入城呼士卒慟哭撫之告以滅賊皆感激增氣捐軀赴難震動一邑此吾與諸父兄所共見也賊益充斥公由是建子城與民固守又量地逺邇連為營以塞四境要害設守備之法內外戒嚴賊不敢犯民到今賴之凡使吾兄弟妻子得免流離老稚謳歌田里與鄰壤異者公也公有識慮善揆度其所施為事務實而不為虛文故能取必于此經歷久逺民受其賜而公之㓛有成此吾與諸父兄所共知也公家廣右之鬱林去賊近吾邑在吾省之西南近省多饒資民賊利得之每歲入寇公遏之賊不得逞退過公先塋衆憤將伐木取坯土以懼公賴忠烈之靈震怒在天賊尋畏不敢近嗚呼此公捨一家之危以易一邑之安吾與諸父兄所共聞也夫是三者之難能公實能之以惠吾民吾民所以頌公之德在此一片石則或聞之而不言或言之而非專豈諸父兄與作碑者之意耶公為縣久其有勞于吾民不可具書蓋公之治民如其治兵因應隨機𥘉無定體其治兵也如文士作文竒生筆端無事蹈襲故能使人畏之而率以取勝此皆公精神心術之奧之運人不可得窺故尤不可得書可見者迹之顯者耳書其迹而民莫不信余是以冒言之以輔碑之弗及若夫述職贈言以勉當道此僚友之分君子之任非吾與諸父兄之冝書韓莊二節婦事烏呼二氏之生其相去且千載韓故相國休之孫女莊雷郡庶人妻貴賤雖殊其死於義一也心事如青天白日皎乎其不可尚辭氣如大冬嚴雪凛乎其不可犯是豈資學問之㓛哉是豈嘗聞君子之道於人哉亦發於其性之自然耳今之誦言者咸曰餓死事極小失節事極大故利害比二氏乃能之學者故不能於此然則從事於詩書反無所益彼之弗學乃能不壞其性何邪是必有所以然者學止于誇多鬪靡而不知其性為何物變化氣質為何事人欲日肆天理日消其不陷于禽獸者幾希矣余讀二氏之辭有感故録而藏之書孔髙州平賊詩卷後王別駕所為孔髙州平賊十二詩并圖説余覽之嘆曰嗟夫太守誠有㓛于民也太守今進秩憲副使其視民如傷必不偏于一隅安于一日以為足吾意副使之賢勞謙而不伐雖有同時詠歌之美蓋未知其果樂聞之而首肯否雖然或亟稱之必深碩望之亦君子所不能已于言也書蓮塘書屋册後成化十九年春正月豫訪豫友莊定山于江浦提學南畿侍御上饒婁克讓來會豫白馬庵三人相與論學賦詩浹辰而別侍御之兄克貞先生與豫同事吳聘君豫來亰師見克貞之子進士性及其髙第門人中書蔣世欽因與還往居無何侍御官滿來朝豫卧病慶夀寺之數人者無日不在坐師友蟬聮臭味相似亦一時之勝會也侍御示豫蓮塘書屋圖山雲水石竹樹隂翳恍然若蓮塘之在目藹然絃誦之聲盈耳也豫玩而樂之謂侍御曰地由人勝不勝誰傳周茂叔濯纓于濂溪而世濂溪程叔子著書於龍門而世龍門朱晦翁講道于考亭而世考亭今婁氏居蓮塘冝世連塘使蓮塘之名有聞于天下後世者婁氏也使婁氏有聞于天下後世者婁氏自為之非蓮塘也蓮塘之遇不其幸歟濂溪以茂叔勝龍門以叔子勝考亭以晦翁勝蓮塘以婁氏勝古人今人無不同也抑不知婁氏之所修而執之者同於古人否歟惡乎同乎同其心不同其迹可也同其歸不同其入可也入者門也歸者其夲也周誠而程敬考亭先致知先儒恆言也三者之學於聖人之道孰為邇孰知之無逺邇歟周子太極圖説聖人定之以中正仁義而主靜問者曰聖可學歟曰可孰為要曰一為要一者無欲也遺書云不專一則不能直遂不翕聚則不能發散見靜坐而歎其善學曰性靜者可以為學二程之得于周子也朱子不言有象山也此豫之狂言也婁氏何居焉豫以景泰甲戌逰小陂與克貞先後至凡克貞之所修而執之者豫不能悉也書豫説于蓮塘圖侍御質諸克貞先生以為何如誡子弟人家成立則難傾覆則易孟子曰君子創業垂統為可繼也若夫成㓛則天也人家子弟才不才父兄教之可固必耶雖然有不可委之命在人冝自盡里中有以彈絲為業者琴瑟雅樂也彼以之教人而獲利既可鄙矣傳及其子託琴而衣食由是琴益微而家益困展轉歲月幾不能生里人賤之耻與為伍遂亡士夫之名此豈嘗為元惡大憝而喪其家乎才不足也既無髙爵厚業以取重于時其所挾者率時所不售者也而又自賤焉奈之何其能立也大抵能立于一世必有取重于一世之術彼之所取者在我咸無之及不能立諉曰命也果不在我乎人家子弟不才者多才者少此昔人所以嘆成立之難也汝曹勉之示學者帖諸君或聞外人執異論非毁之言請勿相聞若事不得已言之亦須隱其姓名可也人氣稟習尚不同好惡亦隨而異是其是非其非使其見得是處決不至以是為非而毀他人此得失恆在毀人者之身而不在所毀之人言之何益且安知已之所執以為是者非出于氣稟習尚之偏亦如彼之所執以議我者乎茍未能如顔子之無我未免是已而非人則其失均矣况自古不能無毁盛德者猶不免焉今區區以不完之行而冒過情之譽毁固其所也此冝篤于自修以求無毀之實不必以為異而欲聞之也昔吕蒙正拜副相一朝士指之曰此子亦參政乎同列欲詢其名遽止之曰知當終身不忘不如勿聞賢者所存固異于人也諸君亦冝念之手帖讀一之自罰帖所謂喜三代之犧羊猶存也此舉雖過然究其為心蓋亦可憫且自罰之辭甚實其進固未可涯也若夫久居師席不能致門人於無過舉之地此則老夫之罪請附此于日録算一過諸君其志之喻孰中帖不邀人敬不受人慢某今日方曉待深之之道大抵情不可過會不可數抑情以止慢踈會以增敬終身守此然後故舊可保請自今後朔望免禮諸生在孰中者亦不勞進揖容圭持此𥿄往喻俾悉知余意與容圭帖絢等雖在門墻其與拙者之意實未相接徒以名分相繫為美談耳雖然賢于吠雪者多矣廣收而勿拒小警而大遺其諸全交與待衰俗之意乎書一之自罰帖後此帖某實命之而云自書者貫不自以為過導之使知悔也貫之此舉某𥘉蓋以為可卒歸于貫者貫主之托始於貫謀事愆義規畫無度皆貫之失不容于公議故與士友共責之而不得私焉其不可自恕者謹以書諸日録矣自罰必一年而後復者過之小大為恨復深責望之昭仁示義殆亦孔門鳴鼓之遺意歟子曰由也升堂矣未入于室也逮其晚年進德極于髙逺未必非此門人之助而由之名光于後世矣則貫其可侮哉漫筆示李世卿湛民澤昨夕樓上聞雨聲澎湃睡不能著枕因檢會鄉里平時還往人十亡七八中間年及七十者才一二餘皆六十而下四十蚤晚死者恆多烏呼人所得光隂能幾生不知愛惜漫浪虛擲卒之與物無異造物所賦于人豈徒具形骸喘息天地間與蟲蟻並活而已耶浮屠氏雖異學亦必以到彼岸為標凖學者以聖人為師其道何如彼文章㓛業氣節世未嘗乏人在人立志大小歲月固不待人也書漫筆後文章㓛業氣節果皆自吾涵養中來三者皆實學也惟大夲不立徒以三者自名所務者小所喪者大雖有聞于世亦其才之過人耳其志不足稱也學者能辨乎此使心常在內到見理明後自然成􅈬得大論語曰朝聞道夕死可矣孔子豈欺我哉跋沈氏新藏考亭真迹卷後張宣公城南雜詠草首考亭朱子為和之楊鐡崖評其詩謂宣公有古風思緻于考亭惟曰朱子之辭不敢評其信然耶抑別有所指不欲盡發之耶昔之論詩者曰詩有别材非關書也詩有别趣非關理也又曰如羚羊挂角無迹可尋夫詩必如是然後可以言妙近代之詩逺宗唐近法宋非唐非宋名曰俗作後生溺于見聞不可告語安得鐡崖生並世余將叩之其亦有以復我耶鐡崖輔書宣公詩與文公真迹併藏沈氏都憲公書來俾豫題豫既未及見因附論鐡崖之後如此云跋梁曉挽李唐詩曉為詩悼李唐唐卒未娶無顯然悔尤皆以為幸然曉之于唐既送其往復迎其來何曉之不憚煩也造化固無是理矣但如曉説茍無聖人之德而有妻子之纍雖曉不能以一日活世間况于唐乎曉之為人謀亦踈矣曉乎其自處可也跋張聲逺藏康齋真迹後先師康齋遺稿某藏之十二年矣出入必偕天順𥘉先師膺聘入亰途中紀行諸作皆當日手書寄白沙凡七𥿄成化巳丑春三月行李出北亰是日次于析木之店以示東吳張聲逺鍈一見驚絶閲之竟日不目瞬以手撫弄以口吟哦某憐之割一𥿄是歲六月過清江以手書問先師尚無恙也明年秋鍈書來求跋又二年壬辰二月豐城友人始以訃來先師之卒在已丑十月至是三易歲當鍈求跋語時屬纊來一年矣烏呼悲乎先師道德名譽傾一世婦人小子知之華夏蠻貊咸知之平生愛一字一辭不以假人某之所得徒以一日在門下然誦其言想見其丰采而得其為人則冝其有惕然而感勃然而興者矣某猶望此于百世之下况其邇者乎後生可畏鍈其念諸門人某謹識跋漳州㓛德碑後漳州姓張名璝字德潤別號兩山居士番禺人詡之父也讀漳州㓛德絶句云罷守三州卧兩山漳州面目此碑間郡人欲識蒙庵老也傍斯文捉一班作碑者林蒙庵曩于亰師見其人愼許可人以是信之今直靠他作證明師也蒙庵見拙詩想為抵掌但未知肯勒于碑隂否也論詩不易宋歐陽文忠公最愛唐人逰寺詩曲徑通幽處禪房花木深又愛一人送別詩曉日都門道微涼草樹秋云修平生欲道此語道不得朱文公謂今人都不識此等好處是如何二公最知詩者也後人誠未易及如此兩聮豫始因歐公歎賞之至欲求見其所以妙如歐公之意了不可得遍問諸朋友無知者徐取魏晉以下諸名家所作凡為前輩點出者反覆玩味久之乃若粗有得焉間舉以告今之善言詩者亦但見其唯唯于吾所已言者而巳吾所不言者彼未必知也夫然後歎歐公之絶識去今之人逺甚而信文公之言不誣也噫詩可易言哉書自題大塘書屋詩後豫既書婁克讓蓮塘書屋圗後蔣世欽繼之以大塘書屋之請豫賦五言近體一章既以答世欽世欽少之豫乃究言詩中之旨首言大塘書屋乃中書蔣世欽所建頷聮言為學當求諸心必得所謂虛明靜一者為之主徐取古人緊要文字讀之庶能有所契合不為影響依附以陷於徇外自欺之弊此心學法門也頸聮言大塘之景以學之所得易所謂復其見天地之心乎此理洞如然非涵養至極胸次澄徹則必不能有見于一動一靜之間縱百揣度秪益口耳所謂何思何慮同歸殊塗百慮一致亦必不能深信而自得也末聮借方士之丹以喻吾道之丹卒歸之龍門者明其傳出於程子而人未之知也拙見如此未知是否然豫於世欽不可謂無意矣所病者辭采不足以動人耳世欽胡為而少之豫以世欽厭夫為文字章句之學者勇于求道不耻下問於豫豫是以重言之謂豫俯仰於時姑喋喋以塞夫人之意非豫所以處世欽也速勾丁知縣廟疏立一祠既以表茂宰之賢又以見吾鄉尚德慕義一唱百和視死如生又孰不咨嗟而歆羡其美耶且報往可以勸來此祠立必有聞義而興起者問所由來鄉諸父兄子弟不忘舊令之德章與有榮矣幸甚幸甚即辰春日布和工匠畢集其告諸義士及是時慨然念此舉之不易發誠心而共濟幸無辭曰姑俟來日區區不勝至禱書鄭檢討所編劉閔札後此吾翰林鄭先生廷綱取其平日所得于其友劉閔子賢手書會而編之以為此卷子賢嘗以孝行聞于鄉之人今閲此卷意其天資可與共學而鄭先生不沒人善也皆可敬中間一簡告鄭先生以處貧之難吾獨惜子賢之困於不足無所於謀也三旬九食亦昔人之常事必不得巳而干人雖謀於鄭先生可也而徒告之難鄭先生豈難於濟人者哉觀者疑焉雖不以編入可也書鄧政求濟帖後於乎勢利為市朋友道絶昔人所能者例不可望于俗輩政之號不足于余固其所矣惜豫貧且賤無以副政之請此昔人所謂旋渦底佛安能救落水羅漢不然余之所欲濟與所識求濟于余者多矣豈獨政哉雖然政于余無一日之雅奚以亮余之能惠豫負政多矣十室之邑尚有忠信如夫子政其廣求之必得一士如豫而無豫之貧賤政其庶幾乎撫紙太息書其後歸之書玉枕山詩話後余又有回龍寺夜坐詩云孤燭江邉寺踈鍾雨後天愁人知永夜逺客惜流年不買南安酒留充玉枕錢床風無意緒吹斷藥罏煙第三聮亦以玉枕而發東海乃不收入詩話中偶忘之耶東海平日自謂具隻眼能辨千古是非人物而近遺夫康齋又何也康齋易知耳豫年二十七遊小陂聞其論學多舉古人成法由濂洛關閩以上逹洙泗尊師道勇擔荷不屈不撓如立千仭之壁蓋一代之人豪也其出處大致不假論然而世之知康齋者甚少如某輩往往譏呵太甚群啄交競是非混淆亦冝東海之未察也微君與蘇君今日之論則東海之康齋其為晏嬰之孔子乎了翁之伯淳也噫成化壬寅九月二十八日新會陳獻章在南安橫浦驛讀東海先生玉枕山詩話秉燭書此于蘇君卷中書鄭巡檢詩卷後吾邑沙岡巡檢鄭榮官滿告歸持此卷過白沙乞詩榮莆人也壯而仕老而休賢於不知止者豫既贈之詩復録近作七絶于此莆有大理黃先生故人也榮見問我以此卷呈之題吳瑞卿采芳園記後歲云暮矣冬雨淒淒牛僵馬危啇旅不歸號寒啼飢窮民怨咨采芳何為將以遺所思所思在逺道天寒日短誰為致之不如待時時維仲春陽道既亨萬物得時和風披披人情熙熙慱采衆芳泛泛輕航駕言出遊不泥一邦雲龍風虎其傳自古而德之所𬒳人將化之如赴壑之水汨汨洋洋不亦深乎瑞卿天下未有不本于自然而徒以其智收顯名于當年精光射來世者也易曰天地變化草木蕃時也隨時詘信與道翶翔固吾儒事也吾志其行乎猗歟休哉題余別駕中流砥柱圖後別駕余先生命余題中流砥柱圖余讀彭秋官序文雖非正説此圖而意巳足末舉元貞事一假結褁尤警䇿有力故豫倣其意而切言之蓋不言則巳言必欲其有益于別駕非相啖以利者也故不為諛辭其辭曰使君使民不厭真使君為臣莫愛身使君不以榮落為詘信死生為戚欣而以嗜欲為伐性之斧斤千秋萬歲難磨滅乃見中流砥柱人偶書遺湛民澤龔曰髙逰羅浮者仙人談景升詩云逢萊料想無多路只在談生拄杖前羅浮海上山葛仙治之真蓬萊哉方竹君入手振之鏗然有聲上撑天下拄地四方惟意所如諸君即日東逰度鐡橋登飛雲坐黃龍嘯明月是真神仙矣談生豈欺我哉久矣吾夢長髯翁遺豫羅浮山盡四百三十二峯一囊括之開半面以待逰笻之入次王半山韻詩跋一日忽興動和得半山詩一十八首稿寄時矩收閲作詩當雅健第一忌俗與弱豫嘗愛看子美后山等詩蓋喜其雅健也若論道理隨人深淺但須筆下發得精神可一唱三嘆聞者便自鼓舞方是到也須將道理就自巳性情上發出不可作議論説去離了詩之夲體便是宋頭巾也大槩如此中間句格聲律便一一洗滌平日習氣渙然一新所謂濯去舊見以來新意作詩亦正用得著也批判去改定乞再録來見示為幸稿中有工拙請下一轉語以觀識趣髙下可乎書和倫知縣詩後屠沽可與共飲而不飲彭澤公田之釀古之混于酒者如是與獨醒者不相能而同歸于正雖同歸于正而有難易焉醒者抗志直遂醉者韜光內映謂醉難于醒則可今之飲者吾見其易耳非泥于酒而飲者也烏呼安得見古醉鄉之逃以與之共飲哉送張方伯詩跋某嘗謂作詩非難斟酌下字輕重為難耳如此詩第五句清字既研于心又參諸友左揆右度終不可易而非公九載之守不渝某亦豈敢孟浪蓋一字之下其難如此詩其易言哉書法豫書每于動上求靜放而不放留而不留此吾所以妙乎動也得志弗驚厄而不憂此吾所以保乎靜也法而不囿肆而不流拙而愈巧剛而能柔形立而勢奔焉意足而竒溢焉以正吾心以陶吾情以調吾性此吾所以遊于藝也白沙子卷四終
