  - {type: variant, offset: 6546, length: 370, content: 聞陳宗陽湛民澤欲過江門遇颶風不果用張廷實韻寄之斬蛟須射虎水䂖敢誰欺老夢不知逺客來何怨遲千休千處得一念一生持衰白如曾見斯言或可依與民澤漠漠黄雲岡珊珊鐡橋水宇宙㡬千年洞天今有主借問主爲誰平生子湛子題民澤九日詩后我思陶長官廬山一杯酒世逺道彌光歲歲此重九酒中有歌者劃然金䂖奏謂從秦漢下藩籬士夫口藩籬苟不顧其中更奚有寥寥二千載長夜不復晝俛仰宇宙間孤光映踈桞民澤長者言藩籬自兹厚兹晨偶拈岀以洗薄俗陋付民澤千休千處明一了一切妙若也不明了了心到頭反異憧憧撓拾遺七言擬移木犀於上㳺黄雲示民澤木犀金粟散天香在秋之季廬山陽湛生期我上㳺庄移根千丈黄雲岡萬丈黄雲千丈山金粟花開不等閑金粟氤氲塞两間先生與爾同歲䦨右以木犀贈民澤還植黄雲之麓異時諸生候我於黄雲這早晚便是木犀花開時也與民澤四言聖人之學惟求盡性性即理也盡性至命理由化迁化以理定化不可言守之在敬有一其中養吾徳性, WYG: ''}
