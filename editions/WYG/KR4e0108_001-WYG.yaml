body:
  text: 送李世卿還嘉魚序𢎞治元年戊申夏四月湖廣嘉魚李承箕世卿自其鄉裹糧南望大庾嶺沿途歌吟入南海訪予白沙一見語合意先是五六年予會都憲公之子承恩于北京承恩世卿從弟也示予以世卿之文出入經史跌宕縱横筆端衮衮不竭來數千言沛然出之若不為勢利所拘者予時未識世卿而知世卿抱負有大於人既不忘於心亦時於詩焉發之或聞論當世士有文章必問曰如李世卿否然又意世卿少年凌邁髙逺則有之優游自足無外慕嗒乎若忘在身忘身在事忘事在家忘家在天下忘天下世卿未必能與我合孰知世卿有意於來耶自首夏至白沙至今凡七越月中間受長官聘修邑志于大雲山五十餘日餘皆在白沙朝夕與論名理凡天地耳目所聞見古今上下載籍所存無所不語所未語者此心通塞往來之機生生化化之妙非見聞所及將以待世卿深思而自得之非敢有愛於言也時時呼酒與世卿投壺共飲必期於醉醉則賦詩或世卿唱予和之或予唱而世卿和之積凡百餘篇其言皆本於性情之真非有意於世俗之贊毁至是世卿以太夫人在堂辭去欲留不可為古詩十三首别之諸友相繼有言世卿歸以所聞於予者質諸伯氏茂卿登大崖山吟弄赤壁之風月予所未言者世卿終當自得之世卿之或出或處顯晦用舍則繫於所遇非予所能知也予老且病行將采藥於羅浮四百三十二峯以畢吾願世卿能復索我於飛雲之上否耶序以送之望雲圖詩序意所嚮往處非乗雲御風身不可得而至窮之乎山川委之乎官守曠之乎嵗月當食食忘當寢寢廢一有感乎外而動乎中終日視而目不瞬以言乎化外不化而内化以言乎情則哀而不傷至矣乎非子之於親則臣之於君過而不過其狄梁公歟梁公仕唐在武后朝以一身繫唐宗社之重扶陽抑隂光復唐祚事載簡册昭若日星夫梁公可謂有大功於唐矣賢者識其心自望雲一念中來故曰求忠臣必於孝子之門今王公少孤事母夫人以孝聞稱於藩臬諸公者無異辭公山西人也奉命來南海幾年念太夫人春秋髙不得左右朝夕侍以為憂與人言輒流涕嗚咽而不自勝先公之逝公方委齒已能慟絶復蘇葢公之孝自天性非由勉慕乎外於是諸公命工繪望雲思親圖以表之復相與賦詩道其事俾古岡病夫陳某俾序之頃者公来廣海之舟朅來新會吏民親公如親賢大夫忘乎公之為貴也時情俗態好佞諛而樂承奉皆是也公一濯之清風而民稱其不擾夫以今日之所聞徵諸古若梁公之事然後識其中之所存茍無是心有文章足以收譽於衆口有功業足以耀榮於一時有名節足以警動乎流俗皆偽而已豈能久而不變哉夫孝百行之源也通於神明光於四海堯舜大聖也孟子稱之曰孝弟而已矣故君子莫大乎愛親嘗取李令伯陳情表讀之有不感咽流涕廢書以歎者乎烏虖令伯之表太行之雲也斯圖也若之何使王公見之慰其憂增其憂殆非所以處王公也雖然君與親一也在親為親在君為君世寧有篤於親而遺其君者乎圖而賦之以表公之孝以勸公之忠而又以公之能媿人之不能振頽風扶世教固有位者之事諸公豈無意乎覽者當自得贈李劉二生使還江右詩序匡廬白鹿之故壤也宋考亭朱晦翁一嘗作新之後遂無聞焉我朝文教誕敷鄉先輩翟公守南康日始圖創復舊觀潮陽李先生繼之白鹿書院之名復聞於天下成化十七年江西按察使恥菴陳先生乃謀於提督學校憲副鍾公僉事冷菴陳公大㕘祁公慨然以作新斯文為已任謂予於考亭之學亦私淑諸人者宜領教事乃具書幣告于巡鎮遣二生李士達劉希孟如白沙以請同時司藩臬諸賢咸與聞之外則東白張先生廣東大方伯彭公按察使閔公吉水袁徳純各以書遺予雲輝日映交迸衡宇二生以諸公之命命予予覽幣而驚置書而走走且告曰二生莫誤諸公欲興白鹿之教復考亭之舊必求能為考亭之學者夫然後可以稱諸公之任使乃下謀於予是何異借聴於聾求視於盲也予聞之君子之使人也由其誠不强其所不能諸公即居予於廬山予所能也居廬山以奉諸公之教非予所能也二生其審諸於是邑中聞有諸侯之使自邑令佐以下至士庶耆老源源而來靡不觀感李生丰姿秀發言論是非不茍雷同劉生貌恭而言慎確有據守俱稱為東白門人也予甚愛之留且彌月矣二生以諸公之命久不復辭去予既返諸公幣復為詩别之所以致區區於二生而申景仰於廬山也是日憲副陶公過白沙邑長丁侯鄉諸士友各賦詩以贈帙成俾予序之味月亭序成化丙午春正月五羊何子有載酒過白沙對月共飲延縁數夕告予曩夢遊仙甚適扁所居第為味月亭識夢境也願乞一言以歸予口占一絶句云騎羊仙客去仙城風韻千年落杳冥羅浮道士來何處笑倒君家味月亭戲謂子有曰君不知羅浮道士耶嘗俛仰子之亭矣因撫掌笑前此五年予被徵過郡通名子有之廬道士即予葢寓意耳贈容一之歸番禺序容生卓錐無地從予游者十有一載未嘗對人作皺睂狀入京師見聲利烜赫輒不樂語人曰古之仕者將以行其志耳徒食人禄而不知恥雖吾不能以一日居生之志可謂篤矣顧以予之疎繆不能輔其為仁是生雖有美質而其學未底于成由吾之虚名誤之也雖然生之志豈易為哉聖賢之言具在方册生取而讀之師其可者改其不可者直截勇往日進不已古人不難到也但恐游心太髙著蹟太竒將來成就結裹處既非庸常意料所及而予素蹇鈍胡能追攀逸駕仰視九霄之上何許茫茫生方鋭意以求自得亦將不屑就予又安知足履平地者果為何如也千里之行始乎跬步生慎由之陳先生習忘久矣生歸見毅卿其亦以是語之道學傳序自炎漢迄今文字記録著述之繁積數百千年於天下至於汗牛充棟猶未已也許文正語人曰也須焚書一遭此暴􅁗之迹文正不諱言之果何謂哉廣東左方伯陳公取元所修宋史列傳中道學一編鏤板與同志者共之宋史之行於天下有全書矣公復於此留意焉噫我知之矣孔子曰十室之邑必有忠信如丘者焉不如丘之好學也後世由聖門以學者衆矣語忠信如聖人鮮能之何其與夫子之言異也夫子之學非後世人所謂學後之學者記誦而已耳詞章而已耳天之所以與我者固茫然莫知也夫何故載籍多而功不専耳目亂而知不明宜君子之憂之也是故秦火可罪也君子不諱非與秦也葢有不得已焉夫子沒微言絶更千五百年濓洛諸儒繼起得不傳之學於遺經更相講習而傳之載於此編者備矣雖與天壤共弊可也抑吾聞之六經夫子之書也學者徒誦其言而忘味六經一糟粕耳猶未免於玩物喪志今是編也采諸儒行事之迹與其論著之言學者茍不但求之書而求諸吾心察於動靜有無之機致養其在我者而勿以聞見亂之去耳目支離之用全虚圓不測之神一開巻盡得之矣非得之書也得自我者也葢以我而觀書隨處得益以書博我則釋巻而茫然此野人所欲獻於公與四方同志者之芹曝也承公命為序故及之公名選字士賢浙之臨海人先公勿齋先生宰新城遺愛在民公稱其家學云襍詩序余自成化辛卯秋九月以來絶不作詩值興動輒遏之至今年夏四月余病小愈扶杖出門俯仰上下欣慨于心師友代凋知己悠邈殆亦不可為懷反乎中堂童子絃歌蹶然厥中情危境逼因縁成聲積旬所為凡得詩若干此外又有聞蛙聞杜鵑示跛奴詰李翁奴送西賓筆等通若干詩微覺曠日既反于故戒晦日取閲之皆誠意所發辭不虚假序而藏之用示兒子送李山人詩序成化辛卯春永豐人李立武挾風水之術過白沙訪予一日以其術相地於蓬萊館指其上土渦謂余曰仰天湖也余不能識其然否西北歴崑崙之麓出入十二郍環以青山䝉以白雲余於是俯仰樂甚李君既四顧無所得復歎仰天湖之勝以為竒絶余於李君葢各適其適也作詩以貽之送容一之如永豐詩序縣主丁侯景仰一峯羅先生於既歿乃以學生容貫充弔祭使如永豐而歸其賻于先生之子清極貫云當自永豐東走金陵謁木齋莊先生於江浦然後歸一念懷賢無間存歿可壯也歌以送之謌曰還從江北話江西謁墓人來見木齋長江亦是東湖水何處吟風弄月臺今朝何事又離羣南北東西一片雲如此行藏都未定老夫扶病欲隨君東圃詩序南海范規從予游嘗聞規之父東圃翁朴茂於人無怨惡早嵗出入江湖既倦而歸圃於西江之滸花山之隂因寄號曰東圃東圃方十畆沼其中架草屋三間傍植花卉名木蔬果翁寄傲于兹或荷丈人蓧或抱漢隂甕興至便投竿弄水擊壤而歌四時之花丹者摧白者吐或飲露而飡英或尋芳而索笑科頭箕踞檉隂竹影之下徜徉獨酌目諸孫上樹取果實嬉戯笑語以為適醉則曲肱而卧藉之以緑草灑之以清風寤寐所為不離乎山雲水月大抵皆可樂之事也規别白沙去遊曹溪洞不相見數年矣一日復來與規語如聞陳子昻李太白賦感遇詩一喜一愕規亦竒矣哉比歸以東圃詩為請且曰無以娯親故也予樂聞東圃翁為人而憐規之志不可違也賦排律十韻以贈之東圃名真字則未聞也詩曰一老胥江卧瀕江一圃開林春烟淡泊地暝月徘徊盡日扃茆宇殘年寄酒杯山蹊人不到庭竹鳳飛來靜得丘園樂清無市井埃雲封朝几白風入夜絃哀細雨攜鉏去輕笻看藥回江山吾晚暮梨栗爾嬰孩天上羣龍逺花前獨鶴陪誰為求仲侶心蹟總悠哉記韶州風采樓記宋仁宗朝除四諫官其一人忠襄余公也蔡君謨詩云必有謀猷禆帝右更教風采動朝端𢎞治十年春韶守錢君鏞始作風采樓與張文獻風度樓相望忠襄之十八世孫英走白沙謁文以表之夫自開闢達唐自唐達宋至于今不知其幾千萬年吾瞻於前泰山北斗曲江公一人而已耳吾瞻於後泰山北斗公與菊坡公二人而已耳噫士生於嶺表歴兹年代之久而何其寥寥也則公之風采在人爭先暏之為快如鳳凰芝草不恒有於世也可知矣如公之才得行公之志所謂障百川而東之回狂瀾於既倒公固有之公有益於人國也大矣雖然一諫官豈能盡公哉顔淵問為邦孔子斟酌四代禮樂告之顔淵處士也何與斯理耶居陋巷以致其誠飲一瓢以求其志不遷不貳以進於聖人用則行舍則藏夫子作春秋之㫖不明於後世矣後之求聖人者顔子其的乎時乎顯則顯矣時乎晦則晦矣語黙出處惟時豈茍哉英乎勉諸毋曰忠襄可為也聖人不可為也古䝉州學記立山復州治之幾年今雲南左布政使樂安謝公綬始領右方伯之命來廣西其民舉欣欣然喜而相告曰公復來公復來廬陵彭君栗適知州事問於諸父老諸父老跽而言曰是再造我民者我何可忘吾州古䝉州也唐改立山縣國朝洪武間革為古睂巡檢司時草冦竊發民亡者過半比年以來猺獞横據其地盜日滋而民日孤成化丙申巡撫都御史朱公英督兩廣軍征荔浦破賊賊懼招之獞老李恭著首遣其子來納欵公前以㕘議佐巡撫于戎議城立山立山本州治在桂林平樂之間為藩腹心今之憂無控暴之地以居民耳州復則民定尋請於上許之乃營立山是役也公與按察副使范公鏞都指揮王公輔更主相之明年丁酉州治成方進軍茘浦時桂山巖恃險後下一軍怒將盡殲之公亷其脇從者得七百餘人釋遣歸農賊以此傾信招所至猺獞視我立山咸來此公以好生一念之仁代血戰數萬之兵也今也吾民之亡者復復而為州昔之戕吾民者今革面為編氓我有農桑我有塾庠生我有養死我有藏公之再造我民也我何可忘於是彭君籍記諸父老之言將碑於學宫以傳而謀於提學時可周先生周先生三致彭君之懇於予俾為之記嗟乎彭君誠不私於公而思惠其州之人士乎請為言之七百死命歸農何致羣兇之納欵州亡州復在民何闗於公之一念動於此應於彼黙而觀之一生生之機運之無窮無我無人無古今塞乎天地之間以至禽獸草木昆蟲一體惟吾命之沛乎盛哉程子謂切脈可以體仁仁人心也充是心也足以保四海不能充之不足以保妻子可不思乎聖朝訪古設學立師以教天下師者傳此也學者學此也由斯道也希賢亦賢希聖亦聖希天亦天立吾誠以往無不可也此先王之所以為教也舍是而訓詁己焉漢以來陋也舍是而辭章已焉隋唐以來又陋也舍是而科第之文已焉唐始濫觴宋不能改而波蕩於元至今又陋之餘也夫士何學學以變化氣習求至乎聖人而後已也求至乎聖人而後已也而奚陋自待哉孟子曰人皆可以為堯舜周先生師表一方彭君為州守謁文山澤之癯非俗吏是以冐言之諸生疑者請質於周先生其必有興起焉者甲倡焉乙和焉俛焉孜孜其傳寖多其化寖博其於公也有光焉則斯文也其猶庶幾泮水之頌歟於是乎書程鄉縣儒學記潮之程鄉縣儒學傾圯久矣今按察僉事雩都袁公慶祥處分以新之明年巡按廣東監察御史劉公纓分巡嶺東道僉事王公某往來為之勸借財用或拓地以相其成凡學宫之設有文廟有明倫堂前後位置所具皆同亦程鄉之舊也袁公因地之形勢廣狹而更張之尊左則廟次右為堂皆南面而並峙此則學之大觀也廟主以像世相沿襲有異授之嫌而未詳其所自意者古以尸祭之遺意歟廟前樹杏為壇夾以兩廡㦸門之東祠鄉賢西祠后土泮池在櫺星門之内池之左為宰牲所堂之東西偏為兩齋為諸生號舍道義門與儒學門相望東廡之上神庫西齋之上神廚廟與堂之間㑹饌堂居之北列廨宇凡此皆出於袁公之規畫授圖於縣令俾成之總之為屋若干楹自辛亥迄癸丑三易寒暑而後成其形勝雖極壯麗則亦天下之通制不書可也袁公不以風教落第二義追惟古先聖王立學教人之本意而作新之袁公所以望於程鄉則不可不以告也今夫南面而堂一以奉古之人一以居今之人卑尊並立乎其間此雖因地而寓形而教未始不存也夫子太極也而人有不具太極而生者乎語以四科稱羣弟子由漢而來儒者以言語稱者幾人以政事稱者幾人以文學稱者幾人其間足以方駕古人而絶塵於當世者亦鮮矣况徳行乎顔子超然有見於卓爾之地所以遨遊乎聖人之方而𤣥同乎聖人之神者非可揣摩而得也故其言曰夫子步亦步趨亦趨夫子奔軼絶塵而回則瞠乎其後微顔子其孰能知之親切如此夫茍從事於斯雖未即優入顔域亦庶乎閔冉之間而由求又有不屑為者矣予嘗聞程鄉風俗善多而惡少孟子曰雞鳴而起孳孳為善者舜之徒也雞鳴而起孳孳為利者跖之徒也夫三尺童子聞人稱其善則喜稱其惡則怒是何心哉予老矣彼將有感吾言而興起者乎縣令辛君竟以袁公之命具其事之本末遣生員陳珀乞記於予故為之一言葉柏鍾譽楊偉咸以義官董兹役柏又偕珀來謁文費莫大於納粟指揮陳昂義官鍾華次之其餘助者又七十餘人名氏多不能具載宜列之碑隂云程鄉縣社學記國朝開設學校自胄監至于府州縣備矣惟郷之社學不列於官待有司而後興吉之永豐劉侯彬由戊戌進士來令程鄉首以教化風俗為事相地邑中得東西員城得水南村北距城五里得大枯樹南距城八十里各就其地之便建學宫一所為社學者四學宫之制正北為正䝉堂東西兩齋相向者無不同也其在東者堂後考亭之祠前有春浣池詠歸橋皆揭之於亭其在西者堂南考亭之祠其後退省有軒燕休有所在南北者咸無焉此小子之學也是學也貧富貴賤才不才共之無所擇於其人學宫既成侯以諭諸父兄諸父兄咸喜退各以其子弟來受學則為延師以教之買田租米一百石以供束脩之需品量所給視所領子弟多寡東西各四十石水南之受二十石大枯成於諸學之後未有受焉縣東五六里有地曰周溪山勢自北而來迤邐南下峯四遶如城逺望不知溪發處但見自出山東北隅流入溶溶洋洋横於坡陀之麓上有曲池狀如半月侯顧而樂之又愛溪之名尋即其地搆堂於曲池之上最髙處圖太極圖於北壁前作講堂左右為樓居樓外鑿二石井泉甘而洌謂之天泉井榜其門曰周溪書院周溪之門少東過雲步橋北折數百步山曰雲洞與太極堂東西相望因闢地作亭寓之雲谷之號侯政暇輒往游焉瞻眺徘徊如有求而弗得侯安取於山水若是勤哉已上諸役及買田之費侯悉以其在官所當得者積嵗成之一不以擾民教諭李君欽訓導陳君禄具圖與事遣生員鍾宏走白沙屬予記之古者王畿置小學於辟雍之側其在侯服邦國則列於庠序之右今之郡縣學古之大學也今之社學猶古之小學也天下風俗美惡存乎人人之賢否存乎教觀今之風俗則今之人才可知矣予嘗終夜思之其不及古者有司非與庠序之設六經之訓固在也以小學言之朱子小學書教之之具也社學教之之地也其皆不可無也天下之事無本不立小學學之本也保自然之和禁未萌之欲日就月將以馴致乎大學教之序也然則社學之興在今日正淑人心正風俗扶世教之第一義也胡可少哉胡可少哉侯之心猶未但已也曰我有司也資於何以治資於何以教山名水名我思古人世豈無庶幾者乎於是為之意以感之為之地以處之十數年間東西行過程鄉者多矣未聞有吟風弄月而來足以副侯之心者侯豈敢必哉或謂予曰侯來程鄉居幾年寄懷山水之間不屑屑於簿書侯何心今且去程鄉矣侯其埃溘斯世將髙棲而逺遁乎以是為知侯予葢不知也併記於是重修梧州學記百粤之區幾千里東望五羊西通八桂蒼梧界其間皆古之名郡也成化改元都御史韓公始於梧州開設三府病一學宮之不稱亟選地于州城之南一里許遷焉𢎞治丁已秋鄧公來總督兩廣軍務謂不可以軍旅之事先俎豆於是因前人之舊規而益修之凡韓公所欲為而未暇及者至是大備葢昔之薄者厚之卑者起之表柱石以壯闕門榜化龍而儕起鳳神㕑神庫交映乎前禮堂膳堂並立于後齋舍廊廡登降階級莫不煥然一新盛矣哉夫人之去聖人也逺矣其可望以至聖人者亦在乎修之而已茍能修之無逺不至修之云者治而去之之謂也去其不如聖人者求其如聖人者今日修之明日修之修之於身修之於家國修之於天下不可一日而不修焉者也明道先生言於朝曰治天下以正風俗得賢才為本彼學政之不修斯道之難立後生無所興起無以成造就之功然則風俗何由而正賢才何自而得耶因時而立教即物以顯義意者督撫所望於蒼梧之士寧不有在於斯乎有開厥先有成厥後喜二美之駢臻超八荒而獨立然後見夫子之門廓然洞開可望而不可即况於廣大尊嚴端凝灑落黙契乎人心正大之所存與山岳而並峙顯著乎烟霞嵗月之所積與大化而同流不可動揺不可束縳也哉此則病夫所自勵以佐督府所望於蒼梧之士者也州别駕謝君湖承督府命董兹役至是訖工復以教授鍾君偕生員陶荆民來徵記章於督府舊也督府命之義不可辭於是乎書龍岡書院記父兄不以其言為子弟師業修於身子弟習而化之其為教也不一因其世箕裘異焉耳農商技藝各有教豈直士哉昔者堯舜禹湯文武周公道大行於天下孔子不得其位澤不被當世之民於是進七十子之徒於杏壇而教之擇善力行以底于成徳其至也與天地立心與生民立命與往聖繼絶學與來世開太平若是者誠孔子之教也大哉教乎今父兄愛其子弟教以六經誦之也惟恐其言之不熟講之也惟恐其㫖之不明似矣不知其身之所教與七十子之進於聖人同歟否耶江西撫之樂安有龍岡書院今都御史謝公綬六世祖均福始建與其弟均壽講學其中福後以宏詞領信州壽亦舉進士守來陽嵗久棟宇就廢公之父某復即其地而新之既而諸子皆以文章取科第為顯官公謂其子琪曰書院無田奚以守琪買田百畆擇謹厚者掌之以供祭祀及束脩之費公巡撫湖廣兩遣使走數千里至白沙謁文記之且以教其族之人予少無師友學不得其方汨沒於聲利支離於粃糠者蓋久之年幾三十始盡棄舉子業從呉聘君游然後益數迷途其未逺覺今是而昨非取向所汨沒而支離者洗之以長風蕩之以大波惴惴焉惟恐其苗之復長也坐小廬山十餘年間履跡不踰于户閾俛焉孳孳以求少進于古人如七十子之徒於孔子葢未始須臾忘也謝氏之先以儒起家傳數世至公父子兄弟皆能以文章取科第出為當世用肩摩踵接盛於一門其得於龍岡者不亦多乎雖然父兄之教子弟之學將不但如是而已也今之學於龍岡者一短檠課之外未有聞也公能亮予言否耶横渠先生語學者必期至於聖人而後已予於謝氏豈敢謂秦無人丁知縣廟記丁侯為縣六年卒于官歴觀我邑令自洪武迄今求丁侯未有也侯仕不為已恥以俗吏自居始至著禮式一編擇立鄉老各數人使統之俗淫於侈靡富者殫財貧者鬻產上無以為教下無以為守俗由是益壞鄉都老以禮正之每嵗按民丁產輸錢謂之均平錢上下交侵民受其害侯量入為出嵗輸以還使民不知有役民甚賴之時有横徵虐民侯蹙睂曰守令之政在養民坐視其困而不救安在其養民也力請罷之雖以此得罪不恤也侯素性略於承奉而嚴於鬼神灌獻必親執事有恪春秋之祭肅如也凡祀典所載有功於名教者為立祭田使人守之其不應祀者毁之至於接人也亦然可者與之不可者斥之其馭吏也不察察於案牘吏不敢欺其蒞衆也民服其威斷明察奸偽鮮作夫縣令官卑刑賞不加於天下而天下治忽由之知逺之近知風之自知微之顯故予嘗謂侯用世才其有所試矣夫豈茍哉侯以仕為學政暇必走白沙往返嵗月内不知其幾顧何取於白沙耶甚矣人不可無志也正其誼不謀其利明其道不計其功侯亦無所不願學而切於救民急先務也死之日耕者弔於野行者弔於途有老嫗夜哭於其廬旦往問之云嫗何哭之哀也曰開嵗役且至死者不可作已故侯之為縣多可書其得民之實在節用去之十有二年邑人共立廟於白沙祀之如不得已焉者思侯之功表之非以儌福於神也後來繼令者亦將有感於斯乎侯名積字彥誠成化戊戌進士寧都人肇慶府城隍廟記端陽城隍廟在刺史堂之西嵗久就弊𢎞治癸丑冬郡守黄侯撤而新之命生員陳冕來徵記侯豐城人名琥予曩從呉聘君游往來劒水嘗一宿其家自侯來守端陽三年愈相傾慕安能已於言耶今天下府州縣有城郭溝池有山川社稷有神主之而皆統其祭者謂之城隍神古制也不俟言矣然神之在天下其間以至顯稱者非以其權歟夫聰明正直之謂神威福予奪之謂權人亦神也權之在人猶其在神也此二者有相消長盛衰之理焉人能致一郡之和下無干紀之民無所用權如水旱相仍疫癘間作民日洶洶以干鬼神之譴怒權之用始不窮矣夫天下未有不須權以治者也神有禍福人有賞罰失於此得於彼神其無以禍福代賞罰哉鬼道顯人道晦古今有識所憂也中庸曰致中和天地位焉萬物育焉説者謂吾之心正天地之心亦正吾之氣順天地之氣亦順烏虖孰能信斯言之不誣也哉侯治端陽民畏而愛之葢有志者也故専以其大者告之餘皆在所畧恩平縣學記恩平古恩州之域國朝置恩平驛𨽻陽江縣今恩平堡是也堡立於成化之己丑先是西獠入冦景泰天順間剽掠髙凉以東亘數百里無完城民爭起從賊逺邇巢壘相望此其地也成化改元聖天子念而廣夷賊未平命將討之而用其偏師於此既而賊勢復熾當道者以恩平地四達難守簡畀我邑令鬱林陶侯素有威略至則急擣其巢穴亦既殺其桀黠者遂以其衆還各郡縣且數萬人而慮其向背靡常即一旦復起為患有如前日充斥其將何以待之此堡所以建也成化丙申左都御史彬陽朱公奉勅總督而廣軍務既至環眂列郡昔常為賊所破者亟謀所以善其後謂恩平故多虞且其地介數邑之間當東西行之衝送往迎來民劬於道路者無虚日不如以堡為邑便會我陶侯亦以邊功累陞按察副使奉璽書専經畧是方公於是俾侯成之區畫既定悉以上聞凡割陽江新會新興三縣人户三千户糧一萬石縣仍驛名城以堡建無所改於其舊城之中為治戎之所東則縣治西則學宫既成諸士子逺近雲集學舍不能容誦絃之聲盈耳過者歎曰美哉洋洋乎昔為盜賊之壘今為詩書之府誰之力歟邑令翁君以書屬予記其亊而於學宫尤惓惓焉甚矣翁君之明而保民也自有邊患以來狼吞虎噬以殘民之生人所知也湯沸火烈以賊民之性人未必知也顛沛流離死生利害怵于前而父子失其親兄弟失其愛鼓之以鬬爭之風置之於水火之地則五品之倫五常之性與生俱滅誠不可不懼也衞靈公問軍旅之事孔子辭以未學曰俎豆之事則嘗聞之矣自今觀之昔者軍旅之興雖以拯民亦以弊民弊民之政孔子所不忍言豈得已哉今地方寧謐文教聿新俎豆之事安可一日而不講耶邑長俎豆其政而忠信發之學宫俎豆其教而忠信導之諸士子俎豆其志而忠信體之習端而俗正教立而風行民樂生而好亂者息士有恥而慕義者衆則刑罰可省禮義可興囹圄可空干戈可戢守令之責盡矣而君之志寧不亦樂於斯乎予不文謹具其事始末與其所當先者以復君碑於學宫俾來者有考焉君名儼莆陽人新遷電白縣儒學記邑何遷遷避冦也先是電白在髙州府治之東按察僉事陶公提兵過之顧謂其守宰曰形勝不足以守邑宜遷遷必於神電衞焉其地廣可以容其城固可以守去危即安民之賴也舍兹弗圖志不在民也知府孔侯鏞以公之説聞於上遂遷焉時成化戊子嵗也學宫在縣治東南當是時寇賊未殄草屋一間奉大成木主而已嵗丙申公以秩滿遷副使奉璽書専經略是方每一過之未嘗不瞻顧徘徊以學校之興廢為己責而歎其力之未遑也明年冦乃克平是方之民寄命於盜賊之水火者幾二十年至是始逭公暇時巡省諸郡縣俾勞來匡直咸盡其方越二載而民之病者蘇仆者起矣公顧力可及以狀請於欽差總督兩廣軍務右都御史朱公首創學宫次及諸役許之於是闢土為基度財為用而屬是役於某官某使督之以已亥三月某甲子始事越明年八月某甲子而舍菜焉宫宇峩兀門觀軒敞神像清嚴器用具足繚之以宫牆飾之以丹漆誠壯誠麗遂為一郡學校之冠其他若縣治若城隍社廟若藩臬行司以及郵傳邸舍橋梁道路一一區畫成之營材於山民不知勞為陶於野財不妄費而皆以一當百以百當萬故役之煩者化而為簡難者化而為易公勳庸著於武事不可勝計世稱公通變無方亦焉往而非是也哉韓君某來守是郡既至睹衆美之具成乃嘆曰博哉功乎歴審其為之先後又歎曰公留意學校功先庶務其重如是乎乃具書弊遣其屬蔡鍾英如白沙請予記之辭不獲推古學校之意而言曰學校一也所以有古今之異者存乎人孔子曰古之學者為已今之學者為人程子曰古之仕者為人今之仕者為已夫學以求仕之所施仕以明學之所藴如表裏形影然臯䕫稷契伊傅周召其載於典謨訓誥仕者之所施也有為已之心乎顔曾思孟周程張朱其傳於著述文字學者之所藴也有為人之心乎諸君子顯晦不同易地而處之有不相能者乎自古有國家者未始不以興學育才為務然自漢而下求諸學校之所得名世者幾人有不由庠序而興者乎是故學校之設其重在於得人學之道其要在於為已古之名世者舍是無以成徳甚矣斯學之不講於世也久矣公所望於學校意者其在此乎公名魯字自强廣右之鬱林人也始恩授吾邑丞公之先公成浙江按察副使死事武義云新會縣輔城記吾邑輔城周遭六七里髙若干尺東南際水西北鑿城下為池旁植刺竹施蒺䔧其中為營門以守嘗記往年西冦之來憑陵髙凉以東破闗襲城勢如建瓴至此則截然而止如虹霓之收急雨由是而吾民之丘隴以完室家以安雞犬以寧倉箱以盈燕有嵗時樂有賓客至於今各得其所者則誰之賜乎始者吾謂陶公曰孔子曰言忠信行篤敬雖蠻貊之邦行矣以此而盡吾心則庶政無不修用人無不當理財無不富治兵無不强不知乎此而欲徒恃其末葢後世以法劫制天下區區之為也公之功固大矣而聖人之道非耶公曰不然行聖人之道有二術内之曰心外之曰權無其心則權為挾私妄作矣無其權雖有其心將安施哉今夫用行伍之人取其長不責其備宥其過以圖其功可也或者過於求實一疵不貸而用舍乖張矣今夫理財於擾攘之秋非常賦尅取之民故椎牛灑酒豐犒厚享非以醉飽為徳所以作士氣也顧小利而忘其大體者則朝夕與小吏計牙籌算贏餘矣今夫治兵於閫外號令則大將主之而吾每以偏師從事况夫深山窮谷民獠雜居善惡同狀生殺在前而節制不一沮我者惟以殺無辜為言矣此事之所以難行而心之所以不孚於人也烏虖兵凶器也豈得已哉公從事于兹餘二十年吾民之老者以死少者以壯事功在邊隅日逺日忘葢不可以無紀而垂告於將來今西師戒嚴盜賊塞路吾欲於知力之外而綱維乎是則孰與語哉雲潭記白沙之西山則圭峯也東北連數峯最勝者為緑護屏屏之南有潭淵然曰聖池下蟠蛟龍龍嘘氣成雲變化萬狀里生周鎬偕其季京來謁予白沙時維仲春風日晴美予與二子攜酒飲于西山之麓班荆而坐仰而四顧有雲起緑護屏炫爛如丹青郁紛若祥瑞予顧謂二子曰是聖池之雲也偉哉觀乎二子愀然正襟侍側曰是吾先子之志也先子居龍溪垂五十年無他嗜好惟喜為雲潭之觀故先子之號曰雲潭予曰嘻有是哉若先子我舊不幸早世不及見若兄弟長也若豈盡聞之乎居吾語汝夫潭取其潔也雲取其變也潔者其本乎變者其用乎二子齊應曰然予曰未也野馬也塵埃也雲也是氣也而雲以蘇枯澤物為功易曰密雲不雨自我西郊是也水以動為用而潭以靜為用物之至者妍亦妍媸亦媸因物賦形潭何容心焉是之取爾二子喜相謂曰先生命我矣於是復進而告之曰天地間一氣而已詘信相感其變無窮人自少而壯自壯而老其歡悲得喪出處語黙之變亦若是而已孰能久而不變哉變之未形也以為不變既形也而謂之變非知變者也夫變也者日夜相代乎前雖一息變也况於冬夏乎生於一息成於冬夏者也夫氣上蒸為水下注為潭氣水之未變者也一為雲一為潭變之不一而成形也其必有將然而未形者乎黙而識之可與論易矣二子於是起而再拜乞書為雲潭記潘氏祠堂記一善可書也吾書之吾畏多言也信多乎哉不多也傷俗之益偷吾無位也言不能化而入惡在乎多言也善者吾斯進之而已矣潘某氏者南海之著姓老而無子曰吾無繼可也兄弟之子猶子也同吾胞者幾人繼其世者若干人可以執籩豆可以守宗廟可以事繼述而傳無窮矣吾何憂吾無繼可也以其所有者歸之祠以卒噫兹可憫也已若是者其亦足與乎其無足與也堯之時比屋可封降自後世不以善而以利父子也而不用情兄弟也而䦧于牆婦姑勃豀朋友按劍者皆是也夫恒人之情莫甚於顧其私而不忘其後某也致孝乎祖禰委祝乎兄弟其生也若遺其死也若虛非求馬於唐肆者歟未可知也伯氏某成某之志以其地三畆搆祠屋三間以奉四代神主其田若干畆以供常祀詩曰兄及弟矣式相好矣其斯之謂歟某之從子上舍生漢也有一日之雅於白沙來請記其事予不能辭也於是乎書增城劉氏祠堂記古聖賢以民徳歸厚必曰追逺又曰宗廟之禮所以序昭穆也序爵所以辨貴賤也序事所以辨賢也旅酬下為上所以逮賤也燕毛所以序齒也廟始遷之祖而祭之古之制不可考已君子隨時變易以不犯其分而得其心葢人情出於天理之不容己者夫何嫌歟古之仕者世繼死者有廟生者有宗恩相慶而死相弔百世不相忘世降俗偷葢有不然者矣邸第之雄田園之美肥甘豔麗飽妻子祖考所棲與蟲䑕為伍殘膏賸馥何有及之其鄙陋汚穢可勝道哉中古之王天下者嘗為卿大夫作家廟以愧之卿大夫猶然况士庶乎先世之流風餘韻至此幾絶以吾之一身散而為百體拔其一毛而心為之痛是孰使之然哉且人之賦於天命者有賢不肖貧賤富貴之差吾之所以仁愛者未能皆然貧賤不薄於骨肉富貴不加於父兄宗族者誰乎故曰收合人心必原於廟宋之惠州守劉仲明自南雄遷增城有劉氏自仲明始也傳至今太學生瓛十有二世其先世嘗廟而祀之不遷又置田以供祀事以圖無窮頽而復起者再矣父有積薪子不析而爨之世豈少哉瓛自言系本元城世有衣冠曰縁者瓛之父也曰漢曰孔祥者瓛之諸父行也一念追逺之同天順甲申始拓廟旁之地而新之廟成而諸父亡矣成化庚子瓛之兄瓚又率其族兄弟而增修之前堂後院棟宇層起煥如也四垣竹樹周遭過其門者咸以是稱焉於前有光於後有繼於士大夫其無愧哉今年秋瓛因林時嘉再至白沙子示之詩云一雨變新凉炎埃洗除盡廬山昨夜燈已照劉宗信故為之記以詔其後人永慕堂記予㓜時讀孟子人少則慕父母知好色則慕少艾有妻子則慕妻子仕則慕君不得於君則熱中大孝終身慕父母五十而慕者予於大舜見之矣竊疑孟子之言抑揚太過愛親人子之至情也不待教而能不因物而遷人之異於聖人也豈相懸絶若是耶比弱冠求友於四方多識當世之士擇其賢者能者而師之其不可者而改諸内外輕重之間槩以孟子之論其役志於功名其循情於妻子其思慕其親其不以皓首而媿垂髫者希矣然後信孟子之知道不茍於言也成化甲辰江隂李君昆以侍御史被命清理軍伍于兩廣始過白沙進拜老母于堂予雅未識君之色而訝其憂之餘耳君之孝而訝其哀之餘意風木其心者恒怵惕於見人之親歟君曰然少留君坐語之以丱角所疑於孟子以壯而後信其言不予欺因與君論交焉它日再過白沙索書永慕堂扁予申以孟子之言曰人各有所慕仁者慕親義者慕君士慕學農慕稼穡百工慕能商賈慕貿遷無無慕者慕之至死而勿替乃至形乎動靜接乎夢寐通乎幽明皆性之所發而為情有莫知其然而然者此之永慕是也夫孰得而奪之彼幼而慕壯而衰老而遂忘慕之不至而遷於物是之謂情其性非知内外輕重之别者也夫忠孝之推也不孝於親而忠於君古未之有也御史諫官也繩人以身者也名堂之義其以忠孝示天下乎君聞之悦命左右滌硯乞書為永慕堂記潮州三利溪記古今學者不同孔子以兩言斷之曰古之學者為已今之學者為人古今仕者不同程子以兩言斷之曰古之仕者為人今之仕者為已古之人人也今之人人也一也判而而之其不可同者如隂陽晝夜則有其故矣聖賢之所以示人也知微之顯知顯之微學為已也其仕也為人學為人也其仕也為已斷不疑矣今守令稱賢於一邦利澤及於民民愛而樂之問於我嶺南十郡之内吾知其人者周潮州也潮海郡也東南距大海望之渺漫接天習水者乗長風駕大舶出沒巨浪中小不支則有覆溺之患每嵗漕運潮人共苦之潮州來守郡問潮父老所以便民者父老曰其惟三利溪乎潮五屬邑其三在郡治西南形若鼎立廣袤千里水曲折行其中而民共賴之者三利溪也是溪之長百一十五里東抵韓江西流入于港正統間湮於大水潮州濬而通之水由故道行東西注會同於海慮其冬旱而且涸也鑿郡城南溝引韓江水注于溪甃石為闗時而開閉之凡役民于畚鍤卑之為溪也髙之為闗也僅一月而成農夫利于田商賈利于行漕運者不之海而之溪辭白浪於滄溟謝長風於大舶於是潮之士夫與其父老拜郡門謝曰利吾潮者吾父母也吾子孫敢忘之由是觀之謂周潮州仕而為人也非歟吏於潮者多矣其有功而民思慕之唐莫若韓愈入國朝來莫若王源驅㝠頑之鱷造廣濟之梁其事顯於為人不可誣矣今潮州以三利溪配之輝映後先稱賢於一邦也宜哉夫短於取名而長於求志薄於儌福而厚於得民非以奉身而燕及㷀嫠陋於希世而尚友千古黄涪翁之所稱者非濓溪先生歟潮州遺予書曰我故舂陵族也潮州之舉進士有聲郎秋官有聲守郡有聲其尚不忝其世也哉吾嘗贈之詩云楚中有孤鳳髙舉凌穹蒼借問歸何時聖人在黄唐望之久不至嵗晏涕淋浪九苞有遺種不覺羽翼長三年集南海使我今不忘逍遥棲桐枝長飲甘露漿吾生濓溪數百年之後思濓溪而不可得見見其族之雲仍若此者殆可與言矣然則區區所愛慕於周潮州者一闗三利溪而已耶潮人相與立碑頌潮州之功遣生員趙日新來請文予以其事并詩記之俾潮之人知仕而為人者有功不可忘而潮州之進未艾也潮州名鵬字萬里道州之永明縣人先生文既成每詢之潮人多言三利之利無實因作一詩以代跋云欲寫平生不可心孤燈挑盡幾沈吟文章信史知誰是且博人間潤筆金意欲示後人失於審也其後王侍御哲至潮見之歎曰君子可欺以其方噫斯言得之矣𢎞治甲子秋門人張詡識尋樂齋記五年伍光宇始構亭于南山之巖以坐明年復於吾居第之左結草屋三間與亭往來又明年而光宇死矣草屋之成光宇齋戒沐浴焚香更衣危坐厥明請余問曰雲不自知其力之不足妄意古聖賢人以為師今年且邁矣不得其門而入不知其所謂樂尋常間自覺惟坐為樂耳每每讀書言愈多而心愈用用不如不用之為愈也葢用則勞勞則不樂不樂則置之矣夫書者聖賢垂世立教之所寓也奚宜廢將其所以樂者非歟願先生之教之也余復之曰大哉吾子之問也顧余何足以知之雖然有一説願吾子之思之也周子程子大賢也其授受之㫖曰尋仲尼顔子樂處所樂何事當是時也弟子不問師亦不言其去仲尼顔子之世千幾百年今去周子程子又幾百年嗚呼果孰從而求之仲尼飲水曲肱顔子簞瓢陋巷不改其樂將求之曲肱飲水耶求之陋巷耶抑無事乎曲肱陋巷而有其樂耶吾子其亦慎求之毋惑於坐忘也聖賢垂世立教之所寓者書也用而不用者心也心不可用書亦不可廢其為之有道乎得其道則交助失其道則交病願吾子之終思之也仲尼顔子之樂此心也周子程子此心也吾子亦此心也得其心樂不逺矣願吾子之終思之也語已光宇整步而出充然若有得者歸揭其榜曰尋樂齋云風木圖記莆之李侯某由進士官戸曹員外郎出為廣東按察僉事每出行部至新會輒一過病夫陳某白沙坐小廬山精舍半餉始至攜所得誌銘文并挽詩一大帙來授而讀之三斂袵先處士黙菴先生與林夫人之賢皆可考而知矣尋以風木圖請記夫孝子之事其親視於無形聴於無聲致愛則存致慤則著著存不忘乎心奚存殁間哉吾聞之曾子再仕而心再化曰吾及親仕三釡而心樂後仕三千鍾不洎吾心悲弟子問於仲尼曰若參者可謂無所縣其罪乎曰既已縣矣夫無所縣者可以有哀乎彼視三釡三千鍾如鸛雀蛟虻相過乎前也今夫禄之弗逮養曾子悲之侯亦悲之侯之心曾子之心也若曾子可謂盡思矣奚事於圖乃若孔子則以為子之養其親期於適焉耳茍至乎適雖聖人不能以有加也遑問其他其足於内者無所待乎外性於天者無所事乎人又非但事親一事為然也一以貫之其所稱孝非常所稱常所稱者豐其養厚其葬生之封死之贈而已耳嗟夫今之士夫異於古之士夫也其所稱孝率以是為至矣吾恐聖賢之意不明於後世也既撫圖而悲復引其意謂侯曰侯死事盡思無負於曾子矣亦知曾子所以顯其親於無窮者何如哉孝經曰立身行道揚名於後世以顯父母孝之終也侯念之侯念之是為記處素記一夫頎然始弱冠為生員事進取不偶退耕于野作室三間榜兩處素字于楣曰吾不了其義當否吾以問白沙子白沙子聞之絶倒間數日抵一巻請曰為我記處素白沙子命出硯研墨汁相向詰之曰夫記紀實也為我具狀吾為女記即應曰毋苦我人呼我秀才我即不應謂我處素我即應之但子為我記足矣吾知其狀云何兩手捧硯躡席揚睂進愈恭白沙子不能却墨其巻歸之慈元廟記世道升降人有任其責者君臣是也予少讀宋史惜宋之君臣當其盛時無精一學問以誠其身無先王政教以新天下化本不立時措莫知雖有程明道兄弟不見用於時迹其所為髙不過漢唐之間仰視三代以前師傅一尊而王業盛畝畆既出而世道亨之君臣何如也南渡之後惜其君非撥亂反正之主雖有其臣任之弗専邪議得以間之大志弱而易撓大義隠而弗彰量敵玩讐國計日非往往坐失機會卒不能成恢復之功至於善惡不分用捨倒置刑賞失當怨憤生禍和議成而兵益衰嵗帑多而民愈困如久病之人氣息奄奄以及度宗之世則不復惜為之掩巻出涕不忍復觀之矣孔子曰人之生也直罔之生也幸而免劉文靖廣之以詩曰王綱一紊國風沈人道方乖鬼境侵生理本直宜細玩蓍龜萬古在人心噫斯言也判善惡於一言決興亡於萬代其天下國家治亂之符騐歟宋室播遷慈元殿創于邑之厓山宋亡之日陸丞相負少帝赴水死矣元師退張太傅復至厓山遇慈元后問帝所在慟哭曰吾忍死萬里間闗至此正為趙氏一塊肉耳今無望矣投波而死是可哀也厓山近有大忠廟以祀文相國陸丞相張太傅𢎞治辛亥冬十月今戸部侍郎前廣東右布政華容劉公大夏行部至邑與予泛舟至厓門弔慈元故址始議立祠於大忠之上邑著姓趙思仁請具土木公許之予贊其決曰祠成當為公記之未幾公去為都御史修理黄河委其事府通判顧君叔龍甲寅冬祠成是役也一朝而集制命不由於有司所以立大閑愧頽俗而輔名教人心之所不容已也碑於祠中使來者有所觀感𢎞治己未夏予病小愈尚未堪筆硯以有督府鄧先生之命念慈元落落東山作祠之意久未聞於天下力疾書之愧其不能工也夢記庚寅秋月距予自京師歸適踰一載是夕天氣稍凉予讀易白沙之東房既倦而卧夢與應魁殿元克恭黄門同行一童子前導不識者一人次之次克恭次余應魁途遇泥潦予呼童子取行具童子不應余因曰越人歌之楚人應之應魁屢歎不置克恭顧余作愁狀其不識一人者漠然若無所聞焉既寤測其意曰越與楚風氣不同人聲隨而異必不能相通而相好使越人歌之楚人聴之亦猶使楚人歌之越人聴之也孰若使越人歌之越人自聴之楚人歌之楚人自聴之其音習於其耳其言感於其心奚不相説之有是故越不可為楚楚亦不可為越越與楚不相能非有生之初習使然耳習之久殆與性成夫茍欲變之非百倍其功持之以久不可使化而入今若以為越者一人驟而號於楚地曰去而為楚者以從我楚得不羣怒而逐之乎然則如何曰守其為越者無遽責楚以必同庶乎其免矣又三月二十七日碧玉樓午睡夢出貞節門外大水一老人抱衣浣於前歌曰法好人莫傳衣好人莫穿良久又歌曰西子䝉不潔揜鼻過者疾趨而爭先雖有惡人齋戒沐浴被服明鮮以祀上帝執侍周旋與世駢肩吁是何夢耶將有應于後早為之兆耶抑夢幻虚無同異端之説從而稽之因妄求妄不可耶姑記於此以俟明者決焉補遺論前輩言銖視軒冕塵視金玉上道至大天地亦至大天地與道若可相侔矣然以天地而視道則道為天地之本以道視天地則天地者太倉之一粟滄海之一勺耳曾足與道侔哉天地之大不得與道侔故至大者道而已而君子得之一身之微其所得者富貴貧賤死生禍福曾足以為君子所得乎君子之所得者有如此則天地之始吾之始也而吾之道無所增天地之終吾之終也而吾之道無所損天地之大且不我逃而我不增損則舉天地間物既歸於我而不足增損於我矣天下之物盡在我而不足以增損我故卒然遇之而不驚無故失之而不介舜禹之有天下而不與烈風雷雨而弗迷尚何銖軒冕塵金玉之足言哉然非知之真存之實者與語此反惑惑則徒為狂妄耳中天下事物雜然前陳事之非我所自出物之非我所素有卒然舉而加諸我不屑者視之初若與我不相渉則厭薄之心生矣然事必有所不能已物必有所不能無求於吾前矣得謂與我不相涉耶夫子謂不義而富且貴於我如浮雲謂薄不義也非薄富貴也孟子謂舜視棄天下如敝屣亦謂重愛親也非謂輕天下也君子一心萬理完具事物雖多莫非在我此身一到精神具隨得吾得而得之耳失吾得而失之耳厭薄之心胡自而生哉巢父不能容一瓢嚴陵不能禮漢光此瓢此禮天下之理所不能無君子之心所不能已使二人之心果完具亦焉得而忽之也若曰物吾知其為物耳事吾知其為事耳勉焉舉吾之身以從之初若與我不相渉比之醫家謂之不仁昔人之言曰銖視軒冕塵視金玉是心也君子何自得之哉然非其人與語此反惑惑則累之矣或應曰是非所謂君子之心也君子之辨也曰然然無君子之心徒有輕重之辨非道也下或曰道可狀乎曰不可此理之妙不容言道至於可言則已渉乎麤迹矣何以知之曰以吾知之吾或有得焉心得而存之口不可得而言之比試言之則已非吾所存矣故凡有得而可言皆不足以得言曰道不可以言狀亦可以物乎曰不可物囿於形道通於物有目者不得見也何以言之曰天得之為天地得之為地人得之為人狀之以天則遺地狀之以地則遺人物不足狀也曰道終不可狀歟曰有其方則可舉一隅而括其三隅狀道之方也據一隅而反其三隅按狀之術也然狀道之方非難按狀之術實難人有不知彈告之曰彈之形如弓而以竹為弦使其知弓則可按也不知此道之大告之曰道大也天小也軒冕金玉又小則能按而不惑者鮮矣愚故曰道不可狀為難其人也安土敦乎仁易上繫曰安土敦乎仁予曰寓于此樂于此身于此聚精會神于此而不容惑忽是謂之曰君子安土敦乎仁也比觀泰之序卦曰履而泰然后安又曰履得其所則舒泰泰則安矣是泰而后可安也夫泰通也泰然后安者通于此然后安于此也然九二曰包荒用馮河是何方泰而憂念即興也九三曰艱貞无咎則君子於是時愈益恐恐然如禍之至矣是則君子之安于其所豈直泰然而無所事哉葢將兢兢業業惟恐一息之或間一念之或差而不敢以自暇矣有於予心符或曰君子不已勞乎應曰乾之象曰天行健天之循環不息者健而已君子執虚如執盈入虚如有人未嘗少懈者剛而已天豈勞哉君子何為不暇乎無後君子一心足以開萬世小人百惑足以喪邦家何者心存與不存也夫此心存則一一則誠不存則惑惑則偽所以開萬世喪邦家者不在多誠偽之間而足耳夫天地之大萬物之富何以為之也一誠所為也葢有此誠斯有此物則有此物必有此誠則誠在人何所具於一心耳心之所有者此誠而為天地者此誠也天地之大此誠且可為而君子存之則何萬世之不足開哉作俑之人既惑而喪其誠矣夫既無其誠而何以有後邪仁術天道至無心比其著於兩間者千怪萬狀不復有可及至巧矣然皆一元之所為聖道至無意比其形于功業者神妙莫測不復有可加亦至巧矣然皆一心之所致心乎其此一元之所舍乎昔周公扶王室者也桓文亦扶王室也然周公身致太平延被後世桓文戰爭不息禍藏于身者桓文用意周公用心也是則至拙莫如意而至巧者莫踰于心矣孟氏學聖人也齊王不忍見一牛之死不有孟氏不知其巧也葢齊王之心即聖人之心聖人知是心之不可害故設禮以預養之以為見其生而遂見其死聞其聲而遂食其肉則害是心莫甚焉故逺庖㕑也夫庖㕑之禮至重不可廢此心之仁至大不可害君子因是心因制是禮則二者兩全矣巧莫過焉齊王之心一發契乎禮齊王非熟乎禮也心之巧同也聖人因民害而迸之四裔之民奚罪焉亦曰戮之則闕有之遺害故聖人之仁有權焉使之逺禦魑魅則害去而惡亦不得施矣夫人情之欲在于生聖人即與之生人情之惡在于死聖人不與之死惡衆人所惡也聖人即迸除裔夷惡難施也聖人以投惡聖人一舉而迭中聖人未嘗巧也此心之仁自巧也而聖人用之故天下有意于巧者皆不得厠其間矣周公一金縢大發寤時主以後世事觀至巧矣周公豈有意耶亦任心耳陳白沙集巻一欽定四庫全書陳白沙集巻二明陳獻章撰
