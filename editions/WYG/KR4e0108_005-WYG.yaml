front:
  text: 張内翰廷祥書括而成詩呈胡希仁提學古人棄糟粕糟粕非真傳𦕈哉一勺水積累成大川亦有非積累源泉自涓涓至無有至動至近至神焉發用兹不窮緘藏極淵泉吾能握其機何必窺陳編學患不用心用心滋牽纒本虛形乃實立本貴自然戒慎與恐懼斯言未云偏後儒不省事差失毫釐間寄語了心人素琴本無絃
  hash: sha256:2ae0f0209392a1fe4d45113aab6cff8d1d2ae243b6f00c0617ad2f23ed9ac0a3
body:
  text: 代簡答羅一峯殿元臺城一揮袂忽忽星週五路永消息斷年深别離苦思君髪為白始白數莖許今晨對書尺白者不可數先生天下士詎肯顧衡宇悵望曹溪約獨與光也語一峯約㑹南華不至贈張叔亨知縣棲棲白沙舫影弄寒江月夫君沙陽令胡事顧微劣我祖在九㝠願君為墓碣三夜茆簷下寒燈坐來滅感子心意勤愧我言詞拙明發江上舟踟蹰與君别戲贈館賓遲遲嵗將暮戚戚懷故里館中飢䑕多旅食驢兒尾垂德於不報世間寧有此行李無一錢還家對妻子冬夜長夜氣始凄木棉被重裘端坐思古人寒燈耿悠悠是時病初間背汗仍未收學業坐妨奪田蕪廢鉏耰高堂有老親徧身無完紬丈夫庇四海而以俯仰憂口腹非所營水菽吾當求明旦理黄犢進我南岡舟又我從省事來過失恒十九喜怒朝屢遷言為夕多茍平生昩慎獨即事甘掣肘孔子萬世師天地共髙厚顔淵稱庶幾好學古未有我才雖鹵莽服膺亦云乆胡然弗自力萬化脱樞紐頽顔無復少此志還遂否嵗月豈待人光隂隙中走念此不成眠晨星燦東牖經鱷州夕舫臨大波北風吹我席㝠㝠鱷州烟宛對君山碧來雁知天寒歸人㸔月色超超塵外心浩矣周八極厓山㸔大忠祠豎柱阻風七日後發舟用舊韻青青竒石草上有牛羊躅洶洶厓門水逺帶湯瓶山名緑浮雲散孤嶼初日明村曲言歸輒風濤無乃疑張陸遲遲重遲遲畏此波心木漁人植長木於波間置罾俗呼為罾戙木觸之能覆舟自策示諸生賢聖乆寂寞六籍無光輝元氣五百年一合又一離男兒生其間獨往安可辭邈哉舜與顔夢寐或見之其人天下法其言萬世師顧予獨何人瞻望空爾為年馳力不與撫鏡歎以悲豈不在一生一生良遲遲今復不鞭策虛浪死勿疑請回白日駕魯陽戈正揮湖西八景為羅修撰作效一峰體太極丸春天城列兩儀其中位太極山名不悟名象生焉知畫前易伏羲古已亡圖書乆晦蝕寄語山中人妙契在端黙翠𤣥洞天翠𤣥在何許乃在金鼇麓石門俯深幽來者秉明燭繡壁誰可縁丹房我當宿呼童烹金鼇膏此千丈木一峯來秀西湖有一峯天地得撑拄旁有龍塘峽北有浮香塢我行崑崙丘一望一延佇歸來二三子抵掌太極語三峽迴清一峽蟠一龍羣山莽回互武夷雖九曲三峽誰勝負澄澄水上月歴歴谷中樹焉得千丈笻坐弄潺湲處金鼇霽雪一鼇海上來頭戴雪花白諸鼇起相拒千秋歸不得仙人羅一峯永戲金鼇側借問别離時西佛生彌勒玉冕晴雲玉冕臣諸峯左右羅絡之雲來巾其顛得雨不復疑豈無澤物功雲覆在何時悵望百穀春廣濟蒼生飢飛轝横翠我昔遊太空太空雲㝠㝠歸來控翠虯力與金鼇争巍巍太極尊揮置東西行如何千載下空儗飛轝名大流垂玉大流無此竒偶置銀河傾願回銀河流免與世濁并一洗日月光再洗天地清何止天地清萬世無甲兵題冷庵江西僉憲陳琦自號舉世好近熱子獨畏之猛投身向壑雪永謝白日影玉壺貯清氷秋露滴金井是以冷自勝于世非絶屏假令務絶屏過與近熱等我以道眼觀天下方首肯寒暑兩推移正中太和境寄語庵中人不熱亦不冷扶南訪黄巖尹鄺載道適來顧白沙兩不值賦三側韻行舟石門浪不識扶溪口時時聞來往日入喪水手昨暮黄巖馬來嘶白沙栁惜哉兩不遇獨坐空搔首我有一斗酒願與子秉燭子來復空去值我不在屋穉子呼不至踉蹌走入竹明旦歸我艇先後迓以告閒居不儗出偶出負佳客問客來何許來自黄巖謫長安接笑語中道有暌隔悠悠百年内與子異顯黙感事君心如逝水一往不復旋誰能萬里浪安坐駕此舩傷哉一何愚由我不由天仁者固有矜智士乃自全夢觀化書六字壁間曰造物一塲變化孔子曳杖歌逍遥夢化後我夢已逍遥六字書在牖聖愚各有盡觀化一遭走問我年幾何春秋四十九死生若晝夜當速何必乆即死無所憐乾坤一芻狗貪泉藜藿可養生栢棺可送死瓦礫是黄金貪泉亦清泚飲水心不易豈獨夷齊爾山鬼笑儂家儂家笑山鬼九日諸友㑹飲白沙得雁字黄菊有佳辰良朋樂呼喚爭持淵明杯來接子桑飯落葉迎馬鞭斜暉轉沙岸雨聲静秋竹池影入江雁酒酣獨髙歌呼兒續我斷諸君極留戀十觴亦不算雖無孟嘉量且免落帽亂百年能幾何去者已强半來㑹安可期細把茱萸看贈林汝和通判在昔黄金臺與子初周旋萍逢忽相失不見垂十年昔為禮曹官今揺慶陽鞭常聞太華峯峻絶峙中天雅志在登陟矯如孤鵠鶱適來南海旁問訊滄洲廛語舊未終日棲棲有所牽丈夫重出處富貴如浮烟行則為在田止則為在淵勞勞夫何為贈子千金言贈馬龍如湖西奠一峯先生晨興坐捫虱有客窺我床客來問何許顔色慘不光去嵗秋在季文星墜西江而師羅一峯幸視我弟兄相見不得語失聲淚滂滂子行詣湖西問訊我有將夙昔夢見之恍若芙蓉城覺來索苦句句就涕未停何以告一峯寄意於瓣香索火化奠文一峯其洋洋我病乆南海欲往未得行送子出門去目極秋天長贈陳秉常逺色霽初景清風振遥林子來入我室弄我花間琴正聲一何長幽思亦已深願留一千嵗贈子瑶池音黍稷雜萑葦邪思亂正性人為一鹵莽諉曰天之命白日朝出東須臾復西暝良時誠可惜逝矣悲莫競大舜巻婁之莊周竟奚取人生貴識真勿作孟浪死誰能去中土僦舎朝鮮里白首金石交視我南川子我否子亦否我然子亦然然否茍由我於子何有焉人生寄一世落葉風中旋胡為不自返濁水迷清淵藤蓑一蓑費幾藤南岡礪朝斧交加落翠蔓制作類上古吾聞大澤濱羊裘動世祖何如六尺蓑滅蹟蘆花渚舉俗無與同天隨夢中語今夜不須歸前溪正風雨人好蓑亦好月光水亦光水南有酒媪酒熱喚我嘗半酣獨速舞舞罷還舉觸所樂在知止百年安可忘挽蓑欲何為新月出東嶺獨速舞不休凌亂何由整曠哉漆園吏自形還自影新蓑藤葉青舊蓑藤葉白新故理則然胡為浪忻戚扁舟西浦口坐望南山石東風吹新蓑浩蕩滄溟黒須臾月東上萬里天一碧安得同心人婆娑共今夕朽生何所營東坐復西坐搔頭白髪少攤地青蓑破千巻萬巻書全功歸在我吾心内自得糟粕安用那賽蘭南有賽蘭香名花人未識光風散㣲馨甘露洗新碧一月薰蒸來氤氲在肝膈乃知方寸根中禀天地塞誰為續騷手俯仰空悽惻窓户悄無人圖書共昕夕天人之際天人一理通感應良可畏千載隕石書春秋所以示客星犯帝座他夜因何事誰謂匹夫㣲而能動天地答梅侍御見寄羣龍盛朝野弱羽聊山林行春忽傾葢對榻山花深引我一杯水寫君龍唇琴永言歌大篇風雅有遺音乃知鷹鸇氣未愜鸞鳳心王事有驅迫暮雨别江潯離情落晚趣再往三洲吟何以舒我懐青天盼遥岑寄題三洲巖我行蒼梧道息槳荒江湄連岡一以眺石室涵晩暉前哲有題字執炬往讀之遲囘北壁下目擊元公遺今古一相感光風吹我衣䖝鳴丹竈中葛仙胡不歸對之發長嘯宇宙今何時圓蟾夜冏冏蝙蝠秋飛飛願言托髙棲行矣無是非病中寫懐寄李九淵出門見齋顔十日不一逢以我腹中滿憶君頭上風頭風尚可炙腹滿何由通受氣我亦薄况乃疾病攻五十去始衰三四謝春冬鬢顔忽已彫血氣少復充客來索我書頴秃不能供茅君稍用事入手稱神工以兹日衮衮永負全生功長揖謝茅君安靜以待終和梅侍御見寄飛葢凌滄溟髙臺拂朱鳥乾坤一水浮日月雙輪繞塵埃紛局促正坐眼孔小景山千丈松慰我氷雪皎萬里一春風東西逐騕褭故人子羅子仙鶴歸華表暮雨江門舟含悽問封草假令鮑叔在一士亦不少誰云越臺近舉目河山杳㝠㝠白沙塢雲烟共昏曉題劉氏雙節巻阿姑與阿婦守此芳嵗䦨三十寡且貧紡績供朝飡孤兒泣長夜秉燭更抱看苦心兩咽絕芳顔亦彫􅋊持此雙白璧輝映天地間聖皇重民極門閭合施丹煌煌東白碑終古埋空山我母寡更早賦詩涕氿瀾弱草因風靡頽波良獨難送李劉二生還江右用陶韻夜聞桂樹芳晨起山鳥喧客從逺方來歴我階西偏手持諸侯書徴㑹在匡山我願結其人遂往不復還滯形宇宙内俛仰獨何言中年見二子楚楚西江英問訊徐蘇里千年有餘情開樽對㝠月高歌亦心傾胡為别我去感此秋蛩鳴贈處各有言慨然盡平生漫題日月逝不處奄忽幾華顛華顛亦奚為所希在寡愆韋編絶周易錦囊韜虞絃飢飡玉臺霞渴飲滄溟淵所以慰我情無非畹與田提攜衆雛上啼笑高堂前此事如不樂它尚何樂焉東園集茅本西嶺燒松烟疾書澄心胸散滿天地間聊以悦俄頃焉知身後年仕者必期通隱者必期高麋鹿或可羣肉食安可饕聖人履中正白首濟川舠悠悠荷簣者果識聖心勞浮雲馳白日黍稷生蓬蒿飯蔬食飲水曲肱謝遊遨汶上去不顧陋巷貧絶交徒聞武城宰割鷄以牛刀拉馬𤣥真看山官府治簿書倥偬多苦辛文士弄筆硯著述勞心神而我獨無事隱几忘昏晨南山轉蒼翠可望亦可親嵗暮如勿往枉是最閒人近來飲酒者惟我與子真能移桞間舫同泛江門津感劉琨與盧諶事越石信英臣子諒亦文雅生遭晉運㣲奔走風塵下晉陽笑明月胡雛夜回馬并州困石勒從事為别駕成敗非所論吾憐鑿坏者和陶六首歸田園我始慚名羈長揖歸故山故山樵采深焉知世上年是名鳥搶揄非曰龍潛淵東離采霜菊兩渚収菰田㳺目高原外披懷深樹間禽鳥鳴我後鹿豕遊我前泠泠玉臺風漠漠聖池煙閒持一觴酒歡飲忘華顛逍遥復逍遥白雲如我閒乘化以歸盡斯道古來然高人謝名利良馬罷羈鞅歸耕吾豈羞貪得而妄想今年秋又熟讙呼負禾往商量大作社連村集少長但憂村酒少不充儂量廣醉即拍手歌東西卧林莽近來織畚徒城市售者希朝從東臯耕夕望西巖歸貧婦業紡績燈下成嵗衣但令家温飽不問我行違移居萬金論買隣千金論買宅豈不念子孫而以營朝夕長揖都㑹里來趨白沙役壤地何必廣吾其寄一席隣曲彌樂今園林尚懷昔吾志在擇善無然復離析留連脯時酒吟咏古人詩夕陽傍秋菊采之復采之采之欲遺誰將以贈所思所思在何許千古不同時四海倘不逢吾寧獨去兹願言秉孤貞勿為時所欺九日閒居無錢撫秋菊向夕凉風生誰為白衣者頗識江州名映杯碧水淨曜日丹葩明天際雁孤去草根蟲一聲荏苒委時節裵徊閲年齡興來發長歎意盡還一傾儉德茍不慙厚禄安可榮白首希高賢清謡渺遺情人生亦易足何必勤無成和劉柴桑寄袁道見懐一峯之意當年臺城㑹執手多踟蹰四海一為别寒暑逝不居逺意屬羅浮舉頭望匡廬胡然金牛谷奄忽成丘墟蜕骨歸復土靈衿存為畬庶幾百代下攀駕以忘劬袁侯西江英好德眼中無尺素毎欲近十年不作疎磨劍患不快快則隨所須永願磨此心恢恢快劍如和郭主簿寄莊定山青松出喬木遥望十里陰少年不結友嵗暮懷同襟同襟問為誰定山攜一琴悠然一鼓之不辯古與今在昔經江東多士予所欽論交一觴酒惟我與子斟豈意千載下復此聞韶音我病不出户何時還盍簮茫茫宇宙内與此契其深贈羊長史寄遼東賀黄門欽此心自太古何必生唐虞此道茍能明何必多讀書寂寂委山澤于于來京都斯人各有分彼此何能踰杪秋風日清呼兒理肩輿聊為玉臺遊言笑誰與俱屈指意中人一坐一踟蹰歸來㸔四壁四壁光如如聖道日榛塞誰哉剪其蕪夫子乆不見吾生何以娱常恐嵗月晚况與音問疎申以伐木章一日三巻舒飲酒木犀冷於菊更後十日開清風吹芳香芳香襲人懷千回嚥入腹五内無一乖雖靡鸞鳯吟亦有鷦鷯棲昔者東籬飲百榼醉如泥那知此日花復與此酒諧一曲盡一杯酩酊花間迷赤脚步明月酒盡吾當回庚戌嵗九月中於西田穫早稻遲明向南畆疎星在簷端夫出婦亦隨無非分所安道旁往來人下車時一觀問津津不知仰視飛鳥還邏苖逺峙夕濯足荒溝寒吾惜耦耕好焉知世路難伐鼔収西畬黄雲被江干聊周代糟糠作粥歡賔顔隣叟擕兒來嬉戲松下闗齊聲鼔腹謳永謝攅眉歡懷古田舍君子固有憂不在賤與貧農事乆不歸道路竟徒勤青陽動芳草白日悲行人沮溺去千載相知恒若新出門轉窮厄得已聊一欣甘雨濡夕畛繁花幕春津獨往亦何樂耦耕多近隣百年鼎鼎流永從耕鑿民製布裘成偶題寄黎雪青海布剪黄雲嶺綿莊白雪製為道人衣方直無周折吾老不出門躬耕慕冀缺黄昏披此裘坐望梅村月美人遺我酒小酌三杯烈半酣發浩歌聲光真朗徹是身如虛空樂矣生滅滅紫菊吟寄林時嘉嚴霜百卉枯三徑挺秋菊緑葉明紫英微風逓寒馥芳情謝桃李雅望聫松竹懷哉種花人杳在江一曲遺我盎中金南窓伴幽獨時無續騷手憔悴誰當録且脱頭上巾茅柴今可漉感鳥有鳥不知名皎然閨中清育雛上庭竹衆鳥不敢凌暮雨銜蟲歸喚雛雛不譍以翼覆雛宿夜久巢屢驚小僕極􅋊忍不眠伺東榮扳巢襲其母母去巢亦傾一雛墮地死二雛尚吚嚶平明視竹根羣蟻正經營子弱母䕶之無母何以生嗚嗚號者死宛有雌雄情入簾逼我枕為我再三鳴此鳥初來巢卑卑近前楹我無害鳥心人謂此鳥靈終焉失所托此禍將孰懲吾甚愧此鳥感之欲霑纓呼奴撻其背流血非所矜再拜謝此鳥此意何由平賔陽樓八景為丘侍御作今存其三穀城呼月㣲月瞰高樓樓中酒初㵼旁見穀城山孰為呼月者騰騰露光景寂寂開迥野笑問圯上翁何如此山下牌山樵唱日夕樓上飲瞻望南山阿樵夫睨林木㑹意豈在多白雲滿山徑負薪行復歌人生異出處貧賤奈爾何羅水漁歌有月來照人沉竿坐羅水意與羅水深夜静歌亦起江湖雖云樂天地懼終否豪哉賔陽子發積異姜吕題萬碩司訓風木圖把君風木圖識君風木心賢者不易貴逺者寧務今嗟哉鼎與茵充足時所欽築室辛勤結吾廬經始算一䇿廣狹更度量卑髙在平秩堂以備薦享閣以邀風日前榜貞節門後治渭川室四垣謝粉飾牡蠣髙為骨仰瞻勢㣲峻其間僅容膝既以儲簡編猶堪斂袍笏是年秋在仲筮日欣得吉良友交助余衆工告易畢把酒對梅花浩歌新突兀讀林緝熙近詩時緝熙典文衡閩中欲便道還家數夕前嘗夢見之故有是作言笑不可親中宵馳夢想君行幾千里道路輕閩廣忽見囊中詩區區謝官長深淵或遺珠努力試一往微官亦何事感激章欲上行止各有時姓名忌標榜此言誰為傅聊以慰俯仰將如外海看山先寄道傍諸友吾衰何所如俯仰在一席舍傍有小水相望渺南北静乆動乃宜住多行亦得朝往暮南還路旁事舊識故人邀我飯半餉吾未惜東老對囘公神仙無惡客秋興西風振庭木虛堂夜蕭蕭攬衣起步月歸雁雙飄颻天地豈予獨知音不可招㝠心祈有合悵望空雲霄盛時不得意衰老徒悲傷志士曷為爾載籍多見之翹首面崑崙白龍有遺池振衣一千仭高詠秋風誰海上有一士來往不知年或就胥靡飯或投上方眠游處各有徒孰謂世情然飲酒不在醉弄琴本無絃借問子為誰得非魯仲連謝琴月惠荔枝長夏風雨過西良荔枝熟晩有好事人提筐歸我屋老母不肯嘗馨香聞隔宿上以薦祖考交分及僮僕苐令筐中有不畏稚兒哭爾惠良足嘉吾親素多淑在德不在物豈謂窮口腹東坡三百顆日啖不知足長為嶺南人千載披心曲贈世卿采菊復采菊嚴霜下庭木豈無桃李顔畏此天地肅落落枝上英未傷餐者獨持贈楚人歸投之江魚腹青青墻下竹冬後色如是燦燦月中花嵗寒香不匱新知語未足逺别情難置獨上江門舟北風日凌厲進亦人所憂退亦人所憂得亦人所憂失亦人所憂所憂非憂道所憂其可留所憂非憂貧所憂其可休古來嚮道人能辯憂所由去去凌九霄行行戒深溝敬此之謂修怠此之謂流元神誠有宅灝氣亦有門神氣人所資孰謂老氏言下化囿其蹟上化歸其根至要云在兹自餘安足論可以參兩間可以垂萬世聖人與人同聖人與人異堯舜於舞雩氣象一而已大者茍不存翩翩竟奚取老夫嘗用力茲以告吾子文字費精神百凡可以止一落永不收年光建瓴水上上崑崙峯諸山髙幾重望望滄􅈚波百川大幾何卑髙入揣料小大窮多少不如兩置之直於了處了容珪輓詩師友道乆衰窮鄉無可者是非真妄間彼此不相假所適一以偏較然見趨舍滔滔復滔滔風俗日益下珪也何所之終身在陶冶四雛一母乳衎衎東山岑二雛羽翼長一去無遺音母哀二雛小中夜哀莫任感此骨肉别悄然傷我心蕭蕭暮色起脉脉春江深百年㑹有盡淚下雍門琴容氏多兄弟西良此白眉源源來講席稍稍樹頭籬行可鄉人敬心惟我軰知臨危僕且至忍死待斯須有懷世卿仙鶴去不歸黄鸝向人語空館忽相思雲山杳何許出門東望海黙黙空延竚月出潮復來鳴橈下滄渚時雨日夕來郊原藹新緑白雲被重崖下映寒塘曲情結竹上言魂消井邊躅三年隔瀟湘書至不可讀伏枕廬山下春懷慘不舒哀絃乆去耳風韻今何如灼灼花自媚嚶嚶鳥相娱髙臺夕流盼古道行人疎煩囂謝人境抱膝山臺居奈此枝上鳥交交春雨餘少年耳目冗衰老不能虛安得魯連子從之泛江湖觀自作茅筆書神往氣自隨氛氲覺初沐聖賢一切無此理何由矚調性古所聞熙熙兼穆穆恥獨不恥獨茅鋒萬莖秃益母草有草人不識棄之等蒿萊時來見任使到口生風雷溲也佐未足益以蜜與醅生者得其養死者無遺胎岐黄開本草夭札人所哀一物具一周神功不可猜佳名夙所慕廣濟真天才送劉方伯東山先生未别情何如已别情尤邈豈無尺素書逺寄天一角江門臥烟艇酒醒蓑衣薄明月照古松清風灑孤鶴逰圭峯同世卿作窮居無歲年老夢得迂朽永托山水間東西事逰走幽幽鐡橋花悵望未得手杖履聊此躋㣲霜正疎栁斂襟欲無言㑹意豈在酒滄海當我前崑崙卓我後但談孔氏規坐失㣲生畆示李孔修近詩昔别秋未深今來嵗方晏吾衰忘筆硯月記詩半板或疑子美聖未若陶濳淡習氣移性情正坐聞道晩為我試讀之如君當具眼蔣韶州書至代簡答之相别何悠悠梅花十寒整音塵中斷絶窅若堕深井忽枉尺素書開讀喜不定庾嶺秋正髙揚旌下松徑君才足理郡韶民日延頸古來水火喻子産功在鄭嵗計諒有餘願聞下車令八月二十四日􅄓作多溺死者坐忘一室内天地極勞攘顛浪雷殷江流雲墨推障髙田水滅頂别塢風翻舫大塊本無心縱横小兒狀江門三兩詩饒舌天機上讀張廷實主事近稿世惟識寳人惜寳如惜子寳為物所揜念之容色悴一朝此寳來輒復喜不已喜戚由寳故以識為心累贈鍼灸楊飛昔吾見爾翁賣藥金陵市手持一寸鍼鍼落病者起我主大行人翩翩酒相值京中多異客飛葢若流水一峯挾一囊有藥能醫世時當引疾去東西各飄逝嵗月忽復多囊括鍼亦廢君來還見予俯仰相悲喜何期二紀下重睹無雙技瞻彼老定山風波五千里金陵多舊㳺存殁寧復記人生若浮烟為君語如是正月二日雨雹是日雨水節雨水不雨水雨雹胡乃然小者如蓮實大者如彈丸仍聞隔江言有雹大如拳吾君古帝堯神功格皇天雹往而霰來無乃為豐年後二日雨霰五日雨霰北風巻長雲晨光坐來滅映空絮忽飛誰謂越無雪元氣塞天地萬古常周流閩浙今洛陽吾邦亦魯鄒星臨雪乃應此語非謬悠讀張地曹偶拈之作拈一不拈二乾坤一為主一畨拈動來日出扶桑樹寂然都不拈江河自流注濓洛千載傳圖書乃宗祖昭昭聖學篇授我自然度不習書絹殊失故態已付染師作碧玉老人卧帷矣呵呵拙詩紀興録上顧别駕先生以博一笑用絹不用裏下筆無神氣何况闢其行大小難更置能書法本同萬物性各異茅君疎而野拘拘用乃廢我且毛穎之安能免濡滯書成始大慙未忍水火棄持以付染師經營卧帷事作詩告先生其契茅君理贈黎秀才月行在青天月影沉碧水誰為弄影人吾與黎生耳黎生青雲彦偶值薇垣使明月還端陽贈君惟有此寄李子長仙城李子長短髪不及寸家有􅟪粟兒時無郭元振經年斷往還使我勤問訊寧知造化心天地無情盡祝融我當往往處還自然未往亦由我安知不是仙是身元有患天道豈無縁難逢俗人説可為知者傳卧逰羅浮四首登飛雲馬上問羅浮羅浮本無路虚空一拍手身在飛雲處白日何㝠㝠乾坤一風雨簑笠將安之徘徊四山暮度鐵橋一度一萬丈飛空本無鐵何名為飛空道是安排絶夜乆天宇高霜清萬籟徹手持青琅玕坐弄碧海月下黄龍天風吹我笠吹下黄龍頂兩手捉笠行不知白日暝赤松見我笑却立千丈影童子問赤松雲深各不領望羅浮山大必有靈土高豈無異翠浮幾千丈日月東南翳我尋五岳來未問仙家事絶頂望九州衡山正西峙贈周文都十年兩别君一别一回老問藥朱陵遊吾兹恨不早平生憂樂心相對各傾倒逺别望眼昏浮雲不堪掃寄題嚴州嚴先生祠壁既上桐江臺復弄桐江釣不食桐江魚不怕嚴光笑衣巾人笑儂羊裘終未了堂堂范公碑千古稱獨妙寒菊菊花正開時嚴霜滿中野從來少人知誰是陶潛者碧玉歲將窮端居酒堪把南山對面時不取亦不舍寄賀柯明府世亂隳節義臨危忘大倫此風何可長此恨何由申仲尼憂萬世作經因感麟往者宋元間適逢大運屯仰天泣者誰屈指張陸文臨事誠已疎哀歌竟云云一正天地綱我祖聖以神缺典誰表章厓山莽荆榛寥寥二百年大忠起江濆慈元廟繼作爛映厓山雲近者陽江尹一念何精勤作祠比厓山兩廟存三仁大封赤坎墓昭昭愜衆聞深悲魚腹冷一躍海門春厓海風波隔陽江面目新自然聲氣應坐使風俗淳短巻心先賀神交夢每親琢詞告萬世老病敢辭君偶書所見厓傾百丈泉直下注東川翳流起大舂覆茅於其巔一為利所驅取便世爭先漢隂喻桔橰所見無不然嗟哉抱瓮心古道何由全謝鄧督府惠交藤酒至使來遺一樽百金不願易遇藥如遇仙竒方聞在昔卓哉李文公作傳甚詳悉感公嘉惠心何以酬公德但恐命不齊服藥也無益曉枕天地無窮年無窮吾亦在獨立無朋儔誰為自然配舂陵造物徒斯人可神㑹有如夀厓者乃我之儕軰永結無情遊相期八紘外題端陽李太守甘霖重應巻嶺南名刺史端陽有成績端陽問為誰長沙垂令德曰惟長沙公善非一代積去年苖欲槁公寢不安席手拈一炷香須臾見昭假今年事復然斯民忻目擊甘霖雨下土郊野望四塞滂沱及隣壤秋田足民食公惠寧有心斯民感公德口頌遂成碑舉手還加額安得長沙公為我大邦伯坐令十郡内廣布陽春澤閭閻興孝悌四野無盗賊共育太和春絪緼謝反側偶得寄東所知暮則知朝西風漲暮潮千秋一何短瞬息一何遥有物萬象間不隨萬象凋舉目如見之何必窮扶搖登髙未必髙老脚且平步平步人不疑東西任四顧豈無見在心何必擬諸古異體骨肉親有生皆我與失之萬里途得之咫尺許得失在斯須誰能别來去明日立秋來人方思處暑和羅服周對菊見寄春來苦不早春去常願遲嗟哉造化機萬物安得知嵗晏菊始吐鮮鮮在東籬不汚桃李塵永續徴君詩龜山夜月萬古此龜山萬古此明月開簾望龜山岱宗固無别但恐山多雲風吹亂人睫馬牙香爐中煨白术坐上有青天綺季奕未畢夷齊上西山沉檀皆下品欲語不同年題心泉贈黄叔仁夜半汲山井山泉日日新不將泉照面白日多飛塵飛塵亦無害莫弄桔橰頻贈伍弼歸覲諸生胡不歸九月望庭闈山北山南道紛紛落葉飛呼兒巾木榻謝客掩荆扉不盡來時約堪沾别處衣真樂吟效康節體真樂何從生生於氤氲間氤氲不在酒乃在心之𤣥行如雲在天止如水在淵靜者識其端此生當乾乾得何時矩書良友惠我書書中竟何如上言我所憂下述君所移開緘讀三四亦足破煩汚丈夫立萬仭肯受尋尺拘不見柴桑人丐食能歡娱孟軻走四方從者數十車出處固有間誰能别賢愚鄙夫患得失較計於其初高天與深淵懸絶徒嗟吁五言絶句曉起偶然風折木村犬吠成羣此事真難免問君聞不聞辛苦南隣臼逺雞方一鳴夜來風極急吹斷到忩聲冬眠不覺曉開門見白雲雲中何所有童子兩三人湖西九巖為一峯題光霽巖風月佳名在乾坤浪跡空從來巖下客祇與異人逢翠華巖來説湖西者不及華山頂誰知巖中仙解作石柱屏清風巖聲從竇中來可以塞天地借問采嶶人便知風動處府教巖宋教授羅開禮所棲之地府教英靈在虺蛇不敢居從來巖上月只是照虚無極清巖聲名野老畏草石貴人爭剗却巖中有悠悠是極清英公巖今名鐘英一峯所更翠掩千尋洞青窺一竅天人間無絶境不要問桃源扇和巖即石柱巖山骨短圓稜初疑削木成乾坤藏一柱猶得鎮巖扃卧龍巖巖有龍潭龍床床之旁有石仙人龍出潭水空龍歸潭水黒君從龍床來誰在龍床側月巖闇闇月墮地忽在天中央墮地人不覺中天照四方題慈元廟慈元一片石長留何處山厓門潮日至雪浪飛天闗題畫金籠鎻鸚鵡山木縱斑鳩巧拙知誰是天機不自由題畫松泉為張别駕松乃木之雄公亦人中龍何須看畫本千丈在胸中對酒放歌當盡聲飲酒當盡情門前烏桕樹夜半子規鳴答丘侍御送酒石齋書本拙酒力巧相扶欲報霜臺貺山中一物無雨後乆雨方行樂花前望玉臺人間見花樹不似玉臺開村步雜書所見疎花明委巷細雨得今晨㸃綴非無意紅芳不是春公飯何曾接衣冠不作人齋中有名酒分爾一杯春晩食南山稻堂堂媿野人平生無可説一個白頭親村笛轟牛背山花結帽頭騎牛勝騎馬曲坂没郎愁趂罷江門市商船奪港歸溪山愁引望城郭更須知日照南浦口初喧江市人小奴性嗜酒出飲畏吾嗔戲贈求書饒大中還江右書法一家成風波幾月程孤舟愁度險薦福有雷聲代簡答方伯彭公大賢望於人往往非獨守難将一人意滿足天下口氤氲復氤氲東君欲放春梅花何太早早報越城人絶句清曉乘驢出北風吹澗藤沉吟澗邊道天意莫留行行止皆前定出門愁北風西郊不成往昨夜夢途窮贈鄺知縣雲卿别又送夫君别芙容花可憐水深難折贈留伴老夫眠與諸友夜過貞節橋人影荒橋下蟲聲滿月中連翩雙大袖聊得颭溪風讀張主事近稿雨中月不見雨霽月還多雨被風吹去無風月奈何對菊淅淅西風至為秋未有涯江邊聊一醉信手得黄花不落龍山帽何須九日風更煩將小雨向晩洗花叢春事歸桃李西風響未休長官三徑晩丞相一坡秋菊坡先生崔與之也好個重陽節誰家酒不賖果然殺風景吸茗對秋葩天地花無數寒花色乃佳古詩拈未出除是長官來九月木犀花盛開偶成寄賀黄門克恭香逐西風起氤氲入杳㝠不知從此去幾日到遼城洗竹風引一叢竹揺揺四五莖横斜今洗盡道眼看圓成洗竹洗荒枝洗心洗狂馳老夫無可洗抱膝洗吾詩一洗一囘疎相將洗到無客來莫問我北壁有團蒲曉起籬頭過井水不打隔齋門手握南陽布纒頭數竹孫老不愛春華一籬孤負花胡為聒我枕穉子打朝鴉自有無情蝶孤飛不傍花白頭聞見少閒動羽蟲嗟贈張叔亨侍御天下元無事勞勞我有心相攜沙上語山月二更深觀羣兒釣羣兒齊弄釣其一偏多遇餘三未得手投竿來上樹仰面看垂釣失脚堕危石若是謫仙人水中眠亦得閲丁知縣傳模様從看拙丹青只寫真乾坤如許大具眼豈無人夢中作翩翩復翩翩天生我亦仙江山足風月吟弄到何年夢丁彦誠與君生死别三四嵗星周夢語分明記相悲各㸃頭對竹竹色上墻多南薰緑幾何時無分付處野鳥自來歌窓外竹青青窓間人獨坐究竟竹與人元來無兩個北風巻頑雲隂晴安可卜海月出漸髙獨照南窓竹隨筆茍能深積累豈患無髙譽如何世中人甘心鐵爐步一嵗十匹衣一日兩杯飯真樂茍不存衣食為心患人不能外事事不能外理二障佛所言吾儒寧有此斷除嗜欲想永撤天機障身居萬物中心在萬物上小雨閉空齋青青竹映堦道人終日靜一枕到無懷子美詩之聖堯夫更别傳後來操翰者二妙少能兼梅下雜詩朝凭曲欄西暮凭曲欄東欄裏梅花好看花了病翁乆共寛閒地儂薰自在香折來何所寄只是寄遼陽賀黄門欽也贈人萱親垂九十遊子尚天涯莫艤仙城棹南風夜引旗讀易偶成南乎不可北東乎不可西自從孔孟來君子恒處暌張克修别駕約遊羅浮重疊四百峯鐡橋在何處莫將别駕來同到飛雲去張克修見訪滄溟幾萬里山泉未盈尺到海觀㑹同乾坤誰眼碧題劉鑑松劉生於寫松能以酒力遣酩酊氣正豪蒼龍自舒巻題扇風檣拗欲折五月瞿塘過何如此庵中紅日抱膝坐張帆海上囘帆掛鐵橋樹驚起白蝦蟆跳上飛雲去贈胡地官次韻吳明府獻臣有一范仲淹人將重名節馬上地曹郎翩翩起吾粤引滿花下杯延縁坐中客醉不大袖歌孰云此門窄題林府尊夀家慈書後馬尾縁封事魚緘夀老親古今誠一揆藉用白茅人題顧通府集古倡和巻後滿眼珠玉光髙才極雄騁對之不敢言稚子來弄影出化書訪客舟中船頭酒多少船尾閣春沙恰到溪窮處山山枳殻花夢後作䇿杖獨行游青山一何深道逢采藥人問我松脂林見月時一吟夜凉天稱心囘頭望東川流水無古今幻迹有去來逹觀無古今長嘯人不聞山風吹羅襟楊栁餘朽株梧桐但疎隂小臥不出門不知秋已深贈鄺筠巢山中一夜秋老屋居然别丈人不飲酒共坐看明月客乞題隨時子軒無雨笠且置未晴蓑不捨蓑笠用不窮我是隨時者題扇東艇拍西艇小拍庸何傷夕風起驚濤艇艇爭低昂一夫眉正揚一夫髪盡秃日暮船正歸前江風拔木蔣韶州世欽挽詩治郡聲名逺如何是我詩青山韶石老囘首盡交期往事形骸外如今一夢休曹溪分我茗猶説蔣韶州周京聞母䘮歸弔以是詩萬里無歸耗形將一木親遺言入肝肺真得太夫人題南忩壁南風吹面處不省是南忩此意無人㑹乾坤落酒缸雨後示劉宗信林時嘉一雨變新凉炎埃洗除盡廬山昨夜燈已照劉宗信秋來亦滛潦日月閟其光乾坤丈夫事千古空堂堂漫筆幅巾是秀才袈裟是和尚伎倆人共知長篇事標榜神泉八景為饒鑑賦其四贈之太極涵虚混沌固有初渾淪本無物萬化自流形何處尋吾一浮螺得月道眼大小同乾坤一螺寄東山月出時我在觀溟處茶山分香江門白藕花我榻廬山頂君若去茶山茶香復誰領神泉潄玉神泉潄玉神泉潄玉焦明亦是鳯螢焰只疑燈安得石上泉為洗世中肓九日霜前淡淡花瓢内深深酒今日陶淵明廬山作重九同俗不同俗山杯映秋菊仍聞席上歌不是人間曲歌舞重陽酒今年猶去年山中八石榻榻榻是囘仙讀李評事承芳文著論必無同乾坤孰此容人扶周孔教用世且無功一囊包宇宙到手問綱常所以東坡老嘐嘐薄武王不薄論交意因書稍稍知還將天下眼照破老夫痴送劉宗信還増城夜宿黄雲塢秋登碧玉樓歸時一片石見月過羅浮山到鐵橋西青天一角低送君高處望天與帽簷齊菊花笑我前梅花撩我後問花花不言駐楫増江口山人偶出村送客村南道江山風日佳嵗月乾坤老贈張叔亨侍御出按雲南到治一萬里使君行莫遲梅花開樹樹不是向南枝碧玉樓晩望樓逺見諸山目短意不盡天隂水怪興碧玉所以鎮贈克修别駕遷梧州守來别白沙贈之甲兵滿一船江門來訪别贈君欲何言笑把梅花折少年恣行遊老病徒拘綴送君今夜心還到蒼梧去贈陳頀湛雨説到忘言處無詩可贈君許將臨别意一㸃落黄雲君若問鳶魚鳶魚體本虛我拈言外意六籍也無書送李子長往懐集取道謁張梧州春棹去江門泝流焉汲汲㸃筆烟外山歸來看懷集不聞端别駕敬士如子長問道蒼梧下登歌刺史堂贈范能用溽暑不可處清風時滿樓如何傳别教衲被坐䝉頭阮籍見孫登只聞孫登嘯針在繡不傳繡傳針不妙西良容倫餽荔枝非桂州本色戲以是詩口溢桂州漿眼定西良色我是荔枝仙何人解漫得夀南山翁七十朝看亦南山暮看亦南山南山長不老聊以永君年萬株松上花千日杯中酒兒孫戲膝前一舞一囘夀贈太守黄公水白端陽色梅紅嶺上花春風迎度馬秋月候歸槎題宋丞相陳俊卿畫像御史鐵為肝張秦掛舌端至今湖嶠月猶作太師看題宋狀元陳文龍畫像文章甲天下氣節愧當時公母亦滂母千秋名共馳梁惟正鄧德昌往來白沙途中遇盜惟正以舟泊淺奔於岸避之德昌抱書立船頭盜不加害戲贈以詩道逢惡少年打破兩生敬試問鄧德昌何如梁惟正曉枕偶成采義非采􅅔食􅅔不食粟遥遥望西山千古嵯峩獨西北多竒峯雲深香難認漢廷無謀臣黄綺皆真隱度危橋事至絶安排放脚踏高崖如何謝上蔡旦旦習危階贈閔督府還陞南京秋官司寇今欲行病叟山中臥如聞經略憂未向春風破吾聞用世心中外無異等何由一送公細話東西省贈林府尊彼曰春泥人此曰人泥春晨朝出相送向夕望歸輪贈李克常桃花被東岸江水日日深贈君豈無言亦有花水吟感事漫述與王樂用丁侯為縣時不與謁者通古稱奉法吏秉筆惟至公留情重留情獄事果難明無輕赤子命為官急書程士而未聞道未免為物撓卓哉安心人外事若無好舍已莫委命從人莫登山嗚呼羅一峯逐善如轉圜寄淮上秋官姜仁夫問客淮南道停舟過此無廬岡一端帛為我謝仁夫答王按治求乃翁挽四絶樂善堂樂善機應熟垂聲教不窮江山無盡意猶在典刑中月湖别墅水月非無主長懐别墅秋湖光一萬頃端為此翁留可怡亭此地還成趣庭柯幾度扳亭中人不見月照門前山吳山夀藏山隠一坏土人思百代傳無窮身後事未若子孫賢題丁長官廟何時重借寇此地一桐鄉四海諸侯望千年一炷香㑹翠亭東池乆寂寞㑹翠得佳名小詩拈未出去㝷王右丞吳主簿詩主簿名則宣平人吳黄門仕偉之父也軍門止殺按狀正統己巳閩城賊流毒處民蟻附朝命大司馬孫公原貞夷之知先君謀略禮致幕下贊畫百協邑有三巖民多避難於上偪脅之衆亦有聞義而歸者命先君統之推誠示信無不感服冦平孫又欲行法先君泣曰殱厥渠魁脅從罔治矧既歸命殺之不詳竟得免奏功授鮑村廵檢泣罪天應見坑降地不知自然殃慶至天道不須疑過與弗取按狀景泰間分麗水為宣平復命先君董其役代木於山役力於民期年而功成孫曰難平邑作皆爾之能餘木尚多可治爾居先君辭曰功成於上愚下何有明公芟夷大難布徳於瘡痍之民一方獲安某也受賜多矣且官物不可入私門未敢如命孫益敬之百世髙公綽千金謝魯連胸中無雅度勝事竟誰傳卜築西溪按狀鮑村任滿陞華亭主簿愛民如子處國如家凡有議讞多稱平焉且疏子下民濬河渠禁賄賂等十事於朝皆賜可松之地狹於蘓而漕數反出其上又為民陳情得减北運一萬石事載雲間志在松十年勤勞罔懈僅五十而二毛蕭然歎曰天道四時功成者退庸可不知止乎遂乞致仕而歸卜築西溪之上主簿能經濟中年未乞身西溪看卜築知是宴眠人寄嚴州林郡博緝熙萬紫千紅外如君故可人桐江都滿樹海驛尚含春寄東所春江正滿時未具衡陽楫還攜鄧俊圭江門與君别夢林緝熙酒䦨歌不起老病無奈何夢滿桐江雨相對不成歌山樓本無夢我自夢嚴州嚴州誰夢我白雲天際流答柯明府終秉循良筆難逃俗吏媸不知三考績課最竟何須贈雷少尹還汀州桔橰滿天地抱甕古來難哦松非俗吏哦松不在山覺後馬圖不出河鉛刀不割痴上下幾千年揜巻一沾衣謝姜大參惠酒名公遺我酒洗琖自開嘗何以酬佳貺商歌示不忘武進八景為徐嶺南紘作龍山春雨長夏龍山曉人間望忽開長風捲雨去復送雲歸來笠澤烟波何處烟波好公乘笠澤槎我泛江門月乾坤共一家龜山夜月夜半龜山月能開萬頃秋試從開處望照公湖上樓陳灣疊嶂丹青工寫似陳灣疊嶂新我詩君莫笑還屬姓陳人薛堰通津薛堰歸何處披圖想具區古來探本論無欠也無餘亭山夕照亭山不可喻華頂凌天台卑高本自形夕照從西來廟墩靈跡捄溺如救火造次遂捐生金陵人去逺拗鬼不來争板橋書屋板橋藹吾伊名稱已盖世誰云龜山月不照新堂睡答無錫諸友碧玉通書乆青天感興新江門動秋思聊因寄逺人送米與何侃野饌家禽小村舂晩粒香莫言無厚餽吾意在分嘗九日用舊韻新篘壓兩壺落英攜滿袖我非陶長官廬山還九九送黄希顔之太平推官有官五馬後無官百揆前不將前後看須著有無言題高瑨詩集神交傾葢上心逺著詩時無由向人道人亦豈能知紀夢一别三十年相逢不相識骨肉為路人春風淚沾臆寄潘留鶴有時牛亦坐何處鶴還留天台二萬丈誰踏紫㝠謳題伍光宇碑隂松栢孤高處春風更可尋如君有賢配昭德在碑隂答廷實有懷見寄白雲滿中野此地即衡山莫擬西來棹須防失路難謝孟芳遺腹生男充閭人所喜今日愴還深憶我初求乳誰知母氏心贈吴惠州繹思皂葢朝天闕青山道故鄉高堂開夀斚酩酊别莆陽鴝鵒初日上茅簷江邊有畫船八哥莫饒舌有詔許歸眠鴝鵒能言鳥能言我恨無白頭書小楷不及蔡君模九日諸生攜酒飲白沙醉中和答老病得狂痴讙呼九日期自補登山屐誰供把酒巵諸君為飲㑹老子不須期盡數籬前菊一花拈一巵九九八十一去來無窮期元精為我酒大塊為我巵對酒用九日韻秋花新氣味秋月舊襟期獨唱花前曲閒傾月下巵行年三十許已卜入山期處處開花徑牀牀是酒巵飲酒何必多醺酣以為期不辭亦不勸三巵或五巵作詩尚平淡當與風雅期如飲𤣥酒者器用瓦為巵梅花水陸花無數南枝愛殺人遥持一杯酒江上酹花神逢人問除日君得地曹郎此意慿誰寄梅花隠石床謂東所也九日懐麥岐時往江東未返用前韻東西填脚債已過一秋期今日拈花處思君第一巵茱萸何處酒勝日與君期漁翁歌獨釣江月夜明巵六言絶句周鎬送白菊乞詩陶令黄金遶舍君家白玉滿園千古清風廬阜幾叢細雨江門微醉不須酩酊半開莫待離披安得季芳與語相思欲寄一枝白菊偏宜素髪青山只對蒼顔嚥罷秋香滿腹風吹不到長安邀丁縣主賞菊社㑹賦詩不就公當酧我杯盤小酌倘㝷舊雨東籬還對長官題枕太華峯頭一枕千秋萬嵗通靈不怕惡蛙驚睡鼻端三月雷鳴漫興風灑數莖白雪月臨一丈青笻餘事歸詩巻裏殘年放酒杯中景斜瓦碗方食日晏柴門未開五栁前身處士一瓢今日顔囘晨光沼上魚戲夕陽村邊鳥來東隣小兒識我一日上樹千囘翠烟緑樹歌鳥青水紅渠浴鷗笑問五湖范蠡清風何處扁舟七言絶句伍光宇卜室白沙為讀書之所君此卜居君亦足空村無人山多木參差芭蕉麗晨旭新葉新心逓相續競晨登登聞隔竹東隣老人事幽卜甆甌瓦盆不供俗我不到門此翁獨答段錦衣惠藥藥來詩往共誰忙野老無金與段郎泉石旌旗俱在眼不應泉石獨膏肓聞攬山近有車馬之蹟因贈緝熙并寄竹齋丈白日傳呼攪翠崖誰家玉樹碧雲埋只疑冬酒開松逕定有山靈怨竹齋偶成墻角經春卧短笻千秋塔骨不如公科頭坐轉茅簷日閒看蛛絲蕩午風夜坐與童子方祥慶話别偶成晩飯跏趺竹几安秋吟涕淚閣燈殘一詩可送方童子千煉不如莊定山往潮連人事獨速蓑衣舞我航數家烟樹隔迷茫不將起倒供人事祗為看花也未忙栁渡月下承苕溪翁約賞中秋月於潮連年顔欲比苕溪老酒琖同揮夜月圓來共主人秋半醉更回楊栁渡頭船次韻張叔亨侍御見寄酒舫當年興未涯清宵人語白鷗沙如今縱有相思夢不到長安御史家看栁淺塘低竹小坭村黄土墻扃白板門望見西頭楊栁樹行人都訝是桃源雜興曲肱深閉倚山閣照眼不堪臨路花一身老去何須出兩脚朝來只欲麻倚檻纔看一兩花不堪終日雨斜斜先生已結僧趺坐還與人間管嵗華白日幾時生羽翼金丹負我不神仙東家茗碗頻分啜兩腋清風也可憐溪橋晩立示諸郎溪邊明月掃不去竹下清風時一呼天與乃公供打睡莫安橋板引樵漁齋大父忌作舊居在道娘墳東道娘墳西近官路朝朝暮暮行人多世事百年渾不省滿堂賓客竹枝歌贈釣伴短短蔞蒿淺淺灣夕陽倒影對南山大船鼓枻唱歌去小艇得魚吹笛還得陳德雍書年九十餘矣猶有願學之志越客初披手翰新天涯暮雨欲沾巾可憐一片長江水日夜東流不待人望頂湖山客子正歌山鬼句篙師欲進頂湖船遙看落日蒼梧外獨立横槎古寨邊夜過三洲巖讀濓溪題名示諸生山容寂寞紅葉老江月照耀青天髙題名夜半㝷周子秉炬相隨愛爾曹歇馬大徑山數家烟火隔林塘一樹寒花晩自香黄葉塜頭聊歇馬鷓鴣聲裏近斜陽華葢仙蹤為謝布政作時謝已物故華葢山頭雲起時羣仙雲裏謝彈棋謝公不用登山屐借得千秋一鶴歸東軒獨坐桃花寂寞梨花開山中薄酒三五杯村西有客可人意風雨今朝期不來虎夜出虎頭縋淵雨即下山中白額還遭打今年雨足汝不知稍出人間食牛馬次韻趙提學見寄蒿萊封徑不腰鎌長夏山齋睡正甜風送歌聲滿天地驚囘殘夢雨廉纎老大行藏敢不疑曉川紅日睡醒時昨宵共對崖山雨如此乾坤那得知古有所思采采紅芳日欲斜盈盈珠淚落天涯東風忽攪籬前樹惱亂春愁只為花卜日修外海赤泥嶺祖墓值雨冬雨墳頭蒿已生年年披草祭清明晩風吹落攜鉏艇又聽􅚗輈隔水聲與景星夜坐撥悶無人致酒瓶哦詩燈下一郎清夜深笑拍胡床語忽亂階前落葉聲西樵山下感舊西風吹老錦巖春遺跡荒凉此水濱雲氣不遮西望眼青山剛對獨歸人西樵山前暝鶴歸縞衣雙拂錦屛飛凄凉夜半孤舟客一聽遺音淚滿衣德孚先生留此眠南山揮手白沙船伍光宇號小南山江山此日三人别誰道人生無百年示建旌節亭役者照曜乾坤功不小此風此日更須扶泮宫畚土皆民力不共城郎一例書次韻趙提學留别白沙列炬溪邊樹影斜隔花遥迓使君車酒杯欲别微風起吹動馨香下栁沙蕉麗望羅浮翠錦為山白錦雲畫工傳影不傳神今朝蕉麗江頭望魂爽何由得傍身黄連􅝱即事青草橋邊船未歸曲川微雨暗荆扉江村盡日無來徃夫在東皋婦給炊上帆蜻蜓翅短不能飛欵欵隨風堕客衣此是天人相合處蒲帆髙掛北風歸初晴初晴樓上燕飛飛樓下歌人白苧衣一曲未終花落去滿林啼鳥送春歸落花落花半落流水香鳴鳩互鳴春日長美人别我隔江浦欲來不來空斷腸清曉清曉有人來欵扉風吹衫袖白披披昨宵雨打山窓破莫怪先生下榻遲對酒半開半謝花相催江水東流不復囘扶杖江頭看花樹不知笑向酒家來喜生姪兩翁筋力少翁衰竹杖先堪付若兒只恐暮年詩更逸出門須背錦囊隨新設紙帳軒中如雲白紙罩方牀翠簟眠穿我固當世到葛天終不逺先生枕外即羲皇階面苔侵牡蠣墻小軒容易領年光只從今夜床頭月已照先生鬢脚霜雜詩三首十年自汗不曾乾枕上􅋊書白首看莫道無心與君别樽前更覺别君難人間骨肉薄秋雲一事朝來不忍聞何處青山封宿草欲將衰淚灑孤墳平生交態如兄弟此日悲歌不忍聞欲寄秋風兩行字九原無雁獨憐君宿倪麟所石榴花秋開老蟾半影秋如水曙色一聲霜滿街白髮山人到城府石榴花下借眠來催諸友九日詩課九日樓前客令新黄花愛酒不饒貧勸君火急交詩課纔到明朝罰主人題杜少陵小影次韻栁文肅孟子詩肩髙聳山杜陵談笑古風還世間還對憂時畫美酒花前已破顔與舊童子神藥燒茶伴老夫昔時童子今生鬚青春過眼如白水白雪滿頭非故吾謝惠酒白髪蒼顔老石齋出門秋思滿天涯極憐紫酒逡巡有不負黄花㸃綴佳五月二十七夜􅄓風作屋漏燈􅋊四壁漏痕斜老屋囘風落細沙乾坤更有晴明日為報家人莫怨嗟題畫赤壁磯頭天欲曙縞衣和夢掠舟西欲㝷故處何由見長恨今人畫亦非題月溪巻月出東方白漲溪溪翁行樂溪東西相思欲過隔溪去南斗無光北斗低贈周鎬兄弟周生兩馬齊兩鞭京指長安鎬在山今夜尊前看秋月明年秋月憶尊前秋日山河一望仲秋前楓葉初黄水半川路上行人不歸去北風吹爾過􅋊年木犀未發奈蓮空小女來方剪綵工不信衰榮是天道􅟪花無處怨西風閲馬氏均田文王侯尚愛槖中装何况田家弟與兄孟子未知人世事獨將仁義教齊梁贈鄧栢林其人貌似伍光宇南山面目偶然同又向人間見此翁碧羅窓下一杯酒猶勝良宵夢裏逢此老若是石曼卿此山便是芙蓉城髙歌獨控青騾去是有風流萬古情喜雨滿眼珠玉不足珍甘雨一灑萬家春昨日蒼頭木洲至又道木洲飢殺人將如東莞聞途中盜發不果扁舟東過扶胥口一日二日之便風何故三旬不成往仰船岡下賊旗紅題朴軒葛洪亦號抱朴子安知朴翁不是仙莫將甲子編年看人道翁生大橈前題應憲副真率巻今古一杯真率酒乾坤幾個自由身春風回首黄巖㑹醉揷花枝少一人茶園曲寄治香櫃袁暉峽東灣灣一水長商船無日不蘓杭千村萬落無窮樹盡是袁郎櫃裏香揷花巖前上馬興難拏卯酒三鍾帽半斜兩鬢馨香齊揷了賽蘭花間木犀花訪山家次韻樛枝逕口郎迎馬語鳥籬前妾掃雲笑殺主翁忙出户手提筐果喚厨人清泉煑蕨愛山家夜飲西巖望月斜澗底白雲留不住半隨紅雨落天涯蕭黄門書來見責乆無書用舊韻答之諫官一字照天涯南海年年問釣沙滄波不與黄門信笑殺龍鐘百姓家平鄉伯陳公以紫茄花絹為家慈夀詩以謝之吴紈衫色紫茄花老親着時衆口誇小兒奉酒歌七字持獻軍門表拜嘉景雲偕范規海上割稻犬子給炊海上舟范生打漿兩同遊田中割稻家中望逢著諸仙莫浪投招訟者歸越王城裏塵隨馬刺史衙前吏喝人此日王孫不歸去舊逰芳草可憐春中秋期諸友不至山妻有錢肯沽酒諸友賦詩期不來范生也逐吾兒去一夜清光對玉臺贈鄺載道之淮陽别駕前御史謫黄巖十年花縣眼中人别駕淮陽又幾春曾共烏臺高十仭鄭郎今著白綸巾鄭紀也感事齒本生來不著唇呶呶衆口劇鵝羣鼻雷自炒元城耳夜半鐘聲那得聞木犀四絶寄倪麟正月山桃委地紅栁塘還捲落花風木犀一樹渾堪賞盡日相看烟雨中風雨歸來問小奴藥欄花架費人扶黄昏雨歇茅簷月只有木犀對老夫春城無日不思家風雨經旬損物華竹色四時長不改平安先報木犀花風吹雨打只傷神白首龍鍾尚愛春花意未應嫌老醜十年前是種花人題兩山居士巻墨水翻騰作巨川兩山何處灑雲烟醉中亦有臨池興悵望名家不敢言題東所巻東所詩成月滿衣乾坤無語鬼神悲郎今欲到飛雲去説與兩山居士知問鄺珙病鄺生病肺今何如獻嵗初驚得手書我有丹方欲傳與小藜床上半跏趺次韻陳冷庵僉憲見寄擊壤聲中酒國春海風吹老石邊身桃花幾樹衡門下我是唐虞一軰民乾坤畫筆乆荒蕪誰作臨江五老圖聞道逺師將結社華巔猶得照鄱湖五十四年居海濱偷將水月洗心塵今朝偶得西江使溟海猶堪把贈人别意江閣醒眠秋正凉西風􅋊漏轉離腸不知天道平分未巳覺人間一夜長悼林暕一日之雅亦為哀鍾淑相隨入夜臺此生未了男兒事也向扶胥打坐來木犀開時江右李士逹劉希盂已去容貫范規江浦未還因有獨賞之歎嶺北書生嗟去早江東遊子惜歸遲重陽將近無風雨正是木犀初發時先子忌日作生來只見山頭土祭諱惟聞月下螿五十四年天頗近諸孫羅列拜成行題畫茅簷秋颭酒旗風舟入蒹葭月半籠醉睡不知家逺近醒來依舊五湖東寒山鐘近不成眠人在姑蘓半夜船何處明朝正堪望吴王宫苑草芊芊金陵城西趂市郎負戴不厭江路長百花橋頭換美酒歸與漁父歌滄浪古耶道中有懷翠烟浮隴麥初齊社樹青青獨鳥啼何處相思不相見木棉花下水門西小湘峽食嘉魚兩山斷處小湘峽十月嘉魚出水鮮引滿阿儂生日酒㣲吟空記屬牛年自三洲還至禄步村江流夾束午風桑城郭歸來禄步舟惆悵碧桃歌舞散黄茅烟裏一􅚗輈過清逺峽行人初上峽西頭已有心隨下峽舟天下名山皆可愛夢中慈母不來遊讀鱷魚文刺史文章天下無海中靈物識之乎如何皇甫兼逢吉不及潮州一鱷魚食蜆家住東南蜆子村小鐺風味勝侯門眼前下筯非無處芹曝猶堪奉至尊社中桑林代鼔酒如川秋社錢多春社錢盡道昇平長官好五風十雨更年年社屋新成燕子來山丹未落野棠開三三兩兩兒童戲弄水扳花日幾回社酒開顔一百家春風先動長官衙東君也解遊人意紅白交開樹樹花社日年年㑹飲同東原西埭鼔鼕鼕無人不是桃花面笑殺河陽樹上紅夜酌侍子焚脂弄小孫藥爐分火暖殘樽東風不管黄鸝怨一夜飛紅滿樹根問李深之病竹林花埭酒旗風秋賞春遊事事同伏枕六旬猶未起相思紅日滿簾櫳沙上村逕西來入社松北山終日白雲封往來獨把梅花笑只有沙堆不負公秋江喚渡何處渡頭風浪喧隔波仙境似桃源瘦藤倦向人間去喚得船來便上船春寒清明天氣如初臘雨脚雲頭枉是春階下荼䕷開自晩不隨紅紫怨東君一春光景在花枝三月􅌞非隂雨時只有木犀偏耐冷小枝簷下對衰遲看花何處輾香輪江上春寒著莫人衰病未堪供起倒且便高枕過􅋊春題棲霞巻紅霞小塢地仙家日出耶溪十里花秋竹垣低是何處有人窓下讀南華雜興數行屋蟻下庭蕪墻角扶留緑映裾正是滿樓山雨過夕陽惟好鵓鳩呼讀朱晦庵註參同契神仙不註參同契火候工夫那得知千古晦庵拈一語可憐無及魏君時大水浮舟至七星巖頂題其上七星巖下醉神仙猶占龍床水底眠我有一樽延夀酒月明今夜對南山蒼梧寄陳庸時館潯州山形西上水東流獨泛長江十日舟無翼可隨飛鳥去相思時復到潯州題林良為朱都憲誠庵先生寫林塘春曉圖烟飛水宿自成羣物性何嘗不似人得意乾坤隨上下東風醉殺野塘春出肇慶有懐馬𤣥真紅塵白浪去來年細雨秋江看木棉何處思君君不見羚羊峽尾七星前金州别陳冕江上東風捲暮旗木棉花下進舟遲金州未是窮途别莫贈黄金只贈詩漫興粉墻經雨舊成痕青被扶留直到根俗吏欵門教暫去隔簾抛果戲諸孫畫鷹落日平原散鳥羣西風爽氣動秋旻江邊老樹身如鐵獨立槎牙一欠伸木犀枝上小鵲翠裙白領眼中無飛上木犀還一呼乾坤未可輕微物自在天機我不如贈周成虛無裏面昭昭應影響前頭步步迷説到鳶飛魚躍處絶無人力有天機春中雜興春寒著莫絮袍輕遊走何山更乞晴夜夢髯翁作人拜安知不是白龍精小雨如絲落晩風東君無計駐殘紅野人不是傷春客春在野人杯酒中香烟裊入袖中蛇讀易山齋日未斜領取乾坤分付意扶留生耳木犀花端陽後一日里人送角黍酒至荷瓢童子問誰家老婦簷前駐紡車角黍喚囘端午夢還從艾琖得松花九日木犀未開野徑香沉舞蝶稀柴門樹老著花遲含章此日無窮意只有階前拄杖知菊來栗里何須酒梅到孤山不欠詩老去未甘詩酒廢木犀其那放花遲木犀花下待陳秉常常疑楚客餐秋菊不信唐人醉牡丹何處木犀香可愛須君曾到玉臺山謝九江惠菊誰将此菊種江濱物色當年漉酒巾若道淵明今我是清香還屬隔江人紫菊移來紫水濵白頭對著白綸巾花前酌酒笑未足酒後簮花笑殺人故根迢逓九江濱嵗晩相看此道巾不用詩流强分别種花人是賞花人鶴袖披翻野水濱黄花簮破小烏巾腰間我有坡翁帶解與西隣賣酒人夜夢見太母急呼諸孫前拜欲覺未覺夢中夢有形無形身外身喜逐悲來呼不得曾孫前拜太夫人馬肇文惠油酒并録示哭一峯先生詩及送林緝熈掌教絶句復以香一束賦三絶見意誰以三年報一峯舒剛葢有古人風一詞亦到君親地何處無人覆馬龍清油濁酒慰家貧老子山中但白雲君欲看雲須久坐晴窓端為起爐熏南川釣艇已横波裏水漁翁又放歌今日未知明日事且傾君酒為君哦贈周二仔入京文都家僕故人訝我久無書只到長安夢亦疎萬里周郎知此意杖藜江上送長鬚次韻張廷實東所寄興見寄天邊暝色将秋至海上長風送月來何處無人識東所夜分樓上了餘杯明月清風放兩頭一笻挑到古尼丘而今老去無筋力獨坐江槎看水流扳縁千尺采松花服食為仙未到家我得丹方欲傳與肯捐妻子入烟霞路自飛雲過閬壺仙人迓我乆趦趄相期汗漫歸何處獨占烟波理釣魚放倒瓊林半醉間半留醒處著江山病來只有冠裳在不帶朱門一事還不求老馬在長途誰道長安一馬無伯樂未來憂薊北憑君傳語到平湖邯鄲枕上看三台誰撼藜床喚老來幽事不應全廢却夜來風吼澗中雷西風吹老木蘭花水閣氛氲帶晩霞溪上行人不相識隔船對語問誰家海上峯巒今屬誰攜來四百布囊垂或嫌珠佩多遺恨化作長髯未可知門下諸生無一個山童撤却臯皮坐與儂七尺青團蒲今年換與張東所沽酒酒店無錢與酒遲初晴天氣菊殘時乾坤不放閒人醉也到江門酒盞知題南浦送别圖為蒋方伯何人更賣雲卿屨我昔曽過孺子亭欲寫别離非此日西山南浦認丹青對菊花開無酒醉江濱莫笑人間破葛巾廬阜長官歸未得看花還共去年人餐香誰亦到湘濱西崦東籬濫一巾去嵗金英曽照我今年玉蕋又驚人白雁南飛到海濱吟邊芳氣襲衣巾門通水竹三丫路坐對求羊一軰人秋英如雪照江濱扳折須防小侍巾曲檻兩頭門盡掩先生元是惜花人日日狂歌菊澗濵花神應識玉臺巾西風為掃繁華去不遣紅芳近老人花舫誰撑緑渚濱道人醉脱碧方巾東籬不飲江州酒彭澤當年未盡人精魄當歸楚水濱天涯聞訃忽沾巾西風吹醒蒲團夢獨對黄花憶故人扁舟何處剡溪濱夜半歸來雪滿巾爭似一瓢秋菊伴漆園風暖蝶疑人我貌不如蘇潁濱秋風華髪已盈巾有錢不買重陽醉籬下黄花也笑人菊坡持酒越江濱御筆親題與醉巾丞相九囘徴不起碧虛長揖夢中人知章投老鑑湖濱還戴華陽羽士巾元亮也歸三徑去至今人笑是痴人陶家園裏舊開叢復入山窓對此翁一曲一杯花下醉人生能得幾囘逢種扶留用舊韻輕落藤梢淺打溝種時須共小遲留浮生日月供眠外付與攜鋤抱甕休絜矩工夫但一溝山中夜雨長扶留莫教看到詩人眼千首鳶魚也未休漫興娉婷鄭女著纎羅能為襄王激楚歌一曲霓裳都掃盡尊前無地舞陽阿贈麥岐出遊錯教人意向花濃萬樹香飄一夜風行過東津莫囘首一番春事又成空我得無言贈麥岐乾坤遊走到何時千山萬水無窮意分付芙蓉杖一枝八月八夜忽夢玉宇無瑕碧雲燦爛南斗下大書八字云生生生德俊逸超全下有四人面西而行或隱或見覺後紀以絶句八字光騰斗外天碧雲西去擁羣仙乾坤此夢無人話起步中庭月上弦贈人誰将兒女浪干情春雨來時草又生夢亦是真真亦夢石泉槐火對清明悼周鎬京之兄也京以母命赴春官鎬亡京南歸在道一封長夏寄京書不遣歸來待拜除誰與行人報消息髙堂今日要人扶一雙玉樹出東溟豈意先隨曉露傾三十六年惟一女老夫垂淚寫銘旌叔子還家定買碑墓旁将刻老夫詩詩中不借閒言語只寫人間母子悲嗜好平生法帖詩偶逢方士問刀圭何人擺脱浮生事得似周郎易簀時里巷三年六七墳老年無淚哭交親數聲願借遼陽鶴喚醒人間未死人望白龍池在本邑崑崙山頂西望不見崑崙池白龍上天歸何時望中心逐飛雲去半掛玉臺松樹枝涵虗數尺鏡光懸舊是頭陀洗缽泉又有山人來洗耳白龍休占水中眠雲影天光共一池池中消長白龍知仙翁騎龍上天去只有明月照漣漪梅花一枝低壓塢籬斜細路穿雲竹半遮忽被暗香相引去小塘詩景在西家老樹眠江水囓之茫茫水月浸花枝暗香捲入滄溟去不是漁翁那得知沙籠寒月樹籠烟香徹龍溪水底天斜隔竹林窺未得更㝷西路上漁船南枝照水忽先開漁父灣頭有釣臺罷釣歸來溪路暝暗香幾度倩風媒孤山山下一枝梅春到南枝尚未開酒醒西樓看月坐清風湖上捲香來朝來溪上弄花丸天地氤氲日月還無􅟪暗香疎影處笑呼歐九問孤山氣魄壓倒孤山梅花撩我又冬殘落日深山一凭闌病眼不知花妙處只将花作野人看梅花如雪擁溪扉漁父村南負酒歸縱飲不知花落去酒醒船上見花稀日日花邊喚酒船梅花開處酒家眠青山一片無人買誰與先生辦酒錢樵客入林聞曙鴉梅梢殘月暗溪沙沿溪路盡無人到更説林逋住處賖舍南朝見一枝梅舍北桃花昨夜開笑問花開何太急青春肯逐酒錢來南北枝頭月正懸月中誰此弄溪船晩來吹入梅花去吹到林逋木榻邊蒼烟裊樹溪𡨕𡨕夜半江樓笛一聲悵望錯疑溪女折滿頭只慣揷金櫻桃花雲鎻千峯午未開桃花流水更天台劉郎莫記歸時路只許劉郎一度來山中兒女不知秦無賴漁郎最惱人溪上桃花君莫種東風不貸武陵津題袁氏知歸巻鳥在蒼岑魚在淵水深林宻保生全秋風莫怨茅茨破白首眠看榻頂天隂厓水必到滄􅈚石罅涓涓勢已成萬古乾坤流不盡望湖亭下更分明示我隂陽闔闢機舂陵墨雨灑門扉直從罔象前頭見人與乾坤一處歸界江八景河橋栁色廬阜清風長官宅渭城朝雨王維詩束西緑遍河橋路長與離人照酒巵驛館槐隂槐隂覆庭日早午小吏夜出迎當路長江閲盡往來人淦水西邊此槐樹蘆渚晴烟香蘆紫烟生一縷天風吹落蘆花渚江東行客歸去來霑衣猶帶金陵雨古阜漁燈埠頭半㸃夜燃枯釣得淞江一尾鱸漁父聫舟向東㟁東岸人家有酒沽界江霽月玉宇蟾輝秋展鑑界江水色夜磨銅乾坤好景誰無分只問靈臺得屬公西僧禪梵竹徑風傳西梵聲隔墻深夜有人聴山僧老去無功德還倚禪門誦佛經東閣書聲閉户書聲午欲乾夜䦨燈燼落蒲團朝廷若問觀風使猶有書郎信長官大橋牧笛山花爭揷滿頭紅蘆葉烏烏弄晩風橋大板平牛步穩老牛差後不愁儂讀周朱二先生年譜千年㡬見南康守歎息人間兩譜開但使乾坤留一緒聖賢去後聖賢來一語不遺無極老千言無倦考亭翁語道則同門路别君從何處􅟪髙蹤白洋潭魚白洋風起釣絲飛夢裏漁蓑此夜歸明日冷香橋上望海鷗相對便忘機白洋潭上浩烟波何處漁歸此放歌月下聞之開口笑江門三尺有藤蓑讀定山集千首鸎花萬蠧魚眼昏心亂意何如白頭許我編摩不活水源頭洗硯書寄張主事從來妙處不傳書十夢人間乆不如試問十洲三島外白雲誰伴老仙居贈鄒汝愚吏目時館壯哉亭川雲嶽雨天糢糊萬里山亭此客孤又借南風吹一月酒葫蘆打藥葫蘆題伍氏雙喜圖莫怪龍鍾此葛巾穿花入竹去頻頻秋風酒熟南山下更與殷勤報主人陳白沙集巻五欽定四庫全書巻陳白沙集巻六明陳獻章撰七言絶句戊子
