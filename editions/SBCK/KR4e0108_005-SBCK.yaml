front:
  text: 白沙子卷之五
  hash: sha256:9194b3a3503eb75b4c3ed1d1cde3e12bfe8a52ce6036dd8f8f91b142a6ce8898
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0108_SBCK_005-1a}
body:
  text: 古選荅張内翰廷祥書括而成詩呈胡希仁提學古人棄糟粕糟粕非真傳􅆌㢤一勺水積累成大川亦有非積累源泉自㳙㳙至無有至動至近至神焉發用兹不竆緘蔵極淵泉吾䏻握其機何必窺陳編學患不用心用心滋牽􅆞本虚形乃實立本貴自然戒慎與恐懼斯言未云偏後儒不省事差失毫􅁵間􅀉語了心人素琴本無絃代簡荅羅一峯殿元䑓城一揮􅃑忽忽星週五路永消息㫁年深别離苦思君髮爲白始白數莖許今晨對書尺白者不可數先生天下士詎肯顧衡宇悵望曹溪約獨與光也語一峯約㑹南華不至贈張叔亨知縣栖栖白沙舫影弄寒江月夫君沙陽令胡事顧微劣我祖在九􅁳願君爲墓碣三夜茆簷下寒燈坐來㓕感子心意勤愧我言詞拙明發江上舟踟蹰與君别戯贈館賔遲遲􅀊􅀅暮戚戚懐故里館中飢䑕多旅食驢児尾垂徳扵不報世間寧有此行李無一錢還家對妻子冬夜長夜氣始凄木綿􅀍重裘端坐思古人寒燈耿悠悠是時病􅀄間背汗仍未􅀵學業坐妨奪田蕪廢鉏耰髙堂有老親徧身無完紬丈夫庇四海而以俯仰憂口腹非所營水菽吾當求明旦理黄犢進我南岡舟又我從省事來過失恒十九喜怒朝屢遷言爲夕多茍平生昧慎獨即事􅅴掣肘孔子萬世師天地共髙厚顔淵稱庶㡬好學古未有我才雖鹵莾服膺亦云乆胡然弗自力萬化脫樞紐頽顔無復少此志還遂否􅀊月豈待人光隂􅂩中走念此不成眠晨星燦東牗經鱷洲夕舫凌大波北風吹我席􅄀􅄀鱷洲煙宛對君山碧來雁知天寒歸人㸔月色超超塵外心浩矣周八極崖山㸔大忠祠竪柱阻風七日後發舟用舊韻青青竒石草上有牛羊躅洶洶崖門水逺帶湯瓶山名緑浮雲散􅀌嶼􅀄日明村曲言歸輙風濤無乃疑張陸遲遲重遲遲畏此波心木漁人植長木於波間置􅊻俗呼爲􅊻戙木觸之䏻覆舟自䇿示諸生賢聖乆寂寞六籍無光輝元氣五百年一合又一離男児生其間獨徃安可辭邈㢤舜與顔夢􅄰或見之其人天下法其言萬世師顧予獨何人瞻望空爾爲年馳力不與撫鏡嘆以悲豈不在一生一生良遲遲今復不鞭䇿虚浪死勿疑請囬白日駕魯陽戈正揮湖西八㬌爲羅􅁱撰作效一峯體太極丸春天城列兩儀其中位太極山名不悟名􅁚生焉知畫前易伏羲古已亡圖書乆晦蝕􅀉語山中人妙契在端黙翠玄洞天翠玄在何許乃在金鼇麓石門俯深幽來者秉明燭繡壁誰可縁丹房我當宿呼童烹金鼇膏此千丈木一峯來秀湖西有一峯天地得撑拄旁有龍塘峽北有浮香塢我行崑崙丘一望一延竚歸來二三子抵掌太極語三峽廽清一峽蟠一龍群山莾囬互武夷雖九曲三峽誰勝􅀒澄澄水上月歷歷谷中􅀣焉得千丈笻坐弄潺湲處金鼇霽雪一鼇海上來頭戴雪花白諸鼇起相拒千秋歸不得仙人羅一峯永戯金鼇側借問别離時西佛生彌勒玉冕晴雲玉冕臣諸峯左右羅絡之雲來巾其顛得雨不復疑豈無澤物㓛雲覆在何時悵望百穀春廣濟蒼生飢飛轝横翠我昔逰太空太空雲􅁳􅁳歸來控翠蚪力與金鼇争巍巍太極尊揮置東西行如何千載下空儗飛轝名大流垂玉大流無此竒偶值銀河傾願囬銀河流免與世濁并一洗日月光再洗天地清何止天地清萬世無甲兵題冷庵江西僉憲陳􅄾自􅃅舉世好近􅀬子獨畏之猛投身向􅊤雪永謝白日影玉壼貯清氷秋露滴金井是以冷自勝于世非􅅸屏假令務􅅸屏過與近􅀬等我以道眼􅀚天下方首肯寒暑两推移正中太和境􅀉語庵中人不􅀬亦不冷扶南訪黄巖尹鄺載道適來顧白沙兩不值賦三側韻行舟石門浪不識扶溪口時時聞來徃日入䘮水手昨暮黄巖馬來嘶白沙栁惜㢤两不遇獨坐空搔首我有一斗酒願與子秉燭子來復空去值我不在屋穉子呼不至踉蹌走入竹明旦歸我艇先後迓以告閑居不儗岀偶岀􅀒佳客問客來何許來自黄巖謫長安接笑語中道有暌隔悠悠百年内與子異顯黙感事君心如逝水一徃不復旋誰䏻萬里浪安坐駕此舩傷㢤一何愚由我不由天仁者固有矜智士乃自全夢􅀚化書六字壁間曰造物一塲變化孔子曵杖歌逍遥夢化後我夢已逍遥六字書在牗聖愚各有盡觀化一遭走問我年㡬何春秋四十九死生若晝夜當速何必乆即死無所憐乹坤一芻狗貪泉藜藿可養生栢棺可送死瓦礫是黄金貪泉亦清泚飲水心不易豈獨夷齊爾山􅀑笑儂家儂家笑山􅀑九日諸友㑹飲白沙得雁字黄菊有佳辰良朋樂呼喚争持淵明杯來接子桑飯落葉迎馬鞭斜暉轉沙岸雨聲静秋竹池影入江雁酒酣獨髙歌呼児續我㫁諸君極􅇔戀十觴亦不筭雖無孟嘉量且免落㡌亂百年䏻㡬何去者已強半來㑹安可期細把茱茰㸔贈林汝和通判在昔黄金䑓與子􅀄周旋萍蓬忽相失不見垂十年昔爲禮曹官今揺慶陽鞭常聞太華峯峻絶峙中天雅志在登陟矯如􅀌鵠騫適來南海旁問訊滄洲㕓語舊未終日棲棲有所牽丈夫重出處冨貴如浮煙行則爲在田止則爲在淵勞勞夫何爲贈子千金言贈馬龍如湖西奠一峯先生晨興坐捫蝨有客窺我床客來問何許顔色慘不光去􅀊秋在季文星墜西江而師羅一峯􅄑視我弟兄相見不得語失聲涙滂滂子行詣湖西問訊我有􅀅夙昔夢見之恍若芙蓉城􅁴來索苦句句􅈬涕未停何以告一峯􅀉意於瓣香索火化奠文一峯其洋洋我病乆南海欲徃未得行送子出門去目極秋天長贈陳秉常逺色霽􅀄景清風振遥林子來入我室弄我花間琴正聲一何長幽思亦巳深願留一千􅀊贈子瑶池音􅁰稷雜萑葦邪思亂正性人爲一鹵莾諉曰天之命白日朝出東須㬰復西暝良時誠可惜逝矣悲莫競大舜卷婁之荘周竟奚取人生貴識真勿作孟浪死誰䏻去中土僦舎朝鮮里白首金石交視我南川子我否子亦否我然子亦然然否茍由我於子何有焉人生􅀉一世落葉風中旋胡爲不自返濁水迷清淵藤蓑一蓑費㡬藤南岡礪朝斧交加落翠蔓制作􅁼上古吾聞大澤濵羊裘動世祖何如六尺蓑㓕蹟蘆花渚舉俗無與同天随夢中語今夜不須歸前溪正風􅀨人好蓑亦好月光水亦光水南有酒媪酒熟喚我嘗半酣獨速舞舞罷還舉觴所樂在知止百年安可忘挽蓑欲何爲新月出東嶺獨速舞不休凌亂何由整曠㢤􅃮園吏自形還自影新蓑藤葉青舊蓑藤葉白新故理則然胡爲浪忻戚扁舟西浦口坐望南山䂖東風吹新蓑浩蕩滄􅈚黒須㬰月東上萬里天一碧安得同心人婆娑共今夕朽生何所营東坐復西坐搔頭白髮少攤地青蓑破千卷萬卷書全㓛歸我大吾心内自得糟粕安用那賽蘭南有賽蘭香名花人未識光風散微馨甘露洗新碧一月薫蒸來氤氲在肝膈乃知方寸根中禀天地塞誰爲續騷手俯仰空悽惻窓戸悄無人圖書共昕夕天人之際天人一理通感應良可畏千載隕石書春秋所以示客星犯帝座他夜因何事誰謂疋夫㣲而䏻動天地荅梅侍御見􅀉群龍盛朝野弱羽􅂓山林行春忽傾盖對榻山花深引我一杯水冩君龍唇琴永言歌大篇風雅有遺音乃知鷹鸇氣未愜鸞鳯心王事有驅迫暮雨别江潯離情落晚􅃐再枉三洲吟何以舒我懐青天盻遥岑􅀉題三洲巖我行蒼梧道息槳荒江湄連岡一以眺石室􅆂晚暉前哲有題字執炬徃讀之遲囬北壁下目撃元公遺今古一相感光風吹我衣䖝鳴丹竈中葛仙胡不歸對之發長嘯宇宙今何時圎蟾夜冏冏蝙蝠秋飛飛願言托髙棲行矣無是非病中冩懐􅀉李九淵出門見齋顔十日不一逢以我腹中滿憶君頭上風頭風尚可炙腹滿何由通受氣我亦薄况乃疾病攻五十去始衰三四謝春冬􅁂顔倐巳彫血氣少復充客來索我書頴秃不䏻供茅君稍用事入手稱神工以兹日衮衮永􅀒全生㓛長揖謝茅君安靜以待終和梅侍御見􅀉飛蓋凌滄􅈚髙䑓拂朱鳥軋坤一水浮日月􅀟輪繞塵埃紛局促正坐眼孔小㬌山千丈松慰我氷雪皎萬里一春風東西逐騕䮍故人子羅子仙鶴歸華表暮雨江門舟含悽問封草假令鮑叔在一士亦不少誰云越䑓近舉目河山杳􅁳􅁳白沙塢雲煙共昏暁題劉氏􅀟節卷阿姑與阿媍守此芳􅀊闌三十寡且貧紡績供朝飡􅀌児泣長夜秉燭更抱㸔苦心两咽􅅸芳顔亦彫殘持此􅀟白璧輝映天地間聖皇重民極門閭合施丹煌煌東白碑終古埋空山我毋寡更早賦詩涕汍瀾弱草因風靡頽波良獨難送李劉二生還江右用陶韻夜聞桂􅀣芳晨起山鳥喧客從逺方來歴我階西偏手持諸侯書徴㑹在匡山我願結其人遂徃不復還􅆡形宇宙内俛仰獨何言中年見二子楚楚西江英問訊徐蘇李千年有餘情開尊對􅈚月髙歌亦心傾胡爲别我去感此秋蛩鳴贈處各有言慨然盡平生澷題日月逝不䖏奄忽㡬華顛華顛亦奚為所希在寡愆􅅊編􅅸周易錦嚢韜虞絃飢飡玉䑓霞渇飲滄溟淵所以慰我情無非畹與田提擕衆雛上啼笑髙堂前此事如不樂它尚何樂焉東園集茅夲西嶺燒松煙疾書澄心胸散滿天地間􅂓以恱俄頃焉知身後年仕者必期通隠者必期髙麋鹿或可群肉食安可饕聖人履中正白首濟川舠悠悠荷簣者果識聖心勞浮雲馳白日􅁰稷生蓬蒿飯􅂼食飲水曲肱謝逰遨汶上去不顧陋巷貧􅅸交徒聞武城宰割鷄以牛刀拉馬玄真看山官府治簿書倥偬多苦辛文士弄筆硯著述勞心神而我獨無事隠几忘昏晨南山轉蒼翠可望亦可親􅀊暮如勿徃枉是最閑人近來飲酒者惟我與子真䏻移栁間舫同泛江門津感劉琨與盧諶事越石信英臣子諒亦文雅生遭晋運㣲奔走風塵下晋陽笑明月胡雛夜囬馬并州困石勒􅀙事爲别駕成敗非所論吾憐鑿坏者和陶一十二首歸田園我始慚名覊長揖歸故山故山樵采深焉知世上年是名鳥搶揄非曰龍潜淵東籬采霜菊两渚􅀵菰田㳺目髙原外披懐深􅀣間禽鳥鳴我後鹿豕逰我前泠泠玉䑓風漠漠聖池煙閑持一觴酒懽飲忘華顛逍遥復逍遥白雲如我閑乗化以歸盡斯道古來然髙人謝名利良馬罷覊鞅歸耕吾豈羞貪得而忘想今年秋又熟讙呼􅀒禾徃啇量大作社連村集少長但憂村酒少不克儂量廣醉即拍手歌東西卧林莾近來織畚徒城市售者􅛽朝從東皐耕夕望西巖歸貧媍業紡績燈下成􅀊衣但令家温飽不問我行違移居萬金論買憐千金論買宅豈不念子孫而以營朝夕長揖都㑹里來趨白沙役壌地何必廣吾其􅀉一席隣曲彌樂今園林尙懐昔吾志在擇善無然復離析留連晡時酒吟咏古人詩夕陽傍秋菊采之復采之采之欲遺誰􅀅以贈所思所思在何許千古不同時四海倘不逢吾寜獨去兹􅂅言秉􅀌貞勿爲時所欺九日閑居無錢撫秋菊向夕􅋽風生誰爲白衣者頗識江州名映杯碧水净曜日丹葩明天際雁􅀌去草根􅆉一聲荏苒委時節裵􅆦閱年齡興來發長歎意盡還一傾儉徳茍不慙厚禄安可榮白首􅛽髙賢清謡􅄅遺情人生亦易足何必勤無成和劉柴桑􅀉􅀽道見懐一峯之意當年䑓城㑹執手多踟蹰四海一爲別寒暑逝不居逺意属羅浮舉頭望匡廬胡然金牛谷奄忽成丘墟蛻骨歸復土靈衿存爲畬庶㡬百代下攀駕以忘劬􅀽侯西江英好徳眼中無尺素毎欲近十年不作踈磨劍患不快快則随所須永願磨此心恢恢快劍如和郭主簿􅀉荘定山青松出喬木遥望十里隂少年不結友􅀊暮懐同􅁭同􅁭問爲誰定山携一琴悠然一鼓之不辯古與今在昔經江東多士予所欽論文一觴酒惟我與子斟豈意千載下復此聞韶音我病不岀戸何時還盍簮茫茫宇宙内與子契其深贈羊長史􅀉遼東賀黄門欽此心自太古何必生唐虞此道茍能明何必多讀書寂寂委山澤于于來亰都斯人各有分彼此何䏻踰杪秋風日清呼兒理肩輿􅂓爲玉䑓逰言􅀏誰與俱屈指意中人一坐一踟蹰歸來看四壁四壁光如如聖道日榛塞誰㢤剪其蕪夫子乆不見吾生何以娯常恐􅀊月晚况與音問踈申以伐木章一日三卷舒飲酒木犀冷扵菊更後十日開清風吹芳香芳香襲人懐千囬嚥入腹五内無一乖雖靡鸞鳯吟亦有鷦鷯棲昔者東籬飲百榼醉如􅅺那知此日花復與此酒諧一曲盡一杯酩酊花間迷赤脚歩明月酒盡吾當囬庚子􅀊九月中於西田穫早稻遲明向南畝踈星在簷端夫岀婦亦随無非分所安道旁徃來人下車時一􅀚問津津不知仰視飛鳥還邏苗逺峙夕濯足荒溝寒吾惜耦耕好焉知世路難伐鼓􅀵西畬黄雲􅀍江于􅂓用代糟糠作粥歡賔顔隣叟携児來嬉戯松下􅀜齊聲鼓腹謳永謝攅眉歡懐古田舎君子固有憂不在賤與貧農事乆不歸道路竟徒勤青陽動芳草白日悲行人阻溺去千載相知恒若新出門轉竆厄得巳􅂓一欣􅅴雨濡夕畛繁花幕春津獨徃亦可樂耦耕多近隣百年鼎鼎流永從耕桑民製布裘成偶題􅀉􅀺雪青海布剪黄雲嶺綿装白雪製爲道人衣方直無周折吾老不出門躬耕慕䔬缺黄昏披此裘坐望梅村月羙人遺我酒小酌三杯烈半酣發浩歌聲光真朗徹是身如虚空樂矣生㓕㓕紫菊吟􅀉林時嘉嚴霜百卉枯三徑挺秋菊緑葉明紫英㣲風逓寒馥芳情謝桃李雅望聮松竹懐㢤種花人杳在江一曲遺我盎中金南窓伴幽獨時無續騷手憔悴誰當録且脫頭上巾茅柴今可漉感鳥有鳥不知名皎然閨中清育雛止庭竹衆鳥不敢凌暮雨􅋦䖝歸喚雛雛不譍以翼覆雛宿夜乆巢屢驚小㒒極殘忍不眠伺東榮扳巢襲其毋毋去巢亦傾一雛堕地死二雛尚吚嚶平明視竹根群蟻正經营子弱毋護之無毋何以生嗚呼號者誰宛有雌雄情入簾逼我枕爲我再三鳴此鳥􅀄來巢卑卑近前楹我無害鳥心人謂此鳥靈終焉失所托此禍􅀅孰懲吾甚愧此鳥感之欲霑纓呼奴撻其背流血非所矜再拜謝此鳥此意何由平賔陽樓八㬌爲丘侍御作今存其三榖城呼月㣲月瞰髙樓樓中酒􅀄㵼旁見榖城山孰是呼月者騰騰露光㬌寂寂開逈野笑問圯上翁何知此山下牌山樵唱日夕樓上飲瞻望南山阿樵夫睨林木㑹意豈在多白雲滿山徑􅀒薪行復歌人生異岀䖏貧賤奈爾何羅水漁歌有月來照人沉竿坐羅水意與羅水深夜静歌亦起江湖雖云樂天地惧終否豪㢤賔陽子發蹟異姜吕題萬碩司訓風木圖把君風木圖識君風木心賢者不易貴逺者寜務今嗟㢤鼎與茵􅂶足時所欽築室辛勤結吾廬經始筭一一廣狹更度量卑髙在平秩堂以備薦享閣以邀風日前􅀣貞節門後治渭川室四垣謝粉餙牡蠣髙爲骨仰瞻􅀔㣲峻其間僅容􅂰既以儲簡編猶堪歛􅂁笏是年秋在仲筮日欣得吉良友交助余衆工告易畢把酒對梅花浩歌新突兀讀林緝熈近詩時緝熈典文衡閩中欲便道還家數夕前嘗夢見之故有是作言笑不可親中宵馳夢想君行㡬千里道路輕閩廣忽見嚢中詩區區謝官長深淵或遺珠努力試一徃㣲官亦何事感激章欲上行止各有時姓名忌標榜此言誰爲傳􅂓以慰俯仰􅀅如外海㸔山先􅀉道傍諸友吾衰何所如俯仰在一席舎旁有小水相望􅄅南北静乆動乃冝住多行亦得朝徃暮南還路旁事舊識故人邀我飯半餉吾未惜東老對囬公神仙無惡客秋興西風振庭木虚堂夜蕭蕭􅄃衣起歩月歸雁􅀟飄颻天地豈予獨知音不可招􅁳心祈有合悵望空雲霄盛時不得意衰老徒傷悲志士􅂚爲爾載籍多見之翹首面崑崙白龍有遺池振衣一千仭髙詠秋風誰海上有一士來徃不知年或􅈬胥靡飯或投上方眠㳺處各有徒孰謂世情然飲酒不在醉弄琴夲無絃借問子爲誰得非魯仲連謝琴月惠荔枝長夏風雨過西良荔枝熟晩有好事人提筐歸我屋老母不肯嘗馨香聞隔宿上以薦祖考支分及僮㒒第令筐中有不畏稚児哭爾惠良足嘉吾親素多淑在徳不在物豈謂竆口腹東坡三百顆日啖不知足長爲嶺南人千載披心曲贈世卿采菊復采菊嚴霜下庭木豈無桃李顔畏此天地肅落落枝上英未傷飡者獨持贈楚人歸投之江魚腹青青墻下竹冬後色如是燦燦月中花􅀊寒香不匱新知語未足逺别情難置獨上江門舟北風日凌厲進亦人所憂退亦人所憂得亦人所憂失亦人所憂所憂非憂道所憂其可晋所憂非憂貧所憂其可休古來嚮道人䏻辯憂所由去去凌九霄行行戒深溝敬此之謂修怠此之謂流元神誠有宅灝氣亦有門神氣人所資孰謂老氏言下化囿其蹟上化歸其根至要云在兹自餘安足論可以叅两間可以垂萬世聖人與人同聖人與人異堯舜於舞雩氣􅁚一而已大者茍不存翩翩竟奚取老夫嘗用力兹以告吾子文字費精神百凢可以止一落永不􅀵年光建瓴水上上崑崙峯諸山髙㡬重望望滄􅈚波百川大㡬何卑髙入揣料小大窮多少不如两置之直於了處了容珪輓師友道乆衰窮郷無可者是非真妄間彼此不相假所適一以偏較然見趨舎滔滔復㴞㴞風俗日益下珪也何所之終身在陶冶四雛一母乳衎衎東山岑二雛羽翼長一去無遺音毋衰二雛小中夜哀莫任感此骨肉别悄然傷我心蕭蕭暮色起脉脉春江深百年㑹有盡淚下雍門琴容氏多兄弟西良此白眉源源來講席稍稍樹頭籬行可郷人敬心惟我軰知臨危㒒且至忍死待斯須有懐世卿仙鶴去不歸黄鸝向人語空館忽相思雲山杳何許出門望東海黙黙空延竚月岀潮復來鳴橈下滄渚時雨日夕來郊原藹新緑白雲􅀍重崖下映寒塘曲情結竹上言䰟消井邉躅三年隔瀟湘書至不可讀伏枕廬山下春懐􅃤不舒哀絃乆去耳風韻今何如灼灼花自媚嚶嚶鳥相娯髙䑓夕流盻古道行人踈煩􅅝謝人境抱􅂰山䑓居奈此枝上鳥交交春雨餘少年耳目冗衰老不䏻虚安得魯連子從之泛江湖觀自作茅筆書神徃氣自随氛氲覺􅀄沐聖賢一切無此理何由矚調性古所聞熈熈兼穆穆耻獨不耻獨茅鋒萬莖秃益母草有草人不識弃之等蒿萊時來見任使到口生風雷溲也佐未足益以􅁡與醅生者得其養死者無遺胎岐黄開夲草夭扎人所哀一物具一用神㓛不可猜佳名夙所慕廣濟真天才送劉方伯東山先生未别情何如巳别情尤邈豈無尺素書逺􅀉天一角江門卧烟艇酒醒蓑衣薄明月照古松清風灑􅀌鶴逰圭峯同世卿作窮居無􅀊年老夢得迂朽永托山水間東西事逰走幽幽鐡橋花悵望未得手杖屨􅂓此躋㣲霜正踈栁歛􅁭欲無言㑹意豈在酒滄海當我前崑崙卓我後但談孔氏規坐失㣲生畝示李孔􅁱近書昔别秋未深今來􅀊方晏吾衰忘筆硯月記詩半板或疑子羙聖未若陶􅇓淡習氣移性情正坐聞道晚爲我試讀之如君當具眼􅃽韶州書至代簡荅之相别何悠悠梅花十寒整音塵中㫁絶窅􅀂堕深井忽枉尺素書開讀喜不定􅁃嶺秋正髙􅀭旌下松徑君才足理郡韶民日延頸古來水火喻子産㓛在鄭􅀊計諒有餘願聞下車令八月二十四日􅄓作多溺死者坐忘一室内天地極勞攘顛浪雷殷江流雲墨推障髙田水㓕頂别䲧風翻舫大塊夲無心縦横小児状江門三两詩饒舌天機上讀張廷實主事近稿世惟識寳人惜寳如惜子寳爲物所揜念之容色悴一朝此寳來輙復喜不已喜戚由寳故以識爲心累贈鍼炙楊飛昔吾見爾翁賣藥金陵市手持一寸鍼鍼落病者起我主大行人翩翩酒相值京中多異客飛盖􅀂流水一峯挾一􅌩有藥䏻醫世時當引疾去東西各飄逝􅀊月忽復多􅌩括鍼亦廢君來還見予俯仰相悲喜何期二紀下重睹無􅀟技瞻彼老定山風波五千里金陵多舊㳺存殁寧復記人生􅀂浮煙爲君語如是聞陳宗陽湛民澤欲過江門遇􅄓風不果用張廷實韻􅀉之斬蛟須射虎水䂖敢誰欺老夢不知逺客來何怨遲千休千處得一念一生持衰白如曾見斯言或可依與民澤漠漠黄雲岡􅃢􅃢鐡橋水宇宙㡬千年洞天今有主借問主爲誰平生子湛子題民澤九日詩后我思陶長官廬山一杯酒世逺道彌光􅀊􅀊此重九酒中有歌者劃然金䂖奏謂從秦漢下藩籬士夫口藩籬苟不顧其中更奚有寥寥二千載長夜不復晝俛仰宇宙間􅀌光映踈桞民澤長者言藩籬自兹厚兹晨偶拈岀以洗薄俗陋付民澤千休千處明一了一切妙若也不明了了心到頭反異憧憧撓拾遺七言擬移木犀於上㳺黄雲示民澤木犀金粟散天香在秋之季廬山陽湛生期我上㳺庄移根千丈黄雲岡萬丈黄雲千丈山金粟花開不等閑金粟氤氲塞两間先生與爾同􅀊䦨右以木犀贈民澤還植黄雲之麓異時諸生􅀱我於黄雲這早晚便是木犀花開時也與民澤四言聖人之學惟求盡性性即理也盡性至命理由化迁化以理定化不可言守之在敬有一其中養吾徳性正月二日雨雹是日雨水節雨水不雨水雨雹胡乃然小者如蓮實大者如彈丸仍聞隔江言有雹大如拳吾君古帝堯神㓛格皇天雹徃而霰來無乃爲豊年後二日雨霰五日雨霰北風卷長雲晨光坐來㓕映空絮忽飛誰謂越無雪元氣塞天地萬古常周流閩浙今洛陽吾􅀖亦魯鄒星臨雪乃應此語非謬悠讀張地曹偶拈之作拈一不拈二乹坤一爲主一畨拈動來日岀扶桑􅀣寂然都不拈江河自流注濂洛千載傳圖書乃宗祖昭昭聖學篇授我自然度不習書絹殊失故態已付染師作碧玉老人卧帷矣呵呵拙詩紀興録上顧别駕先生以􅀶一笑用絹不用􅂻下筆無神氣何况闢其行大小難更置䏻書法夲同萬物性各異茅君踈而野拘拘用乃廢我且毛頴之安䏻免濡滯書成始大慙未忍水火棄持以付染師經營卧帷事作詩告先生共契茅君理贈􅀺秀才月行在青天月影沉碧水誰爲弄影人吾與􅀺生耳􅀺生青雲彦偶借􅅔垣使明日還端陽贈君惟有此􅀉李子長仙城李子長髮短不及寸家有覔栗児時無郭元振經年㫁徃還使我勤問訊寧知造化心天地無情盡祝融我當徃徃處還自然未徃亦由我安知不是仙是身元有患天道豈無縁難逢俗人􅀃可爲知者傳卧逰羅浮四首登飛雲馬上問羅浮羅浮本無路虚空一拍手身在飛雲處白日何􅄀􅄀乹坤忽風雨簑笠􅀅安之徘􅆦四山暮度鐡橋一度一萬刼飛空夲無鐡何名爲飛空道是安排􅅸夜乆天宇髙霜清萬􅄜徹手持青琅玕坐弄碧海月下黄龍天風吹我笠吹下黄龍頂两手捉笠行不知白日􅉂赤松見我笑却立千丈影童子問赤松雲深各不領望羅浮山大必有靈􅁟髙豈無異翠浮㡬千丈日月東南翳我㝷五岳來未問仙家事􅅸頂望九州衡山正西峙贈周文都十年两别君一别一囬老問藥朱陵逰吾兹恨不早平生憂樂心相對各傾倒逺别望眼昏浮雲不堪掃􅀉題嚴州嚴先生祠壁既上桐江䑓復弄桐江釣不食桐江魚不怕嚴光笑衣巾人笑儂羊裘終未了堂堂范公碑今古稱獨妙寒菊菊花正開時嚴霜滿中野從來少人知誰是陶潜者碧玉􅀊􅀅竆端居酒堪把南山對面時不取亦不舎􅀉賀柯明府夷狄犯中􅀦妻妾凌夫君此風何可長此恨何由申仲尼憂萬世作經因感麟徃者宋元間適逢大運屯仰天泣者誰屈指張陸文臨事誠已踈哀歌竟云云一正天地綱我祖聖以神缺典誰表章厓山莾荆榛寥寥二百年大忠起江濆慈元廟􅁇作爛映崖山雲近者陽江尹一念何精勤作祠比崖山两廟存三仁大封赤坎墓昭昭愜衆聞深悲魚腹冷一躍海門春厓海風波隔陽江面目新自然聲氣應坐使風俗淳短卷心先賀神交夢毎親琢詞告萬世老病敢辭君偶書所見崖傾百丈泉直下注東川翳流起大舂覆茅於其巔一爲利所驅取便世争先漢隂喻桔橰所見無不然嗟㢤抱瓮心古道何由全謝鄧督府惠交藤酒至使來遺一樽百金不願易遇藥如遇仙竒方聞在昔卓㢤李文公作傳甚詳悉感公嘉㑹心何以酧公徳但恐命不齊服藥也無益暁枕天地無竆年無竆吾亦在獨立無朋儔誰爲自然配舂陵造物徒斯人可神㑹有如夀厓者乃我之儕軰永結無情逰相期八紘外題端陽李太守􅅴霖重應卷嶺南名刺史端陽有成績端陽問爲誰長沙垂令徳曰惟長沙公善非一代積去年苗欲稿公􅃦不安席手拈一炷香須􅁷見昭假今年事復然斯民忻目撃􅅴霖雨下􅁟郊野望四塞滂沱及僯壌秋田足民食公惠寜有心斯民感公徳口頌遂成碑舉手還加額安得長沙公爲我大􅀖伯坐令十郡内廣布陽春澤閭閻興孝悌四野無盗賊共育太和春絪緼謝反側偶得􅀉東所知暮則知朝西風漲暮潮千秋一何短瞬息一何遥有物萬􅁚間不随萬􅁚凋舉目如見之何必竆扶摇登髙未必髙老脚且平歩平歩人不疑東西任四顧豈無見在心何必擬諸古異體骨肉親有生皆我與失之萬里途得之咫尺許得失在斯須誰䏻别來去明日立秋來人方思䖏暑和羅服周對菊見􅀉春來苦不早春去常􅂅遲嗟㢤造化機萬物安得知􅀊晏菊始􅄍鮮鮮在東籬不汚桃李塵永續徵君詩􅀛山夜月萬古此􅀛山萬古此明月開簾望􅀛山岱宗固無别但恐山多雲風吹亂人睫馬牙香爐中煨白木坐上是青天綺季奕未畢夷齊上西山沉檀皆下品欲語不同年題心泉贈黄叔仁夜半汲山井山泉日日新不􅀅泉照面白曰多飛塵飛塵亦無害莫弄桔橰頻贈伍弼歸覲諸生胡不歸九月望庭闈山北山南道紛紛落葉飛呼児巾木榻謝客掩荆扉不盡來時約堪沾别䖏衣得何時矩書良友惠我書書中竟何如上言我所憂下述君所趍開緘讀三四亦足破煩汚丈夫立萬仞肯受㝷尺拘不見柴桑人丐食䏻􅂬娛孟軻走四方從者數十車出䖏固有間誰䏻别賢愚鄙夫患得失較計扵其􅀄髙天與深淵懸􅅸徒嗟吁􅀉李􅀂虚憲副我吟白洲詩神爽自清絶平生磊磈心盡向詩中泄詩成輙􅀉予所得遂盈篋蔵之石室中至寳防盗竊五言絶句暁起偶然風折木村犬吠成群此事真難免問君聞不聞辛苦南隣臼逺鷄方一鳴夜來風極急吹㫁到窓聲冬眠不􅁴暁開門見白雲雲中何所有童子两三人湖西九巖爲一峯題其一光霽岩風月佳名在乹坤浪跡空從來岩下客秪與異人逢翠華巖來􅀃湖西者不及華山頂誰知巖中仙觧作石柱屏清風巖聲從竇中來可以塞天地借問采􅅔人便知風動䖏府敎巖宋敎授羅開禮所棲之地府敎英靈在虺蛇不敢居從來巖上月只是照虚無極清巖聲名野老畏草䂖貴人争剗􅁍巖中有悠然是極清英公巖今名鍾英一峯所更翠掩千㝷洞青窺一竅天人間無􅅸境不要問桃源扇和巖即石柱岩山骨短圎稜􅀄疑削木成乹坤蔵一柱猶得鎮巖扃卧龍巖岩有龍潭龍床床之旁有䂖仙人龍岀潭水空龍歸潭水黑君從龍床來誰在龍床側月巖闇闇月堕地忽在天中央堕地人不覺中天照四方題慈元廟慈元一片䂖長留何處山崖門潮日至雪浪飛天􅀜題􅀞金籠鎻鸚鵡山木縦斑鳩巧拙知誰是天機不自由髪與踈梅白身􅀅寡鶴親􅀌山殘雪夜清絶凭欄人題􅀞松泉爲張别駕松乃木之雄公亦人中龍何須看􅀞夲千丈在胸中對酒放歌當盡聲飲酒當盡情門前烏桕􅀣夜半子規鳴荅丘侍御送酒石齋書夲拙酒力巧相扶欲報霜䑓貺山中一物無雨後乆雨妨行樂花前望玉䑓人間見花􅀣不似玉䑓開村歩雜書所見踈花明委巷細雨得今晨􅀧綴非無意紅芳不是春公飯何曽接衣冠不作人齋中有名酒分爾一杯春晚食南山稻堂堂媿野人平生無可􅀃一個白頭親村笛轟牛背山花結㡌頭􅀐牛勝􅀐馬曲坂没􅀰愁趂罷江門市啇舩奪港歸溪山愁引望城郭更須知日照南浦口􅀄喧江市人小奴性嗜酒出飲畏吾嗔戯贈求書饒大中還江右書法一家成風波㡬月程􅀌舟愁度儉薦福有雷聲代簡荅方伯彭公大賢望扵人徃徃非獨守難􅀅一人意滿足天下口氤氲復氤氲東君欲放春梅花何太早早報越城人􅅸句清暁乗驢岀北風吹澗藤沉吟澗邉道天意莫留行行止皆前定岀門愁北風西郊不成徃昨夜夢途竆贈鄺知縣雲卿别又送夫君别芙蓉花可怜水深難折贈留伴老夫眠與諸友夜過貞節橋人影荒橋下䖝聲滿月中連翩􅀟大䄂􅂓得颭溪風讀張主事近稿􅀨中月不見雨霽月還多雨􅀍風吹去無風月奈何對菊淅淅西風至爲秋未有涯江邉􅂓一醉信手得黄花不落龍山㡌何須九日風更煩􅀅小雨向晚洗花叢春事歸桃李西風響未休長官三徑晩丞相一坡秋菊坡先生崔與之也好個重陽節誰家酒不賖果然殺風景吸茗對秋葩天地花無數寒花色乃佳古詩拈未出除是長官來九月木犀花盛開偶成􅀉賀黄門克恭香逐西風起氤氲入杳􅄀不知從此去㡬日到遼城洗竹風引一叢竹揺揺四五莖横斜今洗盡道眼㸔圎成洗竹洗荒枝洗心洗狂馳老夫無可洗抱􅂰洗吾詩一洗一囬踈相􅀅洗到無客來莫問我北壁有􅇛蒲暁起籬頭過井水不打隔齋門手握南陽布纒頭數竹孫老不愛春華一籬􅀌􅀒花胡爲聒我枕穉子打朝鴉自有無情蝶􅀌飛不傍花白頭聞見少閑動羽䖝嗟贈張叔亨侍御天下元無事勞勞我有心相携沙上語山月二更深觀群児釣群児齊弄釣其一偏多遇餘三未得手投竿來上樹仰面看垂釣失脚堕危䂖􅀂是謫仙人水中眠亦得閱丁知縣傳模様從㸔拙丹青只冩真乹坤如許大具眼豈無人夢中作翩翩復翩翩天生我亦仙江山足風月吟弄到何年夢丁彦誠與君生死别三四􅀊星周夢語分明記相悲各􅀧頭對竹竹色上墻多南薰緑㡬何時無分付處野鳥自來歌窓外竹青青窓間人獨坐究竟竹與人元來無两個北風卷頑雲隂晴安可卜海月出漸髙獨照南窓竹随筆茍䏻深積累豈患無髙譽如何世中人􅅴心鐡爐歩一􅀊十匹衣一日两杯飯真樂苟不存衣食爲心患人不能外事事不能外理二障佛所名吾儒寜有此㫁除嗜欲想永撤天機障身居萬物中心在萬物上小雨閉空齋青青竹映堦道人終日静一枕到無懐子羙詩之聖堯夫更别傳後來操翰者二妙少能兼梅下雜詩朝凭曲欄西暮凭曲欄東欄裏梅花好看花了病翁乆共寛閑地濃薫自在香折來何所􅀉只是􅀉遼陽賀黄門欽也贈人萱親垂九十逰子尚天涯莫艤仙城棹南風夜引旗讀易偶成南乎不可北東乎不可西自從孔孟來君子恒處暌張克修别駕約逰羅浮重疊四百峯鐡橋在何處莫􅀅别駕來同到飛雲去張克修見訪滄􅈚㡬萬里山泉未盈尺到海􅀚㑹同乹坤誰眼碧題劉鑑松劉生於冩松䏻以酒力遣酩酊氣正豪蒼龍自舒卷題扇風檣抝欲折五月瞿塘過何如此庵中終日抱􅂰坐張㠶海上囬㠶掛鐡橋􅀣驚起白蝦蟆跳上飛雲去贈胡地官次韻呉明府獻臣有一范仲淹人􅀅重名節馬上地曹郎翩翩起吾粤引滿花下杯延縁坐中客醉下大䄂歌孰云此門窄題林府尊夀家慈書後馬尾縁封事魚緘壽老親古今誠一揆藉用白茅人題顧通府集古倡和卷後滿眼珠玉光髙才極雄騁對之不敢言稚子來弄影出化書訪客舟中舩頭酒多少舩尾閣春沙恰到溪竆處山山枳殻花夢後作䇿杖獨行㳺青山一何深道逢采藥人問我松脂林見月時一吟夜􅋽天稱心囬頭望東川流水無古今幻迹有去來達􅀚無古今長嘯人不聞山風吹蘿􅁭楊栁餘朽株梧桐但踈隂小卧不岀門不知秋已深贈鄺筠巢山中一夜秋老屋居然别丈人不飲酒共坐㸔明月客乞題随時子軒無雨笠且置未晴蓑不捨簑笠用不竆我是随時者題扇東艇拍西艇小拍庸何傷夕風起驚濤艇艇争低昻一夫眉正揚一夫髮盡秃日暮舩正歸前江風㧞木蔣韶州世欽挽詩治郡聲名逺如何是我詩青山韶石老囬首盡交期徃事形骸外如今一夢休曹溪分我茗猶􅀃蔣韶州周京聞母䘮歸弔以是詩萬里無歸耗形􅀅一木親遺言入肝肺真得太夫人題南窓壁南風吹面處不省是南窓此意無人㑹乹坤落酒缸雨後示劉宗信林時嘉一􅀨變新􅋽炎埃洗除盡廬山昨夜燈已照劉宗信秋來亦滛潦日月閟其光乹坤丈夫事千古空堂堂漫筆幅巾是秀才袈裟是和尙􅇊俩人共知長篇事標榜神泉八㬌爲饒鑑賦其四贈之太極􅆂虚混沌固有􅀄渾淪夲無物萬化自流形何處㝷吾一浮螺得月道眼大小同乹坤一螺􅀉東山月岀時我在觀􅈚處茶山分香江門白藕花我榻廬山頂君􅀂去茶山茶香復誰領神泉漱玉焦明亦是鳯螢熖只疑燈安得石上泉爲洗世中盲九日霜前淡淡花瓢内深深酒今日陶淵明廬山作重九同俗不同俗山杯映秋菊仍聞席上歌不是人間曲歌舞重陽酒今年有去年山中八石榻榻榻是囬仙讀李評事承芳文著論必無同乹坤孰此容人扶周孔敎用世且無㓛一囊包宇宙到手問綱常所以東坡老嘐嘐薄武王不薄論交意因書稍稍知還􅀅天下眼照破老夫痴送劉宗信還増城夜宿黄雲塢秋登碧玉樓歸時一片䂖見月過羅浮山到鐡橋西青天一角低送君髙處望天與㡌簷齊菊花笑我前梅花撩我後問花花不言駐楫增江口山人偶出村送客村南道江山風日佳􅀊月乹坤老贈張叔亨侍御岀按雲南到治一萬里使君行莫遲梅花開樹樹不是向南枝碧玉樓晩望樓逺見諸山目短意不盡天隂水恠興碧玉所以鎮贈克􅁱別駕遷梧州守來别白沙贈之甲兵滿一舩江門來訪別贈君欲何言笑把梅花折少年恣行逰老病徒拘綴送君今夜心還到蒼梧去贈陳頀湛􅀨􅀃到忘言處無詩可贈君許􅀅臨别意一􅀧落黄雲君􅀂問鳶魚鳶魚體夲虚我拈言外意六籍也無書送李子長徃懐集取道謁張梧州春棹去江門泝流焉汲汲􅀧筆煙外山歸來㸔懐集不聞端别駕敬士如子長問道蒼梧下登歌刺史堂贈范能用溽暑不可處清風時滿樓如何傳别敎衲􅀍坐􅂪頭阮籍見孫登只聞孫登嘯針在繡不傳繡傳針不妙西良容倫餽荔枝非桂州夲色戯以是詩口溢桂州􅄴眼定西良色我是荔枝仙何人觧漫得夀南山翁七十朝看亦南山暮看亦南山南山長不老􅂓以永君年萬株松上花千日杯中酒児孫戯􅂰前一舞一囬壽贈太守黄公水白端陽色梅紅嶺上花春風迎度馬秋月􅀱歸槎題宋丞相陳俊卿􅀞像御史鐡爲肝張秦掛舌端至今湖嶠月猶作太師㸔題宋状元陳文龍􅀞像文章甲天下氣節愧當時公母亦滂母千秋名共馳梁惟正鄧徳昌徃來白沙途中遇盗惟正以舟泊淺奔于岸避之徳昌抱書立舩頭盗不加害戯贈以詩道逢惡少年打破两生敬試問鄧徳昌何如梁惟正暁枕偶成采義非采􅅔食􅅔不食粟遥遥望西山千古嵳峩獨西北多竒峯雲深杳難認漢廷無謀臣黄綺皆真􅀮度危橋事至絶安排放脚踏髙崖如何謝上蔡旦旦習危堦贈閔督府還陞南京秋官司㓂今欲行病叟山中卧如聞經畧憂未向春風破吾聞用世心中外無異等何由一送公細話東西省贈林府尊彼曰春􅅺人此曰人􅅺春晨朝岀相送向夕望歸輪贈李克常桃花􅀍東岸江水日日深贈君豈無言亦有花水吟感事漫述與王樂用丁侯爲縣時不與謁者通古稱奉法吏秉筆惟至公留情重留情獄事果難明無輕赤子命爲官急書程士而未聞道未免爲物撓卓㢤安心人外事􅀂無好舎已莫委命從人莫登山嗚呼羅一峯逐善如轉圜􅀉淮上秋官姜仁夫問客淮南道停舟過此無廬岡一端帛爲我謝仁夫呉山夀蔵山隠一坏􅁟人思百代傳無竆身後事未􅀂子孫賢題丁長官廟何時重借㓂此地一桐郷四海諸侯望千年一炷香㑹翠亭東池乆寂寞㑹翠得佳名小詩拈未出去㝷王右丞呉主簿詩主薄名則宣平人呉黄門仕偉之父也軍門止殺按状正統已巳閩城賊流毒處民蟻附朝命大司馬孫公原貞夷之知先君謀畧禮致幕下賛畫百恊邑有三巖民多避難於上偪脅之衆亦有聞義而歸者命先君統之推誠示信無不感服㓂平孫又欲行法先君泣曰殄厥渠魁脅從罔治矧既歸命殺之不祥竟得免奏㓛授鮑村廵檢泣諌天應見坑降地不知自然殃慶至天道不須疑過與弗取按状㬌㤗間分麗水爲宣平復命先君董其役伐木於山役力扵民期年而㓛成孫曰難平邑作皆爾之䏻餘木尙多可治爾居先君辭曰㓛成於上愚下何有明公芟夷大難布徳於瘡痍之民一方􅀗安某也受賜多矣且官物不可入􅀻門未敢如命孫益敬之百世髙公綽千金謝魯連胸中無雅度勝事竟誰傳卜築西溪按状鮑村任滿陞華亭主簿愛民如子處􅀦如家凢有議讞多稱平焉且䟽子下民濬河渠禁賄賂等十事于朝皆賜可松之地狹于蘇而漕數反岀其上又爲民陳情得减北運一萬石事載雲間志在松十年勤勞罔􅈈僅五十而二毛蕭然嘆曰天道四時㓛成者退庸可不知止乎遂乞致仕而歸卜築西溪之上主簿䏻經濟中年未乞身西溪看卜築知是晏眠人􅀉嚴州林郡􅀶緝熈萬紫千紅外如君故可人桐江都滿􅀣海驛尙含春􅀉東所春江正滿時未具衡陽楫還携鄧俊圭江門與君别夢林緝熈酒䦨歌不起老病無奈何夢滿桐江雨相對不成歌山樓夲無夢我自夢嚴州嚴州誰夢我白雲天際流荅柯明府終秉循良筆難迯俗吏媸不知三考績課㝡竟何須贈雷少尹還汀州桔橰滿天地抱瓮古來難哦松非俗吏哦松不在山􅁴後馬圖不岀河鉛刀不割痴上下㡬千年揜卷一沾衣謝姜太叅惠酒名公遺我酒洗琖自開甞何以酧佳貺啇歌示不忘武進八㬌爲徐嶺南紘作龍山春雨長夏龍山暁人間望忽開長風捲雨去復送雲歸來笠澤烟波何處煙波好公乗笠澤槎我泛江門月乹坤共一家􅀛山夜月夜半􅀛山月䏻開萬頃秋試從開䖏望照公湖上樓陳湾疊嶂丹青陳湾疊嶂新我詩君莫笑還属姓陳人薛堰通津薛堰歸何處披圖想具區古來探夲論無欠也無餘亭山夕照亭山不可踰華頂凌天台卑髙夲自形夕照從西來廟墩靈跡捄溺如救火造次遂􅂢生金陵人去逺抝􅀑不來争板橋書屋板橋藹吾伊名稱已盖世誰云􅀛山月不照新堂睡荅無錫諸友碧玉通書乆青天感興新江門動秋思􅂓因􅀉故人送米與何侃野饌家禽小村舂晚粒香莫言無厚餽吾意在分甞九日用舊韻新篘壓两壷落英携滿䄂我非陶長官廬山還九九送黄希顔之太平推官有官五馬後無官百揆前不􅀅前後㸔須着有無言題髙瑨詩集神交傾盖上心逺著詩時無由向人道人亦豈能知紀夢一别三十年相逢不相識骨肉爲路人春風淚沾臆􅀉潘留鶴有時牛亦坐何處鶴還留天台二萬丈誰􅂿紫􅄀謳題伍光宇碑隂松柏􅀌髙處春風更可㝷如君有賢配昭徳在碑隂荅廷實有懐見􅀉白雲滿中野此地即衡山莫擬西來棹須防失路難謝孟芳遺腹生男充閭人所喜今日愴還深憶我􅀄求乳誰知母氏心贈呉惠州繹思皂蓋朝天闕青山道故郷髙堂開壽斚酩酊别莆陽鴝鵒􅀄日上茅簷江邉有􅀞舩八哥莫饒舌有詔許歸眠鴝鵒䏻言鳥䏻言我恨無白頭書小楷不及蔡君模九日諸生携酒飲白沙醉中和荅老病得狂痴讙呼九日期自􅀘登山􅄚誰供把酒巵諸君爲飲㑹老子不須期盡數籬前菊一花拈一巵九九八十一去來無窮期元精爲我酒大塊爲我巵對酒用九日韻秋花新氣味秋月舊􅁭期獨唱花前曲閑傾月下巵行年三十許已卜入山期處處開花徑􅇃􅇃是酒巵飲酒何必多醺酣以爲期不辭亦不勸三巵或五巵作詩尚平淡當與風雅期如飲玄酒者噐用瓦爲巵梅花水陸花無數南枝愛殺人遥持一杯酒江上酹花神逢人問除日君得地曹􅀰此意憑誰􅀉梅花隠石床謂東所也九日懐麥􅄮時徃江東未返用前韻東西填脚債已過一秋期今日拈花處思君第一巵茱茰何處酒勝日與君期漁翁歌獨釣江月夜明巵羅浮羅浮海上來髙髙㡬千丈鐡橋倘不関諸峯竟流浪世人未得仙斯事安知妄九等真洞天朱明惟上上題子長寓舎壁子長亦何病夜夜此呻吟世無白家媪誰㑹子長心驢背推􅃻去君知我是誰如何乂两手剛􅀍長官笞乞茘枝逢春思種􅀣垂老􅀏開齊未厭青紅在從君乞茘枝六言絶句周鎬送白菊乞詩陶令黄金遶舎君家白玉滿園千古清風廬阜㡬叢細雨江門㣲醉不須酩酊半開莫待離披安得季芳與語相思欲􅀉一枝白菊偏冝素髮青山只對蒼顔嚥罷秋香滿腹風吹不到長安邀丁縣主賞菊社㑹賦詩不就公當酧我杯盤小酌倘㝷舊􅀨東籬還對長官題枕太華峯頭一枕千秋萬􅀊通靈不怕惡蛙驚睡鼻端三月雷鳴澷興風洒數莖白雪月臨一丈青笻餘事歸詩卷裏殘年放酒杯中景斜瓦碗方食日宴柴門未開五栁前身處士一瓢今日顔囬晨光沼上魚戯夕陽村邉鳥來東僯小児識我一日上􅀣千囬翠煙緑樹歌鳥青水紅蕖浴鷗笑問五湖范蠡風濤何䖏扁舟贈陳聦還莆緼􅂁不妨學道􅅸榖可以求仙相府胡爲慢士􅁓田自有豊年青錢不滿杖頭雪繭徒勞免頴相逢浪􅂆歸耕實欠蘇秦二頃七言􅅸句伍光宇卜室白沙爲讀書之所君此卜居君亦足空村無人山多木參差芭蕉麗晨旭新葉新心逓相續競晨登登聞隔竹東僯老人事幽卜甆甌瓦盆不供俗我不到門此翁獨荅叚錦衣惠藥藥來詩徃共誰忙野老無金與叚􅀰泉石旌旗俱在眼不應泉石獨膏盲聞㰖山近有車馬之蹟因贈緝熈并􅀉竹齋丈白日傳呼攪翠崖誰家玉􅀣碧雲埋只疑冬酒開松逕定有山靈怨竹齋偶成墻角經春卧短笻千秋塔骨不如公科頭坐轉茅簷日閑㸔蛛􅁝蕩午風夜坐與童子方祥慶話别偶成晚飯跏趺竹几安秋吟涕泪閣燈殘一詩可送方童子千煉不如荘定山徃潮連人事獨速蓑衣舞我航數家煙􅀣隔㳽茫不􅀅起倒供人事秪爲看花也未忙栁渡月下承苕溪翁約賞中秋月於潮連年顔欲比苕溪老酒琖同揮夜月圎來共主人秋半醉更囬楊栁渡頭船次韻張叔亨侍御見􅀉酒舫當年興未涯清宵人語白鷗沙如今縦有相思夢不到長安御史家㸔栁淺塘低竹小坭村黄土墻扄白板門望見西頭楊栁樹行人都訝是桃源雜興曲肱深閉􅀝山閣照眼不堪臨路花一身老去何須岀两脚朝來只欲􅏘􅀝檻􅅻看一两花不堪終日雨斜斜先生已結僧趺坐還與人間管􅀊華白日㡬時生羽翼金丹􅀒我不神仙東家茗椀頻分啜两腋清風也可憐溪橋晚立示諸􅀰溪邉明月掃不去竹下清風時一呼天與乃公供打睡莫安橋板引樵漁齋大父忌作舊居在道娘墳東道娘墳西近官路朝朝暮暮行人多世事百年渾不省滿堂賔客竹枝歌贈釣伴短短蔞蒿淺淺湾夕陽倒影對南山大船鼓枻唱歌去小艇得魚吹笛還得陳徳雍書年九十餘矣猶有􅂅學之志越客􅀄披手翰新天涯暮雨欲沾巾可憐一片長江水日夜東流不待人望頂湖山客子正歌山􅀑句篙師欲進頂湖船遥看落日蒼梧外獨立横槎古寨邉夜過三洲巖讀濂溪題名示諸生山容寂寞紅葉老江月照曜青天髙題名夜半㝷周子秉炬相随愛爾曹歇馬大徑山數家烟火隔林塘一􅀣寒花晚自香黄葉塚頭􅂓歇馬鷓鴣聲裏近斜陽華盖仙蹤爲謝布政作時謝巳物故華盖山頭雲起時群仙雲裏坐彈棋謝公不用登山􅄚借得千秋一鶴歸東軒獨坐桃花寂寞梨花開山中薄酒三五杯村西有客可人意風雨今朝期不來虎夜出虎頭縋淵雨即下山中白額還遭打今年雨足汝不知稍出人間食牛馬次韻趙提學見􅀉蒿萊封徑不腰鎌長夏山齋睡正甜風送歌聲滿天地驚囬殘夢雨㢘纖老大行藏敢不疑暁川紅日睡醒時昨宵共對崖山雨如此乹坤那得知古有所思采采紅芳日欲斜盈盈珠涙落天涯東風忽攪籬前􅀣惱亂春愁不爲花卜日修外海赤􅅺嶺祖墓值雨冬􅀨墳頭蒿已生年年披草􅀕清明晚風吹落携鉏艇又聴􅚗輈隔水聲與景星夜坐撥悶無人致酒瓶哦詩燈下一􅀰清夜深笑拍胡床語忽亂堦前落葉聲西樵山下感舊西風吹老錦巖春遺跡荒􅋽此水濵雲氣不遮西望眠青山剛對獨歸人西樵山前􅊕鶴歸縞衣􅀟拂錦屏飛凄􅋽夜半􅀌舟客一聴遺音淚滿衣徳孚先生留此眠南山揮手白沙船伍光宇􅃅小南山江山此日三人别誰道人生無百年示建旌節亭役者照曜乹坤功不小此風此日更須扶泮宫畚􅁟皆民力不共城􅀰一例書次韻趙提學留别白沙列炬溪邉􅀣影斜隔花遥迓使君車酒杯欲别㣲風起吹動馨香下栁沙蕉麗望羅浮翠錦爲山白錦雲􅀞工傳影不傳神今朝蕉麗江頭望魂爽何由得傍身黄連􅝱即事青草橋邉船未歸曲川㣲􅀨暗荆扉江村盡日無來徃夫在東皐媍給炊上㠶蜻蜓翅短不䏻飛欵欵随風堕客衣此是天人相合處蒲㠶髙掛北風歸南川風􅀨上歸舟水國蕭蕭昨夜秋鍾鼓不來南海岸夢魂深遶白沙樓荔丹映􅀨垂垂濕江練随風滚滚流不敢乆貪山水勝白頭正動􅀝門憂􅀄晴􅀄晴樓上燕飛飛樓下歌人白苧衣一曲未終花落去滿林啼鳥送春歸落花落花半落流水香鳴鳩互鳴春日長羙人别我在江浦欲來不來空㫁腸清暁清暁有人來欵扉風吹衫䄂白披披昨宵雨打山窓破莫怪先生下榻遲對酒半開半謝花相催江水東流不復囬扶杖江頭看花樹不知笑向酒家來喜生姪两翁筋力少翁衰竹杖先堪付􅀂兒只恐暮年詩更逸出門須背錦嚢随新設􅁓帳軒中如雲白􅁓􅇁方牀翠簟眠穿我固當世到葛天終不逺先生枕外即羲皇堦面苔侵牡蠣墻小軒容易領年光只從今夜床頭月已照先生􅁂脚霜送鍾地曹入亰十年自汗不曾乾枕上殘書白首看莫道無心與君别樽前更覺别君難感事人間骨肉薄秋雲一事朝來不忍聞何䖏青山封宿草欲􅀅衰淚灑􅀌墳平生交態如兄弟此日悲歌聞路人欲􅀉秋風两行字九原無雁獨憐君宿倪麟所石榴花秋開老蟾半影秋如水曙角一聲霜滿街白髮山人到城府石榴花下借眠來催諸友九日詩課九日樓前客令新黄花愛酒不饒貧􅂆君火急交詩課􅅻到明朝罰主人題杜少陵小影次韻栁文肅孟子詩肩髙聳山杜陵談笑古風還世間還對憂時􅀞羙酒花前巳破顔與舊童子神樂燒茶伴老夫昔時童子今生鬚青春過眼如流水白雪滿頭非故吾謝惠酒白髪蒼顔老䂖齋出門秋思滿天涯極憐紫酒逡巡有不􅀒黄花􅀧綴佳五月二十七夜􅄓風作屋漏燈殘四壁漏㾗斜老屋囬風落細沙乹坤更有晴明日爲報家人莫怨嗟題􅀞赤壁磯頭天欲曙縞衣和夢掠舟西欲㝷故處何由見長恨今人􅀞亦非題月溪卷月出東方白漲溪溪翁行樂溪東西相思欲過隔溪去南斗無光北斗低贈周鎬兄弟周生两馬齊两鞭亰指長安鎬在山今夜尊前㸔秋月明年秋月憶尊前秋日山河一望仲秋前楓葉􅀄黄水半川路上行人不歸去北風吹爾過殘年木犀未發盎蓮空小女來方剪綵工不信哀榮是天道覔花無䖏怨西風閱馬氏均田文王侯尚愛槖中装何况田家弟與兄孟子未知人世事獨􅀅仁義敎齊梁贈鄧某家其人貌似伍光宇南山面目偶然同又向人間見此翁碧蘿窓下一杯酒猶勝良宵夢裏逢此老􅀂是石曼卿此山便是芙蓉城髙歌獨控青騾去是有風流萬古情喜􅀨滿眼珠玉不足珎甘􅀨一灑萬家春昨日蒼頭木洲至又道木洲饑殺人􅀅如東莞聞途中盗發不果扁舟東過扶胥口一日二日之便風何故三旬不成徃仰船岡下賊旗紅題朴軒􅁑洪亦號抱朴子安知朴翁不是仙莫􅀅甲子編年㸔人道翁生大撓前題應憲副真率卷今古一杯真率酒乹坤㡬個自由身春風囬首黄巖㑹醉挿花枝少一人茶園曲􅀉治香櫃􅀽暉峽東弯弯一水長啇􅂳無日不蘇杭千村萬落無竆􅀣盡是􅀽􅀰櫃裏香揷花巖前上馬興難挐卯酒三鍾㡌半斜兩􅁂馨香齊挿了賽蘭花間木犀花訪山家次韻樛枝逕口􅀰迎馬語鳥籬前妾掃雲笑殺主翁忙岀户手提筐果喚㕑人清泉煮蕨愛山家夜飲西岩望月斜澗底白雲留不住半随紅雨落天涯蕭黄門書來見責乆無書用舊韻荅之諌官一字照天涯南海年年問釣沙滄波不與黄門信笑殺龍鍾百姓家平郷伯陳公以紫茄花絹爲家慈夀詩以謝之呉紈衫色紫茄花老親著時衆口􅑞小兒奉酒歌七字持獻軍門表拜嘉㬌雲偕范規海上割稻犬子給炊海上舟范生打槳两同逰田中割稻家中望逢著諸仙莫浪投招訟者歸越王城裏塵随馬刺史衙前吏喝人此日王孫不歸去舊逰芳草可憐春中秋期諸友不至山妻有錢肯沽酒諸友賦詩期不來范生也逐吾児去一夜清光對玉䑓贈鄺載道之淮陽別駕前御史謫黄巖十年花縣眼中人别駕淮陽又㡬春曽共烏䑓髙十仞鄭􅀰今著白綸巾鄭紀也感事齒夲生來不著唇呶呶衆口劇鵝群鼻雷自炒元城耳夜半鍾聲那得聞木犀四􅅸􅀉􅌼麟正月山桃委地紅桞塘還捲落花風木犀一􅀣渾堪賞盡日相看煙雨中風雨歸來問小奴藥欄花架費人扶黄昏雨歇茅簷月只有木犀對老夫春城無日不思家風雨經旬損物華竹色四時長不改平安先報木犀花風吹雨打只傷神白首龍鍾尚愛春花意未應嫌老醜十年前是種花人題两山居士卷墨水翻騰作巨川两山何處洒雲煙醉中亦有臨池興悵望名家不敢言題東所卷東所詩成月滿衣乹坤無語􅀑神悲􅀰今欲到飛雲去􅀃與两山居士知問鄺珙病鄺生病肺今何如獻􅀊􅀄驚得手書我有丹方欲傳與小棃床上半跏趺次韻陳冷庵僉憲見􅀉撃壤聲中酒􅀦春海風吹老石邉身桃花㡬􅀣衡門下我是唐虞一軰民乹坤􅀞筆乆荒蕪誰作臨江五老圖聞道逺師􅀅結社華巔猶得照鄱湖五十四年居海濵偷􅀅水月洗心塵今朝偶得西江使溟海猶堪把贈人别意江閣醒眠秋正􅋽西風殘漏轉離腸不知天道平分未巳覺人間一夜長悼林􅌔一日之雅亦爲哀鍾淑相随入夜䑓此生未了男児事也向扶胥打坐來木犀開時江右李士逹劉希孟巳去容貫范規江浦未還因有獨賞之歎嶺北書生嗟去早江東逰子惜歸遲重陽􅀅近無風􅀨正是木犀􅀄發時先子忌日作生來只見山頭􅁟􅀕諱惟聞月下螿五十四年天頗近諸孫羅列拜成行題􅀞茅簷秋颭酒旗風舟入兼葭月半籠醉睡不知家逺近醒來依舊五湖東寒山鍾近不成眠人在姑蘇半夜船何處明朝正堪望呉王宫苑草芊芊金陵城西趂市􅀰􅀒戴不厭江路長百花橋頭換羙酒歸與漁父歌滄浪古耶道中有懐翠煙浮壠麥􅀄齊社􅀣青青獨鳥啼何處相思不相見木綿花下水門西小湘峽食嘉魚两山㫁處小湘峽十月嘉魚出水鮮引滿阿儂生日酒㣲吟空記属牛年自三洲還至禄歩村江流夾束午風柔城郭歸來禄歩舟惆悵碧桃歌舞散黄茅烟裏一􅚗輈過清逺峽行人􅀄上峽西頭巳有心随下峽舟天下名山皆可愛夢中慈母不來逰讀鱷魚文刺史文章天下無海中靈物識之乎如何皇甫兼逢吉不及潮州一鱷魚食蜆家住東南蜆子村小鐺風味勝侯門眼前下筯非無䖏芹曝猶堪奉至尊社中桑林伐鼓酒如川秋社錢多村社錢盡道升平長官好五風十􅀨更年年社屋新成燕子來山丹未落野棠開三三两两児童戯弄水扳花日㡬囬社酒開顔一百家春風先動長官衙東君也觧逰人意紅白交開􅀣􅀣花社日年年㑹飲同東原西埭鼓鼕鼕無人不是桃花面笑殺河陽􅀣上紅夜􅀨侍子焚脂弄小孫藥爐分火暖殘樽東風不􅃹黄鸝怨一夜飛紅滿􅀣根問李深之病竹林花埭酒旗風秋賞春逰事事同伏枕六旬猶未起相思紅日滿簾櫳沙上付逕西來入社松北山終日白雲封徃來獨把梅花笑只有沙堆不􅀒公秋江喚渡何處渡頭風浪喧隔波仙境似桃源瘦藤倦向人間去喚得船來便上􅂳春寒清明天氣如􅀄臘􅀨脚雲頭枉是春堦下荼䕷開自晚不随紅紫怨東君一春光景在花枝三月殊非隂􅀨時只有木犀偏耐冷小枝簷下對衰遲看花何處輾香輪江上春寒著莫人衰病未堪供起倒且便髙枕過殘春題棲霞卷紅霞小塢地仙家日出耶溪十里花秋竹垣低是何處有人窓下讀南華雜興數行屋蟻下庭蕪墻角扶留緑映􅅂正是滿樓山雨過夕陽惟好鵓鳩呼讀朱晦庵註叅同契神仙不註叅同契火􅀱工夫那得知千古晦庵拈一語可憐無及魏君時大水浮舟至七星巖頂題其上七星巖下醉神仙猶占龍床水底眠我有一樽延夀酒月明今夜對南山蒼梧􅀉陳庸時館潯州山形西上水東流獨泛長江十日舟無翼可随飛鳥去相思時復到潯州題林良爲朱都憲誠庵先生冩林塘春暁圖煙飛水宿自成群物性何嘗不似人得意軋坤随上下東風醉殺野塘春出肇慶有懐馬玄真紅塵白浪去來年細雨秋江看木綿何處思君君不見羚羊峽尾七星前金州別陳冕江上東風捲暮旗木綿花下進舟遲金州未是窮途别莫贈黄金只贈詩澷興粉墻經雨舊成㾗青􅀍扶留直到根俗吏欵門敎暫去隔簾抛果戯諸孫􅀞鷹落日平原散鳥群西風爽氣動秋旻江邉老樹身如鐡獨立槎牙一欠伸木犀枝上小鵲翠裙白領眼中無飛上木犀還一呼乹坤未可輕㣲物自在天機我不如贈周成虚無裏面昭昭應影響前頭歩歩迷􅀃到鳶飛魚躍處絶無人力有天機春中雜興春寒著莫絮􅂁輕逰走何山更乞晴夜夢髯翁作人拜安知不是白龍精小􅀨如􅁝落晚風東君無計駐殘紅野人不是傷春客春在野人杯酒中香煙裊入䄂中蛇讀易山齋日未斜領取乹坤分付意扶留生耳木犀花端陽後一日里人送角􅁰酒至荷瓢童子問誰家老婦簷前駐紡車角􅁰喚囬端午夢還從艾琖得松花九日木犀未開野徑香沉舞蝶稀柴門􅀣老著花遲含章此日無窮意只有堦前拄杖知菊來栗里何須酒梅到􅀌山不欠詩老去未􅅴詩酒廢木犀其那放花遲木犀花下待陳秉常常疑楚客飡秋菊不信唐人醉牡丹何䖏木犀香可愛須君曾到玉䑓山謝九江惠菊誰􅀅此菊種江濵物色當年漉酒巾若道淵明今我是清香還属隔江人紫菊移來紫水濵白頭對著白綸巾花前酌酒笑未足酒後簮花笑殺人故根迢逓九江濵􅀊晩相看此道巾不用詩流強分别種花人是賞花人鶴䄂披翻野水濵黄花簮破小烏巾腰間我有坡翁帶觧與西僯賣酒人夜夢見太母急呼諸孫前拜欲􅁴未􅁴夢中夢有形無形身外身喜逐悲來呼不得曾孫前拜太夫人馬肇文惠油酒并録示哭一峯先生詩及送林緝熈掌敎絶句復以香一束賦三絶見意誰以三年報一峯舒剛盖有古人風一詞亦到君親地何䖏無天覆馬龍清油濁酒慰家貧老子山中但白雲君欲看雲須乆坐晴窓端爲起爐熏南川釣艇巳横波裏水漁翁又放歌今日未知明日事且傾君酒爲君哦贈周二仔入京文都家㒒故人訝我乆無書只到長安夢亦踈萬里周􅀰知此意杖藜江上送長􅂡次韻張廷實東所􅀉興見􅀉天邉􅊕色􅀅秋至海上長風送月來何䖏無人識東所夜分樓上了餘杯明月清風放两頭一笻挑到古尼丘而今老去無筋力􅍦坐江槎看水流扳縁千尺采松花服食爲仙未到家我得丹方欲傳與肯􅂢妻子入煙霞路自飛雲過閬壷仙人迓我乆次且相期汗澷歸何處猶占煙波理釣魚放倒瓊林半醉間半留醒䖏著江山病來只有冠裳在不帶朱門一事還不求老馬在長途誰道長安一馬無伯樂未來幽䔬北憑君傳語到平湖邯鄲枕上㸔三台誰撼藜床喚老萊幽事不應全廢却夜來風吼澗中雷西風吹老木蘭花水閣氛氲帶晚霞溪上行人不相識隔舡對語問誰家海上峯峦今属誰携來四百布􅌩垂或嫌珠珮多遺恨化作長髯未可知門下諸生無一個山童撤却臯皮坐與儂七尺青團蒲今年換與張東所沽酒酒店無錢與酒遲􅀄晴天氣菊殘時乹坤不放閑人醉也到江門酒盞知題南浦送别圖爲蔣方伯何人更賣雲卿􅋰我昔曽歌孺子亭欲冩别離非此日西山南浦認丹青對菊花開無酒醉江濵莫笑人間破葛巾廬阜長官歸未得㸔花還共去年人飡香誰亦到湘濵西崦東籬濫一巾去􅀊金英曽照我今年玉蕋又驚人白雁南飛到海濵吟邉芳氣襲衣巾門通水竹三丫路坐對求羊一軰人秋英如雪照江濵扳折須妨小侍巾曲檻两頭門盡掩先生元是惜花人日日狂歌菊澗濵花神應識玉䑓巾西風爲掃繁華去不遣紅芳近老人花舫誰撑緑渚濵道人醉脫碧方巾東籬不飲江州酒彭澤當年未盡人精魄當歸楚水濵天涯聞訃忽沾巾西風吹醒蒲􅇛夢獨對黄花憶故人扁舟何䖏剡溪濵夜半歸來雪滿巾争似一瓢秋菊伴􅃮園風暖蝶疑人我貌不如蘇頴濵秋風華髮巳盈巾有錢不買重陽醉籬下黄花也􅀏人菊坡持酒越江濵御筆親題與醉巾丞相九囬徵不起碧虚長揖夢中人知章投老鑑湖濵還戴華陽羽士巾元亮也歸三徑去至今人笑是痴人陶家園裏舊開叢復入山窓對此翁一曲一杯花下醉人生䏻得㡬囬逢種扶留用舊韻輕落藤稍淺打溝種時須共小遲留浮生日月供眠外付與携鋤把甕休絜矩工夫但一溝山中夜􅀨長扶留莫敎㸔到詩人眠千首鳶魚也未休澷興娉婷鄭女著纎羅能爲㐮王激楚歌一曲霓裳都掃盡尊前無地舞陽阿贈麥岐出逰錯敎人意向花濃萬􅀣香飄一夜風行過東津莫囬首一畨春事又成空我得無言贈麥岐乹坤逰走到何時千山萬水無竆意分付芙蓉杖一枝八月八夜忽夣玉宇無瑕碧雲燦爛南斗下大書八字云生生生徳俊逸超全下有四人面西而行或􅀮或見覺後紀以絶句八字光騰斗外天碧雲西去擁群仙乹坤此夣無人話起歩中庭月正弦贈人誰􅀅児女浪千情春雨來時草又生夢亦是真真亦夢石衆槐火對清明悼周鎬京之兄也京以母命赴春官鎬亡京南歸在道一封長夏􅀉京書不遣歸來待拜除誰與行人報消息髙堂今日要人扶一􅀟玉􅀣出東􅈚豈意先随暁露傾三十六年惟一女老夫垂淚冩銘旌叔子還家定買碑墓旁􅀅刻老夫詩詩中不借閑言語只冩人間母子悲嗜好平生法帖詩偶逢方士問刀圭何人擺脫浮生事得似周􅀰易簀時里巷三年六七墳老年無淚哭交親數聲願借遼陽鶴喚醒人間未死人望白龍池在本邑崑崙山頂西望不見崑崙池白龍上天歸何時望中心逐飛雲去半掛玉䑓松􅀣枝􅆂虚數尺鏡光懸舊是頭陀洗鉢泉又有山人來洗耳白龍休占水中眠雲影天光共一池池中消長白龍知仙翁􅀐龍上天去只有明月照漣漪梅花一枝低壓塢籬斜細路穿雲竹半遮忽􅀍暗香相引去小塘詩景在西家老樹眠江水囓之茫茫水月浸花枝暗香捲入滄􅈚去不是漁翁那得知沙籠寒月􅀣籠煙香徹龍溪水底天斜隔竹林窺未得更㝷西路上漁船南枝照水忽先開漁父湾頭有釣䑓罷釣歸來溪路􅊕暗香㡬度倩風媒􅀌山山下一枝梅春到南枝尙未開酒醒西樓看月坐清風湖上捲香來朝來溪上弄花丸天地氤氲日月還無覔暗香踈影處笑呼歐九問􅀌山氣􅅎壓倒􅀌山梅花撩我又冬殘落日深山一凭䦨病眼不知花妙處只􅀅花作野人㸔梅花如雪擁溪扉漁父村南􅀒酒歸縦飲不知花落去酒醒􅂳上見花稀日日花邉喚酒船梅花開處酒家眠青山一片無人買誰與先生辦酒錢樵客入林聞曙鴉梅梢殘月暗溪沙沿溪路盡無人到更􅀃林逋住處賖舎南朝見一枝梅舎北桃花昨夜開笑問花開何太急青春肯逐酒錢來南北枝頭月正懸月中誰此弄溪船晩來吹入梅花去吹到林逋木榻邉蒼煙裊􅀣溪􅁳􅁳夜半江樓笛一聲悵望錯疑溪女折滿頭只慣挿金櫻懐張詡南北東西一馬塵相思何處不傷神竹邉閉閣長無事猶厭山雲軟素巾玉枕山一枕横秋碧玉新金鰲閣上見嶙峋使君得此元無用賣與江門打睡人魯两生示民澤九五當朝須􅂆駕两生朝突不留琴想見古來交㑹盛鴛鴦譜􅂻盡傳鍼黄雲右関萬丈黄雲千丈山金粟花開不等閑吁嗟乎金粟丈人與爾同􅀊闌黄雲左関萬丈黄雲千丈山金粟花開不等閑金粟氤氲塞两間吁嗟乎金粟丈人與爾同􅀊䦨和鳯山見􅀉韻乙巳冬十月白馬山前雪滿扉隔江雲􅀣晚依㣲津頭日日行人過不見長安舊布衣江浦有白馬庵曾寓處相逢記得入亰年夢破邯郸不受牽更􅀃莆田風㬌好木蘭溪裏木蘭船讀陳庸詩稿天上霓裳乆寂寥人間何處不詩瓢􅀉言雪月風花好都在騷人仔細描張廵獨蔽江淮阻賊兵乹坤囬首盡羶腥何人肯救睢易急不使忠臣付忍名許逺援􅅸城􅀌力不任逆胡天討竟成擒􅁍憐當日奴羮進酸盡平生長者心南霽雲萬人囬首㸔浮屠肯訊􅀅軍躍馬呼誰續雎易三口命進明先斬後擒胡桃花雲鎻千峯午未開桃花流水更天台劉􅀰莫記歸時路只許劉􅀰一度來山中児女不知秦無頼漁郎最惱人溪上桃花君莫種東風不貸武陵津題􅀽氏知歸卷鳥在蒼岑魚在淵水深林宻保生全秋風莫怨茅茨破白首眠㸔榻頂天隂厓水必到滄􅈚石罅㳙㳙势已成萬古乹坤流不盡望湖亭下更分明示我隂陽闔闢機舂陵墨􅀨灑門扉直從罔􅁚前頭見人與軋坤一䖏歸界江八景河橋栁色廬阜清風長官宅渭城朝􅀨王維詩東西緑遍河橋路長與離人照酒巵驛館槐隂愧隂覆庭日卓午小吏夜出迎當路長江閱盡徃來人淦水西邉此槐􅀣爐渚晴煙香爐紫煙生一縷天風吹落蘆花渚江東行客歸去來霑衣猶帶金陵雨古埠漁燈埠頭半􅀧夜燃枯釣得淞江一尾鱸漁父聮舟向東岸東岸人家有酒沽界江霽月玉宇蟾輝秋展鑑界江水色夜磨銅乹坤好景誰無分只問靈䑓得属公西僧禪􅆊竹徑風傳西􅆊聲隔墻深夜有人聴山僧老去無㓛徳還􅀝禪門誦佛經東閣書聲閉戸書聲午欲乾夜䦨燈燼落蒲􅇛朝廷􅀂問􅀚風使猶有書􅀰信長官大橋牧笛山花争挿㡌頭紅蘆葉鳴鳴弄晚風橋大板平牛歩稳老牛差後不愁儂讀周朱二先生年譜千年㡬見南康守嘆息人間两譜開但使乹坤留一緒聖賢去後聖賢來一語不遺無極老千年無倦考亭翁語道則同門路别君從何䖏覔髙蹤白洋潭魚白洋風起釣􅁝飛夢裏漁蓑此夜歸明日冷香橋上望海鷗相對便忘機
